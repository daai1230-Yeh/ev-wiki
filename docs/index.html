      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=757101",
      "updated": "2026-05-26",
      "body": "# 現代汽車集團擬擴大韓製車採用中國零件\n\n**來源**：[DIGITIMES](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=757101)，2026-06-01\n\n---\n\n## 核心事實\n\n現代汽車集團正研議在**韓國生產車輛**中擴大使用中國零件比例（目前韓國產燃油車零件**國產化率高達 95%**）。\n\n---\n\n## 驅動因素\n\n| 因素 | 數據 |\n|------|------|\n| 零件採購規模（2025）| 全球 **84 兆韓元**（~$557 億美元），較 2021 年 **+45%** |\n| 韓國廠零件成本（2025）| **42.8 兆韓元**（+31%）|\n| 中國零件價格優勢 | 平均比韓國**便宜逾 30%** |\n| 油價衝擊 | 2026 中東戰爭高油價 → 零件漲速進一步加快 |\n\n## 考察行動\n\n- 現代汽車集團主要高層攜合作廠商代表**赴中國實地考察**\n- 指示：「若有必要，研議透過中國合作廠商採購零件」\n\n---\n\n## 風險與阻力\n\n1. **供應鏈依賴風險**：2020–22 年 COVID 封控曾造成線束 + 安全氣囊斷供，停產損失慘重 → 此後已分散至韓、東南亞\n2. **韓國供應商存亡**：韓國零件業者難以在通用零件上正面競爭中國廠商\n3. **品牌價值疑慮**：「韓國製造」定位可能受損\n4. **政治敏感性**：加深對中依賴 vs. 去中化趨勢逆行\n\n---\n\n## 背景\n\n- 現代/起亞中國製車輛**本已主要用中國零件**（含 Ioniq 5 等）\n- 此次討論針對**韓國工廠**產線供應鏈調整\n- 中國品牌大舉進軍韓國市場（BYD 11 個月破萬輛）也加速競爭壓力感知\n\n---\n\n## Related\n- [[entities/本田]]（類似處境）\n- [[concepts/中國EV出海策略]]\n- [[concepts/車用半導體供應鏈]]"
    },
    "hyundai-iccu-warranty-2026": {
      "title": "現代汽車 ICCU 保固延長至 15 年：E-GMP 平台常見故障承認，車主仍不滿",
      "url": "https://insideevs.com/news/793707/hyundai-iccu-warranty-failure-warranty",
      "updated": "2026-04-23",
      "body": "**來源**：[https://insideevs.com/news/793707/hyundai-iccu-warranty-failure-warranty](https://insideevs.com/news/793707/hyundai-iccu-warranty-failure-warranty)\n\n# 現代汽車 ICCU 保固延長至 15 年：E-GMP 平台常見故障承認，車主仍不滿\n\n**原文**：InsideEVs（Rob Stumpf）｜ **發布**：2026-04-22\n\n## 摘要\nHyundai 宣布將 ICCU（整合充電控制單元）保固從原 **5 年 / 8 萬英里**大幅延長至 **15 年 / 18 萬英里**，適用於 E-GMP 平台車型。但車主批評這是「最低限度」回應，要求根本解決問題。Kia 也預告將跟進相似計畫。\n\n## ICCU 是什麼？\n- 全名：Integrated Charging Control Unit（整合充電控制單元）\n- 功能：車載 AC 充電、DC 快充、DC-DC 轉換、V2L 等所有充電相關功能\n- 問題：E-GMP 車型普遍有 ICCU 故障紀錄（Consumer Reports、Reddit、美國政府投訴皆有記錄）\n\n## 保固延長細節\n\n| 項目 | 舊保固 | **新保固** |\n|------|-------|-----------|\n| 年限 | 5 年 | **15 年** |\n| 里程 | 80,000 英里 | **180,000 英里** |\n| 費用 | — | **免費（車主不需付費）** |\n\n- 適用車型：特定 E-GMP 平台電動車（美國）\n- 等候零件時間：可能超過 **一個月**（供應鏈問題）\n\n## 車主反應\n- Reddit 普遍評價：「這是 Hyundai 能做的最低限度」\n- 部分車主已需要多次更換 ICCU\n- 潛在買家因知悉 ICCU 問題而避開現代/起亞 EV\n- 引用評論：「除非問題根本解決，否則 15 年無限里程保固才是最低標準」\n\n## 延伸比較\n- Tesla Model 3/Y 的 PCS（Power Conversion System）功能類似 ICCU，故障率也高\n- Tesla PCS **不在**高壓電池保固範圍內\n\n## Related\n- [[entities/本田]]\n- [[concepts/電池與技術/ADAS智駕系統]]"
    },
    "hyundai-kia-atria-ai-gwangju-2026": {
      "title": "南韓首次大規模自駕實證：現代 × 起亞 200 輛 Atria AI 進駐光州",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755414",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755414](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755414)\n\n# 南韓首次大規模自駕實證：現代 × 起亞 200 輛 Atria AI 進駐光州\n\n**原文**：DIGITIMES | 陳玟靜｜**發布**：2026-05-15\n**合作機構**：現代汽車、起亞、韓國國土交通部、光州廣域市、Autonomous A2Z\n\n## 計畫概要\n\n南韓**首次**大規模自駕實證專案，2026 年下半在光州（광주）啟動：\n- 投入車輛：約 **200 輛**搭載 Atria AI 系統\n- 覆蓋範圍：初期光山區、北區、西區部分；2027 年起擴至全市 **501 平方公里**\n\n## Atria AI 技術架構\n\n- **E2E（End-to-End）架構**：感知、判斷、控制整合至**單一 AI 模型**\n- 優點：相較傳統規則庫式系統，更靈活應對突發狀況\n- 傳感配置：每輛 8 個自駕攝影機 + 1 個雷達（評估後續加裝）\n- 叫車 / 調度平台：Hyundai × Kia 的 AI 移動平台 **Shucle**\n\n## 組織架構\n\n公私合作組建「南韓自動駕駛隊」：\n- 自駕車供應 + 服務平台 → 現代/起亞\n- 政策支援 → 韓國 MOLIT（國土交通部）\n- 場地協調 → 光州廣域市\n- 技術驗證 → Autonomous A2Z（自駕新創）\n\n## 產業意義\n\n- 韓國汽車集團正式以自有技術（非外購）切入 L4 自駕商業化\n- E2E 架構與 Tesla FSD、Waymo 等全球路線接軌\n- 數據積累是此次實證核心目標，為後續提升奠定基礎\n\n## Related\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[entities/豐田]]\n- [[sources/in-cabin-ai-sensing-2026]]\n- [[sources/china-robotaxi-cost-advantage]]"
    },
    "hyundai-korea-battery-subscription": {
      "title": "現代汽車韓國電池訂閱制試點（2026-04-29）",
      "url": "https://www.electrive.com/2026/04/29/a-first-for-south-korea-hyundai-trials-battery-subscription-model",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.electrive.com/2026/04/29/a-first-for-south-korea-hyundai-trials-battery-subscription-model](https://www.electrive.com/2026/04/29/a-first-for-south-korea-hyundai-trials-battery-subscription-model)\n\n# 現代汽車韓國電池訂閱制試點（2026-04-29）\n\n**原文**：Electrive（Cora Werwitzke）｜**發布**：2026-04-29\n\n## 摘要\n現代汽車在韓國啟動試點：EV 電池以訂閱制使用，車身與電池分離所有權——韓國史上首次。先從計程車出租車隊開始，計畫 H2 2026 擴展至一般消費者。\n\n## 計畫內容\n\n| 項目 | 細節 |\n|------|------|\n| 試點規模 | **5 輛 Ioniq 5 計程車**（首爾都會區）|\n| 訂閱方 | 現代汽車金融（Hyundai Capital）|\n| 機制 | 每月訂閱費；電池老化後由 Hyundai Capital 提供替換電池 |\n| 擴展計畫 | 計程車先行 → H2 2026 擴展至一般消費者 |\n\n## 法規突破\n\n南韓國土交通部 **2025 年 11 月**批准特別法規：\n- 首次允許 EV 車身與電池**分別登記所有人**\n- 此前韓國法律禁止分開所有，壓制了電池訂閱模式發展\n\n## 為何計程車先行？\n\n計程車高里程加速電池損耗 → 最適合測試訂閱制經濟模型與電池替換周期\n\n## 相關技術：換電測試（Pit In）\n\n現代汽車集團旗下新創 **Pit In**（2025-09 啟動）：\n- 地點：京畿道安養市\n- 規模：~30 輛計程車，來自 4 家業者\n- 技術：10 分鐘空換滿電（傳統換電技術）\n\n## 戰略意義\n\n解決 EV 普及兩大障礙：\n1. 高初始購車成本（電池佔 EV 成本 ~30-40%）\n2. 電池衰退後殘值疑慮\n\n## Related\n- [[entities/Hyundai]]\n- [[concepts/電池交換技術]]\n- [[concepts/地理市場/東南亞EV市場]]"
    },
    "hyundai-pleos-sdv-os": {
      "title": "現代汽車 Pleos OS：SDV 新平台，Ioniq 3 首搭，保留實體按鈕",
      "url": "https://insideevs.com/news/793469/hyundai-pleos-os-explained",
      "updated": "2026-04-21",
      "body": "**來源**：[https://insideevs.com/news/793469/hyundai-pleos-os-explained](https://insideevs.com/news/793469/hyundai-pleos-os-explained)\n\n# 現代汽車 Pleos OS：SDV 新平台，Ioniq 3 首搭，保留實體按鈕\n\n**原文**：InsideEVs／Mack Hogan ｜ **發布**：2026-04-20\n\n## 摘要\n現代汽車在 Ioniq 3 首度搭載全新「Pleos」作業系統，以 Android Automotive OS 為基礎（非 Android Auto），建立區域控制器（Zonal Controller）架構，支援 OTA 整車升級，同時堅持保留關鍵實體按鍵，差異化於 Tesla 的全觸控路線。\n\n## Pleos OS 架構\n\n| 特點 | 細節 |\n|------|------|\n| 基礎平台 | **Android Automotive OS**（非 Android Auto 手機投影）|\n| App 生態 | 現代自有 App Market（非 Google GAS，更自主）|\n| 控制器架構 | **區域控制器（Zonal Controllers）**：減少配線、降低複雜度 |\n| OTA 升級 | 真正的整車 OTA（現有系統受限於多廠商拼接架構）|\n| 同類產品 | Ford、Honda、BMW、Porsche 均採用 Android Automotive |\n\n## 設計哲學：保留實體按鍵\n\n- **螢幕下方** → 音量、溫控、座椅加熱冷卻（實體）\n- **方向盤** → 仍有實體按鍵\n- **儀錶板** → 獨立駕駛資訊顯示器\n- 差異化論述：「現代永遠會為重要功能提供實體控制」\n- 對比：Tesla 全觸控 → 使用體驗爭議（轉向燈桿爭議等）\n\n## 市場意義\n\n現代 EV 硬體已是頂尖（Ioniq 5/9 快充 + 能效業界領先），軟體體驗一直是弱點：\n- **Pleos 解決的問題**：舊系統是數十個廠商軟體拼接，OTA 受限\n- **未來應用**：所有新款現代 EV 將陸續搭載 Pleos\n- Ioniq 3 本身為次緊湊型，可能不進入美國市場\n\n## 對競爭格局的影響\n\n| 廠商 | SDV OS 策略 |\n|------|-----------|\n| Tesla | 完全自研，全觸控 |\n| 現代 | Pleos（Android Automotive 基礎）+ 自有 App Market |\n| 鴻海 | CDMS 模式，MIH 開放平台 |\n| 蔚來 | 自研，含 5nm 智駕 SoC |\n| VW | MEB+ 平台，部分 Android Automotive |\n\n## Related\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[entities/鴻海]]\n- [[entities/蔚來]]\n- [[sources/qualcomm-bosch-adas-expansion]]"
    },

      "title": "Ikarus 贏得北馬其頓 150 輛電動巴士大標（2026-05-05）",
      "url": "https://www.electrive.com/2026/05/05/ikarus-wins-electric-bus-tender-in-north-macedonia",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.electrive.com/2026/05/05/ikarus-wins-electric-bus-tender-in-north-macedonia](https://www.electrive.com/2026/05/05/ikarus-wins-electric-bus-tender-in-north-macedonia)\n\n# Ikarus 贏得北馬其頓 150 輛電動巴士大標（2026-05-05）\n\n**原文**：Electrive（Florian Treiss）｜**發布**：2026-05-05\n\n## 摘要\n匈牙利巴士製造商 Ikarus 獲得北馬其頓交通部招標，150 輛電動巴士為 Ikarus 史上單次最大訂單，標誌匈牙利電動巴士廠進入巴爾幹半島市場。\n\n## 訂單概況\n\n| 指標 | 數值 |\n|------|------|\n| 數量 | **150 輛** Ikarus 120e V4 + **75 座充電站** |\n| 規格（最低要求）| 325km 續航 / ≥360kWh 電池 / 充電站 ≥120kW |\n| 保固 | 巴士 + 電池 **4 年** |\n| 備件供應 | **10 年** |\n| 部署 | 斯科普里 ~100 輛 + 其他城市 50 輛 |\n\n## 車型：Ikarus 120e V4\n\n- 長度：12.9 公尺（標準單層城市巴士）\n- 電池：LFP，多種容量配置\n- 續航：**350–580 公里**（視電池配置而定）\n\n## Ikarus 品牌歷史\n\n- 鼎盛期：曾出口超過 30,000 輛巴士至東德\n- 2007 年破產；2010 年復興，近 5 年推出電動巴士\n- 現行電動巴士：2 輛在德國圖林根邁寧根 + Chemnitzer Verkehrs-AG 測試中\n\n## 意義\n\n- 巴爾幹半島（東南歐）加入電動巴士版圖\n- **歐洲本土（非中資）電動巴士廠的中東歐市場拓展**\n- 政府採購模式：整包（巴士 + 充電站 + 保固）\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/地理市場/歐洲EV市場]]"

    "in-cabin-ai-sensing-2026": {
      "title": "車內感測 AI：DMS → 全艙多模態，Smart Eye × 24 家 OEM（2026-04）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=753816",
      "updated": "2026-04-30",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=753816](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=753816)\n\n# 車內感測 AI：DMS → 全艙多模態，Smart Eye × 24 家 OEM（2026-04）\n\n**原文**：Digitimes／舒能翊｜**發布**：2026-04-30\n\n## 摘要\n瑞典 AI 公司 Smart Eye 獲得日本主流車廠追加訂單，將既有 DMS（駕駛監控）升級為全車艙感知 AI。背後驅動力：歐盟 GSR 法規 2026 年 7 月全面上路強制 ADDW，以及 Euro NCAP 2026 更新評估標準。\n\n## Smart Eye 市場地位\n\n| 指標 | 數值 |\n|------|------|\n| OEM 合作客戶 | **24 家** |\n| 最新訂單 | 日本主流車廠 2 款車型追加（DMS → 全艙感知）|\n| 量產時程 | **2027 年中** |\n| 2026 年財務 | 達成正向自由現金流（milestone）|\n\n## 法規驅動力\n\n| 法規 | 時程 | 要求 |\n|------|------|------|\n| **歐盟 GSR（一般安全法規）**| **2026 年 7 月全面上路** | 所有新車強制 ADDW（進階駕駛分心警示）|\n| **Euro NCAP 2026 更新** | 2026 | 加強「安全駕駛」+「事故避免」評估；五星需能偵測疲勞/分心/酒駕 |\n\n## 技術演進方向\n\n| 維度 | 舊階段 | 新趨勢（2026+）|\n|------|--------|--------------|\n| 感知範圍 | DMS（駕駛監控）| **全艙感知**（乘客 + 兒童 + 物件）|\n| 感測器需求 | 多攝影機 | **單/少數鏡頭 + AI 演算法**（降低成本/功耗）|\n| 商業模式 | 硬體銷售 | OTA 升級 → **持續性軟體收入** |\n| 個人化應用 | 無 | 依乘客情緒自動調整空調/音響/推薦音樂 |\n\n## 競爭態勢：AI 解析 > 硬體感測器數量\n\n台系智慧座艙業者分析：「全球技術競爭已由硬體感測器數量轉向 AI 解析能力」\n\n## 隱私課題\n\n全艙監控 → 生物特徵資料（表情/眼神/行為）→ 如何保護不被濫用？2027 年新世代車款上市後重要議題。\n\n## Related\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[entities/Hyundai]]（待補）"
    },

      "url": "https://www.business-standard.com/industry/news/govt-weighs-1-bn-aid-for-private-electric-buses-trucks-amid-energy-crisis-126052000087_1.html",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.business-standard.com/industry/news/govt-weighs-1-bn-aid-for-private-electric-buses-trucks-amid-energy-crisis-126052000087_1.html](https://www.business-standard.com/industry/news/govt-weighs-1-bn-aid-for-private-electric-buses-trucks-amid-energy-crisis-126052000087_1.html)\n\n# 印度研擬逾 $10 億美元激勵方案：加速私人電動巴士與電動卡車採購（2026-05）\n\n**原文**：ETAuto / Bloomberg（Business Standard）｜**發布**：2026-05-20\n\n## 核心提案\n\n印度政府正考慮推出**超過 $10 億美元**的激勵方案，刺激私部門採購電動巴士與電動卡車，主要原因是能源危機加劇。\n\n## 方案細節（草案）\n\n| 項目 | 內容 |\n|------|------|\n| 方案規模 | **> $10 億美元（> ₹8,500 億）** |\n| 執行期限 | **約 10 年** |\n| 主要目標 | 私人擁有的**城際巴士業者**（最大宗）|\n| 利息補貼 | 最高 **₹150 萬/輛**（~$17,500），隨時間遞減 |\n| 信用擔保 | 政府部分信用擔保，鼓勵銀行融資 |\n| 現況 | 預計月內與總理辦公室及業界開會確認細節；預算規模、適用車型、補貼結構尚待確認 |\n\n## 政策背景\n\n- 印度正面臨深化的**能源危機**，商業運輸對石油進口依賴度高\n- PM E-Drive 計畫（Batch 19）聚焦公共充電，此方案主攻**私人 ECV（電動商用車）**\n- 現行補助主要集中在政府採購電動巴士（PM e-Bus Sewa）；私人電動商用車市場仍被政策忽略\n\n## 市場意義\n\n印度電動商用車市場高度依賴政府採購驅動；若私部門激勵方案落地，將大幅擴大電動巴士與電動卡車的潛在市場規模，是繼 PM e-Bus Sewa 後的重要政策轉折。\n\n## Related\n- [[concepts/印度EV市場]]\n- [[concepts/電動巴士市場]]\n- [[concepts/電動卡車市場]]\n- [[sources/india-pm-edrive-charging-2026]]"
    },
    "india-2w-market-fy27-bifurcation-2026": {
      "title": "印度二輪車市場 FY27 展望：踏板車 vs 機車需求分化（2026-05）",
      "url": "https://www.whalesbook.com/news/English/auto/Indias-Two-Wheeler-Market-Demand-Bifurcation-and-Export-Surge-to-Drive-FY27/69942d78cffb93b3e927de7f",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.whalesbook.com/news/English/auto/Indias-Two-Wheeler-Market-Demand-Bifurcation-and-Export-Surge-to-Drive-FY27/69942d78cffb93b3e927de7f](https://www.whalesbook.com/news/English/auto/Indias-Two-Wheeler-Market-Demand-Bifurcation-and-Export-Surge-to-Drive-FY27/69942d78cffb93b3e927de7f)\n\n# 印度二輪車市場 FY27 展望：踏板車 vs 機車需求分化（2026-05）\n\n**原文**：Whalesbook Auto Desk（Crisil Ratings 分析）｜**發布**：2026-05\n\n## 核心預測（Crisil Ratings）\n\n| 指標 | FY27 預測 |\n|------|----------|\n| 總銷量成長 | **+7–9%**（超越 2,900 萬輛門檻）|\n| 行業營收成長 | **+10–12%** |\n| 營業利潤率 | 約 **16%**（持平，即使原物料成本偏高）|\n\n## 關鍵分化：踏板車 vs 機車\n\n| 細分市場 | FY27 成長預測 | 驅動力 |\n|---------|-------------|--------|\n| **踏板車（含電動）** | **雙位數（Double-digit）**| 都市通勤需求 + 女性騎士增加 + 最後一哩路需求 |\n| **機車** | **中個位數（Mid-single-digit）**| 農村需求穩健但較慢 |\n| **電動二輪車（E2W）** | **+16–18%** | 政府激勵 + 科技升級 |\n| 150–350cc 高端機車 | 佔比 23% → **25%** | 消費升級 |\n| 125cc 以下入門機車 | 仍主導（73% 佔比）| 成長趨緩 |\n\n## 出口展望\n\n- 出口占行業銷量 **~20%**\n- FY27 出口成長：**中高雙位數（Mid-to-high teen %）**\n- 主要出口市場：拉丁美洲、非洲、南亞\n\n## E2W 挑戰\n\n- 新玩家（Ather 等）仍面臨**弱單車經濟性**（車輛層面獲利薄）\n- 傳統製造商（Hero MotoCorp、Bajaj、TVS）受保護較多\n- 電池成本下滑速度放緩 + 補貼縮減 → EV 與 ICE 價差收窄壓力\n\n## 關聯：Ather EL 平台的意義\n\nAther 的 EL 平台正是瞄準踏板車市場（E2W 主力）的「雙位數成長」段，以 FY26 市占 8%→18.6% 的成績証明了這個市場的規模。參見：[[sources/ather-energy-el-platform-2026]]\n\n## Related\n- [[concepts/印度EV市場]]\n- [[sources/ather-energy-el-platform-2026]]"
    },
    "india-electric-bus-market-2025": {
      "title": "India Electric Bus Market 2025",
      "url": "https://www.sustainable-bus.com/news/india-2025-electric-bus-market/",
      "updated": "2026-05-26",
      "body": "# India Electric Bus Market 2025\n\n**來源**：[India electric bus market reaches 4,441 units (+19%), with Switch up six-fold while Tata declines 84%](https://www.sustainable-bus.com/news/india-2025-electric-bus-market/) — Sustainable Bus，2026-03-17  \n**數據來源**：Vahan Dashboard 官方登記資料\n\n---\n\n## 市場概況\n\n| 指標 | 2024 | 2025 | YoY |\n|------|------|------|-----|\n| 電動巴士登記量 | 3,730 輛 | **4,441 輛** | **+19%（+711 輛）** |\n\n整體市場穩健成長，但內部格局劇烈重組：前大廠 Tata Motors 崩跌、新興廠商 Switch Mobility 爆發。\n\n---\n\n## 品牌市占詳細數據\n\n| 品牌 | 2024 | 2025 | 增減 | 市占（2024→2025）|\n|------|------|------|------|-----------------|\n| **PMI Electro Mobility** | 534 | **1,041** | +507（+95%）| 14.3% → **23.4%** |\n| **Olectra Greentech** | 663 | **990** | +327 | 17.8% → **22.3%** |\n| **Switch Mobility** | 136 | **950** | +814（**+599%**）| 3.6% → **~21%** |\n| **JBM Auto** | 556 | **698** | +142 | 15.0% → **15.7%** |\n| **Pinnacle Mobility Solutions** | 99 | **310** | +211 | 2.7% → **7.0%** |\n| **Tata Motors** | 1,462 | **223** | -1,239（**-84%**）| 39.2% → **5.0%** |\n\n---\n\n## 重大變局解讀\n\n### Switch Mobility：德里 950 輛訂單帶動爆發\n\n- Switch Mobility（Hinduja 集團旗下 EV 部門）2025 年承接**德里政府 950 輛 EiV12 低地板電動巴士**訂單\n- 2025 年 9 月開始批量交付；至 12 月單月市占高達 **30.8%**，成為當月銷量冠軍\n- EiV12 規格：423kWh LFP，300km+ 續航，235kW 永磁同步馬達，45 座\n- 印度 H1 2025 Switch 登記量已達 ~840 輛，為全年強勁前半段\n\n### Tata Motors：PM E-DRIVE 標案落標是主因\n\nTata 從 2024 年龍頭（39.2%）跌至 2025 年末段（5%），根本原因不是競爭力退步，而是**標案結構性失利**：\n\n- **PM E-DRIVE 超大標（10,900 輛）**：印度史上最大電動巴士標案，Tata 完全落標\n  - PMI Electro：**5,210 輛**（~48%）\n  - EKA Mobility：**3,485 輛**（~32%）\n  - Olectra：**1,785 輛**（~16%）\n  - 傳統廠商（Tata、JBM Auto、VE Commercial Vehicles）**未獲任何配額**\n- **定價策略差異**：Tata 採「將營運風險納入出價」的保守策略，加計利率風險/資產折舊/服務成本；新興廠商（PMI、Switch、EKA）以激進低價得標\n- **舊合約尾段**：2025 年 223 輛主要為 FAME II / CESL 舊合約最後一批交付\n- 部分激進出價廠商已面臨財務壓力重新評估定價策略（但 2025 登記數尚未反映）\n\n### PMI Electro：PM E-DRIVE + KKR 資金加持\n\n- PM E-DRIVE 拿下 5,210 輛（全標案 ~48%），預計 2026~2027 年為主要交付期\n- KKR 注資 PMI Electro + 子公司 Allfleet **最高 $3.1 億美元**\n- Allfleet 以長期特許經營協議（concession）模式部署車隊，非單次銷售\n\n---\n\n## 前瞻：2026~2027 競局預測\n\n| 廠商 | PM E-DRIVE 配額 | 預期影響 |\n|------|----------------|---------|\n| PMI Electro | 5,210 輛 | 未來 2 年持續出貨，市占料維持 25%+ |\n| EKA Mobility | 3,485 輛 | 2025 尚未大量出貨，2026 起爆量 |\n| Olectra | 1,785 輛 | 穩健維持 |\n| Tata / JBM | 0 | 需靠邦政府零散標案支撐 |\n\n---\n\n## Related\n- [[concepts/印度EV市場]]\n- [[concepts/電動巴士市場]]\n- [[syntheses/電動巴士產業全景]]\n- [[sources/electric-bus-market-2025-global]]\n- [[sources/india-ev-commercial-update-2026]]\n- [[sources/india-1bn-ev-commercial-incentives-2026]]"
    },
    "india-ev-april-2026": {
      "title": "印度 EV 2026 年 4 月：史上第二高月銷量",
      "url": "https://auto.economictimes.indiatimes.com",
      "updated": "2026-05-05",
      "body": "**來源**：[https://auto.economictimes.indiatimes.com](https://auto.economictimes.indiatimes.com)\n\n# 印度 EV 2026 年 4 月：史上第二高月銷量\n\n**原文**：ETAuto / Economic Times Auto｜**發布**：2026-05-04\n\n## 摘要\n印度電動乘用車 4 月 2026 年銷售 23,163 輛，為史上第二高月銷量（僅次 3 月的 23,749 輛），淡季不淡，年增 73%。\n\n## 品牌市占（2026 年 4 月）\n\n| 品牌 | 銷量 | YoY | 市占 |\n|------|------|-----|------|\n| **Tata Motors** | 8,506 輛 | +77% | **37%** |\n| **Mahindra** | 5,394 輛 | +63% | **24%** |\n| **JSW MG Motor India** | 4,978 輛 | +32% | **22%** |\n| **VinFast** | 1,231 輛 | — | — |\n\n- Mahindra 連續第二個月超越 JSW MG 成為第二名\n- VinFast：首次單月突破 1,000 輛（自 2025 年 10 月開始交車以來）\n\n## 市場解讀\n\n- 傳統淡季（FY 新年度開始）不見降溫，顯示消費動能持續\n- 中端市場（₹20-30 萬）持續領跑，入門段萎縮\n- 17 家電動 SUV/MPV 製造商合計年增 73%\n\n## 背景（FY2026 全年）\n- 全年 245 萬輛（+25%）\n- 乘用 EV：199,923 輛（+83.6%）\n- 參見：[[sources/india-ev-fy2026-record]]\n\n## Related\n- [[concepts/地理市場/印度EV市場]]\n- [[entities/VinFast]]"

    "india-ev-commercial-update-2026": {
      "title": "印度 EV 商用車市場近況（2026-04）：城際電動巴士、電動三輪車 JDA、新進入者",
      "url": "https://www.electrive.com/2026/04/18/india-switch-mobility-to-deploy-25-electric-intercity-coaches",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.electrive.com/2026/04/18/india-switch-mobility-to-deploy-25-electric-intercity-coaches](https://www.electrive.com/2026/04/18/india-switch-mobility-to-deploy-25-electric-intercity-coaches)\n\n# 印度 EV 商用車市場近況（2026-04）：城際電動巴士、電動三輪車 JDA、新進入者\n\n**原文**：electrive.com、ETAuto ｜ **發布**：2026-04-16~21\n\n## 摘要（三篇合併 + 台灣電動巴士）\n\n印度電動商用車市場在政策驅動下持續擴大：Switch Mobility 開拓城際客運新路線（孟買—浦那），現代 × TVS Motor 合作電動三輪車，SML Isuzu（前 SML Mahindra）宣布 FY27 進入電動巴士市場。另附：台灣日月潭電動觀光巴士正式啟動。\n\n---\n\n## 一、Switch Mobility：首批城際電動巴士孟買—浦那（2026-04-18）\n\n| 項目 | 細節 |\n|------|------|\n| 客戶 | Purple Bus（Prasanna Purple Mobility Solutions）|\n| 路線 | **孟買—浦那**（Maharashtra 主要走廊）|\n| 訂單量 | 25 輛（首批 10 輛已交付）|\n| 意義 | Switch Mobility 首次為**私人公司**完成城際電動巴士委託 |\n| 車型 | EiV12（12 公尺），城際版 |\n\n### EiV12 城際版規格\n| 規格 | 數值 |\n|------|------|\n| 電機 | 235 kW 永磁同步馬達 |\n| 電池 | **423 kWh LFP**，CCS2 雙槍充電 |\n| 最高速度 | 80 km/h |\n| 續航 | >300 km/次 |\n| 充電時間 | 2～3 小時 |\n| 座位 | 45 個後傾座椅 |\n\n- Switch Mobility 已累計部署：2,500+ 電動巴士 + 2,500+ 電動輕型商用車\n\n---\n\n## 二、現代汽車 × TVS Motor：電動三輪車 JDA（2026-04-21）\n\n- 現代 + TVS Motor 簽署**聯合開發協議（JDA）**\n- 目標：針對印度「最後一哩路」的電動三輪車（E3W）解決方案\n- 在印度協作生產，同時探索全球出口機會\n- 背景：印度 2026 年延長電動二/三輪車補貼\n\n---\n\n## 三、SML Isuzu（前 SML Mahindra）：FY27 進入電動巴士市場\n\n- 宣布 FY2027 進入電動巴士市場，但依商業回報評估是否參與政府標案\n- 加入現有競爭者：Tata Motors、Olectra、Switch Mobility、PMI Electro\n- 背景：印度 PM e-Bus Sewa 計畫（大規模政府採購）\n\n---\n\n## 附：台灣日月潭電動觀光巴士（2026-04-16）\n\n- 台灣好行日月潭環湖線電動巴士正式啟動\n- 串聯水社、玄光寺、慈恩塔、伊達邵、文武廟等景點\n- 首次採用全電動車，符合低碳旅遊目標\n- 整合無障礙數位服務（通過無障礙檢測）\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/地理市場/印度EV市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/electric-bus-market-2025-global]]\n- [[sources/vinfast-india-investment]]"

    "india-ev-fy2026-record": {
      "title": "印度 FY2026 EV 創紀錄：245 萬輛 +25%，中端市場大爆發",
      "url": "https://auto.economictimes.indiatimes.com",
      "updated": "2026-04-27",
      "body": "**來源**：[https://auto.economictimes.indiatimes.com](https://auto.economictimes.indiatimes.com)\n\n# 印度 FY2026 EV 創紀錄：245 萬輛 +25%，中端市場大爆發\n\n**原文**：ETAuto / Economic Times Auto｜**發布**：2026-04-27\n\n## 摘要\n印度 FY2026（2025-04 ~ 2026-03）EV 銷量突破 245 萬輛（+25% YoY），乘用電動車單年成長 83.6%。最關鍵轉型：**₹20~30 萬盧比中端市場**占比從 24% 飆升至 35.7%，低端市場相對萎縮，顯示市場成熟度大幅提升。\n\n## 全市場概況\n\n| 指標 | FY2025 | FY2026 | YoY |\n|------|--------|--------|-----|\n| 總 EV 零售量 | 197 萬輛 | **245 萬輛** | **+25%** |\n| 電動乘用車 | 108,873 輛 | **199,923 輛** | **+83.6%** |\n| 電動二輪車 | — | **140 萬輛** | 佔總 EV 57% |\n\n## 價格區間分布轉型（EV 乘用車）\n\n| 價格段 | FY2024 | FY2025 | FY2026 |\n|-------|--------|--------|--------|\n| ₹20~30 萬中端 | 8.6% | 24% | **35.7%（↑↑）** |\n| 低端 | 多 | 少 | 更少（相對萎縮）|\n\n→ **市場從補貼驅動的廉價車轉向消費者主動升級的中端車**\n\n## 主要品牌表現\n\n| 品牌 | FY2026 銷量 | YoY |\n|------|-----------|-----|\n| **Tata Motors** | **78,811 輛**（市場龍頭）| +35.9% |\n| **Hyundai Motor India** | 5,885 輛 | **+137.59%** |\n| **Kia India** | 3,738 輛 | **+794.26%**（基期低）|\n\n## 展望\n\n- 未來 18~20 個月有更多新車型進入市場（Mercedes-Benz India 主管）\n- 消費者信心增強 + 充電基礎建設改善 + 車款選擇擴大 = 加速成長動能\n\n## 與此前數據的對比\n\n本次數據為 FY2026 全年（乘用車）。早前 Batch 10 `india-ev-commercial-update-2026` 覆蓋電動巴士（H1 2025 數據）和城際客運。本篇為更全面的乘用車+二輪市場全年快照。\n\n## Related\n- [[concepts/地理市場/印度EV市場]]\n- [[entities/塔塔汽車]]（待補）\n- [[sources/india-ev-commercial-update-2026]]\n- [[sources/tesla-india-model-y-l]]"

      "url": "https://www.electrive.com/2026/05/13/india-approves-nearly-4900-ev-chargers-under-pm-e-drive-scheme",
      "updated": "2026-05-13",
      "body": "**來源**：[https://www.electrive.com/2026/05/13/india-approves-nearly-4900-ev-chargers-under-pm-e-drive-scheme](https://www.electrive.com/2026/05/13/india-approves-nearly-4900-ev-chargers-under-pm-e-drive-scheme)\n\n# 印度 PM E-Drive：批准 4,874 個公共 EV 充電樁（2026-05）\n\n**原文**：Electrive | Carla Westerheide｜**發布**：2026-05-13\n**宣布地點**：班加羅爾 EV 充電基礎建設研討會\n\n## 核心批准內容\n\n| 項目 | 數值 |\n|------|------|\n| 批准充電樁數量 | **4,874 個公共 EV 充電樁** |\n| 獲批資金 | ₹503.86 億（**~€4,400 萬**）|\n| 執行機構 | 公共石油行銷公司（HPCL、IOCL、BPCL）+ 多個邦政府 |\n| 涵蓋邦 | 拉賈斯坦邦、安得拉邦、北方邦、古吉拉特邦、喀拉拉邦、特倫甘納邦、卡納塔克邦、泰米爾納德邦 |\n\n## PM E-Drive 計畫全貌\n\n| 項目 | 數值 |\n|------|------|\n| 充電基礎建設總預算 | ₹2,000 億（**~€1.8 億**）|\n| 最終目標充電樁數量 | **72,000+ 個**（全國公共充電） |\n\n## 數位整合平台\n\n**Unified Bharat eCharge**：\n- 統一數位平台，讓用戶跨不同充電網絡定位樁、取得服務、完成支付\n- 解決印度充電生態系碎片化問題（目前各網絡各自為政）\n\n## 印度現有充電基礎\n\n| 指標 | 數值（截至 2026 年 3 月）|\n|------|----------------------|\n| 已安裝 EV 充電樁 | **27,737 個**（非全部運作中）|\n| FAME-II 計畫安裝 | 8,932 個 |\n\n## 相關政策框架\n\n| 計畫 | 規模 |\n|------|------|\n| PLI（先進化學電池）| ₹18,100 億（~€16 億）|\n| PLI-Auto（EV + 零組件）| ₹25,938 億（~€23 億）|\n| 稀土永磁體計畫 | 新推出 |\n\n## Related\n- [[concepts/印度EV市場]]\n- [[concepts/充電基礎建設]]\n- [[sources/india-ev-april-2026]]\n- [[sources/india-tata-jsw-battery-rd-2026]]"

    "india-tata-jsw-battery-rd-2026": {
      "title": "印度 Tata、JSW 合計投資逾 10 億美元建立 EV 電池研發中心（2026-05）",
      "url": "https://www.automotiveworld.com/news/bloomberg-tata-and-jsw-invest-us1bn-in-india-ev-lfp-tech",
      "updated": "2026-05-12",
      "body": "**來源**：[https://www.automotiveworld.com/news/bloomberg-tata-and-jsw-invest-us1bn-in-india-ev-lfp-tech](https://www.automotiveworld.com/news/bloomberg-tata-and-jsw-invest-us1bn-in-india-ev-lfp-tech)\n\n# 印度 Tata、JSW 合計投資逾 10 億美元建立 EV 電池研發中心（2026-05）\n\n**原文**：Bloomberg / Automotive World｜**發布**：2026-05-11\n\n## 核心事件\n\n印度兩大集團 Tata 與 JSW 合計投資近 **10 億美元**在印度建立電池技術研發中心，目標是降低對中國電池技術的依賴並建立本土 IP。\n\n## Tata 集團 — Agratas\n\n| 項目 | 細節 |\n|------|------|\n| 子公司 | **Agratas**（Tata 電池部門）|\n| 投資地點 | 班加羅爾（Bengaluru）|\n| 投資規模 | **逾 4 億美元** |\n| 電池化學 | **LFP + LMFP**（磷酸鐵鋰 + 磷酸錳鐵鋰）|\n| 用途 | 建構本土 IP + 支援古吉拉特邦超級工廠 |\n\n## JSW 集團 — JSW Motors\n\n| 項目 | 細節 |\n|------|------|\n| 投資地點 | 馬哈拉施特拉邦（Maharashtra）|\n| 投資規模 | **至少 5 億美元**（5–6 年期間）|\n| 研發重點 | 本土化車輛開發、專屬軟體與聯網功能、SDV 相關技術 |\n\n## 戰略背景\n\n- 兩集團目前均從**中國供應商**採購關鍵電池零件\n- 中國正逐步收緊電池技術出口管制\n- 目標：在北京進一步限制技術轉移前建立**替代方案**\n- 體現印度「China+1」電池供應鏈戰略\n\n## Related\n- [[concepts/地理市場/印度EV市場]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[sources/tata-agratas-battery-somerset]]\n- [[entities/Tata Motors]]"
    },

      "title": "歐美超充里程碑：Ionity 1,000kW 擴展 + ChargePoint 600kW 首款 DC 樁",
      "url": "https://www.electrive.com/2026/04/21/we-always-aim-to-offer-the-fastest-and-latest-technology-ionity-cso-meta-kessler",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.electrive.com/2026/04/21/we-always-aim-to-offer-the-fastest-and-latest-technology-ionity-cso-meta-kessler](https://www.electrive.com/2026/04/21/we-always-aim-to-offer-the-fastest-and-latest-technology-ionity-cso-meta-kessler)\n\n# 歐美超充里程碑：Ionity 1,000kW 擴展 + ChargePoint 600kW 首款 DC 樁\n\n**原文**：electrive.com ｜ **發布**：2026-04-21~22\n\n## Ionity：1,000kW 樁入網，2030 年城市佔比 30%\n\n**採訪對象**：Meta Kessler，Ionity 策略與轉型總監\n\n| 指標 | 細節 |\n|------|------|\n| 最新充電功率 | **1,000 kW**（HYC1000，Alpitronic 製造）|\n| 首座 1,000kW 站 | 法國 Route du Soleil |\n| 2030 城市佔比目標 | **~30%**（約 490 個城市站 / 總 1,300 站）|\n| 每站最低充電點 | **6 個**（城市站標準）|\n\n- 動態功率分配：多輛車同時充電，高需求車輛優先分配，低速車輛釋放資源\n- 城市擴展：已與 L'Osteria（德國+奧地利 15 站）合作，北萊茵-威斯特法倫州 3 個新城市站\n- 定位：「永遠提供最快最新技術」\n\n## ChargePoint Express Solo：美國公司首款 DC 充電樁，600kW 歐洲登陸\n\n| 指標 | 細節 |\n|------|------|\n| 產品名稱 | Express Solo |\n| 峰值功率 | **600 kW**（單點）|\n| 充電口 | 2 條充電線纜（雙槍）|\n| 市場定位 | 「全球最快獨立 EV 充電樁」|\n| 架構 | 全新 Express DC 快充架構（ChargePoint 首款 DC 產品）|\n| 雙向充電 | 與 **Eaton** 合作，支援 V2G + 電池儲能整合 |\n| 歐洲 | **ChargePoint 首款在歐洲銷售的 DC 充電產品** |\n\n## 意義\n- Ionity 1,000kW：高速公路超充戰場已進入 MW 等級\n- ChargePoint 600kW：美國充電網路龍頭首次在歐洲推出 DC 產品，且整合 V2G\n- 競合格局：Tesla Supercharger V4（250kW）、EVALUE 640kW（台灣）、ChargePoint 600kW、Ionity 1000kW\n\n## Related\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/v2g-commercial-expansion-2026]]\n- [[sources/taiwan-evalue-640kw-charger]]"

    "ira-supply-chain-compliance": {
      "title": "IRA 合規壓力：載世能源拆分、LG Chem 引豐田通商降低中資",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751541&grid_seq1=&grid_seq2=",
      "updated": "2026-04-09",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751541&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751541&grid_seq1=&grid_seq2=)\n\n# IRA 合規壓力：載世能源拆分、LG Chem 引豐田通商降低中資\n\n**原文**：DIGITIMES／蔡云瑄｜**發布**：2026-04-09\n\n## 摘要\n美國 IRA「禁止外國實體（PFE）」條款迫使韓國正極材料供應鏈重組，載世能源拆分法人降低中資、LG Chem 引入豐田通商取代中資股東。\n\n## IRA PFE 規則\n- **目標**：限制受「疑慮國家」（主要為中國）政府實質控制的企業\n- **2026 年限制**：核心素材中 PFE 比例上限 40%\n- **2030 年目標**：降至 15%\n- 正極材料佔電池成本 40% 以上，必須率先合規\n\n## 載世能源（JS Energy）案例\n- 背景：韓國正極材料廠，中國容百科技為大股東\n- 動作：拆分為「載世科技」（非北美市場）+ 「載世能源」（北美市場）\n- 進行中：將容百科技持股稀釋至 25% 以下\n- 供應鏈：忠州廠 → Panasonic & LGES → Tesla（北美終端）\n\n## LG Chem 案例\n- 原股東：LG Chem 51%、華友鈷業子公司 B&M 49%\n- 調整後：LG Chem 51%、**豐田通商 25%**、B&M 24%\n- 意義：日本豐田通商成為降低中資的工具，確保 IRA 合規\n\n## 載世能源產能規模\n| 廠 | 竣工年 | 規模 |\n|----|--------|------|\n| 1 廠 | 2022 | 7,740 噸 |\n| 2 廠 | 2023 | 16,284 噸 |\n| 3 廠 | 2025 底 | 50,000 噸 |\n| 合計 | — | >70,000 噸 |\n\n## Related\n- [[entities/豐田]]\n- [[entities/寧德時代]]\n- [[concepts/地理市場/北美EV關稅與政策]]\n- [[concepts/電池與技術/電池技術路線]]"
    },
    "isuzu-hydrogen-truck-delay": {
      "title": "日本加氫站嚴重落後，五十鈴 Giga Fuel Cell 上市延後至 2030 年",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751952",
      "updated": "2026-04-14",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751952](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751952)\n\n# 日本加氫站嚴重落後，五十鈴 Giga Fuel Cell 上市延後至 2030 年\n\n**原文**：DIGITIMES／范仁志｜**發布**：2026-04-14\n\n## 摘要\n日本加氫站實際建設量僅約 150 座（目標 2025 年達 320 座），嚴重落後導致五十鈴（Isuzu）× 本田合作開發的 25 噸氫燃料大貨車 Giga Fuel Cell 上市時間從 2027 年延後至 **2030 年**。\n\n## 加氫站現況（日本）\n\n| 目標 | 實際 |\n|------|------|\n| 2025 年目標：320 座 | 實際：**約 150 座**（嚴重落後）|\n| 2030 年目標：1,000 座 | 待觀察 |\n| 地理分布 | 主要集中東京鄰近地區 |\n| 營業時間 | 約 7 成在下午 5 時歇業（不符合物流需求）|\n\n## 延後原因（三重障礙）\n1. **加氫站不足**：僅 20 座適合 Giga Fuel Cell 加氫，且物流業對營業時間不滿\n2. **車體設計問題**：2023~2025 公路測試顯示燃料電池模組體積重量偏高、貨艙強度不足，需重新研發\n3. **本田戰略調整**：本田 BEV 策略失利（FY2025 預估虧損 ¥6,900 億），短期難大舉投資氫燃料技術\n\n## 競爭對手\n- **日野汽車 Profia Z FCV**：規格相當的氫燃料大貨車，已於 **2025 年 10 月**量產發售（先於五十鈴）\n\n## Giga Fuel Cell 基本資訊\n- **合作**：五十鈴 × 本田（2020 年宣布合作）\n- **車型**：25 噸大型氫能源貨車\n- **原訂上市**：2027 年\n- **新上市時程**：**2030 年**\n\n## Related\n- [[concepts/電池與技術/氫燃料電池商用車]]\n- [[entities/本田]]\n- [[concepts/車輛類型/電動商用車]]"
    },
    "isuzu-toyota-fcv-light-truck": {
      "title": "五十鈴 × 豐田：日本首款量產氫燃料電池小卡車，2027 年度啟動",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752242",
      "updated": "2026-04-17",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752242](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752242)\n\n# 五十鈴 × 豐田：日本首款量產氫燃料電池小卡車，2027 年度啟動\n\n**原文**：DIGITIMES／江仁傑 ｜ **發布**：2026-04-17\n\n## 摘要\n五十鈴汽車與豐田汽車宣布合作，以五十鈴 ELF EV（純電小卡）為基礎車型，搭載豐田第三代氫燃料電池系統（FC 系統），2027 年度（2027/4～2028/3）啟動日本首次量產化氫燃料電池小型貨車。\n\n## 關鍵事實\n\n| 項目 | 細節 |\n|------|------|\n| 合作雙方 | 五十鈴 + 豐田 |\n| 基礎車型 | 五十鈴 ELF EV（BEV 小型貨車）|\n| 燃料電池系統 | 豐田第三代 FC 系統（新開發）|\n| 量產時程 | **2027 年度**（2027/4～2028/3）|\n| 日本意義 | **日本首款量產 FCV 小型貨車** |\n| 合作平台 | CJPT（商業日本夥伴技術，2021 年成立，含五十鈴/豐田/日野）|\n\n## 應用場景：最後一哩物流\n\n- 目標：超市、便利商店的冷藏/冷凍物流配送\n- 特點：單日多次配送 + 長時間行駛 → 需短時間補能 → 氫燃料優勢\n- 對比純電：充電時間長，不適合高頻配送作業\n\n## 成本壓低策略\n- **五十鈴**：車輛結構優化 + 製造流程重組\n- **豐田**：燃料電池電堆設計創新 + 製造技術革新\n\n## 大型 FCV 卡車的對比\n- 五十鈴大型 FCV 卡車：原計畫 2027 年，已宣布**延後**（本田 FC 系統，加氫站不足）\n- 策略轉向：先以小型卡車建立生態系，等大型卡車加氫站完善後再推進\n\n## Related\n- [[entities/豐田]]\n- [[entities/本田]]\n- [[concepts/電池與技術/氫燃料電池商用車]]\n- [[concepts/車輛類型/電動商用車]]\n- [[sources/toyota-daimler-volvo-hydrogen-truck]]\n- [[sources/isuzu-hydrogen-truck-delay]]"
    },
    "japan-2030-autonomous-ai-strategy": {
      "title": "日本「預算不設限」公布 2030 經濟成長藍圖：自駕車 25% 全球市佔、垂直 AI 15%",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752504",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752504](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752504)\n\n# 日本「預算不設限」公布 2030 經濟成長藍圖：自駕車 25% 全球市佔、垂直 AI 15%\n\n**原文**：DIGITIMES／范仁志 ｜ **發布**：2026-04-21\n\n## 摘要\n日本成長戰略會議 2026 年 4 月 16 日補充公布 34 項產品技術目標，核心戰略是「預算不設限，讓專家自由提案」，目標 2030 年代在自駕車取得 25% 全球市佔，垂直 AI（Vertical AI）達到 15% 市佔（約 5 兆日圓），並大幅提升海底光纜市佔。\n\n## 關鍵目標（2030 年代）\n\n| 技術 / 產業 | 2030 目標 | 備註 |\n|------------|-----------|------|\n| **自動駕駛車** | **全球市佔 25%** | 與現在日本汽車全球市佔相當 |\n| **垂直 AI** | **全球市佔 15%**，約 5 兆日圓（$310 億）| 針對專業領域特化 |\n| 海底光纜 | 全球市佔 20% → **35%** | — |\n| 動畫海外營收 | 2033 年達 **6 兆日圓** | 文化輸出目標 |\n| 食品加工設備 | 2040 年全球營收 **3 兆日圓** | — |\n\n## 戰略背景\n\n- **「預算不設限」**：史無前例，先讓專家自由提案，夏季再確定投資規模\n- 官防副長官尾崎正直：與過去成長策略最大差異 = 先不設預算上限\n- 動機：AI + 自駕車領域，美中明顯領先日本 → 不省錢的追趕\n- 具體投資內容包括技術研發 + 支援體系（如海底光纜鋪設船）\n\n## 自動駕駛 25% 市佔的意涵\n- 現在日本汽車全球市佔約 25%（豐田、本田、日產等合計）\n- 目標：未來自駕車市場也維持同等的市佔，防止被 Tesla / Waymo / 中國廠商侵蝕\n- 日本在 L4 自駕上落後，Waymo 等美國廠商、文遠知行等中國廠商均更積極\n\n## 垂直 AI 的定位\n- 不走 ChatGPT 式通用 AI，走**特定領域深度特化**的垂直 AI\n- 切入點：製造、醫療、農業、物流等日本傳統強項\n\n## Related\n- [[entities/豐田]]\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/電池與技術/自動駕駛安全監管]]"
    },

      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751987",
      "updated": "2026-04-14",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751987](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751987)\n\n# 長電科技 CEO：機器人是半導體下一波成長引擎\n\n**原文**：DIGITIMES／謝昇輝｜**發布**：2026-04-14\n\n## 摘要\n中國最大封測廠長電科技（JCET）CEO 鄭力指出，具身智慧（人形機器人）與汽車電子的技術路線高度重疊，機器人將成為繼 AI/HPC 之後的下一波半導體需求增量，長電在車規級製造能力上具有延伸優勢。\n\n## 機器人 × 汽車電子的技術交匯\n\n| 面向 | 說明 |\n|------|------|\n| 核心架構相似 | 感知→融合→決策→控制（兩者共通）|\n| 依賴技術 | 多感測器融合、異質運算平台、穩定電源與高速連接 |\n| 安全要求 | 機器人需明確安全邊界，複雜度甚至高於消費電子 |\n| 晶片規格 | 機器人核心晶片更接近車規等級（非消費電子規格）|\n\n## 長電科技的技術布局\n\n### 三大技術方向\n1. 高密度互連與大尺寸系統整合\n2. 面向 Chiplet 架構的協同設計\n3. 熱管理與可靠度工程提升\n\n### 前沿技術\n- 多維異質整合（Heterogeneous Integration）\n- 超高密度重佈線（RDL）\n- 玻璃基板（Glass Substrate）\n- 光電合封裝（CPO，Co-Packaged Optics）\n\n## 半導體市場展望（2026）\n\n成長驅動力（多元化）：\n- AI 訓練與推論、HPC、高頻寬記憶體（算力基礎設施）\n- 汽車智慧化\n- 高速網通\n- 機器人與邊緣智慧（**新興增量**）\n\n## Related\n- [[concepts/基礎設施與供應鏈/車用半導體供應鏈]]\n- [[concepts/電池與技術/ADAS智駕系統]]"

    "jpmorgan-china-ev-europe-2028": {
      "title": "摩根大通：中國品牌 2028 年拿下西歐 20% 市占（2026-05）",
      "url": "https://www.ctwant.com/article/480699",
      "updated": "2026-05-13",
      "body": "**來源**：[https://www.ctwant.com/article/480699](https://www.ctwant.com/article/480699)\n\n# 摩根大通：中國品牌 2028 年拿下西歐 20% 市占（2026-05）\n\n**原文**：CTWANT｜**發布**：2026-05-13\n**報告作者**：摩根大通亞太汽車研究主管 Nick Lai\n\n## 核心預測\n\n| 指標 | 原預估 | 新預估 |\n|------|-------|-------|\n| 西歐市占目標時間 | 2030 年 15% | **2028 年 20%** |\n| 2028 年出貨量（德義法英四大市場）| — | **~250 萬輛**（+150% vs 2025 年 ~100 萬輛）|\n| 西歐 EV+PHEV 滲透率預測 | 2025 年 29% | 2026 年 **34%** |\n\n注：「中國品牌」包含從中國出口及在歐洲在地生產車輛（如零跑西班牙工廠）\n\n## 成本競爭力：為何即使有關稅仍能獲利\n\n| 成本 | 數值 |\n|------|------|\n| 歐盟對中國 BEV 關稅 | 30% |\n| 歐盟對中國 PHEV 關稅 | 10% |\n| 含海運費 + 當地經銷獎勵後仍能獲利 | **是** |\n| 中國市場單車淨利 | ~人民幣 5,000 元 |\n| 海外市場單車淨利 | ~人民幣 **20,000 元**（**4 倍**）|\n\n→ 出口至歐洲即使加關稅，仍比中國內銷賺更多\n\n## 產品競爭力\n\n中國品牌的差異化優勢：\n- 更完整的產品線（各價位 SUV 全覆蓋）\n- 初階自動駕駛標配\n- 數位化座艙 + 大型螢幕\n- 差異化配備（如車載冰箱）\n\n## 市場結構：零和賽局\n\n- 中國品牌擴張**主要侵蝕第二梯隊外資競爭對手**（非 Toyota、賓士等頂尖品牌）\n- 歐洲、亞洲、拉美均為主要失血市場\n\n## 2026 年海外比重預估\n\n| 中國車廠 | 海外收入占比（2025）| 海外收入占比（2026 預估）|\n|---------|---------|---------|\n| 部分車廠 | 15–30% | **30–60%** |\n\n高油價（美伊衝突後布蘭特油價 +40%+）加速歐洲消費者轉向電動車\n\n## 近期進展（佐證）\n\n- 零跑 × Stellantis：西班牙 Opel 廠新增零跑產線\n- 零跑慕尼黑首個海外研發中心成立\n- McKinsey：2030 年前最多 5 家中國車廠可能躋身全球前十（比亞迪、吉利 2025 年已入榜）\n\n## Related\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[entities/比亞迪]]\n- [[entities/零跑汽車]]\n- [[sources/china-ev-europe-challenges-2026]]"

    "kia-ev2-first-drive-2026": {
      "title": "Kia EV2 首駕評測：令人意外成熟的 B 段入門純電",
      "url": "https://www.electrive.com/2026/05/21/first-drive-in-the-kia-ev2-compact-ev-with-a-surprisingly-mature-setup",
      "updated": "2026-05-22",
      "body": "**來源**：[https://www.electrive.com/2026/05/21/first-drive-in-the-kia-ev2-compact-ev-with-a-surprisingly-mature-setup](https://www.electrive.com/2026/05/21/first-drive-in-the-kia-ev2-compact-ev-with-a-surprisingly-mature-setup)\n\n# Kia EV2 首駕評測：令人意外成熟的 B 段入門純電\n\n**原文**：electrive.com，2026-05-21\n**作者**：Daniel Bönnighausen\n\n## 摘要\n\n起亞（Kia）最小純電車 EV2 在德國開始交付，首駕評測印象正面——舒適性與配置水準超乎預期，但部分關鍵 EV 功能（導航充電規劃、熱泵、22 kW 車載充電器）需升級高配才有。\n\n## 關鍵規格\n\n| 規格 | EV2 Earth（測試版）|\n|------|-----------------|\n| 車長 | **4.06 m**（B 段）|\n| 電池 | **42.2 kWh LFP**（入門版）|\n| 大電池版 | 61 kWh NMC（7 月起）|\n| 輸出 | 108 kW / 250 Nm |\n| 0-100 km/h | 8.7 秒 |\n| WLTP 續航 | **317 km**（42.2 kWh）；453 km（61 kWh）|\n| DC 快充 | **118 kW** |\n| 10→80% | **29 分鐘**（42.2 kWh 版）|\n| AC 車載充電 | 11 kW 標準；22 kW 選配（Earth+）|\n| 後廂 | 362L + 15L 前廂 |\n| 生產地 | **日利納，斯洛伐克**（繼 EV4 後第二款歐洲製造 E-GMP 車）|\n\n## 價格表\n\n| 配置 | 電池 | 德國售價 |\n|------|------|---------|\n| Light | 42.2 kWh | **€26,600 起** |\n| Air | 42.2 kWh | €28,990 起 |\n| Earth | 42.2 kWh | €31,290 起 |\n| Long Range | 61 kWh | €33,490 起 |\n\n## 評測亮點\n\n- 舒適性遠超 B 段預期；MacPherson 前懸 + 扭力梁後懸，舒適調校\n- 三聯螢幕（12.3\" 儀表 + 5.3\" 空調 + 12.3\" 資訊娛樂）\n- 實際能耗 16.2 kWh/100 km（混合路況，寒冷氣溫）→ 實際約 260 km\n\n## 主要缺點\n\n- **標配無內建導航**（沒有 EV 路線充電規劃、無整合式智慧能量回收）\n- 熱泵、22 kW AC 充電器、路線規劃均為高配選項\n- 轉向輕盈但路面回饋不足\n- **實際可用版本約 €30,000~35,000**（非廣告 €26,600 入門款）\n\n## 競品比較\n\n| 競品 | 比較點 |\n|------|--------|\n| VW ID.Polo / Cupra Raval / Škoda Epiq | 歐洲本地製造的 VW 集團 B 段 EV（同一檔次）|\n| Renault 5 / Citroën ë-C3 | 歐洲平價 B 段 EV |\n| 小米 SU7 / BYD 海鷗（歐洲版）| 中國品牌低價競爭 |\n\n## 市場意義\n\nEV2 是 Kia 進軍歐洲入門 EV 市場的核心武器，在歐洲工廠生產規避關稅風險，與 VW 集團 B 段矩陣直接競爭。成熟度高出同價位預期，但定價透明度需改善。\n\n## Related\n- [[concepts/歐洲EV市場]]\n- [[entities/現代汽車集團]]"
    },

      "title": "起亞 4 月韓國銷量首度超越現代：1998 年以來首次（2026-05-06）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754256",
      "updated": "2026-05-06",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754256](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754256)\n\n# 起亞 4 月韓國銷量首度超越現代：1998 年以來首次（2026-05-06）\n\n**原文**：Digitimes（陳玟靜）/ 首爾經濟、韓國經濟｜**發布**：2026-05-06\n\n## 摘要\n起亞 2026 年 4 月在韓國銷售約 5.5 萬輛（+7.9% YoY），首度超越現代汽車的 5.4 萬輛（-19.9% YoY）。這是起亞自 1998 年被現代併購以來，首次在韓國本土銷量超越現代。關鍵：SUV 布局 + EV 陣容。\n\n## 關鍵數據\n\n| 指標 | 起亞 | 現代汽車 |\n|------|------|---------|\n| 4 月韓國銷量 | **~5.5 萬輛（+7.9%）** | ~5.4 萬輛（**-19.9%**）|\n| 4 月 EV 銷量 | **~4.8 萬輛（+170.6%）** | ~2.5 萬輛（+44.9%）|\n| 歷史意義 | **1998 年以來首次超越** | — |\n\n## 暢銷車型\n\n| 起亞 | 銷量 |\n|------|------|\n| **Sorento** | ~1.2 萬輛（冠軍）|\n| Carnival | ~5,000 輛 |\n| Sportage | ~5,000 輛 |\n\n現代主力為轎車：Grandeur 6,622、Sonata 5,754、Avante 5,475\n\n## 分析\n\n- **SUV 趨勢**：起亞提早布局 SUV，現代仍以轎車為主力 → 消費趨勢紅利\n- **高油價效應**：美伊戰事推升油價，EV+HEV 需求上升，起亞完善 EV 陣容帶來 +170% EV 成長\n- **海外對比**：起亞海外銷量 22.2 萬（-0.7%），現代（-8%）差距明顯\n\n## Related\n- [[concepts/地理市場/中國EV市場競爭格局]]"
    },
    "kia-pv5-review": {
      "title": "Kia PV5 電動商務客車評測：價值最佳電動廂型車（2026-04）",
      "url": "https://insideevs.com/reviews/794185/kia-pv5-review",
      "updated": "2026-04-27",
      "body": "**來源**：[https://insideevs.com/reviews/794185/kia-pv5-review](https://insideevs.com/reviews/794185/kia-pv5-review)\n\n# Kia PV5 電動商務客車評測：價值最佳電動廂型車（2026-04）\n\n**原文**：InsideEVs / electrive.com｜**發布**：2026-04-27 / 2026-04-23\n\n## 摘要\nKia PV5 建立在專為商用/客運設計的 **E-GMP.S 平台**，是首款「Platform Beyond Vehicle」家族成員。乘客版英國起價 £32,995，比 VW ID.Buzz 便宜約 £30,000，憑藉靈活架構和實用設計定位為最佳電動廂型車價值。\n\n## 規格\n\n| 項目 | 數值 |\n|------|------|\n| 平台 | **E-GMP.S**（商用/客運 EV 專用）|\n| 電池 | 51.5kWh NMC / **71.2kWh NMC** |\n| WLTP 續航 | 183 英里（294km）/ **256 英里（411km）** |\n| DC 快充 | **150kW**（10-80% ~30 分鐘）|\n| 英國起價（乘客版）| **£32,995** |\n| 對比 VW ID.Buzz | 便宜 **~£30,000** |\n\n## PV5 Cargo 新車型（Birmingham Commercial Vehicle Show 2026）\n\n| 型號 | 長度 | 高度 | 特點 |\n|------|------|------|------|\n| PV5 Cargo L2H1 | 4.67m | 1.82m | 原有版本 |\n| PV5 Cargo **L2H2**（新）| 4.67m | **2.21m**（+30cm）| 高頂版，貨物量大增 |\n| PV5 Cargo **L1H1**（新）| 縮短版 | — | 靈活性更高 |\n\n同時新增基礎電池配置選項。\n\n## 評測結論\n\n- **城市道路感**：看起來大但不感覺大，大型車窗提升視野\n- **乘客體驗**：大量玻璃引入採光，明亮舒適\n- **商用契合**：固定行程 + 可預測里程 + 場站充電，EV 優勢最大化\n\n## PV 家族路線圖\n\nPV5 是首款，後續有更小（PV3/PV1）和更大版本。多種車體變型（廂型/人員運輸/露營車）使其可切入多元市場。\n\n## Related\n- [[entities/Kia]]（待補）\n- [[concepts/車輛類型/電動商用車]]\n- [[concepts/地理市場/印度EV市場]]（Kia India +794%）"
    },
    "l2plus-adas-adoption-2026": {
      "title": "L2/L2+ ADAS：2035 年普及率 94%，主導汽車智慧化（2026-05-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754145",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754145](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754145)\n\n# L2/L2+ ADAS：2035 年普及率 94%，主導汽車智慧化（2026-05-05）\n\n**原文**：Digitimes（杜念魯）/ Counterpoint Research｜**發布**：2026-05-05\n\n## 摘要\nCounterpoint Research 全球 ADAS 與自動駕駛 2025 年預測報告：整體 ADAS 採用率從 2025 年 66% → 2035 年 94%，但成長動能非高階自動駕駛，而是 **L2/L2+**，預估 2035 年占整體滲透率 **65%**。\n\n## 關鍵數據\n\n| 指標 | 2025 | 2035 |\n|------|------|------|\n| ADAS/自動駕駛整體採用率 | **66%** | **94%** |\n| L2/L2+ 占比 | — | **≈65%** |\n\n## L2/L2+ 快速放量的原因\n\n1. **可用性與成本效益平衡**：自適應巡航 + 車道維持 + 車道置中，涵蓋高速 + 市區多數駕駛情境\n2. **高頻使用特性**：近乎每日啟用，價值容易被市場接受\n3. **低設計複雜度**：駕駛者仍全程控制，無需完整備援機制，比 L3+ 便宜許多\n4. **軟體服務化（SaaS）潛力**：功能分級 + 訂閱制 → 車廠建立長期持續性收入\n\n## 競爭轉向\n\n- 高階自動駕駛（L3-L5）：法規尚未全面鬆綁 + 技術成本仍高 → **進展遲緩**\n- 產業重心轉向 L2+ 規模化，並從硬體競爭 → **AI 軟體解析能力**競爭\n- 訂閱制收入模式：使 L2+ 成為車廠長期 recurring revenue 的關鍵\n\n## Related\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/車輛類型/Robotaxi自動計程車]]"
    },
    "leapmotor-t03-germany-2026": {
      "title": "零跑 T03：€49/月方案衝擊德國，2026 年前 4 月銷量 +358%（2026-05-11）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754712",
      "updated": "2026-05-11",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754712](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754712)\n\n# 零跑 T03：€49/月方案衝擊德國，2026 年前 4 月銷量 +358%（2026-05-11）\n\n**原文**：Digitimes（徐畇融）/ Bloomberg｜**發布**：2026-05-11\n\n## 摘要\n零跑汽車（Leapmotor）在德國以 T03 推出 €49/月租賃方案，是同尺寸 Fiat 500 月租（€99）的一半，並借助 Stellantis 廣大經銷網路快速放量。2026 年前 4 個月德國銷量 +358%，已有望超越 Smart 與 Honda。\n\n## 定價與市場表現\n\n| 指標 | 數值 |\n|------|------|\n| 月租起價 | **€49**（已納入德國 EV 補貼）|\n| 競品對比 | Fiat 500：€99/月（貴一倍）|\n| 2026 年前 4 月德國交付 | **4,523 輛（+358% YoY）** |\n| 4 月單月成長 | **+4 倍** |\n\n## 競爭策略\n\n- **Stellantis 通路**：借助集團廣大且成熟的德國銷售 + 經銷網路\n- **標配配備**：倒車影像、6 個安全氣囊、全景天窗\n- **補貼加持**：中國品牌 2026 年在德國市場預期可獲補貼總額 **€30 億**\n- Stellantis 聲稱目前不認為 T03 會太過影響 Fiat 500 銷量（但數據已說明問題）\n\n## 競爭格局\n\n| 比較維度 | 零跑 T03 | 主要競品 |\n|---------|---------|---------|\n| 月租 | €49 | Fiat 500 €99；Renault 5、VW ID.Polo 起售 €24,995 |\n| 通路 | Stellantis 網路 | 品牌自建 |\n| 生產 | 歐洲組裝（Stellantis 廠）| 各自工廠 |\n\n- **意義**：月租低於手機帳單，打開德國「試車族」市場，補全中國品牌在入門租賃市場的空白\n\n## Related\n- [[entities/零跑汽車]]\n- [[entities/Stellantis]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/地理市場/中國EV出海策略]]"

      "url": "https://www.electrive.com/2026/04/30/lges-secures-major-order-for-cylindrical-cells-possibly-from-bmw",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.electrive.com/2026/04/30/lges-secures-major-order-for-cylindrical-cells-possibly-from-bmw](https://www.electrive.com/2026/04/30/lges-secures-major-order-for-cylindrical-cells-possibly-from-bmw)\n\n# LGES × BMW：100 GWh 46 系列圓柱電池大單（2026-04-30）\n\n**原文**：Electrive（Sebastian Schaal）｜**發布**：2026-04-30\n\n## 摘要\nLG Energy Solution（LGES）在 Q1 2026 獲得逾 100 GWh 的 46mm 大圓柱電池訂單，韓媒指出客戶為 BMW，將供應 Neue Klasse 電動平台。\n\n## 訂單概況\n\n| 項目 | 數值 |\n|------|------|\n| 新增訂單量 | **100 GWh**（46 系列圓柱電池）|\n| 可能客戶 | **BMW**（韓媒朝鮮日報、MK 報導）|\n| 合約金額 | **約 10 兆韓元（~€58 億）**，10 年期 |\n| 訂單積壓總量 | 現已超過 **440 GWh** |\n\n## 電池規格\n\n| 格式 | 應用車型 |\n|------|---------|\n| **4695**（46mm 直徑 × 95mm 高）| BMW iX3、i3、i7（Neue Klasse 基礎車型）|\n| **46120**（46mm 直徑 × 120mm 高）| 較大車輛，如 iX5（底盤較高）|\n\n- BMW X5 在南卡羅來納州 Spartanburg 生產，LGES 亞利桑那廠（2026 年底完工）地理位置相符\n- 若確認，將是 LGES 首次供應 BMW BEV 電芯（過去供應 BMW 混合動力）\n\n## LGES 46mm 圓柱電池其他客戶\n- Rivian、奇瑞（中國）、Mercedes-Benz（傳聞 50.5 GWh，2028 交付）\n\n## LGES Q1 2026 財報\n- 營收：6.555 兆韓元（+1.2% YoY）\n- 營業虧損：2,078 億韓元（主因北美大客戶庫存調整導致軟包 EV 電池出貨減少）\n- 圓柱電池（EV）+ ESS 需求穩定，部分抵消\n\n## Related\n- [[entities/LGES]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[entities/三星SDI]]"

    "lges-finland-cathode-plant-2026": {
      "title": "LGES 入股芬蘭正極材料廠：強化歐洲本地電池供應鏈（2026-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755245",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755245](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755245)\n\n# LGES 入股芬蘭正極材料廠：強化歐洲本地電池供應鏈（2026-05）\n\n**原文**：Digitimes | 蔡云瑄｜**發布**：2026-05-18\n\n## 核心交易\n\n樂金能源解決方案（LGES）向芬蘭礦物集團（Finland Mineral Group，FMG）收購 **Espring Finland New Materials 1.7% 股權**。\n\n## Espring 公司背景\n\n| 項目 | 細節 |\n|------|------|\n| 成立時間 | **2024 年** |\n| 股東結構 | FMG **30%** + 中國當升科技 **70%** |\n| 工廠地點 | 芬蘭 **科特卡市（Kotka）** |\n| 投資額 | **€8 億（~USD 9.48 億）** |\n| 動工時間 | **2025 年 3 月** |\n| 設計產能 | **6 萬噸/年**（正極材料）|\n| 目標投產 | **2027 年** |\n\n## LGES 戰略用途\n\n- LGES 計劃採購芬蘭產正極材料，投入**波蘭弗羅茨瓦夫（Wrocław）工廠**\n- 打通「電池材料 → 電池成品」歐洲在地價值鏈\n- 弗羅茨瓦夫廠：已量產 EV 電池 + ESS 電池，籌備 **46 系列圓柱形電池**生產\n- 確保年產能約 **12 GWh**，已獲歐盟補貼\n\n## 意義\n\n中國在全球正極材料生產高度主導（當升科技持 70%），LGES 以少數股東身份切入確保供應保障，同時響應歐盟「去中國依賴」政策方向。\n\n## Related\n- [[concepts/電池技術路線]]\n- [[concepts/歐洲EV市場]]\n- [[entities/寧德時代]]"
    },
    "lges-honda-vietnam-bss-2026": {
      "title": "LGES × Honda × 河內：越南電動機車換電站示範計畫（2026-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755802",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755802](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755802)\n\n# LGES × Honda × 河內：越南電動機車換電站示範計畫（2026-05）\n\n**原文**：Digitimes | 蔡云瑄｜**發布**：2026-05-20\n\n## 核心 MOU\n\nLGES（樂金能源解決方案）、Honda、越南**河內市政府**三方簽署合作備忘錄，共同推動電動機車**公共電池交換站（BSS）** 建置。\n\n## 示範計畫規格\n\n| 項目 | 細節 |\n|------|------|\n| 啟動時間 | **2026 年 Q3** |\n| BSS 數量 | **約 50 座**（河內主要地區）|\n| 電動機車數量 | **500 輛**（示範用）|\n| 電池技術 | **LGES 2170 圓柱型電池** |\n| LGES 角色 | 電池供應 + 安全管理系統 + 換電系統營運 + 電池生命週期管理 |\n| Honda 角色 | 供應電池組（MPP）+ 交換機 + 電動機車本體 |\n\n## 越南市場背景\n\n| 指標 | 數值 |\n|------|------|\n| 越南二輪車市場規模（2025）| **~8,000 萬輛** |\n| 電動機車佔比 | **~4%**（約 320 萬輛）|\n| Honda 越南市占 | **86%** |\n| 河內政策 | 2026 年 7 月起分時段、分區域限制 ICE 機車 → 2030 年前擴大 |\n\n## 意義\n\n- Honda 藉既有的 86% 市占主導電動化轉型\n- LGES 以電池 + 換電系統技術切入東南亞電動機車市場\n- 越南「換電模式」若成功可複製至柬埔寨、印尼等東南亞市場\n\n## Related\n- [[concepts/東南亞EV市場]]\n- [[concepts/充電基礎建設]]\n- [[entities/本田]]"

    "lges-loss-ess-2026": {
      "title": "LGES 首度連續 2 季虧損，ESS 成 H2 2026 反彈關鍵",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751524&grid_seq1=&grid_seq2=",
      "updated": "2026-04-09",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751524&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751524&grid_seq1=&grid_seq2=)\n\n# LGES 首度連續 2 季虧損，ESS 成 H2 2026 反彈關鍵\n\n**原文**：DIGITIMES／陳玟靜｜**發布**：2026-04-09\n\n## 摘要\n樂金能源解決方案（LGES）創下史上首次連續兩季營業虧損，主因為 IRA AMPC 補貼大幅縮水與北美 EV 需求下滑；ESS 業務預計 2026 年成長 3 倍以上，成為反彈關鍵。\n\n## Q1 2026 財務數據\n| 指標 | Q1 2026 | YoY |\n|------|---------|-----|\n| 營收 | 6.56 兆韓元（約 $4.44 億美元）| -2.5% |\n| 營業虧損 | 2,078 億韓元 | 轉虧 |\n| AMPC 補貼 | 1,898 億韓元 | vs Q1'25 的 4,577 億韓元（-59%）|\n\n## 虧損原因\n1. IRA AMPC 補貼大幅縮水（-59% YoY）\n2. 北美 EV 袋型電池需求下滑（GM Ultium Cells 暫停）\n3. 北美 ESS 基地初期量產爬坡成本\n4. 美伊戰爭導致各項成本上升\n\n## 穩定因子\n- Tesla 新車上市帶動圓柱型電池需求穩健\n- ESS 出貨量增加\n\n## 轉型策略\n- 非 EV 業務比重：2025 年約 20% → 中長期目標 40%\n- **2026 年 ESS 業務目標：年增 3 倍以上**\n\n## 全球電池市占（2026 年 1–2 月）\n| 廠商 | 市占 | YoY |\n|------|------|-----|\n| 寧德時代 | 42.1% | +3.4pp（from 38.7%）|\n| 韓系三廠（LGES+SKOn+三星SDI）| 15% | -2.2pp |\n\n## Related\n- [[entities/寧德時代]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]\n- [[sources/us-ev-battery-demand-mismatch]]"
    },
    "lges-tesla-4680-supplier": {
      "title": "LGES 有望成 Tesla 4680 電池首選供應商",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752270",
      "updated": "2026-04-17",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752270](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752270)\n\n# LGES 有望成 Tesla 4680 電池首選供應商\n\n**原文**：DIGITIMES／陳玟靜 ｜ **發布**：2026-04-16\n\n## 摘要\nLGES 傳近期有望與 Tesla 簽署 4680 圓柱型電池大規模供應合約。LGES 在美國亞利桑那州 Queen Creek 興建 36 GWh 4680 工廠（2026 年底完工），比 Panasonic 鳳凰城廠早約 1 年，加上已有 Rivian、賓士合約在手，被業界視為最理想供應商。\n\n## 關鍵事實\n\n### Tesla 4680 供應鏈重組背景\n- Tesla 自產 4680 因技術瓶頸 + 成本問題 → 僅用於 Cybertruck\n- Model Y 所需 4680 → **計畫外購**\n- Cybercab（Robotaxi）目標年產 **200 萬輛**，2026 Q2 大規模量產 → 4680 需求爆量\n\n### 競爭格局\n| 供應商 | 目前情況 | 美國 4680 廠 |\n|--------|---------|-------------|\n| **LGES** | 韓國梧倉廠量產中 | **Queen Creek AZ，36 GWh，2026 底完工**（最快）|\n| **Panasonic** | 日本和歌山廠量產中 | 鳳凰城 AZ，最快 2028 年（慢 1 年）|\n\n### LGES 優勢\n1. **美國在地化**：AZ 廠 2026 底完工，符合 Trump「美國製造」政策\n2. **既有 4680 客戶**：Rivian、Mercedes-Benz 合約在手\n3. **先行一年**：較 Panasonic 美國廠早約 1 年投產\n\n### 現有 Tesla 北美供應鏈（NCA 電池）\n- Panasonic：目前為 Model 3/Y 北美版供應商（NCA 電池）\n- LGES：主力 NCM，**尚未進入 Tesla 北美電動車供應鏈**\n\n## 合約狀態\n- LGES：「Tesla 合約屬敏感事項，無可公開資訊」\n\n## Related\n- [[entities/LGES]]\n- [[entities/Tesla]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[sources/tesla-4680-musk-strategy]]\n- [[sources/lges-loss-ess-2026]]"
    },
    "mahindra-ev-expansion-2026": {
      "title": "Mahindra 擴充 EV 車款計畫：2031 年 9 款、產能+50%",
      "url": "https://www.electrive.com/2026/05/12/mahindra-to-expand-passenger-ev-line-up-ramp-up-production-capacity",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.electrive.com/2026/05/12/mahindra-to-expand-passenger-ev-line-up-ramp-up-production-capacity](https://www.electrive.com/2026/05/12/mahindra-to-expand-passenger-ev-line-up-ramp-up-production-capacity)\n\n# Mahindra 擴充 EV 車款計畫：2031 年 9 款、產能+50%\n\n**原文**：electrive.com | Sagar Parikh｜**發布**：2026-05-12\n\n## 計畫概要\n\nMahindra 計畫在未來 5 年內推出 **9 款乘用 EV**（原計畫 6 款，本次再擴充 3 款），2031 年 3 月前完成所有上市。同步將年產能從 96,000 輛提升至 **144,000 輛**（+50%），完工時間：2027 年 3 月。\n\n## 車款時程\n\n| 時間 | 車款 | 備註 |\n|------|------|------|\n| 已上市（4 款）| XUV 3XO EV、XUV400、BE 6、XEV 9e、XEV 9S | BE 6/XEV 系列銷量主力 |\n| 2027 | **BO7**（量產 SUV）+ Vision.T 概念車 | BO7 定位：「超大銷量驅動」，競爭 Tata Harrier.ev |\n| 2028 | SUV Coupé（衍生自 BO7）| 對應 BE.09 概念 |\n\n## BO7 平台轉變\n\nCEO Jejurikar 宣布平台策略更改：\n> 「我們不再堅持純 EV 平台，而是找到了在 **NU_IQ 平台**上同時製造 Born EV 和 ICE 車款的方式。」\n\n此舉降低平台開發成本，提高產能利用率。\n\n## 銷售實績\n\n2025-03-20 至 2026-04-24，Mahindra 共售出 **55,000 輛 EV**。\n\n## 市場意義\n\nMahindra 以 INGLO 電動原生平台（BE 6、XEV 9e、XEV 9S）建立高端 EV 形象，BO7 則向主流市場延伸，與 Tata Motors 爭奪中端份額。\n\n## Related\n- [[concepts/地理市場/印度EV市場]]\n- [[sources/india-ev-fy2026-record]]\n- [[sources/india-ev-april-2026]]\n- [[sources/toyota-india-3-plants]]"

    "malaysia-cbv-ev-regulation-2026": {
      "title": "馬來西亞 CBU 電動車進口新規（2026-07-01 起）：CIF ≥RM20 萬 + 最低 180kW（2026-05-11）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754568",
      "updated": "2026-05-11",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754568](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754568)\n\n# 馬來西亞 CBU 電動車進口新規（2026-07-01 起）：CIF ≥RM20 萬 + 最低 180kW（2026-05-11）\n\n**原文**：Digitimes（高盈穎）/ The Edge Malaysia｜**發布**：2026-05-11\n\n## 摘要\n馬來西亞 MITI 宣布，自 2026 年 7 月 1 日起，整車進口（CBU）電動車需符合：最低到岸價格（CIF）≥ RM20 萬（~USD 5 萬）+ 最低輸出功率 ≥ 180kW。新規實質提高售價，直接衝擊比亞迪與 Tesla 的進口競爭力。\n\n## 新規核心條件（2026-07-01 起）\n\n| 條件 | 標準 |\n|------|------|\n| **最低 CIF 價格** | **RM 20 萬（~USD 50,000）** |\n| **最低輸出功率** | **180 kW**（由原 200kW 下調）|\n| 適用範圍 | 所有 CBU 電動車進口商 |\n\n## 稅務計算（依 RM20 萬 CIF 基礎）\n\n| 稅種 | 稅率 |\n|------|------|\n| 進口關稅 | 5% |\n| 消費稅（Excise Duty）| 10% |\n| 銷售及服務稅（SST）| 10% |\n| 代理商及經銷商利潤（約）| 各 10% |\n| **估算最終零售價** | **超過 RM 30 萬**（~USD 75,000）|\n\n## 對主要品牌的衝擊\n\n| 品牌 | 影響 |\n|------|------|\n| **比亞迪** | 7 款車中僅 Seal + Sealion 7 達 180kW；目前售價均低於 RM20 萬 CIF |\n| **Tesla** | Model 3/Y 起售均不超過 RM20 萬，新規後同樣受衝擊 |\n\n## 背景\n\n- **2022-2025**：馬來西亞特別關稅豁免（售價 ≥RM10 萬的進口 EV 免稅），有效期至 2025 年底\n- **2025 底**：關稅豁免到期（庫存可繼續按舊規銷售至售完）\n- **2026-03**：比亞迪霹靂州 CKD 工廠與 MITI 條件談不攏，廠房建設全面停工\n- **2026-05-11**：整車進口新規公告 → 比亞迪雙重夾擊（CKD 被擋 + CBU 成本大增）\n\n## 意義\n\n- 馬來西亞從「吸引中國 EV 進入」→「轉向本地化生產要求」\n- 高度不確定性下，中低價位中國 EV 在馬來西亞的市場競爭力被大幅削弱\n- 類似東南亞保護主義趨勢：泰國（80% 出口要求）、馬來西亞（高 CIF 門檻）\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/地理市場/東南亞EV市場]]\n- [[concepts/地理市場/中國EV出海策略]]"
    },
    "malaysia-ev-import-clarification-2026": {
      "title": "馬來西亞 CBU EV 新規爭議：MITI 副部長澄清「不只保護國產車」",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755024",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755024](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755024)\n\n# 馬來西亞 CBU EV 新規爭議：MITI 副部長澄清「不只保護國產車」\n\n**原文**：DIGITIMES | 高盈穎｜**發布**：2026-05-15\n**更新**：補充 [[sources/malaysia-cbv-ev-regulation-2026]] 後續政策爭議\n\n## 規定重申（2026-07-01 生效）\n\nCBU 整車進口電動車門檻：\n- 到岸價（CIF）：**≥RM200,000（≈US$50,000）**\n- 馬達功率：**≥180 kW**\n\n外界批評：加上進口稅、消費稅、銷售稅和通路抽成後，車款要賣到 **RM300,000（≈US$76,000）** 才有利潤，使多數比亞迪、Tesla 車款面臨漲價壓力。\n\n## MITI 副部長沈志勤（Sim Tze Tzin）回應\n\n政策本意**非保護 Proton、Perodua**，而是：\n1. 促進外國品牌與馬來西亞本土供應鏈合作\n2. 提升馬來西亞在汽車產業鏈的附加價值（目標：成為零件出口國）\n3. 為自動駕駛時代做好準備\n4. 若定價在 **RM100,000~200,000**，外國品牌可在本地生產（非 CBU 模式進場）\n\n## 比亞迪 CKD 廠爭議\n\n- 比亞迪在霹靂州的 CKD（全散件組裝）廠已暫停興建\n- 原因：MITI 臨時提出 **80% 外銷、20% 內銷（上限 1 萬輛）** 條件\n- 比亞迪無法接受：東南亞需求可從已啟用的泰國廠供應\n\n## 馬來西亞汽車業規模（2025 年）\n\n- 汽車業 GDP 貢獻：**200–240 億美元**\n- 相關就業：**75 萬個**\n- Proton 供應商：116 家；Perodua：190 家；總採購：近 40 億美元\n\n## Related\n- [[sources/malaysia-cbv-ev-regulation-2026]]\n- [[concepts/地理市場/東南亞EV市場]]\n- [[entities/比亞迪]]"

    "malta-ebus-av-shuttle-2026": {
      "title": "馬爾他新增 40 輛電動巴士，並啟動自動駕駛電動接駁車試驗",
      "url": "https://www.electrive.com/2026/05/20/malta-adds-40-electric-buses-and-launches-autonomous-shuttle-trials",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.electrive.com/2026/05/20/malta-adds-40-electric-buses-and-launches-autonomous-shuttle-trials](https://www.electrive.com/2026/05/20/malta-adds-40-electric-buses-and-launches-autonomous-shuttle-trials)\n\n# 馬爾他新增 40 輛電動巴士，並啟動自動駕駛電動接駁車試驗\n\n**原文**：electrive.com，2026-05-20\n**作者**：Carla Westerheide\n\n## 摘要\n\n馬爾他公共交通（Malta Public Transport）以 **€1,400 萬**採購 **40 輛電動巴士**，同時將於 2026 年 6 月啟動自動駕駛電動接駁車試驗（EU Horizon Europe metaCCAZE 計畫）。\n\n## 電動巴士採購\n\n| 指標 | 數值 |\n|------|------|\n| 採購數量 | **40 輛** |\n| 製造商 | **King Long**（中國，圖片確認但未官方命名）|\n| 投資額 | **€1,400 萬** |\n| 2023 年舊批次 | 30 輛電動巴士 + 3 MW 充電廠 |\n| 目標 | 科佐島（Gozo）**全面電動**公共交通 |\n\n## 自動駕駛電動接駁車試驗\n\n| 指標 | 數值 |\n|------|------|\n| 啟動時間 | **2026 年 6 月** |\n| 最大載客 | **15 人** |\n| 路線 | 馬爾他本島 + 科佐島預批准路線 |\n| 測試條件 | 受控測試環境；全程安全員隨車 |\n| 計畫資金 | EU Horizon Europe **metaCCAZE 計畫** |\n| 合作方 | Malta Public Transport、交通部、馬爾他大學 |\n\n## 背景\n\n馬爾他 2023 年已開始電動巴士部署，此次為第二批次；「Malta in Motion」戰略持續推進。馬爾他作為小島嶼國家，電動巴士 + 自動駕駛結合具有特殊適合性（路線固定、島嶼封閉環境）。\n\n## Related\n- [[concepts/電動巴士市場]]\n- [[concepts/Robotaxi自動計程車]]"
    },
    "man-etgm-electric-truck-2026": {
      "title": "MAN eTGM：16 噸電動配送卡車（2026-05，米蘭首發）",
      "url": "https://www.electrive.com/2026/05/13/man-unveils-electric-16-tonne-truck-etgm",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.electrive.com/2026/05/13/man-unveils-electric-16-tonne-truck-etgm](https://www.electrive.com/2026/05/13/man-unveils-electric-16-tonne-truck-etgm)\n\n# MAN eTGM：16 噸電動配送卡車（2026-05，米蘭首發）\n\n**原文**：electrive.com | Cora Werwitzke｜**發布**：2026-05-13\n**展覽**：Transpotec Logitec，米蘭\n\n## 車型定位\n\nMAN eTGM 填補品牌電動車序列的最後缺口，使 MAN 電動卡車產品線覆蓋 **12 至 50 噸**全範圍。定位：\n- 城市及區域配送\n- 市政應用\n- 建築業\n\n## 核心規格\n\n| 規格 | 數值 |\n|------|------|\n| 車型重量 | 16 噸（可選 16.5 噸）|\n| 最大 GCW（帶拖車）| 33 噸 |\n| 底盤載荷 | 最多 10.6 噸 |\n| 電池 | NMC，2–4 包，各 80 kWh（淨）|\n| 最大電池容量 | **320 kWh**（4 包）|\n| 最大續航 | **480 km** |\n| DC 充電 | 最高 **375 kW** |\n| 充電時間（10–80%）| **43 分鐘**（4 包配置）|\n| AC 充電 | 2027 年底加入 |\n| 電機 | eCD210，210 kW / 800 Nm |\n| 變速箱 | TipMatic 2（二速）|\n| 生產地點 | 波蘭 Kraków 廠，**2027 年**開始量產 |\n\n## 策略亮點\n\n- **模組化 BEV 平台**：電池、高壓架構、熱管理系統均來自 eTGX/eTGS，降低開發成本\n- 16.01 噸設計（超 16 噸門檻）→ 符合 EU 電動重卡優惠（免部分路費）\n- 支援單踏板駕駛（one-pedal）與滑行（coasting）模式\n\n## Related\n- [[concepts/車輛類型/電動卡車市場]]\n- [[sources/volvo-fh-aero-electric-2026]]\n- [[sources/tesla-semi-production-2026]]\n- [[sources/milence-paris-berlin-corridor]]"
    },
    "man-green-brenner-2026": {
      "title": "MAN Green Brenner Initiative：阿爾卑斯電動重卡 TCO 最佳案例",
      "url": "https://www.electrive.com/2026/05/30/man-and-dettendorfer-launch-the-green-brenner-initiative/",
      "updated": "2026-05-26",
      "body": "# MAN Green Brenner Initiative：阿爾卑斯電動重卡 TCO 最佳案例\n\n**來源**：[electrive.com](https://www.electrive.com/2026/05/30/man-and-dettendorfer-launch-the-green-brenner-initiative/)，2026-05-30\n\n---\n\n## 計畫概述\n\nMAN Truck & Bus × Dettendorfer Energy GmbH 共同啟動「**Green Brenner Initiative**」，目標將布倫納山口走廊（奧地利—義大利）建立為**零排放物流示範走廊**。\n\n- 定位：鐵路的補充方案（非競爭）\n- 長期目標：布倫納底部隧道完工前（預計 2030+ 年），作為快速零排放替代路線\n\n---\n\n## 關鍵 TCO 數據（年行駛 11 萬公里以上）\n\n| 指標 | 數值 |\n|------|------|\n| 能源成本優勢 | 比柴油**便宜約 40%** |\n| 過路費優勢 | **節省約 80%**（電動車免收或大幅減免 Brenner 收費）|\n| 3 年 TCO | 比同規格柴油卡車**低約 20%** |\n| 下坡能量回收 | **高達 40%**（布倫納山口地形天然優勢）|\n| 噪音優勢 | 加速時低 **12.6 dB** |\n\n### 碳排效益\n- 300 輛電動卡車每日運行 = **每年減碳約 2.8 萬噸**\n\n---\n\n## 基礎建設現況\n\n- **充電站已上線**：Raubling（Inntal 服務區）+ Langenbruck（英戈爾施塔特南方）\n- Dettendorfer × Energie Südbayern 合資成立 Dettendorfer Energy 主導充電樞紐\n\n---\n\n## 意義\n\n布倫納走廊是歐洲最繁忙的阿爾卑斯貨運通道之一，此案例提供：\n1. **山區電動重卡實際 TCO 優勢的可靠數據**（能量回收 + 過路費豁免是關鍵）\n2. **充電基礎設施先行，吸引物流業者採用**的落地路徑\n3. 佐證電動重卡已在特定路線具備經濟可行性\n\n---\n\n## Related\n- [[concepts/電動卡車市場]]\n- [[sources/milence-paris-berlin-corridor]]\n- [[sources/ev-truck-satisfaction-germany-2026]]"
    },
    "man-vilnius-ebus-2026": {
      "title": "MAN 獲立陶宛維爾紐斯 112 輛電動巴士訂單",
      "url": "https://www.sustainable-bus.com/news/man-electric-bus-order-vilnius-vvt-lithuania",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.sustainable-bus.com/news/man-electric-bus-order-vilnius-vvt-lithuania](https://www.sustainable-bus.com/news/man-electric-bus-order-vilnius-vvt-lithuania)\n\n# MAN 獲立陶宛維爾紐斯 112 輛電動巴士訂單\n\n**原文**：Sustainable Bus，2026-05-12\n**作者**：編輯部\n\n## 摘要\n\nMAN Truck & Bus 獲得立陶宛維爾紐斯市公共交通運營商 VVT 訂購 **112 輛** Lion's City E 純電巴士的合約，創立陶宛有史以來最大電動巴士訂單。\n\n## 訂單詳情\n\n| 項目 | 數值 |\n|------|------|\n| 訂購數量 | **112 輛** |\n| 車型拆分 | 標準 12m × 84 輛 + 鉸接 18m × 28 輛 |\n| 交付時間 | 2026 年底開始，持續至 **2027 年底** |\n| 在地合作 | **ADAMPOLIS**（MAN 立陶宛獨家合作商）|\n| 維護服務 | ADAMPOLIS 提供 5 年技術維護 |\n| 每充電程 | 最高 **380 km** |\n\n## MAN Lion's City E 市場地位（2026）\n\n| 指標 | 數值 |\n|------|------|\n| 累計交付 | **3,300+ 輛**（2019 年以來）|\n| 2025 年電動巴士銷量成長 | **+118% YoY**（逾 1,300 輛）|\n| MAN 城市巴士電動佔比 | 歐洲銷量 **~50%** |\n| Q1 2026 交付 | ~200 輛電動巴士 |\n| 生產基地 | 斯塔拉霍維采（波蘭）+ 安卡拉（土耳其，新增）+ 奧利凡特斯方坦（南非）|\n\n## 維爾紐斯電化背景\n\n維爾紐斯積極推進車隊電化，近年採購：\n- 2023：向 Škoda 採購大批無軌電車\n- 2025：向 Solaris 採購車輛\n- 2026：此次 MAN 訂單（112 輛，立陶宛歷史最大電動巴士訂單）\n\nVVT CEO Ignas Degutis：「這是規模和複雜度均屬例外的專案……我們同步推進充電基礎設施、電力容量、車廠升級和全新營運模式。」\n\n## Related\n- [[concepts/電動巴士市場]]\n- [[concepts/歐洲EV市場]]"
    },
    "mazda-ev-delay-2029": {
      "title": "Mazda 首款長程 BEV 延至 2029+：「本來就沒有真的開始」（2026-05）",
      "url": "https://insideevs.com/news/795650/mazda-delays-first-major-ev",
      "updated": "2026-05-13",
      "body": "**來源**：[https://insideevs.com/news/795650/mazda-delays-first-major-ev](https://insideevs.com/news/795650/mazda-delays-first-major-ev)\n\n# Mazda 首款長程 BEV 延至 2029+：「本來就沒有真的開始」（2026-05）\n\n**原文**：InsideEVs | Mack Hogan｜**發布**：2026-05-12\n\n## 核心事件\n\nMazda 原本承諾 2027 年推出首款自主平台長程純電動車，**已確認延至 2029 年或更晚**。\n\n## CEO 說法\n\nCEO Masahiro Moro（2026-05-12 財報電話）：\n- 「在我們正式開始之前」就作出了這個決定\n- 公司「一向謹慎對待 BEV」\n- **沒有任何設施減損或供應商合約需解除** → 實際上幾乎沒有真正啟動\n\n## Mazda EV 歷史\n\n- 唯一在美銷售的 EV：**MX-30**（2021年，100英里EPA，$35,000）→ 約兩年後退出市場\n- 中國市場有與當地夥伴共同開發的 CX-6e（本質上是中國品牌車的換皮）\n\n## 資源轉向\n\n- 轉向燃油車與 HEV 開發\n- 自研 HEV 系統（非豐田授權，用於新款 CX-5）\n- 2030 年前將投入 **$75.2 億美元**電動化——但遠低於競爭對手：\n  - 現代：$260 億美元（美國 EV 供應鏈）\n  - Ford / GM / Toyota 各自更龐大投資\n\n## 意義分析\n\n- 馬自達是「小廠謹慎路線」的最典型代表，但代價是技術落後的時間複利累積\n- 在中國，EV 戰略依賴合作夥伴而非自主技術 → 競爭力繫於本地夥伴\n- 與 Honda（全面撤退）、Mazda（從未真正開始）構成日系第二梯隊 EV 戰略困境對照組\n\n## Related\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/地理市場/歐洲EV市場]]"
    },
    "mercedes-amg-gt-electric-2026": {
      "title": "Mercedes-AMG GT 4-Door Coupé 電動版：軸向磁通馬達 + 600 kW 充電（2026-05）",
      "url": "https://insideevs.com/news/796361/2027-mercedes-amg-gt-4-door-coupe",
      "updated": "2026-05-21",
      "body": "**來源**：[https://insideevs.com/news/796361/2027-mercedes-amg-gt-4-door-coupe](https://insideevs.com/news/796361/2027-mercedes-amg-gt-4-door-coupe)\n\n# Mercedes-AMG GT 4-Door Coupé 電動版：軸向磁通馬達 + 600 kW 充電（2026-05）\n\n**原文**：InsideEVs | Suvrat Kothari｜**發布**：2026-05-19\n\n## 核心規格\n\n| 規格 | GT 63（三馬達）| GT 55（雙馬達）|\n|------|---------------|---------------|\n| 馬達 | **3 顆軸向磁通**（YASA，後 × 2 + 前 × 1）| 2 顆 |\n| 系統功率 | **1,153 hp** | **805 hp** |\n| 扭矩 | **1,475 lb-ft（2,000 Nm）** | — |\n| 0–60 mph | **2.3 秒** | — |\n| 最高速 | **186 mph（限速）** | — |\n| 電池 | **106 kWh**（NCMA 正極 + 含矽負極，~298 Wh/kg）| — |\n| 續航（WLTP）| ~700 km | — |\n| 續航（EPA 預估）| ~315 英里 | — |\n| DC 快充 | **600 kW 峰值** | — |\n| 10→80% | **約 11 分鐘** | — |\n| 平台 | **AMG.EA**（AMG 專屬電動平台，首款車）| — |\n| 上市時程 | GT 55：2026 年底；GT 63：2027 年初 | — |\n\n## 核心技術突破\n\n### 軸向磁通馬達（Axial Flux Motor）\n- **第一款量產 EV 採用 YASA 軸向磁通馬達**（Mercedes 2021 年收購英國 YASA）\n- 比傳統徑向馬達輕 67%、短 67%\n- 俗稱「鬆餅形」（pancake-shaped）馬達\n\n### 電池冷卻\n- **2,660 顆圓柱電池，分 18 組模組**，每組配置按需冷卻\n- 電池浸泡於冷卻液（Immersion cooling）\n- 靈感來自 AMG One 超跑 + F1 技術\n\n### 充電性能比較\n| 車型 | 峰值 DC 充電功率 |\n|------|----------------|\n| **Mercedes-AMG GT 63** | **600 kW** |\n| BMW iX3（Neue Klasse）| 400 kW |\n| Tesla Cybertruck | 500 kW |\n| BYD 旗艦（漢 EV 等）| 接近 MW |\n| Porsche Taycan（最新）| ~320 kW |\n\n→ **西方車廠中充電速度最快**，但中國品牌已達接近 MW 級別\n\n### 主動空氣動力學\n- **「Aerokinetics」系統**：75 mph + 87 mph 時底盤擾流板自動展開\n- 可選主動後擴散器 + 冷卻翼片\n\n## 市場定位\n\n- **競品**：Porsche Taycan、Lucid Air Sapphire\n- 首款 AMG.EA 平台車型（未來 AMG 電動產品線基礎）\n- 提供「模擬手動變速箱」+ V8 音效合成（保留 AMG 情感體驗）\n\n## Related\n- [[concepts/歐洲EV市場]]\n- [[concepts/電池技術路線]]\n- [[sources/bmw-ix3-neue-klasse-2026]]"
    },
    "mercedes-benz-china-q1-2026": {
      "title": "賓士 2026 Q1 中國銷量重挫 27%：豪車市場版圖易主",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751792",
      "updated": "2026-04-14",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751792](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751792)\n\n# 賓士 2026 Q1 中國銷量重挫 27%：豪車市場版圖易主\n\n**原文**：DIGITIMES／徐畇融｜**發布**：2026-04-14\n\n## 摘要\n賓士 2026 年 Q1 中國銷量年減 27%（惡化自 2025 Q4 的 -19%），全球交付量下滑 6% 至不到 50 萬輛。中國本土品牌（比亞迪騰勢、華為+江淮）正積極搶佔豪車市場；同時賓士在歐洲受惠電動 CLA 強勁表現逆勢回升。\n\n## 關鍵數據\n\n| 市場 | 指標 | 數值 |\n|------|------|------|\n| 中國 | Q1 2026 銷量 | **-27%** YoY |\n| 中國 | Q4 2025 銷量 | -19% YoY |\n| 全球 | Q1 2026 交付量 | <50 萬輛（-6%）|\n| 歐洲 | EV 銷量 | 正成長（CLA 電動版帶動）|\n\n## 競爭格局：中國豪車市場易主\n\n### 挑戰者\n- **比亞迪騰勢 Z9GT**：~€100,000，超快充，0-100 km/h 2.7 秒，已進入歐洲市場\n- **華為 + 江淮 → 尊界 S800**：高端旗艦，直接挑戰賓士 S-Class\n\n### 賓士的回應\n- 對 S-Class 等旗艦車型進行改款\n- 強化與中國在地合作夥伴的關係與研發互動\n- 歐洲：電動 CLA 榮獲 2026 年歐洲年度風雲車，計畫未來幾年推出 ~40 款新車型\n\n## 中國市場整體環境\n- 中國 Q1 2026 乘用車總銷量：422.6 萬輛（-17% YoY）\n- 中系品牌市佔率：62%；德系合資：16%；日系合資：13.3%\n- 保時捷：Q1 中國銷量 -21%\n- 外資豪車品牌普遍承壓，殺價搶單持續\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/byd-denza-europe-debut]]\n- [[sources/china-ev-market-q1-2026]]"

    "mercedes-c-class-ev": {
      "title": "Mercedes-Benz C-Class EV：800V 平台，473 英里 WLTP，330kW 充電",
      "url": "https://insideevs.com/reviews/793375/mercedes-benz-c-class-ev",
      "updated": "2026-04-21",
      "body": "**來源**：[https://insideevs.com/reviews/793375/mercedes-benz-c-class-ev](https://insideevs.com/reviews/793375/mercedes-benz-c-class-ev)\n\n# Mercedes-Benz C-Class EV：800V 平台，473 英里 WLTP，330kW 充電\n\n**原文**：InsideEVs／Andrei Nedelea ｜ **發布**：2026-04-20\n\n## 摘要\n賓士全新電動 C-Class 是繼 CLA、GLC EV 之後第三款採用 MB.EA 800V 平台的電動車。WLTP 最大續航 473 英里（762 公里），峰值充電 330kW，10 分鐘補充 202 英里（325 公里），搭載 MB.OS 多智慧型 AI 整合介面（ChatGPT + Google Gemini）。\n\n## 關鍵規格\n\n| 規格 | 數值 |\n|------|------|\n| 平台 | **MB.EA 800V**（與 GLC EV 相同）|\n| 動力系統 | C400 4Matic，雙馬達，**482 hp** |\n| 0–62 mph | **3.9 秒** |\n| 電池容量 | **94.3 kWh**（與 GLC EV 共享）|\n| WLTP 最大續航 | **473 英里（762 公里）**（比 GLC SUV 多 29 英里）|\n| 峰值充電功率 | **330 kW**（GLC 實測可達 353 kW）|\n| 10 分鐘補充 | **202 英里（325 公里）** |\n| 再生制動功率 | 最高 300 kW（電機，非摩擦煞車）|\n| 後輪轉向 | 最大 4.5 度，轉彎半徑縮小近 1 公尺（→ 36.7 英尺）|\n| 風阻係數 | **0.22**（低於 ICE C-Class）|\n\n## 設計與車艙\n\n- 車型：Fastback 式「運動 GT 後座」，視覺流線但後座空間略緊（對 6 英尺乘客）\n- 軸距：116.6 英寸（比 ICE C-Class 長 3.8 英寸）\n- 選配：39.1 英寸柱對柱大螢幕\n- 系統：**MB.OS**（Google Maps 原生 + ChatGPT / Google Gemini 多智慧型代理）\n- 材質：比 GLC EV 更優質（車門板 + 中控台使用更多軟性觸感材料）\n\n## 空氣懸吊 Car-to-X\n- 收集其他賓士車型的路面數據（坑洞、顛簸）→ 提前調整懸吊\n\n## 賓士電動化進度\n\n| 車型 | 平台 | 狀態 |\n|------|------|------|\n| CLA EV | MMA | 已上市 |\n| GLC EV | MB.EA 800V | 已上市 |\n| **C-Class EV** | MB.EA 800V | 首試報告（量產待確認）|\n\n## Related\n- [[entities/三星SDI]] （賓士電池供應商）\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/samsung-sdi-mercedes-confirmed-deal]]\n- [[sources/mercedes-benz-china-q1-2026]]"
    },

      "title": "Mercedes-Benz Q1 2026 BEV 銷量年增 11%：全電 CLA 是主引擎",
      "url": "https://www.electrive.com/2026/04/09/mercedes-benz-q1-bev-sales-rise-by-11-per-cent",

      "body": "**來源**：[https://www.electrive.com/2026/04/09/mercedes-benz-q1-bev-sales-rise-by-11-per-cent](https://www.electrive.com/2026/04/09/mercedes-benz-q1-bev-sales-rise-by-11-per-cent)\n\n# Mercedes-Benz Q1 2026 BEV 銷量年增 11%：全電 CLA 是主引擎\n\n**原文**：electrive｜**發布**：2026-04-09\n\n## 關鍵數據\n\n| 指標 | Q1 2026 | YoY |\n|------|---------|-----|\n| BEV 總交付（乘用車+商用車）| 50,400 輛 | +11% |\n| 乘用車 BEV | 44,300 輛 | +9% |\n| 電動商用車 | 6,100 輛 | +29% |\n| 歐洲乘用車 BEV | — | +34% |\n| 德國 | — | +36% |\n\n## 成長驅動\n- **全電 CLA**：Rastatt 廠三班制滿載生產\n- **全電 GLC**：Bremen 廠三班制 + 週六加班\n- 即將上市：全電 C-Class（世界首演在即）\n\n## 背景\n- 2025 全年 BEV：197,300 輛（YoY -4%）\n- 2025 Q4 開始回升（+3% YoY），2026 Q1 延續正向趨勢\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]"

    "mg-saic-spain-factory-2026": {
      "title": "MG/SAIC 宣布歐洲首座工廠：西班牙加利西亞（2026-06-03）",
      "url": "https://www.electrive.com/2026/06/03/mg-plans-spanish-factory-for-eu-expansion/",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.electrive.com/2026/06/03/mg-plans-spanish-factory-for-eu-expansion/](https://www.electrive.com/2026/06/03/mg-plans-spanish-factory-for-eu-expansion/)\n\n# MG/SAIC 宣布歐洲首座工廠：西班牙加利西亞（2026-06-03）\n\n**原文**：electrive.com｜**發布**：2026-06-03\n\n## 摘要\nMG Motor（上汽 SAIC 旗下品牌）宣布將在西班牙**加利西亞（Galicia）**建設歐盟境內第一座整車工廠，采「在歐洲、為歐洲」（in Europe, for Europe）策略，規避現行及潛在的歐盟關稅壁壘。\n\n## 關鍵數據\n\n| 指標 | 數值 |\n|------|------|\n| 投資規模 | **~€2 億歐元** |\n| 年產能目標 | **12 萬輛** |\n| 策略定位 | 首座中國品牌在 EU 境內的整車廠 |\n| 首批量產車型 | Dolphin + Atto（BYD 代工，MG 品牌計畫） |\n\n## 戰略意義\n- 歐盟對中國製 EV 徵收額外關稅（最高 35.3%）後，SAIC 選擇「在地生產」以規避關稅\n- 加利西亞：西班牙工業城市，Stellantis（Vigo）既有汽車產業生態圈\n- 繼 BYD 匈牙利廠（啟動中）之後，第二個中國品牌在歐洲本土製造的實例\n- 結合奇瑞藉 Nissan Sunderland 廠代工路線：中國品牌進歐策略從「直接出口」→「工廠接管/代工」→「自建工廠」完整三段式演進\n\n## Related\n- [[concepts/中國EV出海策略]]\n- [[concepts/歐洲EV市場]]\n- [[sources/china-ev-europe-factory-takeover-2026]]\n- [[sources/nissan-chery-sunderland-deal-2026]]"

    "mgs6-ev-first-drive": {
      "title": "MG MGS6 EV 首試：空間與舒適佳，充電速度落後同級",
      "url": "https://www.electrive.com/2026/04/09/first-drive-mgs6-ev-impresses-with-space-but-falls-short-on-charging-speed",
      "updated": "2026-04-13",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/first-drive-mgs6-ev-impresses-with-space-but-falls-short-on-charging-speed](https://www.electrive.com/2026/04/09/first-drive-mgs6-ev-impresses-with-space-but-falls-short-on-charging-speed)\n\n# MG MGS6 EV 首試：空間與舒適佳，充電速度落後同級\n\n**原文**：electrive／Daniel Bönnighausen｜**發布**：2026-04-09\n\n## 摘要\nMG Motor（SAIC 旗下）推出中型電動 SUV MGS6 EV，首試在葡萄牙進行，空間慷慨、舒適度高、配備豐富；但最高 144 kW 的 DC 快充速度已落後 2026 年主流水準。\n\n## 產品規格\n\n| 項目 | 數值 |\n|------|------|\n| 車長 | 4.71 m（軸距 2.84 m）|\n| 動力（RWD）| 180 kW / 350 Nm，0-100 km/h 7.3 秒 |\n| 動力（AWD）| 266 kW / 540 Nm，0-100 km/h 5.1 秒 |\n| 電池 | 77 kWh（可用 74.3 kWh）|\n| WLTP 續航 | 530 km（實測 310~413 km）|\n| AC 充電 | 11 kW |\n| DC 快充 | **最高 144 kW**（10→80%：~38 分鐘）|\n| 行李廂 | 674 L（折疊後 1,910 L）+ frunk 124 L |\n| 拖曳 | 1,500 kg（有剎車）|\n| 德國售價（RWD）| 從 €49,990 起 |\n\n## 競爭定位\n- **大於**：VW ID.4、Skoda Enyaq、Hyundai Ioniq 5、Kia EV6\n- **小於**：Tesla Model Y、Xpeng G6、Audi Q6 e-tron、BMW iX3\n\n## 充電速度比較（10→80%）\n| 車型 | 時間 |\n|------|------|\n| MG MGS6 EV | ~38 分鐘（144 kW）|\n| VW ID.4 | <30 分鐘 |\n| BMW iX3 | 21 分鐘（82.6 kWh）|\n| Hyundai/Kia/Xpeng 同級 | 更快 |\n\n## 優缺點\n- **優點**：空間大、配備豐富（熱泵標配）、售價具競爭力、frunk 實用\n- **缺點**：充電速度落後、HUD 僅顯示內建導航（不支援 Google Maps）、懸吊在粗糙路面略硬\n\n## Related\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/歐洲EV市場]]"
    },
    "microvast-iveco-battery-partnership": {
      "title": "Microvast × Iveco Group：次世代商用車電池包合作擴展",
      "url": "https://www.sustainable-bus.com/components/microvast-iveco-batteries-partnership-next-generation",
      "updated": "2026-04-09",
      "body": "**來源**：[https://www.sustainable-bus.com/components/microvast-iveco-batteries-partnership-next-generation](https://www.sustainable-bus.com/components/microvast-iveco-batteries-partnership-next-generation)\n\n# Microvast × Iveco Group：次世代商用車電池包合作擴展\n\n**原文**：Sustainable Bus｜**發布**：2026-04-09\n\n## 摘要\nMicrovast 與 Iveco Group 宣布擴展自 2017 年起的電池合作關係，針對歐洲商用車市場開發次世代電池技術，生產錨定歐洲（都靈廠）。\n\n## 合作歷程\n\n| 階段 | 產品 | 說明 |\n|------|------|------|\n| 2017 年起 | IVECO eDaily 電池系統 | VDA 模組 + 52 Ah 電芯，仍在生產 |\n| 2023 年 | MV-I Gen 1 | 都靈 FPT ePowertrain 廠組裝，整合至 Iveco Bus 平台 |\n| 現行 | MV-I Gen 2 | 應用於全系列 Iveco Bus + Iveco S-eWay 重型卡車 |\n| 未來 | Gen 3（開發中）| 針對歐洲商用車市場 |\n\n## 都靈廠產能\n- 安裝容量：**1.3 GWh**，具擴充空間\n- 功能：電池包組裝\n\n## Microvast 製造支援\n- 湖州 3.2 廠產能擴充中，支援 Iveco Group 未來訂單\n\n## 應用範圍\n輕型商用車（eDaily）→ 大客車（Bus）→ 重型卡車（S-eWay）\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/車輛類型/電動商用車]]"
    },
    "milence-electric-truck-tco": {
      "title": "Milence：歐洲電動重卡經濟性改善，但各國進度不均",
      "url": "https://www.electrive.com/2026/04/09/milence-electric-truck-economics-improve-as-europe-rollout-remains-uneven",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/milence-electric-truck-economics-improve-as-europe-rollout-remains-uneven](https://www.electrive.com/2026/04/09/milence-electric-truck-economics-improve-as-europe-rollout-remains-uneven)\n\n# Milence：歐洲電動重卡經濟性改善，但各國進度不均\n\n**原文**：electrive／Carla Westerheide｜**發布**：2026-04-09\n\n## 摘要\n充電站運營商 Milence 白皮書指出，電動重卡 TCO 在荷蘭、丹麥等先進市場已接近或超越柴油成本平價，但歐洲整體推進仍嚴重不均。\n\n## TCO 分析重點\n\n| 國家 | 狀況 |\n|------|------|\n| 荷蘭 | 2026 年起多數場景電動重卡已具成本優勢 |\n| 德國 | 零排放重卡免路費延至 2031 年，可預期成本效益顯著 |\n| 瑞典 | 電費低但缺少路費優惠，長途成本平價延遲 |\n\n## 技術改善\n- 現代電動重卡能耗：**約 1.1 kWh/公里**（持續優化）\n- 新市場進入者增加 → 車價競爭壓低\n\n## 充電基礎建設現況\n- 歐洲主要貨運走廊適合卡車的公共充電點：**約 1,800 個**\n- Milence 自營：33 個充電樞紐，221 個充電點，覆蓋 8 國\n\n## 關鍵結論\n> **「歐洲面臨的不是技術缺口，而是政策缺口。」** — Milence\n\n- 能源危機推升柴油成本 9~11 歐分/公里，反而有利電動重卡競爭\n- 各國政策差異導致「多速轉型」，跨境物流複雜化\n\n## Related\n- [[concepts/車輛類型/電動卡車市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/歐洲EV政策]]"
    },
    "milence-paris-berlin-corridor": {
      "title": "Milence 電動卡車 Paris→Berlin 走廊測試：電比柴油更便宜（2026-04）",
      "url": "https://www.electrive.com/2026/04/23/four-electric-trucks-test-milence-corridor-from-paris-to-berlin",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.electrive.com/2026/04/23/four-electric-trucks-test-milence-corridor-from-paris-to-berlin](https://www.electrive.com/2026/04/23/four-electric-trucks-test-milence-corridor-from-paris-to-berlin)\n\n# Milence 電動卡車 Paris→Berlin 走廊測試：電比柴油更便宜（2026-04）\n\n**原文**：electrive.com／Cora Werwitzke｜**發布**：2026-04-23\n\n## 摘要\nMilence（Daimler Truck + Traton + Volvo Group 合資）在德國 Kassel-Lohfelden 開設第 9 個德國站，並舉辦「Power to Go Further」電動卡車跨國示範巡迴：4 輛重型電動卡車完成 Paris → Berlin 1,000km 路線，單程電力成本 **€0.995/km** 已低於柴油 **€1.003/km**。\n\n## 示範巡迴數據\n\n| 項目 | 數值 |\n|------|------|\n| 路線 | Paris → Berlin（德、比、荷、法 4 國）|\n| 總距離 | **1,000km** |\n| 參與車型 | Mercedes-Benz eActros 600 / MAN eTGS ultra-trailer / Renault E-Tech T / Volvo FH Electric |\n| 最長單段 | 320~350km（eActros 600 以 32 噸部分載重完成）|\n| 充電 | 全程使用 Milence 充電站 |\n\n## 電 vs 柴油成本比較\n\n| 燃料 | 每公里運營成本 |\n|------|-------------|\n| 電力（Milence）| **€0.995/km** |\n| 柴油 | **€1.003/km** |\n| **差距** | **電力已更便宜（+0.8%）** |\n\n使用再生能源時：估計每輛每次 **節省 1,470kg CO₂**\n\n## Kassel-Lohfelden 充電站亮點\n\n- Milence 德國第 9 站\n- **首個整合固定式電池儲能系統**的 Milence 充電站\n- 4 個充電位（各 400kW CCS）\n- 電池儲能使得在電網連接不足的地點也能擴展\n\n## Milence 網絡現況（2026 年 4 月）\n\n| 指標 | 數值 |\n|------|------|\n| 運營充電站 | **34 個**（221 個充電點）|\n| 覆蓋國家 | 8 個歐洲市場 |\n| 2026 年底目標 | **50 個站**（10 個歐洲市場）|\n| 2028 年目標 | 90 個站；71 個地點的 284 個 MCS 充電點 |\n\n## 意義\n\n**電動重卡走廊的經濟可行性首次得到確認**：歐洲主幹線電動重卡運營成本已低於柴油，是商業大規模採用的關鍵信號。\n\n## Related\n- [[concepts/車輛類型/電動商用車]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/edf-electric-hgv-investment]]\n- [[sources/dragonize-truck-charging]]"
    },
    "mitsubishi-hev-japan-2028": {
      "title": "三菱汽車：2028 年日本導入 HEV，BEV/PHEV 策略轉向（2026-05-11）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753903",
      "updated": "2026-05-11",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753903](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753903)\n\n# 三菱汽車：2028 年日本導入 HEV，BEV/PHEV 策略轉向（2026-05-11）\n\n**原文**：Digitimes（范仁志）/ Nikkei｜**發布**：2026-05-05, 2026-05-11\n\n## 摘要\n三菱汽車計畫自 2028 年起在日本生產並銷售 HEV 車款（Outlander/RVR SUV 版本）。過去三菱日本僅有 BEV 與 PHEV，此次策略轉向反映日本 HEV 需求遠超 BEV/PHEV 的市場現實。\n\n## 關鍵數據\n\n| 指標 | 數值 |\n|------|------|\n| 日本 2025 年 BEV 銷量（不含輕型車）| < 5 萬輛 |\n| 日本 2025 年 PHEV 銷量 | < 5 萬輛 |\n| 日本 2025 年 HEV 銷量 | **153 萬輛**（差距 >30 倍）|\n| GlobalData 2030 全球 HEV 預測 | **1,900 萬輛**（PHEV 的 3 倍+）|\n\n## 三菱策略調整\n\n| 市場 | 現況 | 計畫 |\n|------|------|------|\n| 東南亞（泰國）| HEV 已上市（2024）| — |\n| 菲律賓拉古納省 | 投資 HEV 產線 | 2028 年量產 |\n| **日本** | 僅 eK X EV（BEV）+ Outlander PHEV | **2028 年起新增 HEV**（Outlander/RVR SUV）|\n\n- 背景：Challenge 2025 中期計畫屆滿，新計畫尚未公布\n- 東南亞 HEV 以 PHEV 技術架構為基礎，節能 + 口碑佳\n\n## 產業趨勢脈絡\n\n- 豐田：北美加碼 HEV 產能\n- 通用汽車：與現代合作開發 HEV\n- 本田：北美大幅轉向 HEV + 燃油車\n- **意義**：日本車廠集體調整，HEV 從「過渡技術」升格為「長期核心產品線」\n\n## Related\n- [[concepts/地理市場/東南亞EV市場]]\n- [[concepts/地理市場/美國EV市場與政策]]"
    },
    "mitsubishi-motors-middle-east-routes-2026": {
      "title": "三菱汽車：中東替代航線測試與 HEV 全球布局（2026-05-12）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754851",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754851](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754851)\n\n# 三菱汽車：中東替代航線測試與 HEV 全球布局（2026-05-12）\n\n**原文**：Digitimes（范仁志）｜**發布**：2026-05-12\n\n## 摘要\n三菱汽車公布 FY2025 財報，受關稅損失衝擊，營業利益腰斬至 55%；公司同步評估繞行霍莫茲海峽的替代航線，並確認 HEV 為台灣、東南亞、紐澳市場核心戰略車種。\n\n## FY2025 財務數據\n\n| 指標 | 數值 | 變化 |\n|------|------|------|\n| 營業利益 | 755 億日圓（~€4.8 億）| **-46%** vs FY2024（1,388 億）|\n| 淨利 | 100 億日圓 | **-76%** vs FY2024 |\n| 關稅損失 | **474 億日圓** | 最大損失來源 |\n| 北美銷量 | — | **-11%** YoY |\n\n## FY2026 財測\n\n| 指標 | 預測 | 變化 |\n|------|------|------|\n| 營業利益 | 900 億日圓 | +19% |\n| 淨利 | 250 億日圓 | +150%（2.5×）|\n| 中東風險預留 | **300 億日圓** | 若霍莫茲斷航 |\n\n## 中東替代航線規劃\n\n- **中東銷量**：FY2025 約 4.8 萬輛（佔全年 79.7 萬輛的 6%）\n- **問題**：霍莫茲海峽面臨中斷風險\n- **替代方案**：\n  1. 阿曼馬斯開特（Muscat）港卸貨（海峽東南方）\n  2. 繞行非洲好望角後運往約旦\n- **現況**：兩條替代航線已展開試運行（中轉：新加坡、斯里蘭卡）\n- **緩衝**：中東現有約 4 個月庫存，短期不影響銷售\n\n## 市場聚焦策略\n\n- **核心市場**：台灣、東南亞、紐西蘭、澳洲\n- **核心車種**：HEV（對抗 BEV 為主的競爭策略）\n- 日本 2028 年 HEV 量產已傳出，但官方未正式確認（僅稱「未來推出新車款」）\n- 參見：[[sources/mitsubishi-hev-japan-2028]]\n\n## Related\n- [[concepts/地理市場/東南亞EV市場]]\n- [[sources/mitsubishi-hev-japan-2028]]"
    },
    "morrow-batteries-insolvency": {
      "title": "Morrow Batteries 宣告破產：歐洲電池製造再遇挫折（2026-05）",
      "url": "https://www.electrive.com/2026/05/11/norwegian-cell-manufacturer-morrow-batteries-files-for-insolvency",
      "updated": "2026-05-12",
      "body": "**來源**：[https://www.electrive.com/2026/05/11/norwegian-cell-manufacturer-morrow-batteries-files-for-insolvency](https://www.electrive.com/2026/05/11/norwegian-cell-manufacturer-morrow-batteries-files-for-insolvency)\n\n# Morrow Batteries 宣告破產：歐洲電池製造再遇挫折（2026-05）\n\n**原文**：electrive | Florian Treiss｜**發布**：2026-05-11\n\n## 核心事件\n\n挪威電池製造商 Morrow Batteries 向法院申請破產（insolvency），旗下子公司一併納入程序。這是繼瑞典 Northvolt 之後，歐洲電池製造業的另一重大失敗。\n\n## 企業背景\n\n| 項目 | 細節 |\n|------|------|\n| 成立地點 | 挪威 Arendal |\n| 主要股東 | Siemens（部分持股）|\n| 電池技術 | 稜柱型（Prismatic）LFP |\n| 工廠產能 | **1 GWh/年**（2024 年夏季啟用）|\n| 原計畫 | 4 階段擴張至 Arendal 43 GWh Gigafactory |\n\n## 失敗原因分析\n\n企業自述「原因複雜」，綜合如下：\n\n1. **規模過小**：1 GWh 僅夠供應 ~25,000 輛 40 kWh 小型車；相比 VW PowerCo Salzgitter 廠 20 GWh（可供 25 萬輛）\n2. **無法吸引大車廠採購**：體量不足以成為 Tier 1 電池供應商\n3. **融資失敗**：投資市場趨於保守，新投資者未入場\n4. **量產爬坡困難**：工廠疑似從未真正達到量產（高不良率）\n5. **電池價格下滑**：全球供過於求 → 新進者更難競爭\n6. **資本利率上升**：資金成本顯著提高\n\n## 與 Northvolt 的對比\n\n| | Northvolt | Morrow |\n|---|---|---|\n| 國家 | 瑞典 | 挪威 |\n| 支持者 | 大眾、BMW 等 | Siemens 部分持股 |\n| 計畫產能 | 數百 GWh | 43 GWh |\n| 失敗時程 | 2024 年破產 | 2026 年破產 |\n| 共同點 | 歐洲本土製造 × 高資本需求 × 中國競爭 |\n\n## 後續\n\n- 管理層表示將協助破產管理人，**爭取保留部分業務**\n- 工廠已建成的技術和設備「有望對歐洲電池業具有價值」（董事會主席語）\n\n## 意義\n\n歐洲本土電池製造路線連續受挫，顯示在中國供應鏈強大成本優勢下，小規模新進者難以為繼。歐洲電池製造的希望仍集中於 CATL（匈牙利廠）、三星 SDI、SK On 等亞洲廠商在歐洲的本地化投資。\n\n## Related\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/europe-battery-capacity-cuts]]\n- [[sources/northvolt-collapse]]"
    },

      "title": "Moto UK £5 億充電投資：4 倍擴容 + eHGV 超級樞紐（2026-04-30）",
      "url": "https://www.electrive.com/2026/04/30/moto-to-quadruple-number-of-ev-charging-bays",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.electrive.com/2026/04/30/moto-to-quadruple-number-of-ev-charging-bays](https://www.electrive.com/2026/04/30/moto-to-quadruple-number-of-ev-charging-bays)\n\n# Moto UK £5 億充電投資：4 倍擴容 + eHGV 超級樞紐（2026-04-30）\n\n**原文**：Electrive（Ciaran Daly）｜**發布**：2026-04-30\n\n## 摘要\n英國最大高速公路服務站業者 Moto Hospitality（60+ 站點）宣布 £5 億充電擴建計畫：乘用車充電位 4 倍增加，並新建 15 個電動重卡（eHGV）超級樞紐。\n\n## 計畫重點\n\n| 項目 | 數值 |\n|------|------|\n| 乘用 EV 充電位 | **4 倍擴容**（過去 5 年已建 1,000+ 超快充位）|\n| eHGV 超級樞紐 | **15 個**，每處最多 **100 個充電位** |\n| 部署路線 | 英國主要貨運走廊 |\n| 已獲規劃許可 | Swindon 新站 + Wrotham, Kent 重卡站 |\n\n## 投資數字\n\n| 時期 | 金額 |\n|------|------|\n| 已投資（過去 5 年）| **£3 億** |\n| 計畫投資（未來）| **£5 億** |\n| **合計** | **£8 億** |\n\n- 已為 10+ 個關鍵站點爭取到長期租約延展，確保投資穩定性\n\n## 意義\n\n- 英國電動重卡（eHGV）基礎建設最大單一民間承諾之一\n- 每個超級樞紐 100 個充電位，可大幅提升英國電動重卡走廊完整性\n- 與歐洲 Milence 走廊模式形成呼應\n\n## Related\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/車輛類型/電動卡車市場]]\n- [[concepts/地理市場/歐洲EV市場]]"

    "netherlands-ev-scrappage-2026": {
      "title": "荷蘭 EV 舊換新補貼計畫（2026-04）",
      "url": "https://www.electrive.com/2026/04/21/netherlands-plans-scrappage-scheme-to-support-switch-to-electric-cars",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.electrive.com/2026/04/21/netherlands-plans-scrappage-scheme-to-support-switch-to-electric-cars](https://www.electrive.com/2026/04/21/netherlands-plans-scrappage-scheme-to-support-switch-to-electric-cars)\n\n# 荷蘭 EV 舊換新補貼計畫（2026-04）\n\n**原文**：electrive.com / Florian Treiss｜**發布**：2026-04-21\n\n## 摘要\n荷蘭政府規劃新補貼方案：低中收入買家以 Euro 1~4 舊燃油車換購二手電動車，可獲 **€3,500** 報廢補貼。計畫從 2027 年提前至 **Q4 2026** 啟動，是中東能源危機應對方案的一部分（總規模 ~10 億歐元）。\n\n## 方案要點\n\n| 項目 | 詳情 |\n|------|------|\n| 補貼金額 | **~€3,500**（舊換新）|\n| 適用車型 | **二手電動車**（舊換新）|\n| 報廢條件 | 舊燃油車排放等級 Euro 1~4 |\n| 收入限制 | 低中收入（確切門檻未公布）|\n| 計畫總規模 | **€52 億**（其中 €5,200 萬用於本計畫）|\n| Q4 2026 啟動 | **€200 萬**（首批）|\n| 2027 年 | **€3,000 萬** |\n| 2028 年 | **€2,000 萬** |\n\n## 背景\n\n- 荷蘭過去 2020~2024 年曾實施 EV 補貼計畫（新車+二手，無報廢+無收入限制）\n- 本次設計更精準：**針對舊燃油車排放** + **收入限定**，避免補貼富裕族群\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]"

    "nio-self-chip-denvidia": {
      "title": "蔚來自研晶片出貨 55 萬顆，中國 EV 加速「去 NVIDIA 化」",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752382",
      "updated": "2026-04-17",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752382](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752382)\n\n# 蔚來自研晶片出貨 55 萬顆，中國 EV 加速「去 NVIDIA 化」\n\n**原文**：DIGITIMES／徐悅然 ｜ **發布**：2026-04-17\n\n## 摘要\n蔚來創辦人李斌在 2026 智慧電動汽車發展高層論壇揭露：電池與半導體合佔整車成本逾 50%，智慧電動車陷「系統性浪費」；蔚來自研晶片已出貨 55 萬顆、5nm 神璣 NX9031 導入多款車型並開始對外銷售，年省 NVIDIA 採購成本可觀。\n\n## 關鍵數據\n\n| 指標 | 數值 |\n|------|------|\n| 電池 + 半導體佔整車成本 | **>50%** |\n| 旗艦車搭載晶片總數 | 超過 4,000 顆，料號逾 1,000 種 |\n| 晶片整合目標 | 縮減至約 400 種 |\n| 自研晶片出貨量 | **55 萬顆**（含雷達主控 + 智駕 SoC）|\n| 代表產品 | 神璣 NX9031（5nm 製程）|\n| 歷史 NVIDIA 採購金額 | 高峰期 **$3 億美元/年** |\n| 電池包管理量 | 超過 100 萬顆，換電服務 >1 億次 |\n\n## 核心洞察\n\n### 「新車死亡效應」\n- 智慧 EV 三條技術線同步迭代：電池 + 晶片 + 整車智慧化\n- 產品生命周期縮短 → 新車上市即面臨爬坡 vs. 技術迭代落差\n\n### 垂直整合策略\n- **電池標準化**：LFP/三元成熟後，推動電芯規格收斂至 4~5 種 → 規模效益放大（尤其換電模式）\n- **晶片自研**：從外購 NVIDIA（4,000+ 種料號）→ 自研縮至 400 種 → 自研晶片對外銷售\n\n### 過去 NVIDIA 依賴\n- NT 2.0 平台全面搭載 4 顆 DRIVE Orin，算力 1,016 TOPS\n- 年度採購金額高峰達 $3 億美元\n\n## 意義\n- 中國 EV 廠去 NVIDIA 化是大趨勢，與中國科技業整體「去美化」一致\n- 自研晶片已成可向外部客戶銷售的商業產品（類似比亞迪半導體路線）\n\n## Related\n- [[entities/蔚來]]\n- [[concepts/基礎設施與供應鏈/車用半導體供應鏈]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[sources/qualcomm-bosch-adas-expansion]]\n- [[sources/jcet-robot-semiconductor]]"
    },
    "nissan-canada-dongfeng-ev-quota-2026": {
      "title": "日產借道加拿大 EV 配額：東風合資車款進軍美洲（2026-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755824",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755824](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755824)\n\n# 日產借道加拿大 EV 配額：東風合資車款進軍美洲（2026-05）\n\n**原文**：Digitimes | 江仁傑｜**發布**：2026-05-21\n\n## 核心策略\n\n日產汽車（Nissan）正研議將其與**中國東風汽車合資生產的車款**出口至加拿大，利用加拿大已開放的中國製 EV 進口配額。\n\n## 加拿大 EV 配額背景\n\n- **2026 年 1 月**：加拿大廢除實質性中國製 EV 禁令\n- 每年允許最多 **4.9 萬輛**中國製 EV 進入加拿大\n- Tesla 已開始在加拿大廣告中國製 Model 3（含運 CAD $42,132，~USD 30,900）\n\n## 日產計畫\n\n| 項目 | 細節 |\n|------|------|\n| 出口對象 | 日產 × 東風合資工廠生產的車款 |\n| 目標市場 | 加拿大（新增）+ 巴西、墨西哥等拉丁美洲 |\n| 首批車型 | **N7**（純電轎車）+ **Frontier Pro**（皮卡）→ 先進拉丁美洲 |\n| 出口目標 | 初步：10 萬輛/年 → 最終：30 萬輛/年（全球）|\n\n## 策略邏輯\n\n- 日產在中國市場因電動化起步遲銷量腰斬，轉而利用中國工廠低成本優勢反攻海外\n- 日產美洲區主管 Christian Meunier：「加拿大政府已為部分中國製產品打開大門」\n- 與日產宣布放棄密西西比廠 EV 生產同時進行（已在 Batch 17 收錄）\n\n## 意義\n\n日產的「借道加拿大」策略代表跨國車廠利用加拿大配額作為中國製 EV 進入北美的**過渡通道**，而非僅限中國本土品牌。此模式若成功，將影響整個北美 EV 政策辯論。\n\n## Related\n- [[concepts/北美EV關稅與政策]]\n- [[sources/nissan-mississippi-ev-abandonment]]\n- [[sources/china-evs-canada-chery-geely-2026]]"
    },
