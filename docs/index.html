    "tesla-fsd-eu-expansion-2026": {
      "title": "Tesla FSD（監督版）歐洲擴張：立陶宛首批 EU 核准，中國同步上線",
      "url": "https://www.electrive.com/2026/05/21/tesla-gets-green-light-for-fsd-supervised-in-lithuania",
      "updated": "2026-05-22",
      "body": "**來源**：[https://www.electrive.com/2026/05/21/tesla-gets-green-light-for-fsd-supervised-in-lithuania](https://www.electrive.com/2026/05/21/tesla-gets-green-light-for-fsd-supervised-in-lithuania)\n\n# Tesla FSD（監督版）歐洲擴張：立陶宛首批 EU 核准，中國同步上線\n\n**原文**：electrive.com，2026-05-21；Google Alerts 摘要，2026-05-22\n\n## 摘要\n\n立陶宛成為**歐盟第一個正式認可** Tesla FSD（監督版）的成員國（繼荷蘭核發型式認可後）；同週，Tesla 也在中國正式推出 FSD，被認為是馬斯克隨川普訪中後取得的成果。\n\n## 立陶宛：EU 第一個認可國\n\n| 項目 | 內容 |\n|------|------|\n| 認可國 | **立陶宛**（EU 成員國第一個）|\n| 法律依據 | Regulation (EU) 2018/858（EU 成員國可互認其他成員國的臨時型式核准）|\n| 原始核准 | 荷蘭車輛主管機關 **RDW** 核發的臨時 EU 型式核准 |\n| SAE 等級 | **Level 2 駕駛輔助**（非全自動駕駛）|\n| 駕駛責任 | 駕駛仍須全程監看，隨時準備接管 |\n\n立陶宛交通部長 Juras Taminskas：「立陶宛是歐洲最早能讓車輛自動行駛的國家之一。」\n\n## EU 整體進展\n\n- Tesla 最初尋求一次取得 EU 全境核准，但進程比預期複雜\n- 北歐國家（瑞典、挪威等）對 FSD 核准有保留意見\n- Tesla 戰略轉為：先取得「先行者」國家認可，再推動中期 EU 整體核准\n- 若無統一核准，跨國行駛可能形成「法規拼布」（一大不便）\n\n## 中國同步上線\n\n- Tesla 宣布 FSD（全自動駕駛）監督模式正式在**包括中國在內**的多個國家推出\n- 中國首次正式推出 FSD，被認為是馬斯克 2026 年訪中的外交成果\n- 戰略目的：以技術領先的 FSD 收復在中國流失的市占率、提升服務收益\n\n## 技術說明\n\n**FSD（Supervised）≠ 完全自動駕駛**\n- 官方分類：SAE Level 2（駕駛輔助，非 Level 3/4）\n- 功能：自動轉向、加速、制動，但駕駛**不能離開方向盤**\n- 名稱爭議：「Full Self-Driving」名稱具誤導性，已引發多國監管關注\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/Robotaxi自動計程車]]\n- [[concepts/歐洲EV市場]]\n- [[concepts/美國EV市場與政策]]"
    },
    "tesla-india-factory-exit-2026": {
      "title": "Tesla 宣布終止印度設廠計畫",
      "url": "https://auto.economictimes.indiatimes.com/news/industry/tesla-abandons-plan-to-build-factory-in-india/121277440",
      "updated": "2026-05-22",
      "body": "**來源**：[https://auto.economictimes.indiatimes.com/news/industry/tesla-abandons-plan-to-build-factory-in-india/121277440](https://auto.economictimes.indiatimes.com/news/industry/tesla-abandons-plan-to-build-factory-in-india/121277440)\n\n# Tesla 宣布終止印度設廠計畫\n\n**原文**：多家媒體報導，2026-05-19；Google Alerts 彙整，2026-05-22\n\n## 摘要\n\n印度重工業部長 H.D. Kumaraswamy 於 2026 年 5 月 19 日**公開確認**：Tesla 已決定終止在印度建立電動車製造工廠的投資計畫。印度政府對此表示遺憾，稱 Tesla「不識抬舉」。\n\n## 關鍵事實\n\n- **確認時間**：2026-05-19，由印度重工業部長 H.D. Kumaraswamy 公開說明\n- **主要障礙**：關稅問題（Tesla 要求在提高在地化之前先降低進口整車關稅）\n- **印度政府回應**：已為 Tesla 量身定制 EV 政策優惠，Tesla 拒絕是不明智之舉\n- **背景**：Tesla 2023 年以來多次接觸印度市場，馬斯克曾訪印但最終決定放棄設廠\n\n## 為何重要\n\n| 角度 | 意義 |\n|------|------|\n| 印度 EV 市場 | 少了 Tesla 品牌拉動效應，中高端市場由 Tata、Mahindra、現代、Kia 和 VinFast 主導 |\n| Tesla 全球佈局 | 顯示印度建廠壁壘（關稅、規模效益）過高，Tesla 選擇放棄 |\n| 中國品牌機會 | VinFast（已在印度）、BYD（嘗試進入）等可填補 Tesla 撤退的形象空缺 |\n| 政策信號 | 印度「先建廠再降稅」政策堅持，可能令其他外資車廠重新評估進入策略 |\n\n## 與 Tesla FSD 印度的關係\n\nTesla 雖退出印度製造，但**進口銷售**和 FSD/軟體佈局仍可能存在——目前尚未有明確宣告。\n\n## Related\n- [[concepts/印度EV市場]]\n- [[entities/Tesla]]\n- [[concepts/北美EV關稅與政策]]"
    },

      "updated": "2026-04-23",
      "body": "**來源**：[https://auto.economictimes.indiatimes.com](https://auto.economictimes.indiatimes.com)\n\n# Tesla 印度推出 Model Y L 六座版：₹61.99 萬起，2026 年 6 月交車\n\n**原文**：ETAuto ｜ **發布**：2026-04-22\n\n## 摘要\nTesla 在印度推出 Model Y 長軸距六座版（Model Y L），售價 **₹61.99 萬（約 $7.4 萬美元）**，2026 年 6 月開始交付。這是 Tesla 在印度首款六座 MPV 配置，目標對標豪華三排座 SUV 市場。\n\n## 規格\n\n| 項目 | 數值 |\n|------|------|\n| 售價 | **₹61.99 萬（ex-showroom）** |\n| 座位配置 | **6 座**（2+2+2）|\n| 軸距 | **3,040mm**（延長版）|\n| 續航 | **681 公里** |\n| 動力系統 | 雙馬達 AWD |\n| 交車時間 | **2026 年 6 月**起 |\n| 月付方案 | 從 ₹49,000 起 |\n\n- 試駕地點（2026-04-23 起）：BKC（孟買）、Aerocity（德里）、Orchid Business Park（古爾格拉姆）\n\n## 市場定位\n- 競爭對象：豪華三排座 SUV（BEV 市場尚屬空白）\n- 印度策略：繼標準版 Model Y 後，以更大車型攻入家庭用戶\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/地理市場/印度EV市場]]"

    "tesla-korea-q1-2026": {
      "title": "Tesla 2026 Q1 首奪南韓進口車銷售冠軍",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751720",
      "updated": "2026-04-13",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751720](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751720)\n\n# Tesla 2026 Q1 首奪南韓進口車銷售冠軍\n\n**原文**：DIGITIMES／陳玟靜｜**發布**：2026-04-13\n\n## 摘要\nTesla 2026 年 Q1 在南韓進口車市場首次奪冠，銷售 20,964 輛（年增逾 4 倍），市占率 25.53%，打破 BMW、賓士長期輪流稱霸的格局。價格下調、油價高漲、政府補貼是主要驅動因素。\n\n## 關鍵數據\n\n| 品牌 | 2026 Q1 銷量 | 市占率 | YoY |\n|------|------------|--------|-----|\n| Tesla | 20,964 輛（**第一**）| 25.53% | +4倍 |\n| BMW | 19,368 輛（第二）| 23.58% | 小幅成長 |\n| 賓士 | 15,862 輛（第三）| 19.32% | 小幅成長 |\n\n- 2025 全年：BMW 77,127（冠）/ 賓士 68,467（二）/ Tesla 59,916（三）\n- Tesla 自 2017 年進入韓國市場以來首次單季奪冠\n\n## Q1 月別銷量（Tesla）\n| 月份 | 銷量 |\n|------|------|\n| 2026 年 1 月 | 1,966 輛 |\n| 2026 年 2 月 | 7,868 輛 |\n| 2026 年 3 月 | 11,130 輛 |\n\n## 成長驅動因素\n1. **價格下調**：2026 年 1 月 Model 3 標準版降至約 4,199 萬韓元（~US$28,000），含補貼實際落在 3,000 萬韓元區間\n2. **高油價**：美伊衝突推升燃料費用\n3. **韓國政府政策**：車號限行 + 電動車補貼提前確認\n4. **韓國進口 EV 市場整體爆發**：Q1 2026 達 31,498 輛（vs 2025 Q1 僅 10,050 輛，+3 倍）\n\n## 市場解讀\n- 分析師認為 Tesla 更多是搶奪**韓國國產車**市場（Model 3/Y 售價與現代、起亞相近）\n- BMW、賓士等進口豪華品牌受到的直接衝擊有限\n- BYD、Polestar 在韓國也分別成長約 400 倍與 2 倍\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/地理市場/美國EV市場與政策]]"
    },
    "tesla-lfp-taiwan-2026": {
      "title": "Tesla LFP 自主供應鏈：台灣立凱電能為前驅體關鍵夥伴",
      "url": "",
      "updated": "2026-06-12",
      "body": "**來源**：Digitimes 黃女瑛（2026-06-12）\n\n# Tesla LFP 自主供應鏈：台灣立凱電能為前驅體關鍵夥伴\n\n## 核心事件\n\nTesla 正建立**北美自主 LFP 電池前驅體供應鏈**，台灣鋰電池正極材料廠**立凱電能**（ALEEES）獲確認為關鍵夥伴。立凱公開增資說明書揭露需求量，市場普遍認為主要客戶即為 Tesla。\n\n## 供貨計畫\n\n| 年度 | 立凱供貨量 | 客戶整體需求 |\n|------|-----------|------------|\n| 2027 年 7 月（首批）| — | — |\n| **2027 年（第 1 年）** | **~1.2 萬噸** | — |\n| **2028 年（滿載）** | **5 萬噸** | **~10 萬噸** |\n| 未來（Megafactory 全速）| — | **40~50 萬噸**（估算）|\n\n- 立凱持有 LFP 相關**專利技術**，有助繞開中國技術封鎖\n- 前驅體由台灣立凱生產 → 亞洲正極材料廠加工 → 美國電池製造商\n\n## Tesla LFP 供應鏈建構邏輯\n\n```\n礦產資源（美國鋰精煉廠）\n    ↓\n前驅體製造（台灣立凱）\n    ↓\n正極材料加工（亞洲夥伴）\n    ↓\n電芯生產（Tesla + 合作廠）\n    ↓\n系統整合（Tesla）\n```\n\n目標：**從礦產到系統整合，逐步垂直整合**，脫離對中國 LFP 供應鏈的依賴。\n\n## 美國 LFP 的挑戰\n\n| 挑戰 | 說明 |\n|------|------|\n| 中國專利壁壘 | 中國廠商已建立 LFP 密集專利網，繞開需技術路線選擇 |\n| 規模差距 | Tesla 2028 年需求 10 萬噸 vs 中國廠 20~30 萬噸級 |\n| FEOC 限制 | 億緯鋰能（中資背景）在美第三廠受阻 |\n\n**美國 LFP 兩條路線**：\n1. **專業電池廠**：LGES（最有機會突破專利）、SK On、三星SDI\n2. **車廠自製**：Tesla、Ford（×CATL 技術授權）、GM（→轉 LMR/鈉離子）\n\n## Tesla 德州 Megafactory（儲能）\n\n- 規劃年產能：**40~50 GWh**（Megapack 大型儲能系統）\n- 若全速生產，前驅體年需求估 **40~50 萬噸**（數量級遠超現階段）\n- Tesla 論述：EV + 儲能 + 機器人 + 太空資料中心，需求規模無可匹敵\n\n## 市場環境：美國 vs 中國\n\n| 項目 | 美國 | 中國 |\n|------|------|------|\n| 補貼 | 豐厚「美國製造」補貼 | 已退坡 |\n| 溢價 | 美系業者接受**中國進口2倍價格**購買美製電池 | — |\n| 技術 | 中國第四代電池技術已列戰略資源，限制出口 | 技術最先進但不出口 |\n| 規模經濟 | 起步中 | 已達極致（但內捲嚴重，獲利率低）|\n\n## Related\n- [[concepts/電池技術路線]]\n- [[concepts/儲能市場]]\n- [[concepts/車用半導體供應鏈]]\n- [[entities/Tesla]]\n- [[sources/ford-energy-dc-block-2026]]\n- [[sources/gm-battery-diversification-2026]]"
    },
    "tesla-model-s-final-production": {
      "title": "Tesla Model S / X 正式停產（2026-05）",
      "url": "https://www.electrive.com/2026/05/11/final-tesla-model-s-rolls-off-the-production-line",
      "updated": "2026-05-12",
      "body": "**來源**：[https://www.electrive.com/2026/05/11/final-tesla-model-s-rolls-off-the-production-line](https://www.electrive.com/2026/05/11/final-tesla-model-s-rolls-off-the-production-line)\n\n# Tesla Model S / X 正式停產（2026-05）\n\n**原文**：electrive | Sebastian Schaal｜**發布**：2026-05-11\n\n## 核心事件\n\n- **最後一輛 Model S / X** 於 2026 年 5 月初在加州 Fremont 廠下線\n- Model S：**生產 14 年**（首輛生產時間追溯至 2012 年）\n- Model X：**生產 11 年**\n- Fremont 廠原 Model S/X 產線改建為 **Optimus 人形機器人工廠**（目標年產 100 萬台）\n\n## 銷售數據背景\n\n| 指標 | 數值 |\n|------|------|\n| 2025 年「其他車型」銷量 | **50,850 輛**（含 Model S、X、Cybertruck）|\n| 2025 年 Model 3 + Y 銷量 | 160 萬輛 |\n| Fremont 廠 Model S/X 設計產能 | 100,000 輛/年 |\n| 德州 Cybertruck 產能 | 125,000 輛/年 |\n\n→ 推算 Fremont 高端產線**實際產能利用率極低**\n\n## Signature Edition 紀念款\n\n- 限量 350 輛（Model S 250 輛 + Model X 100 輛）\n- 售價 **$159,420**，僅供選定車主購買\n- 外觀：石榴紅漆、金色 Tesla 標誌、金色煞車卡鉗、內裝 \"Signature\" 刻字\n- **爭議**：5 月 12 日交車活動在前一個週末突然延期，已付款車主強烈不滿\n\n## 歷史意義\n\n- Model S 是 Tesla 繼 Roadster（基於 Lotus 底盤）後第一款完全自主開發的車型\n- 2012 年量產即奪下「年度最佳汽車」，開創純電高端轎車市場\n- 停產宣告 Tesla 從「高端先行」到「平價量產 + 機器人」的戰略轉型完成\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[sources/tesla-q1-2026-earnings]]"
    },

      "url": "https://insideevs.com/news/796162/tesla-model-y-price-increase-may-2026",

      "body": "**來源**：[https://insideevs.com/news/796162/tesla-model-y-price-increase-may-2026](https://insideevs.com/news/796162/tesla-model-y-price-increase-may-2026)\n\n# Tesla Model Y 兩年來首次漲價，Ioniq 5 與 Mustang Mach-E 相對競爭力提升（2026-05）\n\n**原文**：InsideEVs | Iulian Dnistran｜**發布**：2026-05-18\n\n## 漲價細節\n\n| 車型 | 漲幅 | 最新售價 |\n|------|------|---------|\n| 入門版（Standard RWD）| **不變** | **$41,630** |\n| Premium RWD | **+$1,000** | **$47,630** |\n| Premium AWD | **+$1,000** | 未披露 |\n| Performance AWD | **+$500** | **$59,630** |\n\n- Tesla **兩年內首次**上調 Model Y 美國售價（上次降價為 2024 年，最多 -$2,000）\n- Tesla 未說明漲價原因\n\n## 競品比較\n\n### Hyundai Ioniq 5（2026 款）\n| 版本 | 售價 | 續航（EPA）| 備注 |\n|------|------|-----------|------|\n| SE Standard Range | **$36,600** | 245 英里 | 入門 |\n| Limited | 低於 Premium Model Y | — | 高階版仍比 Model Y 便宜 |\n| 原廠折扣 | 最高 **$8,750** | — | 主動促銷 |\n\n### Ford Mustang Mach-E（2026 款）\n| 版本 | 售價 | 續航（EPA）|\n|------|------|-----------|\n| Select | $40,535 | 260 英里 |\n| Premium AWD | $51,580 | 300 英里 |\n| 原廠折扣 | 最多 -$3,000 | — |\n\n## 市場意義\n\n- Tesla 持續降價策略轉向，而競爭對手（Hyundai、Ford）正大幅促銷\n- 以比較論：\n  - **Ioniq 5 起售 $36,600**，比 Model Y 入門低 $5,030；但 Model Y 續航優勢（321 英里 vs 245 英里）\n  - **Mach-E Select $40,535**，比 Model Y 入門更便宜（260 英里 vs 321 英里）\n- Model Y 漲價可能是需求信心強化訊號，但時機逆勢\n\n## Related\n- [[concepts/美國EV市場與政策]]\n- [[entities/Tesla]]\n- [[sources/congress-ev-annual-fee-2026]]"

    "tesla-q1-2026-earnings": {
      "title": "Tesla Q1 2026 財報：獲利超預期，Capex 大增至 $250 億，Model S/X 停產轉 Optimus",
      "url": "https://www.cnbc.com/2026/04/22/tesla-tsla-q1-2026-earnings-report.html",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.cnbc.com/2026/04/22/tesla-tsla-q1-2026-earnings-report.html](https://www.cnbc.com/2026/04/22/tesla-tsla-q1-2026-earnings-report.html)\n\n# Tesla Q1 2026 財報：獲利超預期，Capex 大增至 $250 億，Model S/X 停產轉 Optimus\n\n**原文**：CNBC ｜ **發布**：2026-04-22\n\n## 摘要\nTesla Q1 2026 調整後 EPS $0.41 超過預期的 $0.37，但收入略低於預期。關鍵策略轉折：Model S/X 停產，Fremont 工廠轉型 Optimus 人形機器人量產基地；全年資本支出大幅提升至 **$250 億**（原預測 $200 億）。\n\n## 關鍵財務數字\n\n| 指標 | 實際 | 預期 |\n|------|------|------|\n| EPS（調整後）| **$0.41** | $0.37 |\n| 總收入 | **$22.39B**（+16% YoY）| $22.64B |\n| 汽車收入 | **$16.2B**（+16% YoY）| — |\n| 能源部門收入 | **$2.41B**（-12% YoY）| — |\n| 淨利潤 | **$477M**（+17% YoY）| — |\n| 汽車毛利率（不含積分）| **19.2%**（全年最高）| — |\n| Q1 交車量 | **358,023 輛**（+6% YoY，但低於上季）| — |\n\n## 重大策略決定\n\n### 1. 資本支出大幅提升\n- 2026 全年 Capex：**超過 $250 億**（原預測 $200 億，再增 $50 億）\n- Q1 Capex 已跳升 67% 至 $24.9 億\n- 用途：基礎設施、製造產能、AI/自動駕駛研發\n\n### 2. Model S/X 停產 → Optimus 工廠\n- Fremont 廠原生產 Model S/X，將**全面轉型**為 Optimus 人形機器人量產基地\n- Q2 開始「首個 Optimus 大型工廠」準備工作\n- Optimus 年產量目標：**100 萬台/年**\n- Musk 預計「7 月底~8 月」發布下一代 Optimus 機器人\n\n### 3. Hardware 3 用戶無法升級無人監督 FSD\n- 搭載 HW3 的 Model 3/Y 舊款**不支援**未來無人監督 FSD\n- Tesla 將推出折扣硬體升級換購方案（HW5 升級路徑）\n- 影響：大量已購 FSD 的 HW3 車主面臨需要換車或付費升級\n\n### 4. 更平價的 Model 3/Y 版本\n- Tesla 確認計畫推出 Model Y 和 Model 3 的「更平價車型」\n\n## 市場背景\n- Tesla 股價 YTD 下跌 14%，落後所有大型科技股\n- 面臨中國競爭對手（比亞迪、小米）高科技低成本攻勢\n- CEO Musk 政治活動引發消費者抵制，尤其歐洲和加州\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]"
    },
    "tesla-robotaxi-texas-reality-2026": {
      "title": "Tesla Robotaxi 德州現實：僅 42 輛（2026-06-02）",
      "url": "https://www.electrive.com/2026/06/02/tesla-robotaxi-only-42-vehicles-registered-in-texas/",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.electrive.com/2026/06/02/tesla-robotaxi-only-42-vehicles-registered-in-texas/](https://www.electrive.com/2026/06/02/tesla-robotaxi-only-42-vehicles-registered-in-texas/)\n\n# Tesla Robotaxi 德州現實：僅 42 輛（2026-06-02）\n\n**原文**：electrive.com｜**發布**：2026-06-02\n\n## 摘要\n依據德州機動車輛局（Texas DMV）登記資料，Tesla Robotaxi 在德州實際上路數量僅有 **42 輛**，與 Musk 曾承諾的「1,000 輛以上」相差懸殊。此資料由獨立研究者依公開資料統計得出。\n\n## 關鍵事實\n\n| 指標 | 數值 |\n|------|------|\n| 德州 DMV 登記數量 | **42 輛** |\n| Musk 曾承諾數量 | 1,000+ 輛 |\n| 差距比率 | 約 1/24 |\n| 服務城市 | Austin TX（初期） |\n\n## 背景脈絡\n- Tesla 於 2026 年 6 月正式在德州奧斯汀啟動 Robotaxi 收費服務\n- 同期 Waymo 已在 San Francisco、Phoenix、Austin 運營約 700 輛無人駕駛車\n- Alphabet（Waymo）vs Tesla Robotaxi：Waymo 依賴 LiDAR+攝影機冗餘感知，Tesla 純視覺（Camera-only）\n- 42 輛規模接近「小型試點」，遠未達「城市規模自駕服務」門檻\n\n## 市場意義\n- 凸顯 Tesla FSD（Supervised → Unsupervised）技術路線轉換挑戰\n- 投資者預期 vs 技術現實的落差，加劇市場對 Tesla 自駕時程的質疑\n\n## Related\n- [[concepts/Robotaxi自動計程車]]\n- [[concepts/Tesla]]\n- [[sources/waymo-battery-secondlife-colorado-recycling-2026]]"
    },
    "tesla-semi-production-2026": {
      "title": "Tesla Semi 量產啟動（2026-04-30）",
      "url": "https://www.electrive.com/2026/04/30/tesla-unveils-its-first-mass-produced-electric-truck",
      "updated": "2026-05-13",
      "body": "**來源**：[https://www.electrive.com/2026/04/30/tesla-unveils-its-first-mass-produced-electric-truck](https://www.electrive.com/2026/04/30/tesla-unveils-its-first-mass-produced-electric-truck)\n\n# Tesla Semi 量產啟動（2026-04-30）\n\n**原文**：Electrive（Cora Werwitzke）｜**發布**：2026-04-30\n\n## 摘要\nTesla 電動大卡車 Semi 正式開始高產量量產，首輛從 Gigafactory Nevada 全新生產線下線。這是 Tesla 史上開發周期最長的車型（2017 年亮相，原定 2019 年上路，2026 年才量產）。\n\n## 關鍵數據\n\n| 規格 | 數值 |\n|------|------|\n| 生產地點 | Gigafactory Nevada 旁獨立廠房 |\n| 年產能規劃 | **最高 50,000 輛**（逐步爬坡）|\n| 標準版 | 325 英里（~523km），GVW 82,000 磅（~37.2 噸），**$260,000** |\n| 長程版 | 500 英里（~800km），**$290,000** |\n| 動力 | 三電機整合，最高 **800 kW** |\n| 充電 | 支援 **兆瓦充電（1.2 MW）** |\n\n- 售價為美國 Class 8 BEV 半掛車中**最低**\n- 預生產車輛：約 36 輛在 PepsiCo 加州車隊運行\n\n## 充電基礎建設\n\n- 首座 Megacharger 站：加州安大略（Ontario, CA）已啟用\n- 全美計畫：再增 66 個站點，分布 15 個州\n\n## 市場需求驗證\n\n加州清潔卡車補貼計畫（2025-01 至 2026-02）：\n- 共 1,067 份申請，**965 份指定 Tesla Semi**\n- 戴姆勒 + Paccar + Volvo 合計 < 100 份\n→ **市場需求高度集中於 Tesla Semi**\n\n## 電池規格正式確認（CARB，2026-05-11）\n\nCalifornia Air Resources Board（CARB）官方文件正式公布 Tesla Semi 電池容量：\n\n| 版本 | 電池容量（可用）| 動力輸出 | 重量（空車）|\n|------|--------------|---------|-----------|\n| 標準版 | **548 kWh** | **525 kW**（CARB 資料）| <9.07 噸 |\n| 長程版 | **822 kWh** | **800 kW** | 10.43 噸 |\n\n- 電池化學：Tesla 自製 **4680 NCMA** 電芯\n- 推測：長程版採 **3 組電池包**，標準版 **2 組**\n- 長程版並使用延伸底盤（extended chassis）\n- 注意：特斯拉官網仍標示兩版本均 800 kW，但 CARB 文件顯示標準版僅 525 kW\n- 理論最大續航計算（822 kWh / 1.7 kWh/mile）= **483 英里**，略低於標榜 500 英里\n\n## 4680 Cybercell（第二代）規格（2026-05-13）\n\nDigitimes 引述 Tesla 官方資料，Tesla Semi 採用的 4680 電芯為「**Cybercell**」（4680 二代），技術規格顯著升級：\n\n| 規格 | Cybercell 數值 |\n|------|--------------|\n| 能量密度 | **272 Wh/kg**（舊款 4680 約 244 Wh/kg，提升 ~11%）|\n| 製造工藝 | **乾電極（dry electrode）**製程 |\n| 結構 | **無極耳（tabless）+ 直接焊蓋（direct lid welding）** |\n| 充電峰值 | **1.2 MW Megacharger** 峰值充電功率 |\n\n- 乾電極製程為 Tesla 長期攻克的技術難關，可降低製造成本並提升生產速度\n- 無極耳設計延續 4680 初代設計，直接焊蓋為新增改良\n- 272 Wh/kg 使 Semi 在電池重量相同下可提供更高有效負載餘裕\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/車輛類型/電動卡車市場]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[sources/tesla-basecharger-depot]]"
    },

      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751441&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751441&grid_seq1=&grid_seq2=)\n\n# Tesla 稱霸台灣 EV 市場：2026 年 3 月市占率 77.5%\n\n**原文**：DIGITIMES／何致中｜**發布**：2026-04-08\n\n## 關鍵數據\n- **3 月交付量**：5,421 輛\n- **台灣 EV 市場市占率**：77.5%\n- **排名**：進口車全品牌 + 電動車全品牌 雙榜第一\n\n## 車款表現\n| 車款 | 3 月交付 | 備註 |\n|------|---------|------|\n| Model Y | 4,540 輛 | 全車種新車銷售冠軍；全球累積 400 萬輛 |\n| Model 3 | — | 豪華進口轎車榜首；全球累積 300 萬輛；發表 10 週年 |\n\n## 2025 年全年台灣數據\n- Model Y：13,384 輛（佔全台純電車市場 45% 以上）\n- Model Y 2023-2025 蟬聯全球自用小客車年度銷量冠軍\n\n## 促銷動態\n- Q2 2026 新推：「不限品牌換購 Tesla 均享 NT$30,000 加碼補貼」\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/地理市場/台灣EV市場]]"

    "thailand-ev-2026-update": {
      "title": "泰國 EV 市場 2026 年更新：30 萬輛目標 + EV 3.5 政策延伸",
      "url": "https://sunmedia.tw/news/Industry-information/1777178258",
      "updated": "2026-04-27",
      "body": "**來源**：[https://sunmedia.tw/news/Industry-information/1777178258](https://sunmedia.tw/news/Industry-information/1777178258)\n\n# 泰國 EV 市場 2026 年更新：30 萬輛目標 + EV 3.5 政策延伸\n\n**原文**：商傳媒 / 多個來源｜**發布**：2026-04-24~27\n\n## 摘要\n泰國設定 2026 年 4 月前達成全國 **30 萬輛** EV 上路的里程碑，透過 EV 3.0 / EV 3.5 兩大政策框架推動。2026 年 EV 市場成長率預期 **+40%**（達 16~18 萬輛），中國品牌（尤其比亞迪）主導格局。\n\n## EV 政策框架\n\n| 政策 | 期間 | 重點 |\n|------|------|------|\n| **EV 3.0** | 2022~2025 | 補助 2~10 萬泰銖；降貨物稅；限 200 萬泰銖以下車款 |\n| **EV 3.5** | 延伸至 2027 | 補助繼續；本地化生產要求**更嚴格**；吸引電池廠+組裝廠進駐 |\n\n## 2026 年市場預測\n\n| 指標 | 數值 |\n|------|------|\n| 全國累計 EV 目標（2026-04 前）| **30 萬輛** |\n| 2025 年預測年銷量 | **16~18 萬輛（+40%）** |\n| 主導品牌 | 比亞迪（Bangkok Auto Show 訂單冠軍）、長安、上汽 |\n\n## 中國品牌生態\n\n- 泰國總理親駕比亞迪送訪客（象徵性支持）\n- 奇瑞子公司積極看好泰國市場（舊換新政策推動）\n- 日系車（Toyota/Honda）日益失守：中東危機造成日系車供應短缺，消費者轉向中系\n\n## 充電挑戰\n\n- 公寓住戶、計程車司機、城際旅行者對公共快充需求迫切\n- 基礎設施落後是未來主要挑戰\n\n## 關聯舊文\n\n早先 `thailand-ev-market-2026` 已記錄曼谷車展 EV 銷量 +71%、比亞迪訂單奪冠資料，本頁補充政策框架 EV 3.5 延伸。\n\n## Related\n- [[concepts/地理市場/東南亞EV市場]]（待補）\n- [[concepts/地理市場/中國EV出海策略]]\n- [[entities/比亞迪]]\n- [[sources/thailand-ev-market-2026]]"
    },
    "thailand-ev-market-2026": {
      "title": "曼谷車展：比亞迪訂單奪冠，泰國 EV 市場預估成長 30%",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751597",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751597](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751597)\n\n# 曼谷車展：比亞迪訂單奪冠，泰國 EV 市場預估成長 30%\n\n**原文**：DIGITIMES／Bloomberg 授權｜**發布**：2026-04-10\n\n## 摘要\n2026 年曼谷車展 EV 銷量年增 71%，比亞迪以 17,354 輛訂單奪冠，超過豐田；中國品牌訂單合計超過三分之二。油價飆升是主要推力。\n\n## 關鍵數據\n- **車展 EV 銷量**：132,951 輛（+71%）\n- **中國品牌占比**：超過 2/3\n- **2026 年泰國純電市場預測**：16 萬至 18 萬輛（+30% YoY）\n\n## 訂單排行\n\n| 品牌 | 訂單量 |\n|------|--------|\n| 比亞迪 | 17,354 輛（第一）|\n| 豐田 | 15,750 輛（第二）|\n| 奇瑞、上汽、長安、長城、廣汽 | 超越 Honda、Mazda、Mitsubishi、Isuzu 等日系 |\n\n## 驅動因素\n- 油價上漲（美伊戰爭）→ 消費者重新評估持車成本\n- 泰國政府稅收優惠、購車補貼、吸引車廠設廠政策\n- 中國電動車高性價比\n\n## 泰國 EV 市場戰略地位\n泰國是東南亞最大汽車製造國，曼谷車展被視為東南亞 EV 消費趨勢的風向球。\n\n## Related\n- [[entities/比亞迪]]\n- [[entities/豐田]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/東南亞EV市場]]"

      "title": "豐田 Corolla 免費 ADAS 引熱議，衝擊 Tesla FSD 訂閱制邏輯",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752391",
      "updated": "2026-04-17",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752391](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752391)\n\n# 豐田 Corolla 免費 ADAS 引熱議，衝擊 Tesla FSD 訂閱制邏輯\n\n**原文**：DIGITIMES／黃女瑛 ｜ **發布**：2026-04-17\n\n## 摘要\n美國豐田 Corolla 標配零費用 L2 駕駛輔助（車道置中 + 適應性巡航），對比 Tesla 將同類功能納入月付 $99 的 FSD 訂閱，引發對車廠訂閱制商業模式的廣泛反思。\n\n## 核心對比\n\n| 項目 | 豐田 Corolla | Tesla |\n|------|------------|-------|\n| 車道置中 + 自適應巡航 | **免費標配** | 2026-01 起，需訂閱 FSD（$99/月）|\n| 商業邏輯 | 車輛整體價值一部分 | 軟體即服務（SaaS）模式 |\n| 消費者感知 | 物超所值 | 「解鎖已付費的硬體」爭議 |\n\n## 訂閱制困境分析\n\n### 需求側障礙\n1. 消費者認知：「買車即買斷功能」\n2. 訂閱功能體驗未必達預期（BMW 座椅加熱訂閱翻車案例）\n3. L3 法規缺口：多數國家尚未完備 → L3 功能可發揮空間受限 → 訂閱價值存疑\n\n### 供給側壓力\n- BMW、Mercedes 已先後放棄部分 L3 產品\n- 車廠仍需訂閱制彌補 EV 轉型的巨額資本投入\n\n### 豐田意外的「攻擊性」定位\n- Corolla 並未刻意針對 Tesla，但免費標配 ADAS 客觀上形成壓力\n- 強化消費者對訂閱制的抗拒情緒\n\n## 對 Tesla 的影響\n- FSD 訂閱（$99/月）是 Tesla 軟體收入的核心支柱之一\n- Corolla 等傳統車廠標配 ADAS 正侵蝕 FSD 的基礎需求理由\n- Tesla 需以更高水位的自駕功能（L3+）與差距明顯的 FSD 體驗，才能說服訂閱者\n\n## Related\n- [[entities/豐田]]\n- [[entities/Tesla]]\n- [[entities/NHTSA]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/電池與技術/自動駕駛安全監管]]\n- [[sources/byd-dipilot-adas-2026]]\n- [[sources/tesla-ass-nhtsa-probe-closed]]"

      "title": "豐田投資寧德時代印尼廠：HEV 電芯本地化，鎳礦一條龍布局",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752930&grid_seq1=&grid_seq2=",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752930&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752930&grid_seq1=&grid_seq2=)\n\n# 豐田投資寧德時代印尼廠：HEV 電芯本地化，鎳礦一條龍布局\n\n**原文**：Digitimes（江仁傑）｜ **發布**：2026-04-22\n\n## 摘要\n印尼豐田汽車製造（TMMIN）宣布在寧德時代印尼廠設置 HEV 電池專用產線，投資 **1.3 兆印尼盾（約 $7,570 萬美元）**。目標：提高印尼本地 HEV 電池採購比例，對應印尼鎳礦一條龍整合策略。\n\n## 投資細節\n\n| 項目 | 數值 |\n|------|------|\n| 投資方 | TMMIN（印尼豐田製造公司）|\n| 金額 | **1.3 兆印尼盾（約 $7,570 萬美元 / ¥120.6 億日圓）**|\n| 工廠 | 寧德時代印尼廠（西爪哇省）|\n| 電池類型 | **NMC（三元鋰）**，鎳為主要原料 |\n| 工廠產能 | **6.9 GWh/年**（全廠）|\n| 預計啟用 | **2026 年底** |\n\n## 策略意義\n\n### 豐田的算盤\n- 過去：從海外進口核心零件，在印尼組裝 Kijang Innova 等 HEV 電池\n- 未來：使用印尼本地生產的 CATL 電芯 → **提高本地化比率**，符合印尼製造業要求\n\n### 印尼的角色\n- 全球最大鎳礦生產國（市佔約 **70%**）\n- 政府推動「鎳礦 → 電池 → EV」一條龍生產布局\n- CATL 透過 Ningbo Contemporary Brunp Lygend（CBLH），與印尼國企（Indonesia Battery Corporation + Aneka Tambang）合作建立一條龍\n\n### 豐田 × CATL 的博弈\n- 豐田傳統上避免過度依賴單一電池供應商（重視多元化）\n- 本次合作是**針對特定市場（印尼 HEV）的合作**，並非全球 BEV 策略\n- 豐田自有全固態電池（FY2027 目標），長期仍以自研為主\n\n## Related\n- [[entities/豐田]]\n- [[entities/寧德時代]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/地理市場/東南亞EV市場]]\n- [[sources/isuzu-toyota-fcv-light-truck]]"

    "toyota-daimler-volvo-hydrogen-truck": {
      "title": "豐田 × 戴姆勒卡車 × Volvo：三方合作氫能重型貨車，入股 Cellcentric",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751136&grid_seq1=&grid_seq2=",
      "updated": "2026-04-08",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751136&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751136&grid_seq1=&grid_seq2=)\n\n# 豐田 × 戴姆勒卡車 × Volvo：三方合作氫能重型貨車，入股 Cellcentric\n\n**原文**：DIGITIMES／范仁志｜**發布**：2026-04-07\n\n## 摘要\n豐田 2026 年 3 月 31 日與戴姆勒卡車、Volvo 簽署 MOU，投資 Cellcentric（歐洲燃料電池新創），加入次世代重型貨車燃料電池系統開發。\n\n## Cellcentric 背景\n- **成立**：2020 年，戴姆勒卡車與 Volvo 共同創立\n- **聚焦**：大型貨車用燃料電池系統\n\n## 合作內容\n- 豐田加入次世代 FCV 核心零組件研發\n- 戴姆勒/Volvo 期望豐田以對等持股比例投資\n- 具體金額、持股比例待協商\n\n## FCV vs BEV 應用邏輯\n| 技術 | 適合應用 |\n|------|---------|\n| BEV | 中小型車輛（充電時間/能量密度限制） |\n| FCV | 大型長途運輸（續航與補能效率優勢） |\n\n## 全球 FCV 市場（2025）\n- 中國居第一、韓國第二，合計佔全球約 90%\n- 日本僅約 3%（豐田 Mirai 2015 年率先量產，卻落後）\n\n## 豐田策略意涵\n以重型商用車作為 FCV 突破口，借助歐洲夥伴打入歐洲市場。\n\n## Related\n- [[entities/豐田]]\n- [[entities/戴姆勒卡車]]\n- [[concepts/電池與技術/氫燃料電池商用車]]\n- [[concepts/車輛類型/電動商用車]]"

      "title": "豐田印度三廠擴建：年產能目標 100 萬輛（2026-05-01）",
      "url": "https://www.business-standard.com/amp/industry/auto/toyota-to-build-3-new-assembly-plants-in-maharashtra-to-boost-capacity-126050100076_1.html",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.business-standard.com/amp/industry/auto/toyota-to-build-3-new-assembly-plants-in-maharashtra-to-boost-capacity-126050100076_1.html](https://www.business-standard.com/amp/industry/auto/toyota-to-build-3-new-assembly-plants-in-maharashtra-to-boost-capacity-126050100076_1.html)\n\n# 豐田印度三廠擴建：年產能目標 100 萬輛（2026-05-01）\n\n**原文**：Business Standard / Reuters / Nikkei｜**發布**：2026-05-01\n\n## 摘要\n豐田計畫在印度西部馬哈拉施特拉邦新建三座整車廠，投資約 3,000 億日圓（~19.1 億美元），目標 2030 年代將印度年產能提升至 100 萬輛，使印度成為豐田全球第四大生產基地。\n\n## 關鍵數據\n\n| 指標 | 數值 |\n|------|------|\n| 新增工廠數 | **3 座**（馬哈拉施特拉邦）|\n| 投資額 | **~3,000 億日圓（~$19.1 億美元）**|\n| 年產能目標 | **100 萬輛**（2030 年代，為現有印度產能 3 倍）|\n| 既有工廠 | 3 座（南印度）|\n| 總工廠數 | 6 座（3 南部 + 3 馬哈拉施特拉）|\n| 首座新廠 | **~2029 年**啟用 |\n| 全球排名 | 印度成豐田**第四大生產基地**（日本、中國、美國之後）|\n\n## 產品策略\n\n- 生產車型：SUV（Corolla 系列三排 SUV）+ **插電式混合動力車（PHEV）**\n- 供應市場：印度國內 + 中東 + 非洲出口\n- 合作夥伴：**鈴木（Maruti）**——鈴木在印度生產 EV 和小型車後向豐田供貨\n\n## 戰略背景\n\n- 全球戰略轉向：遠離美國、中國停滯市場 → 高成長新興市場\n- 印度 EV 市場 FY2026 銷量 245 萬輛（+25%），中端市場爆發\n- 馬哈拉施特拉邦：印度 GDP 14%，同時 VinFast 也在此投資 $15 億美元\n\n## Related\n- [[entities/豐田]]\n- [[concepts/地理市場/印度EV市場]]\n- [[sources/vinfast-india-investment]]"

    "toyota-survival-2026": {
      "title": "Toyota 社長：「不改變就完蛋了」——供應商大會警語（2026-04）",
      "url": "https://technews.tw/2026/04/27/toyota-president-doomed-if-no-change",
      "updated": "2026-04-27",
      "body": "**來源**：[https://technews.tw/2026/04/27/toyota-president-doomed-if-no-change](https://technews.tw/2026/04/27/toyota-president-doomed-if-no-change)\n\n# Toyota 社長：「不改變就完蛋了」——供應商大會警語（2026-04）\n\n**原文**：TechNews 科技新報／Chen Kobe｜**發布**：2026-04-27\n\n## 摘要\n卸任社長佐藤恒治在豐田供應商大會（484 家供應商）發表「不改變就無法生存」的告別警語，震撼日本汽車供應鏈。新任執行長近健大接任後首要任務：大幅降低損益平衡點，營業利益目標從 4.8 兆日圓下修至 **3.8 兆日圓**。\n\n## 警語原文\n\n> **「今のままでは、生き残れない。」**（如果事情沒有改變，我們將無法生存。）\n> — 佐藤恒治，卸任豐田社長，2026 年 4 月供應商大會\n\n現場 484 家供應商代表「個個如坐針氈」，被視為佐藤的告別演說，也是全行業的最大警鐘。\n\n## 財務數據\n\n| 指標 | 數值 |\n|------|------|\n| FY2025 全球銷量 | **1,109 萬輛** |\n| FY2025 營業利益 | **4.8 兆日圓** |\n| 2026 年目標（下修）| **3.8 兆日圓**（-21%）|\n| 損益平衡點降低 | 新任 CEO 近健大首要任務 |\n\n## 核心轉型方向\n\n### 1. 智慧標準活動（放寬極致品質要求）\n\n傳統做法：Toyota 對供應商品質要求極為苛刻（表面皺摺、黑點、塑膠變色均可退貨）\n\n新方向：避免「過度追求極致工藝，導致成本過高、浪費原物料」\n\n案例：線材供應商因塑膠變色，每月報廢 10,000 組全新線材\n→ 採購經理西原庄司：「一般消費者根本不會注意到這些零件。」\n\n### 2. 核心矛盾\n\n- **優勢**：1,109 萬輛規模 + 4.8 兆利益 + 雄厚現金儲備\n- **劣勢**：數百家供應商 × 半世紀的燃油零件（傳動軸、變速箱、火星塞）= 轉型包袱\n- **中國威脅**：中國車廠可輕易製造動力強大的電動車，且成本極低\n\n## 意義\n\n- 全球最大車廠公開承認「危機」，是行業轉折點的標誌\n- 佐藤恒治的警語在全球汽車業引起廣泛迴響，象徵傳統 OEM 的集體焦慮\n- 與 BYD Q1 崩跌、VW 雙線作戰、GM 延後電動卡車構成 2026 年汽車業變局的多面向敘事\n\n## Related\n- [[entities/豐田]]\n- [[concepts/地理市場/美國EV市場與政策]]（含傳統 OEM 轉型壓力）\n- [[sources/byd-q1-2026-earnings]]\n- [[sources/gm-ev-delay-detroit-three]]"

    "toyota-tier-iv-l4-investment-2026": {
      "title": "豐田入股 Tier IV，為 e-Palette 電動巴士導入 L4 自駕（2026-06-10）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=758328",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=758328](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=758328)\n\n# 豐田入股 Tier IV，為 e-Palette 電動巴士導入 L4 自駕（2026-06-10）\n\n**原文**：DIGITIMES｜**作者**：江仁傑｜**發布**：2026-06-10\n\n## 摘要\n豐田汽車（Toyota）透過「豐田投資夥伴（Toyota Investment Partners）」入股日本自動駕駛新創 **Tier IV**，以約 **10 億日圓（~620 萬美元）**取得約 **1% 股份**，並簽署合作備忘錄（MOU）。雙方計畫在 **2027 年度（FY2027，2027/4~2028/3）**，將 Tier IV 的 L4 技術導入豐田的接駁用電動巴士 **e-Palette**。\n\n## 關鍵資訊\n\n| 指標 | 內容 |\n|------|------|\n| 投資方 | Toyota Investment Partners（豐田旗下）|\n| 被投資方 | **Tier IV**（日本自駕新創，2015 年成立）|\n| 投資金額 | **~10 億日圓（~$620 萬美元）** |\n| 持股比例 | **~1%** |\n| 合作形式 | 資本 + MOU（業務合作）|\n| 目標應用 | **e-Palette 電動巴士 L4 自動駕駛**（FY2027 目標）|\n\n## 背景脈絡\n\n### Tier IV 簡介\n- 創立：2015 年，日本名古屋\n- 核心：開源自動駕駛軟體平台 Autoware（業界最廣泛使用的開源 AV 框架）\n- 已有合作：本田、日野、KDDI 等\n\n### 豐田的多區域自駕策略\n- 美國：Toyota Research Institute（TRI）+ Waymo 合作\n- 中國：小馬智行（Pony.ai）合作\n- 日本：**Tier IV**（本次）\n- 符合豐田「多路線（Multi-pathway）」戰略：各地找最適合的本地合作夥伴\n\n### e-Palette 的自駕升級路線\n- e-Palette 曾在 2021 年東京奧運提供 L2 選手接駁服務\n- 本次目標：**FY2027 達到 L4 完全自動化**\n- 意義：從「有安全員的 L2 接駁」→「無駕駛員的 L4 商業服務」\n\n## 市場意義\n- 日本本土 L4 自動駕駛技術生態系的重要投資\n- Toyota × Tier IV × e-Palette：日本首個面向商業運轉的 L4 電動巴士組合\n- 與 Karsan Autonomous e-JEST（亞特蘭大 FIFA）同期出現：電動巴士 L4 自駕商業化進入新階段\n\n## Related\n- [[concepts/Robotaxi自動計程車]]\n- [[concepts/ADAS智駕系統]]\n- [[concepts/電動巴士市場]]\n- [[entities/豐田]]\n- [[sources/ratp-karsan-autonomous-bus-paris]]"
    },

      "url": "https://insideevs.com/news/794044/uber-superpower-ev-charging-growth",
      "updated": "2026-04-27",
      "body": "**來源**：[https://insideevs.com/news/794044/uber-superpower-ev-charging-growth](https://insideevs.com/news/794044/uber-superpower-ev-charging-growth)\n\n# Uber：$1 億充電基礎建設投資 + 自動駕駛大單（2026-04）\n\n**原文**：InsideEVs（Uber 充電）+ InsideEVs（Lawrence Ulrich，自駕耗電）｜**發布**：2026-04-27~29\n\n## 摘要\nUber 宣布投資 $1 億建設公共快充站（EVgo 美國 + Ionity 歐洲），並以行程數據提供充電業者「使用率保證」解決站點可行性問題。同時揭露兩筆重大自動駕駛合作：Lucid（$5 億 / 35,000 輛 Gravity SUV）與 Rivian（$12.5 億 / 10,000 輛 R2）。\n\n## 充電基礎建設投資\n\n| 項目 | 詳情 |\n|------|------|\n| 投資金額 | **$1 億美元** |\n| 合作夥伴（美國）| EVgo |\n| 合作夥伴（歐洲）| Ionity |\n| 核心優勢 | **行程數據**（大量真實 OD 資料決定選址）|\n| 差異化策略 | 向充電業者提供**使用率保證** → 解決前期投資可行性 |\n\n**使用率保證機制**：Uber 將旗下司機引導至特定充電站，確保站點運營量，使投資回報可行。\n\n## 自動駕駛大單\n\n| 合作 | 投資額 | 車輛數 | 時程 | 城市 |\n|------|--------|--------|------|------|\n| Uber × **Lucid** | **$5 億**（累計）| **35,000 輛** Gravity SUV + 未來中型車款 | 2026 年舊金山開始 | 數十城市 |\n| Uber × **Rivian** | **最高 $12.5 億** | **最多 10,000 輛** R2 SUV | **2028 年**舊金山/邁阿密開始 → 2031 年延伸 25 城市 |\n\n## 自動駕駛耗電量分析\n\n| 系統 / 時期 | 自駕功耗 |\n|------------|---------|\n| Chevy Bolt（Cruise，早期）| **1.5~3kW** |\n| Waymo（Jaguar I-Pace，現役）| **~1kW** |\n| Rivian 目標（Level 4）| **~1.1kW** |\n| Lucid / Nuro 系統 | ~1kW |\n| 業界 2026 年目標 | **500W**（現在 1kW 的一半）|\n| MIT 估算安全線 | <1.2kW（1B 輛 AV 不超過 2023 年全球資料中心耗能）|\n\n過去：每次 Hyundai E-GMP 商用 AV 版的 EPA 續航從 303 英里降至 168 英里（-44.6%），主因是早期自駕系統的高功耗。\n\n## Rivian 自製晶片優勢\n\n- 放棄 Nvidia Orin，開發自製 **RAP1 SoC**：800 TOPS（稀疏數據）\n- 兩顆 RAP1 組成 Gen3 自駕模組 → 計算力 4x，TOPS 利用率 2x\n- 年底在 R2 首發 + 第一個車載 Lidar\n\n## Related\n- [[entities/Rivian]]\n- [[entities/Uber]]（待補）\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[sources/autonomous-driving-power-consumption]]\n- [[sources/rivian-r2-range-specs]]"

      "title": "Uber × WeRide 馬德里啟動歐洲首個 Robotaxi 服務（2026-06-04）",
      "url": "https://www.electrive.com/2026/06/04/uber-werride-launch-madrid-robotaxi/",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.electrive.com/2026/06/04/uber-werride-launch-madrid-robotaxi/](https://www.electrive.com/2026/06/04/uber-werride-launch-madrid-robotaxi/)\n\n# Uber × WeRide 馬德里啟動歐洲首個 Robotaxi 服務（2026-06-04）\n\n**原文**：electrive.com / Google Alerts｜**發布**：2026-06-04\n\n## 摘要\nUber 與中國自駕車新創 **WeRide** 在西班牙**馬德里**啟動歐洲首個商業 Robotaxi 服務；同期 Uber 宣布英國倫敦 Robotaxi 服務「數月內」上線。\n\n## 關鍵事實\n\n| 指標 | 內容 |\n|------|------|\n| 服務城市 | **馬德里（Madrid）**——歐洲 Robotaxi 首城 |\n| 合作夥伴 | Uber × **WeRide**（文遠知行，廣州） |\n| 倫敦計畫 | Uber London：「數月內」上線（2026-06-09 更新） |\n| 車型 | WeRide Robobus / 轎車型（L4 自動駕駛） |\n\n## WeRide 簡介\n- 總部廣州，2019 年成立，在廣州、北京、阿聯酋等地運營\n- 2024 年在 NASDAQ 上市（IPO）\n- 歐洲擴張：阿聯酋阿布扎比（與 Uber 合作）→ 西班牙馬德里 → 英國倫敦\n\n## 全球 Robotaxi 競爭格局（2026 年中）\n\n| 玩家 | 地區 | 規模 |\n|------|------|------|\n| Waymo | 美國（SF/Phoenix/Austin） | 約 700 輛，最成熟 |\n| Tesla | 德州奧斯汀 | 42 輛（德州 DMV 數據） |\n| WeRide×Uber | 西班牙、UAE | 歐洲先行者 |\n| Baidu Apollo Go | 中國武漢/重慶 | 最大規模，中國市場 |\n\n## 戰略分析\n- WeRide 選擇歐洲打「輕監管」市場：西班牙對 L4 自駕監管較鬆\n- Uber 作為「平台方」：不擁有車輛，只整合自駕車公司到現有叫車生態\n- Tesla Robotaxi（42輛）vs WeRide Uber 正式商業服務：對比鮮明\n\n## Related\n- [[concepts/Robotaxi自動計程車]]\n- [[concepts/中國EV出海策略]]\n- [[sources/tesla-robotaxi-texas-reality-2026]]"

    "uk-ev-2million-2026": {
      "title": "英國 EV 突破 200 萬輛，4 月市占 26%（2026-05-05）",
      "url": "https://www.electrive.com/2026/05/05/uk-passes-two-million-evs-as-market-share-hits-26",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.electrive.com/2026/05/05/uk-passes-two-million-evs-as-market-share-hits-26](https://www.electrive.com/2026/05/05/uk-passes-two-million-evs-as-market-share-hits-26)\n\n# 英國 EV 突破 200 萬輛，4 月市占 26%（2026-05-05）\n\n**原文**：Electrive（Carla Westerheide）｜**發布**：2026-05-05\n\n## 摘要\n英國純電動車累計登記突破 200 萬輛里程碑，4 月單月市占 26.2%。但 SMMT 下修全年展望，年底預估 26.8%，遠低於 ZEV 授權要求的 33%。\n\n## 關鍵數據\n\n| 指標 | 數值 |\n|------|------|\n| 累計 BEV 登記 | **2,012,758 輛**（突破 200 萬里程碑）|\n| 4 月 BEV 登記 | **39,084 輛（+59.1%）**|\n| 4 月 BEV 市占 | **26.2%** |\n| 4 月電氣化整體（BEV+PHEV+HEV）| **53.2%**（今年第二次超過 50%）|\n| YTD BEV 市占（2026 年前 4 月）| **23.1%** |\n| ZEV Mandate 要求（2026）| **33%** |\n\n## SMMT 下修全年預估\n\n| 時間點 | BEV 市占預估 |\n|--------|------------|\n| ZEV Mandate 要求 | 33%（法定）|\n| 原先 SMMT 預測 | 28.5% |\n| **修正後預測** | **26.8%**（下修 1.7pp）|\n| 2027 年預測 | **32.0%**（仍低於 ZEV mandate 33%+）|\n\n## SMMT CEO 警告\n\n> 「合規成本的快速攀升將限制消費者選擇、整體去碳化及產業競爭力。需要立即檢視轉型時程，使政策與市場現實接軌，否則英國作為汽車市場與製造基地的吸引力將受損。」\n> — Mike Hawes，SMMT 執行長\n\n## 關鍵矛盾\n\n- 市場加速成長（4 月 +59%），但仍**大幅落後** ZEV mandate 強制要求\n- 製造商以大量折扣撐起銷量（並非自然需求）\n- 充電基礎設施投資不足仍是障礙\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]"
    },
    "uk-germany-ev-market-dynamics-2026": {
      "title": "英德 EV 市場雙重震盪：英國價格倒掛、德國補貼外溢中系車",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753025&grid_seq1=&grid_seq2=",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753025&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753025&grid_seq1=&grid_seq2=)\n\n# 英德 EV 市場雙重震盪：英國價格倒掛、德國補貼外溢中系車\n\n**原文**：Digitimes（黃女瑛）｜ **發布**：2026-04-23\n\n## 摘要\n英國 BEV 均價首次低於 ICE（價差 £785），Q1 BEV 佔新車 22%，奇瑞 Jaecoo 7 登頂英國銷售榜首。同期德國補貼計畫雖帶動 Q1 EV 年增 41%，但受惠最多的是中系車廠（+72%）而非德系（+28%），德系本土市占從 66% 跌至 58%。\n\n---\n\n## 一、英國：BEV 均價首度低於 ICE\n\n| 指標 | 數值 |\n|------|------|\n| BEV 平均售價（折後）| **£42,600** |\n| ICE 平均售價 | **£43,400** |\n| 價差（BEV 較便宜）| **£785**（約 €900）|\n| Q1 2026 BEV 市場佔比 | **22%** |\n\n### 驅動因素（三大）\n1. **政策補貼**：ECG 計畫（£6.5 億），售價 ≤£3.7 萬車型最高補 £3,750\n2. **ZEV 配額壓力**：車廠須達 22% ZEV 配額，否則重罰 → 以折扣催銷量，壓低 BEV 售價\n3. **市場競爭**：品牌忠誠度低、外來品牌接受度高 → 中系車性價比優勢放大\n\n### 奇瑞 Jaecoo 7：2026 年 3 月英國銷售冠軍\n- 月銷**突破萬輛**，首次登頂英國市場\n- 奇瑞/比亞迪/名爵（SAIC）成英國中系車廠三強\n\n---\n\n## 二、德國：補貼效益外溢，德系車三大結構弱點\n\n| 指標 | 數值 |\n|------|------|\n| 德國 Q1 2026 EV 年增 | **+41%**（補貼 + 油價效應）|\n| 德系品牌 EV 銷量增幅 | **+28%** |\n| 中系品牌 EV 銷量增幅 | **+72%** |\n| 德系品牌本土市佔 | 66%（2025）→ **58%**（2026 Q1）|\n\n### 德系車廠三大結構弱點（EY 分析）\n1. **低價位布局不足**：補貼主要刺激中低收入需求，但德系聚焦高階車型，中端空缺讓外資填補\n2. **價格競爭反應保守**：中系廠視補貼為進一步降價基礎（補貼 + 額外折扣），德系折讓有限\n3. **金融配套不足**：2026 年 1~4 月補貼申請系統尚未建置完成，消費者需全額先付 → 中低收入族群轉向提供彈性融資的外資品牌\n\n### 市場展望\n- VW 2026 年密集推出平價 EV（ID.3 Neo €33,995 等）→ 能否收復中等收入族群是關鍵\n- 補貼入口預計 2026 年 5 月開放，申請門檻降低後局面可能轉變\n\n---\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[entities/奇瑞]]\n- [[entities/比亞迪]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[sources/germany-ev-incentive-2026]]\n- [[sources/nissan-chery-sunderland-plant]]"

    "uk-zev-mandate-relaxation-2026": {
      "title": "英國 ZEV 授權目標大幅下調：2030 年 80% → 50%",
      "url": "",
      "updated": "2026-06-16",
      "body": "**來源**：electrive（2026-06-15）\n\n# 英國 ZEV 授權目標大幅下調：2030 年 80% → 50%\n\n**事件日期**：2026-06-15｜**決策者**：英國首相 Keir Starmer\n\n## 核心事件\n\n英國首相 Starmer 決定將 ZEV Mandate（零排放車輛授權）2030 年目標從 **80% 下調至 50%**，並將啟動諮詢程序（最終數字可能在 50%–70% 之間）。\n\n## ZEV Mandate 歷史沿革\n\n| 年份 | 最低 ZEV 比例 |\n|------|-------------|\n| 2024（生效年）| 22% |\n| 2025 | 28% |\n| 2026（現行）| 33% |\n| 2030（原目標）| **80%**（現擬降至 50%）|\n| 2035（原目標）| **100%**（亦可能更動）|\n\n## 下調原因\n\n- **產業壓力**：車廠與供應商警告大規模裁員\n- **工會壓力**：Unite 秘書長 Sharon Graham：「ZEV 授權正顯著導致英國汽車工作流失。必須大幅削減目標。」\n- **投資威脅**：車廠警告可能撤出英國投資\n\n## 政治背景\n\n- 決策出現在 Ed Miliband（淨零大臣）被 Starmer + 商業大臣 Peter Kyle 壓制後\n- EU 2035 年 100% 目標已有鬆動跡象，英國跟進\n- 諮詢程序可能持續數月方能定案\n\n## 市場影響\n\n- 原 ZEV Mandate 由 Boris Johnson 2020 年提出，2024 年生效\n- 下調目標減輕汽車廠短期 EV 銷售義務，但削弱 EV 供應鏈投資確定性\n- 英國是繼歐盟部分國家之後，又一個在電動化強制目標上退縮的主要市場\n\n## Related\n- [[concepts/歐洲EV市場]]\n- [[concepts/北美EV關稅與政策]]"

    "us-ess-battery-supply-shortage": {
      "title": "儲能成美國電池廠救命稻草：美製電池供不應求，韓系廠 LFP 練兵機會",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752719",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752719](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752719)\n\n# 儲能成美國電池廠救命稻草：美製電池供不應求，韓系廠 LFP 練兵機會\n\n**原文**：DIGITIMES／黃女瑛（獨家）｜ **發布**：2026-04-21\n\n## 摘要\n美國 EV 市場受補貼廢止衝擊陷入寒冬，但儲能市場正在爆發。美系業者透露，美國自製鋰電芯目前「供不應求」：州政府 ESS 補貼仍在、AI 資料中心電力需求激增、中國電芯進口限制推升「美製」溢價。韓系三大廠（LGES/SK On/三星SDI）藉此取得 LFP 電池在地練兵機會。\n\n## 美國 ESS 市場「供不應求」成因\n\n| 成因 | 說明 |\n|------|------|\n| 州政府 + 電力公司補貼仍在 | 聯邦 EV 補助廢止，但 ESS 補助大多保留 |\n| AI 資料中心電力需求激增 | 削峰填谷 + 電網平衡 → ESS 剛需 |\n| 中國電芯進口限制 | 地緣政治壓力 → 「美製」電芯溢價空間擴大 |\n| 中資美廠爭議未解 | 進一步排除疑中資電芯，拉高美製需求 |\n\n## 電池市場結構轉移\n\n| 應用 | 主流技術 | 趨勢 |\n|------|---------|------|\n| 中高端 EV | 三元（NMC/NCA）| 退守利基 |\n| 平價 EV + ESS | LFP | 中系廠主導，韓系廠追趕 |\n\n> 「美國鋰電池 2026 年戰場，焦點已從『誰能跑得遠』轉變為『誰能存得多』」\n\n## 韓系廠的機遇\n\n### 困境\n- LGES / SK On / 三星SDI：EV 需求下滑 → 短期財務痛點\n- 中系廠 LFP 規模效益夾擊 → 韓系 LFP 進展遲緩\n\n### 機遇\n- 地緣保護傘（美國製造要求）→ 取得 **LFP 技術練兵 + 規模累積** 的緩衝期\n- 不只韓系：日系、歐系、台系廠也在切入美國 ESS 市場\n\n## 三元 vs LFP 市場認知問題\n- 「儲能自燃」與三元電池並無絕對因果（LFP 也有自燃記錄）\n- 但市場「先入為主」印象難扭轉 → LFP 在 ESS 市場的安全形象優勢持續\n\n## Related\n- [[entities/LGES]]\n- [[entities/SK On]]\n- [[entities/三星SDI]]\n- [[entities/寧德時代]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[sources/lges-loss-ess-2026]]\n- [[sources/us-ev-battery-demand-mismatch]]\n- [[sources/lges-tesla-4680-supplier]]"
    },

      "title": "美國 EV 需求降溫，動力電池產能轉向儲能（BESS）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751359&grid_seq1=&grid_seq2=",
      "updated": "2026-04-08",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751359&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751359&grid_seq1=&grid_seq2=)\n\n# 美國 EV 需求降溫，動力電池產能轉向儲能（BESS）\n\n**原文**：DIGITIMES／黃女瑛｜**發布**：2026-04-08\n\n## 摘要\nTrump 2.0 政策下 EV 補貼縮減，美國動力電池產能出現「需求錯位」，廠商加速將過剩產能轉向電網儲能（BESS）。\n\n## 政策影響\n- EV 補貼縮減、燃油車碳排規範放寬\n- GM、Ford、Stellantis 大幅下修 EV 投資\n\n## 合資瓦解\n| 車廠 | 電池夥伴 | 動態 |\n|------|---------|------|\n| GM | LGES | 退出部分合作案 |\n| Stellantis | LGES | 退出部分合作案 |\n| Ford | SK On（肯塔基州）| 解散合資企業 |\n\n## 產能轉型案例\n- **LGES**：密西根廠轉向供應豐田 NEV 電池 + Tesla 儲能電池（成功轉型多元供應商）\n- **Ford**：密西根 LFP 廠（採寧德時代技術）2026 啟動，兼供 BESS；肯塔基廠轉型儲能\n- **Ford Energy**：新成立事業部，切入家用與大型電網儲能\n\n## 市場預測修正\n| 機構 | 指標 | 原預測 | 修正後 |\n|------|------|--------|--------|\n| IEA/BNEF | 2030 美國 EV 新車佔比 | ~50% | <30% |\n| Markets & Markets | 2030 美國 BESS 市場規模 | — | 200 億美元 |\n\n## Related\n- [[entities/通用汽車]]\n- [[entities/福特]]\n- [[entities/寧德時代]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]"
    },
    "v2g-commercial-expansion-2026": {
      "title": "V2G 商業化提速：VW 乘用車 Q4 2026 上線 + 卡車首次 V2G 實測",
      "url": "https://www.electrive.com/2026/04/17/vw-and-elli-to-launch-v2g-offering-in-q4-2026",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.electrive.com/2026/04/17/vw-and-elli-to-launch-v2g-offering-in-q4-2026](https://www.electrive.com/2026/04/17/vw-and-elli-to-launch-v2g-offering-in-q4-2026)\n\n# V2G 商業化提速：VW 乘用車 Q4 2026 上線 + 卡車首次 V2G 實測\n\n**原文**：electrive.com ｜ **發布**：2026-04-17 / 2026-04-20\n\n## 摘要（兩篇合併）\nVW 宣布與旗下能源品牌 Elli 合作，Q4 2026 在德國推出商業 V2G 服務，年省 €700~900；同期，德國 SPIRIT-E 研究聯盟於 2026-04-24 完成全球首次重型電動卡車雙向充電公開實機示範（V2G / V2V / V2Depot）。\n\n---\n\n## 一、VW × Elli：V2G 商業服務 Q4 2026 德國上線\n\n| 項目 | 細節 |\n|------|------|\n| 服務名稱 | VW / Elli V2G（Vehicle-to-Grid）|\n| 推出時間 | **Q4 2026**（德國，後擴展至歐洲其他國家）|\n| 預先登記 | **2026 年 6 月**起開放 |\n| 年度節省 | 最佳條件下 **€700~900**（每年 10,000 公里免費電力）|\n| 準備條件 | 動態電費方案 + DC 雙向壁掛充電器 + 智慧電表 + Elli App |\n\n### 技術機制\n- VW ID. 系列自 2023 年起即具備 V2G 能力，監管障礙至 2025 年底才解除\n- Elli 作為「虛擬電廠」聚合器：24/7 在 EPEX Spot 交易所進行電力套利 + 電網調頻\n- 目標：長期實現**近零成本充電**\n\n### 同業動態\n- BMW × E.ON、Ford × Octopus Energy 已推出類似方案\n- The Mobility House × Mercedes + Renault 計劃中\n\n---\n\n## 二、SPIRIT-E：重型卡車 V2G 全球首次公開示範（2026-04-24）\n\n| 項目 | 細節 |\n|------|------|\n| 演示地點 | 德國 Regensburg 附近 Spedition Schmid 物流公司 |\n| 示範項目 | V2G（回饋電網）+ V2V（車對車）+ V2Depot（車對場站）|\n| 合作夥伴 | TU Munich + MAN Truck + TenneT + Shell SBRS + Fraunhofer + Hubject 等 |\n| 資金來源 | 德國聯邦經濟與能源部（BMWi）|\n\n### 重要意義\n- 這是重型卡車 V2G 的首次公開實機示範\n- 貨車白天行駛，夜間停放 → 是理想的可調度儲能資源\n- 電力套利 + 電網調頻服務，可補貼車隊運營成本\n\n## Related\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/車輛類型/電動卡車市場]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]\n- [[entities/福特]]\n- [[sources/taiwan-ev-charging-strategy]]\n- [[sources/milence-electric-truck-tco]]"

    "vinfast-india-investment": {
      "title": "Vingroup × 印度馬哈拉施特拉邦：$15 億美元電動車相關投資 MOU",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752306",
      "updated": "2026-04-17",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752306](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752306)\n\n# Vingroup × 印度馬哈拉施特拉邦：$15 億美元電動車相關投資 MOU\n\n**原文**：DIGITIMES ｜ **發布**：2026-04-17\n\n## 摘要\n越南最大企業集團 Vingroup 與印度馬哈拉施特拉邦（Maharashtra）簽署合作 MOU，總投資計畫 65 億美元，其中電動車相關項目 15 億美元，包括 6 萬輛電動車隊 + 充電設施開發。\n\n## 關鍵數據\n\n| 項目 | 數值 |\n|------|------|\n| 總投資 MOU | $65 億美元（電動車 + 再生能源 + 城市發展 + 基礎建設）|\n| 電動車相關 | **$15 億美元** |\n| 電動車隊 | **6 萬輛**（與 GSM India 合作）|\n| 既有印度工廠 | VinFast 泰米爾納德邦廠（Tamil Nadu）|\n| 現有印度車款 | VF6、VF7 SUV（2025 年底進入印度）|\n\n## VinFast 印度擴張背景\n\n- VinFast 被稱為「越南 Tesla」，已是越南最受歡迎 EV 品牌\n- 近年聚焦亞洲市場擴張（印度為重點）\n- 產品涵蓋：乘用 EV + 電動機車 + 電動巴士\n\n## 馬哈拉施特拉邦為何重要\n\n- 人口超過 1.3 億（佔印度人口約 9%）\n- GDP 佔印度約 14%，孟買大都會正積極推進基建\n- 吸引 EV 投資的重點邦（已有多家車廠布局）\n\n## 能源背景\n- 中東戰事 → 油價飆升 → 分析師認為多國將加速採用再生能源 → VinEnergo 在印度探索再生能源\n\n## Related\n- [[entities/VinFast]]\n- [[concepts/地理市場/印度EV市場]]\n- [[concepts/地理市場/中國EV出海策略]]"
    },
    "vinfast-restructuring-2026": {
      "title": "VinFast 越南業務重組：$5.3 億資產分拆，轉型輕資產模式",
      "url": "https://www.bloomberg.com/news/articles/2026-05-13/vinfast-to-spin-off-assets-in-505-million-deal-to-help-finances",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.bloomberg.com/news/articles/2026-05-13/vinfast-to-spin-off-assets-in-505-million-deal-to-help-finances](https://www.bloomberg.com/news/articles/2026-05-13/vinfast-to-spin-off-assets-in-505-million-deal-to-help-finances)\n\n# VinFast 越南業務重組：$5.3 億資產分拆，轉型輕資產模式\n\n**原文**：Bloomberg｜**發布**：2026-05-12（VinFast 公告日）\n\n## 交易結構\n\n| 項目 | 內容 |\n|------|------|\n| 交易金額 | 約 **US$530M（VND 13.3 兆）** |\n| 賣出對象 | VFTP（越南製造子公司）製造資產 |\n| 買方 | Future Investment Research and Development JSC 領銜買方群 |\n| 還債 | 從收益中償還約 **US$404.8M** P-Note 債務 |\n| 完工時程 | **Q3 2026**（待股東及債權人批准）|\n\n## 新架構\n\n**保留（新設 VinFast Vietnam JSC/VFVN）**：\n- 全球研發 + 知識產權\n- 銷售與售後系統\n- 越南、澳洲、德國子公司\n\n**售出（VFTP）**：越南製造廠（但 VinFast 將以成本加成合約繼續使用工廠）\n\n## 海外廠不受影響\n\n北卡羅來納（美國）、印度、印尼工廠**不在此次重組範圍內**。\n\n## 策略意涵\n\n- 從持有資產轉為「持有 IP + 銷售 + R&D」的輕資產模式\n- 目標：**2027 年實現獲利**\n- 應對壓力：自 2023 年 NASDAQ 上市後持續虧損與現金流緊張\n- 模式類比：類似其他資金受壓 EV 新創的資產分拆策略\n\n## Related\n- [[entities/VinFast]]\n- [[sources/vinfast-india-investment]]\n- [[concepts/地理市場/印度EV市場]]"

    "volvo-ex30-thailand-fire-2026": {
      "title": "Volvo EX30 泰國起火危機：泰國官方擬提告（2026-05）",
      "url": "https://www.freemalaysiatoday.com/category/world/2026/05/20/volvo-cars-faces-thai-legal-threat-after-fresh-ex30-fires",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.freemalaysiatoday.com/category/world/2026/05/20/volvo-cars-faces-thai-legal-threat-after-fresh-ex30-fires](https://www.freemalaysiatoday.com/category/world/2026/05/20/volvo-cars-faces-thai-legal-threat-after-fresh-ex30-fires)\n\n# Volvo EX30 泰國起火危機：泰國官方擬提告（2026-05）\n\n**原文**：Google Alerts（FMT 等）｜**發布**：2026-05-20\n\n## 事件摘要\n\nVolvo EX30 在泰國三個月內發生**兩起起火事故**，泰國消費者保護機構升級調查，考慮提起民事訴訟。\n\n## 事故與召回\n\n| 項目 | 細節 |\n|------|------|\n| 起火事故數（泰國）| **3 個月內 2 起** |\n| 其中一起細節 | 充電至 ~80% 後數分鐘，停在自家停車場起火，動用 23 支滅火器 |\n| 泰國召回數量 | **1,166 輛 EX30** |\n| 電池更換進度 | **嚴重落後**（已有 45 名車主正式提告）|\n| 臨時措施 | Volvo 建議受影響車主，更換完成前**充電上限 70%** |\n| 更換安排 | 2026 年 5 月 22 日起聯繫車主，每次約需 **3 天** |\n\n## 法律威脅\n\n- 泰國消費者保護機構可能將 EX30 列為**「對社會具危險性」**\n- 考慮對 Volvo 泰國分公司及經銷商提起**民事訴訟**，爭取 45 名投訴人退款及利息\n\n## 更廣背景\n\n- EX30 全球召回：**~4 萬輛**（電池過熱風險）\n- 台灣亦受影響（同批次全球召回）\n- EX30 已從 Volvo 泰國官網下架\n\n## 意義\n\nVolvo EX30 是 Volvo 最重要的走量入門 EV，泰國市場是東南亞電動化前線。此事件在 Volvo EX60 首駕獲得「史上最佳 Volvo」好評的同一週爆發，形成強烈對比，凸顯 EV 品質管控的複雜性。\n\n## Related\n- [[concepts/東南亞EV市場]]\n- [[sources/volvo-ex60-production-2026]]\n- [[concepts/歐洲EV市場]]"
    },
    "volvo-ex60-first-drive-2026": {
      "title": "Volvo EX60 首駕實測：「史上最佳 Volvo」+ Gemini AI 視覺功能（2026-05）",
      "url": "https://insideevs.com/reviews/796359/volvo-ex60-first-drive",
      "updated": "2026-05-21",
      "body": "**來源**：[https://insideevs.com/reviews/796359/volvo-ex60-first-drive](https://insideevs.com/reviews/796359/volvo-ex60-first-drive)\n\n# Volvo EX60 首駕實測：「史上最佳 Volvo」+ Gemini AI 視覺功能（2026-05）\n\n**原文**：InsideEVs（Mack Hogan + Iulian Dnistran）｜**發布**：2026-05-20\n\n## 實測評語\n\n> 「我開了 2027 Volvo EX60，認為這是史上最佳 Volvo——因為它是電動車。」\n\n首駕在巴塞隆納進行（~5 小時），評測人結論：EX60 達到豪華中型 EV 的應有水準，與 BMW iX3 及 Rivian R2 並列同級最強。\n\n## 完整規格（實測確認）\n\n| 版本 | 驅動 | 功率 | 電池（可用）| 0-60 | 續航（EPA）| 充電功率 | 售價 |\n|------|------|------|-----------|------|-----------|---------|------|\n| P6 Plus | RWD | 369 hp | 83 kWh（80 usable）| 5.7 秒 | ~307 英里 | **320 kW** | $59,795 |\n| P10 AWD | AWD | 503 hp | 同上 | 4.4 秒 | ~322 英里 | **370 kW** | $62,145 |\n| **P12 AWD**（2026 後）| AWD | **670 hp** | 117 kWh（112 usable）| **3.8 秒** | **~400 英里** | 370 kW | TBD |\n| 充電時間（10→80%）| — | — | — | — | — | **16 分鐘**（所有版本）| — |\n\n## 亮點評語\n\n- **底盤與乘坐**：「靜謐、接近無聲的駕乘體驗」\n- **內裝改善**：修正了 EX90 被詬病的車窗開關設計（改回 4 個獨立按鍵）\n- **儲物**：475L 後廂 + 內嵌分隔設計；**批評**：空調出風口改為觸控操作\n- **音響**：選配 Bowers & Wilkins 28 揚聲器 Dolby Atmos（座椅頭枕有揚聲器，可隔離音區）\n\n## Gemini AI 視覺功能（Google I/O 2026 展示）\n\n| 功能 | 說明 |\n|------|------|\n| **外界辨識** | 車載攝影機即時掃描 → Gemini 解讀 → 語音回答 |\n| 示範案例 | 翻譯外語路牌、辨識舊金山 Transamerica Pyramid 並推薦附近景點 |\n| 類比 | 類似 Google Lens + Gemini 語音，整合進車機 |\n| 隱私設計 | 需駕駛授權；人臉在圖像分析時自動模糊 |\n| 發布時程 | **尚無確認日期**（仍為展示階段）|\n| 即將推出功能 | 3D 沉浸式 Google Maps、YouTube Music 車機版、更深度 Gemini 車控 |\n\n## 競品比較\n\n| 競品 | 優點 vs EX60 | 劣勢 vs EX60 |\n|------|------------|------------|\n| BMW iX3 | 駕駛動態（評測人未親試 iX3）| — |\n| Rivian R2 | — | — |\n| Mercedes GLC EV | — | 尚未上市 |\n\n評測人：「豪華中型 EV 已達到比燃油車**更好**的階段」\n\n## Related\n- [[sources/volvo-ex60-production-2026]]\n- [[sources/bmw-ix3-neue-klasse-2026]]\n- [[concepts/歐洲EV市場]]"

      "title": "Volvo EX60 量產啟動：SPA3 800V 平台，370kW 峰值充電，810km 旗艦版",
      "url": "https://insideevs.com/news/796184/2027-volvo-ex60-pricing-specs",
      "updated": "2026-05-19",
      "body": "**來源**：[https://insideevs.com/news/796184/2027-volvo-ex60-pricing-specs](https://insideevs.com/news/796184/2027-volvo-ex60-pricing-specs)\n\n# Volvo EX60 量產啟動：SPA3 800V 平台，370kW 峰值充電，810km 旗艦版\n\n**原文**：electrive.com（Sebastian Schaal）｜ **發布**：2026-04-22\n\n## 摘要\nVolvo EX60 在瑞典哥德堡 Torslanda 廠正式開始量產，首批客戶交付預計 **2026 年初夏**。這是 Volvo **SPA3 平台**（800V 架構）首款量產車，旗艦版 P12 AWD 500kW + 112.5kWh + 810km 續航 + 370kW 快充。\n\n## 三款版本\n\n| 版本 | 驅動 | 功率 | 電池 | 充電功率 | 充電時間 |\n|------|------|------|------|---------|---------|\n| 基礎版 | 後驅 | 275 kW | 80 kWh | — | — |\n| AWD | 四驅 | 375 kW | 91 kWh | **370 kW** | **18~19 分鐘**（10~80%）|\n| **P12 AWD** | 四驅 | **500 kW** | **112.5 kWh** | **370 kW** | 18~19 分鐘 |\n\n- 旗艦 P12 AWD：**810 公里** 續航，Volvo 史上最強量產車\n- SPA3：800V 高壓架構，首次應用於 Volvo 量產車\n\n## 美國市場定價（2027 年式，2026-05）\n\n2027 年式 Volvo EX60 正式在美國開賣（InsideEVs | 2026-05-18）：\n\n| 版本 | 驅動 | 功率 | 充電功率 | 續航（EPA 預估）| 10 分鐘補電 | 10→80% | 美國售價 |\n|------|------|------|---------|--------------|-----------|-------|---------|\n| P6 Plus | 後驅 | 369 hp | **320 kW** | ~307 英里 | 155 英里 | **16 分鐘** | **$59,795** |\n| P10 AWD | 四驅 | **503 hp** | **370 kW** | — | 165 英里 | 16 分鐘 | **$62,145** |\n| P10 AWD Ultra | 四驅 | 503 hp | 370 kW | — | — | — | **$68,745** |\n| **P12 AWD**（即將）| 四驅 | — | 370 kW | **~400 英里** | 173 英里 | 19 分鐘 | 未定 |\n\n- 充電口：**NACS**（Tesla-style）\n- Ultra 版加價 $6,600：Nappa 通風皮革 + Bowers & Wilkins 28 揚聲器 + 全景天幕（可調暗）+ 後排暖氣增高座\n- **關鍵定位**：比 XC60 PHEV（$63,940 起）更便宜，且全程 307+ 英里（PHEV 僅 35 英里電動模式）\n- 主要競品：BMW iX3（$62,850，800V，400kW，~434 英里 EPA）、Tesla Model Y、Mercedes GLC EV（即將）\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/電池與技術/電池技術路線]]"

    "volvo-fh-aero-electric-2026": {
      "title": "Volvo FH Aero Electric：700km 旗艦電動重卡（2026-04）",
      "url": "https://www.electrive.com/2026/04/14/volvo-trucks-increases-range-of-flagship-e-truck-to-700-km",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.electrive.com/2026/04/14/volvo-trucks-increases-range-of-flagship-e-truck-to-700-km](https://www.electrive.com/2026/04/14/volvo-trucks-increases-range-of-flagship-e-truck-to-700-km)\n\n# Volvo FH Aero Electric：700km 旗艦電動重卡（2026-04）\n\n**原文**：electrive.com | Cora Werwitzke｜**發布**：2026-04-14\n**製造商**：Volvo Trucks\n\n## 核心規格\n\n| 規格 | 數值 |\n|------|------|\n| 最大續航 | **700 km**（「up to」樂觀值）|\n| 電池容量 | **780 kWh**（總容量，8 包 NCA 電芯，三星SDI）|\n| 峰值功率 | 460 kW |\n| 最大毛重 | 48 噸 |\n| 最大載重 | 28 噸（實際貨物約 21–22 噸）|\n| MCS 充電 | 700 kW，20–80% 約 50 分鐘 |\n| CCS 充電 | 350 kW，20–80% 約 85 分鐘 |\n| 量產時間 | 2026 年夏，世界首映 6 月初 |\n\n## 技術亮點\n\n- **新 e-axle**：雙電機 + 6 速變速箱（取代 I-Shift 傳統傳動）\n- **電動 PTO**：消除冷鏈車輛對柴油發電機的需求\n- 電池架構：從總容量中提取更高「可用比例」（實際可用能量優化）\n\n## 競爭比較\n\n| 車型 | 續航 | 充電速率 | 充電時間 |\n|------|------|----------|---------|\n| Volvo FH Aero Electric | 700 km（樂觀）| 700 kW MCS | 50 分鐘 |\n| Renault E-Tech T 780 | 600 km | MCS | 40 分鐘（更快）|\n| Mercedes eActros 600 | 500 km（保守）| — | — |\n\nVolvo 提供更大續航；Renault 姊妹車同樣用三星SDI NCA 電芯但充電更快。\n\n## Related\n- [[concepts/車輛類型/電動卡車市場]]\n- [[sources/milence-paris-berlin-corridor]]\n- [[sources/tesla-semi-production-2026]]\n- [[sources/man-etgm-electric-truck-2026]]"

    "volvo-fh-aero-electric-specs-2026": {
      "title": "Volvo FH Aero Electric：業界最高可用電量（725 kWh / 700 km）",
      "url": "",
      "updated": "2026-06-12",
      "body": "**來源**：electrive（2026-06-11）\n\n# Volvo FH Aero Electric：業界最高可用電量（725 kWh / 700 km）\n\n**事件日期**：2026-06-11｜**地點**：哥特堡首映\n\n## 完整規格\n\n| 規格 | FH Aero Extended（旗艦）| Standard Range | 2nd Gen FH |\n|------|------------------------|---------------|-----------|\n| 軸配置 | **6×2**（標籤軸）| 6×2 | 4×2/6×2/6×4/8×2/8×4 |\n| 峰值功率 | 420/460 kW | 420/460 kW | 540 kW |\n| 最大總重 | 48 噸 | 48 噸 | 65 噸 |\n| 車頭自重 | **13.3 噸** | 11.8 噸 | 10.5 噸 |\n| 電池（總/可用）| **780 / 725 kWh** | 585 / 545 kWh | 540 kWh |\n| 續航 | **700 km** | 525 km | 470 km |\n| 充電 | **700 kW MCS** | 350 kW CCS | 350 kW CCS |\n\n## 核心突破：可用電量比例業界最高\n\n| 車廠 | 總電量 | 可用電量 | **使用率** |\n|------|--------|----------|-----------|\n| **Volvo FH Aero** | 780 kWh | **725 kWh** | **93%** |\n| Renault E-Tech T 780 | 780 kWh | 624 kWh | 80% |\n| Sany（LFP）| ~636 kWh | 623 kWh | 98%（LFP 天然優勢）|\n| MAN | — | 560 kWh | — |\n\n> Volvo 電解質方案：NCA 電芯（三星SDI），搭配改進版電池監控軟體，比同量競品多出 **約 100 kWh 可用電量**。\n\n## 電池技術細節\n\n- **L 型電池包**設計（非傳統矩形）：使電池可同時安裝於框架側面和底部\n- **方形電芯**（prismatic，非小圓柱），8 包 × 97.5 kWh\n- **電池保固**：6 年或 720,000 公里，保留至少 **80% SOH**\n- MCS 充電接口：**標準配置於旗艦型**，其他型號暫不提供\n\n## 設計取捨\n\n**高電量代價**：\n- 13.3 噸車頭自重（比 MAN 重）→ 需 6×2 有效承重\n- 整體組合長度 >17 米（但合規於強制迴轉半徑）\n- 只提供 **e-axle 驅動**（無法用傳統傳動軸，空間被電池佔用）\n\n**Volvo 策略選擇**：以最大續航為賣點（「全天長途無需充電」），而非最輕重量或最大載重。\n\n## 量產時程\n\n| 事件 | 時間 |\n|------|------|\n| FH Aero Electric 開放訂購 | **2026-06-15** |\n| 所有 2nd Gen 重型電動卡車量產 | **2026-09 初（比利時根特 + 瑞典 Tuve）**|\n| 第一代 FH/FM/FMX Electric 停產 | 同步 |\n\n## 競爭比較（2026 年中）\n\n| 車型 | 最大續航 | 充電 | 量產 |\n|------|---------|------|------|\n| **Volvo FH Aero** | **700 km** | 700 kW MCS | 2026-09 |\n| Renault E-Tech T 780 | 600 km | 720 kW MCS | 量產中 |\n| Daimler eActros 600 | 500 km | — | 量產中 |\n| Daimler eActros Lowliner | 500 km | DC 快充 | 2027 |\n| MAN eTGM | 480 km | 375 kW | 2027 |\n\n## Related\n- [[concepts/電動卡車市場]]\n- [[sources/europe-etruck-jun2026]]\n- [[sources/volvo-fh-aero-electric-2026]]"

      "title": "VW「Gamechanger」：沃爾夫斯堡廠製造革命（2026-05-04）",
      "url": "https://www.electrive.com/2026/05/04/volkswagen-reportedly-developing-new-production-system",
      "updated": "2026-05-04",
      "body": "**來源**：[https://www.electrive.com/2026/05/04/volkswagen-reportedly-developing-new-production-system](https://www.electrive.com/2026/05/04/volkswagen-reportedly-developing-new-production-system)\n\n# VW「Gamechanger」：沃爾夫斯堡廠製造革命（2026-05-04）\n\n**原文**：Electrive（Sebastian Schaal）｜**發布**：2026-05-04\n\n## 摘要\nVolkswagen 集團正秘密推進代號「Gamechanger」的全新生產系統，目標是大幅降低製造成本，實現在德國本土生產具競爭力的平價純電車。涉及 SSP 平台、Wolfsburg 廠整體改造，可能引入 megacasting 大型壓鑄技術。\n\n## Gamechanger 計畫要點\n\n| 項目 | 內容 |\n|------|------|\n| 目標 | 大幅降低製造成本，在德國生產**平價 BEV** |\n| 主要工廠 | **沃爾夫斯堡（Wolfsburg）總廠** |\n| 技術方向 | **Megacasting**（大型壓鑄）：少量大型鑄件取代多個小零件 |\n| 平台 | **SSP 電動平台**（Golf 電動版 + 電動 SUV 基礎）|\n| 可能車型 | 電動 Golf（「ID. Golf」）+ 電動 SUV（「ID. Roc」）|\n| 層級 | **執行董事會層級**推進（Christian Vollmer 主責，CFO 嚴控成本）|\n\n## 背景與觸發因素\n\n- VW 監事會 + 執行董事會聯席會議確認：「**現有商業模式不再適合未來**」\n- 一系列削減：歐洲產能削減 100 萬輛、Golf 生產遷往墨西哥\n- 壓力：中國競爭對手成本大幅低於 VW；SSP 平台投資需要成本回收\n\n## 技術參考\n\n- **Megacasting** 先驅：Tesla（Gigafactory）、Volvo（EX60 新廠）\n- 允許大型車體部件整體鑄造 → 大幅減少零件數量、組裝步驟\n\n## 不確定性\n\n- 「投資規模巨大，仍在評估深度」（內部消息）\n- 具體範圍、時程、成本尚未公開\n- 2030 年新策略預計將最終確認\n\n## Related\n- [[entities/Volkswagen]]（待建立）\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/地理市場/中國EV市場競爭格局]]"

    "vw-id-buzz-2027-us": {
      "title": "VW ID.Buzz 2027 款：單踏板駕駛終於到位，新增露營 Tourer 車型",
      "url": "https://insideevs.com/news/795883/2027-volkswagen-id-buzz-returns-to-the-us",
      "updated": "2026-05-15",
      "body": "**來源**：[https://insideevs.com/news/795883/2027-volkswagen-id-buzz-returns-to-the-us](https://insideevs.com/news/795883/2027-volkswagen-id-buzz-returns-to-the-us)\n\n# VW ID.Buzz 2027 款：單踏板駕駛終於到位，新增露營 Tourer 車型\n\n**原文**：InsideEVs | Suvrat Kothari｜**發布**：2026-05-14\n**市場**：美國\n\n## 背景\n\nID.Buzz 跳過 MY2026（美國），直接從 MY2025 跳至 MY2027，原因是 MY2025 到貨已晚、需求偏弱。\n\n## 重要更新\n\n### 1. 單踏板駕駛（終於加入）\nMY2025 缺乏真正的 one-pedal driving，是用戶最大抱怨點。MY2027 正式支援完全靜止。\n\n### 2. 新增 Tourer 4Motion 車型（露營版）\n工廠直接配備：\n- 折疊床墊 + 床板台\n- 窗簾 + 通風板\n- 「Overnight Mode」（車輛關閉時使用高壓電池維持空調等功能）\n- 折疊桌椅組\n\n### 3. 軟體更新至 ID.S 6\n- 改進導航介面\n- 新增 App Store（可下載 YouTube、Spotify 等第三方 APP）\n\n### 4. 外觀\n- 雙色塗裝改為**全系標配**\n- 新增 Candy White over Cherry Red 配色\n- 可選 Type 2 麵包車風格白色輪圈\n\n## 車型陣容（MY2027）\n\n| 車型 | 備註 |\n|------|------|\n| Pro S RWD | 延續 |\n| Pro S 4Motion | 新增 |\n| Tourer 4Motion | 新增（露營版）|\n| Pro S Plus 4Motion | 延續 |\n\nMY2025 起售價約 $60,000，MY2027 定價尚未公布。\n\n## Related\n- [[entities/Stellantis]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/vw-id3-neo-premiere]]\n- [[sources/vw-id-polo-launch]]"

    "vw-id-polo-gti-2026": {
      "title": "VW ID.Polo GTI：首款電動 GTI 全球首發（2026-05）",
      "url": "https://www.electrive.com/2026/05/15/world-premiere-vw-id-polo-gti-a-compact-electric-sports-car-with-major-impact",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.electrive.com/2026/05/15/world-premiere-vw-id-polo-gti-a-compact-electric-sports-car-with-major-impact](https://www.electrive.com/2026/05/15/world-premiere-vw-id-polo-gti-a-compact-electric-sports-car-with-major-impact)\n\n# VW ID.Polo GTI：首款電動 GTI 全球首發（2026-05）\n\n**原文**：Electrive | Daniel Bönnighausen + InsideEVs | Andrei Nedelea｜**發布**：2026-05-15\n**歷史意義**：GTI 品牌成立 **50 週年**後首款電動 GTI\n\n## 核心規格\n\n| 規格 | 數值 |\n|------|------|\n| 電機功率 | **166 kW**（APP290，前驅）|\n| 最高時速 | 175 km/h |\n| 電池 | **52 kWh NMC**（GTI 版不提供 LFP）|\n| 續航（WLTP）| 最高 **424 km** |\n| DC 快充 | 最高 **105 kW**（10→80% 約 24 分鐘）|\n| AC 充電 | 11 kW（~5.5 小時）|\n| 定價 | 略低於 **€39,000**（2026 秋開始預售）|\n| 車長 | ~4.10 m（比標準版長 4.3 cm）|\n| 車高 | 比標準版低 1.7 cm |\n\n## 底盤 & 駕駛動態\n\n| 項目 | 細節 |\n|------|------|\n| 平台 | MEB+（與標準 ID.Polo 相同）|\n| 前軸 | MacPherson + DCC 自適應減震器（電控）|\n| 後軸 | 複合連桿 + DCC |\n| 差速器 | **前軸機械差速鎖**（與 Golf GTI 同款）|\n| GTI 模式 | 方向盤專屬按鈕啟動：最大電機響應 + 進積式轉向 + DCC 運動設定 |\n| Launch Control | GTI 模式啟動時可用 |\n\n## GTI 識別設計\n\n- 正面標誌性**紅色橫條**\n- **蜂巢格柵進氣口**\n- **格呢座椅**（白/灰/紅，重新詮釋傳統圖案）\n- 紅色裝飾縫線\n- 19 寸鋁圈\n- 方向盤 12 點鐘位置紅色標記\n\n## 命名再定義\n\nGTI 舊定義：「G（Gasoline）T（Turbo）I（Injection）」\nGTI 新定義：「**Intelligence**」（VW 品牌總裁 Thomas Schäfer 確認）\n\n## 市場意義\n\n- VW 第一款帶 GTI 徽章的純電動車\n- 對比標準 ID.Polo（€24,995 LFP 起）：GTI 版溢價 ~55%，主打性能與品牌情感價值\n- 正式確立 VW 電動車性能子品牌路線\n\n## Related\n- [[concepts/歐洲EV市場]]\n- [[sources/vw-id-polo-launch]]\n- [[sources/vw-id3-neo-premiere]]"
    },
    "vw-id-polo-launch": {
      "title": "VW ID.Polo 量產版正式發表（2026-04）",
      "url": "https://insideevs.com/news/794406/vw-id-polo-electric-range-price-specs-options-official",
      "updated": "2026-04-29",
      "body": "**來源**：[https://insideevs.com/news/794406/vw-id-polo-electric-range-price-specs-options-official](https://insideevs.com/news/794406/vw-id-polo-electric-range-price-specs-options-official)\n\n# VW ID.Polo 量產版正式發表（2026-04）\n\n**原文**：InsideEVs／Iulian Dnistran｜**發布**：2026-04-29\n\n## 摘要\nVW 推出量產版 ID.Polo，定位為 Renault 5 的競爭者，起價 €24,995，最大 52kWh 電池可達 282 英里 WLTP 續航。VW 集團 MEB+ 緊湊型 EV 家族的最低價成員。\n\n## 規格\n\n| 項目 | 數值 |\n|------|------|\n| 起售價 | **€24,995**（~$29,300）|\n| 電池選項 | **37kWh LFP**（入門）/ **52kWh NMC**（上階）|\n| 最大 WLTP 續航 | **282 英里**（455km，52kWh 版）|\n| 入門版續航 | 204 英里（329km，37kWh 版）|\n| 馬力選項 | 114hp / 133hp（37kWh）; **208hp** / **222hp GTI**（52kWh，2027）|\n| 馬達型號 | APP290（全新設計）|\n| DC 快充 | 90kW（37kWh，10-80% ~27min）/ **105kW**（52kWh，~24min）|\n| AC 充電 | 11kW（全系標配）|\n| V2L | **標配** |\n\n## 車身規格\n\n| 項目 | 數值 |\n|------|------|\n| 車長 | 4,053mm（4 門 5 座）|\n| 軸距 | 2,600mm |\n| 行李廂 | 441L（後座立起）/ 1,249L（折疊）|\n| 拖車 | 選配，最大 1,200kg |\n\n## 電池技術\n\n- 採用 **Cell-to-Pack（CTP）** 工法（無模組設計，更輕）\n- 37kWh 用 **LFP**；52kWh 用 **NMC**（兩種化學對應不同需求）\n\n## 競品比較\n\n| 競品 | 起價 |\n|------|------|\n| Renault 5 | ~€25,000 |\n| Kia EV3 | ~€28,000 |\n| Hyundai Inster | ~€24,000 |\n| BYD Dolphin Surf | ~€23,000 |\n\n## 上市時程\n\n- 2026 年 4 月底開放訂購（歐洲）\n- ID.Polo GTI（222hp）預計 2027 年加入\n\n## Related\n- [[entities/Volkswagen]]（待補）\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/車輛類型/平價電動車市場]]\n- [[sources/vw-id3-neo-premiere]]\n- [[sources/cupra-raval-launch]]"

    "vw-id3-neo-premiere": {
      "title": "VW ID.3 Neo 世界首映：MEB+ 升級，€33,995 起，三電池版本",
      "url": "https://www.electrive.com/2026/04/15/world-premiere-of-the-vw-id-3-neo-more-than-just-a-facelift",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.electrive.com/2026/04/15/world-premiere-of-the-vw-id-3-neo-more-than-just-a-facelift](https://www.electrive.com/2026/04/15/world-premiere-of-the-vw-id-3-neo-more-than-just-a-facelift)\n\n# VW ID.3 Neo 世界首映：MEB+ 升級，€33,995 起，三電池版本\n\n**原文**：electrive.com／Daniel Bönnighausen ｜ **發布**：2026-04-15\n\n## 摘要\nVolkswagen 正式發表大幅更新版 ID.3，新增「Neo」後綴，是 VW 今年計畫推出的 6 款新電動車中第一款。平台從 MEB 升級為 MEB+，提供三種電池版本，起售 €33,995。VW 對外坦承品牌失焦，以「True Volkswagen」重啟歐洲攻勢。\n\n## 完整規格與售價\n\n| 版本 | 電池 | WLTP 續航 | 起售價（德國）|\n|------|------|----------|-------------|\n| Trend | 50 kWh | ~330 km | **€33,995** |\n| Life  | 58 kWh | ~400 km | **€35,995** |\n| Style | 79 kWh（長程）| 長程版 | **€38,495** |\n\n- 平台：**MEB → MEB+** 升級（更高充電功率 + 能效）\n- 生產地：Zwickau 廠，**2026 年 5 月開始生產**\n- 歐洲上市：**2026 年夏季**\n\n## 品牌訊號\n\n- VW 高層（Martin Sander）公開承認品牌失焦、需要重回以顧客為中心\n- ID.3 Neo 是 VW 2026 年六款新電動車計畫的開頭\n- 發布地點：漢堡（歐洲主市場）\n\n## 背景脈絡\n\n- VW ID.4 已在美國停產（田納西工廠），面臨約 €5 億資產減損\n- VW 的電動車策略在中美市場均承壓\n- ID.3 Neo 是 VW 歐洲市場反攻的信號，配合德國新 EV 補貼（最高 €6,000）上市時機極佳\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[sources/vw-id4-chattanooga-stop]]\n- [[sources/cupra-raval-launch]]\n- [[sources/germany-ev-incentive-2026]]"

      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752137",

      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752137](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752137)\n\n# VW 美國田納西工廠 4 月停產 ID.4，產線轉回燃油 Atlas\n\n**原文**：DIGITIMES／江仁傑｜**發布**：2026-04-15\n\n## 摘要\nVolkswagen 宣布 2026 年 4 月中旬停止在美國田納西州 Chattanooga 工廠生產 ID.4，產線轉向燃油 SUV Atlas 新款（2026 年夏啟動、秋上市），原因是 EV 稅額減免廢止後美國需求急凍。\n\n## 關鍵數據\n\n| 指標 | 數值 |\n|------|------|\n| 停產時間 | 2026 年 4 月中旬 |\n| 停產車型 | ID.4（美國版）|\n| 替代生產 | Atlas（燃油 SUV），2026 夏啟動 |\n| ID.4 美國銷量（2025 全年）| 2.24 萬輛（+31% YoY）|\n| ID.4 Q4 2025 銷量 | **248 輛（-62%）** — 稅收優惠廢止（2025-09）後急凍 |\n\n## 背景：美國 EV 政策衝擊\n- 2025 年 9 月底：電動車稅額減免政策廢止 → 10 月起 ID.4 銷售暴跌 62%\n- VW Q1 2026 全球交付量：205 萬輛（-4%）\n  - 美國市場：-約 20%\n  - 中國市場：-15%\n\n## 中國市場另一危機\n- VW 在中國面臨比亞迪、吉利等本土廠商高規格低價競爭\n- 保時捷中國銷量持續下滑\n- Skoda 規劃**退出中國市場**\n\n## Related\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[entities/通用汽車]]\n- [[entities/福特]]"

      "title": "Volkswagen ID.4 / ID.5 英國版電池升級與 V2L 功能導入",
      "url": "https://www.electrive.com/2026/04/11/uk-volkswagen-gives-id-4-and-id-5-larger-batteries-and-v2l",
      "updated": "2026-04-13",
      "body": "**來源**：[https://www.electrive.com/2026/04/11/uk-volkswagen-gives-id-4-and-id-5-larger-batteries-and-v2l](https://www.electrive.com/2026/04/11/uk-volkswagen-gives-id-4-and-id-5-larger-batteries-and-v2l)\n\n# Volkswagen ID.4 / ID.5 英國版電池升級與 V2L 功能導入\n\n**原文**：electrive／Carla Westerheide｜**發布**：2026-04-11\n\n## 摘要\nVW 為英國市場的 ID.4 與 ID.5 進行技術升級：電池容量提升、加入 V2L 功能、駕駛輔助系統改進，長途版最高續航達 341 英里（WLTP）。\n\n## 電池容量變化\n\n| 車型/版本 | 舊容量 | 新容量 | 里程增加 |\n|----------|--------|--------|----------|\n| Pure 版本 | 52 kWh | 58 kWh | +40 km |\n| Pro/其他版本 | 77~79 kWh | 79 kWh | 略增 |\n| GTX 版本 | 79 kWh | 77 kWh（但功率升至 286 kW）| - |\n\n- ID.4 Pro 4MOTION：最高 220 kW，WLTP 至 341 英里\n- GTX DC 快充：ID.4 175 kW / ID.5 185 kW（不變）\n\n## V2L 功能\n- 全系列導入 V2L（Vehicle-to-Load）\n- 外部插座最高輸出 **3.6 kW**\n\n## 其他更新\n- 方向盤改回實體按鈕\n- Traffic Assist 新增 Front Cross 功能\n- ID.4 Pro 4MOTION 拖車重量：1,200 kg → **1,800 kg**\n- 可選配 230V 插座\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]"

      "url": "https://www.electrive.com/2026/04/16/after-id-4-production-halt-volkswagen-writes-down-around-e500-million-in-us-business",
      "updated": "2026-04-17",
      "body": "**來源**：[https://www.electrive.com/2026/04/16/after-id-4-production-halt-volkswagen-writes-down-around-e500-million-in-us-business](https://www.electrive.com/2026/04/16/after-id-4-production-halt-volkswagen-writes-down-around-e500-million-in-us-business)\n\n# VW 停產 ID.4 後認列美國業務約 €5 億資產減損\n\n**原文**：electrive.com／Sebastian Schaal ｜ **發布**：2026-04-16\n\n## 摘要\nVolkswagen 在宣布停止田納西州 Chattanooga 工廠 ID.4 生產後，認列美國業務約 **€5 億元（約 $5.5 億美元）** 資產減損。（原文為空殼，數字來自文章標題。）\n\n## 脈絡\n- 田納西廠停產原因：2025-09 EV 稅額減免廢止後，ID.4 Q4 2025 銷量僅 248 輛（-62%）\n- 減損金額顯示 VW 在美國電動車布局的投資損失之大\n- 產線已轉向燃油 Atlas SUV\n\n## Related\n- [[sources/vw-id4-chattanooga-stop]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/地理市場/歐洲EV市場]]"

    "vw-restructure-china-offensive-2026": {
      "title": "VW 集團雙線作戰：歐洲削產百萬輛 + 中國最大電動化攻勢",
      "url": "https://www.electrive.com/2026/04/21/vw-ceo-blume-targets-capacity-reduction-of-up-to-one-million-vehicles",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.electrive.com/2026/04/21/vw-ceo-blume-targets-capacity-reduction-of-up-to-one-million-vehicles](https://www.electrive.com/2026/04/21/vw-ceo-blume-targets-capacity-reduction-of-up-to-one-million-vehicles)\n\n# VW 集團雙線作戰：歐洲削產百萬輛 + 中國最大電動化攻勢\n\n**原文**：electrive.com（Sebastian Schaal）｜ **發布**：2026-04-21~22\n\n## 摘要\nVW CEO Oliver Blume 宣布歐洲削減產能最多 **100 萬輛**（延續中國已削減的 100 萬），同時宣告對中國市場史上最大電動化攻勢（20+ 款新電動車）。VW 試圖在縮小規模的同時，以電動車在中國重奪市場。\n\n## 一、歐洲削產重組\n\n### 規模背景\n| 年份 | 全球銷量 | 產能 |\n|------|---------|------|\n| 2019（最後可預測年）| ~1,100 萬輛 | ~1,200 萬輛/年 |\n| 現在（2026）| ~900 萬輛 | ~1,200 萬輛/年（超產 300 萬）|\n\n- 獲利率：**2.8%**（不足以支撐大型投資）\n- 目標：2030 年利潤率提升至 **8~10%**\n\n### 削產計畫\n- **中國**：已削減 **100 萬輛** 產能\n- **歐洲（VW + Audi）**：再削減 **~100 萬輛**\n- 工廠壓力：Zwickau（僅維持一款 BEV 量產）、Emden 等產能利用率不足\n- **Osnabrück**：VW 車輛生產結束，但工廠保留（洽談國防工業轉型 + 保住員工）\n- 不排除將工廠**出售給中國競爭對手**（但指出成本結構使收購不易）\n\n### 車型削減\n- 全球車型數：**150 款 → 100 款以下**（跨品牌、跨地區策略整合）\n\n### CEO 語錄\n> \"關稅、中國競爭、歐洲市場萎縮、中東局勢……這不只是暫時過渡，這就是新常態。我們將迎頭面對。\"  \n— Oliver Blume，VW 集團 CEO\n\n## 二、中國電動化攻勢（Auto China 2026）\n\nVW 集團在北京車展媒體夜發表 4 款全球首發 EV：\n\n| 車型 | 品牌 | 合作 | 特點 |\n|------|------|------|------|\n| **ID. UNYX 09** | VW | 小鵬汽車（24 個月共同開發）| 轎車，首個 VW×小鵬量產車 |\n| **ID. AURA T6** | VW（一汽大眾）| — | 中型 SUV |\n| **JETTA X** | JETTA | — | 入門級概念車 |\n| **E7X** | AUDI（中國專屬）| — | 第二款 AUDI 中國獨家車型 |\n\n- 另展出已知 Audi A6L e-tron（中國長軸距電動版）\n- 計畫：中國市場 **20+ 款新電動車**，史上最大電動化攻勢\n\n## 策略矛盾與挑戰\n- 歐洲縮減產能 vs. 中國大規模擴張，形成「兩速 VW」格局\n- VW×小鵬合作車型僅 24 個月開發（極快），顯示對中國本地化速度的緊迫感\n- Zwickau 廠以前生產 5 條 BEV 產線（多品牌），現在只剩 1 條 → 歐洲 BEV 需求不如預期\n\n## Related\n- [[entities/Stellantis]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[entities/小鵬汽車]]\n- [[sources/vw-id4-us-writedown]]\n- [[sources/vw-id3-neo-premiere]]"

    "vw-samsung-sdi-europe-battery-2026": {
      "title": "福斯引進三星SDI歐製方形電池，打造「三足鼎立」供應體系（2026-06-10）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=758068",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=758068](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=758068)\n\n# 福斯引進三星SDI歐製方形電池，打造「三足鼎立」供應體系（2026-06-10）\n\n**原文**：DIGITIMES｜**作者**：黃女瑛｜**發布**：2026-06-10\n\n## 摘要\n市場傳出**福斯集團（Volkswagen Group）**正引進南韓**三星SDI（Samsung SDI）**作為第三家核心電池供應商，在歐洲（匈牙利廠）生產方形標準電池，最快 **2027 年**落地。此舉與既有的自製（PowerCo）和中國供應商（國軒高科）合作，形成「三足鼎立」的電池供應格局。\n\n## 三足鼎立供應體系\n\n| 供應方 | 角色 | 特色 |\n|--------|------|------|\n| **PowerCo**（福斯自製）| 自有電芯廠 | 內部供應、標準電池自主 |\n| **國軒高科**（Gotion）| 中資 LFP 供應商 | 福斯為最大法人股東；LFP 技術領先 |\n| **三星SDI（新加入）** | 歐製方形電池 | 匈牙利廠增設 2 條產線；最快 2027 |\n\n## 策略動機\n\n### 1. 因應 EU IAA 法規壓力\n- 歐盟《工業加速器法案》（IAA）要求補貼與採購以歐洲本土製造為前提\n- 國軒高科為中資企業，其電池在法規上存在「非歐洲製」風險\n- 三星SDI 匈牙利廠 = 「南韓技術 × 歐洲製造」，建立法規防火牆\n\n### 2. 地緣政治分散風險\n- 美國 FEOC 規範 + 2026 年《汽車現代化法案》（中資企業持股 15% 以上列入紅線）\n- 賓士、Volvo、Lotus 已因此受到合規審查\n- 福斯為長期規劃，預先布局「去紅色供應鏈」路徑\n\n### 3. 技術補位\n- 三星SDI 正積極跨入 LFP 領域（原擅長三元 NCM）\n- 若確定為 LFP：填補歐洲本土 LFP 製造空白（中國廠以外）\n\n## 市場意涵\n- 三星SDI 首次正式進入福斯核心標準電池供應體系（過去主要供 BMW/Mercedes）\n- 為三星SDI 歐洲 ESS + EV 電池業務打開增量空間\n- 連結：6/5 報導稱三星SDI 亦被點名為 VW Unified Cell 供應商（匈牙利增產線）\n\n## Related\n- [[concepts/電池技術路線]]\n- [[concepts/歐洲EV市場]]\n- [[entities/三星SDI]]\n- [[sources/samsung-sdi-mercedes-confirmed-deal]]\n- [[sources/eu-battery-tariff-2027-delay-2026]]"
    },
    "walmart-abb-charging-rollout": {
      "title": "Walmart × ABB：400kW DC 快充大規模部署（2026-04）",
      "url": "https://insideevs.com/news/794373/walmart-abb-400-kw-ev-chargers",
      "updated": "2026-04-29",
      "body": "**來源**：[https://insideevs.com/news/794373/walmart-abb-400-kw-ev-chargers](https://insideevs.com/news/794373/walmart-abb-400-kw-ev-chargers)\n\n# Walmart × ABB：400kW DC 快充大規模部署（2026-04）\n\n**原文**：InsideEVs／Iulian Dnistran｜**發布**：2026-04-29\n\n## 摘要\n美國零售業龍頭 Walmart 開始在 Phoenix 地區部署 ABB 400kW DC 一體式快充站，計畫 2030 年前於全美數千個 Walmart/Sam's Club 門市安裝。ABB 搶先於 Alpitronic 爭取沃爾瑪大單，競品均為 400kW 全一體式設計。\n\n## 部署規格\n\n| 項目 | 詳情 |\n|------|------|\n| 首發地點 | Phoenix 地區（Mesa/Tempe/Apache Junction/Queen Creek）|\n| 近期計畫 | 9 個地點 / **38 個充電樁** |\n| 長期目標 | **2030 年前數千個 400kW 充電樁** |\n| 設備 | ABB A400 一體式 DC 快充 |\n| 充電規格 | **雙槍**（CCS + NACS）|\n| 單槍最大功率 | **400kW** |\n| 雙車同充時 | 動態分配功率 |\n| 最大電流 | **600A** |\n| 半導體 | SiC（效率 ~97%）|\n| 螢幕 | **32 吋 LCD**（vs Alpitronic 15.6 吋）|\n| 付款方式 | Walmart App（無刷卡機）|\n\n## ABB vs Alpitronic 比較\n\n| 項目 | ABB A400 | Alpitronic（已在 Walmart 部署）|\n|------|---------|---------------|\n| 最大功率 | 400kW | 400kW |\n| 最大電流 | 600A | 600A |\n| 半導體 | SiC | SiC |\n| 效率 | ~97% | ~97% |\n| 螢幕 | **32 吋 LCD** | 15.6 吋 |\n| 卡機 | 無（App）| 無（App）|\n\n## 戰略意義\n\n- Walmart 擁有全美最大零售網絡，成功進入 Walmart 代表充電基礎設施的「零售場地」可及性革命\n- Walmart 充電樁從去年幾個快速成長到 **200+ 個端口**（2026-04 當月）\n- 搭配 Uber 使用率保證模式（參見：[[sources/uber-ev-infrastructure-investment]]），零售場地充電成為快速提升使用率的關鍵路徑\n\n## Related\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/abb-m-series-charging]]\n- [[sources/uber-ev-infrastructure-investment]]"

    "waymo-arizona-expansion-2026": {
      "title": "Waymo 收購蘋果亞利桑那測試場：$2.2 億擴大 Robotaxi 基礎設施",
      "url": "",
      "updated": "2026-06-12",
      "body": "**來源**：Digitimes / Electrek（2026-06-12）\n\n# Waymo 收購蘋果亞利桑那測試場：$2.2 億擴大 Robotaxi 基礎設施\n\n**事件日期**：2026-06-12｜**金額**：$2.2 億美元\n\n## 核心事件\n\nAlphabet 旗下 Waymo 以 **$2.2 億美元**收購蘋果（Apple）位於**亞利桑那州的 5,500 英畝自駕車測試場**，大幅擴充研發與測試能力。\n\n## 測試場規格\n\n| 設施 | 規模 |\n|------|------|\n| 總面積 | **5,500 英畝**（遠超 Waymo 加州/俄亥俄州其他基地）|\n| 城市道路模擬區 | **115 英畝** |\n| 車輛動態測試區 | **35 英畝** |\n| 橢圓形測試車道 | **4 英里** |\n| 高速公路測試段 | 專用一條 |\n\n## 歷史沿革\n\n| 時間 | 事件 |\n|------|------|\n| 原建設方 | 飛雅特克萊斯勒（高溫零件測試）|\n| 蘋果介入 | Project Titan 自駕計畫租用多年 |\n| 2021 | 蘋果以 **$1.25 億**買入 |\n| 2024 初 | 蘋果宣布終止 Project Titan |\n| **2026** | Waymo 以 **$2.2 億**收購（近買入價 1.76 倍）|\n\n## Waymo 當前擴張現況（2026-06）\n\n| 指標 | 數值 |\n|------|------|\n| 車隊規模 | **近 4,000 輛** |\n| 美國服務城市 | **10+**（SF、LA、Phoenix、Austin、Atlanta 等）|\n| 覆蓋面積 | **>1,400 平方英里** |\n| 2026 年目標 | **100 萬次付費乘車/週**（現 50 萬次/週）|\n| 近期融資 | $160 億（估值 $1,260 億）|\n\n**擴張計畫**：20+ 座新城市，含首座海外城市**東京**及**倫敦**\n\n## 與 Apple Project Titan 的對比\n\nApple 耗費數十億美元後放棄，Waymo 以溢價收購——意義在於：\n1. **基礎設施稀缺性**：5,500 英畝專用自駕測試場規模難以複製\n2. **Waymo 積極擴張**：從開發到部署流程整合，鄰近其亞利桑那整合廠（239,000 sq ft）\n3. **Apple 遺產的最終轉移**：一線科技公司的自駕遺產流向目前領先的 Robotaxi 營運商\n\n## Related\n- [[concepts/Robotaxi自動計程車]]\n- [[sources/waymo-miami-orlando-expansion]]\n- [[sources/waymo-battery-secondlife-colorado-recycling-2026]]\n- [[sources/waymo-ojai-gen6-2026]]"
    },

      "url": "https://insideevs.com/news/waymo-b2u-second-life-batteries/",
      "updated": "2026-06-10",
      "body": "**來源**：[https://insideevs.com/news/waymo-b2u-second-life-batteries/](https://insideevs.com/news/waymo-b2u-second-life-batteries/)\n\n# Waymo×B2U 電池二次利用 + 科羅拉多州電池回收立法（2026-06-05/08）\n\n**原文**：InsideEVs Critical Materials｜**發布**：2026-06-05\n\n## 摘要\nWaymo 與電池二次利用新創 B2U Storage Solutions 合作，將退役的 I-Pace Robotaxi 電池組改裝為**定置儲能系統**；同期美國科羅拉多州成為**首個立法強制電池廢棄管理**的州，要求 2029 年起禁止電池填埋，並在 2035 年前達到 80% 鋰回收率。\n\n## Waymo × B2U 電池二次利用\n\n| 指標 | 內容 |\n|------|------|\n| 原始電池來源 | Waymo Robotaxi 車隊退役 I-Pace（Jaguar） |\n| 再利用形式 | 定置儲能（Stationary Storage） |\n| 合作夥伴 | B2U Storage Solutions |\n| 預計規模 | 初期批次：數百 kWh（具體未揭露） |\n| 商業意義 | 降低電池全生命週期碳排放 + Waymo 電池退役成本 |\n\n### 電動車電池二次利用邏輯\n- EV 電池在容量降至原始的 70-80% 後「退役」，但仍可作儲能用途使用 5-10 年\n- Robotaxi 電隊車輛高強度使用，退役周期 4-6 年（vs 一般私家車 10-15 年）\n- B2U 已在加州建有約 25 MWh 二次利用儲能系統\n\n## 科羅拉多州電池回收立法\n\n| 條款 | 內容 |\n|------|------|\n| 施行州 | 科羅拉多（Colorado）— 美國**首州** |\n| 禁止填埋 | **2029 年起** |\n| 回收率目標 | 2035 年 **80% 鋰回收率** |\n| 責任主體 | 電池生產商（生產者責任制 EPR） |\n\n### 立法意義\n- 美國聯邦層面電池回收法規仍付之闕如\n- 科羅拉多帶頭，預計帶動其他州效仿（加州、紐約等在觀察）\n- 歐盟《電池法》（Battery Regulation）2030 年回收目標 50% 以上，科羅拉多 80% 目標更嚴\n\n## Related\n- [[concepts/電池技術路線]]\n- [[concepts/電池供應鏈]]\n- [[concepts/Robotaxi自動計程車]]\n- [[sources/tesla-robotaxi-texas-reality-2026]]"

      "title": "Waymo Ojai：第六代 Waymo Driver + Zeekr 底盤正式上路",
      "url": "https://www.electrive.com/2026/05/29/waymo-to-launch-new-ojai-robotaxi-model-for-passenger-service/",
      "updated": "2026-05-26",
      "body": "# Waymo Ojai：第六代 Waymo Driver + Zeekr 底盤正式上路\n\n**來源**：[electrive.com](https://www.electrive.com/2026/05/29/waymo-to-launch-new-ojai-robotaxi-model-for-passenger-service/)，2026-05-29\n\n---\n\n## 核心摘要\n\nWaymo 將 Ojai 車型整合至正式乘客服務，數週內開放舊金山、鳳凰城、洛杉磯的乘客免費試乘。**這是第六代 Waymo Driver 首次商業部署**。\n\n---\n\n## 車型架構\n\n| 項目 | 詳情 |\n|------|------|\n| 底盤供應商 | **Zeekr**（吉利旗下）Zeekr Mix Van 底盤 |\n| 中國生產 | Zeekr 寧波廠製造車身（含底盤、電池、馬達）|\n| 美國整合 | Mesa, AZ（Waymo + Magna）安裝感測器、AI 電腦、軟體 |\n| 合規設計 | 聯網 AVD 技術在美裝載 → 規避中國聯網車限制令 |\n\n## 第六代 Waymo Driver 技術亮點\n\n| 對比 | 舊款（Jaguar I-Pace）| Waymo Ojai |\n|------|---------------------|------------|\n| 攝影機 | 29 個 | **13 個** |\n| LiDAR | 5 個 | **4 個** |\n| 影像感測器 | — | **1,700 萬畫素**（高熱穩定性）|\n| 音訊系統 | — | **EAR**（偵測緊急車輛 + 鐵路路口）|\n\n- 硬體成本顯著下降；減少感測器數量靠高解析影像補足\n- 整合自動清潔系統（應對惡劣天氣）\n\n## 商業擴張計畫\n\n- **即將上線城市**：Denver、Las Vegas、San Diego\n- **目標**：年底前向全體用戶開放\n- 現有車隊 ~3,000 輛 Jaguar I-Pace **繼續並行運營**\n- 同款 Gen 6 技術將用於未來 Hyundai Ioniq 5 版本\n\n---\n\n## Related\n- [[concepts/Robotaxi自動計程車]]\n- [[entities/小鵬汽車]]（對比中國 L4 Robotaxi）\n- [[sources/xpeng-robotaxi-production-2026]]\n- [[sources/av-physical-ai-trends-2026]]"

      "title": "Windrose Global E700：電動重卡降至 €195,000（2026-04-23）",
      "url": "https://www.electrive.com/2026/04/23/windrose-offers-electric-hgvs-for-less-than-e200000",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.electrive.com/2026/04/23/windrose-offers-electric-hgvs-for-less-than-e200000](https://www.electrive.com/2026/04/23/windrose-offers-electric-hgvs-for-less-than-e200000)\n\n# Windrose Global E700：電動重卡降至 €195,000（2026-04-23）\n\n**原文**：electrive.com（Cora Werwitzke）｜**發布**：2026-04-23\n\n## 摘要\n中國電動重卡新創 Windrose 將 Global E700 售價從 €250,000 降至 **€195,000**（前 100 輛優惠），首批預計 2026 年內交付，公司現以比利時安特衛普為歐洲基地。\n\n## 定價資訊\n\n| 市場 | 售價 | 說明 |\n|------|------|------|\n| 歐洲 | **€195,000**（原 €250,000）| 前 100 輛優惠 |\n| 英國 | **£139,000**（含稅前）| 受國家電動 HGV 獎勵計畫補助 |\n| 美國 | **$180,000**（不含州稅）| 受州級電動 HGV 獎勵計畫補助 |\n\n## 企業背景\n\n| 項目 | 細節 |\n|------|------|\n| 公司性質 | 中國電動卡車新創 |\n| 歐洲基地 | 比利時安特衛普港（2026 年初進駐）|\n| 降價理由 | 回應最新油價危機（中東衝突推升油價）|\n\n## 市場意義\n\n- €195,000 已低於多數傳統柴油重型卡車的等效 TCO，特別在高油價環境下\n- 與 Volvo FH Aero Electric（780kWh, €/£未公開旗艦定位）形成高低端市場對比\n- 中國廠商持續以價格策略切入歐洲電動卡車市場\n\n## Related\n- [[concepts/車輛類型/電動卡車市場]]"

      "title": "小米 2027 進軍歐洲：從 Tesla 大量挖角",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=1&cat=90&id=0000751501_QNR4CJYX1UC1IV048I945&wpidx=3",
      "updated": "2026-04-08",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=1&cat=90&id=0000751501_QNR4CJYX1UC1IV048I945&wpidx=3](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=1&cat=90&id=0000751501_QNR4CJYX1UC1IV048I945&wpidx=3)\n\n# 小米 2027 進軍歐洲：從 Tesla 大量挖角\n\n**原文**：DIGITIMES｜**發布**：2026-04-08\n\n## 摘要\n小米汽車轉虧為盈後，積極籌備 2027 年歐洲市場，從 Tesla 德國團隊挖角多位主管，包括交車/物流、區域零售等關鍵職位。\n\n## 挖角動態\n| 人物 | 原職 | 新職 |\n|------|------|------|\n| Dieter Lorenz | Tesla 中歐交車營運資深經理（德國 6 年以上） | 小米歐洲交車與物流負責人 |\n| Marvin M. | Tesla 德國主管 | 小米區域零售資深副總 |\n| 孔艷雙 | Tesla 中國區域總經理 | 加入小米（傳） |\n| 宋鋼 | Tesla 上海超級工廠「1號員工」 | 加入小米（傳） |\n| 尤海龍 | Tesla 焊裝生產負責人 | 加入小米（傳） |\n\n## 布局歷程\n- 2025 年：在慕尼黑設立研發中心，延攬多名 BMW 主管\n- 2026 年：重心從研發轉向營運與交車，新增物流、零售、交付職缺\n\n## Tesla 歐洲困境\n- 2025 年歐洲註冊量：23.5 萬輛，年減近 3 成\n- 人才流失加劇歐洲競爭劣勢\n\n## Related\n- [[entities/小米汽車]]\n- [[entities/Tesla]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/歐洲EV市場]]"

    "xiaomi-su7-2026-update": {
      "title": "小米 SU7 2026 款：91% 自動化工廠 + 全系 LIDAR，征服中國的方程式",
      "url": "",
      "updated": "2026-06-16",
      "body": "**來源**：InsideEVs（2026-06-15）\n\n# 小米 SU7 2026 款：91% 自動化工廠 + 全系 LIDAR，征服中國的方程式\n\n**事件日期**：2026-06-15\n\n## 工廠：複製手機製造哲學\n\n| 指標 | 數值 |\n|------|------|\n| 車身車間自動化率 | **91%**（2,000 名員工中僅 100 人在車身間）|\n| 生產節拍 | **每 76 秒一輛車** |\n| 類比 | 小米手機廠：**83% 自動化**，每 6 秒一台手機 |\n\n> 同一套「量產自動化」哲學從手機直接移植到汽車。\n\n## 2026 款 SU7 規格升級\n\n| 項目 | 2026 款（小改款）|\n|------|----------------|\n| 架構 | **全系 800V+** |\n| LIDAR | **全系標配**（含入門版）|\n| 懸架 | CDC 空氣懸架（入門版除外）|\n| 輪胎 | 前後異寬（wider rear）|\n| 車身 | 剛性強化 |\n\n### SU7 Max 旗艦規格\n\n| 規格 | 數值 |\n|------|------|\n| 動力 | 雙電機 **680 馬力** |\n| 電池 | **101.7 kWh NMC** |\n| 架構 | **897V** |\n| 最高充電功率 | **530 kW** |\n| 0~60 mph | **3.1 秒** |\n| 中國起售價 | **~$50,000** |\n\n## 駕駛體驗重點\n\n- 中性操控、底盤剛性、Michelin Pilot Sport 抓地 → 可放心激烈駕駛\n- 日常舒適性出色，踏板調校細膩不擾乘客\n- 螢幕反應速度、介面流暢度超過多數競品\n- 支援無線 Apple CarPlay（對比 GM 新 EV 全面移除 CarPlay）\n- 缺點：轉向偏輕、預設懸架偏軟（可軟體調整）\n\n## 競爭威脅評估\n\n- **Ford CEO Jim Farley**：開過一次後「不想還車」，用於競品分析\n- 小米已是全球第三大智慧型手機品牌（歐洲僅次 Apple / Samsung）\n- 慕尼黑歐洲研發中心已開幕，積極挖角 BMW、Lamborghini 工程師\n- **歐洲上市不可避免**（InsideEVs 評估）\n\n## Related\n- [[concepts/中國EV市場競爭格局]]\n- [[entities/小米汽車]]\n- [[concepts/中國EV出海策略]]"
    },

      "url": "https://www.electrive.com/2026/04/09/xpeng-launches-g6-and-g9-in-mexico",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/xpeng-launches-g6-and-g9-in-mexico](https://www.electrive.com/2026/04/09/xpeng-launches-g6-and-g9-in-mexico)\n\n# 小鵬汽車進軍墨西哥：G6 與 G9 正式上市\n\n**原文**：electrive｜**發布**：2026-04-09\n\n## 摘要\n小鵬汽車在墨西哥正式推出電動 SUV G6 與 G9，基於 800V 平台支援 5C 超快充，進入拉丁美洲市場，目前已進入全球 60 個國家/地區。\n\n## 產品規格\n\n| 車型 | 起售價（墨西哥披索）| 約折合歐元 |\n|------|------------------|-----------|\n| G6 | 819,900 | ~€40,327 |\n| G9 | 1,099,900 | ~€54,106 |\n\n- 平台：800V 高壓，支援 5C 超快充\n- 定位：高端電動 SUV\n\n## 市場布局\n- 合作三個經銷商集團，覆蓋墨西哥城、瓜達拉哈拉、蒙特雷\n- 備件中心：墨西哥集中倉儲，1~5 天交付\n- 4 月起陸續開設展廳\n\n## 戰略意義\n小鵬已進入全球 60 個國家/地區，墨西哥為拉丁美洲戰略市場。不同於直接出口至美國（高關稅），墨西哥是中國 EV 在北美周邊的重要布局。\n\n## Related\n- [[entities/小鵬汽車]]\n- [[concepts/地理市場/中國EV出海策略]]"

    "xpeng-physical-ai-pivot-2026": {
      "title": "小鵬更名「小鵬集團」：從智慧電動車轉型「物理AI」公司",
      "url": "",
      "updated": "2026-06-10",
      "body": "**來源**：公司公告（2026-06-06）\n\n# 小鵬更名「小鵬集團」：從智慧電動車轉型「物理AI」公司\n\n**事件日期**：2026-06-06｜**公司**：小鵬汽車（XPeng Inc.）\n\n## 核心事件\n\n小鵬汽車正式**更名為「小鵬集團」**（XPeng Group），CEO **何小鵬**宣布公司戰略定位從「智慧電動車企」轉型為**「物理AI（Physical AI）」公司**。\n\n## 戰略重定位\n\n| 維度 | 舊定位 | 新定位 |\n|------|--------|--------|\n| 公司名稱 | 小鵬汽車 | 小鵬集團 |\n| 核心業務定位 | 智慧電動車 | 物理AI |\n| 意涵 | 以EV為核心 | AI系統延伸至汽車、機器人、飛行載具 |\n\n## 「物理AI」的概念\n\n「Physical AI」（物理AI）是近期在自動駕駛和機器人領域出現的概念，強調：\n- AI 不只在數位空間運行，而是**在物理世界感知與行動**\n- 涵蓋自動駕駛、人形機器人、飛行器等**具身智能（Embodied AI）**\n- 與 NVIDIA（Jensen Huang 的 Physical AI 論述）、Tesla（Optimus）等方向一致\n\n## 背景與競爭壓力\n\n- 小鵬在中國市場面臨激烈價格戰（BYD、理想、華為問界）\n- 2024~2025 年銷量壓力促使品牌重新定位\n- 推出 MONA M03（與滴滴合作平台）後銷量有所回溫\n- 與大衆汽車的技術合作（EEA 架構）提供穩定收入\n\n## 市場觀察\n\n- 此舉跟隨科技/AI 敘事浪潮（Tesla 已稱自身為「AI + 機器人公司」）\n- **風險**：「物理AI」重定位可能分散核心汽車業務資源\n- **機遇**：若 AI 機器人市場爆發，先佔話語權具品牌優勢\n\n## Related\n- [[concepts/中國EV市場競爭格局]]\n- [[concepts/ADAS智駕系統]]\n- [[entities/小鵬汽車]]\n- [[sources/ev-news-digest-jun1-10-2026]]"
    },

      "url": "https://www.electrive.com/2026/05/29/xpeng-deliveries-fall-by-one-third/",

      "body": "# 小鵬 Q1 2026 財報：交付量年減三分之一\n\n**來源**：[electrive.com](https://www.electrive.com/2026/05/29/xpeng-deliveries-fall-by-one-third/)，2026-05-29\n\n---\n\n## 關鍵數據\n\n| 指標 | Q1 2025 | Q4 2025 | **Q1 2026** | YoY |\n|------|---------|---------|-------------|-----|\n| 交付量 | 94,008 | 116,249 | **62,682** | **-33%** |\n| 總營收 | — | — | **13.03B 元（€1.65B）** | **-17.6%** |\n| 整車銷售收入 | — | — | **11B 元（€1.4B）** | **-23.5%**（vs Q1 2025）|\n| 服務收入 | — | — | **2.03B 元（€257M）** | **+41.2%** |\n| 淨虧損 | -0.66B 元 | +0.38B（盈利）| **-1.78B 元（€225M）** | 大幅惡化 |\n\n---\n\n## 衰退原因分析\n\n### 季節效應（部分解釋）\n- 中國新年 → Q1 傳統淡季\n- 年初 NEV 補貼縮減\n- Q4→Q1 落差（-47%）符合季節規律\n\n### 公司特定問題（補充解釋）\n- 同期 Nio 未出現類似 YoY 下跌 → 非單純行業因素\n- 可能與**產品線青黃不接**有關：等待 GX 旗艦上市（5 月才正式銷售）\n\n### 亮點：服務收入 +41%\n- 主要來自 VW 技術研發合作收入（ID. Unyx 08 SUV + ID. Unyx 07 轎車）\n- VW 持股小鵬 5%，此收入具長期穩定性\n\n---\n\n## 轉機：GX 旗艦 SUV\n\n- **Xpeng GX**：2 月亮相，5 月 20 日正式上市\n- 設計靈感：外型近似 Range Rover\n- 技術亮點：**Bosch 線控轉向**（steer-by-wire），出廠即可配備 Robotaxi 版本\n- CEO He Xiaopeng：「GX 成功啟動，全年將推出 4 款新車，進入強勁銷售軌道」\n\n---\n\n## Related\n- [[concepts/中國EV市場競爭格局]]\n- [[entities/小鵬汽車]]\n- [[sources/xpeng-robotaxi-production-2026]]\n- [[sources/vw-restructure-china-offensive-2026]]"

    "xpeng-robotaxi-production-2026": {
      "title": "小鵬 Robotaxi 量產下線：中國首款全棧自研無人計程車（2026-05）",
      "url": "https://www.electrive.com/2026/05/19/xpeng-launches-series-production-of-its-robotaxi",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.electrive.com/2026/05/19/xpeng-launches-series-production-of-its-robotaxi](https://www.electrive.com/2026/05/19/xpeng-launches-series-production-of-its-robotaxi)\n\n# 小鵬 Robotaxi 量產下線：中國首款全棧自研無人計程車（2026-05）\n\n**原文**：electrive + Digitimes｜**發布**：2026-05-19~20\n\n## 核心事件\n\n小鵬汽車 2026 年 5 月 18 日宣布，首款量產無人計程車在**廣州生產線正式下線**，目標 **2027 年初完全無人駕駛營運**。\n\n## 技術規格\n\n| 項目 | 細節 |\n|------|------|\n| 基礎平台 | **GX 旗艦 SUV 平台**（車長 5.27m，6 座）|\n| 自動駕駛等級 | **L4** |\n| 自研晶片 | **圖靈 AI 晶片 × 4 顆** |\n| 算力 | **3,000 TOPS** |\n| AI 系統 | VLA（視覺語言動作）**2.0 端到端模型** |\n| 感測器方案 | **純視覺**（無 LiDAR、無高精地圖）— 與 Tesla 相同路線 |\n| 轉向 | Bosch 線傳轉向（Steer-by-Wire）|\n| 安全冗餘 | **6 層安全冗餘**架構 |\n\n## 商業化路線\n\n- 計劃 3 款車型：5 座 / 6 座 / 7 座\n- 合作平台：**高德地圖（阿里巴巴）**— 第一個全球生態系合作夥伴\n- 2026 年下半：試營運\n- 2027 年初：完全無人駕駛正式營運\n\n## 差異化定位\n\n| 對比 | 小鵬 | Tesla Cybercab | 吉利 EVA Cab |\n|------|------|----------------|------------|\n| 平台 | 消費車共用 + 延伸 | 全新設計 | 全新設計 |\n| 技術路線 | 全棧自研（晶片＋AI）| 全棧自研 | — |\n| 感測器 | 純視覺 | 純視覺 | — |\n| 時程 | 2026 試營運，2027 量產 | 2026~ | — |\n\n- 與 Tesla、Waymo 等相比，以「消費車先行驗證 → 延伸至自駕叫車」壓低成本\n- 是**中國首款**可量產、預組裝、完整自主開發的 Robotaxi\n\n## Related\n- [[concepts/中國EV市場競爭格局]]\n- [[entities/小鵬汽車]]"
