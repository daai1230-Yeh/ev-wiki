      "url": "https://www.electrive.com/2026/06/05/nissan-confirms-chery-sunderland-passenger-car-deal/",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.electrive.com/2026/06/05/nissan-confirms-chery-sunderland-passenger-car-deal/](https://www.electrive.com/2026/06/05/nissan-confirms-chery-sunderland-passenger-car-deal/)\n\n# 日產正式確認奇瑞 Sunderland 代工協議（2026-06-05）\n\n**原文**：electrive.com｜**發布**：2026-06-05\n\n## 摘要\n日產汽車（Nissan）正式確認將在英國**桑德蘭（Sunderland）工廠**為中國奇瑞汽車生產乘用車，此舉標誌著中國汽車品牌首次以「正規代工」方式進入英國本土製造。\n\n## 關鍵事實\n\n| 指標 | 內容 |\n|------|------|\n| 工廠地點 | 英國桑德蘭（日產英國主力廠） |\n| 代工業主 | 奇瑞汽車（Chery） |\n| 代工形式 | 閒置產能利用，日產作為製造服務商 |\n| 預計量產時間 | 2026 年底〜2027 年初 |\n| 背景 | 日產全球產能削減 20%，英廠面臨閒置壓力 |\n\n## 戰略意義\n\n### 日產視角\n- 日產 2025 年宣布全球削減 20% 產能及約 9,000 名員工\n- 桑德蘭年產能 60 萬輛，實際利用率不足 50%\n- 向奇瑞出租產能，既維持工廠運轉、保住英國就業，又獲得代工收入\n\n### 奇瑞視角\n- 繼泰國、西班牙等市場後，英國是歐洲重要灘頭堡\n- 「英國製造」標籤完美規避英–歐 EV 關稅壁壘（原產地規則）\n- 以最低投入（無需建廠）實現在地化生產\n\n### 更大格局\n- 奇瑞同期：Tata Avinya 平台授權（印度）、多國技術輸出\n- 顯示奇瑞「平台輸出+代工」雙輪並進的海外擴張邏輯\n- 與 SAIC/MG 自建西班牙廠形成對比：奇瑞選「輕資產」，SAIC 選「重資產」\n\n## Related\n- [[concepts/中國EV出海策略]]\n- [[concepts/歐洲EV市場]]\n- [[sources/mg-saic-spain-factory-2026]]\n- [[sources/tata-chery-avinya-platform-2026]]"
    },
    "nissan-chery-sunderland-plant": {
      "title": "日產洽談奇瑞合租桑德蘭廠：中國品牌借殼進入歐洲生產的新模式",
      "url": "https://www.electrive.com/2026/04/17/nissan-eyes-chery-deal-to-sublease-sunderland-plant",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.electrive.com/2026/04/17/nissan-eyes-chery-deal-to-sublease-sunderland-plant](https://www.electrive.com/2026/04/17/nissan-eyes-chery-deal-to-sublease-sunderland-plant)\n\n# 日產洽談奇瑞合租桑德蘭廠：中國品牌借殼進入歐洲生產的新模式\n\n**原文**：electrive.com／Cora Werwitzke ｜ **發布**：2026-04-17\n\n## 摘要\n日產桑德蘭廠（Sunderland）產能利用率僅約 50%，日產正與中國奇瑞洽談轉租廠房合作生產協議，Dongfeng 也在接洽中（但可能性較低）。這是繼 Stellantis 接洽 Dongfeng/Xpeng/Xiaomi、比亞迪與多個歐洲廠合作後，中國車廠借殼進入歐洲生產的又一案例。\n\n## 關鍵事實\n\n| 項目 | 細節 |\n|------|------|\n| 工廠 | Sunderland（英格蘭東北部）|\n| 目前產能利用率 | 約 **50%**（歷史低點曾跌破 30%）|\n| 員工人數 | 約 **6,000 人**（英國汽車業最大雇主之一）|\n| 潛在合作夥伴 | **奇瑞**（主要）、Dongfeng（次要）|\n| 現有車型 | Qashqai、Juke、Leaf（第三代 BEV）|\n| 未來車型 | 2027 年起：電動 Juke + 電動 Qashqai |\n\n## 奇瑞的歐洲攻勢脈絡\n\n| 動作 | 時間 |\n|------|------|\n| 接管南非日產廠 | 2026 年初 |\n| 進入前日產巴塞隆納廠 | 近期 |\n| 英國市佔 6%（2026 年 3 月）| Omoda + Jaecoo 品牌 |\n| 洽談桑德蘭廠 | 談判中（未正式確認）|\n\n## 更廣泛趨勢：中國車廠借殼歐洲製造\n\n| 歐洲廠方 | 中國夥伴 | 狀態 |\n|---------|---------|------|\n| Stellantis | Dongfeng, Xpeng, Xiaomi（傳聞）| 洽談中 |\n| Nissan Sunderland | 奇瑞（主要）, Dongfeng | 洽談中 |\n| 前日產巴塞隆納廠 | 奇瑞 | 已進入 |\n\n**背景邏輯**：中國 EV 廠規避歐盟關稅（27.5%+），借道歐洲本地生產降低成本。\n\n## 日產壓力\n- 同時向英國政府施壓：警告若被排除在「歐盟製造」規則外，桑德蘭廠面臨嚴重後果\n- 奇瑞是英國最快速成長的中國車廠，3 月市佔 6%\n\n## Related\n- [[entities/奇瑞]]\n- [[entities/Stellantis]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/stellantis-china-oem-expansion]]\n- [[sources/xpeng-mexico-launch]]"

    "nissan-mississippi-ev-abandonment": {
      "title": "日產完全放棄密西西比 EV 生產計畫（2026-05-05）",
      "url": "https://www.electrive.com/2026/05/05/nissan-completely-abandons-plans-for-ev-production-in-mississippi",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.electrive.com/2026/05/05/nissan-completely-abandons-plans-for-ev-production-in-mississippi](https://www.electrive.com/2026/05/05/nissan-completely-abandons-plans-for-ev-production-in-mississippi)\n\n# 日產完全放棄密西西比 EV 生產計畫（2026-05-05）\n\n**原文**：Electrive（Sebastian Schaal）｜**發布**：2026-05-05\n\n## 摘要\n日產北美宣布完全取消密西西比州 Canton 廠的 EV 生產計畫，包括原定 2028 年量產的兩款 BEV SUV（Nissan + Infiniti 品牌）。Canton 廠改擴大燃油車產能。\n\n## 決策時間線\n\n| 時間 | 動態 |\n|------|------|\n| 2025 年初 | 計畫生產 2 款電動 SUV + 2 款電動轎車 + 1 款小型電動 SUV（共 5 款）→ 後陸續縮減 |\n| 2025 年 7 月 | Canton EV 計畫「暫緩」（觀察補貼退出後市場反應）|\n| 2025 年 10 月 | 計畫「臨時中止」|\n| **2026 年 5 月** | **完全取消**（Canton 廠 EV 生產永久放棄）|\n\n## 戰略調整\n\n- **取消**：Canton 廠 EV 生產（Nissan + Infiniti 兩款 BEV SUV，原計畫 2028 年）\n- **轉向**：Canton 廠擴大**燃油車**產能（補貼退出後汽油車回升）\n- **進口替代**：美國市場改由進口 EV 供應（如新款 Leaf）\n- 已停止新年份 Ariya（BEV SUV）對美出口\n\n## 背景\n\n- Trump 政府廢止 $7,500 EV 稅額減免（2025-09-30）→ 美國 BEV 需求急凍\n- GM、Ford 均已延後或縮減美國 EV 計畫\n- 日產本身正進行全球重組（成本削減、裁員、工廠整合）\n\n## 意義\n\n- 歐、日系大廠在美國 EV 本地化製造計畫**全面後退**\n- 加上 GM 延後次代電動皮卡、Ford F-150 Lightning 停產，美國 EV 本地產能擴張幾乎停滯\n- 唯一例外：Tesla Semi（Gigafactory Nevada）\n\n## Related\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/地理市場/北美EV關稅與政策]]"
    },
    "nissan-rare-earth-reduction-2026": {
      "title": "日產新 Leaf EV 馬達：重稀土用量減 90%（2026-04-20）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752679",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752679](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752679)\n\n# 日產新 Leaf EV 馬達：重稀土用量減 90%（2026-04-20）\n\n**原文**：Digitimes（江仁傑）/ Nikkei｜**發布**：2026-04-20\n\n## 摘要\n日產汽車 2026 年 1 月在日本上市的新款 Leaf，馬達重稀土（鏑 Dy + 鋱 Tb）用量較 2010 年第一代 Leaf 減少逾 90%，主要透過配比最佳化 + 降低馬達發熱技術實現。\n\n## 技術細節\n\n| 指標 | 數值 |\n|------|------|\n| 對象稀土 | **重稀土**（鏑 Dy + 鋱 Tb）——對中國依賴度最高 |\n| 削減幅度 | **90%+**（vs 2010 年第一代 Leaf）|\n| 新款上市 | **2026 年 1 月**（日本）|\n| 方法 1 | 稀土配比最佳化（與供應商技術合作）|\n| 方法 2 | 馬達降熱技術 → 降低對耐熱添加劑需求 |\n\n## 背景：中國稀土管制風險\n\n- 重稀土功能：提升 EV 馬達耐熱性（通常添加 Dy/Tb）\n- 重稀土供應高度集中中國，難以分散\n- **真實案例**：鈴木汽車（Suzuki）2025 年 5 月曾因中國稀土出口管制暫停日本小型車生產\n\n## 產業趨勢\n\n- 日產規劃持續階段性減少稀土用量\n- 在中國以稀土作為地緣政治籌碼的背景下，減量技術已成各車廠降低供應鏈風險的關鍵\n- 類似方向：Rivian 與中國 LiDAR 廠合資在美生產（規避國安疑慮）\n\n## Related\n- [[entities/蔚來]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/車輛類型/電動卡車市場]]"

    "nissan-sakura-japan-kei-ev": {
      "title": "日產 Sakura 小改款：K-Car EV 市場競爭白熱化，鈴木、本田、比亞迪全面進場",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752876&grid_seq1=&grid_seq2=",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752876&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752876&grid_seq1=&grid_seq2=)\n\n# 日產 Sakura 小改款：K-Car EV 市場競爭白熱化，鈴木、本田、比亞迪全面進場\n\n**原文**：Digitimes（江仁傑）｜ **發布**：2026-04-23\n\n## 摘要\n日產 Sakura 推出部分改良款，鞏固在日本輕型 EV 市場的地位。自 2022 年上市以來連續三年銷售冠軍，但 2024 年度日本 EV 市場萎縮讓銷量承壓。2026 年競爭者全面湧入：Honda N-ONE e:、鈴木 eEvery/Visione-Sky、比亞迪海獺（Rakko）。\n\n## Sakura 現況\n\n| 項目 | 數值 |\n|------|------|\n| 上市時間 | 2022 年 6 月（與三菱 eK×EV 共同開發）|\n| 連續銷售冠軍 | 2022~2024 年度，連續 **3 年**日本 EV 銷售榜首 |\n| 2024 年度日本 EV 總量 | **<7 萬輛**（較 2023 年減少 ~1.4 萬輛）|\n| 2025 年度預測 | 回升至 **8 萬輛以上** |\n| 改款後入門價 | 約 **186.9 萬日圓（~$1.2 萬美元）**（含政府補貼後）|\n\n## 日本 K-Car EV 競爭格局（2026）\n\n| 品牌 | 車型 | 時間 | 特點 |\n|------|------|------|------|\n| 日產 | Sakura（改款）| 2026 | 連續三年冠軍，改款穩守市場 |\n| 本田 | N-ONE e: | 2025 年 9 月上市 | 首款 K-Car 乘用 EV |\n| 鈴木 | eEvery | 2026 年 3 月 | 商用輕型電動車 |\n| 鈴木 | Visione-Sky | 2026 年度內 | 乘用 K-Car EV |\n| 比亞迪 | 海獺（Rakko）| 2026 年夏 | 中國廠商首次針對日本開發 K-Car |\n\n## 市場特性\n- K-Car EV 車主習慣在家夜充，對續航要求彈性 → 電池可輕量化\n- 日產策略：強調「現有續航不滿意度低」，不追求高續航差異化\n- 日產另鎖定「持車四年以上舊 Sakura 車主」推動換購\n\n## Related\n- [[entities/本田]]\n- [[entities/比亞迪]]\n- [[concepts/日本EV市場]]\n- [[sources/honda-super-one-byd-rakko]]"

    "nissan-solid-state-battery-2028": {
      "title": "日產全固態電池：23 層電芯疊加成功，2028 年度量產車目標",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752694",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752694](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752694)\n\n# 日產全固態電池：23 層電芯疊加成功，2028 年度量產車目標\n\n**原文**：DIGITIMES／江仁傑 ｜ **發布**：2026-04-20\n\n## 摘要\n日產在 2026-04-20 技術說明會上公開全固態電池最新進度：研究團隊完成 23 層電芯疊加功能驗證（即量產車所需規模），朝 2028 年度（2028/4~2029/3）實用化目標邁進。同時展示 AI 自動駕駛進展與減 90% 重稀土馬達。\n\n## 固態電池開發里程碑\n\n| 里程碑 | 狀態 |\n|--------|------|\n| 單一電芯原型達標（2025 年）| ✅ 完成 |\n| 23 層電芯疊加功能驗證 | ✅ **2026-04-20 完成** |\n| 量產化製造技術評估 | 🔄 進行中 |\n| 量產車搭載 | 🎯 2028 年度（2028/4–2029/3）|\n\n## 技術性能目標（vs 現行鋰離子電池）\n\n| 指標 | 全固態電池 | 現行鋰離子 |\n|------|-----------|-----------|\n| 體積能量密度 | **2 倍** | 基準 |\n| 充電時間 | **現有的 1/3** | 基準 |\n| 理論效果 | 同體積電池續航力翻倍 | — |\n\n## 配套技術：V2H 雙向充電器\n- 日產同場發表：連結 EV 與家庭電力系統的雙向充電器\n- 預計 2028 年開始銷售\n- 現行類似設備售價 ~150 萬日圓（$9,400）→ 日產目標大幅降價至一般家庭可負擔\n\n## 日本主要廠商固態電池時程對比\n\n| 廠商 | 量產目標 | 合作夥伴 |\n|------|---------|---------|\n| **豐田** | **2027 年度量產** | 出光興產（電解質材料）|\n| **日產** | **2028 年度量產** | 自研（橫濱研究中心）|\n| **本田** | 2020 年代後半 | 自研，已投入 430 億日圓 |\n\n- 日廠普遍視全固態電池為「從中國電池廠奪回主導權的王牌」\n- 中國電池廠（寧德時代等）在現行鋰電池掌握全球約 70% 市佔\n\n## Related\n- [[entities/豐田]]\n- [[entities/本田]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[sources/china-sodium-battery-2026]]"

    "nordic-ev-april-2026": {
      "title": "北歐四國 EV 滲透率：挪威 98.6%，丹麥 81.9%（2026 年 4 月）",
      "url": "https://www.electrive.com/2026/05/21/two-in-three-new-cars-in-nordic-countries-are-electric",
      "updated": "2026-05-22",
      "body": "**來源**：[https://www.electrive.com/2026/05/21/two-in-three-new-cars-in-nordic-countries-are-electric](https://www.electrive.com/2026/05/21/two-in-three-new-cars-in-nordic-countries-are-electric)\n\n# 北歐四國 EV 滲透率：挪威 98.6%，丹麥 81.9%（2026 年 4 月）\n\n**原文**：electrive.com，2026-05-21\n**作者**：Daniel Bönnighausen\n\n## 摘要\n\n2026 年 4 月，北歐四國合計每三輛新車中有**兩輛為純電動車（BEV）**，由挪威和丹麥帶動，芬蘭和瑞典仍在發展中。\n\n## 各國 BEV 滲透率（2026 年 4 月）\n\n| 國家 | BEV 占比 | 備注 |\n|------|---------|------|\n| **挪威** | **98.6%** | 共 11,103 輛；前十名全為純電 |\n| **丹麥** | **81.9%** | 一年前為 63.3%；私人購買 **96.3%** |\n| **芬蘭** | 48.8% | |\n| **瑞典** | 42.0% | |\n| **北歐整體** | ~**67%**（兩輛中有一輛以上）| |\n\n## 各國暢銷車型\n\n| 國家 | 第一名 | 說明 |\n|------|--------|------|\n| 挪威 | **VW ID.4** | 前十全純電 |\n| 丹麥 | **Škoda Elroq** | 最高新登記數 |\n| 瑞典 | **Volvo EX40** | |\n| 芬蘭 | Toyota Yaris Cross（第一）；Škoda Enyaq BEV（第二）| 混合動力仍有競爭力 |\n\n## 市場意義\n\n- 挪威：新車市場**實質完全電動化**（98.6%，幾近百分之百）\n- 丹麥：私人購車 96.3% 為 BEV，企業/商業購車拉低整體數字\n- 芬蘭、瑞典：ICE 和 HEV 仍在前十榜，反映公共充電基礎設施和補貼政策差距\n- 北歐是全球 EV 成熟市場的最佳示範——先行一步 5~10 年，給全球其他市場提供路線圖\n\n## Related\n- [[concepts/歐洲EV市場]]\n- [[concepts/充電基礎建設]]"
    },

      "title": "美伊衝突推升油價，SNE：全球 EV 普及提前最多 2 年",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751562&grid_seq1=&grid_seq2=",
      "updated": "2026-04-09",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751562&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751562&grid_seq1=&grid_seq2=)\n\n# 美伊衝突推升油價，SNE：全球 EV 普及提前最多 2 年\n\n**原文**：DIGITIMES／陳玟靜｜**發布**：2026-04-09\n\n## 摘要\n美伊戰爭造成油價從韓元 1,600/公升飆升至 2,200/公升，SNE Research 上修全球 EV 滲透率預測，普及時程可能提前 2 年以上。\n\n## SNE Research 預測修正\n\n| 年份 | 原預測滲透率 | 修正後 | 普及提前 |\n|------|-----------|--------|---------|\n| 2026 | 27% | 29% | 0.5 年 |\n| 2027 | 30% | 35% | 1 年 |\n| 2028+ | — | — | 2 年以上 |\n\n## 市場佐證\n- 韓國 2026 年初至 3 月 10 日：售出 5.2 萬輛 EV，年增約 **2.6 倍**\n- 全球汽車經銷商：EV 訂單量較以往大幅提升\n\n## 全球電池市占（2026 年 1–2 月）\n- 總電池使用量：134.9 GWh（+4.4% YoY）\n- 寧德時代：42.1%（from 38.7%）\n- 韓系三廠：15%（-2.2pp）\n\n## 對 EV 產業的影響\n油價不確定性 → 消費者提前切換 EV → 韓系電池廠業績有望從 H2 2026 反彈\n\n## Related\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[entities/寧德時代]]\n- [[sources/lges-loss-ess-2026]]"

    "opel-peugeot-long-range-delay": {
      "title": "Opel 與 Peugeot 長續航版 EV 等待時間嚴重延遲",
      "url": "https://www.electrive.com/2026/04/09/opel-peugeot-face-long-delivery-times-for-long-range-evs",
      "updated": "2026-04-13",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/opel-peugeot-face-long-delivery-times-for-long-range-evs](https://www.electrive.com/2026/04/09/opel-peugeot-face-long-delivery-times-for-long-range-evs)\n\n# Opel 與 Peugeot 長續航版 EV 等待時間嚴重延遲\n\n**原文**：electrive／Florian Treiss｜**發布**：2026-04-09\n\n## 摘要\nStellantis 旗下 Opel 與 Peugeot 的長續航版電動車交付延至 2027 年初，影響已支付溢價的客戶，根源在於特定大電池供應商產能爬坡不順及大型企業車隊訂單被優先排程。\n\n## 受影響車型\n- **Opel Grandland**（長續航版，97 kWh）\n- **Peugeot e-3008**（長續航版，97 kWh）\n- **Peugeot e-5008**（長續航版，97 kWh）\n\n## 延遲狀況\n- 德國 Stellantis 經銷商：交付已推遲至 **2027 年 Q1~Q2**\n- 部分經銷商尚無確定交車日期\n- 企業客戶預計 **2026 年 9 月**前完成；個人客戶等至 **2027 年 Q1**\n\n## 根本原因\n1. **供應商產能爬坡不順**：97 kWh 大電池的特定供應商產能比預期慢\n2. **B2B 車隊訂單被優先**：企業車隊客戶占訂單近 90%，Stellantis 優先排程大型車隊訂單\n\n## 市場影響\n- 客戶選擇多付 ~€5,000 升級 97 kWh → 73 kWh 長續航版，卻無法及時拿車\n- 部分客戶取消合約或要求過渡車輛（成本由經銷商承擔）\n\n## Related\n- [[entities/Stellantis]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/stellantis-opel-leapmotor-suv]]"
    },
    "osaka-expo-chinese-ebus-defect-2026": {
      "title": "大阪世博中國電動巴士安全事故：進口商破產，75 億日圓購車款恐難追回",
      "url": "https://ec.ltn.com.tw/article/breakingnews/5437061",
      "updated": "2026-05-15",
      "body": "**來源**：[https://ec.ltn.com.tw/article/breakingnews/5437061](https://ec.ltn.com.tw/article/breakingnews/5437061)\n\n# 大阪世博中國電動巴士安全事故：進口商破產，75 億日圓購車款恐難追回\n\n**原文**：自由財經 | 編譯盧永山｜**發布**：2026-05-14\n**事件地點**：日本大阪世博（2025–2026）\n\n## 事件摘要\n\n大阪地鐵透過進口商 **EV Motors Japan（EVMJ）**購入 **190 輛中國產電動巴士**（150 輛世博用，40 輛備用），用於世博場地接駁。期間發生多起安全事故，最終解約，但因 EVMJ 申請破產，**75 億日圓**購車款回收面臨困難。\n\n## 安全缺陷\n\n| 問題 | 嚴重程度 |\n|------|---------|\n| 行駛中車身左右搖晃，方向盤操作不靈 | 致命缺陷 |\n| 煞車軟管與車身摩擦，煞車性能異常 | 致命缺陷 |\n| 支撐車軸零件損壞，車軸不穩定 | 致命缺陷 |\n\n調查範圍：日本全境 317 輛 EVMJ 進口電動車。\n\n## 財務影響\n\n| 項目 | 金額 |\n|------|------|\n| 150 輛世博巴士採購費 | **75 億日圓**（約新台幣 15 億元）|\n| 政府補貼部分 | **40 億日圓**（新台幣 ~8 億元）|\n| EVMJ 申報債務 | **57 億日圓**（破產保護）|\n\n- 大阪地鐵 2026-03 向 EVMJ 發解約通知\n- EVMJ 2026-04 申請企業破產保護\n- 逾 100 輛巴士目前停在大阪地鐵場地無處可去\n\n## 爭議點\n\n大阪市議會質疑：為何向成立僅 5 年（2019 年成立）的 EVMJ 大量採購？大阪地鐵當時條件（行駛中充電試驗、自駕數據取得、量產體系）國內無企業滿足，故轉向進口。\n\n## 產業意義\n\n這是中國電動巴士出海的重大負面案例，暴露：\n1. 品質控管不足（車身結構 + 制動系統雙重缺陷）\n2. 進口商財務脆弱（資本薄弱的中間商）\n3. 日本市場對中國電動車的信任危機\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[entities/比亞迪]]\n- [[sources/bogota-711-electric-buses]]"
    },
    "osaka-metro-chinese-ebus-quality-2026": {
      "title": "大阪地鐵全面停用 190 輛中國製電動巴士：¥75 億損失危機（2026-05）",
      "url": "https://www.cna.com.tw/news/aopl/202605190266.aspx",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.cna.com.tw/news/aopl/202605190266.aspx](https://www.cna.com.tw/news/aopl/202605190266.aspx)\n\n# 大阪地鐵全面停用 190 輛中國製電動巴士：¥75 億損失危機（2026-05）\n\n**原文**：Google Alerts（聯合新聞網等）｜**發布**：2026-05-20\n\n## 事件摘要\n\n大阪地鐵宣布**全面放棄**將 190 輛電動巴士轉用於市區路線或自駕測試的計畫，採購可能成為重大財務損失。\n\n## 問題來源\n\n| 項目 | 細節 |\n|------|------|\n| 供應商 | **EV Motors Japan（EVMJ）**，總部：北九州市 |\n| 宣稱 | 「日本國產電動巴士」|\n| 實際 | **中國廠商代工生產**（後被揭露）|\n| 車型數量 | 190 輛（大型 + 小型 + 超小型）|\n| 採購投入 | **約 ¥75 億日圓**（過半為中央與地方政府補助款）|\n\n## 故障紀錄\n\n- 電路異常、車門開關失效、轉向不靈敏\n- 煞車與動力系統故障\n- **最嚴重事故**（2025 年 9 月）：行駛中巴士突然失控偏向，方向盤無反應，撞上分隔島\n\n## 後續處置\n\n- 大阪地鐵與大阪市政府對結果高度不滿\n- 日本國土交通大臣（2026 年 4 月）宣布向大阪地鐵追討 **~¥6 億政府補助金**\n- 事件持續發酵（2026 年 5 月）\n\n## 與大阪世博事件對比\n\n同期大阪地區另一起中國 EV 巴士事故：大阪世博電動巴士中間商破產（Batch 18 已收錄），兩起事件共同凸顯日本市場對中國製 EV 巴士的**品質信任危機**。\n\n## 市場意義\n\n- 與 BYD 日本第 500 輛電動巴士里程碑（Batch 19）形成對比：日本 EV 巴士市場同時呈現「BYD 直銷模式成功」vs「不明品牌代工失敗」的兩極\n- 強化「品牌透明度」與「直銷 vs 中間商」在日本市場的重要性\n- 可能影響日本政府未來 EV 巴士補助審查標準\n\n## Related\n- [[concepts/電動巴士市場]]\n- [[sources/byd-japan-500buses-2026]]\n- [[sources/osaka-expo-chinese-ebus-defect-2026]]"
    },
    "passive-components-ev-ai-2026": {
      "title": "被動元件景氣兩極化：AI、車用電子獨領成長，消費性電子疲軟",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752022",
      "updated": "2026-04-14",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752022](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752022)\n\n# 被動元件景氣兩極化：AI、車用電子獨領成長，消費性電子疲軟\n\n**原文**：DIGITIMES／王嘉瑜｜**發布**：2026-04-14\n\n## 摘要\n台灣被動元件大廠國巨、華新科 2026 年 Q1 營收創歷史新高，主因 AI 伺服器與車用電子需求支撐，而消費性電子（手機、PC/NB）下修訂單，業界預期全年「兩極化」發展，MLCC 供應趨緊，漲價循環啟動。\n\n## Q1 2026 業績\n\n| 廠商 | Q1 營收 | YoY | 備註 |\n|------|---------|-----|------|\n| **國巨** | NT$381.66 億 | **+22.7%** | 單季歷史新高 |\n| 國巨（3 月單月）| NT$136.3 億 | +22.8% | 單月歷史新高 |\n| **華新科** | NT$95.62 億 | **+9.5%** | 近 5 年同期新高 |\n\n## 供需格局\n\n### 成長驅動（正面）\n- AI 伺服器 + 高效能運算（HPC）：鉭電容、MLCC 強勁需求\n- 車用電子：智慧化加速，搭載數量與複雜度直線上升\n- 地緣政治風險推升 Au/Ag/Cu 金屬原料 → 晶片電阻、磁珠電感、保護元件漲價\n\n### 負面因素\n- 消費性電子（手機、PC/NB）：遭砍單幅度最高 30%\n- 記憶體缺貨漲價影響網通客戶拉貨\n- 下半年訂單能見度降低\n\n## MLCC 供應趨緊\n- 村田、三星電機、TDK 等日韓大廠 Q1 交期普遍延長\n- MLCC 預期將接棒鉭電容成下一個漲價產品線\n- 國巨積極與客戶協商 2026 年新一波漲價\n\n## Related\n- [[concepts/基礎設施與供應鏈/車用半導體供應鏈]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]"
    },
    "polestar-3-800v-upgrade": {
      "title": "Polestar 3 升級 800V 架構與 Breathe Charge 軟體（2026）",
      "url": "https://www.electrive.com/2025/10/01/polestar-3-to-adopt-800-volt-architecture",
      "updated": "2026-04-27",
      "body": "**來源**：[https://www.electrive.com/2025/10/01/polestar-3-to-adopt-800-volt-architecture](https://www.electrive.com/2025/10/01/polestar-3-to-adopt-800-volt-architecture)\n\n# Polestar 3 升級 800V 架構與 Breathe Charge 軟體（2026）\n\n**原文**：electrive.com｜**發布**：2026-04-27\n\n## 摘要\nPolestar 3（2026 款）全面升級至 800V 架構，DC 快充峰值從 250kW 提升至 350kW，10-80% 充電時間縮短至 22 分鐘。同步導入 Breathe Charge 自適應電池管理軟體，10 分鐘充電可多補充 38% 續航。\n\n## 規格升級對照\n\n| 項目 | 舊款（2025）| 新款（2026）|\n|------|-----------|-----------|\n| 電壓架構 | 400V | **800V** |\n| DC 快充峰值 | 250kW | **350kW**（+40%）|\n| 10-80% 充電時間 | — | **22 分鐘** |\n| 後馬達輸出（單馬達）| 295hp | **333hp** |\n| 雙馬達 | 483hp | **544hp** |\n| 性能版 | — | **680hp** |\n| 算力（Nvidia AGX Orin）| 30 TOPS | **254 TOPS**（提升 8 倍）|\n\n## Breathe Charge 軟體（Breathe Battery Technologies）\n\n- 持續即時監測電池狀態，動態調整充電速度\n- 10 分鐘充電新增續航：**多 38%**（vs 無軟體）\n- 在低溫下可達到接近最佳溫度時的充電效率\n- 現有車主可獲免費改裝升級至新一代電腦\n\n## 硬體升級範疇\n\n- 全新電池、馬達、逆變器、線束（extensive changes）\n- 800V 架構降低能量損耗、熱應力和線纜重量\n\n## 意義\n\nPolestar 3 在 2026 款完成了三項同步升級：**800V 架構 + 高性能軟體充電管理 + AI 算力飛躍**，使充電體驗直接追上 Porsche（Taycan 最高 270kW/800V）且性能大幅超越。\n\n## Related\n- [[entities/Polestar]]（待補）\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/電池與技術/ADAS智駕系統]]"
    },
    "porsche-cayenne-coupe-electric": {
      "title": "Porsche Cayenne Coupé Electric 世界首發（北京車展 2026）",
      "url": "https://www.electrive.com/2026/04/24/porsche-unveils-cayenne-coupe-electric",
      "updated": "2026-04-24",
      "body": "**來源**：[https://www.electrive.com/2026/04/24/porsche-unveils-cayenne-coupe-electric](https://www.electrive.com/2026/04/24/porsche-unveils-cayenne-coupe-electric)\n\n# Porsche Cayenne Coupé Electric 世界首發（北京車展 2026）\n\n**原文**：electrive.com／Florian Treiss｜**發布**：2026-04-24\n\n## 摘要\n保時捷在 2026 北京車展發布 Cayenne Coupé Electric 量產版，三款動力配置，最高 669km WLTP 續航，頂配 Turbo 版採 800V/113kWh/400kW 快充，16 分鐘完成 10-80%。德國起售價 €109,000。\n\n## 三款配置對照\n\n| 車型 | 功率（一般）| 峰值功率 | 0-62mph |\n|------|----------|---------|--------|\n| Cayenne Coupé Electric（base）| 300kW（408hp）| — | 4.8 秒 |\n| Cayenne S Coupé Electric | 400kW | **490kW（667hp）** | 3.8 秒 |\n| Cayenne Turbo Coupé Electric | 630kW | **850kW（1,156hp）** | **2.5 秒** |\n\n## 技術規格\n\n| 項目 | 數值 |\n|------|------|\n| 起售價（德國）| **€109,000** |\n| 最大 WLTP 續航 | **669km** |\n| Turbo 電池 | **113kWh** |\n| Turbo 電壓架構 | **800V** |\n| Turbo DC 快充峰值 | **400kW** |\n| Turbo 10-80% | **<16 分鐘** |\n| Cd 值 | **0.23**（vs SUV 版 0.25）|\n| 設計靈感 | 911 跑車側面輪廓 |\n\n## 生產與交付\n\n- 生產地：Bratislava，Slovakia（與燃油/混動 Cayenne 同線）\n- 量產啟動：2026 年 2 月\n- 首批交付：**2026 年夏末**\n- 訂單：德國及其他市場已開放\n\n## 戰略意義\n\n- 電動版 Cayenne Coupé 完善了電動化陣容（底盤版 2025-11 發布 → S 版 2026-03 → Coupé 2026-04）\n- 400kW 充電與 800V 架構：在豪華電動 SUV 中屬頂級規格\n\n## Related\n- [[entities/Porsche]]（待補）\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/porsche-exits-rimac]]"

      "url": "https://www.electrive.com/2026/04/25/porsche-exits-bugatti-rimac-and-rimac-group",
      "updated": "2026-04-25",
      "body": "**來源**：[https://www.electrive.com/2026/04/25/porsche-exits-bugatti-rimac-and-rimac-group](https://www.electrive.com/2026/04/25/porsche-exits-bugatti-rimac-and-rimac-group)\n\n# Porsche 退出 Bugatti Rimac 與 Rimac Group（2026-04）\n\n**原文**：electrive.com／Florian Treiss｜**發布**：2026-04-25\n\n## 摘要\n保時捷宣布出售其在 Rimac Group（21%）及合資公司 Bugatti Rimac 中的所有股份，買家為紐約創投公司 HOF Capital（背後是埃及富豪 Sawiris 家族）。結束了自 2018 年開始的長達 8 年合作關係。\n\n## 交易要點\n\n| 項目 | 詳情 |\n|------|------|\n| 賣方 | Porsche（VW 集團子公司）|\n| 出售標的 | Rimac Group（21%）+ Bugatti Rimac（保時捷持股）|\n| 買方 | **HOF Capital**（紐約創投；Sawiris 家族背景）|\n| Sawiris 家族 | 埃及 Orascom 集團；Nassef Sawiris 持有 Adidas 6%；Aston Villa 共同擁有者 |\n| Porsche CEO 說明 | 「聚焦核心業務」|\n\n## Rimac 合作歷史\n\n- **2018**：Porsche 取得 Rimac 10% 股份\n- **2021**：Porsche 將 Bugatti 品牌納入合資公司 Bugatti Rimac（Rimac 持 55% 主導）\n- **Porsche 持股提升至 21%**（截至退出前）\n- 傳言一年前 Rimac 試圖推擠 Porsche 出局\n\n## Rimac Group 四大事業部\n\n| 事業部 | 業務 |\n|--------|------|\n| **Bugatti Rimac** | 超跑（Rimac Nevera BEV + Bugatti 燃油超跑）|\n| **Rimac Technology** | Tier 1 供應商：為 **BMW i7** 提供電池系統等 |\n| **Verne** | 自研 Robotaxi 服務（2026 年在札格雷布啟動，擴展至歐洲+中東）|\n| **Rimac Energy** | 固定式電池儲能業務 |\n\n## 意義\n\n- 保時捷（VW 集團）在電氣化轉型壓力下聚焦核心業務，出售早期科技投資\n- Rimac Technology 仍為歐洲電動超跑/豪車供應鏈重要一環（BMW i7 電池）\n- **Verne Robotaxi** 成為歐洲第一個有中東背景投資人支持的自駕計程車平台\n\n## Related\n- [[entities/Porsche]]（待補）\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/porsche-cayenne-coupe-electric]]"

    "qualcomm-bosch-adas-expansion": {
      "title": "高通 × 博世 ADAS 合作擴大：車用晶片高度整合話語權",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751998",
      "updated": "2026-04-14",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751998](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751998)\n\n# 高通 × 博世 ADAS 合作擴大：車用晶片高度整合話語權\n\n**原文**：DIGITIMES／劉憲杰｜**發布**：2026-04-14\n\n## 摘要\n高通（Qualcomm）與博世（Bosch）將原有座艙平台合作擴展至 ADAS 系統，整合車用運算平台與自駕輔助系統，首批搭載車款預計 **2028 年上路**，強化高通在車用晶片市場的話語權。\n\n## 合作歷程與規模\n\n| 項目 | 詳情 |\n|------|------|\n| 既有合作基礎 | 博世基於 Qualcomm Snapdragon 座艙平台開發車用電腦 |\n| 累計交付量 | **1,000 萬台**（全球汽車市場）|\n| 新擴展領域 | ADAS（先進駕駛輔助系統）|\n| 首批上路 | **2028 年** |\n\n## 技術方向：集中式運算架構\n\n- 趨勢：汽車從多個獨立控制單元 → 少數高效能車用電腦統一管理\n- 整合優勢：座艙平台 + ADAS 一體化，車廠採購更簡化\n- 東亞市場已取得多家全球客戶訂單\n- 涵蓋從入門級 ADAS 到進階自動駕駛系統的廣泛配置\n\n## 競爭意義\n- 高通已在座艙平台領域市佔率居領先集團\n- 擴展 ADAS 縮小與現有 ADAS 領先競爭對手的差距（如 Mobileye、NVIDIA）\n- 掌握多技術平台的整合供應商在未來集中架構中更具優勢\n\n## Related\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/基礎設施與供應鏈/車用半導體供應鏈]]"

    "ratp-karsan-autonomous-bus-paris": {
      "title": "巴黎 RATP × Karsan：L4 自動駕駛巴士六個月試驗成功，獲法國法規許可",
      "url": "https://www.electrive.com/2026/04/17/ratp-and-karsan-wrap-up-autonomous-bus-trial-in-paris",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.electrive.com/2026/04/17/ratp-and-karsan-wrap-up-autonomous-bus-trial-in-paris](https://www.electrive.com/2026/04/17/ratp-and-karsan-wrap-up-autonomous-bus-trial-in-paris)\n\n# 巴黎 RATP × Karsan：L4 自動駕駛巴士六個月試驗成功，獲法國法規許可\n\n**原文**：electrive.com／Florian Treiss ｜ **發布**：2026-04-17\n\n## 摘要\nRATP（巴黎大眾運輸）與 Karsan 完成為期六個月的 L4 自動駕駛電動中巴（Karsan e-ATAK）在巴黎 393 路線的定期服務試驗。累計行駛 3,000 公里，自動駕駛成功率 98%，並獲得法國 DGEC 官方許可，電動中巴現可在全法國公共運輸中自動運行。\n\n## 試驗概要\n\n| 指標 | 數值 |\n|------|------|\n| 路線 | 393 路（Sucy–Bonneuil RER ↔ Thiais，8.5 公里）|\n| 試驗期 | **六個月** |\n| 累計里程 | **約 3,000 公里**（混合交通）|\n| 每日運行 | 平均 5 小時 |\n| 自動駕駛成功率 | **98%**（無需司機介入）|\n| 安全員 | 全程隨行（安全駕駛員在場）|\n| 技術夥伴 | Adastec（LiDAR + 雷達 + 紅外線 + 軟硬體）|\n\n## 法規里程碑\n- 獲得法國 DGEC（交通部自動化移動認證機構）官方許可\n- **首款獲許可在全法國公共運輸系統自動運行的電動中巴**\n\n## Karsan + Adastec 合作網絡\n\n| 地點 | 專案 | 進度 |\n|------|------|------|\n| 巴黎（法國）| RATP × Karsan | **已完成**，獲法規許可 |\n| 斯塔萬格（挪威）| Karsan × Adastec | 2022 年起試驗中，下一步：**無安全員全自動** |\n| 漢諾威附近 Burgdorf（德國）| Üstra × Karsan | 2025 年起，同款車型 |\n\n## 對自動駕駛巴士產業的意義\n- 98% 成功率 + 法規認證：L4 自動駕駛巴士「可規模化技術」的有力論據\n- 巴黎（全球最複雜都市環境之一）作為試驗場，說服力強\n- 下一步：斯塔萬格挑戰「無安全員」完全自動化\n\n## Related\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[sources/robotaxi-market-2026]]\n- [[sources/taiwan-av-special-scenes]]"

    "rivian-lidar-china-partner-2026": {
      "title": "Rivian 考慮與中國廠商合作在美本土生產 LiDAR（2026-05-06）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754327",
      "updated": "2026-05-06",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754327](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754327)\n\n# Rivian 考慮與中國廠商合作在美本土生產 LiDAR（2026-05-06）\n\n**原文**：Digitimes（徐畇融）/ Reuters｜**發布**：2026-05-06\n\n## 摘要\nRivian CEO RJ Scaringe 表示，公司正考慮利用中國技術（禾賽科技、速騰聚創等），透過合資公司在美國本土生產自動駕駛 LiDAR 感測器，以規避國安疑慮並滿足 R2 車款的自駕硬體需求。\n\n## 核心訊息\n\n| 項目 | 細節 |\n|------|------|\n| 需求 | R2 車款搭載**小型 LiDAR**（非 Waymo 的大型旋轉式）|\n| 現況 | 符合 Rivian 需求的低百元美元 LiDAR 選項**幾乎全來自中國** |\n| 方案 | 不直接從中國採購，考慮**與中國廠商合資在美生產** |\n| 可能合作夥伴 | 禾賽科技（Hesai）、速騰聚創（RoboSense）等（未點名）|\n\n## Rivian 自研晶片進度\n\n| 晶片 | 代號 | 製程 | 預計量產 |\n|------|------|------|---------|\n| 第一代 | RAP-1 | 台積電 **5nm** | **2026 年** |\n| 第二代 | RAP-2 | 比 5nm 更先進 | 後續 |\n| 第三代 | RAP-3 | 比 5nm 更先進 | 後續 |\n\n- 晶片計畫已投入**數億美元**\n\n## 市場背景\n\n- 全球小型低價 LiDAR 市場：幾乎由禾賽科技 + 速騰聚創主導\n- 中國製 LiDAR 在美國具**國安疑慮**（類似 DJI 無人機案例）\n- 其他美國車廠亦對美國本土生產 LiDAR 表達興趣，可能形成聯合採購\n\n## Related\n- [[entities/Rivian]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/地理市場/美國EV市場與政策]]"
    },
    "rivian-r2-deliveries-2026": {
      "title": "Rivian R2 正式開始交車",
      "url": "",
      "updated": "2026-06-12",
      "body": "**來源**：electrive（2026-06-10）\n\n# Rivian R2 正式開始交車\n\n**事件日期**：2026-06-10｜**地點**：美國伊利諾伊州 Normal 廠\n\n## 核心事件\n\nRivian 開始向首批客戶交付 **R2** 電動 SUV，標誌這款期待已久的中價位車型正式進入市場。\n\n## R2 規格與定價\n\n| 規格 | 數值 |\n|------|------|\n| 首批車型 | **R2 Performance（Launch Package）** |\n| 起售價 | **$57,990** |\n| 後續版本預計價格 | **~$45,000** |\n| 量產啟動 | 2026-04（Normal, Illinois 廠）|\n| 交車啟動 | **2026-06-10** |\n\n## 市場定位\n\n- R2 為 Rivian 從「高端越野（R1T/R1S，>$70K）」切入「大眾市場（~$45~58K）」的關鍵車型\n- 首公佈：2024-03（超過 2 年的等待）\n- 定價已在 [[sources/rivian-service-network-2026]] 紀錄中提及早期服務網絡布局\n\n## 歐洲市場不確定性\n\n- Rivian 原宣布 **2027 年**進入歐洲，但 2026 年初已從歐洲網站悄然移除此時程\n- R1 系列從未引入歐洲\n- 歐洲市場策略尚未公開確認\n\n## 里程碑意義\n\n- Rivian 在 R1 系列（超過 $70K）之後，首款大眾價位車型交車\n- 與 [[sources/uber-ev-infrastructure-investment]] 中 Uber 預訂 10,000 輛 R2 的協議匹配（2028 起 25 城市）\n- R2 的量產是 Rivian 財務健全度的重要指標（長期虧損中）\n\n## Related\n- [[concepts/美國EV市場與政策]]\n- [[entities/Rivian]]\n- [[sources/rivian-r2-range-specs]]\n- [[sources/rivian-service-network-2026]]\n- [[sources/uber-ev-infrastructure-investment]]"

    "rivian-r2-range-specs": {
      "title": "Rivian R2 EPA 續航數據出爐：335 英里，效率勝 Tesla Model Y",
      "url": "https://insideevs.com/news/792230/rivian-r2-epa-range-efficiency/?utm_source=update.insideevs.com&utm_medium=newsletter&utm_campaign=rivian-r2-beats-range-estimate&_bhlid=59ae0a5eba06331bc9e58c3e3dc738bf90a0f6f3",
      "updated": "2026-04-08",
      "body": "**來源**：[https://insideevs.com/news/792230/rivian-r2-epa-range-efficiency/?utm_source=update.insideevs.com&utm_medium=newsletter&utm_campaign=rivian-r2-beats-range-estimate&_bhlid=59ae0a5eba06331bc9e58c3e3dc738bf90a0f6f3](https://insideevs.com/news/792230/rivian-r2-epa-range-efficiency/?utm_source=update.insideevs.com&utm_medium=newsletter&utm_campaign=rivian-r2-beats-range-estimate&_bhlid=59ae0a5eba06331bc9e58c3e3dc738bf90a0f6f3)\n\n# Rivian R2 EPA 續航數據出爐：335 英里，效率勝 Tesla Model Y\n\n**原文**：Inside EVs｜**作者**：Iulian Dnistran｜**發布**：2026-04-07\n\n## 摘要\nRivian R2 Performance 通過 EPA 認證，續航 335 英里，能效優於同級 Tesla Model Y Performance，熱泵系統標配為關鍵優勢。\n\n## 關鍵數據\n\n| 車型 | 可用電量 | EPA 續航 | 能效 |\n|------|---------|---------|------|\n| R2 Performance（21吋）| 88.67 kWh | 335 英里 | 26.52 kWh/100mi |\n| R2 Performance（20吋全地形）| 89.5 kWh | 314 英里 | 28.57 kWh/100mi |\n| Tesla Model Y Performance | — | 306 英里 | 32 kWh/100mi |\n| R2 Standard（預估）| — | 345 英里 | ~25.64 kWh/100mi |\n\n## 技術亮點\n- **熱泵系統**：全車系標配，比 R1 更小巧高效，整合閥門/感測器/熱交換器於一體\n- **充電**：DC 快充峰值 210 kW；AC 充電 11.5 kW（240V/48A）\n\n## 定價（含目的地費）\n- R2 Performance：$59,485（2026 春季首批交付）\n- R2 Premium：$55,485（2026 年底）\n- R2 Standard：$49,985（2027 初）\n- R2 Standard（小電池）：$46,495，超過 275 英里（2027 底）\n\n## Related\n- [[entities/Rivian]]\n- [[entities/Tesla]]\n- [[concepts/地理市場/美國EV市場與政策]]"
    },
    "rivian-service-network-2026": {
      "title": "Rivian 服務網絡：100 個實體中心里程碑（2026-05-04）",
      "url": "https://insideevs.com/news/794748/rivian-service-center-milestone",
      "updated": "2026-05-05",
      "body": "**來源**：[https://insideevs.com/news/794748/rivian-service-center-milestone](https://insideevs.com/news/794748/rivian-service-center-milestone)\n\n# Rivian 服務網絡：100 個實體中心里程碑（2026-05-04）\n\n**原文**：InsideEVs（Iulian Dnistran）｜**發布**：2026-05-04\n\n## 摘要\nRivian 在 R2 開始交車前完成服務網絡重要里程碑：北美第 100 個實體服務中心開幕，並搭配 680 台移動服務車到府維修。\n\n## 服務網絡現況\n\n| 指標 | 數值 | YoY |\n|------|------|-----|\n| 實體服務中心 | **100 個** | +35%（74→100）|\n| 移動服務車 | **680 台** | — |\n| Rivian Spaces（展示點）| **39 個** | +44% |\n| 充電樁（冒險網路）| **973 個** | +38% |\n\n## 成長軌跡\n\n| 時間 | 服務中心數 |\n|------|----------|\n| Q1 2025 | 74 |\n| Q2 2025 | 81 |\n| Q3 2025 | 95 |\n| Q4 2025 | 97 |\n| **Q1 2026** | **100** |\n\n## 挑戰與不足\n\n- 北達科他、南達科他、懷俄明、新墨西哥、路易斯安那、阿拉巴馬、阿肯色州：**零**實體中心\n- 加拿大：僅 2 個服務中心\n- R2 預計大量交車，可靠性若有問題，服務能量是重大考驗（Rivian 歷史上可靠性排名偏低）\n\n## Related\n- [[entities/Rivian]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[sources/rivian-r2-range-specs]]"

    "robotaxi-market-2026": {
      "title": "Robotaxi 進入耐力賽：法規與成本決定勝負",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751474&grid_seq1=&grid_seq2=",
      "updated": "2026-04-09",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751474&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751474&grid_seq1=&grid_seq2=)\n\n# Robotaxi 進入耐力賽：法規與成本決定勝負\n\n**原文**：DIGITIMES／黃女瑛｜**發布**：2026-04-09\n\n## 摘要\nRobotaxi 技術瓶頸已從「能不能跑」轉向「能不能賺」，法規碎片化與成本居高不下是核心障礙，2026 年進入資本與韌性的耐力賽。\n\n## 成本挑戰\n- 現況：營運成本 **> $8 美元/公里**\n- 目標：需降至約 **$0.8 美元/公里**（降 10 倍）才能與傳統計程車競爭\n\n## 市場規模預測（BCG）\n- 2030 年歐洲需約 **12 萬輛** Robotaxi\n- 損益平衡條件：單一業者須在 **10 座以上城市** 部署至少 **1.5 萬輛**\n\n## 消費者接受度\n| 地區 | 接受度 |\n|------|--------|\n| 中國 | ~60% |\n| 歐洲 | ~35% |\n\n## 法規環境\n- **美國**：相對寬鬆，但 2024 年 Cruise 事故後趨嚴\n- **中國**：地方試點模式，逐步收斂至中央統一規範\n- **歐洲**：軟體開發能力落後美中，供應商更換頻繁，長期發展受阻\n\n## 非技術挑戰\n- 精準停靠、協助乘客上下車、搬運行李等細節難以取代人類駕駛\n- 空轉率高 → 損益模型難以維持\n- 基礎建設成熟度、停電風險\n\n## 競爭核心轉移\n硬體 → 軟體堆疊（Software Stack）→ 法規適應力 + 成本控制\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/電池與技術/自動駕駛安全監管]]"
    },

      "url": "https://www.electrive.com/2026/04/30/rocsys-unveils-next-version-of-its-robotic-charging-solution",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.electrive.com/2026/04/30/rocsys-unveils-next-version-of-its-robotic-charging-solution](https://www.electrive.com/2026/04/30/rocsys-unveils-next-version-of-its-robotic-charging-solution)\n\n# Rocsys M1：機器人自動充電系統（2026-04-30）\n\n**原文**：Electrive（Cora Werwitzke）｜**發布**：2026-04-30\n\n## 摘要\n荷蘭新創 Rocsys 發布 M1 機器人充電系統，專為 Robotaxi 車隊場站設計。一套系統可同時服務多輛車（最多 10 個停車位），無需人工介入即可自動插拔充電槍。同步完成 $1,300 萬 A 輪延伸融資。\n\n## M1 關鍵規格\n\n| 項目 | 數值 |\n|------|------|\n| 服務能力 | 一套系統服務最多 **10 個車位**（同時）|\n| 安裝方式 | 地板 / 牆壁 / 天花板（三選一）|\n| 插拔成功率 | **99.9%+**（實際場域）|\n| 技術 | AI 電腦視覺 + 動態感知 |\n| 相容性 | **所有 EV 車型 + 充電器類型 + 插頭型式** |\n| 量產部署 | **2027 年**計畫大規模部署 |\n| 展示時間 | ACT Expo（Las Vegas，5 月 4~6 日）|\n\n## 融資\n\n| 輪次 | 金額 |\n|------|------|\n| A 輪延伸 | **$1,300 萬**（領投：Capricorn Partners）|\n| 其他投資方 | Scania Invest、Forward.One、SEB Greentech VC |\n| 累計融資 | **$5,600 萬** |\n\n- CEO 確認已簽署「重大 Robotaxi 客戶」合約（客戶未公開）\n\n## 技術願景\n\n充電只是起點：平台設計擴展至**自動內部清潔**和**車況檢查**，打造完整無人場站作業。\n\n## 意義\n- Robotaxi 商業化規模化後，場站充電的人力成本是隱性瓶頸\n- M1 直接解決這個問題，是 Robotaxi 生態完整化的關鍵基礎設施\n\n## Related\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]"
    },

      "title": "三星SDI × 賓士合約幕後：李在鎔親自出馬，合作擴及半導體與顯示器",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752813&grid_seq1=&grid_seq2=",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752813&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752813&grid_seq1=&grid_seq2=)\n\n# 三星SDI × 賓士合約幕後：李在鎔親自出馬，合作擴及半導體與顯示器\n\n**原文**：Digitimes（蔡云瑄）｜ **發布**：2026-04-23\n\n## 摘要\n三星SDI × 賓士電池供應合約背後，據韓媒報導是**三星集團會長李在鎔**多次親自會見賓士高層促成。電池類型確認為**高鎳 NCM（鎳含量逾 90%）**，應用賓士中小型 SUV 及轎跑（MMA 平台）。合作範圍有望擴及半導體與顯示器。\n\n## 合約細節補充\n\n| 項目 | 內容 |\n|------|------|\n| 電池類型 | 高鎳 NCM（鎳含量 **>90%**）|\n| 目標車型 | 賓士中小型 SUV + 轎跑（MMA 平台，A-Class 級距）|\n| 簽署人員 | 三星SDI 社長崔周善 + 中大型事業部長許恩基；賓士 CEO Ola Källenius + CTO Jörg Burzer |\n| 促成背景 | 三星集團會長**李在鎔**多次親自會見賓士高層 |\n\n## 戰略背景\n- **Harman**（三星旗下）已為賓士電動車供應車載娛樂系統\n- 雙方合作有望從電池延伸至：半導體（三星電子）、顯示器（三星顯示）\n- Ola Källenius 訪韓期間與南韓各大集團高層進行非公開會面\n- 解讀：全球供應鏈重組 + 汽車主導權競爭下，賓士正在鞏固並拓展核心夥伴關係\n\n## 對三星 SDI 意義\n- 完成「德國豪車三廠全覆蓋」：BMW + VW + **賓士**\n- 李在鎔親自出面，顯示此訂單對三星集團戰略層級的重要性\n\n## Related\n- [[entities/三星SDI]]\n- [[sources/samsung-sdi-mercedes-confirmed-deal]]\n- [[sources/samsung-sdi-mercedes-battery-deal]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/地理市場/歐洲EV市場]]"

      "title": "三星 SDI × 賓士電池訂單：歐洲專案進入最後協商",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752098",
      "updated": "2026-04-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752098](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752098)\n\n# 三星 SDI × 賓士電池訂單：歐洲專案進入最後協商\n\n**原文**：DIGITIMES／蔡云瑄｜**發布**：2026-04-15\n\n## 摘要\n三星 SDI 正與賓士（Mercedes-Benz）就 2028 年式電動車用方形電池供貨進行最後協商，若達成合約，將是三星 SDI 電池首度搭載於賓士電動車，訂單規模預估數十 GWh、合約金額上看 **10 兆韓元（~$67.7 億美元）**。\n\n## 訂單概要\n\n| 項目 | 內容 |\n|------|------|\n| 買家 | 賓士（Mercedes-Benz）|\n| 供應商 | 三星 SDI（Samsung SDI）|\n| 電池類型 | 方形電池（Prismatic）|\n| 目標車款 | 2028 年式，MMA 平台（A-Class 等級 EV）|\n| 預估規模 | 數十 GWh |\n| 合約金額 | 上看 **10 兆韓元（~$67.7 億美元）** |\n| 合約長度 | 通常 7~10 年 |\n\n## 生產基地策略\n- 合作方向：在歐洲境內設立賓士**專用**產線或生產基地\n- 候選地點：奧地利、斯洛伐克、捷克\n- 參考案例：LGES 在美國密西根蘭辛廠為豐田設立專屬產線\n\n## 競爭格局\n- 三星 SDI 已供應 BMW、VW（歐洲方形電池少數量產業者）\n- 寧德時代雖有德國廠，但主要供應 VW\n- 若拿下賓士：三星 SDI 完成德國三大豪華車廠（BMW、VW、賓士）全覆蓋\n\n## Related\n- [[entities/三星SDI]]\n- [[entities/LGES]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/地理市場/歐洲EV市場]]"

    "samsung-sdi-mercedes-confirmed-deal": {
      "title": "三星SDI × 賓士：EV 電池供應協議正式簽署（2026-04-20）",
      "url": "https://www.electrive.com/2026/04/20/mercedes-purchases-battery-cells-from-samsung-sdi",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.electrive.com/2026/04/20/mercedes-purchases-battery-cells-from-samsung-sdi](https://www.electrive.com/2026/04/20/mercedes-purchases-battery-cells-from-samsung-sdi)\n\n# 三星SDI × 賓士：EV 電池供應協議正式簽署（2026-04-20）\n\n**原文**：electrive.com ｜ **發布**：2026-04-20\n\n## 摘要\n三星SDI 與 Mercedes-Benz 於 2026 年 4 月 20 日正式簽署多年期 EV 電池供應協議，這是兩家公司的**首次合作**。供應高鎳 NMC 電池，用於賓士 MMA 平台的緊湊型與中型電動 SUV / Coupe，2028 年起供貨，供應量上看數十 GWh，合約總金額預計超過 **10 兆韓元（約 €58 億）**。\n\n## 關鍵事實\n\n| 項目 | 細節 |\n|------|------|\n| 簽約日期 | **2026-04-20**（正式確認）|\n| 電池類型 | 高鎳 NMC（高能量密度、長壽命、高功率密度）|\n| 應用車型 | 賓士緊湊型 + 中型電動 SUV / Coupe |\n| 平台 | **MMA（Mercedes Modular Architecture）**|\n| 首批供貨 | **2028 年起** |\n| 供應量 | 數十 GWh |\n| 合約金額 | 超過 **10 兆韓元（≈€58 億 / ~$6.4 億美元）** |\n| 技術合作 | 兩家公司同意共同開發下世代電池技術 |\n\n## 市場意涵\n\n### 三星SDI 客戶版圖完整化\n- 原供應客戶：BMW、Stellantis（VW 部分車款）\n- **新增 Mercedes-Benz → 完成德國三大豪車全覆蓋**\n- 三星SDI 在歐洲豪車市場地位大幅鞏固\n\n### 賓士供應鏈多元化\n- 此前主要依賴 LGES、CATL\n- 加入三星SDI 分散風險 + 競爭壓力維持價格\n\n## 與前期報導對比\n- 2026-04-15 報導（[[sources/samsung-sdi-mercedes-battery-deal]]）：「進入最後協商」\n- **本篇（2026-04-20）：正式簽署**，確認為 NMC（高鎳）而非早期報導的 Prismatic（方形）\n\n## Related\n- [[entities/三星SDI]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/samsung-sdi-mercedes-battery-deal]]\n- [[sources/sk-on-hungary-utilization]]"

      "title": "三星SDI 全固態電池：研發人力轉調量產（2026-04-20）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752440",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752440](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752440)\n\n# 三星SDI 全固態電池：研發人力轉調量產（2026-04-20）\n\n**原文**：Digitimes（陳玟靜）/ The Bell（韓媒）｜**發布**：2026-04-20\n\n## 摘要\n三星SDI 將 ASB（全固態電池）事業化推進團隊中「先行開發組」約 50% 人力轉至「量產開發組」，業界解讀為 2027H2 量產目標正在穩步推進。\n\n## 人力調整細節\n\n| 組別 | 職能 | 人力變化 |\n|------|------|---------|\n| 先行開發組 | 材料開發 + 設計 | -50% |\n| 量產開發組 | 組裝 + 結構 + 商品化 | +承接約 50% |\n\n- 來源：韓媒 The Bell 業界消息（未經三星SDI 官方確認）\n\n## 量產時程\n\n| 廠商 | 目標量產時間 |\n|------|------------|\n| **三星SDI** | **2027 下半年**（ASB 全固態）|\n| LGES | 2029 年 |\n| SK On | 2029 年 |\n\n- 三星SDI 比韓國其他兩大廠提前約 **2 年**\n\n## 財務背景\n\n- 三星SDI 2025 年**營業虧損**：約 1.7 兆韓元（~USD 11.5 億）\n- EV 需求斷層（chasm）持續壓制業績\n\n## 應用多元化策略\n\n- 原先：EV 用**方型**全固態電池\n- 新增目標應用：\n  - 人形機器人（Humanoid Robot）\n  - 各類機器人\n  - 航空系統\n  - 次世代穿戴式裝置\n\n## Related\n- [[entities/三星SDI]]\n- [[concepts/電池與技術/電池技術路線]]"

      "title": "上海積塔 × 英飛凌 SONOS：中國二線晶圓廠特色製程升級",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751356&grid_seq1=&grid_seq2=",
      "updated": "2026-04-08",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751356&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751356&grid_seq1=&grid_seq2=)\n\n# 上海積塔 × 英飛凌 SONOS：中國二線晶圓廠特色製程升級\n\n**原文**：DIGITIMES／謝昇輝｜**發布**：2026-04-08\n\n## 摘要\n上海積塔半導體（國資晶圓代工廠）與英飛凌合作導入 SONOS eNVM 技術，補強車用 MCU 等應用所需的嵌入式記憶體能力，同時強化國際市場公信力。\n\n## SONOS vs eFlash 比較\n| 技術 | 額外光罩層 | 複雜度 | 成本 |\n|------|-----------|--------|------|\n| eFlash | 10 層以上 | 高 | 高 |\n| SONOS | 少量 | 低 | 低 |\n\n## 對積塔的意義\n- 形成三線並行記憶體技術陣列：eFlash + RRAM + SONOS\n- 提升對代工客戶的吸引力（車用 MCU、工控、邊緣 AI）\n- 與國際 IDM 合作 → 技術驗證 + 市場背書\n\n## 對英飛凌的意義\n- 在中國建立彈性產能，降低地緣政治/關稅風險\n- 貼近本地車廠與系統客戶\n\n## Related\n- [[concepts/基礎設施與供應鏈/車用半導體供應鏈]]\n- [[concepts/中國車用半導體]]"

    "sk-on-erev-battery-hyundai-2027": {
      "title": "SK On 搶先量產 EREV 電池，2027 供貨 Hyundai Genesis GV70",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755252",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755252](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755252)\n\n# SK On 搶先量產 EREV 電池，2027 供貨 Hyundai Genesis GV70\n\n**原文**：DIGITIMES | 陳玟靜｜**發布**：2026-05-15\n**數據來源**：韓媒首爾經濟，業界消息\n\n## 核心消息\n\nSK On 將於 **2026 年下半**在韓國瑞山廠（서산）開始量產：\n- **EREV（增程型電動車）用 NCM 袋型電池**\n- 供貨對象：**Hyundai Motor**\n- 預計搭載車型：**Genesis GV70（2027 年初上市）**\n\nSK On 因此成為**韓國電池三雄中首家量產 EREV 電池的企業**（LGES、三星SDI 尚未跟進）。\n\n## EREV 技術特性\n\n| 比較 | HEV | EREV | BEV |\n|------|-----|------|-----|\n| 電池容量 | <2 kWh | **~40 kWh** | 60–100+ kWh |\n| 引擎角色 | 協同驅動 | 僅充電 | 無 |\n| 續航 | 較低 | **~1,000 km** | 400–700 km |\n| 製造成本 | 低 | 中低 | 較高 |\n\n## EREV 市場預測\n\n- 2040 年 EREV 美國市占：**~8%**（與 2025 年 BEV 7.7% 持平）\n- 年銷百萬輛以上潛力\n- 電池供應規模：每輛 40 kWh，遠大於 HEV 的 <2 kWh\n\n## 美國市場驅動力\n\n- 長途駕駛需求強 + 充電基礎設施不均\n- BEV 難以滿足中西部、農村用戶\n- EREV 被視為 BEV 普及前的「過渡方案」\n\n## 競爭格局\n\n| 廠商 | EREV 動向 |\n|------|----------|\n| SK On | 2026H2 量產，Genesis GV70 |\n| Hyundai × Kia | 以美中市場為中心推出 EREV |\n| Stellantis | 加緊開發中 |\n| VW | 加緊開發中 |\n| GM × Ford | 已公開轉向 EREV 策略 |\n\n## Related\n- [[entities/SK On]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[sources/gm-ev-delay-detroit-three]]\n- [[sources/ski-q1-2026-results]]\n- [[sources/hyundai-iccu-warranty-2026]]"
    },

      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751995",
      "updated": "2026-04-14",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751995](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751995)\n\n# SK On 匈牙利廠 85% 產能利用率：歐洲 EV 逆勢成長帶動\n\n**原文**：DIGITIMES／蔡云瑄｜**發布**：2026-04-14\n\n## 摘要\nSK On 位於匈牙利科馬羅姆（Komárom）的二廠產能利用率達 **85%**，為歷史新高，相較全球平均 48.7% 幾近翻倍，主因歐洲 EV 市場 2026 年逆勢成長 21%，而全球 EV 銷量同期下滑 8%。\n\n## SK On 匈牙利廠數據\n\n| 項目 | 數值 |\n|------|------|\n| 廠址 | 匈牙利科馬羅姆（Komárom）|\n| 產能利用率（2026）| **85%**（近「滿載」）|\n| 全球平均（2025）| 48.7%（大約翻倍差距）|\n| 電池類型 | 鎳鈷錳（NCM）|\n| 主要客戶 | Volkswagen（ID.4、ID.7）、Ford |\n\n## 歐洲 EV 市場（2026 年 1~2 月）\n\n| 地區 | 同期 EV 銷量成長 |\n|------|----------------|\n| **歐洲** | **+21%**（逆勢）|\n| 全球 | -8% |\n| 北美 | -36% |\n| 中國 | -26% |\n\n### 各國細部\n| 國家 | 成長幅度 | 主要政策 |\n|------|---------|---------|\n| 德國 | +26% | 法人稅務優惠 + 2026 年重新導入補貼 |\n| 法國 | +30% | 積極推動補貼 |\n| 義大利 | +98% | 歐盟獎勵計畫受惠 |\n| 英國 | 回升 | 2025 年下半重新推出折扣支援 |\n\n## VW 連結\n- VW 2025 年超越 Tesla 奪下歐洲電動車市占冠軍\n- ID.4 與 ID.7 搭載 SK On 電池，直接帶動匈牙利廠產能\n\n## 風險\n- 業界預測 2026 年下半電池廠產能利用率可能出現波動（車廠生產策略調整）\n\n## Related\n- [[entities/SK On]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[entities/LGES]]"

    "sk-on-nissan-battery-doubt-2026": {
      "title": "SK On × 日產 99GWh 電池合約傳動搖（2026-05-06）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754264",
      "updated": "2026-05-06",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754264](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754264)\n\n# SK On × 日產 99GWh 電池合約傳動搖（2026-05-06）\n\n**原文**：Digitimes（范維君）/ 韓國經濟日報｜**發布**：2026-05-06\n\n## 摘要\nSK On 原規劃向日產密西西比 Canton 廠供應電池（自 2028 年，總規模 ~99GWh，合約 15 兆韓元~$102 億）。隨著日產 Canton EV 計畫完全取消，雙方正重新檢討供應合約。\n\n## 合約概況\n\n| 項目 | 數值 |\n|------|------|\n| 合約規模 | **~99 GWh**（供約 100 萬輛中型 EV）|\n| 合約金額 | **~15 兆韓元（~USD 102 億）** |\n| 供應起始 | **2028 年** |\n| 目的地 | 日產 Canton 廠（密西西比州）|\n| 簽約時間 | 2025 年 3 月（SK On 首度與日本車廠簽訂電池供應合約）|\n\n## 現況\n\n- 日產 Canton EV 計畫於 2026 年 5 月完全取消（參見 [[sources/nissan-mississippi-ev-abandonment]]）\n- SK On 與日產正就供應合約進行**重新檢討**\n- 若合約終止，SK On 損失首度與日本車廠合作的大單\n\n## 更廣泛趨勢\n\n- LGES × Stellantis、LGES × Ford：北美電池投資均已不同程度調整\n- **電池業從「激進擴張」→「審慎資本重新配置」**\n- 歐洲市場相對樂觀，為電池廠提供另一支撐動能\n\n## Related\n- [[entities/SK On]]\n- [[entities/LGES]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[sources/nissan-mississippi-ev-abandonment]]"

    "ski-q1-2026-results": {
      "title": "SK Innovation Q1 2026：石油業務撐獲利，SK On 電池虧損擴大",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755444",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755444](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755444)\n\n# SK Innovation Q1 2026：石油業務撐獲利，SK On 電池虧損擴大\n\n**原文**：DIGITIMES | 蔡云瑄｜**發布**：2026-05-15\n**數據來源**：韓媒 DealSite\n\n## SKI 集團 Q1 2026 財務\n\n| 指標 | 數值 |\n|------|------|\n| 集團營收 | ~24.21 兆韓元（~US$163.9 億）|\n| 集團營業利益 | ~2.16 兆韓元（轉虧為盈）|\n| 庫存評價效益 | 1.02 兆韓元（會計帳面）|\n| SK energy（石油子公司）貢獻 | 7,760 億韓元 |\n\n主要驅動：**中東戰爭引發油價上漲的遞延效益**。\n\n## SK On 電池 Q1 2026 財務\n\n| 指標 | 數值 | 比較 |\n|------|------|------|\n| 營業損失 | **3,492 億韓元** | 2025 Q1：2,994 億（惡化）|\n| | | 2025 Q4：4,408 億（改善）|\n| Capex（SKI 整體）| 8,000 億韓元 | 38% 集中電池事業 |\n\n推測 38% Capex 部分用於北美 EV 產線轉 ESS。\n\n## 策略轉向\n\n- SK On 正將重心從 EV 電池轉向 **ESS（儲能系統）**\n- 2025-09 已簽署美國 Flatiron Energy Development ESS 合約\n- 2026-02 韓國 MCEE「第二次 ESS 中央競價市場（1 兆韓元）」中 SK On 拿下 **>50% 訂單**\n- 北美 EV 產線轉 ESS 用途（含 Capex 支出）\n\n## EREV 新機會（見 sk-on-erev-battery-hyundai-2027）\n\n2026 下半韓國瑞山廠將開始量產 EREV 用 NCM 袋型電池，供貨 Hyundai，極有可能搭載於 2027 年初 Genesis GV70。\n\n## Related\n- [[entities/SK On]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]\n- [[sources/sk-on-hungary-utilization]]\n- [[sources/sk-on-erev-battery-hyundai-2027]]"

    "slate-auto-ev-pickup": {
      "title": "Slate Auto 完成 C 輪 $6.5 億融資，推出 $25k 平價電動皮卡",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752160",
      "updated": "2026-04-17",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752160](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752160)\n\n# Slate Auto 完成 C 輪 $6.5 億融資，推出 $25k 平價電動皮卡\n\n**原文**：DIGITIMES／李佶璋 ｜ **發布**：2026-04-16\n\n## 摘要\nJeff Bezos 家族辦公室支持的 EV 新創 Slate Auto 完成 C 輪融資 $6.5 億美元，計畫 2026 年底推出售價 $25k 的極簡雙人座電動皮卡，印第安納州工廠投入 $4 億改建，目前已有超過 16 萬份可退訂單。\n\n## 關鍵數據\n\n| 項目 | 數值 |\n|------|------|\n| C 輪融資 | $6.5 億美元（TWG Global 領投）|\n| 累計融資 | 約 $14 億美元（自 2022 年創立）|\n| 估值（2025 年初）| $12 億美元 |\n| 目標售價 | **$25,000 美元**（補貼廢止前原計畫 <$20,000）|\n| 發布目標 | 2026 年底 |\n| 訂單數 | 超過 16 萬份（可退款）|\n| 印第安納廠改建 | $4 億（閒置印刷廠轉製造基地）|\n\n## 產品特色：極簡策略\n\n- **雙人座**設計，續航 241~386 公里\n- 基本款無電動窗、無娛樂系統 → 透過後市場配件客製（SUV 改裝套件 $5,000）\n- 理念：將客製化主導權交給消費者，降低製造複雜度\n\n## 亞馬遜基因\n\n- 背後有 Jeff Bezos 家族辦公室\n- 共同創辦人：Jeff Wilke（前亞馬遜零售主管）\n- 新任 CEO：Peter Faricy（前亞馬遜市集 VP）\n\n## 市場定位\n\n- 補貼廢止後，原始 $20k 目標上調至 $25k\n- 對標：Tesla（銷量下滑）、Rivian/Lucid（仍虧損）\n- 論述：美國本土製造 + 簡化設計 = 可獲利的低端 EV\n\n## Related\n- [[entities/Tesla]]\n- [[entities/Rivian]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/車輛類型/平價電動車市場]]\n- [[sources/tesla-25k-ev-us-price-parity]]"
    },
    "smart-brand-europe-2026": {
      "title": "smart 歐洲回歸城市兩座車根源：smart #2（2026-05-01）",
      "url": "https://www.electrive.com/2026/05/01/smart-returns-to-its-roots-and-scales-up-in-europe-interview-with-ceo-smart-europe-wolfgang-ufer",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.electrive.com/2026/05/01/smart-returns-to-its-roots-and-scales-up-in-europe-interview-with-ceo-smart-europe-wolfgang-ufer](https://www.electrive.com/2026/05/01/smart-returns-to-its-roots-and-scales-up-in-europe-interview-with-ceo-smart-europe-wolfgang-ufer)\n\n# smart 歐洲回歸城市兩座車根源：smart #2（2026-05-01）\n\n**原文**：Electrive（Peter Schwierz）｜**發布**：2026-05-01\n**受訪者**：Wolfgang Ufer（smart Europe CEO，2026-03-01 上任）\n\n## 摘要\nsmart 品牌以全新 #2（fortwo 精神繼承者）回歸歐洲都市市場，並計畫成為「量產車型」而非情懷圖騰。CEO Ufer 表示 2026 年是歐洲 EV 新正面週期的開始。\n\n## smart #2：品牌轉型關鍵車款\n\n| 規格 | 細節 |\n|------|------|\n| 長度 | **< 3 公尺**（都市小車規格）|\n| 動力 | **全電動**（無 PHEV 計畫）|\n| 定位 | **量產車型**（非僅情懷款）|\n| 預計銷售 | **2027 年**（已在中國路試）|\n| 目標客群 | 18 歲至 86 歲（vs 現款 40~60 歲高收入族群）|\n\n- 德國現有約 35 萬~40 萬輛舊款 fortwo 仍在使用，為換購基礎\n- 可能應用場景：共享汽車、社區接送服務、個人都市通勤\n\n## smart 品牌現況\n\n- 完全電動化品牌，**明確不推出 PHEV**（Ufer：「PHEV 只是過渡技術」）\n- 產品線：#1 / #3（緊湊型）→ #5（SUV，2025 上市）→ #2（2027）\n- 歐洲市場：17 個國家，與 Mercedes-Benz 共用展廳與售後網路\n- 股東：Mercedes-Benz + 吉利（Geely），所有車型須股東批准\n\n## 市場觀察\n\n- 德國市場最強，補貼 + 油價上漲 + EV 能見度提升三重驅動\n- 西班牙、法國、挪威（#5 最受歡迎）為其他成長市場\n- Q1 2026 銷量超標\n- smart #5 在接受採訪前一個月創訂單歷史新高\n\n## CEO 市場觀點\n\n> 「我相信我們正處於一個新的正面階段的開始——而且我相信這不會短暫。」— Wolfgang Ufer\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/車輛類型/平價電動車市場]]"
    },
    "sodium-battery-recycling-cylib": {
      "title": "Cylib 加入歐洲鈉離子電池回收聯盟 SIB:DE",
      "url": "https://www.electrive.com/2026/04/09/cylib-to-take-part-in-sodium-ion-battery-recycling-project",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/cylib-to-take-part-in-sodium-ion-battery-recycling-project](https://www.electrive.com/2026/04/09/cylib-to-take-part-in-sodium-ion-battery-recycling-project)\n\n# Cylib 加入歐洲鈉離子電池回收聯盟 SIB:DE\n\n**原文**：electrive｜**發布**：2026-04-09\n\n## 摘要\n德國 Cylib 加入 25 家企業與研究機構組成的 SIB:DE Entwicklung 聯盟，獲德國聯邦研究部 1,450 萬歐元資助，開發鈉離子電池與對應回收流程，計劃至 2029 年。\n\n## 計畫概覽\n- **聯盟名稱**：SIB:DE Entwicklung\n- **成員**：25 家企業與研究機構\n- **資助金額**：€14.5 百萬（德國聯邦研究部）\n- **執行期間**：2026 年 3 月 ～ 2029 年 2 月（3 年）\n- **目標**：開發大型規格市售鈉電池，並建立回收工藝\n\n## Cylib 負責的回收工作\n兩條平行路線：\n1. **傳統路線**：機械 + 濕法冶金流程\n2. **創新直接回收**：活性材料不經完全化學分解，直接返回電池生產 → 顯著降低成本，尤其適用於生產廢料\n\n計劃 2029 年初完成先導規模示範。\n\n## 意義\n> 「鈉離子電池使用儲量豐富的原材料，但唯有回收才能使技術真正永續且可擴展，為歐洲建立鈉離子循環價值鏈。」 — Cylib 共同 CEO\n\n## Related\n- [[concepts/電池與技術/鈉離子電池]]\n- [[concepts/電池與技術/電池技術路線]]"
    },
    "solaris-nobina-sweden-2026": {
      "title": "Solaris × Nobina：103 輛電動巴士瑞典訂單（2026-04）",
      "url": "https://www.electrive.com/2026/04/25/solaris-bus-coach-to-supply-103-electric-buses-to-nobina-in-sweden",
      "updated": "2026-04-25",
      "body": "**來源**：[https://www.electrive.com/2026/04/25/solaris-bus-coach-to-supply-103-electric-buses-to-nobina-in-sweden](https://www.electrive.com/2026/04/25/solaris-bus-coach-to-supply-103-electric-buses-to-nobina-in-sweden)\n\n# Solaris × Nobina：103 輛電動巴士瑞典訂單（2026-04）\n\n**原文**：electrive.com／Cora Werwitzke｜**發布**：2026-04-25\n\n## 摘要\n波蘭電動巴士製造商 Solaris Bus & Coach 與北歐最大公共交通運營商 Nobina 再度簽署合約，向瑞典三個地區交付 103 輛 Urbino 15 LE Electric，預定 2027 年交付。\n\n## 訂單規格\n\n| 項目 | 詳情 |\n|------|------|\n| 車型 | **Solaris Urbino 15 LE Electric** |\n| 數量 | **103 輛**（三份合約）|\n| 部署地區 | Stockholm（50）/ Skåne（49）/ Gothenburg（4）|\n| 交付時間 | **2027 年** |\n| 電池 | Solaris High Energy（高容量，可應付郊外延伸路線）|\n\n## Solaris × Nobina 合作歷史\n\n| 時期 | 交付量 |\n|------|--------|\n| 2010 年 | 合作開始 |\n| 2024 年起累計 | **201 輛**電動巴士已交付 |\n| 2026~2027（含本次）| 超過 **320 輛**電動車 |\n| 其中最近大單 | 2025 年 8 月 Malmö 180 輛訂單 |\n\n## 意義\n\n- **北歐斯堪地那維亞** 是歐洲電動巴士市場最成熟的區域\n- Nobina 是 Solaris 最重要的長期客戶之一，持續擴大零排放車隊\n- Urbino 15 LE 的「15 公尺鉸接式低地板」設計兼具城市和郊區適用性\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[syntheses/電動巴士產業全景]]"

      "body": "**來源**：[https://www.electrive.com/2026/04/16/south-korea-to-restrict-subsidies-for-foreign-electric-vehicles](https://www.electrive.com/2026/04/16/south-korea-to-restrict-subsidies-for-foreign-electric-vehicles)\n\n# 南韓限制進口電動車補貼資格\n\n**原文**：electrive.com／Florian Treiss ｜ **發布**：2026-04-16\n\n## 摘要\n南韓計畫限制進口電動車的補貼資格，以保護本土車廠（現代/起亞）。（原文為空殼，詳情待補。）\n\n## 脈絡\n- 背景：Tesla 2026 Q1 首奪南韓進口車王座（20,964 輛，4 倍增長）\n- 南韓政府壓力：本土車廠要求保護 → 限制海外品牌享受 EV 補貼\n- 參見：[[sources/tesla-korea-q1-2026]] — Tesla 已成為南韓最大進口車品牌\n\n## 影響\n- Tesla：最受衝擊的品牌（南韓非本土製造）\n- BYD、小鵬等中國品牌：若計劃進入南韓市場，亦將受影響\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[sources/tesla-korea-q1-2026]]"

      "title": "Stellantis × 中國 EV：兩座歐洲工廠的關稅規避策略（2026-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755930",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755930](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755930)\n\n# Stellantis × 中國 EV：兩座歐洲工廠的關稅規避策略（2026-05）\n\n**原文**：Digitimes + InsideEVs + electrive｜**發布**：2026-05-19~20\n\n## 核心策略\n\nStellantis 利用**歐洲閒置工廠**為中國合作夥伴代工，以規避歐盟最高 35.5% 的中國製 EV 關稅（+標準 10% 進口稅）。\n\n## 兩條產線\n\n### 1. 義大利 Pomigliano 廠 × 零跑汽車（Leapmotor）\n| 項目 | 細節 |\n|------|------|\n| 工廠位置 | **義大利 Pomigliano**（那不勒斯附近）|\n| 現生產 | Fiat Panda/Pandina + Alfa Romeo Tonale（無 EV）|\n| 計畫車型 | **E-Car**（小型平價電動車，Stellantis × 零跑共研電池技術）|\n| 預計量產 | **2028 年**起 |\n| 定位 | 「歐洲製造、為歐洲人設計」的平價 BEV |\n\n### 2. 法國 Rennes 廠 × 東風汽車（Dongfeng Voyah）\n| 項目 | 細節 |\n|------|------|\n| 工廠位置 | **法國 Rennes**（最多 3 條產線，曾峰值 40 萬輛/年）|\n| 現狀 | 約 1/3 產能（僅生產 Citroën C5 Aircross）|\n| 計畫 | Stellantis 持股 **51%** 合資，生產東風旗下**嵐圖（Voyah）**豪華 BEV |\n| 交換條件 | 東風同時在中國生產 Peugeot + Jeep 車型 |\n\n## 更廣泛的模式\n\n| 中國品牌 | 歐洲工廠 | 方式 |\n|---------|---------|------|\n| 零跑汽車 | 西班牙 Zaragoza（Stellantis）| 合作量產 B10 SUV |\n| 東風嵐圖 | 法國 Rennes（Stellantis）| 合資代工 |\n| 比亞迪 | 匈牙利 Pécs | 自建工廠 |\n| 奇瑞 | 西班牙 Barcelona（前 Nissan 廠 × Ebro）| 合作 |\n| 小鵬 | 奧地利（Magna Steyr）| 合作；另商議收購 VW 閒置歐洲廠 |\n\n## 市場意涵\n\n歐盟關稅原意保護本土車廠，結果加速中國品牌本地化生產——下一波平價 EV 由中國工程師設計，在歐洲工廠製造，有時掛熟悉的西方品牌徽章。\n\n## Related\n- [[concepts/中國EV出海策略]]\n- [[concepts/歐洲EV市場]]\n- [[entities/零跑汽車]]\n- [[entities/Stellantis]]\n- [[sources/leapmotor-t03-germany-2026]]"

    "stellantis-china-oem-expansion": {
      "title": "Stellantis 深化中國 OEM 合作 + 關閉法國 Poissy 廠（2028）",
      "url": "https://www.electrive.com/2026/04/16/stellantis-reportedly-seeks-partnerships-with-additional-chinese-oems",
      "updated": "2026-04-17",
      "body": "**來源**：[https://www.electrive.com/2026/04/16/stellantis-reportedly-seeks-partnerships-with-additional-chinese-oems](https://www.electrive.com/2026/04/16/stellantis-reportedly-seeks-partnerships-with-additional-chinese-oems)\n\n# Stellantis 深化中國 OEM 合作 + 關閉法國 Poissy 廠（2028）\n\n**原文**：electrive.com／Cora Werwitzke、Sebastian Schaal ｜ **發布**：2026-04-16\n\n## 摘要\nStellantis 據報正尋求與更多中國 OEM 建立合作關係（除既有零跑汽車持股外），同時宣布 2028 年前終止法國 Poissy 工廠生產。（兩篇原文皆為空殼，來自標題推斷。）\n\n## 一、深化中國 OEM 合作\n- 現有：持股零跑汽車 20%，合作開發 B10 平台（Opel O3U，2028 年薩拉戈薩）\n- 傳聞：尋求更多中國品牌合作 → 顯示 Stellantis 以「中國技術外包」為平台化策略\n- 脈絡：Stellantis 自身 EV 研發資源有限，借力中國廉價電池/平台更有效率\n\n## 二、Poissy 廠 2028 年停產\n- Poissy 工廠（法國西部）：生產 Peugeot 等 Stellantis 品牌\n- 傳統燃油車廠關閉是歐洲轉型的縮影\n- 歐洲工廠整合 / 工人就業衝突仍是 Stellantis 面對的社會壓力\n\n## Related\n- [[entities/Stellantis]]\n- [[entities/零跑汽車]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[sources/stellantis-opel-leapmotor-suv]]\n- [[sources/stellantis-leapmotor-canada-rejected]]"

    "stellantis-fastlane-2030": {
      "title": "Stellantis FaSTLAne 2030：€600 億戰略轉型、STLA One 全通用平台",
      "url": "https://www.electrive.com/2026/05/21/stellantis-plans-29-new-electric-vehicles-and-a-new-platform-for-all-drive-types",
      "updated": "2026-05-22",
      "body": "**來源**：[https://www.electrive.com/2026/05/21/stellantis-plans-29-new-electric-vehicles-and-a-new-platform-for-all-drive-types](https://www.electrive.com/2026/05/21/stellantis-plans-29-new-electric-vehicles-and-a-new-platform-for-all-drive-types)\n\n# Stellantis FaSTLAne 2030：€600 億戰略轉型、STLA One 全通用平台\n\n**原文**：electrive.com + InsideEVs，2026-05-21\n**主要發佈**：投資人日，奧本山（北美總部）\n\n## 摘要\n\nStellantis 發佈「FaSTLAne 2030」五年計畫，由新任 CEO Antonio Filosa 主持，承諾投入 **€600 億（~$700 億美元）**，以 29 款純電 + STLA One 平台 + LFP 電池 + Wayve 自駕合作為核心，從近年虧損困境中反轉。\n\n## 背景：危機中的 Stellantis\n\n- US 市場 EV 失敗：Jeep Wagoneer S、Dodge Charger Daytona EV 均反應冷淡\n- 2026 年初已撤銷美國 PHEV 產品線（Wrangler 4xe、Cherokee 4xe、Pacifica PHEV）\n- 銷量與利潤雙雙下滑，面對中國品牌及 Tesla 雙重競爭壓力\n\n## FaSTLAne 2030 六大支柱\n\n### 1. 品牌組合重整\n- **四大全球品牌**（獲 70% 投資）：**Jeep、Ram、Fiat、Peugeot**\n- 地區品牌：Chrysler、Dodge、Citroën、Opel、Alfa Romeo\n- 更在地品牌：DS Automobiles、Lancia\n\n### 2. STLA One 全新平台（最重要）\n\n| 技術特性 | 規格 |\n|----------|------|\n| 電壓架構 | **800V**（超快充）|\n| 電池化學 | **LFP**（降低對鎳/鈷依賴）|\n| 電池設計 | **Cell-to-Body**（電池整合入車身結構）|\n| 通用度 | 整合 5 個既有平台，B/C/D 段全覆蓋，**零件通用率 70%** |\n| 晶片 | **Qualcomm Snapdragon Digital Chassis** |\n| 自駕 | **Qualcomm Ride Pilot ADAS + Wayve**（類 Tesla FSD 的手放式自駕）|\n| 目標規模 | 2035 年 30 款車型，**200 萬輛/年** |\n| 技術上市 | 2027 年 |\n\n### 3. 策略合作夥伴\n- **零跑**（Leapmotor）：薩拉戈薩 + 馬德里廠生產\n- **東風/嵐圖（Voyah）**：法國 Rennes 廠（歐洲本地化）\n- **Jaguar Land Rover**：美國市場協同\n- **技術夥伴**：Applied Intuition、Qualcomm、Wayve、NVIDIA、Uber、Mistral AI、**CATL**\n\n### 4. 生產優化\n- 歐洲產能縮減 **>80 萬輛**（廠房轉型 + 合作）\n- 開發週期從最高 40 個月縮至 **24 個月**\n- 2028 年每年節省成本 **€60 億**\n\n### 5. 執行效率\n- 120+ AI 應用程式已在用\n- 區域決策下放（去中央化）\n\n### 6. 產品計畫（至 2030）\n| 類型 | 數量 |\n|------|------|\n| BEV | **29 款** |\n| PHEV / REEV | 15 款 |\n| HEV | 24 款 |\n| ICE / 輕混 | 39 款 |\n| **合計 60+ 款新車** | + 50 款大改款 |\n\n## 投資人疑慮\n\nInsideEVs 評論：「這是個大膽且全面的計畫。但我們見過太多傳統車廠的豪言壯語最後導致延誤和取消……要等 2027 年新技術開始落地，才能判斷這是真正的復甦還是又一次空頭支票。」\n\n## Related\n- [[entities/Stellantis]]\n- [[entities/零跑汽車]]\n- [[concepts/歐洲EV市場]]\n- [[concepts/中國EV出海策略]]\n- [[sources/stellantis-china-ev-europe-factories-2026]]"

      "title": "斯特蘭蒂斯擬在加拿大組裝零跑電動車，遭工會、省府、聯邦反對",
      "url": "https://udn.com/news/story/6811/9421090",
      "updated": "2026-04-08",
      "body": "**來源**：[https://udn.com/news/story/6811/9421090](https://udn.com/news/story/6811/9421090)\n\n# 斯特蘭蒂斯擬在加拿大組裝零跑電動車，遭工會、省府、聯邦反對\n\n**原文**：聯合新聞網｜**發布**：2026-04-03\n\n## 摘要\nStellantis 計劃利用安大略省 Brampton 閒置廠房組裝零跑（Leapmotor）中國製零組件，遭到加拿大汽車工會 Unifor、安省省長及工業部長強烈反對。\n\n## 背景\n- Stellantis 2023 年取得零跑 20% 股權，2024 年成立合資企業\n- Brampton 廠因 Trump 關稅政策導致 Jeep SUV 生產轉往美國，數千工人失業\n- 加拿大 2026 年 1 月與中國達成協議：每年以 6.1% 關稅進口 4.9 萬輛中國電動車\n\n## 各方立場\n\n| 立場 | 說法 |\n|------|------|\n| 工會 Unifor | 組裝不創造就業，也不帶動零件供應商商機 |\n| 安省省長 Ford | 若是像本田/豐田在安省建廠+用本地零件才支持 |\n| 工業部長 Joly | 必須支持本地供應鏈，不能只是進口整車套件 |\n| 分析師 Karwel | 中國車廠不可能在海外大量建廠，規模經濟仍在中國 |\n\n## 地緣政治意涵\n- 美國駐加大使明確表示：中國電動車從加拿大進入美國「絕不發生」\n- 7 月 USMCA 審查：加拿大中國電動車政策恐成絆腳石\n\n## Related\n- [[entities/Stellantis]]\n- [[entities/零跑汽車]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/北美EV關稅與政策]]"

    "stellantis-opel-leapmotor-suv": {
      "title": "Stellantis 擬以零跑技術開發 Opel 電動 SUV（2028 年量產）",
      "url": "https://www.electrive.com/2026/04/09/stellantis-eyes-opel-suv-with-leapmotor-tech",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/stellantis-eyes-opel-suv-with-leapmotor-tech](https://www.electrive.com/2026/04/09/stellantis-eyes-opel-suv-with-leapmotor-tech)\n\n# Stellantis 擬以零跑技術開發 Opel 電動 SUV（2028 年量產）\n\n**原文**：electrive｜**發布**：2026-04-09\n\n## 摘要\nStellantis 與零跑汽車正進行進階談判，計劃以零跑 B10 平台開發 Opel 品牌電動 SUV，預計 2028 年在西班牙薩拉戈薩廠量產，年產目標 5 萬輛。\n\n## 合作架構\n- **平台**：零跑 B10（緊湊型家庭 SUV）\n- **分工**：Opel/Stellantis 主導設計；零跑供應電子電氣系統等核心技術\n- **工廠**：Stellantis 薩拉戈薩廠（西班牙）→ B10 + Opel SUV 共線生產\n- **代號**：O3U；年產目標 5 萬輛\n- **可能延伸**：Alfa Romeo 也可能在薩拉戈薩生產\n\n## 時程\n- B10 在薩拉戈薩生產：2026 年下半年啟動\n- Opel SUV（O3U）量產：預計 2028 年\n\n## 戰略邏輯\n- Stellantis 自 2022 年大幅減損 EV 業務 → 聚焦 ICE 與 PHEV\n- 利用零跑更成熟的 EV 技術大幅降低開發成本\n- 提升薩拉戈薩廠產能利用率\n\n## Related\n- [[entities/Stellantis]]\n- [[entities/零跑汽車]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/stellantis-leapmotor-canada-rejected]]"

    "svolt-semi-solid-state-battery-2026": {
      "title": "SVOLT 半固態電池 2026 年 9 月量產",
      "url": "https://www.electrive.com/2026/05/20/svolt-to-start-semi-solid-state-battery-production-in-september",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.electrive.com/2026/05/20/svolt-to-start-semi-solid-state-battery-production-in-september](https://www.electrive.com/2026/05/20/svolt-to-start-semi-solid-state-battery-production-in-september)\n\n# SVOLT 半固態電池 2026 年 9 月量產\n\n**原文**：electrive.com，2026-05-20\n**作者**：Cora Werwitzke\n\n## 摘要\n\n中國電池廠 SVOLT（長城汽車旗下）宣佈將於 **2026 年 9 月**開始半固態電池的系列量產，比原定計畫大幅提前（原計畫 2027 年）。CEO 楊紅新同時表明，完全固態電池距離商業化仍相當遙遠，半固態路線為近期主導技術。\n\n## 關鍵數據\n\n| 指標 | 數值 |\n|------|------|\n| 量產時程 | **2026 年 9 月** |\n| 第一代能量密度 | **300 Wh/kg** |\n| 第二代目標 | **360 Wh/kg**（研發中）|\n| 首批量產規格 | 100 kWh 版本同步大規模量產 |\n| 量產成本目標 | 與液態電解質傳統鋰離子電池**持平** |\n\n## 技術定義：半固態電池\n\n- 電解質採用液態 + 固態**混合**（solid-liquid hybrid）\n- 介於傳統鋰離子（液態電解質）與完全固態電池之間\n- 優勢：更高安全性 + 更高能量密度 + 更長壽命\n- 劣勢：仍未達到完全固態電池的性能上限\n\n## 時程加速背景\n\n- **2025 年中**：計畫 Q4 2025 試產，2027 量產\n- **2026 年 5 月宣告**：直接跳至 Q3 2026 系列量產\n- SVOLT 目前為中國**第十大**電池製造商\n\n## 潛在客戶\n\n- 據報導將供應**MINI 品牌**下一代車型（長城汽車 × BMW JV）\n- Mini 官方**尚未確認**\n\n## 戰略定位\n\n楊紅新表示，完全固態電池商業化需要「非常長期的努力」，預計半固態電池將主導市場直至固態電池實現大規模量產。\n\n## Related\n- [[concepts/電池技術路線]]\n- [[concepts/固態電池]]"
    },
    "taiwan-av-special-scenes": {
      "title": "台灣智駕：自動駕駛突破口在「特殊場景」，已跨足日本鋼鐵廠與港口",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752715",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752715](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752715)\n\n# 台灣智駕：自動駕駛突破口在「特殊場景」，已跨足日本鋼鐵廠與港口\n\n**原文**：DIGITIMES／舒能翊 ｜ **發布**：2026-04-21\n\n## 摘要\n台灣智駕 CEO 沈大維指出，自動駕駛的商業突破口不在開放道路的 Robotaxi，而在工廠、港口、偏鄉等**特殊場景**（Closed/Semi-closed Scenarios）。台灣智駕已在日本鋼鐵廠、沖繩港口、高雄亞灣區落地實績，以模組化系統（4 人座小巴 → 180 噸重型搬運車）覆蓋多元需求。\n\n## 核心論點：特殊場景優先策略\n\n| 場景 | 痛點 | 自駕解法 |\n|------|------|---------|\n| 工廠（18 小時重複搬運）| 缺工、重複勞動 | 自駕取代司機，分潤模式 |\n| 偏鄉（找不到司機）| 運輸服務缺失 | 自駕接駁小巴 |\n| 煉鋼廠（惡劣環境）| 人身安全風險、勞動成本極高 | 日本鋼鐵廠案例，直接替換司機 |\n| 郵輪港口（短程接駁）| 尖峰時間彈性不足 | 沖繩港口 × 計程車派遣整合 |\n\n## 技術特點\n\n### 模組化架構\n- 同一套感知 + 定位 + 控制演算法，從 4 人座小巴到 180 噸重型搬運車皆適用\n- 對特殊車輛製造商提供「一站式服務」，縮短轉型時間\n\n### AI 訓練 AI（閉環機制）\n- 針對「長尾效應」（極端罕見案例），使用生成式 AI 合成訓練數據\n- 一張晴天照片 → 延伸生成大雨、大霧、不同光照條件的虛擬場景\n- 大幅降低真實場景數據蒐集成本\n\n### 營運管理系統\n- 即時監控車隊位置 + 電量 + 事後回溯問題\n- 關鍵工具，邁向 L4 的運營可靠性要求\n\n## 實際落地案例\n\n| 地點 | 場景 | 模式 |\n|------|------|------|\n| **日本鋼鐵廠** | 高勞動成本 + 艱困環境 | 自駕替換司機，創新**分潤模式** |\n| **沖繩郵輪港口** | 2 公里內接駁 | 結合計程車派遣系統 |\n| **高雄亞灣區** | 人車共道 | 自駕小巴展示 L4 互動能力 |\n\n## 對台灣自駕產業的意義\n- 差異化策略：不與 Waymo / Tesla 的開放道路 Robotaxi 正面競爭\n- 從特殊場景積累數據與信任，逐步延伸至一般道路\n- 加入開放原始碼社群，建立全球生態系\n\n## Related\n- [[entities/台灣智駕]]\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/車輛類型/電動商用車]]"

      "title": "台灣充電生態系「五層蛋糕」與工程瓶頸（2026-05-12）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754909",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754909](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754909)\n\n# 台灣充電生態系「五層蛋糕」與工程瓶頸（2026-05-12）\n\n**原文**：Digitimes（劉千綾）｜**發布**：2026-05-12\n\n## 摘要\nDIGITIMES Research 分析師定義台灣充電產業為「五層蛋糕」結構，競爭白熱化之際，業者坦言基礎建設施工面臨選舉、夏季用電峰期與土方清運等現實障礙。\n\n## 五層蛋糕結構\n\n| 層次 | 內容 |\n|------|------|\n| 1 土地 | 場地取得、用途許可 |\n| 2 電網 | 台電接電申請、用電容量 |\n| 3 充電設備 | 充電樁硬體 |\n| 4 維運工程 | 安裝、維修 |\n| 5 會員體系 | 會員服務、跨營運商互通 |\n\n- 競爭重心從「布建速度」轉向「鞏固用戶 + 強化同業結盟 + 通路體系」\n\n## 台灣市場數據（2025）\n\n| 指標 | 數值 | 成長率 |\n|------|------|--------|\n| 電動小客車登記數 | **14.3 萬輛** | **+32.1%** YoY |\n| 對比 2024 成長率 | 10.8 萬輛 | +59.3%（2024）|\n| 已啟用充電槍 | **1.4 萬支+** | **+50.5%** YoY（新增 ~5,000 支）|\n\n## 工程三大障礙\n\n### 1. 行政法規「潛規則」\n- 申請道路開挖需向地方政府 + 台電申辦\n- **不成文規定**：選舉前後禁止道路開挖\n\n### 2. 夏季停電施工禁令\n- 充電站接電需約 **3 小時**停電施工\n- 夏季（用電高峰）**原則不允許**停電施工\n- → 大量 Q1 計畫工程延至 Q2\n\n### 3. 土方之亂\n- 外部供電線路開挖產生大量土方\n- 台南、高雄等地面臨土方**去化困難**\n- → 台電無法施工 → 工程延宕\n\n## 市場展望\n- 油價上漲（中東衝突）預期進一步刺激 2026 年 EV 銷量與充電需求\n- 充電槍成長動能仍強，但速度需突破工程瓶頸\n\n## Related\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/地理市場/台灣EV市場]]"
    },
    "taiwan-ev-charging-strategy": {
      "title": "公共充電樁是 EV 普及關鍵：台灣快慢充「組合拳」策略",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752003",
      "updated": "2026-04-14",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752003](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752003)\n\n# 公共充電樁是 EV 普及關鍵：台灣快慢充「組合拳」策略\n\n**原文**：DIGITIMES／劉千綾｜**發布**：2026-04-14\n\n## 摘要\n台灣充電營運商 2026 年快速擴建快充站點，業者分析未來趨勢為「快充+慢充互補」組合，而非單一模式。全球公共充電市場高度集中於中、歐、美三地（合計 87.1%）。\n\n## 全球公共充電市場格局（2026）\n\n| 地區 | 全球占比 |\n|------|---------|\n| 中國 | **67.7%** |\n| 歐洲 | 16.3% |\n| 美國 | 3.1% |\n| 合計 | 87.1% |\n\n- **中國**：注重直流充電樁比重提升\n- **歐洲**：碳排要求驅動充電建設擴張\n- **美國**：產業政策轉彎，不利充電業者投資\n\n## 技術演進\n\n| 時代 | 特性 |\n|------|------|\n| 早期 | 慢充為主；Tesla 早期快充仍需 40 分鐘 |\n| 現在 | 800V 架構（保時捷 Taycan 等）→ 約 20 分鐘（=停下休息/上廁所時間）|\n| 趨勢 | 超高速快充 + 慢充互補「組合拳」|\n\n## 台灣充電業者策略分化\n\n| 策略類型 | 代表業者 | 做法 |\n|---------|---------|------|\n| 聯盟漫遊 | EVOASIS + 10 家業者 | 多家結盟串接平台，單一 App 找充電站 |\n| 品牌一致性 | U-POWER | 自建站、統一體驗，不走聯盟模式 |\n\n## Related\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/地理市場/台灣EV市場]]\n- [[sources/taiwan-ev-charging-upower]]"

    "taiwan-ev-charging-upower": {
      "title": "U-POWER 台北大同承德站啟用：台灣超充基礎建設現況",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751708",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751708](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751708)\n\n# U-POWER 台北大同承德站啟用：台灣超充基礎建設現況\n\n**原文**：DIGITIMES／劉千綾｜**發布**：2026-04-10\n\n## 摘要\nU-POWER 旭電馳科研啟用台北大同承德快充站，總功率 960 kW（可擴至 1,440 kW），以 Mercedes CLA 250+ 為例 10 分鐘可補充近 350 公里續航。\n\n## 站點規格\n| 項目 | 數值 |\n|------|------|\n| 充電位數 | 12 席 |\n| 充電規格 | CCS1 × 6 + CCS2 × 6 |\n| 總功率 | 960 kW（可擴至 1,440 kW）|\n| 每日服務量 | 700 輛（可升至 1,200 輛）|\n| 充電槍 | 液冷充電槍，最高 500A |\n\n## 台灣 EV 充電現況\n- 台北市 EV 數量：約 2.5 萬輛（六都之冠）\n- U-POWER 董事長：台北至少需要 20 座以上大型超充站\n- U-POWER 累計投入資本：近 10 億台幣\n\n## 高功率充電車款趨勢\nPorsche Cayenne、BMW iX3、Mercedes GLC、Volvo EX60 等新車型最高支援 400 kW 充電。\n\n## Related\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/地理市場/台灣EV市場]]\n- [[entities/Tesla]]"

    "taiwan-ev-electrification-progress-2026": {
      "title": "台灣運具電動化進度嚴重落後：2025 年電動車 8.1%、電動機車 7%（2026-05-10）",
      "url": "https://ieknet.iek.org.tw/ieknews/news_open.aspx?nsl_id=f38b3f4389a14f4db877598486c87e6b",
      "updated": "2026-05-10",
      "body": "**來源**：[https://ieknet.iek.org.tw/ieknews/news_open.aspx?nsl_id=f38b3f4389a14f4db877598486c87e6b](https://ieknet.iek.org.tw/ieknews/news_open.aspx?nsl_id=f38b3f4389a14f4db877598486c87e6b)\n\n# 台灣運具電動化進度嚴重落後：2025 年電動車 8.1%、電動機車 7%（2026-05-10）\n\n**原文**：聯合報（林海、陳儷方）/ IEK 產業情報網｜**發布**：2026-05-10\n\n## 摘要\n台灣 2025 年電動車市售比僅 8.1%（目標 10%），電動機車 7%（目標 20%），兩者均不達標且比 2024 年更低。業者批評政府「訂了終點，不告訴大家如何前進」，呼籲加強充電基礎建設與法規鬆綁。\n\n## 目標 vs 現況\n\n| 指標 | 2025 目標 | **2025 實際** | 2035 目標 | 2040 目標 |\n|------|---------|------------|---------|---------|\n| 電動車（乘用）| 10% | **8.1%** | 60% | 100% |\n| 電動機車 | 20% | **7%** | 70% | 100% |\n| 市區公車 | — | — | **100%（2030）** | — |\n\n- 電動機車 2025 年 7%，甚至**低於 2022 年的 11.9%**（政策設定基準年）\n\n## 主要障礙（業者反映）\n\n1. **充電基礎設施不足**：加油站密度遠高於充電點\n2. **社區充電法規不友善**：自裝充電樁受社區管委會限制，法規未鬆綁\n3. **補貼政策反覆**：電動機車補貼退場後轉向「油電平權」→ 銷售馬上跌回谷底\n4. **政府指導不足**：有目標，無路徑\n\n## 政策建議\n\n- 中經院陳中舜：**優先資源投入電動公車**（高使用率、高載客量、立即改善都市空氣品質）\n- 充電基礎設施：需進入「基礎建設推動 + 法規鬆綁」模式\n\n## Related\n- [[concepts/地理市場/台灣EV市場]]\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]"
    },
    "taiwan-evalue-640kw-charger": {
      "title": "華城電能 EVALUE 推 640kW 極速充電樁，2026 年擴建 8 站",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752462",
      "updated": "2026-04-17",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752462](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752462)\n\n# 華城電能 EVALUE 推 640kW 極速充電樁，2026 年擴建 8 站\n\n**原文**：DIGITIMES／劉千綾 ｜ **發布**：2026-04-17\n\n## 摘要\n台灣充電品牌華城電能 EVALUE 推出全台最高功率 640kW 直流充電樁（一主機對應 5 槍），支援 800V 架構電動車，15～20 分鐘充飽；計畫 2026 年新增 8 座快充站，以加盟 + 經銷雙軌模式擴張。\n\n## 產品規格\n\n| 規格 | 數值 |\n|------|------|\n| 最高功率 | **640kW**（全台最高）|\n| 架構 | 一主機對多線櫃，最高 5 槍同時充電 |\n| 電壓支援 | 支援 800V 架構電動車 |\n| 充電速度 | 15～20 分鐘充飽 |\n| 2026 年新增站點 | **8 座快充站**（每站 4～5 槍）|\n\n## 市場地位（截至 2026-04）\n\n| 指標 | 數值 |\n|------|------|\n| 全台公用站點 | 720 站，2,500 槍 |\n| App 會員數 | 15 萬 |\n| 家用安裝 | 突破 1 萬件 |\n| 國際車商合作市佔 | 第一（佔比 40%）|\n| 政府標案市佔 | **62.5%** |\n\n## 合作車廠\n裕隆、賓士等；與國際車商合作市佔第一\n\n## 充電站建置策略（快慢充組合拳）\n| 充電類型 | 適合場域 |\n|--------|---------|\n| DC 快充 | 交通沿線、高速公路、超商（停留時間短）|\n| AC 慢充 | 商場、飯店、家用（停留 1～2 小時以上）|\n\n## Related\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/taiwan-ev-charging-strategy]]\n- [[sources/taiwan-ev-charging-upower]]"

    "tata-agratas-battery-somerset": {
      "title": "塔塔 Agratas 英格蘭電池廠獲英國政府 £3.8 億補貼",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751898",
      "updated": "2026-04-14",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751898](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751898)\n\n# 塔塔 Agratas 英格蘭電池廠獲英國政府 £3.8 億補貼\n\n**原文**：DIGITIMES／高盈穎｜**發布**：2026-04-14\n\n## 摘要\n印度塔塔集團旗下 Agratas 電池廠位於英格蘭薩默塞特（Somerset），獲得英國工黨政府 **£3.8 億英鎊**（~$5.1 億美元）補貼，供應 Jaguar Land Rover 車款，規劃年產能 40 GWh，預計成為歐洲最大電池廠之一。\n\n## 工廠規格\n\n| 項目 | 數值 |\n|------|------|\n| 位置 | 英格蘭薩默塞特（Somerset）|\n| 政府補貼 | **£3.8 億**（英國工黨政府，2026 年拍板）|\n| 規劃年產能 | **40 GWh** |\n| 可供電動車數 | 約 50 萬輛/年 |\n| 客戶 | Jaguar Land Rover（JLR，工廠在伯明罕附近）|\n| 地位 | 預計成為歐洲規模最可觀電池廠之一 |\n\n## 戰略背景\n- 英國汽車工業持續衰退，政府藉此在全球電池製造競爭（vs 中、美、歐）中維持地位\n- 2023 年宣布設廠時，保守黨政府支持但未承諾資金；工黨上台後正式拍板\n- 塔塔汽車（Tata Motors）本身也是印度最大電動車業者之一\n- 2008 年塔塔從福特收購 Jaguar Land Rover\n\n## 政策意義\n- 英國政府以製造業投資強化對抗失業率與能源轉型挑戰\n- 批評者指出：雇主稅率提高與勞工法規限制仍制約投資意願\n\n## Related\n- [[concepts/歐洲EV政策]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[entities/LGES]]"

    "tata-chery-avinya-platform-2026": {
      "title": "Tata Motors 引入奇瑞 EV 平台開發 Avinya 豪華品牌（2026-06-05）",
      "url": "https://auto.economictimes.indiatimes.com/news/passenger-vehicle/tata-motors-to-use-chery-ev-platform-for-avinya-luxury-brand/",
      "updated": "2026-06-10",
      "body": "**來源**：[https://auto.economictimes.indiatimes.com/news/passenger-vehicle/tata-motors-to-use-chery-ev-platform-for-avinya-luxury-brand/](https://auto.economictimes.indiatimes.com/news/passenger-vehicle/tata-motors-to-use-chery-ev-platform-for-avinya-luxury-brand/)\n\n# Tata Motors 引入奇瑞 EV 平台開發 Avinya 豪華品牌（2026-06-05）\n\n**原文**：ETAuto / 日経中文網｜**發布**：2026-06-05\n\n## 摘要\n塔塔汽車（Tata Motors）確認將採用**中國奇瑞汽車（Chery）的電動車平台技術**開發旗下豪華品牌 **Avinya** 的純電動車型，首款車預計 **2027 年**上市。此舉被視為 Tata 在中印關係緊張背景下，以技術務實主義突破 EV 開發瓶頸的重大戰略選擇。\n\n## 關鍵數據\n\n| 指標 | 內容 |\n|------|------|\n| 合作方 | Tata Motors × 奇瑞汽車（Chery） |\n| 目標品牌 | **Avinya**（塔塔旗下豪華純電品牌） |\n| 平台來源 | 奇瑞 EV 架構技術（授權或合資） |\n| 預計首款量產 | **2027 年** |\n| 背景觸發因素 | JLR（捷豹路虎）EV 路線圖延遲 |\n\n## 戰略解讀\n\n### 為何選擇奇瑞？\n- 塔塔旗下 JLR 電動化計畫（Panthera 平台）延遲，Avinya 無自研平台可依托\n- 奇瑞在中型/豪華 EV 平台上具備成熟架構（如奇瑞星紀元 ET/ES）\n- 授權或技術移轉成本遠低於從頭開發\n\n### 地緣政治風險\n- 中印關係長期緊張（2020 年邊境衝突後持續冷凍）\n- 印度政府對中資汽車投資存有限制，但技術授權非直接投資，灰色地帶\n- Tata 為印度本土龍頭企業，政治敏感度相對較低\n\n### 奇瑞的「無聲擴張」\n- 同期奇瑞藉日產 Sunderland 工廠進入英國製造\n- 奇瑞×Nissan、奇瑞×Tata 雙線並進，展現其技術輸出戰略\n\n## Related\n- [[concepts/印度EV市場]]\n- [[concepts/中國EV出海策略]]\n- [[sources/nissan-chery-sunderland-deal-2026]]\n- [[entities/Tata Motors]]"
    },
    "tata-stellantis-jeep-india-2026": {
      "title": "Tata × Stellantis：共同開發全球 Jeep SUV，印度成全球製造樞紐",
      "url": "https://www.autopunditz.com/post/tata-stellantis-global-jeep-suv-india",
      "updated": "2026-05-25",
      "body": "**來源**：[https://www.autopunditz.com/post/tata-stellantis-global-jeep-suv-india](https://www.autopunditz.com/post/tata-stellantis-global-jeep-suv-india)\n\n# Tata × Stellantis：共同開發全球 Jeep SUV，印度成全球製造樞紐\n\n**原文**：AutoPunditz，2026-05-23\n\n## 摘要\n\nTata Motors 與 Stellantis 深化 20 年合作，共同開發一款**全球 Jeep SUV**，可能採用 Tata 平台（Sierra），在印度蘭揚加翁廠生產，預計 **2028 年**推出並出口至 **50+ 個國家**。\n\n## 合作背景\n\n| 里程碑 | 時間 |\n|--------|------|\n| Tata-Fiat 合作啟動 | 2006 年 |\n| Jeep Compass 印度量產 | 2017 年（蘭揚加翁廠）|\n| 累計產量 | **137 萬輛**（Fiat India JV 50:50）|\n| 年產能 | **22.2 萬輛** |\n| 僱員 | ~5,000 人 |\n| 合作 20 週年慶 | 2026 年 |\n\n## 新 Jeep SUV 計畫\n\n| 項目 | 內容 |\n|------|------|\n| 平台 | 可能採用 **Tata Sierra 平台** |\n| 生產地 | 印度蘭揚加翁廠 |\n| 上市時間 | **2028 年** |\n| 出口目標 | **50+ 個國家** |\n| 定位 | 低於或約等於 Jeep Compass 的入門級全球 SUV |\n\n**蘭揚加翁廠已是全球地位**：Jeep Compass 右駕版（英國、南非、澳洲）的唯一生產基地。\n\n## 戰略意義\n\n**對 Stellantis**：\n- 利用 Tata 低成本工程能力\n- 在 EV 轉型壓力下降低開發成本\n- 符合 FaSTLAne 2030 聚焦 Jeep 全球品牌的策略\n\n**對 Tata Motors**：\n- 從「本地製造商」躍升為「全球產品開發夥伴」\n- 強化出口能力與工程信譽\n\n**對印度**：\n- 印度從低成本生產基地 → 工程與平台開發中心的角色轉型\n- 呼應 Stellantis + 東風/嵐圖（法國廠）的多極製造佈局\n\n## 與 [[sources/stellantis-fastlane-2030]] 的關聯\n\nJeep 是 FaSTLAne 2030 的四大全球品牌之一（獲 70% 投資），Tata 合作降低 Jeep 全球產品開發成本，符合 Stellantis「節省 €60 億/年」的目標。\n\n## Related\n- [[entities/Stellantis]]\n- [[concepts/印度EV市場]]\n- [[sources/stellantis-fastlane-2030]]"
    },
    "tesla-25k-ev-us-price-parity": {
      "title": "Tesla 重燃 $25k 平價車計畫 × 美國 EV/燃油車價差縮至歷史新低",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751848",
      "updated": "2026-04-17",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751848](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751848)\n\n# Tesla 重燃 $25k 平價車計畫 × 美國 EV/燃油車價差縮至歷史新低\n\n**原文**：DIGITIMES／楊智家、徐畇融 ｜ **發布**：2026-04-17\n\n## 摘要\nTesla 重啟研發一款長約 4.28 公尺、售價 $25k 的平價電動車，同時美國 EV 均價持續下滑，EV 與燃油車價差縮至歷史最低 $5,800，但補貼廢止後車商自行推出更大折扣填補缺口。\n\n---\n\n## 一、Tesla $25k 平價 EV\n\n| 項目 | 細節 |\n|------|------|\n| 車長 | 約 4.28 公尺（較 Model 3 小）|\n| 動力 | 單馬達 + 小電池 |\n| 目標售價 | **$25,000 美元** |\n| 生產地 | 計畫利用上海廠（提升產能利用率）|\n| 量產時程 | **2026 年內不會量產**，仍在早期開發 |\n\n- 背景：Tesla 銷量連續兩年下滑，中國市場競爭加劇\n- 風險：分析師擔憂低售價壓縮利潤率\n\n## 二、美國 EV 均價 vs. 燃油車價差\n\n### 關鍵數據（2026 年 3 月）\n| 指標 | 數值 |\n|------|------|\n| EV 平均成交價（ATP）| **$54,508**（YoY -2.8%，連 3 個月下滑）|\n| EV vs. 燃油車價差 | **$5,800**（歷史最低）|\n| EV 平均優惠幅度 | ATP 的 **14.6%**（≈$8,000），是市場均值 2 倍 |\n\n### Tesla 具體數據\n- Tesla ATP：$53,421（YoY -2.6%，MoM -1.2%）\n- Tesla 促銷幅度：12.3% of ATP\n\n### 背景：補貼廢止後車商自力救濟\n- 2025-09-30：川普廢止 7,500 美元聯邦 EV 稅收補助\n- 車商以高額現金折扣、低利率貸款、充電設施費用補貼維持買氣\n- Tesla 3 月美國估計銷量 YoY -8.4%，但 MoM +6.1%（連 2 個月正成長）\n\n## Related\n- [[entities/Tesla]]\n- [[entities/Rivian]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/車輛類型/平價電動車市場]]\n- [[sources/gm-ford-q1-2026-sales]]\n- [[sources/vw-id4-chattanooga-stop]]"
    },
    "tesla-4680-musk-strategy": {
      "title": "Tesla 4680 電池技術 + Musk 垂直整合戰略",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751717",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751717](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751717)\n\n# Tesla 4680 電池技術 + Musk 垂直整合戰略\n\n**原文**：DIGITIMES／黃女瑛、林廷宇｜**發布**：2026-04-10\n\n## Tesla 4680 電池技術概覽\n\n| 規格 | 數值 |\n|------|------|\n| 尺寸 | 直徑 46mm × 高度 80mm |\n| 設計亮點 | 無極耳（tabless）設計，縮短電流路徑 |\n| 電極製程 | 乾式電極（2026 年實現負極+正極同時穩定量產）|\n| 現行應用 | Cybertruck、部分 Model Y |\n| 供應商 | Tesla 自建 + Panasonic |\n\n### 技術演進\n- 2020 年發布，初期乾式電極製程良率是瓶頸\n- 2026 年實現穩定量產，持續開發新正極化學配方（NC-19、NC-Mineral）\n- 寧德時代等廠商也在跟進開發類似大尺寸圓柱電池\n\n## Musk 垂直整合戰略\n\n### 核心邏輯：掌控「技術密碼」\n- 掌握核心技術與成本結構 → 議價優勢 + 推動自製能力\n- 電芯依賴 Panasonic / LGES / CATL，但 BMS 與三電系統核心控制權自持\n\n### 跨產業布局\n| 業務 | 說明 |\n|------|------|\n| Tesla（EV）| 4680 電池、FSD、Robotaxi |\n| SpaceX（衛星/太空）| Starlink 衛星用太陽能 + 電池（關鍵封裝由 Tesla 掌握）|\n| Optimus（機器人）| 垂直整合延伸至人形機器人 |\n| Terafab（半導體）| 德州晶圓廠計畫，延伸製造能力 |\n\n### 美國製造策略\n- 密集接觸中國 HJT/BC/鈣鈦礦技術供應商 → 吸收並移植至美國\n- 目標：建立年產能 100 GW 美國太陽能製造體系\n\n## Related\n- [[entities/Tesla]]\n- [[entities/寧德時代]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/地理市場/美國EV市場與政策]]"
    },
    "tesla-ass-nhtsa-probe-closed": {
      "title": "Tesla ASS — NHTSA 調查結案",
      "url": "https://insideevs.com/news/792206/tesla-ass-nhtsa-probe-closed/",
      "updated": "2026-04-08",
      "body": "# Tesla ASS — NHTSA 調查結案\n\n**原文**：[Tesla's 'ASS' Is Safe As Feds End Probe Into Remote Control Feature](https://insideevs.com/news/792206/tesla-ass-nhtsa-probe-closed/)\n**來源**：Inside EVs\n**作者**：Iulian Dnistran\n**發布日期**：2026-04-07\n\n---\n\n## 摘要\n\n美國國家公路交通安全管理局（NHTSA）結束了對 Tesla「Actual Smart Summon（ASS）」功能的調查，認定其事故嚴重性與頻率偏低，不需進一步監管行動。\n\n---\n\n## 關鍵事實\n\n- **調查對象**：約 260 萬輛 Tesla 電動車\n- **調查起因**：2025 年初，收到約 100 起與 ASS 功能相關的碰撞報告\n- **調查結果**：\n  - 事故均發生於低速情境（停車場）\n  - 1% 的 Summon 使用次數發生事故\n  - 碰撞對象多為停放車輛、車庫門、閘門\n  - 無人員傷亡、無安全氣囊觸發、無需拖車\n- **結論**：NHTSA 認定嚴重性與頻率均低，正式結案\n\n---\n\n## 技術背景\n\n| 版本 | 發布時間 | 感測器 | 說明 |\n|------|----------|--------|------|\n| Smart Summon（舊版）| 2019 | 超音波感測器 | 早期版本，可靠性差，已下架 |\n| Actual Smart Summon（ASS）| 2024-09 | 純視覺攝影機 | 現行版本，無超音波感測器 |\n\nASS 功能使用者透過 Tesla App 持續按壓虛擬按鍵，車輛才會移動，放開即停止。\n\n---\n\n## 意義\n\n- 這是 NHTSA 對 Tesla 自動駕駛功能的重要監管里程碑\n- 結案代表 Tesla 的純視覺方案通過聯邦安全審查\n- 對電動車自動駕駛功能的監管框架具有參考價值\n\n## Related\n- [[entities/Tesla]]\n- [[entities/NHTSA]]\n- [[concepts/電池與技術/自動召喚功能]]\n- [[concepts/電池與技術/自動駕駛安全監管]]"
    },

      "title": "Tesla Basecharger：重卡場站充電新品（2026-05-04）",
      "url": "https://insideevs.com/news/794730/tesla-basecharger-new-ev-charger-specs-truck",
      "updated": "2026-05-05",
      "body": "**來源**：[https://insideevs.com/news/794730/tesla-basecharger-new-ev-charger-specs-truck](https://insideevs.com/news/794730/tesla-basecharger-new-ev-charger-specs-truck)\n\n# Tesla Basecharger：重卡場站充電新品（2026-05-04）\n\n**原文**：InsideEVs（Iulian Dnistran）｜**發布**：2026-05-04\n\n## 摘要\nTesla 推出 Basecharger，一款專為電動重卡（Semi）場站設計的 125kW DC 快充器。外觀類似 V4 Supercharger，但內部結構完全不同，定位為重卡的「家用充電」。\n\n## 規格\n\n| 項目 | 數值 |\n|------|------|\n| 最高功率 | **125 kW** |\n| 充電時間 | ~4 小時充至 60%（Tesla Semi 標準版）|\n| 整合設計 | **不需獨立 AC-DC 電源箱**（V4 Supercharger 的 1/16 功率電子整合）|\n| 最多串聯 | **3 台共用一個斷路器**（最高 125 kVA 共享）|\n| 電壓輸出 | 180~1,000V |\n| 電流 | 150A |\n| 纜線長度 | **6 公尺**（V4 的 2 倍）|\n| 連接頭 | 目前僅 **MCS**（不相容 CCS 重卡）|\n| 售價 | 起價 **$20,000**（最少購買 2 台，不含安裝）|\n| 出貨時程 | **2027 年初**開始交付 |\n\n## 定位\n- Tesla Megacharger（1.2MW，30 分鐘充至 60%）的補充品\n- 適合：場站隔夜充電、長駐留場景\n- 限制：目前僅支援 MCS 接頭，CCS 重卡無法使用\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/車輛類型/電動卡車市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/tesla-semi-production-2026]]"

    "tesla-canada-model3-2026": {
      "title": "Tesla 加拿大降價 + 上海廠 Model 3 回歸（2026-05-05）",
      "url": "https://www.electrive.com/2026/05/05/tesla-slashes-canadian-prices-and-launches-new-model-3-premium-rwd",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.electrive.com/2026/05/05/tesla-slashes-canadian-prices-and-launches-new-model-3-premium-rwd](https://www.electrive.com/2026/05/05/tesla-slashes-canadian-prices-and-launches-new-model-3-premium-rwd)\n\n# Tesla 加拿大降價 + 上海廠 Model 3 回歸（2026-05-05）\n\n**原文**：Electrive（Ciaran Daly）｜**發布**：2026-05-05\n\n## 摘要\nTesla 大幅降低加拿大 Model 3 售價，並推出全新「Premium RWD」版本，售價僅 $39,490 CAD（~$29K USD），比美國版便宜 31%。背後是供應鏈從 Fremont（美國）重新切換至上海廠，利用加拿大對中國 EV 6.1% 優惠關稅。\n\n## 加拿大 Model 3 定價\n\n| 版本 | 加拿大售價 | 美元約值 | vs 美國 |\n|------|----------|---------|--------|\n| **Premium RWD（新）** | **$39,490 CAD** | ~$29,000 USD | **比美國便宜 31%** |\n| Performance AWD | $74,990 CAD（-17%）| ~$55,000 USD | 略貴於美國 |\n\n- Premium RWD：463km 續航，201km/h 最高速\n- Performance AWD：478km 續航，262km/h\n\n## 貿易戰供應鏈邏輯\n\n| 時期 | 供應來源 | 原因 |\n|------|---------|------|\n| 2024 以前 | 上海廠 | 正常供應 |\n| 2024 | 改 Fremont（加州）| 加拿大對中國 EV 加徵 **100% 關稅** |\n| 2025 年 4 月 | 加拿大對美加徵 **25% 反制稅** | Fremont 產品成本大增 |\n| **2026 年 5 月** | **重回上海廠** | 加拿大對中國 EV 降至 **6.1% 優惠關稅**（49,000 輛配額） |\n\n## 注意事項\n\n- 上海廠 Model 3 **不符合**加拿大 $5,000 EVAP 政府補貼（需自由貿易協定）\n- Performance AWD 仍來自 Fremont（售價仍略高於美國）\n- BYD 傳聞考慮加拿大設廠 + 20 家經銷商計畫\n\n## 意義\n\n- 顯示 Tesla 供應鏈在貿易戰中的靈活切換能力\n- 加拿大 6.1% 對中國 EV 優惠關稅 = 對 Trump「美國優先」政策的實質反擊\n- 中美加三角貿易戰對 EV 定價的直接影響案例\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/地理市場/北美EV關稅與政策]]\n- [[concepts/地理市場/美國EV市場與政策]]"

    "tesla-cybercab-specs-2026": {
      "title": "Tesla Cybercab EPA 正式規格揭露",
      "url": "",
      "updated": "2026-06-16",
      "body": "**來源**：InsideEVs（2026-06-15）\n\n# Tesla Cybercab EPA 正式規格揭露\n\n**事件日期**：2026-06-15｜**文件來源**：美國 EPA 官方申報文件\n\n## 核心規格（EPA 文件確認）\n\n| 規格 | 數值 |\n|------|------|\n| 重量 | **3,113 磅（~1,412 kg）** — 美國市場最輕 EV |\n| GVWR | 3,730 磅（載重空間 617 磅）|\n| 驅動 | **前輪驅動（FWD）** — Tesla **首款前驅車** |\n| 馬達 | 單前置永磁馬達，**169 馬力（163 kW）** |\n| 電池 | **146 Ah × 326V ≈ 48 kWh** |\n| EPA 實測 | 實驗室 418.2 英里；× 0.7 係數 ≈ **293 英里（~472 km）實際** |\n\n> Tesla 高管曾表示「接近 300 英里」，與 EPA 預估吻合。\n\n## 量產狀態\n\n- **生產已啟動**（Tesla 官方聲明）\n- 原始設計：**無方向盤、無踏板**（真正 Robotaxi 設計），測試版後加裝\n- **目標售價**：< $30,000（上市前 2027 年）\n- 上市時程：「2026 年前」— 仍待最終確認\n\n## 技術意義\n\n| 項目 | 意義 |\n|------|------|\n| 1,412 kg 車重 | 比最輕 Model 3 輕約 317 kg；媲美 Honda Civic Touring |\n| 48 kWh / FWD | 超輕量化設計取捨：捨棄大電池換極低車重 |\n| Tesla 首款 FWD | 顛覆 Tesla 一貫 RWD/AWD 策略 |\n| 293 英里 | 都市 Robotaxi 場景足夠；無長途需求 |\n\n## 尚待確認\n\n- **正式上市日期**（宣稱「2026 年前」尚未落地）\n- **最終定價**（目標 <$30K 未官方確認）\n- **自動駕駛授權範圍**（僅少數城市測試，未全國部署）\n\n## Related\n- [[concepts/Robotaxi自動計程車]]\n- [[entities/Tesla]]\n- [[sources/tesla-robotaxi-texas-reality-2026]]"

    "tesla-fsd-china-lawsuit-2026": {
      "title": "Tesla FSD 中國消費欺詐訴訟",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=757177",
      "updated": "2026-05-26",
      "body": "# Tesla FSD 中國消費欺詐訴訟\n\n**來源**：[DIGITIMES](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=757177)，2026-06-01  \n（原報導：中國《新京報》/ Bloomberg）\n\n---\n\n## 案件概要\n\n| 項目 | 詳情 |\n|------|------|\n| 原告 | **10 名中國消費者** |\n| 被告 | Tesla（中國）|\n| 受理法院 | 北京市某基層法院（一審）|\n| 索賠金額 | **逾人民幣 395 萬元**（~$58.3 萬美元）|\n| 指控 | 虛假宣傳、消費欺詐 |\n\n---\n\n## 爭議焦點\n\n1. **FSD 功能名稱欺詐**：「Full Self-Driving」宣傳是否達到「完全自動駕駛」能力？\n2. **監管未獲批准**：FSD 核心功能**未獲中國監管部門批准**，無法實現宣傳目標\n3. **硬體技術缺陷**：原告指控 Tesla 隱瞞缺陷、誘使購買\n4. **低能見度應對**：FSD 在惡劣視覺環境下潛在缺陷\n\n## Tesla 抗辯立場\n\n- FSD 功能「現已實現」或「部分實現」\n- 後續功能仍在研發中\n- 無官方正式回應聲明\n\n---\n\n## 背景與意義\n\n- 背景：Tesla FSD（監督版）於 **2026 年 5 月同週在中國正式上線**（參見 [[sources/tesla-fsd-eu-expansion-2026]]）\n- 上線同期即面臨消費欺詐訴訟，監管與市場信任雙重壓力\n- 美國 NHTSA 已認可純視覺方案（ASS 功能結案）vs. 中國消費者集體訴訟 → 地區監管落差\n- 判決將影響 Tesla 在中國的 FSD 訂閱商業模式\n\n---\n\n## Related\n- [[concepts/ADAS智駕系統]]\n- [[concepts/自動駕駛安全監管]]\n- [[entities/Tesla]]\n- [[sources/tesla-fsd-eu-expansion-2026]]\n- [[sources/tesla-ass-nhtsa-probe-closed]]"
