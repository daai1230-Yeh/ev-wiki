    "australia-china-ev-milestone-2026": {
      "title": "澳洲：中國EV首次超越日系車（28年主導終結）",
      "url": "",
      "updated": "2026-06-10",
      "body": "**來源**：electrive / InsideEVs 等（2026-06-08~09）\n\n# 澳洲：中國EV首次超越日系車（28年主導終結）\n\n**事件日期**：2026-06-08~09｜**地區**：澳洲\n\n## 核心事件\n\n2026 年，中國電動車品牌在澳洲市場的銷量**首次超越日系品牌**，終結日系車長達 **28 年**的澳洲市場主導地位。\n\n## 主要數據\n\n| 指標 | 數值 |\n|------|------|\n| 澳洲 EV 市占趨勢 | 持續上升，中國品牌成長最快 |\n| 主導時長終結 | 日系 28 年澳洲霸主地位 |\n| 代表品牌 | BYD、MG（SAIC）、GWM（長城）|\n\n## 澳洲政府公務車動態\n\n澳洲聯邦政府議員公務車清單新增 **7 款中國EV**，顯示官方採購層面的信任訊號。\n\n## 背景\n\n- 澳洲長期依賴日系車（豐田、本田、馬自達）填補本土製造業空缺（本土汽車製造業於 2017 年終止）\n- 中國EV品牌以**性價比優勢**攻入澳洲市場，尤其是 BYD Atto 3、MG ZS EV、GWM Ora\n- 澳洲政府無汽車進口關稅（不同於歐盟的 35.3% 附加稅），為中國品牌提供極低門檻進入\n\n## 市場意義\n\n澳洲案例是中國EV出海的重要樣本：\n1. **無關稅壁壘**市場中的中國品牌競爭力測試\n2. **非傳統EV市場**（澳洲 EV 滲透率仍相對低）的突破\n3. 凸顯日系品牌在電氣化轉型的相對遲緩\n\n## Related\n- [[concepts/中國EV出海策略]]\n- [[concepts/歐洲EV市場]]\n- [[sources/ev-news-digest-jun1-10-2026]]"
    },
    "autonomous-driving-power-consumption": {
      "title": "自動駕駛技術耗電分析：從 3kW 降至 500W 目標（2026）",
      "url": "https://insideevs.com/features/794319/autonomous-car-power-consumption",
      "updated": "2026-04-29",
      "body": "**來源**：[https://insideevs.com/features/794319/autonomous-car-power-consumption](https://insideevs.com/features/794319/autonomous-car-power-consumption)\n\n# 自動駕駛技術耗電分析：從 3kW 降至 500W 目標（2026）\n\n**原文**：InsideEVs／Lawrence Ulrich｜**發布**：2026-04-29\n\n## 摘要\n自動駕駛系統的功耗從早期 1.5~3kW 已大幅降至現代 ~1kW，業界目標進一步壓縮至 500W。若 10 億輛 AV 每天行駛 1 小時且功耗達 840W，其耗電量將等同 2023 年全球所有資料中心的總耗電量。\n\n## 各代系統功耗對比\n\n| 系統 | 時期 | 自駕功耗 | 備注 |\n|------|------|---------|------|\n| Chevy Bolt（Cruise）| 早期 | **1.5~3kW** | 20 小時班次耗 40kWh（2/3 電池）|\n| Hyundai Ioniq 5 AV（Motional）| 2022 | 高 | EPA 續航 168 英里（vs 消費版 303 英里，-44.6%）|\n| Waymo Jaguar I-Pace | 現役 | **~1kW** | 29 攝影機 + 5 LiDAR |\n| Waymo 第六代（Ioniq 5 / Zeekr）| 測試中 | **~1kW** | |\n| Rivian（Level 4 目標）| 2026~2028 | **~1.1kW** | RAP1 自製 SoC |\n| Lucid / Nuro | 2026 | **~1kW** | 目標 500W |\n| **業界共識目標** | 2026~2030 | **500W** | MIT 安全線 <1.2kW |\n\n## MIT 規模推算\n\n> 1B 輛 AV × 每日 1 小時 × 840W = **等同 2023 年全球所有資料中心耗電量**\n\nMIT 教授 Sertac Karaman：「每輛車 1kW 是未來 3~5 年的合理目標，但計算占交通能耗的比重將越來越顯著。」\n\n## 解決方案\n\n1. **固態 LiDAR**：從機械旋轉式（高功耗、大體積）→ 固態（輕薄、低功耗）\n2. **自製 SoC**（Rivian RAP1）：比 Nvidia Orin 計算力 4x，TOPS 利用率 2x\n3. **傳感器減量**：Lucid「極致效率」方向（減少感測器數量）\n4. **Watts per TOPS 成為關鍵 KPI**（計算量 / 瓦特比）\n\n## Robotaxi 充電窗口挑戰\n\n- 全天候 Robotaxi 使用率目標：**23 小時 / 天**（1 小時用於充電 + 清洗 + 維護）\n- 每分鐘在充電站是沒有收入的時間\n- 自駕功耗越低 → 更多里程用於服務 → 更高 ROI\n\n## Uber 關聯大單\n\n- Uber × **Lucid**：$5 億，35,000 輛 Gravity SUV（舊金山 2026 起）\n- Uber × **Rivian**：最高 $12.5 億，10,000 輛 R2（2028 起，25 城市 2031）\n\n## Related\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[sources/china-robotaxi-cost-advantage]]\n- [[sources/uber-ev-infrastructure-investment]]"
    },
    "av-physical-ai-trends-2026": {
      "title": "2026 自動駕駛與實體 AI 趨勢解析（Tech Forum 2026）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755942",
      "updated": "2026-05-22",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755942](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755942)\n\n# 2026 自動駕駛與實體 AI 趨勢解析（Tech Forum 2026）\n\n**原文**：Digitimes，2026-05-21\n**講者**：DIGITIMES 分析師余君濤\n**場合**：Tech Forum 2026（COMPUTEX 週邊論壇）\n\n## 摘要\n\nDIGITIMES 分析師系統解析自動駕駛作為「實體 AI」最重要落地場景的現狀與趨勢，關鍵節點：2026 年進入商業化驗證，2029 年為市場爆發點。\n\n## 市場規模預測\n\n| 指標 | 數值 |\n|------|------|\n| 2030 年全球汽車銷量 | **9,980 萬輛** |\n| 2030 年自動駕駛乘用車滲透率 | **92.5%**（~9,230 萬輛）|\n| 2026 全球自駕晶片市場 | **$97 億美元** |\n| 2030 全球自駕晶片市場 | **$192 億美元** |\n\n## 市場爆發點：2029 年\n\n三大催化劑：\n1. 技術成熟（E2E + 世界模型架構）\n2. Robotaxi 規模化部署\n3. 中國車廠自駕平權（比亞迪等將高階自駕下放至中低價車型）\n\n## 技術路線：第三代 E2E + 世界模型\n\n- 具備**空間認知 + 時間認知**能力\n- 比第一/二代 E2E 更強的泛化性與安全性\n- 被視為下一代主流架構\n\n## 主要晶片廠定位\n\n| 廠商 | 市場定位 |\n|------|---------|\n| **Mobileye** | Level 1~2 市場，全球市占率第一 |\n| **NVIDIA** | Level 3+ 高階自駕，Drive 平台 |\n| **Qualcomm** | 智慧座艙晶片領先；Snapdragon Digital Chassis |\n| **Tesla** | 自研晶片（Dojo/HW4），軟硬體最高整合度 |\n\n## 商業化里程碑（截至 2026-05）\n\n| 公司 | 進展 |\n|------|------|\n| **Tesla Cybercab** | 2026-02 德州工廠量產，服務奧斯汀/達拉斯/休士頓 |\n| **Waymo** | 累計自動駕駛里程 **>2 億英里**；每週 **>50 萬次**付費乘車 |\n| **小鵬 Robotaxi** | 首款 L4 量產下線（廣州），2027 商業運營 |\n\n## 兩大商業化終點\n\n1. **Robotaxi**：都市載客服務\n2. **Robotruck**：幹線貨運無人駕駛\n\n## Related\n- [[concepts/Robotaxi自動計程車]]\n- [[concepts/自動駕駛ADAS]]\n- [[entities/Tesla]]\n- [[entities/Waymo]]"
    },
    "beijing-auto-show-2026": {
      "title": "2026 北京國際車展（Auto China 2026）",
      "url": "https://money.udn.com/money/story/5603/9466916",
      "updated": "2026-04-28",
      "body": "**來源**：[https://money.udn.com/money/story/5603/9466916](https://money.udn.com/money/story/5603/9466916)\n\n# 2026 北京國際車展（Auto China 2026）\n\n**原文**：經濟日報 / 鉅亨網 / Digitimes｜**發布**：2026-04-27~30\n\n## 摘要\n2026 Auto China（4/23~5/3）規模躍居全球第一，共展出 1,451 輛，219 場發布會，181 款首發車型。中國電動車成為主角，中東與非洲經銷商大量出現，試圖以中系車填補日系車因中東危機造成的供應缺口。\n\n## 規模與背景\n\n| 指標 | 數值 |\n|------|------|\n| 參展國家地區 | 21 個（含中、美、德）|\n| 展出車輛 | **1,451 輛** |\n| 發布會場數 | **219 場** |\n| 首發車型 | **181 款** |\n| 北京車展地位 | **全球規模最大**（2026 年）|\n\n## 重要首發車型\n\n| 車型 | 廠商 | 亮點 |\n|------|------|------|\n| 小米 Vision GT | 小米 | 首款超跑概念車（不量產）|\n| YU7 GT | 小米 | 5 月底發布，預計 RMB 50~60 萬，對標 Tesla Model Y Performance |\n| 小鵬 GX | 小鵬汽車 | 新款 SUV |\n| 問界新一代 M9 | 賽力斯×華為 | 旗艦 SUV |\n| 比亞迪大唐 EV | 比亞迪 | 大型 SUV |\n| 騰勢 Z | 比亞迪騰勢 | **1,000HP 電動跑車，全球首發** |\n| Porsche Cayenne Coupé Electric | 保時捷 | 歐洲豪華 EV |\n\n## 中東市場效應\n\n- 荷姆茲海峽航運危機 → 日系車供應受阻，豐田熱門車型庫存短缺約一個月\n- 沙烏地阿拉伯經銷商直接轉向中系車：「展廳空間已大多留給長安汽車」\n- 中國品牌車款較同級日韓車**低 20%~40%**，且標配配備（全景天窗等）\n- 上汽大通：車展首日接待西班牙、義大利、中東、非洲 **6 組海外代理商**\n\n## 競爭氛圍\n\n- **福斯董事會成員組團參觀比亞迪展台**\n- **賓士董事長康林松**出現在比亞迪和華為展台\n- 智慧駕駛演算法、物理 AI 成為技術競爭核心\n- BYD 被中心汽車管理（CAM）評為全球汽車創新排名**第一名**（2026 年首次中國品牌奪冠）\n\n## 中國 Robotaxi 成本突破\n\n在北京車展同期，中國自動駕駛企業宣示全球競爭力：\n\n| 企業 | 里程碑 | 數值 |\n|------|--------|------|\n| 小馬智行 | Gen 7 Robotaxi 總成本 | **< RMB 23 萬（~$33,700）**，含車體+電池+AD 系統，**低於 Tesla Model 3** |\n| 小馬智行 | 2027 新車型目標 | 量產上市 |\n| 小馬智行 | 2026 年底車隊目標 | **3,000 輛** |\n| 文遠知行 | 聯想合作 | 未來 5 年全球 **20 萬輛**自駕車 |\n| 文遠知行 | 2026 年底目標 | **2,600 輛**無人計程車 |\n| 文遠知行 | 第三代算力平台 | 降低 AD 系統成本 **50%** |\n\n## 中國 EV 全球出口加速\n\n- **2026 Q1** 中國新能源汽車出口約 **95 萬輛**（+120%）\n- 3 月新能源車出口首次占單月汽車出口的 **50%+**\n- 比亞迪 2025 年全球排名：460.2 萬輛（第六），海外 105 萬輛（+145%）\n- 中國品牌首次同時有 3 家進入全球前十（比亞迪/上汽/吉利）\n\n## Related\n- [[entities/比亞迪]]\n- [[entities/小米汽車]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[sources/byd-q1-2026-earnings]]\n- [[sources/china-ev-market-involution-2026]]\n- [[sources/china-robotaxi-cost-advantage]]"

    "bmw-canada-nacs-integration": {
      "title": "BMW 加拿大整合 Tesla 超充與 Shell Recharge，全面支援 NACS",
      "url": "https://www.electrive.com/2026/04/09/bmw-canada-integrates-tesla-superchargers-and-shell-recharge-to-charging-network",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/bmw-canada-integrates-tesla-superchargers-and-shell-recharge-to-charging-network](https://www.electrive.com/2026/04/09/bmw-canada-integrates-tesla-superchargers-and-shell-recharge-to-charging-network)\n\n# BMW 加拿大整合 Tesla 超充與 Shell Recharge，全面支援 NACS\n\n**原文**：electrive｜**發布**：2026-04-09\n\n## 摘要\nBMW 加拿大將 Shell Recharge 與 Tesla Supercharger 網路整合至 My BMW/MINI App，並宣布新車型將出廠搭載 NACS 接口，大幅擴展 EV 充電便利性。\n\n## 整合內容\n- **Shell Recharge**：整合 FLO、ChargePoint、BC Hydro 等多網路 → 單一帳號使用\n- **Tesla Supercharger**：相容超充站加入 Shell Recharge 網路；車載儀表板顯示充電站位置\n- **NACS 新車型**：iX3、i3 出廠標配 NACS 接口，無需轉接器\n\n## OTA 更新覆蓋範圍\n除原版 BMW i3（I01）與 MINI Cooper SE（F56）外，其他所有 BEV 車型將透過 RSU 軟體更新支援 NACS 功能。\n\n## 趨勢意義\nNACS（北美充電標準）整合浪潮從美國擴展至加拿大，Tesla Supercharger 網路正成為北美 EV 充電的事實標準。\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/NACS充電標準]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]"

    "bmw-i7-neue-klasse-2027": {
      "title": "2027 BMW i7：Neue Klasse 技術前移，350+ 英里 EPA，250kW 充電",
      "url": "https://insideevs.com/news/793634/2027-bmw-i7-neue-klasse-more-range-faster-charging",
      "updated": "2026-04-23",
      "body": "**來源**：[https://insideevs.com/news/793634/2027-bmw-i7-neue-klasse-more-range-faster-charging](https://insideevs.com/news/793634/2027-bmw-i7-neue-klasse-more-range-faster-charging)\n\n# 2027 BMW i7：Neue Klasse 技術前移，350+ 英里 EPA，250kW 充電\n\n**原文**：InsideEVs（Suvrat Kothari）/ electrive.com ｜ **發布**：2026-04-22\n\n## 摘要\nBMW 2027 款 7 系列（i7）在現有 CLAR 平台上提前整合 **Neue Klasse** 電子電氣架構，包括第六代圓柱電芯（與 Rimac 合作）、250kW 快充、無稀土磁鐵電機、SiC 逆變器。EPA 續航突破 350 英里，標配 NACS 充電口。\n\n## 核心規格\n\n| 項目 | 舊款 i7 | **2027 i7** |\n|------|---------|------------|\n| 電芯技術 | 第五代方形電池 | **第六代圓柱電池**（Rimac 合作）|\n| 電池能量密度 | — | +20% 提升 |\n| 電池容量（可用）| — | **112.5 kWh**（+10% 以上）|\n| EPA 續航（60 xDrive）| — | **>350 英里**（~565 km）|\n| 峰值充電功率 | 195 kW | **250 kW** |\n| 10%→80% 時間 | — | **28 分鐘** |\n| 最大充電電流 | — | **630A** |\n| 充電接口 | CCS | **NACS 標配** |\n\n## Neue Klasse 技術整合\n\n| 技術 | 說明 |\n|------|------|\n| 電子電氣架構 | Neue Klasse 平台架構（提前應用於 CLAR 底盤）|\n| 中央電腦算力 | 比現款 **提升 20 倍** |\n| 區域架構（Zonal）| 線束重量減輕 30%，長度縮短 2,000 英尺 |\n| 電機 | **不再使用稀土磁鐵**（降低資源依賴）|\n| 逆變器 | **碳化矽（SiC）逆變器** |\n| 輪轂軸承優化 | 整體效率提升約 7% |\n\n## 售價\n- i7 50 xDrive：**$106,200** 起\n- i7 60 xDrive：**$124,700** 起\n- 目的地費：+$1,550\n\n## 意義\n- **Neue Klasse 技術前移策略**：正式 Neue Klasse 車型（iX3 等）預計 2025~2026 年推出，但核心技術已提前應用至旗艦車型\n- 第六代圓柱電池（Rimac 合作）能量密度大幅提升，宣告 BMW 圓柱電芯路線成熟\n- 無稀土磁鐵電機：降低對中國稀土出口的依賴，具供應鏈戰略意義\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/基礎設施與供應鏈/車用半導體供應鏈]]"

    "bmw-ix3-neue-klasse-2026": {
      "title": "BMW iX3（Neue Klasse）完整實測：BMW 的 EV 翻身之作（2026-05）",
      "url": "https://insideevs.com/reviews/793046/bmw-ix3-review-neue-klasse",
      "updated": "2026-05-18",
      "body": "**來源**：[https://insideevs.com/reviews/793046/bmw-ix3-review-neue-klasse](https://insideevs.com/reviews/793046/bmw-ix3-review-neue-klasse)\n\n# BMW iX3（Neue Klasse）完整實測：BMW 的 EV 翻身之作（2026-05）\n\n**原文**：InsideEVs | Andrei Nedelea｜**發布**：2026-05-18\n**車輛定位**：BMW **首款 Neue Klasse** 量產電動車\n\n## 完整規格\n\n| 規格 | 數值 |\n|------|------|\n| 基本售價 | **€69,630**（美國 **$62,850**）|\n| 測試車型 | xDrive 50（雙馬達 AWD）|\n| 測試車售價 | **€82,738** |\n| 電池 | **108.7 kWh** |\n| 系統功率 | **469 hp（345 kW）**（後馬達 326hp + 前馬達 167hp）|\n| 扭矩 | **475 lb-ft（645 Nm）** |\n| 0–62 mph | **4.7 秒** |\n| 最高速 | 130 mph（209 km/h）|\n| 續航（WLTP）| **500 英里（805 km）** |\n| 續航（EPA 預估）| **~400 英里（644 km）**（實測 ~380 英里）|\n| DC 快充 | **400 kW**（800V 架構）|\n| 10→80%（DC）| **21 分鐘**（平均功率 >230 kW）|\n| 10 分鐘補電 | **217 英里（350 km）** |\n| 充電口 | **CCS**（美國 NACS 版）|\n| 重量 | 5,037 磅（2,284 kg）|\n\n## 實測評價重點\n\n### 能效\n- 城市低速行駛實測：**3.7 英里/kWh（17 kWh/100km）**\n- 評論：「同級電動 SUV 中最高效」\n\n### 底盤動態\n- 「**駕駛感覺就是 BMW**」—車評人一致評語\n- 即使沒有空氣懸架，轉彎靈活、車身控制佳\n- Heart of Joy 駕駛控制單元：反應速度宣稱提升 10 倍\n- 軟停功能（limo stop）消除煞車最後階段頓挫感\n- 「中國品牌目前仍無法複製這種駕駛質感」\n\n### 內裝\n- 平行四邊形中央螢幕（BMW OS X）\n- 全景顯示器（從 A 柱延伸至 A 柱，融合儀表板 + HUD）\n- 無 iDrive 旋鈕（BMW 大車中首款）\n- 後排空間接近 X5 等級，平地板\n\n## 競品比較（同級）\n\n| 競品 | 優勢 | 劣勢 vs iX3 |\n|------|------|------------|\n| Tesla Model Y | 生態系、性價比 | 駕駛質感 |\n| Audi Q6 E-tron | 科技感完整 | 效率稍遜 |\n| Porsche Macan Electric | 駕駛樂趣頂尖 | 售價更高 |\n| 中國品牌 | 科技規格 per euro | 駕駛質感、品牌信任 |\n\n## 市場定位\n\n「首款真正從一開始就為電動而設計的 BMW EV」——打破之前 EV 是「燃油車改版」的批評。\n\n## Related\n- [[concepts/歐洲EV市場]]\n- [[concepts/美國EV市場與政策]]\n- [[sources/bmw-i7-neue-klasse-2027]]\n- [[entities/寧德時代]]"

    "bogota-711-electric-buses": {
      "title": "波哥大部署 711 輛電動巴士：BYD 底盤 + Marcopolo Superpolo 車身",
      "url": "https://www.sustainable-bus.com/electric-bus/bogota-transmizonal-marcopolo-superpolo",
      "updated": "2026-04-09",
      "body": "**來源**：[https://www.sustainable-bus.com/electric-bus/bogota-transmizonal-marcopolo-superpolo](https://www.sustainable-bus.com/electric-bus/bogota-transmizonal-marcopolo-superpolo)\n\n# 波哥大部署 711 輛電動巴士：BYD 底盤 + Marcopolo Superpolo 車身\n\n**原文**：Sustainable Bus｜**發布**：2026-04-09\n\n## 摘要\n哥倫比亞首都波哥大 2026 年 3 月 27 日交付首批 68 輛電動巴士（TransMiZonal 路線），採比亞迪底盤 + Marcopolo Superpolo 在地組裝，全部 711 輛預計 2026–2027 年間交付完畢。\n\n## 關鍵數據\n- **總規模**：711 輛（2026–2027 年交付）\n- **首批**：68 輛（2026-03-27 交付）\n- **底盤/驅動系統**：比亞迪（BYD）\n- **車身/組裝**：Marcopolo Superpolo（巴西 Marcopolo 在哥倫比亞子公司）\n- **在地效益**：直接就業 1,330 人，間接就業 5,300+ 人，180 家在地供應商\n\n## 環境效益\n- 每年減少 CO₂ 排放：**2,628 噸**（相當於 119,000 棵樹）\n- 替換服役超過 15 年的柴油巴士\n\n## 意義\n- 比亞迪底盤在拉丁美洲採「在地車身製造」模式，兼顧就業與採購要求\n- 南美洲電動公共交通加速轉型的代表案例\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/車輛類型/電動巴士市場]]"

      "body": "**來源**：[https://www.electrive.com/2026/04/11/boreal-orders-20-electric-hydrofoil-ferries-for-norways-coastline](https://www.electrive.com/2026/04/11/boreal-orders-20-electric-hydrofoil-ferries-for-norways-coastline)\n\n# 挪威 Boreal 訂購 20 艘 Candela P-12 電動水翼船\n\n**原文**：electrive／Carla Westerheide｜**發布**：2026-04-11\n\n## 摘要\n挪威運輸業者 Boreal 向瑞典製造商 Candela 訂購 20 艘 P-12 電動水翼渡輪，構成目前全球最大電動渡輪船隊，首批 2027 年交付，主力服務挪威峽灣與沿岸高速旅客路線。\n\n## Candela P-12 規格\n| 項目 | 數值 |\n|------|------|\n| 巡航速度 | 25 節 |\n| 續航 | ~40 海里 |\n| 能耗節省 | 較傳統船體 **~80%**（水翼升力降低阻力）|\n| 充電時間 | ~1 小時（標準 DC 快充，無需高功率充電基礎建設）|\n| 噪音 | ~64 dB（機艙內）|\n\n## 訂單意義\n- **全球最大電動渡輪船隊**迄今\n- 目標：取代現有柴油船在長程高速航線的應用\n- Candela 訂單積壓：65+ 艘，約 20 億瑞典克朗（€1.85 億）\n- 也包含 11 艘供孟買（印度）使用的訂單\n\n## Related\n- [[concepts/車輛類型/電動商用車]]"

    "byd-april-exports-q1-2026": {
      "title": "比亞迪 4 月海外銷量 +71%，中國 Q1 NEV 出海比重達 22%（2026-05-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754161",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754161](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754161)\n\n# 比亞迪 4 月海外銷量 +71%，中國 Q1 NEV 出海比重達 22%（2026-05-05）\n\n**原文**：Digitimes（楊智家、徐悅然）｜**發布**：2026-05-05\n\n## 摘要\n比亞迪 4 月海外銷量年增 71%，中國整體 NEV 出海比重在 Q1 2026 達到 22%（較 2025 Q1 增 10pp）。但中國本土需求疲軟，比亞迪整體交車量連續第 8 個月下滑。\n\n## 比亞迪 4 月數據\n\n| 指標 | 數值 |\n|------|------|\n| 4 月整體交車 | **32.11 萬輛（-16% YoY）** |\n| 4 月海外銷量 | **13.45 萬輛（+71% YoY）** |\n| 前 4 月累計海外 | **45.43 萬輛** |\n| 折扣幅度（3 月）| **10%**（近兩年新高）|\n| 2026 年海外目標 | **130 萬輛**（+25% vs 2025）|\n\n- 新旗艦 SUV **大唐**：預售 24 小時訂單突破 3 萬輛，≈1,000 km 續航，起售價 RMB 25 萬\n- 壓力：中國政府補貼退場 + 吉利、小米等競爭加劇\n\n## 中國 Q1 2026 NEV 市場全貌\n\n| 指標 | 數值 |\n|------|------|\n| 全球汽車銷量（Q1）| **2,240 萬輛** |\n| NEV 總量 | **453 萬輛**（滲透率 20.2%）|\n| 中國品牌全球市占 | **61%**（2025 年 68.3%→下滑）|\n| 自主品牌 NEV 海外比重 | **22%**（+10pp YoY）|\n\n- BEV 13.8%、PHEV 6.4%、HEV 7.2%（多路線並行）\n- 美國 Q1 需求年減 >30%（高關稅 + 補貼退場）\n\n## 各品牌 4 月出口表現\n\n| 品牌 | 4 月出口 | YoY |\n|------|---------|-----|\n| 比亞迪 | 13.45 萬輛 | +71% |\n| 吉利 | 8.32 萬輛 | **+245%** |\n| 奇瑞 | 17.76 萬輛 | **+100%+**（整體 25.14 萬）|\n| 極氪 | 3.18 萬輛 | >100% |\n| 小米 | 3 萬輛/月 | 站穩 |\n\n## 市場結構趨勢\n\n- **南美洲**：中國品牌 NEV 滲透率 >80%\n- **東南亞**：中國品牌 NEV 滲透率接近 50%\n- **未來競爭轉向**：價格 → 技術實力 + 品牌 + 在地供應鏈整合\n\n## Related\n- [[entities/比亞迪]]\n- [[entities/吉利汽車]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/中國EV市場競爭格局]]"

      "title": "比亞迪騰勢歐洲首秀：Z9GT 旗艦登場，閃充 1,500 kW",
      "url": "https://www.electrive.com/2026/04/09/byd-brand-denza-celebrates-european-debut",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/byd-brand-denza-celebrates-european-debut](https://www.electrive.com/2026/04/09/byd-brand-denza-celebrates-european-debut)\n\n# 比亞迪騰勢歐洲首秀：Z9GT 旗艦登場，閃充 1,500 kW\n\n**原文**：electrive｜**發布**：2026-04-09\n\n## 摘要\n比亞迪旗下高端品牌騰勢（Denza）2026 年 4 月 8 日在巴黎舉辦歐洲首秀，推出全電旗艦 Z9GT 及 PHEV 廂型車 D9，首批進入法、德、義、西、英。\n\n## 騰勢 Z9GT 規格\n\n| 項目 | 規格 |\n|------|------|\n| 動力 | 三電機（前 1 + 後 2），系統輸出 850 kW |\n| 0→100 km/h | 2.7 秒 |\n| 極速 | 270 km/h |\n| 電池 | 122.5 kWh（第二代刀片電池）|\n| WLTP 續航 | 600 km |\n| 閃充（10→70%）| **5 分鐘**（1,500 kW） |\n| 閃充（10→97%）| **9 分鐘** |\n| 德國售價 | €115,000（全電）/ €101,000（PHEV，續航 800 km）|\n\n⚠️ 注意：1,500 kW 閃充目前僅支援中國規格接口，歐洲標準待確認。\n\n## 充電基礎建設計畫\n- 未來 12 個月在中國以外建設 6,000 座閃充站，其中 3,000 座在歐洲\n\n## 騰勢 D9 DM-i（PHEV 廂型車）\n- 全輪驅動，純電 210 km，綜合續航 950 km（滿電+滿油）\n- 7 人座豪華廂型\n\n## 品牌定位轉型\n騰勢原為比亞迪與戴姆勒合資品牌（服務中國大眾市場），現已轉型為比亞迪高端品牌，以「Technology Drives Elegance」為核心主張。\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]"

    "byd-denza-z-roadster": {
      "title": "比亞迪騰勢 Z：1,000HP 電動跑車，北京車展全球首發（2026-04）",
      "url": "https://insideevs.com/news/794147/denza-z-ev-roadster-1000-hp-charging-reveal",
      "updated": "2026-04-27",
      "body": "**來源**：[https://insideevs.com/news/794147/denza-z-ev-roadster-1000-hp-charging-reveal](https://insideevs.com/news/794147/denza-z-ev-roadster-1000-hp-charging-reveal)\n\n# 比亞迪騰勢 Z：1,000HP 電動跑車，北京車展全球首發（2026-04）\n\n**原文**：InsideEVs｜**發布**：2026-04-27\n\n## 摘要\n比亞迪旗下騰勢品牌在 2026 北京車展發布騰勢 Z 量產版，定位與已反覆跳票的 Tesla Roadster 2.0 直接競爭。1,000 馬力電動超跑，配備 Flash 充電器（1,500kW），歐洲優先發布，Goodwood Festival of Speed 亮相。\n\n## 規格\n\n| 項目 | 數值 |\n|------|------|\n| 綜合馬力 | **~1,000hp（~745kW）** |\n| 0-60mph | **< 2 秒** |\n| 充電相容 | BYD Flash 充電器（**1,500kW**，<10 分鐘）|\n| 懸吊 | DiSus-M 電磁懸吊 |\n| ADAS | 比亞迪最新「天神之眼」|\n| 設計師 | **Wolfgang Egger**（前 Audi/Alfa Romeo 設計總監）|\n\n## 三款版本\n\n1. **傳統 Coupe**\n2. **軟頂敞篷（Convertible）**\n3. **賽道版（Track）**\n\n## 市場策略\n\n- **歐洲優先**（先於中國本土市場）\n- 首個動態亮相：**英國 Goodwood Festival of Speed**\n- 針對 Tesla Roadster 2.0 長年跳票留下的市場空白\n\n## 設計背景\n\nWolfgang Egger 曾在 Audi 設計 R8 一代、在 Alfa Romeo 設計 Giulia，目前擔任比亞迪全球設計總監。騰勢 Z 是其主導的豪華電動跑車旗艦代表作。\n\n## 意義\n\n- 中國品牌首次以**電動超跑**切入歐洲豪華運動市場（過去都是 SUV 或轎車）\n- Flash 充電 1,500kW 技術若量產推廣，將顛覆「充電即等待」的使用體驗\n- Ford CEO Jim Farley 評論：「Tesla 確實沒有更新的車款」，中國品牌正填補這個空缺\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/byd-denza-europe-debut]]\n- [[sources/beijing-auto-show-2026]]"

      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751475&grid_seq1=&grid_seq2=",
      "updated": "2026-04-09",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751475&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751475&grid_seq1=&grid_seq2=)\n\n# 比亞迪天神之眼（DiPilot）：ADAS 規模化與軟體品質的落差\n\n**原文**：DIGITIMES／黃女瑛、林廷宇｜**發布**：2026-04-09\n\n## 摘要\n比亞迪天神之眼（DiPilot）2025 年 2 月發布，導入約 250 萬輛新車，裝車量約為 Tesla FSD 的 2 倍，但有效訓練數據量僅達 Tesla 的一半，顯示硬體規模不等於軟體能力。\n\n## 三級架構\n\n| 方案 | 代號 | 感測器 | 晶片 | 定位 |\n|------|------|--------|------|------|\n| DiPilot 600（A 方案）| — | 3 顆 LiDAR | — | 仰望品牌旗艦 |\n| DiPilot 300（B 方案）| — | LiDAR + | Orin-X×1 | 騰勢及高階車款 |\n| DiPilot 100（C 方案）| 二郎神 | 前視三目（2廣角+1長焦，偵測距離 350m）| — | 10 萬元級距普及化 |\n\n- 首波導入 21 款車型，價格帶：人民幣約 7 萬～20 萬+元\n- 支援高速 + 城市 NOA（導航輔助駕駛）\n- 採端到端（E2E）資料驅動演算法架構\n\n## 問題與挑戰\n- **數據品質**：Piper Sandler 研究指出，有效訓練數據量僅為 Tesla FSD 的一半\n- **品質爭議**：幽靈轉向、非預期加速、導航失誤 → 中國網路平台大量討論\n- **市場影響**：2026 Q1 比亞迪失去中國銷售龍頭地位，市場認為與天神之眼品質爭議有關\n- **標配風險**：大規模標配放大尚未成熟技術的風險，快速影響品牌信任\n\n## Tesla 的對比\n- Tesla FSD 軟體能力領先，但美國監管加強審查\n- Tesla 計劃 2026 年 FSD 進入中國，被要求改名「智能輔助駕駛」\n\n## Related\n- [[entities/比亞迪]]\n- [[entities/Tesla]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/電池與技術/自動駕駛安全監管]]"

    "byd-dod-military-list-2026": {
      "title": "美國國防部將比亞迪列入軍工關聯企業名單（2026-06-08）",
      "url": "https://www.defense.gov/News/Releases/Release/Article/3820001/dod-releases-list-of-peoples-republic-of-china-military-companies/",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.defense.gov/News/Releases/Release/Article/3820001/dod-releases-list-of-peoples-republic-of-china-military-companies/](https://www.defense.gov/News/Releases/Release/Article/3820001/dod-releases-list-of-peoples-republic-of-china-military-companies/)\n\n# 美國國防部將比亞迪列入軍工關聯企業名單（2026-06-08）\n\n**原文**：大紀元、Google Alerts｜**發布**：2026-06-08\n\n## 摘要\n美國國防部（DoD）於 **2026 年 6 月 8 日**發布最新修訂版《中國軍事公司名單》（Section 1260H List），將**比亞迪（BYD）**及機器人企業宇樹科技（Unitree Robotics）等數家中國企業列入，引發市場對 BYD 美國業務擴展的新一輪擔憂。\n\n## 關鍵事實\n\n| 指標 | 內容 |\n|------|------|\n| 發布機構 | 美國國防部（DoD） |\n| 發布日期 | **2026-06-08** |\n| 主要新增企業 | **比亞迪（BYD）**、宇樹科技（Unitree） |\n| 法律依據 | 2021 NDAA Section 1260H |\n| 直接效果 | 不等於制裁，但會影響 US 政府採購、投資限制、融資 |\n\n## 影響評估\n\n### 直接法律效果（Section 1260H）\n- **非制裁名單**（OFAC SDN List）：不等於直接禁止交易\n- 限制：DoD 和聯邦承包商不得採購名單企業產品/服務\n- 可能觸發：國會、州政府進一步立法禁止 BYD 在美採購（如學校/公共交通巴士）\n\n### 對 BYD 的具體衝擊\n- BYD 在美國主要業務：電動巴士（部分州市場）、乘用車進口受限\n- 加拿大、墨西哥等北美市場間接受影響\n- 與既有《通脹削減法》（IRA）外國敏感實體條款形成疊加效應\n\n### 更大地緣政治脈絡\n- 列入名單的中企數量從 2021 年的 80+ 家持續擴增\n- 中國 EV 企業（BYD、CATL 等）陸續被拉入各種美國限制名單\n- 象徵意義大於即時衝擊，但長期來看將影響 BYD 在美上市/融資可能性\n\n## Related\n- [[concepts/中國EV出海策略]]\n- [[concepts/地緣政治與EV產業]]\n- [[entities/BYD比亞迪]]"
    },
    "byd-ess-market-leader-2026": {
      "title": "BYD 超越 Tesla 奪 2025 年全球儲能第一（13% 市占）",
      "url": "https://electrek.co/2026/05/13/byd-surpasses-tesla-energy-storage-bess-benchmark-2025",
      "updated": "2026-05-15",
      "body": "**來源**：[https://electrek.co/2026/05/13/byd-surpasses-tesla-energy-storage-bess-benchmark-2025](https://electrek.co/2026/05/13/byd-surpasses-tesla-energy-storage-bess-benchmark-2025)\n\n# BYD 超越 Tesla 奪 2025 年全球儲能第一（13% 市占）\n\n**原文**：Electrek｜**發布**：2026-05-13\n**數據來源**：Benchmark Mineral Intelligence\n\n## 關鍵數據（2025 年全球 BESS 市場）\n\n| 廠商 | 出貨量 | 市占率 | YoY |\n|------|--------|--------|-----|\n| **BYD** | **>60 GWh** | **13%** | — |\n| **Tesla** | **46.7 GWh** | **10%** | +49% |\n\n- 全球 BESS 安裝量 **+51%（2025 年）≈315 GWh**\n- 固定儲能電芯出貨量幾近翻倍，**>600 GWh**\n- 前 10 大 BESS 整合商中有 **8 家為中國企業**（BYD、CATL 領銜）\n\n## 意義\n\nTesla Megapack 曾主導公用規模儲能市場，但 BYD FinDreams Energy 積極向歐洲和美洲擴張。BYD 在 ESS 的崛起軌跡複製 EV 路徑：垂直整合 + 規模成本優勢。\n\n這是 Tesla 失去頂端位置（Tesla 2023、2024 年均為第一）的歷史性轉折。\n\n## 背景：中國 ESS 與全球需求\n\n中國國內 BESS 部署量獨佔全球最大份額。全球 AI 資料中心電力需求及電網穩定需求，是 2025–2026 年 ESS 市場爆炸性成長的主要推手。\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]\n- [[sources/ford-energy-dc-block-2026]]\n- [[sources/us-ess-battery-supply-shortage]]\n- [[sources/lges-bmw-46series-order]]"

    "byd-great-han-2026": {
      "title": "BYD 大漢（Great Han）：5.26 公尺旗艦 EV 轎車",
      "url": "",
      "updated": "2026-06-16",
      "body": "**來源**：electrive（2026-06-15）\n\n# BYD 大漢（Great Han）：5.26 公尺旗艦 EV 轎車\n\n**事件日期**：2026-06-15｜**訊息來源**：中國工信部申報文件\n\n## 核心規格\n\n| 版本 | 動力 | 續航（CLTC）|\n|------|------|-----------|\n| 單馬達 BEV | **370 kW** | **>1,000 km** |\n| 雙馬達 AWD BEV | **570 kW** | **880 km** |\n| PHEV | 200 kW 電機 + 1.5T 渦輪 | **370 km 純電（CLTC）**|\n\n## 車身尺寸\n\n| 項目 | 數值 |\n|------|------|\n| 長 × 寬 × 高 | **5,260 × 2,000 × 1,510 mm** |\n| 軸距 | **3,130 mm** |\n| 整備重量 | 2.2~2.5 噸 |\n| 輪圈 | 20 或 21 吋 |\n\n## 技術特點\n\n- 電池：**LFP**（規格未完全揭露）\n- 標配車頂中置 **LiDAR 感測器**\n- 支援 BYD **Flash Charging**（1,500 kW）\n- 外觀：「龍顏」設計語言，窄頭燈，鍍鉻格柵，雙色車頂\n\n## 產品線位置\n\n```\nBYD 轎車升級路線：\nHan → Han L（1,000V 平台，2025）→ Great Han（旗艦，2026）\nTang → Tang L（1,000V，2025）→ Great Tang（已上市）\n```\n\n**Great Tang SUV**：在中國已上市，不到 2 週訂單突破 **10 萬輛**（歷史性速度）\n\n## 上市計畫\n\n- 大陸預計 **2026 年底**前上市\n- 大唐 SUV 先行，大漢隨後（短暫時差）\n- 現有 Han 系列繼續同步銷售（2026-05 Han 標準版月銷 3,390 輛 + Han L 689 輛）\n\n## 戰略意義\n\n- BYD 以大漢宣示**進攻豪華轎車市場頂端**（對標賓士 S-Class、寶馬 7 系）\n- LFP 電池實現 >1,000 km 續航，打破「LFP 只能短程」偏見\n- PHEV 370 km 純電 + 渦輪增程：全場景覆蓋\n\n## Related\n- [[concepts/中國EV市場競爭格局]]\n- [[entities/比亞迪]]\n- [[concepts/電池技術路線]]"

    "byd-hungary-labour-report-2026": {
      "title": "BYD 匈牙利廠勞工爭議：CLW 報告指控",
      "url": "",
      "updated": "2026-06-10",
      "body": "**來源**：中國勞工通訊（CLW）報告（2026-06-05）\n\n# BYD 匈牙利廠勞工爭議：CLW 報告指控\n\n**事件日期**：2026-06-05｜**地點**：匈牙利科馬羅姆（Komárom）BYD 工廠\n\n## 核心事件\n\n國際勞工權益組織**中國勞工通訊（China Labour Bulletin，CLW）**發布報告，揭露比亞迪匈牙利工廠招募、管理中國移工過程中的多項違規問題。\n\n## 主要指控\n\n| 問題類型 | 描述 |\n|----------|------|\n| **債務束縛（Debt Bondage）**| 移工被要求支付高額招募費用（含保證金），實質形成人身束縛 |\n| **非法簽證安排** | 部分工人持非正規（可能是旅遊或商務）簽證工作，而非正式工作簽證 |\n| **超時工作** | 工時超過匈牙利及 EU 勞工法規上限 |\n| **資訊不透明** | 移工對工作條件、薪資結構不完全知情 |\n\n## BYD 匈牙利廠背景\n\n- 地點：匈牙利科馬羅姆，靠近斯洛伐克邊境\n- 工廠性質：BYD 歐洲首座**整車製造廠**，規劃年產能約 15 萬輛\n- 勞工來源：匈牙利本地工人 + 中國派遣移工（據報占相當比例）\n\n## 更廣泛背景\n\n此報告是近年多起批評中國企業海外工廠勞工條件事件之一：\n- **Foxconn（富士康）**：印度、越南工廠曾遭媒體揭露問題\n- **CATL、BYD 等在歐廠**：因快速建廠、移工比例高，受到 NGO 關注\n- **EU 供應鏈盡職調查法規（CSDDD）**：歐盟要求企業對供應鏈（含自有工廠）人權風險盡職調查，此案恰逢法規強制期實施\n\n## BYD 回應\n\n截至報告發布，未見 BYD 就具體指控公開詳細回應。\n\n## ESG 與企業聲譽影響\n\n- **投資人**：ESG 評級機構可能下調 BYD 社會（S）評分\n- **歐洲客戶/政府採購**：部分政府要求採購對象符合供應鏈倫理標準\n- **中歐關係**：此事件在 BYD 積極擴張歐洲市場的關鍵時機引發輿論壓力\n\n## Related\n- [[concepts/中國EV出海策略]]\n- [[entities/比亞迪]]\n- [[sources/byd-dod-military-list-2026]]\n- [[sources/eu-battery-tariff-2027-delay-2026]]\n- [[sources/ev-news-digest-jun1-10-2026]]"
    },
    "byd-japan-500buses-2026": {
      "title": "比亞迪 日本第 500 輛電動巴士上路（2026-05）",
      "url": "https://www.electrive.com/2026/05/13/byd-puts-500th-electric-bus-on-japanese-roads",
      "updated": "2026-05-13",
      "body": "**來源**：[https://www.electrive.com/2026/05/13/byd-puts-500th-electric-bus-on-japanese-roads](https://www.electrive.com/2026/05/13/byd-puts-500th-electric-bus-on-japanese-roads)\n\n# 比亞迪 日本第 500 輛電動巴士上路（2026-05）\n\n**原文**：Electrive | Sagar Parikh｜**發布**：2026-05-13\n**里程碑**：比亞迪在日本累計運行 500 輛電動巴士\n\n## 最新交付\n\n| 項目 | 細節 |\n|------|------|\n| 受車方 | 南海林間巴士（Nankai Rinkan Bus）和歌山縣 |\n| 車型 | BYD **K8** 電動巴士 |\n| 交付數量 | **6 輛** |\n| 路線 | 高野山站 ↔ 奥之院前（高野山入口線）|\n| 選擇原因 | 續航能力 + 寒冷地區耐候性（高野山冬季最低 -15°C）|\n\n## BYD K8 日本版規格\n\n| 規格 | 數值 |\n|------|------|\n| 車長 × 車寬 × 車高 | 10.5 m × 2.5 m × 3.3 m |\n| 軸距 | 5.3 m |\n| 電機 | 2 × 100 kW = **200 kW** |\n| 最高時速 | 70 km/h |\n| 爬坡能力 | 最高 **15%** |\n| 電池 | **314 kWh LFP** |\n| 續航 | **240 km** |\n| 充電功率 | 最高 **90 kW**（約 3.5 小時充滿）|\n| 懸架 | 前後雙氣囊懸架 |\n| 轉彎半徑 | 8.3 m |\n| 載客量（城市版）| 80 人（含站客 + 輪椅席 2 個）|\n| 載客量（郊區版）| 76 人（含站客 + 輪椅席 2 個）|\n\n## 日本市場歷程\n\n- 比亞迪進入日本電動巴士市場：**2015 年**（首次部署於京都）\n- 日本電動巴士市占：比亞迪約 **70%+**（市場主導地位）\n- 2026 年 5 月：**500 輛**累計里程碑\n- 和歌山縣是比亞迪首次進駐的新縣\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/電動巴士市場]]\n- [[concepts/東南亞EV市場]]\n- [[sources/foxconn-mitsubishi-fuso-electric-bus]]"

      "body": "**來源**：[https://news.tvbs.com.tw/life/3177698](https://news.tvbs.com.tw/life/3177698)\n\n# 比亞迪韓國 11 個月破萬輛（進口車史上最短）\n\n**原文**：TVBS 新聞 | 林宏宜｜**發布**：2026-04-14\n\n## 里程碑\n\n- 進入韓國市場（2025-04-14 首批交付）起 **11 個月**突破 1 萬輛（10,075 輛）\n- 比 Tesla 進入韓國後破萬的時間少 **2 年**（Tesla 花了 3 年）\n- 個人買家占比 **79%**（超過進口車市場均值 65%），顯示並非靠法人批量採購\n\n## 銷售結構\n\n| 車款 | 個人客戶占比 | 法人客戶占比 |\n|------|-------------|-------------|\n| Sea Lion 7 | 51.5%（最高）| — |\n| ATTO 3 | — | 57.0%（最高）|\n\n- 顧客 **98% 為韓國本國人**\n- 年齡：40-50 歲合計 65%（40 歲 34.6%，50 歲 30.8%）\n- 性別：男 72%，女 28%\n- 地域：首都圈 47%，非首都圈 53%（京畿最多 30.9%）\n\n## 通路擴張\n\n| 時間 | 展廳數 | 服務中心數 |\n|------|--------|-----------|\n| 進入市場時（2025 年初）| 15 | 11 |\n| 2026-04 | 32 | 17 |\n| 2026 年底目標 | 35 | 26 |\n\n## 2026 車款擴充\n\n- Seal 系列新增後驅版 RWD、RWD Plus\n- 新推 BYD Dolphin（小型掀背，兩版本）\n- 形成 4 款車型、8 種配置體系\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[sources/tesla-korea-q1-2026]]"

      "title": "比亞迪馬來西亞設廠談判觸礁：出口要求與最低售價成僵局",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751267",
      "updated": "2026-04-13",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751267](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751267)\n\n# 比亞迪馬來西亞設廠談判觸礁：出口要求與最低售價成僵局\n\n**原文**：DIGITIMES／高盈穎｜**發布**：2026-04-13\n\n## 摘要\n比亞迪正在重新評估在馬來西亞霹靂州丹戎馬林建立 CKD（全散件組裝）廠的計畫，因與馬國政府的設廠條件未能談攏；馬國本地汽車零組件供應商對政府立場表示支持。\n\n## 爭議條件\n- **出口要求**：馬來西亞境內生產的車輛，多數必須出口（而非在地銷售）\n- **最低售價**：在大馬銷售的車輛須達到最低售價門檻\n- 馬來西亞 MITI 澄清：上述政策適用於**所有**在馬新投資的電動車業者，非針對比亞迪\n\n## 馬來西亞 EV 市場現況（2025）\n- EV 佔整體車輛登記：**5.2%**（全年約 4.5 萬輛，+106%）\n- 最受歡迎品牌：**比亞迪第一** > Proton（國產）> Tesla\n\n## 本地供應鏈立場\n- 本田大馬供應商俱樂部（HMSC）主席認為馬國政府態度審慎、政策深思熟慮\n- 外資與本資車廠均應謹慎評估採購結構，與本地供應鏈建立夥伴關係\n- 日本本田長期在馬推動在地化，被視為正面典範\n\n## 戰略意義\n此案凸顯東南亞政府在吸引外資與保護本土產業之間的兩難取捨——比亞迪已是馬國最暢銷 EV 品牌，但設廠談判仍受制於政策框架。\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/東南亞EV市場]]"
    },
    "byd-malaysia-factory-update-2026": {
      "title": "比亞迪馬來西亞廠停工：MITI 強制條件引爆保護主義論戰",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752737",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752737](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=752737)\n\n# 比亞迪馬來西亞廠停工：MITI 強制條件引爆保護主義論戰\n\n**原文**：DIGITIMES／高盈穎（分析）｜ **發布**：2026-04-21\n\n## 摘要\n2025-08 比亞迪宣布在馬來西亞霹靂州設立 CKD 廠，預計 2026 啟用，但 2026-03 急轉直下——MITI 條件（80% 強制出口、本地售價 ≥ RM100,000、年銷上限 1 萬輛）讓比亞迪無法接受，建設全面停工。事件凸顯馬來西亞在吸引外資與保護本土車業之間的兩難。\n\n## 時間線\n\n| 時間 | 事件 |\n|------|------|\n| 2025-08 | 比亞迪宣布在丹戎馬林 KLK 科技園區設 CKD 廠，預計 2026 啟用 |\n| 2026-03 | 比亞迪重新評估，建設**全面停工** |\n| 2026-04-21 | Digitimes 分析深度報導 |\n\n## MITI 強制條件（爭議核心）\n\n| 條件 | 內容 |\n|------|------|\n| 出口比例 | CKD 廠生產的車輛 **80% 必須出口** |\n| 本地銷售上限 | 每年不得超過 **1 萬輛** |\n| 本地最低售價 | 每輛 **RM 100,000**（≈ $25,000 美元）|\n\n- 議員羅思義批評：MITI 在投資申請提交後才突然改規定，「臨門變卦」損害投資者信心\n\n## 馬來西亞 EV 市場現況\n\n| 指標 | 數值 |\n|------|------|\n| 擁車率 | 亞洲第 2（每千人 535 輛）|\n| EV 佔比（2025 年）| 5% |\n| EV 佔比（2026 Q1）| ~7% |\n| 最受歡迎品牌 | 寶騰 > 比亞迪 > Tesla > 奇瑞 > 極氪 |\n\n## 泰國 vs 馬來西亞：政策對比\n\n| 項目 | 泰國 | 馬來西亞 |\n|------|------|---------|\n| 吸引到的中國品牌 | 比亞迪、廣汽埃安、長城、哪吒、MG | 僅比亞迪（已生變）|\n| 比亞迪工廠 | **羅勇廠，2024-07 啟用，年產 15 萬輛** | 丹戎馬林 CKD，停工 |\n| 政策取向 | 補貼換投資，基本開放 | 高出口比例 + 售價下限保護本土 |\n\n## 馬來西亞困境（結構性兩難）\n\n1. **開放風險**：中國 EV 大量進入，衝擊寶騰（Proton）等本土品牌\n2. **保護風險**：外資卻步，被排除在全球 EV 供應鏈之外\n\n> 馬來西亞：吸引外資 vs 保護本土，同樣的兩難在泰國、印尼、印度都在上演\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/地理市場/東南亞EV市場]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[sources/byd-malaysia-factory-negotiation]]\n- [[sources/thailand-ev-market-2026]]"

    "byd-q1-2026-earnings": {
      "title": "比亞迪 Q1 2026 財報：淨利崩跌 55%，中國車企內卷失控",
      "url": "https://newtalk.tw/news/view/2026-04-29/1032448",
      "updated": "2026-04-30",
      "body": "**來源**：[https://newtalk.tw/news/view/2026-04-29/1032448](https://newtalk.tw/news/view/2026-04-29/1032448)\n\n# 比亞迪 Q1 2026 財報：淨利崩跌 55%，中國車企內卷失控\n\n**原文**：Newtalk 新聞 / Digitimes｜**發布**：2026-04-29~30\n\n## 摘要\n比亞迪 Q1 2026 財報重挫，淨利年減 55%，創 2020 年以來最大跌幅。背景是中國汽車市場全面價格戰與產能過剩，3月平均折扣擴大至 10%（兩年新高）。龍頭企業尚且如此，整個中國電動車產業正進入殘酷淘汰期。\n\n## 關鍵財務數據（2026 Q1）\n\n| 指標 | 數值 | YoY |\n|------|------|-----|\n| 營收 | RMB 1,502.25 億 | **-11.82%**（2024 Q2 以來最差）|\n| 歸屬母公司淨利 | RMB 40.85 億 | **-55.38%**（2020 年以來最大跌幅）|\n| 扣非淨利 | — | -49.24% |\n| 銷量 | 70.05 萬輛 | -30.01% |\n| 經營活動現金流 | RMB 27.9 億 | -67.48% |\n| 汽車業務收入 | RMB 1,120 億 | -16.1% |\n| 出口量 | 31.97 萬輛 | **+56%**（占總銷量 45.6%）|\n\n## 折扣與價格戰\n\n- 比亞迪 3 月平均降幅達 **10%**（兩年新高）\n- 吉利、奇瑞同步加大折扣；全行業 Q1 近 70 款車型集體降價\n- 新能源車均價下跌 ~3.8 萬元；燃油車均價降 ~3.7 萬元\n- 產業利潤率 2025 年跌至 4.1%（十年新低），2026 Q1 前兩個月進一步跌至 **2.9%**\n- 政府至少 3 次試圖干預停火（2026 年），收效甚微\n\n## 產能過剩根源\n\n| 指標 | 數值 |\n|------|------|\n| 中國汽車年產能 | **5,550 萬輛** |\n| 2025 年本土銷量 | ~2,300 萬輛 |\n| 產能利用率 | **~50%（供需嚴重失衡）** |\n\n## 企業高層警示\n\n- **蔚來李斌**：「產業已進入決賽期，未來五年格局將快速明朗」\n- **比亞迪王傳福**：「汽車業已步入殘酷淘汰階段」\n- **廣汽曾慶洪**：「高增長時代已結束，產業淘汰賽全面加速」\n\n## 結構性壓力\n\n- 海外擴張被視為唯一出路：巴西、英國、澳洲、加拿大\n- 歐盟已對中國電動車加徵最高 35.3% 反補貼稅；拉美部分國家跟進\n- 比亞迪為配合監管審查已加快付款給供應商，淨負債權益比從負值升至 **25%**\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[sources/china-ev-market-q1-2026]]"
    },
    "cam-ev-innovation-ranking-2026": {
      "title": "CAM 電動車創新力排名 2026：吉利、VW、BYD 蟬聯前三",
      "url": "https://www.electrive.com/2026/05/12/geely-vw-and-byd-retain-lead-in-ev-innovation-ranking",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.electrive.com/2026/05/12/geely-vw-and-byd-retain-lead-in-ev-innovation-ranking](https://www.electrive.com/2026/05/12/geely-vw-and-byd-retain-lead-in-ev-innovation-ranking)\n\n# CAM 電動車創新力排名 2026：吉利、VW、BYD 蟬聯前三\n\n**原文**：electrive.com | Florian Treiss｜**發布**：2026-05-12\n**機構**：德國汽車管理中心（CAM，Center of Automotive Management）\n\n## 評估方法\n\n- 評估範圍：35 家主要汽車集團的 BEV 創新強度\n- 分析 2020–2025 年共 **874 項**量產創新（2025 年新增 162 項）\n- 評估維度：**續航、充電功率、能耗效率、EV 生態系**\n- 單位：創新指數點（IP, Innovation Points）\n\n## 前 10 名排行\n\n| 排名 | 廠商 | IP | 備註 |\n|------|------|-----|------|\n| 1 | **吉利集團**（含 Lotus、Polestar、Volvo、Zeekr）| 209 | 蟬聯第一 |\n| 2 | **VW 集團** | 200 | |\n| 3 | **BYD** | 171 | |\n| 4 | SAIC（含 MG Motor）| — | |\n| 5 | **BMW** | — | 最大進步：從第 10 升至第 5 |\n| 6 | **Tesla** | — | 最大退步：從前三跌至第 6 |\n| 7 | Mercedes-Benz | — | |\n| 8 | Hyundai | — | |\n| 9 | Renault | — | |\n| 10 | General Motors | — | |\n\n## 代表性創新\n\n**吉利**：Lotus Emeya 450kW 充電；Zeekr Mix 10.5 分鐘 10–80%（450kW）\n\n**VW**：Porsche Cayenne Electric——結構整合 113kWh 電池提升車身剛性 + 降低重心；850kW 峰值，0–100 km/h 2.5 秒\n\n**BYD**：Han L——1,000kW 雙槍充電，刀片電池 2.0（-30°C 可充電），電機 30,511 rpm；Tang L/Yangwang U7 同達 1,000kW/500kW\n\n**BMW iX3**（Neue Klasse）：805km 續航，AI 自動開充電口，Plug & Charge Multi Contract（最多 10 份合約）\n\n## 國別分析\n\n- **中國**：32.4% 全球創新點\n- **德國**：31.9%（大幅提升，前幾年約 20%）\n- Tesla 排名下滑原因：長期未推出量產新車型\n\n## Q1 2026 全球 EV 銷量排名\n\nTesla 重新奪回第一（Q1 2026）→ BYD → 吉利 → VW 集團 → SAIC\n\n## Related\n- [[entities/吉利汽車]]\n- [[entities/比亞迪]]\n- [[entities/Tesla]]\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[concepts/地理市場/歐洲EV市場]]"
    },

      "title": "加拿大政府投入 $1,060 萬補助 1,600+ 個充電點",
      "url": "https://www.electrive.com/2026/04/11/canada-invests-10-6-million-in-ev-charging-infrastructure",
      "updated": "2026-04-13",
      "body": "**來源**：[https://www.electrive.com/2026/04/11/canada-invests-10-6-million-in-ev-charging-infrastructure](https://www.electrive.com/2026/04/11/canada-invests-10-6-million-in-ev-charging-infrastructure)\n\n# 加拿大政府投入 $1,060 萬補助 1,600+ 個充電點\n\n**原文**：electrive／Carla Westerheide｜**發布**：2026-04-11\n\n## 摘要\n加拿大聯邦政府宣布補助 14 個 EV 充電基礎建設專案，合計新增 1,600+ 個充電點，涵蓋安大略、魁北克、不列顛哥倫比亞等省份，並額外撥 $110 萬推動全國試駕教育計畫。\n\n## 主要專案\n| 執行方 | 充電點 | 說明 |\n|--------|--------|------|\n| 大多倫多機場（GTAA）| 262 個 | L2 + L3（DC 快充）|\n| Cogir（魁北克）| 981 個 | L2 慢充 |\n| 其他 | 360+ | 安大略、城市公共充電等 |\n\n## 政策背景\n- 隸屬加拿大「Auto Strategy」框架：EV 供應鏈製造 + 回收 + 人才培育\n- 零排放車輛基礎建設計畫（ZEVIP）：2016 年至今已累計投入 **$12 億加幣**\n- 加拿大近期也宣布對 BMW 等歐系車品牌導入 NACS 充電標準\n\n## Related\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/地理市場/北美EV關稅與政策]]\n- [[sources/bmw-canada-nacs-integration]]"

      "title": "寧德時代匈牙利德布雷岑廠：5GWh 模組產線啟動（2026-05）",
      "url": "https://www.electrive.com/2026/05/13/catl-launches-new-battery-module-assembly-line-in-debrecen",
      "updated": "2026-05-13",
      "body": "**來源**：[https://www.electrive.com/2026/05/13/catl-launches-new-battery-module-assembly-line-in-debrecen](https://www.electrive.com/2026/05/13/catl-launches-new-battery-module-assembly-line-in-debrecen)\n\n# 寧德時代匈牙利德布雷岑廠：5GWh 模組產線啟動（2026-05）\n\n**原文**：Electrive | Florian Treiss｜**發布**：2026-05-13\n\n## 廠區現狀（2026-05）\n\n| 項目 | 狀態 |\n|------|------|\n| 模組組裝新廠 | **已啟動**，年產能 **5 GWh** |\n| 電芯工廠（40 GWh）| 建設完工，設備已安裝；等待最終許可證後啟動試產 |\n| 既有模組生產（租用廠房）| 2024 年秋起運行，累計產出 **24 萬個模組**（~6 萬輛 EV）|\n| 預定量產時程 | 2026 年 3–4 月（原訂），**延誤**中 |\n\n## 廠區背景\n\n| 項目 | 細節 |\n|------|------|\n| 廠址 | 匈牙利德布雷岑（Debrecen）|\n| 投資承諾 | **€73.4 億**（多階段）|\n| 確認客戶 | **賓士**（已確認）、BMW（傳聞）|\n| BMW 關聯 | BMW 在德布雷岑設有新廠，生產全電動 BMW iX3 |\n| 目前是 | CATL **第二座歐洲電芯工廠**（第一座：德國 Arnstadt）|\n| 遠期規劃 | 擴至 **100 GWh** 產能 |\n\n## 5 GWh 模組廠的意義\n\n- 5 GWh ≈ 5 萬輛 100kWh 電池 EV，或 12.5 萬輛 40kWh EV\n- 在電芯廠取得許可前，先以組裝模組（用其他廠電芯）維持供貨\n- 德布雷岑廠延誤意味著歐洲在地電芯生產仍有缺口\n\n## Related\n- [[entities/寧德時代]]\n- [[concepts/電池技術路線]]\n- [[concepts/歐洲EV市場]]\n- [[sources/ford-catl-michigan-factory-2026]]"

    "catl-solid-state-caution-2026": {
      "title": "寧德時代 CEO 對固態電池潑冷水：2030 年大規模量產不可能",
      "url": "",
      "updated": "2026-06-16",
      "body": "**來源**：electrive（2026-06-15）\n\n# 寧德時代 CEO 對固態電池潑冷水：2030 年大規模量產不可能\n\n**事件日期**：2026-06-15｜**受訪者**：CATL CEO 曾毓群（Robin Zeng）\n\n## 核心聲明\n\n曾毓群接受《財經》雜誌訪問：\n- **2030 年之前大規模商業化不可能**\n- 初期僅能用於 **>¥25 萬（~€3.2 萬）以上的豪華車平台**\n- 固態電池商業化仍需「技術突破」\n\n## CATL 固態電池現況\n\n| 項目 | 數值 / 狀態 |\n|------|------------|\n| 技術成熟度（TRL）| **4/9**（實驗室驗證 + 原型開發階段）|\n| 電解質路線 | **硫化物固態電解質** |\n| 試驗產線能量密度 | **500 Wh/kg**（試產階段）|\n| 成本 vs 傳統鋰電 | **3~5 倍** |\n| 首批小量生產目標 | **2027 年** |\n\n## 行業生態背景\n\nCATL 已加入「中國全固態電池協同創新平台（CASIP）」（2024 初），成員包括：\n- CALB、EVE Energy、SVOLT、Gotion、比亞迪 FinDreams\n- 多家整車廠\n- 目標：2030 年前建立競爭性固態電池供應鏈\n\n## 市場影響解讀\n\n- 對比多家中國車廠（廣汽、上汽等）宣稱 2026~2027 年「上車」固態電池，CATL 立場明顯保守\n- Stellantis × Factorial「半固態電池」已在 Dodge Charger 道路測試（2026-06）→ 半固態與全固態路線的分野\n- 「半固態」≠ 全固態；固態電解質比例、制程仍有巨大差距\n- 3~5 倍成本意味著固態電池短期內是「性能旗艦」而非「平價主流」\n\n## Related\n- [[concepts/電池技術路線]]\n- [[entities/寧德時代]]"
    },
    "catl-super-tech-day-2026": {
      "title": "寧德時代超級科技日：六分鐘快充、鈉電 Q4 量產、凝聚態 1500km",
      "url": "https://money.udn.com/money/story/5603/9456423",
      "updated": "2026-04-23",
      "body": "**來源**：[https://money.udn.com/money/story/5603/9456423](https://money.udn.com/money/story/5603/9456423)\n\n# 寧德時代超級科技日：六分鐘快充、鈉電 Q4 量產、凝聚態 1500km\n\n**原文**：彭博 / electrive.com / Digitimes ｜ **發布**：2026-04-22\n\n## 摘要\n寧德時代於北京車展前舉辦「超級科技日」，發表五大全新電池產品。最大亮點：**LFP 神行 III 六分鐘充電**（10%→98%）、**鈉新 II 進入 Q4 大規模量產**、**凝聚態電池 1500km 續航**。同步宣布 2026 年建設 3,000 座換電站計畫。\n\n## 五大新品\n\n| 產品 | 技術 | 亮點 |\n|------|------|------|\n| **神行 III**（Shenxing Gen 3）| LFP 超快充 | **6 分鐘** 10%→98%；**1 分鐘** 10%→35% |\n| **麒麟 III**（Qilin Gen 3）| NMC 高能量密度 | 單次充電續航 **1000 公里** |\n| **鈉新 II**（Naxin Gen 2）| 鈉離子電池 | 純電續航 **400~600 公里** |\n| **麒麟凝聚態**（Condensed）| 固態-凝聚態電解質 | 轎車 **1500 公里**；650kg 以下電池包 |\n| **驍遙超級增混 II** | EREV 超級混動 | 增程版（細節未公開）|\n\n> 超越比亞迪：比亞迪上月宣稱 9 分鐘充電，寧德時代神行 III 以 6 分鐘回應\n\n## 鈉電池量產里程碑\n\n- **時程**：2026 年 **Q4** 進入大規模量產\n- **技術突破**：解決控水、硬碳產氣、鋁箔黏接、自生成負極等量產瓶頸\n- **已落地車型**：廣汽埃安 UT、長安歐尚 520、解放 24V 蓄電池、江淮物流\n- **即將落地**：吉利星願、奇瑞 QQ3、一汽悅意 03\n- **潛力估計**：寧德時代預期鈉電池未來可取代 **30~40%** 現有電池市場\n\n## 充換電基礎建設\n- **2026 年目標**：建置 **3,000 座**換電站（擴張現有換電生態系）\n- **Choco-Swap #26**：新一代可換電池規格，支援 800V 高壓架構，75kWh（更大容量版本規劃中）\n- **超換一體站**：整合充電 + 換電，共用緊湊型變電站，降低能損 13 個百分點以上\n\n## 凝聚態電池（Condensed Battery）技術\n- 以「凝聚態電解質」取代液態電解質 → 消除漏液與燃燒風險\n- 源自電動航空計畫（500 Wh/kg，已在 4 噸飛機完成驗證，8 噸飛機進行中）\n- 採用自適應微尺度網狀結構\n\n## 鈉電池產業鏈重構分析（Digitimes 評析）\n- **核心論點**：鈉電池真正價值在於「可預期」——資源廣布、不受壟斷\n- **分工格局**：非「全面替代」而是「分工並行」\n  - 高階 EV → 繼續鋰電（NMC）\n  - 儲能、兩輪、商用、入門 EV → 鈉電切入\n- **材料轉型**：鋁箔取代部分銅箔、硬碳取代石墨負極、不同電解液\n- **觸媒因素**：AI 資料中心低密度大容量儲能需求 + 再生能源電網平衡\n- **2026 關鍵**：量產瓶頸突破 → 良率達標 → 規模擴張速度可能超預期\n\n## Related\n- [[entities/寧德時代]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/電池與技術/鈉離子電池]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/china-sodium-battery-2026]]"

    "cellcentric-bza375-toyota-join": {
      "title": "Cellcentric BZA375 燃料電池系統開放驗證，豐田加入成第三股東",
      "url": "https://www.electrive.com/2026/04/21/cellcentric-releases-new-fuel-cell-system-for-customer-validation",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.electrive.com/2026/04/21/cellcentric-releases-new-fuel-cell-system-for-customer-validation](https://www.electrive.com/2026/04/21/cellcentric-releases-new-fuel-cell-system-for-customer-validation)\n\n# Cellcentric BZA375 燃料電池系統開放驗證，豐田加入成第三股東\n\n**原文**：electrive.com（Cora Werwitzke）｜ **發布**：2026-04-21\n\n## 摘要\nCellcentric（戴姆勒卡車 × Volvo 合資燃料電池廠）推出次代系統 **BZA375**，已在德國 Esslingen 開始原型量產，開放車廠客戶驗證。同時確認**豐田將加入成為與戴姆勒卡車、Volvo 並列的第三個平等股東**。\n\n## BZA375 系統規格\n\n| 項目 | 說明 |\n|------|------|\n| 型號 | BZA375（前代：BZA150）|\n| 設計目標 | 長途重型卡車（Class 8 / 重型 HGV）|\n| 改進 | 體積更小、功率更大、效率更高 |\n| 原型產線 | **Esslingen，德國**（已啟動）|\n| 大規模量產 | **本世紀末**（2029 年以後）|\n| 現階段 | 大量成熟原型系統供客戶驗證與初期車隊應用 |\n\n## 豐田加入 Cellcentric\n\n- 豐田以**平等股東**身份加入（與戴姆勒卡車、Volvo Group 三方平等）\n- 目標：打造世界領先的重型商用車燃料電池系統\n- Cellcentric 2021 年成立，正在 Weilheim an der Teck（德國）建設大型量產廠\n\n## 重要注意：戴姆勒卡車延後計畫\n- 戴姆勒卡車 GenH2 Truck 已在客戶試驗中\n- 但戴姆勒**將燃料電池重卡量產計畫從本世紀末延至 2030 年代**\n- Cellcentric 需相應調整計畫\n\n## Related\n- [[entities/豐田]]\n- [[concepts/電池與技術/氫燃料電池商用車]]\n- [[sources/toyota-daimler-volvo-hydrogen-truck]]\n- [[sources/isuzu-hydrogen-truck-delay]]"

    "chaevi-kosdaq-ipo": {
      "title": "韓國充電供應商 Chaevi 登陸 KOSDAQ：目標募資 €6,400 萬，首家上市充電廠",
      "url": "https://www.electrive.com/2026/04/21/korean-charging-provider-chaevi-goes-public",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.electrive.com/2026/04/21/korean-charging-provider-chaevi-goes-public](https://www.electrive.com/2026/04/21/korean-charging-provider-chaevi-goes-public)\n\n# 韓國充電供應商 Chaevi 登陸 KOSDAQ：目標募資 €6,400 萬，首家上市充電廠\n\n**原文**：electrive.com（Florian Treiss）｜ **發布**：2026-04-21\n\n## 摘要\n南韓最大充電服務業者 Chaevi 預計 **2026 年 4 月 30 日** 在 KOSDAQ 上市，目標募資約 **€6,400 萬**，成為南韓首家 IPO 的 EV 充電基礎設施業者。Porsche 為重要合作夥伴，業務已擴展至美國 13 州。\n\n## Chaevi 基本資料\n\n| 項目 | 內容 |\n|------|------|\n| 總部 | 大邱（韓國）|\n| 自有直流快充 | 約 **6,000 個** |\n| 含代管充電點 | 約 **10,000 個 DC 快充**（全韓最大）|\n| 業務範圍 | 硬體製造 + 軟體開發 + 安裝 + 網路運營（全棧垂直整合）|\n| 海外市場 | **美國 13 州**（已有業務）|\n| 重要夥伴 | **Porsche**（高端充電服務合作）|\n\n## IPO 細節\n\n| 項目 | 數值 |\n|------|------|\n| 上市交易所 | KOSDAQ（首爾科技交易所）|\n| 上市日期 | **2026 年 4 月 30 日** |\n| 發行股數 | 1,000 萬股（初級股）|\n| 發行價區間 | **12,300~15,300 韓元/股** |\n| 目標募資金額 | 約 **€6,400 萬** |\n| 承銷商 | KB 證券 + 三星證券 |\n\n- **南韓首家** EV 充電基礎設施公司 IPO\n\n## 意義\n- 充電基礎設施進入資本市場，顯示商業模式已成熟到足以公開融資\n- 垂直整合全棧模式（硬體 + 軟體 + 運營）可能是 IPO 溢價的來源\n\n## Related\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/地理市場/東南亞EV市場]]"

      "updated": "2026-05-26",
      "body": "# 奇瑞 × Autobacs：EMTA 品牌攻日本輕型 EV 市場（2027）\n\n**來源**：[DIGITIMES](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=756822)，2026-06-01（事件：2026-05-27 正式宣布）\n\n---\n\n## 核心事件\n\n- **2026-05-27**：奇瑞汽車 × Autobacs Seven（日本最大汽車用品連鎖）成立合資企業 **EMT（Electric Mobility Technology）**\n- 品牌名稱：**EMTA**\n- 目標：**2027 年初**在日本推出電動車，補助後售價與同級燃油車相當\n\n---\n\n## 產品計畫\n\n| 項目 | 內容 |\n|------|------|\n| 首波車款 | **4 款電動車** |\n| 主力 | **輕型純電動車（BEV）**，對標 660cc 燃油車級距 |\n| 目標售價 | ~**200 萬日圓**（補助後）|\n| 生產地 | 初期中國製造 → **2030 年目標轉日本在地生產** |\n\n---\n\n## 日本輕型 BEV 競爭格局（2026–2027）\n\n| 品牌 | 車型 | 售價（萬日圓）| 續航 |\n|------|------|--------------|------|\n| 日產 | Sakura | ~250 | 180 km |\n| 本田 | N-ONE e: | ~270 | 295 km |\n| 比亞迪 | Racco（2026 夏）| 200~250 | 目標比 Sakura 低 |\n| **EMTA（奇瑞）** | TBD（2027）| ~200（補助後）| TBD |\n| 鈴木 | 未命名（2026+）| TBD | ~270 km |\n\n→ **5 廠競爭局面**，中國品牌藉輕型 EV 突破日本市場防線\n\n---\n\n## 戰略意義\n\n- **Autobacs Seven**：全日本 700+ 門市，是 EMTA 的通路護城河\n- 奇瑞選擇「繞過傳統汽車經銷商」，以汽車用品連鎖切入 → 降低准入壁壘\n- 比 BYD 更激進的在地化承諾（2030 年日本製造）\n- 日本軽自動車（K-Car）市場是**全球最難打入的利基市場**，成功將具示範效應\n\n---\n\n## Related\n- [[concepts/中國EV出海策略]]\n- [[entities/奇瑞]]\n- [[sources/nissan-sakura-japan-kei-ev]]\n- [[sources/china-k-car-micro-ev-concept-2026]]"

    "china-auto-trinity-competition-2026": {
      "title": "中國汽車「三位一體」競爭：摩根大通北京車展分析（2026-05-04）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753985&grid_seq1=&grid_seq2=",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753985&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753985&grid_seq1=&grid_seq2=)\n\n# 中國汽車「三位一體」競爭：摩根大通北京車展分析（2026-05-04）\n\n**原文**：Digitimes（黃女瑛）/ J.P. Morgan｜**發布**：2026-05-04\n\n## 摘要\n摩根大通針對 2026 北京車展發布研究報告，指出中國汽車市場正以「規模 × 速度 × 全球化」三位一體策略爭奪全球技術規格主導權，並催生「一次性汽車」商業模式。\n\n## 三位一體戰略\n\n| 維度 | 內容 |\n|------|------|\n| **規模** | 龐大內需市場驅動量產成本競爭 |\n| **速度** | 高頻迭代——極速快充、智慧動力、具身 AI 快速從選配變標配 |\n| **全球化** | 出口加速，帶動供應鏈合規（功能安全、網路安全）升級 |\n\n## 技術標準化趨勢\n\n以下技術在中國已從「高階選配」轉為「基本配備」：\n- 極速快充（10 分鐘以上補能）\n- 智慧動力系統（含 AI 能量管理）\n- 具身智慧（Embodied AI）整合\n\n**關鍵指標**：向 L3 自駕邁進的速度 = 衡量中系車廠競爭力核心\n\n## 一次性汽車（Disposable Car）模式\n\n- 高度競爭 + 成本壓力 → 車廠採用快速研發 + 低成本控管\n- 填補二手車與回收體系尚未完善的市場缺口\n- 消費者期待：高科技體驗 + 合理價格\n\n## 受益供應商\n\n| 類型 | 代表廠商 | 受益機會 |\n|------|---------|---------|\n| 歐美半導體 | **NXP** | 中國出口加速合規需求 |\n| 中國本土計算 | **地平線（Horizon Robotics）**、**黑芝麻智能** | 軟硬體整合 + 靈活訂價，影響力延伸機器人/工業 |\n\n## 競爭特徵轉變\n\n- 差異化轉向：技術落地**效率** + **價格策略** + **迭代速度**（硬體趨同後）\n- 開發模式：單一車型 → 可擴展（Scalable）**平台**模式\n- 銷售模式：被動等客 → 主動導流（直播 + 社群媒體）\n\n## Related\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/電池與技術/ADAS智駕系統]]"

    "china-autonomous-driving-overseas": {
      "title": "中國自駕業者轉向海外：新加坡、中東成 L4 商轉試驗場",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751508",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751508](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751508)\n\n# 中國自駕業者轉向海外：新加坡、中東成 L4 商轉試驗場\n\n**原文**：DIGITIMES／江仁傑｜**發布**：2026-04-10\n\n## 摘要\n受限於中國國內法規瓶頸，文遠知行、百度、小馬智行等中國自駕企業加速向東南亞與中東擴張測試與商轉據點。\n\n## 中國國內限制\n- 僅北京、廣州等少數城市特定區域獲准 L4 實驗性商轉\n- 現行法律無法明確界定車主、車廠、系統開發商的事故責任歸屬\n- 2026 年全國人大：業界代表提議修改交通與保險法律\n\n## 海外擴張動態\n\n| 業者 | 地點 | 動態 |\n|------|------|------|\n| 文遠知行（WeRide）| 新加坡 | 2026-04-01 與 Grab 聯盟啟動自駕接駁車實驗（往返車站↔住宅區，配備隨車人員） |\n| 文遠知行 | 新加坡 | 2025-08 獲 Grab 戰略投資，確立東南亞擴展方向 |\n| 百度 | 阿聯酋（UAE）| 2026-01 宣布與 UAE 企業合作開啟自動駕駛營運 |\n| 小馬智行 | 杜拜 | 計劃無人計程車業務（因地緣衝突暫停，待最終批准）|\n\n## 為何選擇新加坡？\n文遠知行 CEO 韓旭：「新加坡已成為全球自動駕駛商業化最理想的環境」\n- 法律制度完善\n- 城市規模適中、基礎建設齊全\n\n## Related\n- [[entities/文遠知行]]\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/地理市場/中國EV出海策略]]"

      "title": "中國收緊鋰電池技術輸出：信實工業轉向直購 CATL 組件（2026-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755837",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755837](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755837)\n\n# 中國收緊鋰電池技術輸出：信實工業轉向直購 CATL 組件（2026-05）\n\n**原文**：Bloomberg / Digitimes｜**發布**：2026-05-21\n\n## 核心事件\n\n中國近期**加強對電池技術轉移的管制態度**，導致印度信實工業（Reliance Industries）無法取得鋰電池生產技術，被迫轉向直接採購中國製成品。\n\n## 信實工業時間線\n\n| 時間 | 事件 |\n|------|------|\n| 早期 | 與寧德時代（CATL）洽談技術轉移協議 |\n| 談判結果 | **破裂**（中方不願轉移核心技術）|\n| 轉向 | 改與廈門**海辰儲能**合作，作為主要 BESS 夥伴 |\n| 近況 | 與海辰合作不順 → 再次接觸 CATL，但這次**不要技術，只採購產品** |\n| 工廠地點 | 印度古吉拉特邦（Gujarat）|\n\n## 中國技術封鎖的更大背景\n\n- 中國正收緊電池技術出口管制（技術轉移紅線）\n- 印度 Tata Agratas + JSW Motors 已合計投入 **>$10 億**建立本土電池 R&D（Batch 17 已收錄）\n- 阿達尼（Adani）集團董事長 2025 年親赴 CATL 中國總部參觀自動化儲能產線\n- 寧德時代在德、匈、西班牙建廠，透過 Ford、Tesla 授權規避美國市場障礙\n\n## 戰略意涵\n\n1. **印度夢想本土化電池生產**，但中國封鎖技術轉移 → 印度仍依賴中國電池成品\n2. 信實轉向「直購組件組裝」是務實妥協，但放棄了 IP 自主性\n3. CATL 的策略：不輸出技術（保持壁壘），但樂於輸出成品（創造收入）\n\n## Related\n- [[entities/寧德時代]]\n- [[concepts/電池技術路線]]\n- [[concepts/印度EV市場]]\n- [[sources/india-tata-jsw-battery-rd-2026]]"

    "china-ev-europe-challenges-2026": {
      "title": "中國車廠進軍歐洲的現實考驗：售後服務與殘值才是關鍵（2026-05-10）",
      "url": "https://news.cnyes.com/news/id/6452125",
      "updated": "2026-05-10",
      "body": "**來源**：[https://news.cnyes.com/news/id/6452125](https://news.cnyes.com/news/id/6452125)\n\n# 中國車廠進軍歐洲的現實考驗：售後服務與殘值才是關鍵（2026-05-10）\n\n**原文**：優分析 Uanalyze / 鉅亨網｜**發布**：2026-05-10\n\n## 摘要\n以波蘭為例，分析中國 EV 品牌進軍歐洲的核心挑戰：不只是「賣便宜的車」，而是需要建立售後服務網、零件供應、品牌信任與租賃殘值支撐，才能打入關鍵的企業車隊市場（占市場 67.7%）。\n\n## 波蘭市場案例\n\n| 指標 | 數值（2024）|\n|------|------------|\n| 新車掛牌量 | **649,000 輛**（+12.5% YoY）|\n| 車隊銷售比重 | **67.7%**（358,650 輛）|\n| 個人消費比重 | **32.3%** |\n| 最暢銷品牌 | **Toyota 103,834 輛**（第 2 名 Skoda 60,136 輛）|\n| 最暢銷車款 | **Toyota Corolla 29,487 輛**（唯一超 2 萬輛）|\n| 2024 BEV+PHEV 保有量 | **超過 141,400 輛** |\n| 進口中古車 | **880,300 輛**（2024）|\n\n## 中國品牌面臨的結構性挑戰\n\n1. **企業車隊邏輯不同於個人消費者**\n   - 個人：重視價格、配備、外觀\n   - 車隊：重視維修效率、零件供應、**二手車殘值**、品牌長期經營承諾\n   \n2. **維修網路缺失**\n   - 波蘭 43.9% 車輛車齡超 20 年，維修體系極度重要\n   - 中國品牌若無法快速建立在地維修網，價格優勢難以轉化\n\n3. **殘值壓力**\n   - 租賃/車隊採購必須估算殘值，中國品牌二手市場接受度低 → 採購意願下降\n\n4. **初期快速成長後的成長停滯**\n   - 這是中國品牌海外擴張普遍規律：初期靠低價快速打開能見度，但在某個規模後成長放緩\n\n## 中國品牌的機會\n\n- 波蘭 BEV+PHEV 市場仍在早期成長階段\n- 若能結合：**價格 + EV 產品線 + 融資租賃方案 + 企業車隊通路** → 有機會切入\n\n## Related\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/歐洲EV市場]]"
    },

      "title": "中國接管歐洲閒置工廠：FT 報導 + 比亞迪/奇瑞/吉利搶進",
      "url": "https://www.chinatimes.com/realtimenews/20260524002509-260409",
      "updated": "2026-05-25",
      "body": "**來源**：[https://www.chinatimes.com/realtimenews/20260524002509-260409](https://www.chinatimes.com/realtimenews/20260524002509-260409)\n\n# 中國接管歐洲閒置工廠：FT 報導 + 比亞迪/奇瑞/吉利搶進\n\n**原文**：FT（引述中新網）+ 中時新聞網，2026-05-23~24\n\n## 摘要\n\n英國《金融時報》和《每日電訊報》先後報導：全球車廠紛紛將中國工廠作為技術先進、成本低廉的全球生產基地；歐洲車廠則因產能過剩、競爭失利，開始開放閒置廠房給中國競爭對手。\n\n## 中國工廠成全球 EV 製造基地（FT 數據）\n\n| 指標 | 數值 |\n|------|------|\n| 2026 年前 4 月 NEV 占中國汽車出口比例 | **44%** |\n| 五年前（2021 年）同指標 | **7%**（主要出口燃油車）|\n| 外資車廠占中國對歐出口份額（含合資）| **~40%**（荣鼎集团數據）|\n\n**匯豐銀行分析師**：「中國正扮演越來越重要的角色，不僅是成本優勢的生產中心，更重要的是技術領先地位和龐大供應鏈優勢。」\n\n**VW 中國負責人 Robert Cisek**（北京車展）：「必須承認，中國在許多行業的創新步伐上都處於領先地位。」\n\n## 歐洲閒置工廠易主：具體案例\n\n| 歐洲車廠 | 工廠 | 中國接手方 | 狀態 |\n|---------|------|-----------|------|\n| **Stellantis** | 西班牙薩拉戈薩廠 | **零跑汽車** | 確認合作（5/8 宣布）|\n| **Stellantis** | 法國 Rennes 廠 | **東風/嵐圖（Voyah）** | 51:49 合資確認 |\n| **日產** | 西班牙廠 | **奇瑞** | 計畫出售 |\n| **日產** | 英國桑德蘭廠 | **奇瑞** | 談判共享 |\n| **福特** | 西班牙廠（部分）| **吉利** | 計畫出售部分股份 |\n| **VW** | 歐洲廠（未指定）| **上汽、小鵬** | 考慮共享裝配線 |\n| **比亞迪** | 匈牙利自建廠 + 廣泛尋廠 | — | 「跟任何公司都在談」|\n\n## 歐洲車廠心態轉變\n\n從**恐懼抵制 → 關稅保護 → 無法競爭 → 開放合作**\n\n> 汽車顧問 Simon Vicca：「這實際上標誌著歐洲相當一大部分汽車製造所有權開始轉移給中國人。」\n\n> 「對歐洲車廠來說，實際上只有兩個選擇：轉而製造軍事裝備，或者找到其他需要汽車工廠的人——中國人是唯一的選擇。」\n\n**雙贏邏輯**（短期）：\n- 歐洲：避免昂貴的關廠和政治難以接受的裁員\n- 中國：規避關稅 + 利用歐洲更便宜的閒置產能\n\n## 歐盟 IAA 法案的弔詭\n\n歐盟《工業加速器法案》設置的壁壘（關稅、本地股份限制、技術轉讓、50% 本地員工），**反而加速**了中國車廠與歐洲車廠合作使用歐洲工廠——因為在歐洲生產才能規避這些限制。\n\n## Related\n- [[concepts/中國EV出海策略]]\n- [[concepts/歐洲EV市場]]\n- [[entities/比亞迪]]\n- [[entities/吉利汽車]]\n- [[entities/Stellantis]]\n- [[sources/stellantis-china-ev-europe-factories-2026]]\n- [[sources/stellantis-fastlane-2030]]"

    "china-ev-export-record-march-2026": {
      "title": "中國 2026 年 3 月 EV 出口 34.9 萬輛：能源危機催動歷史新高",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751832",
      "updated": "2026-04-13",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751832](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751832)\n\n# 中國 2026 年 3 月 EV 出口 34.9 萬輛：能源危機催動歷史新高\n\n**原文**：DIGITIMES／楊智家｜**發布**：2026-04-13\n\n## 摘要\n伊朗戰爭引發全球能源衝擊，中國乘用車 2026 年 3 月 BEV+PHEV 海外出貨量年增 **140%**，達 **34.9 萬輛**，創歷史新高；比亞迪佔出口總量約 1/3，吉利、奇瑞分居出口前三。\n\n## 出口數據（來源：中國乘聯會，2026-04-09）\n| 指標 | 數值 |\n|------|------|\n| 2026 年 3 月出口量 | **34.9 萬輛**（+140% YoY）|\n| 比亞迪份額 | ~1/3 |\n| 出口前三名 | 比亞迪、吉利汽車、奇瑞汽車 |\n\n## 中國國內市場（對比）\n| 指標 | 數值 |\n|------|------|\n| 3 月 EV+PHEV 總銷量 | 84.8 萬輛（-14%，連續第 3 個月下滑）|\n| 2026 Q1 | 自 2020 年以來首次 Q1 下降 |\n| Tesla 上海廠出口 | +9% YoY |\n| Tesla 中國本土銷量 | **-24%** |\n| 比亞迪中國本土銷量 | **-40%+** |\n\n## 國內銷量下滑原因\n- 「以舊換新」補貼政策收緊 → 小型廉價車銷量 -25%\n- 消費能力下降 + 廠商成本提高\n- 但 EV 表現仍優於 ICE（相對優勢）\n\n## 歷史類比\n乘聯會秘書長崔東樹：荷莫茲海峽危機對中國車廠的機遇，類似 1970 年代石油危機期間日本省油車征服全球市場的歷史轉折。\n\n## Related\n- [[concepts/地理市場/中國EV出海策略]]\n- [[entities/比亞迪]]\n- [[entities/奇瑞]]\n- [[concepts/地理市場/美國EV市場與政策]]"

      "title": "中國車市長期內捲：關鍵 30 家車廠主導格局",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751138",
      "updated": "2026-04-08",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751138](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751138)\n\n# 中國車市長期內捲：關鍵 30 家車廠主導格局\n\n**原文**：DIGITIMES｜**發布**：2026-04-07\n\n## 摘要\n中國汽車市場雖出現短期銷售波動（比亞迪 Q1 2026 滑落第四），但產業結構已形成約 30 家具主導力的「不死鳥」車廠，短期內不會退出市場，內捲態勢難解。\n\n## 2026 Q1 銷售異動\n- 前 2 月排名：Volkswagen、吉利、Toyota 回到前列；比亞迪滑落第四\n- 業界認為：此變動與短期補貼政策因素有關，非長期趨勢\n\n## 市場結構特徵\n- 約 30 家核心車廠具備實質市場影響力（Rhodium Group 分析）\n- 其中 20 家以上具備長期存活能力\n- 總體產能已超過市場需求\n- 外界認為約 150 家廠商的「大整併」恐難如預期發生\n\n## 內捲延續因素\n1. **地方政府支持**：地方政績考核與電動車補貼掛鉤，即使虧損也維持運作\n2. **融資能力強**：蔚來、小鵬等靠產品差異化獲資本市場支持\n3. **新政策效果未明**：「反內捲」政策細節不清，市場持觀望態度\n4. **AlixPartners 預測**：價格戰可能延續至 2027 年底\n\n## 對外資的衝擊\n外資「以時間換空間」策略失效，競爭對手退出速度低於預期，競爭態勢仍持續。\n\n## Related\n- [[entities/比亞迪]]\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[concepts/地理市場/中國EV出海策略]]"

    "china-ev-market-involution-2026": {
      "title": "中國車企迭代內捲：不拼價格拼發車速度（2026）",
      "url": "https://udn.com/news/story/7333/9465685",
      "updated": "2026-04-27",
      "body": "**來源**：[https://udn.com/news/story/7333/9465685](https://udn.com/news/story/7333/9465685)\n\n# 中國車企迭代內捲：不拼價格拼發車速度（2026）\n\n**原文**：經濟日報｜**發布**：2026-04-27\n\n## 摘要\n中國電動車競爭主軸已從「價格戰」延伸至「產品迭代速度戰」。2025 年推出逾 300 款新車，2026 年節奏更快，3 月單月就有 80+ 款新車/新技術發布，電動車開發周期壓縮至一年甚至更短，但結果是行業利潤率創新低，消費者信任受損。\n\n## 迭代速度量化數據\n\n| 時間 | 新車/技術發布量 |\n|------|----------------|\n| 2025 年全年 | **>300 款新車** |\n| 2026 年 3 月單月 | **>80 款**新車或新技術 |\n| 2026 北京車展期間 | 219 場發布會 / 181 款首發車型 / 展出 1,451 輛 |\n| 電動車開發周期 | 已壓縮至 **1 年或更短** |\n\n## 利潤崩潰\n\n| 年份/期間 | 行業利潤率 |\n|-----------|-----------|\n| 2025 年全年 | **4.1%**（十年新低）|\n| 2026 Q1 前兩個月 | **2.9%**（進一步惡化）|\n\n## 典型案例：極氪 001 的教訓\n\n- 超過一年內經歷 **三次大改款**\n- 售價從 30 萬元降至 26.9 萬元\n- 早期買家車輛迅速貶值 → 月銷量從 >1 萬輛跌至 ~2,000 輛\n- **結論**：快速迭代侵蝕消費者信任，買方進入觀望\n\n## 結構性困境\n\n中國電動車陷入矛盾循環：\n1. **為搶市占** → 加速推新車\n2. **快速迭代** → 壓縮研發資源 + 損耗品牌信任\n3. **消費者觀望** → 難以達成銷售目標\n4. **利潤惡化** → 更需要靠銷量彌補 → 回到第 1 步\n\n蔚來創始人李斌坦言：車企「面對迭代內捲別無選擇，每次新車更迭充滿兩難困境」。\n\n## Related\n- [[entities/比亞迪]]\n- [[entities/蔚來]]（待補）\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[sources/byd-q1-2026-earnings]]\n- [[sources/beijing-auto-show-2026]]"

      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752041",
      "updated": "2026-04-14",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752041](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752041)\n\n# 中國車市 Q1 2026：強者對決 + 能源危機推動海外需求\n\n**原文**：DIGITIMES／黃女瑛、Bloomberg｜**發布**：2026-04-14\n\n## 中國車市 Q1 2026 概況\n\n| 指標 | 數值 |\n|------|------|\n| 乘用車總銷量 | **422.6 萬輛（-17% YoY）** |\n| NEV 市占率 | 45.1%（↓ 自 2025 年 47.7%）|\n| BEV 銷量 | 萎縮 |\n| 中系品牌市占 | 62% |\n| 德系合資市占 | 16% |\n| 日系合資市占 | 13.3% |\n\n## 主要品牌表現\n\n| 品牌 | Q1 2026 中國表現 |\n|------|----------------|\n| VW（福斯）| Q1 銷量冠軍（險勝）|\n| 比亞迪 | Q1 **-40%+**（失去王座，3 月搶回）；3 月 -33% |\n| 賓士 | -27% |\n| 保時捷 | -21% |\n\n## 市場特徵\n- **殺價搶單持續**：內捲競爭延伸，外資合資廠市占與獲利均受衝擊\n- **強者對決**：能撼動車市者約 30 家（中系 + 外資合資），被淘汰者多已苟延殘喘\n- 比亞迪創辦人王傳福：政府防價格戰 + 補貼終結，體質弱的車廠正被加速清洗\n- 奇瑞 3 月在英國車市拿下銷售冠軍（海外灘頭堡）\n\n## 補貼政策衝擊\n- 中國政府削減 NEV 補貼 + 強化防傾銷監管 → 市場回歸商業邏輯\n- 比亞迪 2025 年利潤縮減 3 成，Q1 2026 受補貼退坡衝擊最深\n\n## 中東能源危機：儲能與 EV 海外需求爆發\n\n| 業者 | 受惠動態 |\n|------|---------|\n| 寧波德業（儲能）| Q1 利潤預計成長 **70%**，中國以外訂單激增 |\n| 比亞迪、吉利 | EV 出口受惠，3 月出口 34.9 萬輛（+140%）|\n\n- 荷莫茲海峽關閉 >6 週，歐洲+東南亞家戶與企業轉向電池儲能科技\n- 分析師警告：若戰爭曠日持久，全球經濟衰退仍可能抵銷正面效果\n- 北京政府已要求儲能業者控制產能，避免過度擴張\n\n## Related\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[entities/比亞迪]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]\n- [[sources/china-ev-export-record-march-2026]]"

      "title": "中國 EV 市場增速墜落：蔚來李斌示警全年銷量恐跌 15–20%",
      "url": "",
      "updated": "2026-06-16",
      "body": "**來源**：聯合新聞網 / 第一財經 / 每日經濟新聞（2026-06-16）\n\n# 中國 EV 市場增速墜落：蔚來李斌示警全年銷量恐跌 15–20%\n\n**事件日期**：2026-06-16\n\n## 核心警示\n\n蔚來創始人、董事長**李斌**公開表態：\n\n> 「全年（大陸汽車）國內零售量，我們認為和去年同比，要做好整個行業跌 **15%~20%** 的心理準備。」\n\n> 「大陸汽車產業自今年開始進入了決賽最殘酷的階段。」\n\n## 最新市場數據\n\n| 指標 | 數值 |\n|------|------|\n| 2026 年 1~5 月乘用車零售 | **709.9 萬輛**，YoY **-19.5%** |\n| 2026 年 5 月單月 | **151 萬輛**，YoY **-22.1%**，MoM +9.2% |\n| Q1 2026 整體汽車業利潤率 | **3.2%**（歷史新低）|\n\n## 結構性問題\n\n1. **價格戰邊際效應遞減**：連番降價但需求提振幅度持續縮小\n2. **銷量、營收、利潤率同步下滑**：「三殺」罕見局面\n3. **記憶體晶片成本暴漲**：20 → ~100 元人民幣/顆（近 5 倍）\n4. **碳酸鋰波動**：問界品牌平均一輛車成本增加 ¥1.5~2 萬\n5. **車用晶片生態不成熟**：單項能力強，但系統整合（生態）能力落後\n\n## 出海成為「唯一出路」\n\n廣汽集團執行委員吳堅：\n\n> 「當前中國汽車產業已到了不往外走不行的地步，要在國內走量、國外獲取利潤。」\n\n- 出口利潤約為國內 4 倍（即使歐盟有 30% 關稅）\n- 未來 5~10 年須推動「體系出海」：物流、人才、資金流、數據流全面出海\n\n## 行業共識：「至少五年調整期」\n\n- 智能電動汽車「增速快速收斂期」至少還要持續 5 年\n- 「能盈利就是萬幸」取代「做了就能掙錢」的舊思維\n- 過去補貼驅動的黃金時代已結束\n\n## Related\n- [[concepts/中國EV市場競爭格局]]\n- [[concepts/中國EV出海策略]]"
    },
    "china-ev-us-market-2026": {
      "title": "川習會後中國電動車進入美國：路透預測「不是會否，而是何時」",
      "url": "https://www.storm.mg/article/11130933",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.storm.mg/article/11130933](https://www.storm.mg/article/11130933)\n\n# 川習會後中國電動車進入美國：路透預測「不是會否，而是何時」\n\n**原文**：風傳媒 | 李忠謙｜**發布**：2026-05-12\n**事件**：2026-05-14 川習會，北京，歷時 2 小時 15 分鐘\n\n## 核心論點（路透 Katrina Hamlin）\n\n> 「包括比亞迪、奇瑞及其他中國汽車終將進入美國市場——這不是會不會發生的問題，而是**何時以及如何發生**的問題。」\n\n## 中國車廠美國滲透現況\n\n儘管有三位數關稅，中國品牌已透過多種方式滲透美國市場：\n- 在美境內擁有 **60+ 供應商**、約 **500 家公司股份**\n- 超過 **100 家**中國汽車/科技/零件供應商在美有業務\n- 吉利透過 Lotus、Volvo 收購，以及為 Waymo 供應極氪車款\n- 德州艾爾帕索、加州聖地牙哥等邊境城市，從墨西哥購入比亞迪已普見\n\n## 美國消費者態度\n\n- Cox Automotive 調查：**近 40% 美國消費者**非常有可能考慮購買中國品牌\n- 美國新車均價超 $50,000（十年前 $36,000）；中國品牌提供 **<$12,000** 選擇\n- Ford CEO 吉姆·法利花 6 個月試駕小米 SU7，「不想歸還」\n\n## 三條可能路徑\n\n1. **削減進口關稅**（當前三位數稅率有充裕調降空間）\n2. **在美本土製造**（比亞迪加州電動巴士廠：成本比美國替代品低 30%，70% 零件來自美國）\n3. **技術授權**（Ford × CATL 電池授權，目標售價 <$30,000 平價 EV）\n\n## 政治阻力\n\n- 美國全國汽車經銷商協會等五大貿易團體強烈反對\n- 眾議院 2026-05-11 提跨黨派議案，禁絕中國產汽車\n\n## 中國車廠動向\n\n- 小鵬聯席總裁顧宏地：「美國絕對是必須關注的地方」\n- 比亞迪執行副總裁李柯（Stella Li）表達進入意願\n- AlixPartners：中國車廠目標 2030 年海外產量提高近三倍\n\n## Related\n- [[concepts/地理市場/北美EV關稅與政策]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[entities/比亞迪]]\n- [[sources/ford-catl-michigan-factory-2026]]\n- [[sources/china-evs-canada-chery-geely-2026]]"
    },
    "china-evs-canada-chery-geely-2026": {
      "title": "中國製 EV 首批登陸加拿大：奇瑞、吉利領跑（2026-05）",
      "url": "https://insideevs.com/news/795438/first-chinese-evs-canada-deliveries",
      "updated": "2026-05-13",
      "body": "**來源**：[https://insideevs.com/news/795438/first-chinese-evs-canada-deliveries](https://insideevs.com/news/795438/first-chinese-evs-canada-deliveries)\n\n# 中國製 EV 首批登陸加拿大：奇瑞、吉利領跑（2026-05）\n\n**原文**：InsideEVs | Iulian Dnistran｜**發布**：2026-05-11\n\n## 核心事件\n\n加拿大 2026 年 1 月將中國製 EV 進口關稅從 **100% 降至 6.1%**（49,000 輛/年配額），奇瑞與吉利/Lotus 是首批實際交付的中國品牌。\n\n## 奇瑞（Chery）進入加拿大\n\n| 項目 | 細節 |\n|------|------|\n| 首批出貨量 | ~150 輛（認證與試駕用途）|\n| 車型 | Jaecoo J5、Omoda 9 PHEV SUV、Exelantis ES 轎車 |\n| 近期計畫 | 3 個月內再出貨 ~1,000 輛 |\n| 經銷點 | 首批 10 個，6 月底前開業 |\n\n- 車輛目前仍以車廠牌（manufacturer plates）行駛，部分車輛品牌貼紙被膠帶遮蓋\n- 首批車輛定位為測試和認證用途，**尚未正式對消費者銷售**\n\n## 吉利 / Lotus 進入加拿大\n\n| 項目 | 細節 |\n|------|------|\n| 首批車型 | **Lotus Eletre**（高端純電 SUV）|\n| 首批數量 | **18 輛** |\n| 認證狀態 | 已通過加拿大機動車安全標準（CMVSS）|\n| 經銷網絡 | 6 家特許經銷商（3 月開業），年底前再增 6 家 |\n| 降價幅度 | 關稅調降後，Eletre 加拿大售價下降約 **50%** |\n\n- 吉利宣稱為首家在新貿易框架下出口車輛至加拿大的中國車廠\n\n## 配額時程\n\n| 年度 | 配額上限 |\n|------|---------|\n| 2026 | **49,000 輛/年** |\n| 2030 | **70,000 輛/年**（逐步放寬）|\n\n配額與協議掛鉤，按進度逐年擴大。\n\n## Tesla 上海工廠切換（2026-05 確認）\n\nDigitimes（2026-05-13）報導：Tesla 加拿大 Model 3 長程版售價大幅下調至 **CAD $39,500**，此前一直以加州 Fremont 製造交付。此降幅與切換至上海工廠成本結構高度吻合，業界普遍認定為 Tesla **確認將加拿大 Model 3 供貨來源改為上海廠**，藉此佔用 6.1% 優惠配額，規避特朗普關稅衝擊。\n\n- Tesla 是美國車廠但在中國生產——此舉顯示低關稅配額具跨品牌吸引力\n- 加拿大 6.1% 配額為**全球唯一**對中國製 EV 給予大幅優惠的主要市場\n\n## 戰略意義\n\n- 49,000 輛/年（2026）、70,000 輛/年（2030）配額有限，初期先到先得，大廠優先卡位\n- 尚未入場的 BYD 也在研究加拿大市場（工廠設廠 + 20 家經銷商計畫）\n- 加拿大政策制度目前是**三明治格局**：中國 6.1% vs 美國仍 100%，加拿大成為中國 EV 進入北美的橋頭堡\n- 上海製車輛**不符合**加拿大 $5,000 EVAP 政府補貼（需 FTA 資格）\n\n## Related\n- [[concepts/地理市場/北美EV關稅與政策]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[sources/tesla-canada-model3-2026]]\n- [[entities/比亞迪]]"
    },
    "china-heavy-truck-nev-plan-2030": {
      "title": "中國重型新能源貨車 2030 國家路線圖",
      "url": "",
      "updated": "2026-06-16",
      "body": "**來源**：electrive（2026-06-15）\n\n# 中國重型新能源貨車 2030 國家路線圖\n\n**事件日期**：2026-06-15｜**發布機構**：中國十一個政府部門聯合聲明\n\n## 2030 年目標\n\n| 目標 | 數值 |\n|------|------|\n| 12 噸以上重型貨車 NEV 新登記比例 | **40%** |\n| 總電動重型貨車保有量 | **160 萬輛**（約占車隊 20%）|\n| 高速公路貨運 NEV 比例 | **18%** |\n\n## 基礎建設計畫\n\n- 推動建設約 **3,000 座充電及換電站**\n- **30,000 公里零碳貨運走廊**（高速公路主要幹線）\n- 新建或改建高速服務區須預留充電設施空間\n\n## 重點地區特別規定\n\n- **京津冀地區 + 汾渭平原**：固定線路短途電動化比例達 **80%**\n- 採用專屬法規加速高污染區域電動化\n\n## 市場推動機制\n\n- 整合購車與充電基建補貼資金\n- 地方政府可透過專項債券與「綠色貸款」融資\n- 推廣**車電分離**（Battery as a Service）商業模式\n- 建立電池租賃體系\n\n## 現況基準（對比）\n\n| 市場 | 2025 年重型 NEV 貨車銷量 | 市場佔比 |\n|------|---------------------|--------|\n| **中國** | **231,100 輛**（YoY +182%）| **29%** |\n| 歐洲 | 6,372 輛（>16 噸外部可充電）| **2%** |\n\n> 中國 2025 年 12 月 NEV 重卡市占曾達 54%（補貼退場前搶購效應），2026 年初回落後正在建立長期政策支撐。\n\n## 戰略意義\n\n- 中國將重型貨運電動化定為國家戰略層級（非僅補貼）\n- 11 個部門聯合表態 → 跨部委協調力度為前所未有\n- 與歐洲（ZEV 法規 2030 年 100% 零排放新重卡目標）形成全球重卡電動化雙引擎\n\n## Related\n- [[concepts/電動卡車市場]]\n- [[concepts/中國EV市場競爭格局]]"
    },
    "china-k-car-micro-ev-concept-2026": {
      "title": "中國擬仿效日本 K-Car：建立平價微型電動車標準生態系（2026-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755638",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755638](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755638)\n\n# 中國擬仿效日本 K-Car：建立平價微型電動車標準生態系（2026-05）\n\n**原文**：Digitimes | 徐畇融｜**發布**：2026-05-20\n\n## 核心提議\n\n中國乘用車市場信息聯席會（CPCA）秘書長**崔東樹**提議，仿效日本**輕型汽車（K-Car）**制度，建立標準化平價微型 EV 生態系，合法服務老年與農村市場，並開拓海外新興市場。\n\n## 問題背景\n\n| 問題 | 細節 |\n|------|------|\n| 電動車市占 | 中國 EV 突破 60%，但低階市場萎縮是復甦瓶頸 |\n| 「老頭樂」問題 | 數百萬輛廉價、無安全氣囊的低速電動車橫行農村 |\n| 老頭樂事故 | 2012~2016 年：83 萬起事故，約 1.8 萬人死亡 |\n| 北京禁令 | 2024 年起全面禁止老頭樂上路（但需求未消失）|\n\n## K-Car 模式提議\n\n| 項目 | 建議規範 |\n|------|---------|\n| 車身尺寸限制 | 參考日本 K-Car 標準 |\n| 馬力上限 | 設定上限 |\n| 最低續航 | 設定下限 |\n| 駕照 | 設立**專屬 C7 駕照**，簡化考試流程 |\n\n## 已有類似產品的廠商\n比亞迪、一汽奔騰、豐田等廠商已有符合條件的產品，深受消費者青睞。\n\n## 出海潛力\n\n崔東樹主張，統一的平價微型 EV 規格可打入：\n- **東南亞**（廉價小型車為主流）\n- **印度**（類似市場結構）\n- 目標售價：**$5,000–$15,000**\n\n## 市場意義\n\n此提議指向中國汽車市場內部的「價格真空地帶」——高端 EV 競爭白熱化，但未受監管的低端市場需要政策引導，正規化後也可成為出海引擎。\n\n## Related\n- [[concepts/中國EV市場競爭格局]]\n- [[concepts/東南亞EV市場]]\n- [[concepts/印度EV市場]]"
    },

      "url": "https://www.electrive.com/2026/05/11/chinese-ev-sales-recover-as-exports-surge",
      "updated": "2026-05-12",
      "body": "**來源**：[https://www.electrive.com/2026/05/11/chinese-ev-sales-recover-as-exports-surge](https://www.electrive.com/2026/05/11/chinese-ev-sales-recover-as-exports-surge)\n\n# 中國 NEV 4月銷售回升，出口創新高（2026-05）\n\n**原文**：electrive | Cora Werwitzke｜**發布**：2026-05-11\n\n## 核心數據\n\n| 指標 | 2026 年 4 月 | YoY | MoM |\n|------|-------------|-----|-----|\n| NEV 批發（含出口） | **134.4 萬輛** | +9.7% | +7.4% |\n| 其中 BEV | 90.5 萬輛 | +10.2% | +8.9% |\n| 其中 PHEV | 43.9 萬輛 | +8.8% | +4.3% |\n| NEV 市場佔比 | **53.2%**（3 月為 43.2%）| — | +10pp |\n| 國內銷售 | **91.4 萬輛** | **-10.8%** | +3.7% |\n| **出口** | **43 萬輛** | **+110%** | +16% |\n\n- 2026 年首次 NEV 批發量 YoY 轉正\n- NEV 出口 43 萬輛：**史上單月最高**（2025 年 11 月才首次突破 30 萬輛）\n\n## 出口 vs 國內結構變化\n\n| 時間 | 出口量 | 出口佔比 |\n|------|-------|---------|\n| 2025 年 4 月 | ~20 萬輛 | ~20% |\n| **2026 年 4 月** | **43 萬輛** | **~32%** |\n\n→ 國內持續疲軟（連 4 個月低於 2025 同期），出口強力補位\n\n## 出口拆分\n\n| 車型 | 出口量 | YoY |\n|------|-------|-----|\n| BEV | 26 萬輛 | +85.4% |\n| PHEV | 17 萬輛 | +180% |\n\n## 背景分析\n\n- 國內需求疲軟原因：2025/2026 年初 NEV 補貼相繼退場\n- 中東、東南亞、中南美等市場快速放量，即使歐美加徵高關稅，整體出口仍創高\n- 全車市：4 月批發 252.6 萬輛（YoY -2.5%），但出口 90.1 萬輛（+74.4%）\n\n## Related\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[sources/byd-april-exports-q1-2026]]\n- [[sources/china-ev-export-record-march-2026]]"

    "china-nev-april-involution-2026": {
      "title": "中國 4 月 NEV 創紀錄背後：內捲、外銷、外資失守（2026-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755054",
      "updated": "2026-05-13",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755054](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755054)\n\n# 中國 4 月 NEV 創紀錄背後：內捲、外銷、外資失守（2026-05）\n\n**原文**：Digitimes | 黃女瑛｜**發布**：2026-05-13\n\n## 四項同步創紀錄（2026 年 4 月）\n\n| 指標 | 數值 |\n|------|------|\n| NEV 新車銷售佔比 | **首次突破 60%** |\n| NEV 出口佔 NEV 批發比重 | **首次超過 50%** 說明：出口 43 萬 / 批發 134 萬 |\n| 自主品牌在零售市場占比 | **約 70%** |\n| 整體零售 YoY | **-21.6%**（連 7 個月下滑）|\n\n## 利潤結構：內捲下的生死局\n\n| 指標 | 數值 |\n|------|------|\n| 中國車廠平均利潤率 | **3.2%**（低於經銷商、維修等下游約 6%）|\n| 車廠單車淨利（中國市場）| 約人民幣 **5,000 元** |\n| 車廠單車淨利（海外市場）| 約人民幣 **20,000 元**（**4 倍**於國內）|\n\n→ 出口是逃離內捲壓力、保護利潤的主要出路\n\n## 外資車廠的結構性困境\n\n- 德系三巨頭（VW、賓士、BMW）曾加碼投資中國，如今市占持續流失\n- 德日合資車廠在中國僅剩 **13.3%** 市占，且仍繼續下滑\n- 轉型策略：「在中國、為中國、為全球」（In China, For China, For the World）\n  - 釋出研發主導權給中國合作夥伴\n  - 深化與中國供應鏈整合\n\n## 歐洲本地化新動態\n\n- **Ford 西班牙廠**：傳聞可能與吉利合作，甚至出現「吉利製造、Ford 貼牌」模式\n- **吉利 × 雷諾 Brazil**：吉利取得巴西工廠 26.5% 股份，共享產能與銷售通路\n- **VW 減產 100 萬輛**後閒置產能可能供中國品牌代工\n- **Stellantis × 零跑**：廠房 + 通路 + 品牌資源授權，加速歐洲滲透\n\n## Morgan Stanley 預測\n\n- 2026 年中國境內汽車銷量將持續下滑\n- 中國乘聯分會（CPCA）建議：發展規格化低價小型電動車（參考日本 K-Car 模式），開拓農村與高齡市場\n\n## Related\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/china-nev-april-2026]]\n- [[sources/china-ev-market-involution-2026]]"

    "china-nev-price-hike-may2026": {
      "title": "中國 15 家 NEV 車企漲價：碳酸鋰 + 晶片雙重成本衝擊（2026-05）",
      "url": "https://udn.com/news/story/7333/9505891",
      "updated": "2026-05-16",
      "body": "**來源**：[https://udn.com/news/story/7333/9505891](https://udn.com/news/story/7333/9505891)\n\n# 中國 15 家 NEV 車企漲價：碳酸鋰 + 晶片雙重成本衝擊（2026-05）\n\n**原文**：聯合新聞網（轉引自界面新聞）｜**發布**：2026-05-16\n\n## 核心事件\n\n2026 年 5 月，中國超過 **15 家新能源車企**宣布漲價，包括比亞迪、Tesla、小米等主要品牌。這標誌著長達兩年多的「內捲降價週期」出現逆轉跡象。\n\n## 成本驅動因素\n\n### 電池材料（最大因素）\n- 動力電池成本佔新能源車總成本 **30–50%**\n- 電池級碳酸鋰現貨：從 2025 年 7 月 **人民幣 7.5 萬/噸**持續上漲\n- 與油價相關：中東戰事推升能源成本，間接抬高鋰礦開採成本\n\n### 車用記憶體晶片（新增壓力）\n- 生成式 AI 帶動資料中心對 HBM 的需求激增\n- 全球記憶體廠商將產能轉向 AI 伺服器，擠壓車用記憶體供應\n- 車用記憶體晶片近 3 個月漲幅：**~180%**\n\n### 大宗原料\n- 原油、橡膠、銅、鋁等基礎原料同步上漲\n\n## 成本影響量化\n\n| 車型 | 2026 vs 2025 成本增加 |\n|------|---------------------|\n| 中型智慧電動車 | **人民幣 4,000–7,000 元**（每輛）|\n\n## 市場反應\n\n| 指標 | 數值 |\n|------|------|\n| Q1 2026 乘用車均價提升（1-3 月各月 YoY）| 人民幣 1.5 萬、1.5 萬、0.7 萬元 |\n| 行業利潤總額（Q1 2026 YoY）| **人民幣 784 億元，下滑 18%** |\n| 整車業利潤率 | 已逼近整車企業**盈虧平衡線** |\n\n- 業界預測：5–6 月還有更多車型跟進漲價\n- 中低價車廠目前採取**試探性漲價**策略（因需求疲弱，不敢大幅漲）\n\n## 意義\n\n- 2024–2026 年初的極度內捲「降價戰」承受壓力：原料成本倒逼漲價\n- 若漲價成功推行，對車廠毛利率有一定修復作用\n- 但需求端（中國國內零售連 7 個月 YoY 下滑）仍不樂觀\n\n## Related\n- [[concepts/中國EV市場競爭格局]]\n- [[concepts/電池技術路線]]\n- [[sources/china-nev-april-involution-2026]]"
    },
    "china-robotaxi-cost-advantage": {
      "title": "中國 Robotaxi 成本優勢：小馬智行 Gen 7 低於 Model 3 售價（2026-04）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=753651",
      "updated": "2026-04-30",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=753651](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=753651)\n\n# 中國 Robotaxi 成本優勢：小馬智行 Gen 7 低於 Model 3 售價（2026-04）\n\n**原文**：Digitimes／楊智家｜**發布**：2026-04-30\n\n## 摘要\n中國 Robotaxi 企業憑藉本土電動車供應鏈優勢，實現成本突破：小馬智行第七代 Robotaxi 總成本已低於 RMB 23 萬（~$33,700），低於 Tesla Model 3 入門款售價。競爭重心從技術演示轉向成本控制與規模化。\n\n## 小馬智行（PonyAI）\n\n| 指標 | 數值 |\n|------|------|\n| Gen 7 Robotaxi 總成本 | **< RMB 23 萬（~$33,700）** |\n| 成本涵蓋 | 車體 + 電池 + 自動駕駛系統 |\n| 對比 | **低於 Tesla Model 3 入門款售價** |\n| 2026 年底車隊目標 | **3,000 輛** |\n| 2027 年 | 新車型量產上市 |\n\n## 文遠知行（WeRide）\n\n| 指標 | 數值 |\n|------|------|\n| 聯想合作 | 未來 5 年全球 **20 萬輛**自駕車 |\n| 2026 年底目標 | **2,600 輛**無人計程車 |\n| 第三代算力平台 | 降低 AD 系統成本 **50%** |\n\n## 市場擴張策略\n\n- 中東成為中國企業首選海外測試市場（儘管衝突影響交付）\n- 小馬智行 CEO 彭軍：「將以顯著的成本優勢推動中國自動駕駛技術進入全球市場」\n- 文遠知行 CEO 韓旭：「競爭重心已由技術能力轉向成本控制與規模化」\n\n## 成本優勢來源\n\n1. 中國電動車供應鏈完整性（電池、電機、電子零件全面本土化）\n2. 第三代 AD 算力平台（文遠知行：成本降 50%）\n3. 人件費用較西方競爭者低\n\n## 與西方競爭者對比\n\n| 企業 | Robotaxi 規模（2026）|\n|------|---------------------|\n| Waymo | < 7,000 輛（美國+中國）|\n| 小馬智行 | 目標 3,000 輛（2026 底）|\n| 文遠知行 | 目標 2,600 輛（2026 底）|\n| 業界預測（2035）| 70~300 萬輛全球 Robotaxi |\n\n## Related\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[sources/beijing-auto-show-2026]]\n- [[sources/autonomous-driving-power-consumption]]"

    "china-sodium-battery-2026": {
      "title": "中國鈉離子電池產業化加速：2026 年規模化元年",
      "url": "https://ieknet.iek.org.tw/iekpdescript.aspx?rpno=847039481",
      "updated": "2026-04-08",
      "body": "**來源**：[https://ieknet.iek.org.tw/iekpdescript.aspx?rpno=847039481](https://ieknet.iek.org.tw/iekpdescript.aspx?rpno=847039481)\n\n# 中國鈉離子電池產業化加速：2026 年規模化元年\n\n**原文**：IEK 產業情報網／經濟日報｜**發布**：2026-04-08\n\n## 摘要\n中科院開發出全球首款具自保護功能的不燃電解質（PNE），徹底阻斷鈉電池熱失控，推動鈉電池產業化加速。2026 年被視為鈉電池規模化應用元年。\n\n## 重大突破\n- **PNE 技術**：溫度超過 150°C 自動由液態固化為緻密屏障，阻斷熱失控\n- 兼具寬溫性能（-40°C 至 60°C）與耐高壓穩定性（>4.3V）\n- 材料均為成熟工業化產品，產業化競爭優勢高\n- 成果發表於《自然·能源》（2026-04-06）\n\n## 產業進展（2026）\n| 事件 | 時間 |\n|------|------|\n| 寧德時代發布首款輕型商用車鈉離子電池 | 1月 |\n| 全球首款鈉電量產乘用車亮相 | 2月 |\n| 博鈉新能源 2 GWh 產線（哈爾濱）投產 | 3月底 |\n| 寧德時代 ESIE 2026 展出儲能鈉電池（>1.5 萬次循環）| 2026 |\n\n## 競爭優勢 vs 鋰電\n- 資源豐富、成本低（鈉比鋰更易取得）\n- 耐低溫、快充性能好\n- 中科海鈉預測：鈉電與鋰電成本交匯點在 2027 年\n\n## Related\n- [[entities/寧德時代]]\n- [[concepts/電池與技術/鈉離子電池]]\n- [[concepts/電池與技術/電池技術路線]]"

    "citroen-15k-electric-2cv-2026": {
      "title": "Citroën CEO 確認：不到 €15,000 的電動 2CV，歐洲製造（2026-06-09）",
      "url": "https://www.electrive.com/2026/06/09/citroen-ceo-confirms-sub-15000-electric-2cv/",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.electrive.com/2026/06/09/citroen-ceo-confirms-sub-15000-electric-2cv/](https://www.electrive.com/2026/06/09/citroen-ceo-confirms-sub-15000-electric-2cv/)\n\n# Citroën CEO 確認：不到 €15,000 的電動 2CV，歐洲製造（2026-06-09）\n\n**原文**：electrive.com｜**發布**：2026-06-09\n\n## 摘要\n雪鐵龍（Citroën）執行長 **Xavier Chardon** 正式確認，公司正在規劃一款**售價低於 €15,000**（含稅，不含補貼）、**在歐洲生產**的純電動車，即電動版 2CV 復刻。接近量產版本的概念車將於 **2026 年 10 月巴黎車展**亮相。\n\n## 關鍵資訊\n\n| 指標 | 內容 |\n|------|------|\n| 目標售價 | **＜€15,000**（不含補貼） |\n| 生產地 | **歐洲**（具體廠址未定） |\n| 概念車亮相 | 2026 年 10 月 巴黎車展 |\n| 車型定位 | 電動版 2CV 精神傳承者 |\n| CEO 宣告人 | Xavier Chardon（Citroën CEO） |\n\n## 市場背景\n\n### 歐洲超平價 EV 空缺\n- 目前歐洲市場 €15,000 以下純電動車幾乎空白（Dacia Spring 約 €17,000 左右）\n- 中國品牌（五菱 Mini EV 後繼、BYD Seagull）以超低價攻歐，Citroën 此舉具防禦意義\n- Renault 5 基本款約 €25,000，Volkswagen ID.2all 約 €25,000，Citroën e-C3 約 €23,000\n\n### Stellantis 的超平價 EV 矩陣\n- Citroën ë-C3 已量產（2024 起）\n- 電動 2CV（<€15K）是更入門一層\n- Stellantis 旗下 Leapmotor（佔股 21%）協同研發可能性高：Leapmotor C10/B10 平台共用\n\n## 戰略意義\n- 歐洲廠製造確保不受 EU 反傾銷關稅衝擊\n- <€15K 價位若成真，將是歐洲電動車大眾化的重要里程碑\n- 2026 年 10 月巴黎車展前後預期帶動輿論高峰\n\n## Related\n- [[concepts/歐洲EV市場]]\n- [[concepts/電動乘用車市場]]\n- [[concepts/中國EV出海策略]]"
    },
    "citroen-china-ev-strategy-2026": {
      "title": "雪鐵龍對抗中國 EV：差異化而非模仿（2026-05）",
      "url": "https://n.yam.com/Article/20260511856218",
      "updated": "2026-05-12",
      "body": "**來源**：[https://n.yam.com/Article/20260511856218](https://n.yam.com/Article/20260511856218)\n\n# 雪鐵龍對抗中國 EV：差異化而非模仿（2026-05）\n\n**原文**：商傳媒 / 綜合外電｜**發布**：2026-05-11 | 執行長：Xavier Chardon\n\n## 核心策略\n\n面對中國 EV 品牌在歐洲的進攻，雪鐵龍（Citroën）明確拒絕走規格競賽路線，主打：\n- **原創性**（Originality）\n- **舒適性**（Comfort）\n- **實用性**（Practicality）\n- **日常用車需求**優先\n\n## 反中國設計路線\n\n- 中國 EV 趨勢：大螢幕 + 簡約座艙 + 科技感\n- 雪鐵龍立場：「買家不一定想要充斥螢幕和複雜功能的車輛」\n- 未來車款：提供有識別度且舒適的感受（參考 ELO 概念車方向）\n- 品牌定位：「不是追求極致加速的品牌，舒適感和放鬆感仍是首要考量」\n\n## 銷售表現（Q1 2026）\n\n| 市場 | 表現 |\n|------|------|\n| 全球 | 19 萬輛，+**10%** |\n| 英國 | +**118%** |\n| 歐洲整體 | +**12%**（全新產品陣容帶動）|\n\n## 向中國學習的部分\n\n- 承認中國車廠**研發速度**為歐洲帶來重要警示\n- 雪鐵龍目標：**縮短新車上市時間**，但不犧牲可靠性\n- 過去曾有 C3 車型延遲、召回、品質問題的教訓\n\n## 對應策略總結\n\n> 「應對中國競爭的最佳方式並非模仿，而是強化自身獨特的品牌識別，並回歸核心價值。」— Xavier Chardon\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[entities/Stellantis]]"
    },

      "title": "美國國會提案：BEV 車主每年繳 $130「路費」（2026-05）",
      "url": "https://insideevs.com/news/796222/ev-fee-gas-tax-house-bill-2026",
      "updated": "2026-05-18",
      "body": "**來源**：[https://insideevs.com/news/796222/ev-fee-gas-tax-house-bill-2026](https://insideevs.com/news/796222/ev-fee-gas-tax-house-bill-2026)\n\n# 美國國會提案：BEV 車主每年繳 $130「路費」（2026-05）\n\n**原文**：InsideEVs | Tim Levin｜**發布**：2026-05-18\n**法案名稱**：BUILD America 250 Act\n\n## 核心提案\n\n| 項目 | 內容 |\n|------|------|\n| 費用對象 | **純電動車（BEV）**車主 |\n| 起始年份 | **2029 年** |\n| 初始費用 | **$130/年** |\n| 調整機制 | 每 2 年 +$5，最終上限 **$150/年** |\n| PHEV 費用 | **$35/年**，最終上升至 **$50/年** |\n| 推動者 | 眾議院交通基礎設施委員會主席 Sam Graves（密蘇里州共和黨）|\n| 狀態 | 草案階段，需通過兩院並送達總統；目標 2029-09-30 前生效 |\n\n## 背景：公路信託基金缺口\n\n- 聯邦汽油稅 **18.3 美分/加侖**，自 **1993 年**未調整\n- EV 車主不繳油稅 → 不為公路維修「繳份子」\n- 美國人平均每年繳聯邦油稅：$70–$90（遠少於 BEV 的 $130 提案）\n\n## 爭議與反對\n\n**倡議組織論點：**\n- Sierra Club：「懲罰清潔交通，而非激勵」\n- Consumer Reports：固定費率不公平——輕度駕駛者（老人等）每年只繳 $40–50 油稅，BEV 同等費用反而更貴\n- 商業車（快遞、Robotaxi）每年開車里程達個人的 10 倍，固定費同樣不公平\n\n**現有狀態（各州）：**\n- 密西根 BEV 年費：**$267**（2026）\n- 紐澤西 BEV 年費：**$270**（前 4 年一次繳清）\n- 多數州已有類似機制，聯邦層級較晚跟進\n\n## 市場意義\n\n- 在 EV 補貼被廢止（IRA Section 30D 2025-09-30）後，再度加重 EV 持有成本\n- 若通過，進一步加劇「買 EV 比買燃油車貴」的感知落差\n- 法案仍在立法程序早期，不確定性高\n\n## Related\n- [[concepts/美國EV市場與政策]]\n- [[concepts/北美EV關稅與政策]]\n- [[sources/nissan-mississippi-ev-abandonment]]"
    },

      "title": "Cupra Raval 正式上市：VW 集團緊湊型 EV 家族先鋒",
      "url": "https://www.electrive.com/2026/04/09/cupra-raval-now-available-as-first-of-new-compact-ev-family",
      "updated": "2026-04-13",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/cupra-raval-now-available-as-first-of-new-compact-ev-family](https://www.electrive.com/2026/04/09/cupra-raval-now-available-as-first-of-new-compact-ev-family)\n\n# Cupra Raval 正式上市：VW 集團緊湊型 EV 家族先鋒\n\n**原文**：electrive／Daniel Bönnighausen｜**發布**：2026-04-09\n\n## 摘要\nCupra Raval 是 Volkswagen 集團 MEB+ 平台新緊湊型 EV 家族（共 4 款：VW ID.Cross、Skoda Epiq、Cupra Raval + 1）中首先上市的車型，起售首批版本 €37,250，入門版 €25,950 預計 2026 年夏季上市。\n\n## 規格\n\n| 項目 | 說明 |\n|------|------|\n| 車長 | 4.05 m（軸距 2.60 m）|\n| 平台 | MEB+，前輪驅動 |\n| 動力選項 | 85 / 99 / 155 / 166 kW（最高版為 VZ）|\n| 電池（低功率版）| 37 kWh LFP，續航 300 km |\n| 電池（高功率版）| 52 kWh NMC，續航 379~444 km |\n| DC 快充（52 kWh）| 105 kW，10→80% 24 分鐘 |\n| DC 快充（37 kWh）| 88 kW，10→80% 23 分鐘 |\n| AC 充電 | 11 kW（三相）|\n| V2L | 支援 |\n| 首批上市售價 | €37,250（Dynamic，155 kW + 52 kWh）起 |\n| 入門版售價 | €25,950（2026 年夏，37 kWh）|\n\n## 同系列車型比較（VW 集團）\n| 車型 | DC 快充 | 52 kWh 續航 |\n|------|---------|------------|\n| Cupra Raval | 105 kW / 24 min | 379~381 km |\n| Skoda Epiq | 133 kW / 23 min | ~430 km |\n| VW ID.Cross | TBC | TBC |\n\n## 特色配備\n- 懸吊降低 15 mm + 輪距加寬 10 mm\n- Remote Park Assist、Top View Camera、Pre-Crash 側面碰撞保護\n- Formula E 啟發的獨特內部音效（Performance/Cupra 模式）\n- Cupra Charger Pro 壁掛充電器（附 MID 能量計量認證）\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/車輛類型/平價電動車市場]]"

    "daimler-buses-200m-service-investment": {
      "title": "戴姆勒巴士 €2 億服務網絡投資：充電解決方案為核心，eCoach 即將測試",
      "url": "https://www.electrive.com/2026/04/17/daimler-buses-to-invest-e200m-in-service-network-focus-on-charging-solutions",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.electrive.com/2026/04/17/daimler-buses-to-invest-e200m-in-service-network-focus-on-charging-solutions](https://www.electrive.com/2026/04/17/daimler-buses-to-invest-e200m-in-service-network-focus-on-charging-solutions)\n\n# 戴姆勒巴士 €2 億服務網絡投資：充電解決方案為核心，eCoach 即將測試\n\n**原文**：electrive.com／Cora Werwitzke ｜ **發布**：2026-04-17\n\n## 摘要\n戴姆勒巴士宣布未來數年在歐洲投資最高 **€2 億**，擴建服務據點、充電設施與支援能力。這是戴姆勒巴士史上最大服務投資，核心為電動巴士充電解決方案。同時電動教練車（eCoach）技術示範車即將在諾伊烏爾姆開始試駕。\n\n## 投資概要\n\n| 項目 | 細節 |\n|------|------|\n| 投資金額 | 最高 **€2 億**（未來數年，歐洲）|\n| 現有服務據點 | **630 個**（36 自營 + 其餘夥伴合作）|\n| 具備電動巴士服務能力 | 約 130 個據點（含高壓認證技師）|\n| 充電專線 | 8 語言，目標 85% 案件遠端解決 |\n| 歷史比較 | 戴姆勒巴士史上最大服務投資（MAN 巴士+卡車合計 €3 億）|\n\n## eCoach 技術示範車\n\n- 基礎：Setra 516 HD（改裝為電動）\n- 計畫：聯邦政府 ELCH 計畫資助\n- 地點：諾伊烏爾姆，即將開始試駕\n- 預期續航：類似 eIntouro（~500 公里）\n- 電池供應：CATL\n- 平台：共享戴姆勒卡車電動底盤\n\n## 戴姆勒巴士電動化路線圖\n\n| 事件 | 時間 |\n|------|------|\n| Mercedes-Benz eCitaro 城市巴士上市 | 2018 年 |\n| 2029 年 5 月柴油城市巴士退場 | 已宣布 |\n| eIntouro 城際巴士 H2 2026 上市 | 即將 |\n| 電動教練車（eCoach）量產 | 十年內 |\n| 2039 年歐洲只賣 CO₂ 中和新車 | 長期目標 |\n\n## 進入公共充電市場\n- 首次：戴姆勒巴士計畫在旅遊景點和交通樞紐設置充電站（慕尼黑、科隆等）\n- 此前只做私有 / 半公開設施，此為模式轉型\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/daimler-buses-2029-diesel-phaseout]]\n- [[sources/daimler-buses-vbsg-switzerland]]"

    "daimler-buses-2029-diesel-phaseout": {
      "title": "戴姆勒巴士：2029 年 5 月柴油城市巴士全面退場",
      "url": "https://www.electrive.com/2026/04/09/in-may-2029-the-diesel-city-bus-will-be-phased-out-markus-fischer-daimler-buses",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/in-may-2029-the-diesel-city-bus-will-be-phased-out-markus-fischer-daimler-buses](https://www.electrive.com/2026/04/09/in-may-2029-the-diesel-city-bus-will-be-phased-out-markus-fischer-daimler-buses)\n\n# 戴姆勒巴士：2029 年 5 月柴油城市巴士全面退場\n\n**原文**：electrive／Carla Westerheide｜**發布**：2026-04-09\n\n## 摘要\n戴姆勒巴士業務主管 Markus Fischer 在柏林 Mobility Move 展明確宣布：2029 年 5 月，eCitaro 最後一款柴油城市巴士將停產，公共交通全面電動化。\n\n## 關鍵聲明\n> **「2029 年 5 月，柴油城市巴士將退場，公共交通屆時將全面電動化。」**\n> — Markus Fischer，戴姆勒巴士德國公共運輸銷售主管\n\n## NMC4 新電池技術\n| 改進點 | 說明 |\n|--------|------|\n| 電池構型 | 圓柱型 → 方形（稜柱型）電芯，提升空間效率 |\n| 能量密度 | 較前代提升 **13%** |\n| 充電功率 | 機會充電最高支援 **300 kW**，不影響電池壽命 |\n| 目標續航 | **300 公里**（覆蓋 90~95% 公共運輸使用週期）|\n| 相容性 | 可替換舊款 eCitaro 的 NMC1~NMC3 電池 |\n\n## 市場地位\n- 戴姆勒巴士（eCitaro）2025 年德國電動巴士市場龍頭\n- 目標在 2026 年繼續捍衛市場地位\n\n## 充電基礎建設支援\n- **Omniplus Charge**：支援公共運輸業者規劃、建置充電生態系\n- **Daimler Buses Solutions（DBS）**：工程規劃、施工、後續服務\n\n## Related\n- [[entities/戴姆勒卡車]]\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]"

    "daimler-buses-vbsg-switzerland": {
      "title": "戴姆勒巴士贏得瑞士 VBSG 標案：26 輛電動巴士（Ebusco 違約後）",
      "url": "https://www.sustainable-bus.com/electric-bus/vbsg-st-gallen-daimler-electric-buses",
      "updated": "2026-04-09",
      "body": "**來源**：[https://www.sustainable-bus.com/electric-bus/vbsg-st-gallen-daimler-electric-buses](https://www.sustainable-bus.com/electric-bus/vbsg-st-gallen-daimler-electric-buses)\n\n# 戴姆勒巴士贏得瑞士 VBSG 標案：26 輛電動巴士（Ebusco 違約後）\n\n**原文**：Sustainable Bus｜**發布**：2026-04-09\n\n## 摘要\n瑞士聖加侖大眾運輸局（VBSG）將 26 輛純電巴士合約授予戴姆勒巴士（Daimler Buses Schweiz），因荷蘭 Ebusco 因財務問題無法履約。總合約金額約 7,760 萬瑞士法郎（含 VAT）。\n\n## 採購規格\n- **16 輛**：標準 12 公尺巴士\n- **10 輛**：鉸接式 18 公尺巴士\n- 充電方式：場站充電（depot-charged）\n- 選購選項：最多 20 輛追加車輛\n- 服務包：15 年保固、維修服務\n\n## 時程\n- 交付開始：2028 年中\n- 目標：2032 年 VBSG 車隊全面電動化（符合聖加侖能源概念 2050）\n\n## Ebusco 違約背景\n- 荷蘭電動巴士新創 Ebusco 因財務問題無法履行原合約\n- VBSG 因此進行第二次公開招標，最終由戴姆勒巴士得標\n\n## 意義\n反映歐洲電動巴士市場中，新創業者（Ebusco）財務脆弱性，傳統大廠（戴姆勒）更具可靠性。\n\n## Related\n- [[entities/戴姆勒卡車]]\n- [[concepts/車輛類型/電動巴士市場]]\n- [[概念/歐洲EV政策]]"

    "delhi-ev-policy-2026": {
      "title": "德里 EV 政策警示：強制配額恐推升鄰近省份 ICE 銷量",
      "url": "https://auto.economictimes.indiatimes.com/news/industry/delhi-ev-policy-hard-mandates-could-backfire/121058762",
      "updated": "2026-04-13",
      "body": "**來源**：[https://auto.economictimes.indiatimes.com/news/industry/delhi-ev-policy-hard-mandates-could-backfire/121058762](https://auto.economictimes.indiatimes.com/news/industry/delhi-ev-policy-hard-mandates-could-backfire/121058762)\n\n# 德里 EV 政策警示：強制配額恐推升鄰近省份 ICE 銷量\n\n**原文**：ETAuto（Economic Times）｜**發布**：2026-04-13\n\n## 摘要\n印度德里擬議中的 2026 年 EV 政策以強制配額方式推動電動化，但專家警告，過於嚴格的強制措施可能引發反效果——消費者轉往相鄰省份購買 ICE 車輛，反而妨礙整體電動化目標。\n\n## 核心議題\n- 德里提議對新車銷售設置 EV 強制比例\n- **風險**：若強制要求太高，買家可能前往哈里亞納邦、北方邦等鄰近省份購買 ICE 車，實際減碳效果打折\n\n## 印度 EV 市場背景\n- 2025 年 H1 電動巴士：2,100 輛（+33%）\n- 市場以政府採購為主要驅動力\n- 乘用 EV 市場處於發展早期，充電基礎建設仍不足\n\n> ⚠️ 注意：原始文章內容有限（頁面含大量活動推廣資訊），摘要以可獲得資訊為準。\n\n## Related\n- [[concepts/地理市場/印度EV市場]]\n- [[concepts/車輛類型/電動巴士市場]]"

    "dragonize-truck-charging": {
      "title": "dragonize：德國物流業者 TST 推出電動卡車共享充電網路",
      "url": "https://www.electrive.com/2026/04/09/tst-launches-dragonize-depot-charging-network-to-scale-electric-truck-operations",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/tst-launches-dragonize-depot-charging-network-to-scale-electric-truck-operations](https://www.electrive.com/2026/04/09/tst-launches-dragonize-depot-charging-network-to-scale-electric-truck-operations)\n\n# dragonize：德國物流業者 TST 推出電動卡車共享充電網路\n\n**原文**：electrive｜**發布**：2026-04-09\n\n## 摘要\n德國物流商 TST Logistik 正式推出電動重卡共享場站充電網路「dragonize」，採合作社模式，物流業者可共享充電基礎建設，旨在解決電動卡車高充電成本問題。\n\n## 痛點背景\n> 「2024 年 7 月開始使用電動卡車時，我們沒有充電基礎建設，只能依賴公共充電網路，每度電高達 81 歐分。在這個電費水準下，電動卡車根本沒有商業案例。」— Katrin Herda，PamSun GmbH\n\n## dragonize 核心機制\n- **合作社模式**：物流業者可共享彼此的場站充電設備\n- **數位平台 DepotOS**：集中管理充電規劃、預約、路線與營運\n- **現有規模**：20+ 物流業者已在沃爾姆斯站使用\n\n## 沃爾姆斯旗艦站規格\n- 8 個充電點：3×400 kW、3×240 kW、2×160 kW\n- 45 噸重卡可直接進站（無需解掛）\n- 現場 7.5 MW 太陽能供電\n- 未來整合 6~7 MWh 固定儲能系統\n\n## 擴張計畫\n- 黑森邦（Hesse）新增充電場站\n- 研究不同格式：高速充電樞紐（司機休息）、大型場站（過夜）、裝卸月台整合\n\n## Related\n- [[concepts/車輛類型/電動卡車市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]"
    },

      "title": "全球電動巴士動態匯總：2026 年 6 月（2026-06-03〜09）",
      "url": "https://www.sustainable-bus.com/",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.sustainable-bus.com/](https://www.sustainable-bus.com/) / [https://www.electrive.com/](https://www.electrive.com/)\n\n# 全球電動巴士動態匯總：2026 年 6 月（2026-06-03〜09）\n\n**原文**：Sustainable Bus + electrive COMMERCIAL｜**發布**：2026-06-03〜09\n\n## 摘要\n2026 年 6 月初，全球電動巴士市場出現多項重要進展：西班牙首個大型 e-bus 融資框架協議、英格蘭北部大規模採購、拉丁美洲突破萬輛里程碑、以及 Karsan 自駕電動巴士進入 FIFA 世界盃服務。\n\n## 主要事件一覽\n\n### 1. Zenobē × Vectalia — 西班牙 €1.2 億租賃框架（2026-06-03/09）\n| 指標 | 內容 |\n|------|------|\n| 合作方 | Zenobē Energy（英國）× Vectalia（西班牙） |\n| 金額 | **€1.2 億**（融資框架） |\n| 形式 | 電動巴士 + 充電基礎設施「打包租賃」（Battery-as-a-Service 模式） |\n| 範圍 | 西班牙多個城市路線 |\n| 意義 | 歐洲最大單一電動巴士 BaaS 融資框架之一 |\n\n### 2. 西約克郡 193 輛 Wrightbus（2026-06-03）\n| 指標 | 內容 |\n|------|------|\n| 買家 | 西約克郡聯合運輸局（West Yorkshire Combined Authority） |\n| 車型 | Wrightbus StreetDeck Electroliner（英國製雙層電動巴士） |\n| 數量 | **193 輛** |\n| 資金 | 英國零排放巴士區域補貼（ZEBRA 2 計畫） |\n\n### 3. 紐約州 5 年校車電動化延遲（2026-06-03）\n- 紐約州 2022 年立法要求 2027 年起新採購 100% 電動校車\n- 最新進展：因充電基礎設施和資金問題，政策實施**延遲約 5 年**（至 2032 年）\n- 此為北美電動巴士政策中罕見的「退步」案例\n\n### 4. 拉丁美洲接近 10,000 輛（2026-06-03）\n- 拉丁美洲電動公車總量即將突破 **10,000 輛**里程碑\n- 主要市場：哥倫比亞（波哥大）、智利（聖地牙哥）、巴西（聖保羅）\n- 主要供應商：BYD、宇通（Yutong）、King Long\n- 聖地牙哥：目前全球單城市電動巴士佔比最高之一（~2,400 輛）\n\n### 5. Karsan 自駕電動 e-JEST — FIFA 世界盃服務（2026-06-09）\n- 土耳其電動巴士製造商 Karsan 的 **Autonomous e-JEST** 進入 Atlanta 服務\n- 為 2026 年北美 FIFA 世界盃提供「最後一哩」自駕接駁服務\n- e-JEST：Class B 小型電動巴士，L4 自動駕駛版本\n\n### 6. 電動巴士成本趨勢（2026-06-09 SB Weekly）\n- HEAG mobilo MD Arne Rath：「電動巴士運營成本持續下降，但**採購價格仍是與柴油巴士實現完全成本平價的主要障礙**」\n- Solaris：2019 年以來運營排放降低 **70%**，零排放車輛達交付量的 **86%**\n\n## Related\n- [[concepts/電動巴士市場]]\n- [[concepts/充電基礎建設]]\n- [[sources/india-electric-bus-market-2025]]\n- [[entities/BYD比亞迪]]"
