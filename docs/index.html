  .md-body th,.md-body td{border:1px solid #1e293b;padding:6px 10px;text-align:left}

  .md-body blockquote{border-left:3px solid #475569;padding-left:1em;color:#94a3b8;margin:.8em 0}
  .md-body hr{border:0;border-top:1px solid #1e293b;margin:1.4em 0}

      ],
      "body": "# 歐洲 EV 市場\n\n歐洲是中國電動車廠的核心海外戰場，也是歐系傳統車廠轉型的試煉場。2026 年歐洲 EV 市場以平價緊湊車型競爭升溫、中國高端品牌進入、電動巴士市場高速成長為主要主題。\n\n## 市場概況（2025~2026）\n\n### 乘用 EV\n- 歐洲本土車廠在平價緊湊型（€25,000~40,000）推出 MEB+ 平台新車族群：VW ID.Cross、Skoda Epiq、Cupra Raval\n- 中國品牌攻勢：比亞迪騰勢（Denza）高端切入（€101,000~115,000）；MG Motor（SAIC）以 €49,990 進入中型 SUV 市場\n- Tesla 歐洲 2025 年萎縮近 30%，中國品牌試圖填補空缺\n\n### 電動巴士（2025）\n- 歐洲（含英、挪、瑞）電動巴士登記量：**11,607 輛（+48%）**\n- EU 新城市巴士零排放占比：**~50%**\n- 主要成長品牌：MAN（+224%）、BYD（+206%）、Mercedes-Benz（+52%）\n- 里程碑：哥本哈根達到 100% 電動化\n\n## 關鍵市場動態\n\n### VW 集團緊湊型 EV 攻勢（2026）\n- Cupra Raval（MEB+ 平台）：€25,950 起（2026 年夏），首批版 €37,250\n- VW ID.4/ID.5 英國版升級：電池升至 58/79 kWh，導入 V2L（最高 3.6 kW）\n\n### Stellantis 供應鏈問題\n- Opel Grandland + Peugeot e-3008/e-5008 長續航版（97 kWh）交付延遲至 2027 Q1~Q2\n- 根源：供應商電池產能爬坡不順 + 大型 B2B 車隊訂單被優先\n\n### 中國品牌進入歐洲\n- 比亞迪騰勢 Z9GT（€115,000）：歐洲首秀，1,500 kW 閃充，2026-04-08 巴黎發表\n- MG MGS6 EV（€49,990）：充電速度 144 kW 落後同級，空間與配備具競爭力\n\n### VW ID.3 Neo：MEB+ 升級，€33,995 起（2026-04）\n- 世界首秀：2026-04-15（正式發布）\n- 售價：Trend €33,995 / Life €35,995 / Style €38,495\n- 電池：50 kWh（WLTP 330km）/ 58 kWh（400km）/ 79 kWh 長程版\n- 平台：MEB → **MEB+** 升級（提升效能與充電速度）\n- 生產：Zwickau，2026 年 5 月開始，夏季歐洲上市\n- 參見：[[sources/vw-id3-neo-premiere]]\n\n### 德國新 EV 補貼計畫（2026，溯及既往）\n- **BEV 最高 €6,000**（以收入分層：年收入 ≤€45,000 → 基礎 €5,000 + 家庭加碼）\n- PHEV：最高 €4,500\n- **溯及既往**：從 2026-01-01 起的購車均可申請\n- 申請入口：預計 2026 年 5 月開放\n- 2026 年 3 月德國 EV 登記：**70,000+ 輛**（~每 4 輛新車有 1 輛是 EV）\n- 參見：[[sources/germany-ev-incentive-2026]]\n\n### Honda e:Ny1 撤出五國（2026-04）\n- 英國、德國、義大利、西班牙、瑞士市場全面下架\n- 2025 年德國銷量僅 105 輛；曾降價至 €38,990 仍無效\n- 原因：老舊 EMR3 電機 + 45 分鐘 10→80% 充電 + 性價比落後競品\n- 參見：[[sources/honda-eny1-withdrawal-europe]] | [[entities/本田]]\n\n### 英國：BEV 均價首度低於 ICE（2026-04）\n- BEV 平均售價（折後）**£42,600 < ICE £43,400**，價差 £785\n- Q1 2026 BEV 市場佔比 **22%**\n- 奇瑞 Jaecoo 7：2026 年 3 月英國新車**銷售冠軍**（月銷突破萬輛）\n- 驅動因素：ECG 補貼（最高 £3,750）+ ZEV 配額壓力（22%）+ 中系品牌高性價比\n- 參見：[[sources/uk-germany-ev-market-dynamics-2026]]\n\n### 德國：補貼效益外溢中系車（2026 Q1）\n- Q1 EV 年增 **+41%**，但德系品牌僅 +28%，中系品牌 +72%\n- 德系本土市佔：66%（2025）→ **58%**（2026 Q1）\n- 三大結構弱點：缺乏低價位車款 / 折扣力度不足 / 補貼機制建置延遲（消費者需全額先付）\n- 參見：[[sources/uk-germany-ev-market-dynamics-2026]]\n\n### Volvo EX60：SPA3 800V 量產啟動（2026-04），美國市場開賣（2026-05）\n- SPA3 平台（800V），三版本：275/375/500kW，80/91/112.5kWh\n- 旗艦 P12 AWD：**810km** 續航、**370kW** 峰值充電（18~19分鐘 10~80%）\n- 瑞典 Torslanda 廠量產，初夏交車\n- 美國 2027 年式定價：P6 Plus **$59,795**（307 英里）/ P10 AWD **$62,145**（503 hp）/ P10 AWD Ultra **$68,745**\n- P12 AWD（~400 英里）即將推出；比 XC60 PHEV（$63,940）更便宜\n- 參見：[[sources/volvo-ex60-production-2026]]\n\n### BMW iX3（Neue Klasse）：首款全電動架構 BMW EV（2026-05）\n\nBMW Neue Klasse 首款量產電動車：\n\n| 規格 | 數值 |\n|------|------|\n| 美國售價 | **$62,850 起**（歐洲 €69,630）|\n| 電池 | **108.7 kWh** |\n| 系統功率 | **469 hp（345 kW）**，xDrive50（雙馬達）|\n| 0–62 mph | **4.7 秒** |\n| 續航（WLTP）| **500 英里（805 km）** |\n| 續航（EPA 預估）| **~434 英里**（實測 ~380 英里）|\n| DC 快充 | **400 kW**（800V 架構）|\n| 10→80%（DC）| **21 分鐘** |\n| 城市能效 | **3.7 英里/kWh**——同級 EV SUV 最高效 |\n\n- 評語：「**即使沒有空氣懸架，駕駛感覺就是 BMW**」；Heart of Joy 控制單元反應提升 10 倍；「中國品牌目前無法複製這種駕駛質感」\n- 首款「從設計之初就為電動而生的 BMW」（打破改裝架構批評）\n- 全景顯示器橫跨 A 柱至 A 柱，首次取消 iDrive 旋鈕（BMW 大車中首例）\n- 主要競品：Tesla Model Y（生態系）、Audi Q6 E-tron（科技感）、Porsche Macan Electric（駕駛樂趣）\n- 參見：[[sources/bmw-ix3-neue-klasse-2026]]\n\n### 中國品牌借殼歐洲工廠（2026 趨勢）\n- **Nissan Sunderland** 廠（英國）：產能利用率約 50%，與奇瑞（Chery）談判共同使用\n- Chery 英國市場：2026 年 3 月市佔 6%，正在擴大分銷\n- 更廣趨勢：Stellantis/Dongfeng/Xpeng/小米也在洽談歐洲廠房空間\n- 意義：中國品牌以「借殼」方式規避關稅、本地化生產\n- 參見：[[sources/nissan-chery-sunderland-plant]]\n\n## 歐盟 Q1 2026 EV 銷售數據（ACEA）\n\n| 指標 | 數值 |\n|------|------|\n| Q1 2026 BEV 登記量 | **546,937 輛（+32.5%）** |\n| 3 月單月 BEV | **234,532 輛（+48.9%）** |\n| 3 月 BEV 市占率 | **19.4%** |\n\n- 德國補貼效應提前發酵（溯及 2026-01-01），推動 Q1 大幅回升\n- 參見：[[sources/acea-eu-ev-q1-2026]]\n\n## VW ID.Polo：€24,995 切入歐洲平價市場（2026-04）\n\n| 規格 | 數值 |\n|------|------|\n| 起售價 | **€24,995**（英國 £23,495）|\n| 電池 | 37 kWh LFP（標準）/ 52 kWh NMC（長程）|\n| 續航 | **282 英里 WLTP**（長程版）|\n| 充電 | 90 kW DC（LFP）/ 105 kW DC（NMC）|\n| V2L | **標配**（最高 3.6 kW）|\n| 平台 | MEB+，CTP 工法 |\n\n- 競品：Renault 5（€24,900）、Kia EV3、Hyundai Inster、BYD Dolphin Surf\n- VW 首次以 25k 歐元以下切入平價緊湊市場，補全 MEB 家族向下空間\n- 參見：[[sources/vw-id-polo-launch]]\n\n## Polestar 3：800V 升級（2026-04）\n\n| 規格 | 升級幅度 |\n|------|---------|\n| 充電架構 | **800V**（取代 400V）|\n| DC 最高功率 | **350 kW**（+40%）|\n| 10→80% 時間 | **22 分鐘** |\n| 算力平台 | Nvidia Drive AGX Orin：**254 TOPS**（前代 30 TOPS，提升 8 倍）|\n\n- **Breathe Charge**：10 分鐘可補充+38% 續航（低溫下等同正常溫度效果）\n- 現有車主可免費改裝（Nvidia OTA 升級）\n- 參見：[[sources/polestar-3-800v-upgrade]]\n\n## Audi Q4 e-tron Facelift（2026-04）\n\n| 升級項目 | 細節 |\n|---------|------|\n| 續航 | **368 英里 WLTP**（最長程版）|\n| DC 充電 | **185 kW**（+5.7%），10→80% 約 27 分鐘 |\n| V2L | **首次導入**（Audi 首款支援 V2L 的 EV）|\n| 娛樂系統 | 三螢幕 + **ChatGPT 整合** |\n| 後燈 | **OLED 後燈**（全新設計語言）|\n\n- 參見：[[sources/audi-q4-etron-facelift-2026]]\n\n## smart #2：城市兩座車回歸（2027 年）\n\n- 車長 **< 3 公尺**，全電動，定位為**量產車型**（非情懷款）\n- 2027 年開始銷售，目標客群從 18 歲到 86 歲\n- 德國現有 35~40 萬輛舊款 fortwo 仍在使用 → 換購潛力巨大\n- smart 品牌：全電動（明確不做 PHEV），17 個歐洲市場，Mercedes + 吉利股東\n- 參見：[[sources/smart-brand-europe-2026]]\n\n## GWM ORA03：中國品牌英國節節敗退（2026-04）\n\n- **ORA03** 在英：2025 年全年僅 542 輛，2026 Q1 僅 26 輛 → 停止英國銷售\n- GWM 調整策略：以 **Haval** SUV 品牌接棒（2026 年中進英）\n- 教訓：小型掀背車難被英國消費者接受；**SUV 才是中國品牌進歐的正確切入點**\n- 參見：[[sources/gwm-ora03-uk-exit]]\n\n## 荷蘭 EV 換購補貼（2026-04）\n\n- 補貼對象：Euro 1-4 舊燃油車換購二手 EV（低中收入限定）\n- 補貼金額：**~€3,500**\n- 時程：Q4 2026 提前啟動（€200 萬預算），2027 年 €3,000 萬，2028 年 €2,000 萬\n- 意義：歐洲首批針對「汰換舊車 + 低收入補助」設計的二手 EV 補貼\n- 參見：[[sources/netherlands-ev-scrappage-2026]]\n\n## Porsche Cayenne Coupé Electric（2026-04）\n\n| 版本 | 功率 | 電池 | 充電 | 0-62mph | 售價 |\n|------|------|------|------|---------|------|\n| 基本款 | 300 kW | — | — | — | — |\n| S | 490 kW | — | — | — | — |\n| **Turbo** | **850 kW** | **113 kWh** | **400 kW DC**（<16 分鐘 10→80%）| **2.5 秒** | **€109,000 起** |\n\n- 800V 架構，Cd 0.23\n- 2026 年夏末開始交車（斯洛伐克 Bratislava 廠量產）\n- 參見：[[sources/porsche-cayenne-coupe-electric]]\n\n## 法規與政策\n- 歐盟對中國電動車徵收反補貼稅\n- 2030 年電池產能目標腰斬，轉向「納入並規範」中國技術\n- 法國撥款 €4.5 億補助電動巴士轉型（2025 年）\n- **德國**：2026 年恢復 EV 補貼（BEV 最高 €6,000，溯及 2026-01-01 起購車）\n\n## 英國純電動車突破 200 萬輛，4 月市占 26%（2026-05）\n\n| 指標 | 數值 |\n|------|------|\n| 累計 BEV 登記 | **2,012,758 輛**（達成 200 萬里程碑）|\n| 4 月 BEV 登記 | **39,084 輛（+59.1% YoY）** |\n| 4 月 BEV 市占 | **26.2%** |\n| 4 月電氣化整體（BEV+PHEV+HEV）| **53.2%**（年內第二次超過 50%）|\n| YTD BEV 市占（前 4 月）| **23.1%** |\n| ZEV Mandate 要求（2026）| **33%** |\n\n- **SMMT 下修全年預測**：原 28.5% → 修正為 **26.8%**（下修 1.7pp）\n- 2027 年預測 32%，仍低於法定 33%+\n- 關鍵矛盾：市場加速成長，但製造商以大量折扣撐起銷量（非自然需求），ZEV Mandate 合規壓力高\n- SMMT CEO Mike Hawes：「需要立即檢視轉型時程，使政策與市場現實接軌」\n- 參見：[[sources/uk-ev-2million-2026]]\n\n## VW「Gamechanger」：沃爾夫斯堡廠製造革命（2026-05）\n\n| 項目 | 內容 |\n|------|------|\n| 計畫代號 | **Gamechanger** |\n| 目標 | 大幅降低製造成本，在德國本土生產**平價 BEV** |\n| 主要工廠 | **沃爾夫斯堡（Wolfsburg）總廠** 整體改造 |\n| 技術方向 | **Megacasting**（大型壓鑄）：減少零件數量與組裝步驟 |\n| 平台 | **SSP 電動平台** |\n| 可能車型 | 電動 Golf（「ID. Golf」）+ 電動 SUV（「ID. Roc」）|\n| 層級 | **執行董事會層級**（Christian Vollmer 主責，CFO 嚴控成本）|\n\n- VW 監事會 + 執行董事會確認：「**現有商業模式不再適合未來**」\n- 背景壓力：中國競爭對手成本大幅低於 VW；歐洲產能削減 100 萬輛；Golf 生產遷往墨西哥\n- Megacasting 先驅：Tesla（Gigafactory）、Volvo（EX60 新廠）\n- 不確定性：投資規模「仍在評估深度」，2030 年新策略將最終確認\n- 參見：[[sources/vw-gamechanger-production]]\n\n## 極氪 X 2026 款歐洲版：400V 平台實現 230kW 快充（2026-05）\n\n| 規格 | 2026 款 |\n|------|---------|\n| 電池 | **Golden Battery LFP，61kWh** |\n| 架構 | **400V**（非 800V）|\n| DC 快充 | **最高 230kW** |\n| 10→80% | **18 分鐘** |\n| Privilege AWD 功率 | **365kW**（+50kW）|\n| 0-100km/h（AWD）| **3.7 秒** |\n| 後備箱 | 404L（+47L）|\n\n- **技術突破**：400V 架構通常限於 100~150kW，Golden Battery 打破業界慣例達 230kW\n- 極氪 X 2025 年底在德國上市，上市後數月即推出改款——中國品牌快速迭代節奏的體現\n- 參見：[[sources/zeekr-x-2026-europe]] | [[entities/吉利汽車]]\n\n## 零跑 T03 €49/月：中國品牌德國訂閱制突破（2026-05）\n\n- 零跑 T03 月租 **€49**（Fiat 500 同款 €99 的一半），已納入德國 EV 補貼\n- 2026 前 4 月德國交付 **4,523 輛（+358% YoY）**，已超越 Smart 和 Honda\n- 借助 **Stellantis 德國完整通路**：中國品牌繞過自建網路的時間成本\n- 中國品牌 2026 年在德國預期可獲 **€30 億**補貼\n- 參見：[[sources/leapmotor-t03-germany-2026]] | [[entities/零跑汽車]]\n\n## 中國車廠進軍歐洲的現實考驗（2026-05）\n\n- 以波蘭為案例：企業車隊占新車銷售 **67.7%**，但車隊採購邏輯（殘值、零件、服務網）不同個人消費者\n- Toyota 憑服務網 + 殘值優勢稱霸波蘭（103,834 輛，Corolla 29,487 輛）\n- **中國品牌路徑**：初期靠低價快速打開能見度 → 在某個規模後成長停滯 → 需服務網路 + 品牌信任 + 殘值支撐\n- 2024 波蘭 BEV+PHEV 保有量已超過 141,400 輛，市場仍在早期成長階段（機會仍在）\n- 參見：[[sources/china-ev-europe-challenges-2026]]\n\n## Morrow Batteries 破產：歐洲電池本土製造再受重挫（2026-05）\n\n繼 Northvolt（瑞典）之後，挪威 Morrow Batteries 申請破產：\n\n| 指標 | 數值 |\n|------|------|\n| 工廠地點 | 挪威 Arendal |\n| 已建產能 | **1 GWh/年**（2024 年啟用）|\n| 主要股東 | Siemens 部分持股 |\n| 計畫 | 4 階段擴張至 43 GWh Gigafactory（從未啟動）|\n\n**失敗原因**：規模過小（1 GWh 不足以供應任何大廠）、融資失敗、電池市場價格持續下滑、量產爬坡困難。\n\n→ 歐洲電池本土製造業的希望，目前高度集中於**亞洲廠商在歐洲的本地化生產**（CATL 匈牙利廠、三星 SDI、SK On 等），純歐洲新創路線連續受挫。\n\n- 參見：[[sources/morrow-batteries-insolvency]] | [[concepts/電池技術路線]]\n\n## 雪鐵龍：差異化對抗中國 EV（2026-05）\n\n面對中國 EV 大舉進攻歐洲，Citroën（Stellantis 旗下）選擇差異化而非規格競賽：\n\n- **拒絕大螢幕路線**：「買家不一定想要充斥螢幕和複雜功能的車輛」\n- 主打：原創性、舒適性、實用性（ELO 概念車方向）\n- 承認向中國學習：**縮短新車上市時間**（避免 C3 的延遲/召回歷史重演）\n\n**銷售成果（Q1 2026）**：全球 +10%（19 萬輛）、英國 +118%、歐洲 +12%\n\n- 參見：[[sources/citroen-china-ev-strategy-2026]]\n\n## 摩根大通：中國品牌 2028 年拿下西歐 20%（2026-05）\n\n摩根大通亞太汽車研究主管 Nick Lai 大幅上調預測：\n\n| 指標 | 舊估 | 新估 |\n|------|------|------|\n| 西歐市占達成時間 | 2030 年 15% | **2028 年 20%** |\n| 目標量（德法英義四市場）| — | **~250 萬輛** |\n| 2025 年現狀 | ~100 萬輛 | +150% 成長空間 |\n\n- 原因：高油價（+40%+）加速歐洲消費者轉向 EV + 中國品牌成本優勢在 30% 關稅後仍有 4 倍利潤差\n- 二梯隊外資（非 Toyota/賓士等）為主要失血方\n- 西歐 EV+PHEV 滲透率：2025 年 29% → 2026 年預估 **34%**\n- 參見：[[sources/jpmorgan-china-ev-europe-2028]]\n\n## 歐盟《產業加速法案》（IAA）：在地化門檻引發抗議（2026-05）\n\n歐盟執委會 2026 年春發表《**產業加速法案**》（IAA），衝擊日系、中系車廠：\n\n### 法案核心\n- 成員國 EV/PHEV/FCV 補貼與公共採購：關鍵零組件**需在歐盟境內生產**\n- 企業車隊補助：**電池材料等需歐盟境內生產**\n\n### 日方抗議（2026-05）\n| 行動 | 細節 |\n|------|------|\n| 日本經濟產業大臣 赤澤亮正 | 2026-05-07 布魯塞爾正式要求修正 |\n| 豐田等**百餘家**在歐日系廠商 | 2026-05-08 聯名要求修正 |\n\n- 日系車廠 2025 年在歐洲 31 國銷量：**167 萬輛**（多數從亞洲出口）\n- 日方擔憂：被排除在歐盟補貼對象之外\n\n### 中方抗議\n- 中國商務部「堅決反對」歐盟限制高風險逆變器建議\n\n### 意義\nIAA 法案 + 歐盟反補貼稅 = 「以法規築牆保護歐洲電動化產業鏈」的系統性策略，但同時衝擊日系、中系車廠競爭地位。\n- 參見：[[sources/eu-iaa-japan-auto-protest-2026]]\n\n## 5 月銷售數據：德國 25%，英國 27.3%（2026-06）\n\n| 市場 | 5 月 BEV | YoY | 市佔率 |\n|------|---------|-----|--------|\n| 德國 | 59,969 輛 | +39.3% | **25.0%** |\n| 英國 | — | +34.2% | **27.3%** |\n| 挪威 | — | — | **97.8%** |\n\n- BYD 歐洲：8 個月來首次正增長（匈牙利廠本地出貨開始貢獻）\n- 英國電動廂型車：2,345 輛 +35.5%，市佔 9.8%（↑自 7.6%）\n- 參見：[[sources/europe-ev-market-may2026]]\n\n## 電池成本 + 關稅延期（2026-06）\n\n- 歐洲電池生產成本比中國**高 30%**（T&E 研究）；繼 Northvolt、Morrow 後，歐洲電池新創連續受挫\n- ACEA + SMMT 聯合請求延遲英-歐 EV 原產地關稅至 2028 年（現行需 45% 電池本地化）\n- 7 個 EU 成員國（法、西班牙等）反對弱化 2035 年 CO₂ 法規\n- 參見：[[sources/eu-battery-tariff-2027-delay-2026]]\n\n## Citroën 確認：不到 €15,000 電動 2CV（2026-06）\n\n- CEO Xavier Chardon 正式確認：售價 ＜€15,000，**歐洲製造**，不依賴補貼\n- 概念車接近量產版，**2026 年 10 月巴黎車展**亮相\n- 歐洲市場目前 €15K 以下純電幾乎空白（Dacia Spring ~€17K）\n- 可能與 Stellantis×Leapmotor 平台協同開發\n- 參見：[[sources/citroen-15k-electric-2cv-2026]]\n\n## Related\n- [[entities/Tesla]]\n- [[entities/比亞迪]]\n- [[entities/Stellantis]]\n- [[entities/吉利汽車]]\n- [[entities/零跑汽車]]\n## Kia EV2 首駕：B 段最成熟入門純電，€26,600 起（2026-05）\n\n起亞最小純電車 EV2 在德國開始交付，斯洛伐克日利納廠製造（繼 EV4 後第二款歐洲製 E-GMP 車）：\n\n| 規格 | 數值 |\n|------|------|\n| 車長 | **4.06 m**（B 段 SUV）|\n| 電池 | **42.2 kWh LFP**（入門）；61 kWh NMC（7 月起）|\n| WLTP 續航 | **317 km**（42.2 kWh）；453 km（61 kWh）|\n| DC 快充 | **118 kW**；10→80% 29 分鐘 |\n| 德國起售價 | **€26,600**（實際可用版本 €30,000~35,000）|\n\n**評測優點**：舒適性超預期（B 段水準）、三聯螢幕、空間合理\n**主要缺點**：標配無內建導航（無 EV 路線規劃）、熱泵/22 kW 充電器需加購\n- 參見：[[sources/kia-ev2-first-drive-2026]]\n\n## Stellantis FaSTLAne 2030：€600 億 + STLA One 平台 + LFP（2026-05）\n\nStellantis 推出五年轉型計畫，以 29 款 BEV + STLA One 全新平台為核心：\n\n**STLA One 技術特色**：800V + LFP + Cell-to-Body + Qualcomm Snapdragon + **Wayve 手放式自駕**（類 Tesla FSD）\n**品牌重整**：Jeep / Ram / Fiat / Peugeot 獲 70% 投資；Chrysler / Dodge / Opel 降為地區品牌\n**目標**：2035 年 30 款車型，200 萬輛/年；開發週期縮至 **24 個月**；2028 年每年節省 €60 億\n**合作夥伴**：Wayve、Qualcomm、NVIDIA、CATL、Applied Intuition、零跑（Leapmotor）、東風/嵐圖\n- 參見：[[sources/stellantis-fastlane-2030]]\n\n## 北歐 EV 滲透率：挪威 98.6%、丹麥 81.9%（2026 年 4 月）\n\n| 國家 | BEV 占比 | 備注 |\n|------|---------|------|\n| **挪威** | **98.6%** | 前十名全為純電；VW ID.4 榜首 |\n| **丹麥** | **81.9%** | 一年前 63.3%；私人購車 96.3% 純電 |\n| 芬蘭 | 48.8% | Toyota Yaris Cross 榜首（ICE）|\n| 瑞典 | 42.0% | Volvo EX40 榜首 |\n\n北歐整體：**每三輛新車中有兩輛為純電**（~67%）\n意義：挪威/丹麥已是「成熟後 EV 市場」，芬蘭/瑞典仍在轉型，反映充電基礎設施和政策差距\n- 參見：[[sources/nordic-ev-april-2026]]\n\n## 歐洲 V2G 商業化起步：BMW 已啟動，德國官僚阻礙（2026-05）\n\n**已商業化 V2G 啟動**：BMW × E.ON（德國，已上線）；Ford × Octopus Energy（夏 2026）；VW Elli × Q4 2026；Renault/Mercedes × The Mobility House（2026 底）\n**V2G 就緒車型**：Renault 5、Ford Capri/Explorer、VW 多款、Mercedes GLC、**BMW iX3**\n\n**德國卡關原因**：\n- MiSpeL 監管框架未到位、電網費豁免立法未生效、稅務不確定、800+ 電網運營商難協調\n- 德國 2023/2024 峰會承諾 2025 年市場就緒，**目標未達成**\n\n峰會結論：「其他歐洲國家已走在德國前面」；推動歐盟統一動態電網信號標準\n- 參見：[[sources/europe-v2g-bidirectional-2026]] | [[concepts/充電基礎建設]]\n\n## Tesla FSD（監督版）在歐盟首個落地：立陶宛核准（2026-05）\n\n- **立陶宛**成為第一個正式認可 FSD（Supervised）的 EU 成員國\n- 法律依據：EU 2018/858 法規（成員國可互認其他成員國臨時型式核准）\n- 原始核准：荷蘭 RDW 核發；FSD 為 **SAE Level 2**（駕駛仍須監看）\n- 北歐國家（瑞典等）有保留意見；Tesla 轉向「先行者國家逐步擴散」策略\n- 同週：Tesla FSD 正式在**中國**上線（馬斯克訪中成果）\n- 參見：[[sources/tesla-fsd-eu-expansion-2026]]\n\n## Audi A2 e-tron：奧迪入門級純電車型，秋季亮相（2026-05）\n\n奧迪入門純電新車 **A2 e-tron** 偽裝測試車已公開，世界首演定於 **2026 年秋季**：\n\n| 項目 | 內容 |\n|------|------|\n| 定位 | 豪華緊湊型純電**入門**車 |\n| 首演 | **2026 年秋季** |\n| 生產廠 | 因戈爾施塔特（奧迪本廠）|\n| 平台推測 | **MEB**（最可能；SSP 未就緒，PPE 為大型車設計）|\n\n**測試進程**：冬季測試（拉普蘭冰雪）+ 風洞氣動（300 km/h，含聲學）+ 公路測試（Altmühltal 地區）\n**市場意義**：填補奧迪純電入門空缺；MEB 平台攤提成本後，豪華品牌平民化 EV 策略關鍵一步\n- 參見：[[sources/audi-a2-etron-testing-2026]]\n\n## 中國接管歐洲閒置工廠：系統性所有權轉移（2026-05）\n\n英媒 FT + 《每日電訊報》系統報導，多起中國車廠接手歐洲廠的案例同步發生：\n\n| 交易 | 說明 |\n|------|------|\n| **日產西班牙廠 → 奇瑞** | 計畫出售 |\n| **日產桑德蘭廠 ↔ 奇瑞** | 談判共享 |\n| **福特西班牙廠（部分）→ 吉利** | 計畫出售股份 |\n| **VW 歐洲廠 ↔ 上汽/小鵬** | 考慮共享裝配線 |\n| **比亞迪** | 「跟任何公司都在談」，廣泛尋廠 |\n\n**2026 年前 4 月**：NEV 占中國汽車出口 **44%**（五年前 7%）\n\n核心機制：EU 關稅 + IAA 本地化壁壘 → **反而逼出中歐工廠合作**（在歐製造才能規避）\n結果：歐洲車廠選擇「打不過就加入」；顧問直言「歐洲汽車製造所有權開始轉移給中國人」\n- 參見：[[sources/china-ev-europe-factory-takeover-2026]] | [[concepts/中國EV出海策略]]\n\n## Stellantis × 東風（嵐圖）法國 Rennes 廠：歐洲本地製造中國豪華 EV（2026-05）\n\nStellantis 宣布與東風汽車成立 **51:49 合資企業**，利用 Rennes 廠生產嵐圖（Voyah）豪華 BEV：\n- Rennes 廠現況：曾年產 40 萬輛，現僅 1/3 產能（Citroën C5 Aircross）\n- 交換條件：東風在中國生產 Peugeot + Jeep 車型\n- 義大利 Pomigliano 廠同步確認：2028 年生產零跑 E-Car 小型平價 EV\n- 更廣泛模式：歐盟關稅加速中國品牌本地化——BYD（匈牙利）、奇瑞（西班牙）、小鵬（奧地利/VW 廠商議中）、嵐圖（法國）\n- 參見：[[sources/stellantis-china-ev-europe-factories-2026]]\n\n## Škoda Epiq：VW Group 平價 EV 三劍客最終拼圖（2026-05）\n\nVW Group 三款緊湊平價 EV 完整亮相（ID.Polo + Cupra Raval + **Škoda Epiq**）：\n\n| 規格 | 數值 |\n|------|------|\n| 車長 | **4.17m**（符合歐洲計畫 M1e 小型車分類）|\n| 起售價 | **€25,900**（引流定價；實際可訂購版本 **€32,100**）|\n| 電池 × 功率 | Epiq 35 / 40：38.5 kWh LFP（85/99 kW）；Epiq 55：55 kWh NMC（155 kW）|\n| 後廂 | **475L + 25L 前備廂** |\n| V2G | **全版本預備**（V2G/V2H；硬體/費率未就緒）|\n\n- 完成 VW 小型 EV 矩陣，三款各瞄準不同品牌偏好消費者\n- 參見：[[sources/vw-id-polo-gti-2026]] | [[sources/cupra-raval-launch]]\n\n## Mercedes-AMG GT Electric：西方車廠最快充電 600 kW（2026-05）\n\nAMG.EA 平台首款車，技術指標打破西方車廠記錄：\n- **軸向磁通馬達**（YASA，Mercedes 2021 年收購）：業界首個量產應用\n- GT 63：1,153 hp，0-60 mph **2.3 秒**，WLTP ~700 km，**600 kW** 峰值充電（10→80% 約 11 分鐘）\n- 電池：106 kWh，NCMA + 含矽負極，~298 Wh/kg\n- 競品：Porsche Taycan（~320 kW）、BMW iX3（400 kW）；中國 BYD 已近 MW 級別\n- 參見：[[sources/mercedes-amg-gt-electric-2026]]\n\n## Volvo EX60 首駕：「史上最佳 Volvo」（2026-05）\n\n巴塞隆納首駕評測：\n- 評測人結語：「豪華中型 EV 已達比燃油車更好的階段」\n- P12 AWD（2026 後）：670 hp，117 kWh，~400 英里 EPA，0-60 **3.8 秒**\n- Google Gemini 視覺功能（Google I/O 展示）：透過車載攝影機辨識外界、翻譯路牌、推薦景點（發布日期待定）\n- 同週 Volvo EX30 泰國發生 2 起起火事故，凸顯 EV 品質管控複雜性（參見：[[sources/volvo-ex30-thailand-fire-2026]]）\n- 參見：[[sources/volvo-ex60-first-drive-2026]]\n\n- [[entities/BMW]]\n- [[concepts/中國EV出海策略]]\n- [[concepts/電動巴士市場]]\n- [[concepts/歐洲EV政策]]\n- [[concepts/充電基礎建設]]\n- [[concepts/電池技術路線]]\n- [[sources/leapmotor-t03-germany-2026]]\n- [[sources/china-ev-europe-challenges-2026]]\n- [[sources/cupra-raval-launch]]\n- [[sources/vw-id4-id5-battery-update]]\n- [[sources/mgs6-ev-first-drive]]\n- [[sources/opel-peugeot-long-range-delay]]\n- [[sources/byd-denza-europe-debut]]\n- [[sources/germany-ev-incentive-2026]]\n- [[sources/vw-id3-neo-premiere]]\n- [[sources/honda-eny1-withdrawal-europe]]\n- [[sources/nissan-chery-sunderland-plant]]\n- [[sources/uk-germany-ev-market-dynamics-2026]]\n- [[sources/volvo-ex60-production-2026]]\n- [[sources/europe-ev-pricing-apr2026]]\n- [[sources/vw-restructure-china-offensive-2026]]\n- [[sources/acea-eu-ev-q1-2026]]\n- [[sources/vw-id-polo-launch]]\n- [[sources/polestar-3-800v-upgrade]]\n- [[sources/audi-q4-etron-facelift-2026]]\n- [[sources/audi-a2-etron-testing-2026]]\n- [[sources/kia-ev2-first-drive-2026]]\n- [[sources/stellantis-fastlane-2030]]\n- [[sources/nordic-ev-april-2026]]\n- [[sources/europe-v2g-bidirectional-2026]]\n- [[sources/tesla-fsd-eu-expansion-2026]]\n- [[sources/china-ev-europe-factory-takeover-2026]]\n## 英國 ZEV Mandate 大幅下調：2030 年目標 80% → 50%（2026-06）\n\n英國首相 Starmer 決定顯著放寬零排放車強制目標：\n\n| 年份 | 原目標 | 最新方向 |\n|------|-------|--------|\n| 2026（現行）| 33% | 不變 |\n| 2030 | **80%** | **50%**（諮詢中；範圍 50~70%）|\n| 2035 | 100% | 亦可能調整 |\n\n- 驅動因素：**車廠與工會壓力**（裁員風險、投資威脅）\n- 政治背景：淨零大臣 Ed Miliband 被壓制；歐盟也已後退\n- 諮詢程序可能持續數月，尚未定案\n- **市場意涵**：英國短期 EV 銷售義務減輕，但供應鏈投資確定性下降\n- 參見：[[sources/uk-zev-mandate-relaxation-2026]]\n\n## Škoda Peaq：MEB+ 平台旗艦 SUV（2026-06-23 全球首映）\n\nŠkoda 首款超大型電動 SUV：\n\n| 版本 | 功率 | 電池 | 續航（WLTP）|\n|------|------|------|-----------|\n| Peaq 60（RWD）| 150 kW | 63 kWh | >460 km |\n| Peaq 90（RWD）| 210 kW | 91 kWh | **>600 km** |\n| Peaq 90x（AWD）| 220 kW | 91 kWh | >600 km |\n\n- 全長 4.90 公尺、軸距 2.97 公尺（Škoda 最大）；5 座或 7 座\n- 已完成 3 大洲 150 萬公里測試（亞利桑那沙漠到北極圈 -40°C）\n- 全球首映：**2026-06-23**\n\n## Tesla FSD（監督版）：比利時核准（第 5 個歐洲國家）\n\n比利時弗拉芒斯交通部長核准 Tesla FSD（Supervised）：\n- 歐盟已核准國家：荷蘭、立陶宛、丹麥 + 其他兩國，比利時為第 5\n- 技術基礎：160 萬公里歐洲測試；「純視覺 AI」（無雷達/LiDAR）\n- 每國獨立核准（無 EU 統一批准），仍屬臨時授權\n- 參見：[[sources/tesla-fsd-eu-expansion-2026]]\n\n## Related\n- [[sources/gwm-ora03-uk-exit]]\n- [[sources/netherlands-ev-scrappage-2026]]\n- [[sources/porsche-cayenne-coupe-electric]]"

      "body": "# 中國 EV 出海策略\n\n中國電動車廠以不同路徑進入海外市場，面對關稅壁壘、本地化壓力與品牌認知等挑戰。\n\n## 主要路徑\n\n| 路徑 | 代表案例 | 挑戰 |\n|------|---------|------|\n| 直接出口 | 比亞迪海鷗、奇瑞 QQ3 | 關稅壁壘（歐盟/美國） |\n| 高端品牌進入 | 比亞迪騰勢歐洲（€101,000~115,000）| 品牌認知建立需時 |\n| 技術授權/平台合作 | 零跑 × Stellantis Opel O3U（2028）| 歐洲本地化生產合規 |\n| 合資/技術授權 | 零跑 × Stellantis | 在地化要求、工會抵制 |\n| 在地組裝 | Stellantis Brampton 計畫（已遭拒）| 政治阻力 |\n| 海外研發+品牌建設 | 小米（慕尼黑研發中心）| 需時較長 |\n| 周邊市場布局 | 小鵬墨西哥（避開美國高關稅）| 市場規模有限 |\n| 自動駕駛商轉 | 文遠知行新加坡、百度 UAE | 各地法規差異大 |\n\n## 北美壁壘\n- 美國對中國 EV 關稅極高\n- 加拿大：每年 4.9 萬輛中國電動車享 6.1% 關稅（2026 年協議）\n- 美國明確表示：中國電動車不得透過加拿大「曲線進入」美國\n\n## 歐洲市場\n- 歐盟對中國電動車徵收反補貼稅\n- 小米計劃 2027 年進入，走高端品牌路線\n- Tesla 歐洲市場 2025 年萎縮近 30%，中國品牌試圖填補空缺\n\n## 日本市場\n- 比亞迪電動巴士佔日本市場 70%+\n- 鴻海 × 三菱FUSO 嘗試提供「非中國製」替代方案\n\n## 東南亞市場（2026 新動態）\n- **泰國**：比亞迪曼谷車展訂單奪冠（17,354 輛），中國品牌整體占 EV 訂單 2/3 以上\n- **馬來西亞**：比亞迪設廠談判觸礁（出口要求 + 最低售價條件未達共識），凸顯東南亞政府本土保護與引資的兩難\n- **新加坡**：文遠知行 × Grab 自駕接駁車實驗，繞開中國法規限制的商轉試驗場\n- **全球布局**：小鵬已進入 60 個國家/地區，墨西哥為拉丁美洲橋頭堡\n\n## 出口數據爆發（2026 年 3 月 → 4 月）\n\n| 月份 | NEV 出口 | YoY | 備註 |\n|------|---------|-----|------|\n| 2026 年 3 月 | 34.9 萬輛 | +140% | 歷史高（當時）|\n| **2026 年 4 月** | **43 萬輛** | **+110%** | **新歷史高** |\n\n- BEV 26 萬 (+85.4%)、PHEV 17 萬 (+180%)\n- 2025 年 11 月才首次超過 30 萬，短短幾個月已衝破 40 萬\n- **出口占 NEV 批發量比重**：2025 年 4 月 ~20% → 2026 年 4 月 **~32%**\n- 國內銷售 91.4 萬輛 YoY -10.8%（連 4 個月低於去年同期），出口強力補位\n- 驅動力：美伊衝突推升油價 → 全球消費者重新評估 EV 成本優勢\n- 乘聯會類比：類似 1970 年代石油危機日本省油車稱霸全球的歷史時機\n- 參見：[[sources/china-nev-april-2026]]\n\n## Q1 2026 出口加速：海外比重衝 22%，4 月持續飆升（2026-05）\n\n| 指標 | 數值 |\n|------|------|\n| Q1 2026 自主品牌 NEV 海外比重 | **22%**（+10pp YoY）|\n| 比亞迪 4 月海外 | **13.45 萬輛（+71%）** |\n| 吉利 4 月出口 | **8.32 萬輛（+245%）** |\n| 奇瑞 4 月出口 | **17.76 萬輛（+100%+）** |\n\n- 南美洲：中國品牌 NEV 滲透率 **>80%**\n- 東南亞：中國品牌 NEV 滲透率接近 **50%**\n- 全球中國品牌汽車市占：68.3%（2025）→ **61%**（Q1 2026）↓（但仍主導）\n- 參見：[[sources/byd-april-exports-q1-2026]]\n\n## 零跑 T03 德國 €49/月：訂閱制突破歐洲入門市場（2026-05）\n\n- 透過 Stellantis 通路 + €49/月租賃（含補貼），前 4 個月德國銷量 **+358%**（4,523 輛）\n- **策略轉型**：從「直接出口」→「借助本地通路 + 低月租滲透」\n- 競爭效果：已超越 Smart 和 Honda 德國銷量規模\n- 中國品牌 2026 年在德國預期獲補貼 **€30 億**\n- 參見：[[sources/leapmotor-t03-germany-2026]]\n\n## 進軍歐洲的現實障礙：售後服務與殘值（2026-05）\n\n以波蘭為案例分析（東歐最大汽車市場）：\n- **企業車隊**佔新車銷售 **67.7%**，但採購邏輯不同個人消費者\n- 車隊業者更在意：**維修效率 + 零件供應 + 品牌長期承諾 + 殘值**\n- Toyota 以完整服務網 + 殘值優勢主導波蘭（103,834 輛，第一）\n- 中國品牌第一階段靠低價打開能見度，但在某個規模後成長趨緩——「**服務網路 + 殘值 + 品牌信任**」才是突破企業車隊市場的核心\n- 參見：[[sources/china-ev-europe-challenges-2026]]\n\n## 摩根大通預測：2028 年拿下西歐 20%（2026-05）\n\n摩根大通亞太汽車研究主管 Nick Lai 2026-05-13 發布重大更新預測：\n\n| 指標 | 舊預估 | 新預估 |\n|------|-------|-------|\n| 西歐市占目標 | 2030 年 15% | **2028 年 20%** |\n| 2028 年德法英義出貨量 | — | **~250 萬輛** |\n\n→ 預測大幅提前且上調，主因：高油價 + 成本競爭力 + 海外利潤 4 倍於國內\n\n**利潤結構：為何即使有關稅仍獲利**\n\n| 市場 | 單車淨利 | 歐盟關稅（BEV）|\n|------|---------|-------------|\n| 中國國內 | ~人民幣 5,000 元 | — |\n| 歐洲出口 | ~人民幣 **20,000 元**（**4 倍**）| 30% |\n\n→ 30% 關稅之後仍有 4 倍利潤，出口動機極強。\n\n- 零和賽局：中國品牌主要侵蝕「第二梯隊外資」（非 Toyota/賓士頂尖品牌）\n- 零跑 × Stellantis：西班牙 Opel 廠新增零跑產線 + 慕尼黑研發中心成立\n- 參見：[[sources/jpmorgan-china-ev-europe-2028]]\n\n## 歐洲在地製造新進展（2026-05）\n\n| 動態 | 模式 |\n|------|------|\n| **Ford 西班牙廠**（傳聞）| 可能與吉利合作，甚至「吉利製造、Ford 貼牌」|\n| **吉利 × 雷諾 Brazil** | 吉利取得巴西工廠 26.5% 股份，共享產能 |\n| **VW 閒置產能** | 減產 100 萬輛後可能供中國品牌代工 |\n| **Stellantis × 零跑** | 廠房 + 通路 + 品牌資源授權，加速歐洲滲透 |\n\n中國車廠正從「出口」轉型為「嵌入歐洲生產體系」，繞開關稅壁壘。\n- 參見：[[sources/china-nev-april-involution-2026]]\n\n## 馬來西亞 CBU EV 新規：保護主義深化（2026-05）\n\n- 2026-07-01 起：CBU EV 需 CIF ≥ RM20 萬 + 最低 180kW\n- 比亞迪受雙重夾擊（CKD 廠停工 + CBU 高門檻）\n- 東南亞保護主義趨勢：泰國（80% 出口要求）→ 馬來西亞（高 CIF 門檻）\n- 參見：[[sources/malaysia-cbv-ev-regulation-2026]]\n\n## 比亞迪韓國：11 個月破萬輛（進口車史上最短）\n\n- 2025-04-14 首批交付，2026-03 突破 1 萬輛（10,075 輛）\n- Tesla 花了 3 年達成相同里程碑；比亞迪僅 11 個月\n- **個人買家 79%**（優於進口車市場均值 65%），顯示非靠法人車隊\n- Sea Lion 7（個人客 51.5%）為主力；ATTO 3 主打法人\n- 通路從 15 展廳 / 11 服務中心 → 32 展廳 / 17 服務中心（2026-04），2026 年底目標 35/26\n- 參見：[[sources/byd-korea-10k-record-2026]]\n\n## 川習會後美國市場：「不是會否，而是何時」（2026-05-14）\n\n2026-05-14 川習會後，路透報導：中國電動車進入美國「已從不可能轉為時機問題」。\n\n**三條可能路徑**：\n1. 削減三位數進口關稅\n2. 在美本土製造（比亞迪加州電動巴士廠：成本低 30%，70% 本地零件）\n3. 技術授權（Ford × CATL 模式）\n\n**市場訊號**：40% 美國消費者願考慮中國品牌；中國品牌可提供 <$12,000 選項 vs 美國均價 $50,000+\n- 參見：[[sources/china-ev-us-market-2026]]\n\n## Stellantis 雙廠策略：歐洲本地製造中國 EV（2026-05）\n\nStellantis 正式確認用歐洲閒置工廠為中國品牌代工，是「關稅倒逼在地化」的典型案例：\n\n| 工廠 | 中國合作方 | 車型 | 時程 |\n|------|---------|------|------|\n| 義大利 Pomigliano | 零跑汽車 | E-Car（小型平價 EV）| **2028 年起** |\n| 法國 Rennes | 東風汽車（嵐圖 Voyah）| 豪華 BEV | Stellantis 持股 51% 合資 |\n\n- Rennes 廠目前僅 1/3 產能（只建 Citroën C5 Aircross）；新協議填補空置\n- 歐盟關稅原意保護本土廠，結果加速中國品牌以「歐洲製造」規避：**BYD（匈牙利）、奇瑞（西班牙）、小鵬（奧地利）、零跑（西班牙）、嵐圖（法國）**\n- 參見：[[sources/stellantis-china-ev-europe-factories-2026]]\n\n## 小鵬擬收購 VW 閒置歐洲工廠（2026-05）\n\n小鵬確認正與合作夥伴 VW 商討收購其歐洲工廠事宜：\n- 背景：小鵬 4 月出口 **6,006 輛**（歷史新高），奧地利廠趨於飽和\n- VW 2025 年 12 月已關閉一座德國工廠（閒置可用）\n- 若不成，考慮在歐洲新建工廠\n- 此模式與 Archion 合作（日本）、Magna Steyr（奧地利）形成體系：**以合作降低進入壁壘**\n- 參見：[[sources/xpeng-vw-europe-factory-2026]]\n\n## 中國 K-Car 概念：規範平價微型 EV 打開新興市場（2026-05）\n\nCPCA 秘書長崔東樹提議建立中國版「K-Car」標準（規範車身尺寸、馬力上限、最低續航、C7 駕照）：\n- 解決：「老頭樂」非法市場（83 萬起事故，1.8 萬死亡，2012-2016）\n- 目標人群：老年與農村消費者（電動化需求但主流車廠未覆蓋）\n- 出海潛力：東南亞、印度（$5,000–$15,000 市場），比亞迪/豐田已有類似產品\n- 參見：[[sources/china-k-car-micro-ev-concept-2026]]\n\n## 中國接管歐洲閒置工廠：從「打不過就加入」到所有權轉移（2026-05）\n\nFT、《每日電訊報》等英媒系統報導，中國車廠大規模收購/使用歐洲閒置工廠：\n\n| 案例 | 歐洲方 | 中國方 | 狀態 |\n|------|--------|--------|------|\n| 西班牙薩拉戈薩廠 | **Stellantis** | **零跑汽車** | 已確認（5/8 宣布）|\n| 法國 Rennes 廠 | **Stellantis** | **東風/嵐圖** | 51:49 合資 |\n| 西班牙廠 | **日產** | **奇瑞** | 計畫出售 |\n| 英國桑德蘭廠 | **日產** | **奇瑞** | 談判共享 |\n| 西班牙廠（部分）| **福特** | **吉利** | 計畫出售股份 |\n| 歐洲廠（未定）| **VW** | **上汽/小鵬** | 考慮共享裝配線 |\n| 匈牙利廠 + 廣泛尋廠 | — | **比亞迪** | 自建 + 「跟任何公司都在談」|\n\n**關鍵數據（2026 年前 4 月）**：中國汽車出口中 NEV 占比 **44%**（五年前僅 7%）\n\n**歐洲車廠心態**：恐懼抵制 → 關稅保護 → 無法競爭 → **開放合作**\n**弔詭結果**：歐盟關稅與 IAA 本地化要求，反而加速了中國車廠使用歐洲工廠（規避關稅）\n\n汽車顧問 Simon Vicca：「這實際上標誌著歐洲相當一大部分汽車製造所有權開始轉移給中國人。」\n\n- 參見：[[sources/china-ev-europe-factory-takeover-2026]] | [[sources/stellantis-china-ev-europe-factories-2026]]\n\n## SAIC/MG 宣布西班牙建廠（2026-06）\n\nMG Motor（上汽 SAIC 旗下）在西班牙加利西亞建設歐盟首座中國品牌整車廠：\n- 投資：~€2 億歐元；年產能目標：12 萬輛\n- 採「在歐洲、為歐洲」策略，規避最高 35.3% 的歐盟進口關稅\n- 繼 BYD 匈牙利廠後，第二個中國品牌在歐洲本土製造的實例\n- 參見：[[sources/mg-saic-spain-factory-2026]]\n\n## 奇瑞 Sunderland 代工正式確認（2026-06）\n\n日產正式確認將在英國桑德蘭廠為奇瑞生產乘用車：\n- 日產利用閒置產能（50%），奇瑞取得「英國製造」標籤規避關稅\n- 奇瑞同期藉 Tata Avinya 平台授權進入印度，形成「平台輸出+代工」雙輪策略\n- 輕資產路線（奇瑞）vs 重資產路線（SAIC 建廠）的鮮明對比\n- 參見：[[sources/nissan-chery-sunderland-deal-2026]]\n\n## 比亞迪 Flash Charging 歐洲擴張：充電網絡隨整車出海（2026-06）\n\n比亞迪第二代 Flash Charging 充電樁網路正式向歐洲延伸，是整車出海的重要配套：\n\n| 項目 | 數值 |\n|------|------|\n| 歐洲計畫（12 個月）| **3,000 座** Flash Charging 站 |\n| 全球計畫（12 個月）| **6,000 座**（中國以外）|\n| 目標定價 | **< 50 便士/kWh**（~58 歐分），BYD UK 主管 Bono Ge 透露 |\n| 首批德國現蹤 | 2026-06 内部活動現身，首次對外曝光 |\n| 中國已建 | 6,100 座（300+ 城市，截至 2026-05 底）+ 中石化合作加速 |\n| 最高功率 | 1,500 kW（第二代，雙槍 T 型，上懸液冷纜線）|\n\n→ BYD 充電網路是「整車 + 充電生態」一體化出海的體現：車賣到哪裡，充電網建到哪裡\n→ 目標定價低於歐洲現行商業充電均價（歐洲 Ionity 約 €0.79/kWh），是競爭差異點\n- 參見：[[sources/byd-flash-charging-europe-2026]] | [[concepts/充電基礎建設]]\n\n## 比亞迪列入美國 DoD 軍工企業名單（2026-06-08）\n\n美國國防部將比亞迪及宇樹科技列入《中國軍事公司名單》（Section 1260H）：\n- 非制裁名單，但限制 DoD 及聯邦承包商採購\n- 可能引發國會、州政府進一步立法（如電動巴士採購禁令）\n- 與 IRA 外國敏感實體條款疊加，長期影響 BYD 在美融資/上市可能性\n- 參見：[[sources/byd-dod-military-list-2026]]\n\n## 澳洲：中國EV首次超越日系車（2026-06）\n\n中國電動車品牌在澳洲市場份額**首次超越日系品牌**，終結日系車 **28 年**的澳洲市場主導地位：\n- 代表品牌：BYD Atto 3、MG ZS EV、GWM Ora\n- 澳洲零進口關稅（vs 歐盟 35.3%）是低門檻進入的關鍵條件\n- 澳洲聯邦政府議員公務車清單新增 **7 款中國EV**\n- 意義：無壁壘市場中中國品牌競爭力的最純粹測試\n- 參見：[[sources/australia-china-ev-milestone-2026]]\n\n## BYD 匈牙利廠勞工爭議（2026-06-05）\n\n中國勞工通訊（CLW）發布報告，揭露 BYD 匈牙利科馬羅姆廠問題：\n- **債務束縛**：移工支付高額招募費，實質形成人身束縛\n- **非法簽證**：部分工人持旅遊/商務簽證工作\n- **超時工作**：工時超過匈牙利及 EU 法規上限\n- 時機敏感：恰逢 EU 供應鏈盡職調查法規（CSDDD）強制期實施\n- 影響：可能引發 ESG 評級下調、歐洲政府採購限制\n- 參見：[[sources/byd-hungary-labour-report-2026]]\n\n## Leapmotor C10 馬來西亞在地組裝（2026-06）\n\n零跑汽車（Leapmotor）C10 在馬來西亞本地組裝，透過 Stellantis 通路進行：\n- 成為 **Stellantis 在東南亞首款本地生產車型**\n- 符合馬來西亞在地生產優惠條件，規避進口高門檻（CBU 新規 RM20 萬+180kW）\n- 零跑「技術+通路授權」模式（←Stellantis）的東南亞延伸\n- 參見：[[concepts/東南亞EV市場]]\n\n## 負面案例：大阪世博中國電動巴士安全事故（2026-05）\n\n190 輛中國產電動巴士用於大阪世博（2025–2026），出現：\n- 煞車軟管摩擦、車軸損壞、方向盤操作失靈等**致命安全缺陷**\n- 進口商 EVMJ 申請破產，75 億日圓購車款回收存疑\n- 日本市場對中國電動車信任危機加深\n- 參見：[[sources/osaka-expo-chinese-ebus-defect-2026]]\n\n## Related\n- [[entities/比亞迪]]\n- [[entities/小米汽車]]\n- [[entities/Stellantis]]\n- [[entities/零跑汽車]]\n- [[entities/小鵬汽車]]\n- [[entities/文遠知行]]\n- [[concepts/北美EV關稅與政策]]\n- [[concepts/歐洲EV政策]]\n- [[concepts/東南亞EV市場]]\n## Bontu 中國微型電動車進入歐洲（2026-06，米蘭）\n\n中國微型電動車品牌 Bontu（2020 年成立，山東新泰）在米蘭發布會正式進軍歐洲市場：\n\n| 車型 | 類別 | 功率 | 電池 | 續航 |\n|------|------|------|------|------|\n| BT09（minicar）| L6e/L7e | — | 7.68~10 kWh | 130~150 km |\n| BTE05（乘用微車）| L7e | — | 13.9~18.1 kWh | 170~222 km |\n| BTE03（迷你運輸）| L7e | 7.5 kW | 8.35 kWh | 80~100 km |\n\n- BTE05：長 3 公尺，A 段空間感，標配 ABS/安全氣囊/冷氣/12 吋觸控螢幕\n- BTE03：長 3.56 公尺，承載 340 kg，最速 81 km/h，城市物流主攻\n- 中國已在大城市物流廣受採用；歐盟 L6e/L7e 免 B 照（部分國家）→ 降低進入門檻\n- 代表趨勢：中國「K-Car」概念向歐洲延伸，搶佔最後一哩物流與微型通勤市場\n\n## 日產 N7 以「Primera EV」名義進軍菲律賓（2026-Q4）\n\n日產中國合資車型 N7 首次輸出海外：\n\n| 規格 | 數值 |\n|------|------|\n| 上市時程 | **2026 年 Q4**（菲律賓）|\n| 車身 | 4,930 mm，軸距 2,900 mm |\n| 版本 A | 160 kW + 58 kWh LFP，540 km CLTC |\n| 版本 B | 200 kW + 73 kWh LFP，635 km CLTC |\n| 商標申請 | 阿曼、巴林、馬來西亞（東南亞+中東多市場布局）|\n\n- 菲律賓為 N7 **首個中國以外市場**\n- 日產借東風合資（Dongfeng）出口 N7 至拉美 + 東南亞\n- 復刻「Primera」品牌名稱（ICE 時代 2000 年代停用），重走品牌記憶牌\n\n## Related\n- [[concepts/電動巴士市場]]\n- [[sources/china-ev-europe-factory-takeover-2026]]\n- [[sources/xpeng-mexico-launch]]\n- [[sources/byd-denza-europe-debut]]\n- [[sources/stellantis-opel-leapmotor-suv]]\n- [[sources/thailand-ev-market-2026]]\n- [[sources/byd-malaysia-factory-negotiation]]\n- [[sources/china-ev-export-record-march-2026]]\n- [[sources/europe-robotaxi-verne-ponyai]]\n- [[sources/byd-korea-10k-record-2026]]\n- [[sources/china-ev-us-market-2026]]\n- [[sources/osaka-expo-chinese-ebus-defect-2026]]"

      "body": "# 電池技術路線\n\n電動車電池技術當前以 LFP（磷酸鐵鋰）與 NMC/NCM（三元鋰）為兩大主流，鈉離子電池進入規模化元年（2026），固態電池與 4680 大圓柱在研發及量產推進中。\n\n## 主流技術比較\n\n| 技術 | 優勢 | 劣勢 | 代表廠商 |\n|------|------|------|---------|\n| LFP（磷酸鐵鋰）| 成本低、壽命長、熱穩定性佳 | 能量密度偏低 | 寧德時代、BYD、鴻海（高雄廠）|\n| NMC/NCM（三元）| 高能量密度、長續航 | 成本高、熱失控風險 | SK On、LGES、三星SDI |\n| 方形（Prismatic）| 結構強固、空間利用率高 | 設計靈活度低 | 三星SDI、CATL |\n| 圓柱（Cylindrical）| 標準化易製造 | 組裝工序複雜 | LGES、億緯鋰能、特斯拉（4680）|\n| 軟包（Pouch）| 設計靈活 | 結構脆弱 | LGES |\n\n## 各技術路線動態（2026）\n\n### Tesla 4680 大圓柱\n- 2026 年進入穩定量產\n- 垂直整合：電池→整車→Optimus 機器人，降低邊際成本\n- 參見 [[sources/tesla-4680-musk-strategy]]\n\n### 鈉離子電池（SIB）\n- 2026 年為規模化元年\n- 中科院 PNE 技術突破熱失控問題\n- 成本優勢：無鋰、無鈷，適用低端 EV 與 ESS\n- 參見 [[concepts/鈉離子電池]]\n\n### 高鎳 NMC — 歐洲豪車偏好（三星SDI 訂單確認）\n- 三星SDI 已供應 BMW、VW，**2026-04-20 正式簽署賓士合約**\n- 賓士 MMA 平台（A-Class/CLA 等級 EV，2028 年交付）採用**高鎳 NMC**（非方形 Prismatic，早期報導有誤）\n- 合約規模：數十 GWh，合約金額 >10 兆韓元（約 €58 億）\n- 雙方附加：聯合下一代電池研發協議\n- 歐洲豪車廠趨向高鎳 NMC：高能量密度 + 豪車性能需求\n- 參見 [[sources/samsung-sdi-mercedes-battery-deal]] | [[sources/samsung-sdi-mercedes-confirmed-deal]]\n\n### LFP 自製化趨勢\n- 鴻海高雄電池中心：1.27 GWh，2026 年量產\n- 電池佔整車成本 >30%，自製可壓低成本\n- 參見 [[sources/foxconn-cdms-ev-vertical-integration]]\n\n### 寧德時代超級科技日（2026-04-22）\n- **神行 III LFP**：6 分鐘充電（10→98%），超越比亞迪的 9 分鐘\n- **麒麟 III NMC**：單次充電 **1,000 公里**\n- **麒麟凝聚態**：1,500 公里，固態-凝聚態電解質，源自電動航空\n- **鈉新 II 鈉離子電池**：400~600 公里，Q4 2026 大規模量產\n- 參見：[[sources/catl-super-tech-day-2026]]\n\n### LGES × BMW：100 GWh 46 系列圓柱大單（2026-04-30）\n\n| 格式 | 應用 | 合約 |\n|------|------|------|\n| **4695**（46mm × 95mm）| BMW iX3/i3/i7（Neue Klasse）| ~10 兆韓元（€58 億），10 年 |\n| **46120**（46mm × 120mm）| BMW iX5 等大型車 | 同合約範圍內 |\n\n- LGES 與 BMW BEV 合作首次（過去僅供 BMW 混合動力）\n- LGES 亞利桑那廠 2026 年底完工，地理位置對應 BMW Spartanburg 廠（X5）\n- LGES 46mm 客戶：Rivian、奇瑞、Mercedes-Benz + 可能的 BMW\n- 參見：[[sources/lges-bmw-46series-order]]\n\n### 固態電池（重要里程碑，2026）\n\n#### 日產（Nissan）固態電池研發進度\n- **技術驗證**：完成 **23 層電芯堆疊**測試（關鍵製造工程突破）\n- 性能目標：\n  - 能量密度：**2 倍**於現行鋰離子電池\n  - 充電時間：**1/3**（≈ 15 分鐘充滿）\n- **量產目標：FY2028**（2028-04 開始，橫濱廠）\n- 固態電解質：氧化物系（自研，不使用硫化物）\n- 參見：[[sources/nissan-solid-state-battery-2028]]\n\n#### 各廠固態電池時程比較\n| 廠商 | 目標量產時間 | 狀態 |\n|------|------------|------|\n| 豐田 | FY2027 | 高壓氧化物固態，小批量 |\n| 日產 | FY2028 | 23 層堆疊驗證完成 |\n| 本田 | 2020 年代後期 | 試製線建設中 |\n| 三星SDI | **2027H2** | **進入量產開發階段**（研發人力50%轉調量產部門，2026-04）|\n\n- 整體而言：固態電池 **2027~2028 年**開始進入小量商用，需 2030+ 才可能規模化\n- 三星SDI 固態電池應用多元化：EV → 人形機器人、航空系統、穿戴裝置\n- 參見：[[sources/samsung-sdi-solid-state-production-2026]]\n\n## EV 電池壽命實測數據（Recurrent，2026）\n\n| 指標 | 數值 |\n|------|------|\n| 分析樣本 | **10 億英里**駕駛數據 |\n| 3 年後電池保留容量 | **97%** |\n| 5 年後電池保留容量 | **95%** |\n| MY2023 EV 仍超 EPA 續航比例 | **68%** |\n\n- 幾乎無品牌顯示顯著容量衰退：Cadillac、Ford、Hyundai、Mercedes、Rivian 均無問題\n- 意義：電池長期耐久焦慮可有效消弭——實測數據遠優於消費者認知\n- 壽命擔憂已從「電池衰退」轉向「電池替換成本」議題\n- 參見：[[sources/ev-battery-longevity-2026]]\n\n## 極氪 Golden Battery：400V 平台實現 230kW 快充（2026-05）\n\n| 規格 | 數值 |\n|------|------|\n| 電池化學 | **LFP**（磷酸鐵鋰）|\n| 電量 | **61 kWh** |\n| 架構 | **400V**（非 800V）|\n| DC 快充峰值 | **230 kW** |\n| 10→80% | **18 分鐘** |\n| 搭載車型 | 極氪 X 2026 款歐洲版 |\n\n- Golden Battery：吉利極氪（Zeekr）自研技術，2023 年底推出，已搭載極氪 001\n- 改良化學成分 + 優化 BMS：高能量密度 + 高快充能力 + 長壽命並存\n- **技術意義**：400V 平台業界通常限於 100~150kW，打破「高壓才能超快充」慣例\n- 對比：Porsche Taycan 800V 架構實現 270kW；極氪在 400V 下達到 230kW，差距大幅縮小\n- 參見：[[sources/zeekr-x-2026-europe]] | [[entities/吉利汽車]]\n\n## 歐洲電池本土製造連續受挫（2026）\n\n| 廠商 | 國家 | 規模 | 命運 |\n|------|------|------|------|\n| Northvolt | 瑞典 | 數百 GWh 計畫 | 2024 年破產 |\n| **Morrow Batteries** | 挪威 | 1 GWh（已建）/ 43 GWh（計畫）| **2026 年破產** |\n\n**共同失敗因素**：規模不足 → 難以供應大車廠、融資失敗、電池市場價格持續下滑、量產爬坡困難\n\n→ 歐洲電池本土製造希望轉向**亞洲廠商在歐洲本地化**（CATL 匈牙利、三星SDI 匈牙利、SK On 匈牙利），純歐洲新創路線基本宣告失敗。\n\n- 歐洲 2030 年產能目標大幅腰斬\n- 主因：EV 需求放緩 + 中國廠商成本競爭 + 技術路線不確定\n- 參見：[[sources/europe-battery-capacity-cuts]] | [[sources/morrow-batteries-insolvency]]\n\n## 印度電池 R&D 投資：降低中國依賴（2026-05）\n\n| 集團 | 子公司/部門 | 地點 | 投資規模 | 電池技術 |\n|------|----------|------|---------|---------|\n| Tata | **Agratas** | 班加羅爾 | **>$4 億** | LFP + LMFP |\n| JSW | JSW Motors | 馬哈拉施特拉邦 | **>$5 億**（5~6 年）| 本地化開發 + SDV |\n\n- 兩集團目前仍從中國採購關鍵零件，此為提前布局的替代方案\n- 中國正收緊電池技術出口管制 → 印度企業加速建立國內 IP\n- 參見：[[sources/india-tata-jsw-battery-rd-2026]]\n\n## 商用車電池規格\n- 戴姆勒巴士採用 NMC4：能量密度提升 13%，2029 年柴油城市巴士退場\n- 氫燃料電池：重型長途適用，豐田布局歐洲 Cellcentric\n- 參見 [[concepts/氫燃料電池商用車]]\n\n## EREV（增程型電動車）電池：SK On 先行量產（2026-05）\n\nEREV 介於 HEV 與 BEV 之間的新興動力架構，被視為 BEV 普及前的「過渡方案」：\n\n| 架構 | HEV | EREV | BEV |\n|------|-----|------|-----|\n| 電池容量 | <2 kWh | **~40 kWh** | 60–100+ kWh |\n| 引擎角色 | 協同驅動 | 僅充電 | 無 |\n| 續航 | 普通 | **~1,000 km** | 400–700 km |\n\n- **SK On** 確認 2026H2 韓國瑞山廠量產 EREV 用 NCM 袋型電池\n- 供貨 Hyundai，可能搭載 2027 Genesis GV70\n- 整車廠追求者：Hyundai、GM、Ford、Stellantis、VW 均加速開發 EREV 車型\n- 美國市場 2040 年 EREV 預測市占 **~8%**，與 BEV 相當\n- 參見：[[sources/sk-on-erev-battery-hyundai-2027]]\n\n## LGES 入股芬蘭正極材料廠（2026-05）\n\n歐洲電池供應鏈本地化新進展：LGES 收購 **Espring Finland New Materials 1.7% 股權**：\n- Espring：FMG 30% + 當升科技（中國）70% 合資，科特卡市廠，€8 億，**6 萬噸/年正極材料**，2027 年投產\n- LGES 用途：供給波蘭弗羅茨瓦夫廠（12 GWh，含 46 系列圓柱電池產線）\n- 意涵：中國仍主導正極材料（70% 股份），LGES 以少數股份確保供應同時降低西方政治風險\n- 參見：[[sources/lges-finland-cathode-plant-2026]]\n\n## Mercedes-AMG GT：軸向磁通馬達首量產應用（2026-05）\n\nAMG.EA 首款車，技術突破：\n- **YASA 軸向磁通馬達**：業界首個量產應用，比傳統徑向馬達輕 67%、短 67%\n- 電池：106 kWh，**NCMA 正極 + 含矽負極**，~**298 Wh/kg** 能量密度\n- 冷卻：電池模組浸泡冷卻液（Immersion cooling），按需模組級冷卻\n- 充電：**600 kW 峰值**（西方車廠最高），10→80% 約 11 分鐘\n- 含矽負極是提高能量密度的關鍵方向，已成為 2026 年高端 BEV 趨勢\n- 參見：[[sources/mercedes-amg-gt-electric-2026]]\n\n## 贛鋒鋰業 500 Wh/kg 固態電池試量產：鋰金屬路線突破（2026-05）\n\n中國鋰業龍頭**贛鋒鋰業（Ganfeng Lithium）**達成固態電池關鍵里程碑：\n\n| 電池 | 能量密度 | 狀態 |\n|------|---------|------|\n| 鋰金屬固態（10 Ah）| **500 Wh/kg** | **小批量試量產**（業界首個 10 Ah 固態產品）|\n| 固態電池 | **400 Wh/kg** | 超過 **1,100 次循環**，完成工程驗證 |\n| 半固態 | **650 Wh/kg** | 3 個月前已宣布量產 |\n\n**兩條技術路線**：矽碳負極（320–480 Wh/kg，較成熟）+ 鋰金屬負極（500 Wh/kg+，高密度路線）\n**客戶**：現代汽車（供應中）、長安（2026 年試裝 400 Wh/kg）、東風（350 Wh/kg 極寒測試）\n**目標市場**：豪華 EV、無人機、**eVTOL 飛行器**、機器人\n\n→ 500 Wh/kg 約為現行 NMC 的 1.5~1.7 倍，固態電池商業化進展至「工程驗證 → 試量產」階段\n- 參見：[[sources/ganfeng-solid-state-500wh-2026]]\n\n## SVOLT 半固態電池 2026 年 9 月量產：量產時程大幅提前（2026-05）\n\n長城汽車旗下電池廠 **SVOLT**（中國第十大電池製造商）宣佈大幅提前量產計畫：\n\n| 指標 | 數值 |\n|------|------|\n| 量產時程 | **2026 年 9 月**（原計畫 2027 年）|\n| 第一代能量密度 | **300 Wh/kg** |\n| 第二代目標 | **360 Wh/kg**（研發中）|\n| 量產成本目標 | 與液態電解質鋰電池**持平** |\n| 首批規格 | 100 kWh 版本同步大規模量產 |\n\n**半固態 vs 固態定位**：\n- 電解質採液態 + 固態**混合**，介於傳統鋰電與完全固態之間\n- SVOLT CEO 楊紅新：完全固態電池商業化需「非常長期的努力」，半固態為近期主導路線\n- 潛在客戶：**MINI 品牌**（長城 × BMW JV，未官方確認）\n\n→ 半固態電池進入量產，填補「傳統鋰電 → 完全固態電池」之間的商業化空白\n\n- 參見：[[sources/svolt-semi-solid-state-battery-2026]]\n\n## 中國收緊電池技術出口管制（2026-05）\n\n信實工業（Reliance）案例揭示中國技術封鎖的實際影響：\n- 信實 × CATL 技術轉移談判**破裂**（中方不願轉移電芯生產技術）\n- 信實轉向與廈門**海辰儲能**合作，但進展不順\n- 最終策略：直接**採購 CATL 成品組件組裝**（放棄 IP 自主性）\n- 廣義影響：全球多個希望在地生產電池的國家面臨相同困境\n- CATL 的策略邏輯：守住技術壁壘（不輸出技術），樂於出口成品（賺收入）\n- 參見：[[sources/china-catl-battery-tech-export-2026]] | [[sources/india-tata-jsw-battery-rd-2026]]\n\n## 福斯「三足鼎立」電池供應體系：引進三星SDI 歐製方形電池（2026-06）\n\n市場傳出 VW 將引進三星SDI 作為第三家核心電池供應商，在匈牙利廠增設 2 條產線，最快 **2027 年**落地：\n\n| 供應方 | 角色 |\n|--------|------|\n| PowerCo（自製）| 標準電池自主 |\n| 國軒高科（Gotion）| LFP 供應（中資）|\n| **三星SDI（新）** | **歐製方形電池，規避 IAA 法規** |\n\n- 三星SDI 選擇匈牙利廠：「南韓技術 × 歐洲製造」建立法規防火牆（EU IAA 本地化要求）\n- 推動三星SDI 加速 LFP 技術布局（原擅長 NCM 三元）\n- 連結：三星SDI 亦傳為 VW Unified Cell 供應商（6/5 報導）\n- 參見：[[sources/vw-samsung-sdi-europe-battery-2026]]\n\n## 電池二次利用（Second Life）：Waymo×B2U + 科羅拉多立法（2026-06）\n\n- Waymo 與 B2U Storage Solutions 合作，將退役 I-Pace Robotaxi 電池組改裝為定置儲能系統\n- EV 電池退役標準：容量降至 70-80%，但仍可作儲能使用 5-10 年\n- 科羅拉多州：美國首州立法要求 **2029 年起禁止電池填埋**，2035 年前達 **80% 鋰回收率**\n- 對比歐盟《電池法》2030 年回收目標 50%，科羅拉多目標更嚴\n- 參見：[[sources/waymo-battery-secondlife-colorado-recycling-2026]]\n\n## GM LMR 電池：考慮取代 LFP 作為主力（2026-06）\n\nGM 電池主管 Kurt Kelty 宣布 LFP 可能不進入 GM 高量車型組合，LMR（鋰錳富化）是首選：\n\n| 化學品 | 能量密度 | 成本 | GM 策略 |\n|--------|----------|------|---------|\n| LFP | 中 | 低 | 2027 Bolt 過渡期用，之後可能捨棄 |\n| **LMR** | **LFP +33%** | **相當** | **「主力電池（workhorse）」** |\n| NMC | 高 | 高 | 旗艦車款 |\n\n- GM + LGES：計畫 **2028 年美國量產 LMR 方形電芯**\n- Ford 同樣在開發 LMR（相同邏輯：低成本+高密度）\n- 風險：LMR 尚在脫離實驗室，真實世界驗證仍不足\n- 參見：[[sources/gm-battery-diversification-2026]]\n\n## Stellantis × Factorial：Dodge Charger 半固態電池實車測試（2026-06）\n\n| 指標 | 數值 |\n|------|------|\n| 合作方 | Stellantis × Factorial Energy（麻薩諸塞州新創）|\n| 電池類型 | 半固態（FEST 電芯，凝膠電解質）|\n| 能量密度 | **375 Wh/kg**（傳統鋰電 200~300 Wh/kg）|\n| 充電速度 | **15→90% 18 分鐘**（原 Daytona：10→80% 30 分鐘）|\n| 工作溫度 | -22°F~113°F（-30°C~45°C）|\n| 測試車 | Dodge Charger Daytona EV 原型車 |\n\n- 前例：Factorial 半固態電芯曾裝入 Mercedes EQS 原型，跨歐洲公路行駛 749 英里單充\n- 此次是 Stellantis 首次**真實道路測試**，為 Factorial 全固態 Solstice 電池的前期驗證\n- 參見：[[sources/gm-battery-diversification-2026]]\n\n## Tesla LFP 前驅體：台灣立凱電能（2026-06）\n\nTesla 正建立北美自主 LFP 前驅體供應鏈，台灣立凱電能（ALEEES）為關鍵夥伴：\n- 供貨啟動：2027-07，首年 1.2 萬噸 → 2028 年滿載 5 萬噸\n- Tesla 德州 Megafactory（40~50 GWh ESS）若全速，前驅體需求估達 40~50 萬噸\n- 建立路徑：立凱 LFP 專利保護繞開中國技術封鎖\n- 美國 LFP 市場：LGES 最有機會突破中國專利；億緯鋰能（中資）在美前兩廠被包下\n- 參見：[[sources/tesla-lfp-taiwan-2026]]\n\n## EU Battery Booster Facility：€15 億免息貸款正式啟動（2026-06）\n\n歐盟以 ETS 碳稅收入支持歐洲電芯本土化：\n- 規模：**€15 億免息貸款**（原 €18 億，差額撥入原材料計畫）\n- 資格：僅限爬坡期（ramp-up）+ 第一座廠 + ≥10 GWh 年產能\n- 受益方：ACC（Stellantis/Mercedes/Total）、Verkor（雷諾）、PowerCo（VW）\n- 上限 €5 億/企業（理論上最多 3 家受益）\n- 設計針對 Northvolt 失敗教訓：爬坡期高廢品率是商業化最大難關\n- 參見：[[sources/eu-battery-booster-2026]]\n\n## CATL CEO 對固態電池潑冷水：2030 年大規模量產不可能（2026-06）\n\nCATL CEO 曾毓群接受《財經》訪問明確表態：\n\n| 項目 | 現況 |\n|------|------|\n| 技術成熟度（TRL）| **4/9**（實驗室驗證階段）|\n| 電解質路線 | 硫化物固態電解質 |\n| 試產能量密度 | **500 Wh/kg** |\n| 成本 vs 傳統鋰電 | **3~5 倍** |\n| 首批小量目標 | **2027 年** |\n| 初期應用場景 | **>¥25 萬（~€3.2 萬）豪華車** |\n\n- **曾毓群判斷**：2030 年之前大規模商業化「不可能」，仍需技術突破\n- 對比廣汽、上汽等聲稱 2026~2027 年固態電池「上車」，CATL 立場明顯保守\n- CATL 已加入 CASIP 國家固態電池協同平台（2024 初），目標 2030 年建立競爭性供應鏈\n- 「半固態」（Stellantis × Factorial）≠ 全固態；固態電解質比例、制程仍有巨大差距\n- 參見：[[sources/catl-solid-state-caution-2026]] | [[entities/寧德時代]]\n\n## Related\n- [[entities/寧德時代]]\n- [[entities/三星SDI]]\n- [[entities/LGES]]\n- [[entities/SK On]]\n- [[entities/億緯鋰能]]\n- [[entities/Tesla]]\n- [[entities/鴻海]]\n- [[concepts/鈉離子電池]]\n- [[concepts/儲能市場]]\n- [[concepts/歐洲EV市場]]\n- [[sources/samsung-sdi-mercedes-battery-deal]]\n- [[sources/sam       "body": "# 電動巴士市場\n\n全球電動巴士市場高度集中於中國製造，比亞迪為最大生產商，非中國廠商試圖以合作、技術差異化突圍。\n\n## 市場規模（2025）\n- 全球年產量：約 8 萬輛\n- 中國製：約 6 萬輛（近 80%）\n- 最大出口商：比亞迪（2025 年出口 4,234 輛）\n\n## 歐洲電動巴士市場（2025 詳細數據）\n| 指標 | 數值 |\n|------|------|\n| 歐洲（含英、挪、瑞）登記量 | **11,607 輛（+48%）** |\n| EU 新城市巴士零排放占比 | **~50%** |\n| 成長最快製造商 | MAN（+224%）、BYD（+206%）、Mercedes-Benz（+52%）|\n| 德國累計電動車隊 | 4,752 輛（城市巴士 14%）|\n| 義大利 2025 零排放占比 | 30%（城市巴士 65%）|\n| 丹麥哥本哈根 | **100% 電動化**達成（Movia 794 輛在線）|\n\n## 中國競爭優勢\n- 量產規模帶來的成本優勢\n- 在日本市場售價比本土廠商（如五十鈴）便宜約 40%\n- 日本市場中國製佔比 > 70%\n\n## 非中國廠商的應對策略\n\n| 策略 | 代表 |\n|------|------|\n| 技術合作（鴻海 × 三菱FUSO）| 以 EV 技術 + 日本品牌背書突圍 |\n| 目標新興市場（東南亞、澳洲）| 避開中國強勢市場 |\n\n## 最新案例（2026-04-09）\n\n### 瑞士 VBSG（聖加侖）\n- 26 輛電動巴士（16 輛 12m + 10 輛 18m）→ 戴姆勒巴士得標（CHF 7,760 萬）\n- 前任得標商荷蘭 Ebusco 因財務問題違約 → 新創脆弱性的警示\n- 交付：2028 年中起，目標 2032 年全隊電動化\n\n### 哥倫比亞波哥大\n- 711 輛電動巴士（2026–2027 年交付）\n- BYD 底盤 + Marcopolo Superpolo 在地組裝（哥倫比亞製造）\n- 年減碳 2,628 噸，直接就業 1,330 人\n\n## 重要里程碑：戴姆勒巴士 2029 年退出柴油\n\n> **「2029 年 5 月，柴油城市巴士將退場，公共交通屆時將全面電動化。」**\n> — Markus Fischer，戴姆勒巴士德國公共運輸銷售主管（2026-04）\n\n### eCitaro NMC4 新技術\n- 電芯：圓柱型改為方形（稜柱型），空間效率提升\n- 能量密度較前代提升 **13%**\n- 機會充電最高 **300 kW**，目標續航 **300 公里**\n- 戴姆勒 2025 年德國電動巴士市場龍頭\n\n## 戴姆勒巴士 €2 億服務網絡投資（2026-04）\n\n- 投資金額：**€2 億**（未來數年，歐洲），戴姆勒巴士史上最大服務投資\n- 現有服務據點 630 個（其中 130 個具備電動巴士高壓認證能力）\n- 充電專線：8 語言服務，目標 85% 案件遠端解決\n- **新動向**：戴姆勒巴士首次進入**公共充電市場**（慕尼黑、科隆等旅遊景點 + 交通樞紐）\n- eCoach 電動教練車示範車（Setra 516 HD 改裝）即將在諾伊烏爾姆試駕\n  - 預期續航：~500 公里（類似 eIntouro）\n  - 電池供應：CATL；eIntouro 城際巴士 H2 2026 上市\n- 參見：[[sources/daimler-buses-200m-service-investment]]\n\n## 印度電動巴士市場（2025 全年，最新）\n\n**來源**：[[sources/india-electric-bus-market-2025]]\n\n| 品牌 | 2024 | 2025 | 市占變化 |\n|------|------|------|---------|\n| PMI Electro | 534 | **1,041** | 14.3% → 23.4%（新冠軍）|\n| Olectra | 663 | **990** | 17.8% → 22.3% |\n| **Switch Mobility** | 136 | **950** | 3.6% → ~21%（**+599%**）|\n| JBM Auto | 556 | **698** | 穩定 |\n| Pinnacle | 99 | **310** | 快速成長 |\n| **Tata Motors** | 1,462 | **223** | 39.2% → 5%（**-84%**）|\n| **合計** | 3,730 | **4,441** | **+19%** |\n\n### 格局重組的結構性原因\n\n**Switch Mobility 爆發（+600%）**：德里政府 950 輛 EiV12 訂單（9 月起批量交付）為主驅動；12 月單月市占 30.8%。\n\n**Tata Motors 崩跌（-84%）**：非競爭力退步，而是**PM E-DRIVE 超大標（10,900 輛）完全落標**。標案由 PMI Electro（5,210 輛）、EKA Mobility（3,485 輛）、Olectra（1,785 輛）三分天下，傳統大廠（Tata、JBM、VE Commercial）**一輛皆無**。Tata 保守的成本定價（納入運營風險）輸給激進出價的新興廠商；2025 年的 223 輛僅為舊合約（FAME II/CESL）尾段交付。\n\n**2026 展望**：EKA Mobility（3,485 輛 PM E-DRIVE 配額）將在 2026 年爆量；PMI 預計持續維持 25%+ 市占；Tata 須靠邦政府零散標案苦撐。\n\n---\n\n## 印度電動商用車市場動態（2026-04）\n\n### Switch Mobility：首批城際電動巴士孟買—浦那\n- 客戶：Purple Bus（Prasanna Purple Mobility Solutions）\n- 訂單：25 輛 EiV12（首批 10 輛已交付），**Switch Mobility 首次私人城際客運委託**\n- EiV12 規格：235kW 永磁同步馬達 / **423kWh LFP** / 300km+ 續航 / CCS2 雙槍 / 45 座\n\n### 現代汽車 × TVS Motor：電動三輪車 JDA\n- 簽署聯合開發協議（JDA），目標「最後一哩路」E3W 解決方案\n- 印度境內協作生產，同時探索全球出口\n\n### SML Isuzu（前 SML Mahindra）：FY27 進入電動巴士\n- 宣布 FY2027 加入印度電動巴士競爭（含 PM e-Bus Sewa 政府標案）\n- 加入競爭者：Tata Motors、Olectra、Switch Mobility、PMI Electro\n\n- 參見：[[sources/india-ev-commercial-update-2026]] | [[concepts/印度EV市場]]\n\n## 漢堡 Hochbahn 電動化與儲能策略（2026 持續擴張）\n\n| 指標 | 數值 |\n|------|------|\n| 已電動化車輛（2026-05）| **432 輛**（全車隊約 39%）|\n| Mercedes eCitaro 訂單 | 350 輛，2030 年底前交付 |\n| **新增採購（2026-05 宣布）**| **240 輛，2031 年到位** |\n| 充電位 | **750 個**（2026 年底完成）|\n| HVO 過渡方案 | 2026-01 起，內燃機巴士逐步改用 HVO 燃料（過渡期措施）|\n| 儲能策略 | **明確選擇固定式電池，不採用 V2G** |\n\n> 「巴士的核心任務是運送乘客。固定儲能 24/7 可用，潛力遠大於 V2G。」\n> — Hamburg Hochbahn\n\n- 固定儲能用途：電網峰值管理 + 能源市場套利收益\n- 參見：[[sources/hamburg-hochbahn-electrification]]\n\n## Solaris × Nobina 瑞典訂單（2026-04）\n\n| 市場 | 訂單數量 | 車型 | 交付時間 |\n|------|---------|------|---------|\n| Stockholm | 50 輛 | Urbino 15 LE Electric | 2027 |\n| Skåne | 49 輛 | Urbino 15 LE Electric | 2027 |\n| Gothenburg | 4 輛 | Urbino 15 LE Electric | 2027 |\n\n- 雙方合作自 2010 年；2024 年至今累計 201 輛；2026~2027 共 320+ 輛\n- Urbino 15 LE Electric：15 米鉸接版（低地板，適北歐城市）\n- 參見：[[sources/solaris-nobina-sweden-2026]]\n\n## 華德動能（Hwa-Der）：台灣電動巴士龍頭上市（2026-04）\n\n| 指標 | 數值 |\n|------|------|\n| 2026 Q1 營收 | 8.77 億台幣 |\n| Q1 淨利 | 1.36 億台幣（年增近 2 倍）|\n| Q1 EPS | **1.13 元** |\n| 日本市占目標 | 15%（現在）→ **32%**（2030 年）|\n| 合作夥伴 | 住友商事（日本市場）|\n\n- 業務範圍：整車製造 + 三電系統 + 車隊管理 + 充電設備\n- 神戶、岡山公車將於 2026 年上路（日本公共運輸採用台灣電動巴士）\n- 車王電（母公司）轉投資；是台灣最完整的電動巴士垂直整合廠\n- 參見：[[sources/hwa-der-taiwan-bus-listing]]\n\n## Ebusco：歐洲新創巴士廠陷入生存危機（2026-05）\n\n| 指標 | 數值（2025 FY）|\n|------|-------------|\n| 營收 | **€76.6M** |\n| EBITDA | **-€56.4M** |\n| 交付量 | **123 輛** |\n| 訂單 backlog | **245 輛** |\n| 員工 | **282 人**（-46% YoY）|\n| 財務 | going concern 警告；€27.4M 過橋貸款 |\n\n- 正探索出售多數股份（巴士業務部分），以求財務重組\n- 商業模式：從傳統 OEM 轉向 OED（Original Equipment Designer）——設計外包亞洲代工生產\n- 此前已警示：瑞士 VBSG 案中 Ebusco 違約後改由戴姆勒接手（2026-04）\n- **意義**：歐洲自研電動巴士新創難以與中國成本競爭的直接案例，商業模式轉型試驗中\n- 參見：[[sources/ebusco-sale-2026]]\n\n## Ikarus：匈牙利電動巴士復興，拿下北馬其頓最大訂單（2026-05）\n\n| 項目 | 細節 |\n|------|------|\n| 訂單規模 | **150 輛** Ikarus 120e V4 + **75 座充電站（≥120kW）** |\n| 車型 | 12.9m，LFP 電池，**350~580km 續航** |\n| 市場分布 | 斯科普里（首都）約 100 輛 + 其他城市 50 輛 |\n| 意義 | **Ikarus 歷史上最大單筆訂單** |\n\n- Ikarus：曾為匈牙利鼎盛的巴士製造品牌（蘇聯時代出口全東歐），2003 年結束量產\n- 以電動化為契機重啟，Ikarus 120e 為旗艦產品\n- 北馬其頓（馬其頓共和國）電動公車轉型的重要里程碑\n- 參見：[[sources/ikarus-north-macedonia-2026]]\n\n## 大阪世博中國電動巴士事故：品質危機（2026-05）\n\n大阪地鐵購入 **190 輛中國產電動巴士**（透過進口商 EVMJ）用於世博會，期間多輛出現：\n- 車身搖晃、方向盤失靈、煞車軟管與車身摩擦（致命缺陷）\n- 車軸損壞、煞車異常\n\n**財務後果**：\n- 150 輛採購費 75 億日圓（政府補貼 40 億日圓）\n- EVMJ 2026-04 申請破產保護（債務 57 億日圓）\n- 購車款回收困難，逾 100 輛巴士停置\n\n**產業警示**：\n- 中國電動巴士出海的最大負面案例\n- 日本市場信任危機：暴露進口中間商（2019 年成立）財務脆弱性\n- 品質控管（車身結構 + 制動系統）是海外布局的核心障礙\n\n- 參見：[[sources/osaka-expo-chinese-ebus-defect-2026]]\n\n## 大阪地鐵停用 190 輛中國製電動巴士：¥75 億損失（2026-05）\n\n大阪地鐵宣布**全面放棄**190 輛電動巴士的市區路線及自駕測試計畫，與大阪世博事件為同一批供應商 EVMJ（但不同採購批次）。\n\n- 供應商：**EV Motors Japan（EVMJ）**，宣稱「日本國產」，實為中國代工\n- 故障：電路異常、車門失效、轉向不靈、煞車故障；最嚴重：行駛中方向盤失效撞護欄\n- 採購金額：約 **¥75 億日圓**（過半為政府補助款）\n- 國土交通大臣（2026-04）追討 **~¥6 億政府補助金**\n- 與 BYD 日本 500 輛里程碑（Batch 19）同週發生，形成鮮明對比：**直銷品牌成功 vs 中間商代工失敗**\n\n- 參見：[[sources/osaka-metro-chinese-ebus-quality-2026]]\n\n## Archion（日野 + 三菱 Fuso）× 鴻海：日本商用車整合新局（2026-05）\n\n日野汽車與三菱 Fuso 整併後的 **Archion** 成軍，日本商用車市場實質集約為 Archion + 五十鈴兩大集團。\n\n| 指標 | 數值 |\n|------|------|\n| 2026 年度銷量目標 | 23 萬輛（+6%）|\n| 2032 年度目標 | 28 萬輛（+3 成）|\n| 目標營益率 | **>10%**（現狀 3%）|\n| 東南亞銷量目標 | 6.4 → **8.5 萬輛** |\n\n- 與鴻海（Foxconn）電動巴士合資：2026 年下半成立，富山市生產，主攻**海外市場**\n- 雙品牌策略（日野 + 三菱 Fuso）+ 共通平台（85% 以上產品）\n\n- 參見：[[sources/archion-hino-fuso-foxconn-ebus-2026]]\n\n## 印度研擬逾 $10 億美元私人電動商用車激勵方案（2026-05）\n\n印度政府考慮推出超過 $10 億美元激勵方案，刺激**私部門採購電動巴士與電動卡車**：\n- 執行期限：約 10 年；主要對象：城際巴士業者\n- 利息補貼：最高 **₹150 萬/輛**（~$17,500），隨時間遞減\n- 信用擔保機制：鼓勵銀行融資\n- 背景：現行補助主要集中政府採購（PM e-Bus Sewa），私人 ECV 市場被政策忽略\n\n- 參見：[[sources/india-1bn-ev-commercial-incentives-2026]]\n\n## EIB 為漢堡提供 €11.25 億：電網 + 電動巴士雙軌投資（2026-05）\n\n歐洲投資銀行（EIB）向漢堡兩家市政公司提供逾 **€11.25 億**貸款：\n\n| 受益方 | EIB 貸款 | 用途 |\n|--------|---------|------|\n| Hamburger Energienetze（HNE）| 最高 **€10 億** | 電網現代化（~€29 億計畫的 28%）|\n| VHH（公車運營商）| **€1.25 億** | 188 輛純電巴士採購 |\n\n**VHH 電動巴士採購明細**：120 輛標準 12m + 52 輛鉸接 18m + 16 輛小巴；含 Schenefeld 車廠改擴建\n**電網投資重點**：~1,500 km 電纜新建/更新、120 個新開關間隔、數位化整合可再生能源；漢堡峰值用電預測 2040 年**至少翻倍**\n**意義**：電網 + 交通雙軌同步電化，EIB 稱為「歐洲城市全面轉型基礎設施的示範」\n\n- 參見：[[sources/eib-hamburg-ebus-grid-2026]]\n\n## MAN 獲維爾紐斯 112 輛訂單：立陶宛最大電動巴士採購（2026-05）\n\nMAN Truck & Bus 獲立陶宛維爾紐斯公共交通運營商 VVT 訂購 **112 輛** Lion's City E：\n\n| 指標 | 數值 |\n|------|------|\n| 訂單規模 | 12m 標準 × 84 輛 + 18m 鉸接 × 28 輛 |\n| 交付時程 | 2026 年底起，至 2027 年底 |\n| 每充電程 | 最高 **380 km** |\n| MAN 2025 銷量成長 | **+118% YoY**（逾 1,300 輛）|\n| MAN 歐洲電動占比 | 城市巴士銷量 **~50%** |\n| Lion's City E 累計 | **3,300+ 輛**（2019 年以來）|\n\n- 立陶宛有史以來最大電動巴士訂單\n- 維爾紐斯正同步推進充電基礎設施、電力容量、車廠升級\n- 參見：[[sources/man-vilnius-ebus-2026]]\n\n## Zenobe × Go-Ahead：業界首個電動巴士預承諾融資框架（CFFA，2026-05）\n\nZenobē 與 Go-Ahead 推出公車部門**首個已承諾融資框架協議（CFFA）**，已支持超過 **280 輛**來自四家不同車廠的電動巴士融資：\n\n**創新機制**：Go-Ahead 可依據預審批信用額度動用資金，無需逐次談判租賃條款\n**適用場景**：路線/特許權制度的公車運營商，多廠商、多批次、靈活時程部署\n**Go-Ahead 目標**：2035 年前全面電動化車隊\n\n- 意義：CFFA 模式可能成為英國乃至歐洲大型公車運營商電動轉型的融資創新範本\n- 參見：[[sources/zenobe-go-ahead-ebus-framework-2026]]\n\n## 馬爾他：40 輛電動巴士 + 自動駕駛接駁車試驗（2026-05）\n\n馬爾他以 **€1,400 萬**採購 **40 輛 King Long 電動巴士**（第二批），並計畫 2026 年 6 月啟動自動駕駛電動接駁車試驗：\n- 自駕接駁車：最大 15 人、馬爾他本島 + 科佐島路線、全程安全員隨車\n- EU Horizon Europe **metaCCAZE 計畫**資助\n- 目標：科佐島全面電動公共交通\n- 參見：[[sources/malta-ebus-av-shuttle-2026]]\n\n## 全球電動巴士動態：2026 年 6 月（2026-06-03〜09）\n\n**來源**：[[sources/ebus-global-jun2026]]\n\n### Zenobē × Vectalia — 西班牙 €1.2 億 BaaS 框架\n- Zenobē 與西班牙 Vectalia 簽署 €1.2 億電動巴士+充電設施「打包租賃」協議\n- 歐洲最大單一電動巴士 BaaS（Battery-as-a-Service）融資框架之一\n\n### 西約克郡 193 輛 Wrightbus\n- ZEBRA 2 計畫補貼：193 輛英國製造 Wrightbus StreetDeck Electroliner 雙層電動巴士\n\n### 拉丁美洲即將突破 10,000 輛\n- 拉美電動公車累計即將達 10,000 輛里程碑\n- 主要市場：哥倫比亞波哥大、智利聖地牙哥（全球單城最高佔比之一，~2,400 輛）、巴西聖保羅\n\n### 紐約州校車電動化延遲 5 年\n- 原訂 2027 年起 100% 電動校車採購，因充電設施和資金問題延至 **2032 年**\n- 北美電動巴士政策罕見「退步」案例\n\n### Karsan 自駕 e-JEST — FIFA 世界盃 Atlanta 服務（2026-06-09）\n- Karsan Autonomous e-JEST 進入亞特蘭大正式載客服務\n- 為 2026 FIFA 世界盃提供「最後一哩」自駕電動接駁\n\n### 電動巴士成本觀察（2026 中期）\n- HEAG mobilo MD Arne Rath：「運營成本持續下降，但採購價格仍是與柴油巴士完全成本平價的主要障礙」\n- Solaris：2019 年以來運營排放降低 **70%**，零排放車輛達交付量 **86%**\n\n## Related\n- [[entities/比亞迪]]\n- [[entities/鴻海]]\n- [[entities/三菱FUSO]]\n- [[concepts/電動商用車]]\n- [[concepts/充電基礎建設]]\n- [[concepts/中國EV出海策略]]\n- [[sources/foxconn-mitsubishi-fuso-electric-bus]]\n- [[sources/daimler-buses-2029-diesel-phaseout]]\n- [[sources/daimler-buses-vbsg-switzerland]]\n- [[sources/bogota-711-electric-buses]]\n- [[sources/electric-bus-market-2025-global]]\n- [[sources/daimler-buses-200m-service-investment]]\n- [[sources/india-ev-commercial-update-2026]]\n- [[sources/hamburg-hochbahn-electrification]]\n- [[sources/solaris-nobina-sweden-2026]]\n- [[sources/hwa-der-taiwan-bus-listing]]\n- [[sources/ebusco-sale-2026]]\n- [[sources/ikarus-north-macedonia-2026]]\n- [[sources/osaka-expo-chinese-ebus-defect-2026]]\n- [[sources/eib-hamburg-ebus-grid-2026]]\n- [[sources/man-vilnius-ebus-2026]]\n- [[sources/zenobe-go-ahead-ebus-framework-2026]]\n- [[sources/malta-ebus-av-shuttle-2026]]\n## BYD BD11 英國北部首批省級部署（2026-06）\n\n14 輛 BYD BD11 電動巴士在英格蘭諾森伯蘭郡（Northumberland）投入服務：\n\n| 項目 | 數值 |\n|------|------|\n| 車型 | BYD BD11（10.9 公尺）|\n| 電池 | **532 kWh 刀片 LFP**（Cell-to-Pack 或 Cell-to-Body）|\n| 充電 | 最高 **500 kW 受電弓（pantograph）**，~2 小時充滿 |\n| 驅動 | 雙 150kW 輪轂馬達（600 Nm）|\n| 半導體 | **SiC 技術** |\n| 投資 | £610 萬（Arriva）；£3,700 萬北英整體投資 |\n\n- 路線：43、44、45（Morpeth — Dinnington — Newcastle）\n- 此為 **2024 年 BD11 上市後首批倫敦以外英國省級客戶**\n- BYD 另為 Arriva 提供 191 輛（倫敦）+ 39 輛（倫敦以外）電動巴士\n- 北英市長 Kim McGuinness 目標：「10 年內所有巴士轉為零排放」\n\n- [[sources/india-electric-bus-market-2025]]\n- [[sources/ebus-global-jun2026]]\n- [[concepts/印度EV市場]]\n- [[concepts/歐洲EV市場]]\n- [[concepts/充電基礎建設]]"

      "body": "# 美國 EV 市場與政策\n\n美國 EV 市場在 Trump 2.0 政策下成長放緩，補貼縮減、傳統車廠下修投資，但豐田等品牌逆勢成長。EV 均價持續下滑，車商自行填補補貼缺口。\n\n## 政策環境（2025–2026）\n- EV 購車補貼縮減\n- 燃油車碳排規範放寬\n- IRA 補貼細節調整中\n\n## 市場表現（Q1 2026）\n| 品牌 | Q1 2026 | YoY |\n|------|---------|-----|\n| Tesla | 122,196 輛 | -5% |\n| GM | 25,900 輛 | -19% |\n| 豐田 | 14,498 輛 | 翻倍 |\n| Ford | 6,869 輛 | -70% |\n\n## 預測修正\n- IEA/BNEF：2030 年美國 EV 新車佔比從 ~50% 下修至 <30%\n\n## 豐田逆勢成功要素\n- 高性價比（起售 $34,900）\n- 全面支援 NACS\n- 續航提升 25%\n\n## 影響 Rivian\n- R2 Performance（$59,485）定位中高端，以能效超越 Tesla 為賣點\n\n## EV vs 燃油車價差縮至歷史最低（2026-04）\n\n| 指標 | 數值（2026 年 3 月）|\n|------|------|\n| EV 平均成交價（ATP）| $54,508（YoY **-2.8%**，連 3 個月下滑）|\n| EV vs 燃油車價差 | **$5,800**（歷史最低）|\n| EV 平均促銷幅度 | ATP 的 **14.6%**（≈$8,000），是市場均值 2 倍 |\n| Tesla ATP | $53,421（YoY -2.6%）|\n\n- 補貼廢止後，車商以高額折扣 + 低利率貸款自行維持買氣\n- Tesla 3 月美國銷量 YoY -8.4%，但 MoM +6.1%（連 2 個月正成長）\n\n## Tesla 重啟 $25k 平價 EV 計畫（2026-04）\n- 車長約 4.28m，單馬達，目標售價 $25,000\n- 計畫利用上海廠生產（提升產能利用率）\n- **2026 年內不會量產**，仍在早期開發\n- 參見：[[sources/tesla-25k-ev-us-price-parity]]\n\n## Slate Auto：美國本土 $25k 電動皮卡新創（2026-04）\n- Jeff Bezos 家族辦公室支持，完成 $6.5 億 C 輪融資\n- 雙人座電動皮卡，極簡設計，目標售價 $25,000\n- 2026 年底上市，16 萬+ 可退訂單\n- 印第安納州廠改建 $4 億\n- 參見：[[sources/slate-auto-ev-pickup]]\n\n## Ford EV 部門重組（2026-04）\n- Doug Field（EV 技術長，前 Apple）離職\n- Q1 2026 Ford EV 銷量 YoY -70%（前批已記錄）\n- 參見：[[sources/ford-ev-restructure-doug-field]]\n\n## VW 認列美國業務 €5 億資產減損（2026-04）\n- 田納西廠停產 ID.4 後的損失確認\n- 顯示歐洲車廠在美國 EV 投資的代價\n- 參見：[[sources/vw-id4-us-writedown]]\n\n## 歐系車廠衝擊：VW ID.4 停產（2026-04）\n\n### VW Chattanooga 工廠停產\n- **停產時間**：2026 年 4 月中旬\n- **原因**：2025 年 9 月 EV 稅額減免廢止 → Q4 2025 ID.4 銷量僅 248 輛（**-62%**）\n- **因應措施**：產線轉向燃油 Atlas SUV（2026 年夏啟動）\n- **2025 全年**：ID.4 銷售 2.24 萬輛（+31% YoY），廢止補貼後急凍\n\n### VW Q1 2026 全球壓力\n| 市場 | 表現 |\n|------|------|\n| 全球 | 205 萬輛（-4%）|\n| 美國 | 約 -20% |\n| 中國 | -15%（本土廠商壓制）|\n\n> VW 旗下 Skoda 規劃退出中國市場。\n\n## Tesla Q1 2026 財報：轉型加速（2026-04-22）\n\n- **EPS $0.41 超預期**，汽車毛利率 19.2%（含稀土成本壓降）\n- **Capex 大增至 >$250 億**（原 $200 億）→ 市場負面解讀\n- **Model S/X 停產**，Fremont 廠轉 Optimus 機器人工廠（年產 100 萬台目標）\n- **HW3 不升級無人監督 FSD**：大量已購 FSD 舊款車主面臨升級成本\n- 股價 YTD -14%，中國競爭 + Musk 政治爭議持續壓制\n- 參見：[[sources/tesla-q1-2026-earnings]]\n\n## GM 延後次代電動卡車（2026-04）：底特律三雄轉向 ICE + EREV\n\n- **GM 宣布無限期延後**次代電動皮卡/SUV（Silverado EV、Hummer EV 等），2028→2030 年以後\n- Orion Assembly 工廠從 EV 轉回**燃油卡車**（+2,000 工作）\n- Factory Zero 停產 4 週後恢復，但前景不明\n- **EREV 作為折衷路線**：Ram 2027、Ford 2029，GM 觀望中\n- 底特律三雄共同轉向：鞏固燃油車獲利，在政策空間下優先現金流\n- 參見：[[sources/gm-ev-delay-detroit-three]]\n\n## Ford Model e Q1 2026：虧損縮小至 $777M（2026-04-30）\n\n| 指標 | Q1 2026 | Q1 2025 | 變化 |\n|------|---------|---------|------|\n| EBIT | **-$777M** | -$849M | +$72M |\n| EBIT 毛利率 | **-63.1%** | -68.4% | +5.3pp |\n| 每輛虧損 | **~$23,000** | — | — |\n| 電動車銷量 | ~34,000 輛 | ~31,000 輛 | +10% |\n\n- 賣更多 EV 卻沒有更多營收 → 均價下滑（歐洲低價車型比重增加）\n- 全年指引：FY2026 EBIT -$4.0~$4.5B（改善自 -$4.8B）\n- 下一步：Ford Universal EV Platform（UEV）\n- 參見：[[sources/ford-model-e-q1-2026]]\n\n## Tesla Semi：量產啟動（2026-04-30）\n\n- Gigafactory Nevada 旁獨立廠房正式量產，年產能最高 **50,000 輛**\n- 標準版 $260,000（325 英里）/ 長程版 $290,000（500 英里）\n- 加州市場：965/1,067 份補貼申請指定 Tesla Semi（戴姆勒+Paccar+Volvo 合計 < 100 份）\n- 同步推出 **Basecharger**（125kW，場站隔夜充電）\n- 參見：[[sources/tesla-semi-production-2026]] | [[sources/tesla-basecharger-depot]]\n\n## 本田凍結加拿大 EV 工廠，北美 EV 退潮加速（2026-05）\n\n- 本田**無限期凍結**加拿大安大略省 EV + 電池工廠（原 CAD 150 億投資，24 萬輛年產能）\n- 與 GM 合作的 **Prologue** 電動車 2026 下半停產，本田美國將出現**無 EV 空窗期**\n- 轉向 Ohio 工廠共線生產 **HEV + 燃油車**為主\n- 三菱汽車亦宣布 2028 年日本新增 HEV 產線（Outlander/RVR），反映日系廠集體 HEV 回歸\n- 參見：[[sources/honda-canada-ev-freeze-2026]] | [[entities/本田]]\n\n## Tesla Model S / X 正式停產（2026-05）\n\n- **最後一輛 Model S / X** 於 2026 年 5 月初在 Fremont 廠下線（Model S 生產 14 年、Model X 11 年）\n- Fremont 廠原產線改建為 **Optimus 人形機器人工廠**（年產 100 萬台目標）\n- 2025 年「其他車型」（Model S/X + Cybertruck）合計僅 50,850 輛，相比 Model 3/Y 的 160 萬輛極少\n- 限量 Signature Edition：350 輛（各 250/100 輛），$159,420，5 月 12 日交車活動突然延期，車主強烈不滿\n- **意義**：Tesla 從「高端先行」到「平價量產 + 機器人」的戰略轉型正式完成\n- 參見：[[sources/tesla-model-s-final-production]]\n\n## 本田全面撤退：北美 EV 計畫全面崩潰（2026-05 更新）\n\n| 項目 | 最新狀態 |\n|------|---------|\n| 加拿大 EV+電池廠（CAD $150 億）| **無限期暫停**，與加拿大政府協商中 |\n| Sony Honda Mobility / Afeela | **合資解散**，接近完成的首款車取消上市 |\n| Honda「0 Series」北美款 | **喊停** |\n| Acura ZDX（GM 合作）| 已停產，清倉中 |\n| Honda Prologue（GM 合作）| 2026 下半停產 |\n\n→ 本田目前**在美國無任何 BEV 車型**，本田領導層正式宣告：「不再相信美國 EV 市場短期復甦」\n\n- 即使 EV 需求反彈，美加關係緊張也令加拿大廠址存疑\n- 全球策略轉向：削減電動化與軟體投資，聚焦 HEV\n- 參見：[[sources/honda-canada-ev-freeze-2026]] | [[entities/本田]]\n\n## 日產完全放棄密西西比 EV 生產（2026-05）\n\n| 時間 | 動態 |\n|------|------|\n| 2025 初 | 計畫 5 款電動車（Nissan + Infiniti 品牌 SUV + 轎車）|\n| 2025-07 | Canton 廠 EV 計畫「暫緩」|\n| 2025-10 | 計畫「臨時中止」|\n| **2026-05** | **完全取消**（永久放棄）|\n\n- Canton 廠（密西西比州）EV 生產計畫徹底取消，改**擴大燃油車產能**\n- 已停止新年份 Ariya BEV SUV 對美出口\n- 美國市場改由**進口 EV** 供應（如新款 Leaf）\n- 背景：Trump 政府廢止 $7,500 EV 稅額減免（2025-09-30）後美國 BEV 需求急凍\n- **意義**：加上 GM 延後次代電動皮卡、Ford F-150 Lightning 停產，美國 EV 本地產能擴張幾乎全面停滯；唯一例外為 Tesla Semi（Gigafactory Nevada）\n- 參見：[[sources/nissan-mississippi-ev-abandonment]]\n\n## Mazda：首款長續航專屬 BEV 平台延至 2029+（2026-05）\n\nMazda 確認其首款專用長程 BEV 平台研發時程大幅後延：\n\n| 項目 | 舊計畫 | 新計畫 |\n|------|-------|-------|\n| 首款長程專屬 BEV 平台 | **2027 年** | **2029 年以後** |\n| 原因 | 市場需求不足 + 技術重新評估 | |\n| 現有影響 | 無設施減損、無供應商合約損失（「尚未開始前就停止」）|\n\n- Mazda 目前在美國唯一 EV：MX-30（2021 年，100 英里，2 年內退出）\n- 2030 年前電動化投資承諾：$75.2 億（遠低於同業）\n- 與 Honda、GM 等宣告「零 EV 空窗期」形成對比，Mazda 已陷入空窗\n- 參見：[[sources/mazda-ev-delay-2029]]\n\n## Ford × 寧德時代密西根廠：中美 EV 供應鏈共存（2026-05）\n\nFord **BlueOval** 電池園區（密西根州馬歇爾市）接近完工：\n\n| 項目 | 細節 |\n|------|------|\n| 投資額 | **$30 億美元** |\n| 所有權 | Ford 全資（100%）|\n| 技術 | 寧德時代 LFP 授權（**授權不入股**）|\n| 投產時程 | **數月內**（2026-05 現況）|\n| 意義 | 半世紀以來首座美國大廠全資擁有的綠地電池工廠 |\n\n- CATL CEO 曾毓群語：「電池像磚頭一樣笨」（無情報監控風險）\n- 長期規劃：中國專家培訓美國工程師，10 年內縮短技術差距\n- 此案被視為中美 EV 供應鏈「共存新模式」的標竿\n- 參見：[[sources/ford-catl-michigan-factory-2026]] | [[concepts/北美EV關稅與政策]]\n\n## 本田 70 年首次年度虧損：$90 億損失，全面押混動（2026-05）\n\nHonda 公布 FY2026（截至 2026 年 3 月）財報：\n\n| 項目 | 數值 |\n|------|------|\n| 年度業績 | **70 年來首次年度淨虧損** |\n| EV 策略損失 | **~$90 億美元**（資產減損）|\n| 已取消的 EV 平台 | Honda 0 Series（SUV + Sedan + Acura RSX，三款均取消）|\n| 混動投資（未來 3 年）| **4.4 兆日圓（~$280 億）** |\n| EV 未來預算 | 僅 **$50 億**（遠低於混動投資）|\n| 2028 首款混動平台車型 | 四門 Honda 轎車 + Acura 跨界（美國 SUV AWD 為主）|\n| 2030 年目標 | **15 款**混動車型 |\n\n→ CEO Toshihiro Mibe：純電未來「不切實際」（\"not realistic\"）\n\n- 此次虧損包含本田加拿大 EV 工廠（$110 億加元）的減損確認\n- 本田預計 2026 年底恢復獲利（摩托車業務 + 削減成本支撐）\n- 意義：**本田是全球最大汽車集團之一，其全面押注混動而非 BEV 的決策，對全球電動化節奏有重要訊號意義**\n- 參見：[[sources/honda-9b-loss-hybrid-pivot-2026]] | [[entities/本田]]\n\n## Tesla Model Y 兩年來首次漲價（2026-05）\n\n| 車型 | 漲幅 | 新售價 |\n|------|------|-------|\n| LR AWD | +$1,000 | **$49,990** |\n| LR RWD | +$1,000 | **$45,990** |\n| Performance AWD | +$500 | **$57,990** |\n\n- Tesla 此前持續降價策略，本次為 Model Y **兩年來首次美國漲價**\n- Tesla 未公布漲價原因（可能與成本上升或需求強化信號有關）\n- 時點：恰逢中國車廠也進行漲價（碳酸鋰成本上升）\n\n## 聯邦 EV 年費提案：BEV $130/年（2026-05）\n\nBUILD America 250 Act 草案（眾議院）：\n\n| 項目 | 細節 |\n|------|------|\n| 費用對象 | **BEV** 車主 |\n| 起始年份 | **2029 年** |\n| 初始費用 | **$130/年** |\n| 調整機制 | 每 2 年 +$5，上限 **$150/年** |\n| PHEV 費用 | **$35/年**，最終上限 $50/年 |\n| 提案人 | 眾議院交通委員會主席 Sam Graves（密蘇里州，共和黨）|\n| 現況 | 草案階段，目標 2029-09-30 前生效 |\n\n**背景**：聯邦汽油稅（18.3 美分/加侖）自 **1993 年**未調整；EV 不繳油稅。平均美國人年繳 $70~90 聯邦油稅，但 BEV 提案年費 $130 反而更高。\n\n**反對聲浪**：\n- Sierra Club：「懲罰清潔交通，非激勵」\n- Consumer Reports：固定費不公平——輕度駕駛者（老年人等）年繳 $40~50 油稅，固定 $130 反而偏重\n- 商業車（快遞/Robotaxi）里程達個人車 10 倍，但固定費相同\n\n**各州現況**：密西根 BEV 年費 $267（2026）、紐澤西 $270（4 年預繳）\n\n意義：繼 2025 年廢止 IRA Section 30D 稅額減免後，再度加重 EV 持有成本；法案仍處立法程序早期。\n\n- 參見：[[sources/congress-ev-annual-fee-2026]]\n\n## Tesla Model Y 兩年來首次漲價（2026-05，補充）\n\n（以下為原有記錄補充競品對比）Hyundai Ioniq 5 起售 $36,600（245 英里）、Ford Mustang Mach-E Select $40,535（260 英里），兩者均趁 Model Y 漲價積極促銷（Ioniq 5 最高折 $8,750）。\n\n- 參見：[[sources/tesla-model-y-price-bump-2026]]\n\n## Rivian R2 正式開始交車：進軍大眾市場（2026-06）\n\nRivian 於 **2026-06-10** 開始交付 **R2** 電動 SUV，標誌其從高端（R1T/R1S >$70K）向大眾市場的重大轉型：\n\n| 項目 | 數值 |\n|------|------|\n| 首批車型 | R2 Performance（Launch Package）|\n| 起售價 | **$57,990** |\n| 後續版本預計 | **~$45,000** |\n| 量產啟動 | 2026-04（伊利諾伊州 Normal 廠）|\n\n- Uber 預訂 10,000 輛 R2（2028 起，25 個城市）配合擴張\n- 歐洲 2027 年上市計畫已從官網悄然移除，歐洲時程不確定\n- 參見：[[sources/rivian-r2-deliveries-2026]] | [[entities/Rivian]]\n\n## Chevy Bolt 2027 復活：LFP、262 英里、<$30K（限量）\n\n通用汽車重啟 Chevy Bolt（2023 年曾停產）：\n\n| 規格 | 數值 |\n|------|------|\n| 電池 | **65 kWh LFP**（磷酸鐵鋰，更耐久）|\n| EPA 續航 | **262 英里**（比舊款 +15 英里）|\n| 快充 | **150 kW**，10%~80% 約 26 分鐘 |\n| 起售價 | **<$30,000**（美國最便宜量產 EV 之一）|\n| 馬力 | 214 hp，0~60 mph 6.8 秒 |\n\n**限量警告**：GM 僅計畫生產約 **1 年**，工廠產線隨後改回燃油車——消費者需趁早。\n\n- Bolt 以城市代步定位，室內空間優於同尺寸競品 Nissan Leaf\n- GM 新 EV 均移除 Apple CarPlay，以 Google Built-in 取代\n- 與美國 EV 補貼廢止的大環境形成對比：<$30K 是少數仍可吸引大眾買家的價位\n- 參見：[[sources/chevy-bolt-2027-review]]\n\n## 加州 Caltrans 追加訂購 524 輛 Rivian：政府車隊最大單（2026-06）\n\n加州交通部（Caltrans）擴大與 Rivian 的採購協議：\n\n| 項目 | 數值 |\n|------|------|\n| 本次訂購 | **201 輛 R1S SUV + 323 輛 R1T 皮卡**（共 524 輛，$5,270 萬）|\n| 累計總訂購 | **977 輛**（約 $9,700 萬）|\n| 首批 | 2025-06 訂購 453 輛 |\n| 意義 | **Rivian 車廂計畫（Amazon）以外最大已知車隊協議** |\n\n- 加州法規要求：政府新購輕型車輛至少 **50%** 為零排放車輛\n- 2025-08 前 Rivian 累計公部門銷量約 700 輛；此次單筆即超越多數先前合約\n\n## Related\n- [[entities/豐田]]\n- [[entities/通用汽車]]\n- [[entities/福特]]\n- [[entities/Tesla]]\n- [[entities/Rivian]]\n- [[concepts/NACS充電標準]]\n- [[concepts/北美EV關稅與政策]]\n- [[sources/vw-id4-chattanooga-stop]]\n- [[sources/tesla-25k-ev-us-price-parity]]\n- [[sources/slate-auto-ev-pickup]]\n- [[sources/ford-ev-restructure-doug-field]]\n- [[sources/vw-id4-us-writedown]]\n- [[sources/tesla-q1-2026-earnings]]\n- [[sources/gm-ev-delay-detroit-three]]\n- [[sources/ford-model-e-q1-2026]]\n- [[sources/tesla-semi-production-2026]]\n- [[sources/nissan-mississippi-ev-abandonment]]\n- [[sources/congress-ev-annual-fee-2026]]\n- [[sources/tesla-model-y-price-bump-2026]]"

      "body": "# 印度 EV 市場\n\n印度是全球最大潛力 EV 市場之一，電動巴士市場以政府採購為主要驅動力，乘用 EV 仍處發展早期；德里 EV 政策爭議凸顯強制配額的雙刃劍效應。\n\n## 電動巴士市場（2025 全年）\n\n**來源**：[[sources/india-electric-bus-market-2025]]\n\n| 指標 | 數值 |\n|------|------|\n| 2025 全年登記量 | **4,441 輛**（2024：3,730 輛，**+19%**）|\n| 新市場冠軍 | **PMI Electro Mobility**（23.4%，1,041 輛）|\n| 最大黑馬 | **Switch Mobility**（3.6% → ~21%，+599%，950 輛）|\n| 最大崩跌 | **Tata Motors**（39.2% → 5%，-84%，223 輛）|\n| 重大投資 | KKR 注資 PMI Electro + Allfleet 最高 **$3.1 億美元** |\n\n### 格局重組原因：PM E-DRIVE 標案決定一切\n\n印度 PM E-DRIVE 計畫超大標（**10,900 輛**，史上最大）重塑市場格局：\n\n| 得標廠商 | 配額 | 比重 |\n|---------|------|------|\n| PMI Electro | **5,210 輛** | ~48% |\n| EKA Mobility | **3,485 輛** | ~32% |\n| Olectra | **1,785 輛** | ~16% |\n| Tata / JBM / VE Commercial | **0 輛** | 完全落標 |\n\n- **Tata 落標原因**：保守定價策略（將營運風險、資產折舊、服務成本納入出價），輸給激進低價的新興廠商；2025 年 223 輛僅為 FAME II/CESL 舊合約尾段交付\n- **Switch Mobility 爆發**：德里市 950 輛 EiV12 訂單（9 月開始批量交付）；12 月單月市占 30.8%\n- **2026 展望**：EKA Mobility（尚未大量出貨）將於 2026 年爆量；PMI 交付持續；Tata 須靠邦政府零散標案支撐\n\n## 政策討論：德里 EV 政策（2026）\n\n### 提議方向\n- 對新車銷售設置強制 EV 比例（硬性配額）\n\n### 風險與爭議\n- **「洩漏效應」**：嚴格強制配額可能導致消費者跨省至哈里亞納邦、北方邦購買 ICE 車\n- 若需求外流，實際減碳效果有限，甚至適得其反\n- 充電基礎建設尚未達標，強制配額超前基礎設施準備\n\n### 背景\n- 德里是印度污染最嚴重的城市之一，EV 政策是空氣品質改善的核心議題\n- 印度乘用 EV 市場處於滲透率相對低的發展期\n\n## 電動水翼船（延伸）\n- Candela P-12 電動水翼船訂單含 11 艘供孟買使用（跨類別電動交通延伸案例）\n\n## VinFast × 馬哈拉施特拉邦（2026-04）\n\n- Vingroup（越南）簽署 MOU：總投資 $65 億美元，電動車相關 **$15 億美元**\n- 計畫組建 6 萬輛電動車隊（與 GSM India 合作）+ 充電設施\n- VinFast 既有泰米爾納德邦廠，VF6/VF7 SUV 已進入印度\n- 馬哈拉施特拉邦：印度 GDP 佔比 14%，孟買為經濟重心\n- 參見：[[sources/vinfast-india-investment]]\n\n## 電動商用車新動態（2026-04）\n\n### Switch Mobility 城際電動巴士（孟買—浦那）\n- **首次**：私人公司城際電動巴士委託（Purple Bus，25 輛 EiV12）\n- EiV12 規格：423kWh LFP，300km+ 續航，235kW 馬達，45 座\n- Switch Mobility 累計部署：2,500+ 電動巴士 + 2,500+ 電動輕型商用車\n\n### 現代汽車 × TVS Motor：電動三輪車（E3W）JDA\n- 聯合開發協議簽署（2026-04-21）\n- 目標市場：印度城市「最後一哩路」配送\n- 背景：印度 2026 年延長電動二/三輪車補貼\n- 開放全球出口\n\n### SML Isuzu（前 SML Mahindra）：FY27 進入電動巴士市場\n- 加入競爭：Tata Motors、Olectra、Switch Mobility、PMI Electro\n- 參與 PM e-Bus Sewa 計畫（大規模政府採購），惟依商業回報評估是否投標\n\n- 參見：[[sources/india-ev-commercial-update-2026]] | [[concepts/電動巴士市場]]\n\n## FY2026 全年 EV 創紀錄（最新，2026-04-27）\n\n| 指標 | FY2025 | FY2026 | YoY |\n|------|--------|--------|-----|\n| 總 EV 零售量 | 197 萬輛 | **245 萬輛** | **+25%** |\n| 電動乘用車 | 108,873 輛 | **199,923 輛** | **+83.6%** |\n| 電動二輪車 | — | **140 萬輛** | 占 EV 57% |\n\n**價格帶轉型**：₹20~30 萬中端市場占比 **8.6%（FY24）→ 24%（FY25）→ 35.7%（FY26）** —— 市場從補貼驅動轉向主動升級\n\n主要品牌：Tata Motors 78,811 輛（+35.9%）/ Hyundai +137.6% / Kia **+794%**\n\n參見：[[sources/india-ev-fy2026-record]]\n\n## 2026 年 4 月 EV 銷量：史上第二高（2026-05-04）\n\n| 品牌 | 4 月銷量 | YoY | 市占 |\n|------|---------|-----|------|\n| Tata Motors | 8,506 輛 | **+77%** | 37% |\n| Mahindra | 5,394 輛 | +63% | 24% |\n| JSW MG Motor | 4,978 輛 | +32% | 22% |\n| VinFast | 1,231 輛 | — | — |\n| **合計** | **23,163 輛** | **+73%** | — |\n\n- 史上第二高月銷（3 月 23,749 輛為史上最高）\n- VinFast 首次月銷突破 1,000 輛（2025-10 開始交車）\n- 參見：[[sources/india-ev-april-2026]]\n\n## 豐田印度三廠擴建（2026-05-01）\n\n- 馬哈拉施特拉邦新建 **3 座整車廠**，投資 **~3,000 億日圓（~$19.1 億美元）**\n- 目標：2030 年代年產能達 **100 萬輛**（為現在 3 倍）\n- 印度將成豐田**全球第四大生產基地**（日、中、美之後）\n- 首座新廠 ~2029 年啟用\n- 產品：SUV + PHEV，供應印度 + 中東 + 非洲\n- 合作夥伴：鈴木（Maruti）\n- 參見：[[sources/toyota-india-3-plants]]\n\n## 印度電池 R&D 大規模投入：擺脫中國技術依賴（2026-05）\n\nTata 和 JSW 兩大集團合計投資逾 **10 億美元**建立電池技術研發中心：\n\n| 集團 | 投資額 | 地點 | 電池化學 |\n|------|-------|------|---------|\n| Tata Agratas | **>$4 億** | 班加羅爾 | **LFP + LMFP** |\n| JSW Motors | **>$5 億**（5~6 年）| 馬哈拉施特拉邦 | 本地化開發 + SDV |\n\n- 兩集團目前均採購中國關鍵電池零件，此為提前建立替代方案\n- 中國正收緊電池技術出口 → 印度企業加速建立本土 IP 與供應鏈韌性\n- Tata Agratas 研究成果將支援古吉拉特邦超級工廠\n- JSW 研發重點另含 SDV 軟體平台與聯網功能\n- 參見：[[sources/india-tata-jsw-battery-rd-2026]] | [[concepts/電池技術路線]]\n\n## Mahindra 加速擴張：2031 年 9 款 EV，產能+50%（2026-05）\n\n| 指標 | 現況 | 目標 |\n|------|------|------|\n| EV 產品線 | 5 款 | **9 款**（2031 年 3 月）|\n| 年產能 | 96,000 輛 | **144,000 輛**（2027 年 3 月）|\n\n- 旗艦新車 **BO7**（2027）：競爭 Tata Harrier.ev，CEO 稱「超大銷量驅動」\n- 平台策略轉變：改採 **NU_IQ 多動力平台**（既支援 Born EV 又支援 ICE），降低開發成本\n- 2025-03 至 2026-04 已售出 55,000 輛 EV\n- 參見：[[sources/mahindra-ev-expansion-2026]]\n\n## Ather Energy EL 平台：進攻印度 ₹1 萬大眾 E2W 市場（2026-05）\n\nAther Energy 推出 EL 平台，首次切入印度電動二輪車（E2W）主流量級市場：\n\n| 指標 | 數值 |\n|------|------|\n| 目標價格帶 | **₹1~₹1.25 萬**（~USD 1,200–1,500）|\n| 該細分市場比重 | 印度 E2W 市場 **45–50%** |\n| FY26 銷量成長 | **+66% YoY** |\n| Q4 FY26 市占率 | **18.6%**（前一年 Q4 8%，+1,100 bps）|\n| Q4 FY26 調整後毛利率 | **19% → 24%** |\n| EBITDA 損失率（Q4）| **-2%**（前一年 -23%）|\n| Rizta 家庭踏板車 | 佔全年銷量 **75%** |\n| Pro Pack 軟體附購率 | **93%**（史上最高）|\n\n**EL 平台設計決策（成本優化）**：\n- 捨棄鋁合金車架（降材料成本）\n- 減少銅用量、簡化傳動\n- Ather Charge Drive Controller（內建充電器，簡化充電架構）\n- AEBS 制動技術（仿 ABS 效果，成本更低）\n- 背景：碳酸鋰等原材料漲 2–2.5 倍、整體商品通膨 40–50%\n\n**Factory 3.0**（馬哈拉施特拉邦 Chhatrapati Sambhaji Nagar）：\n- Phase 1 = 5 萬輛/年，最終規劃 **10 萬輛/年**\n- 2026 年節慶季試產，FY27 底完全達產\n\n通路：351 → **700 家**零售點（翻倍）；快充站 **6,000+**\n\n意義：Ather 從城市科技品牌向大眾市場首次大規模延伸，首次嘗試複製 Ola 等競爭對手的低價量策略，同時維持毛利率改善趨勢。\n\n- 參見：[[sources/ather-energy-el-platform-2026]]\n\n## Related\n- [[entities/VinFast]]\n- [[entities/豐田]]\n- [[concepts/電動巴士市場]]\n- [[concepts/充電基礎建設]]\n- [[concepts/電池技術路線]]\n- [[sources/electric-bus-market-2025-global]]\n- [[sources/delhi-ev-policy-2026]]\n- [[sources/vinfast-india-investment]]\n- [[sources/india-ev-commercial-update-2026]]\n- [[sources/india-ev-fy2026-record]]\n- [[sources/india-ev-april-2026]]\n- [[sources/toyota-india-3-plants]]\n- [[sources/mahindra-ev-expansion-2026]]\n- [[sources/ather-energy-el-platform-2026]]\n- [[sources/india-2w-market-fy27-bifurcation-2026]]\n- [[sources/india-1bn-ev-commercial-incentives-2026]]\n- [[sources/tesla-india-factory-exit-2026]]\n- [[sources/honda-india-ev-hybrid-2026]]\n- [[sources/tata-stellantis-jeep-india-2026]]\n\n## 印度二輪車 FY27 展望：E2W +16–18%，踏板車領漲（2026-05）\n\nCrisil Ratings 分析（FY27 預測）：\n\n| 細分 | FY27 成長 |\n|------|----------|\n| 全體二輪車 | **+7–9%**（超 2,900 萬輛）|\n| **踏板車（含 E2W）** | **雙位數** |\n| 機車 | 中個位數 |\n| **電動二輪車（E2W）** | **+16–18%** |\n\n- 踏板車成長驅動：都市通勤 + 女性騎士 + 最後一哩路需求\n- E2W 挑戰：補貼縮減 + 電池成本下滑放緩 → EV vs ICE 價差收窄\n- Ather EL 平台（Batch 20）正對應踏板車市場 45–50% 的主流價格帶\n- 出口：占行業 ~20%，FY27 維持中高雙位數成長（拉美、非洲、南亞）\n- 參見：[[sources/india-2w-market-fy27-bifurcation-2026]]\n\n## 印度研擬逾 $10 億美元私人電動商用車激勵（2026-05）\n\n政府考慮推出超過 $10 億美元方案，刺激私部門採購電動巴士與電動卡車：\n- 執行期限：約 10 年；主要對象：城際巴士業者（最大宗）\n- 利息補貼：最高 **₹150 萬/輛**（~$17,500），隨時間遞減\n- 信用擔保機制：鼓勵銀行對 ECV 業者融資\n- 背景：現行補助主要集中在政府採購（PM e-Bus Sewa），私人 ECV 完全缺乏政策支持\n- 參見：[[sources/india-1bn-ev-commercial-incentives-2026]]\n\n## Honda 印度大反攻：6 款新車 + 本地製造 EV（2026-05）\n\nHonda Cars India 啟動 FY2026-27 攻勢，目標雙位數成長止血市占：\n\n| 重點 | 內容 |\n|------|------|\n| ZR-V 旗艦 SUV | **強混 2.0L 獨賣**，完全建置進口，2026-07 起交車 |\n| Honda 0 Alpha EV | 本地製造（Tapukara 廠，**₹1,200 億投資**），預計 **2027 年**上市 |\n| 2028 計畫 | 進入 4m 以下緊湊型 + 中型市場，強化本地化 |\n\n- 戰略轉型：從依賴進口 → 本地製造 EV；從汽油主打 → 混合動力核心\n- 參見：[[sources/honda-india-ev-hybrid-2026]]\n\n## Tata × Stellantis：共同開發全球 Jeep SUV，印度蘭揚加翁廠成全球製造樞紐（2026-05）\n\n兩家公司深化 20 年合作，共同開發全球 Jeep SUV：\n\n| 項目 | 內容 |\n|------|------|\n| 平台 | 可能採 **Tata Sierra 平台** |\n| 生產地 | 印度蘭揚加翁廠（現為 Jeep Compass 右駕全球唯一基地）|\n| 上市 | **2028 年** |\n| 出口 | **50+ 個國家** |\n\n- 意義：印度從低成本生產基地 → 工程與平台開發中心角色轉型\n- 與 [[sources/stellantis-fastlane-2030]] 的 FaSTLAne 2030 Jeep 全球策略高度吻合\n- 參見：[[sources/tata-stellantis-jeep-india-2026]]\n\n## Tesla 宣布終止印度設廠計畫（2026-05）\n\n印度重工業部長 H.D. Kumaraswamy 2026-05-19 公開確認：**Tesla 已放棄在印度建廠**。\n\n- **核心障礙**：關稅問題（Tesla 要求先降進口整車稅再建廠，印度堅持先建廠）\n- **印度政府反應**：稱已為 Tesla 量身定制 EV 政策優惠，Tesla「不識抬舉」\n- **市場影響**：中高端市場由 Tata、Mahindra、現代、Kia 和 VinFast 繼續主導\n- **外資信號**：印度「先建廠再降稅」立場堅持，其他外資車廠可能重新評估進入策略\n- 參見：[[sources/tesla-india-factory-exit-2026]]\n\n## 中國收緊電池技術出口：印度仍難擺脫依賴（2026-05）\n\n信實工業（Reliance Industries）x CATL 案例：\n- 信實希望技術轉移在古吉拉特邦本地生產電芯 → CATL **拒絕技術轉移**\n- 信實轉向廈門海辰儲能，但進展不順\n- 最終妥協：直接採購 CATL 成品組件組裝（放棄 IP 自主性）\n- 與 Tata Agratas（>$4 億）+ JSW（>$5 億）的本土 R&D 投資形成對比：印度企業正兩路並進\n- 參見：[[sources/china-catl-battery-tech-export-2026]]\n\n## 德里 EV 登記 7 年新高：E2W 暴衝、電動三輪車崩跌（2026-01~05）\n\nEnvirocatalysts 數據：德里 2026 年 1~5 月 EV 登記量創 7 年高：\n\n| 細分 | 2026 年 1~5 月 | 2025 同期 | YoY |\n|------|--------------|----------|-----|\n| 電動二輪車（E2W）| **20,239 輛**（占 51.9%）| 11,939 | **+70%** |\n| 私人電動乘用車 | **9,471 輛**（占 24.3%）| 4,832 | **+96%** |\n| 電動計程車/APP 車 | 1,068 輛 | — | **+254%** |\n| 電動巴士 | 858 輛 | — | **+59%** |\n| **電動三輪車（e-rickshaw）** | **1,887 輛**（占 4.8%）| 25,643 | **-93%** |\n\n- E2W + 私人乘用 EV 均創 2019 年以來最高\n- e-rickshaw 崩跌：2025 年為歷史高點，2026 年急劇逆轉（推測：補貼取消 + 法規打壓）\n- 乘用 EV +96% 與印度 FY26 全年 +83.6% 趨勢一致，德里市場動能強勁\n- 參見：[[sources/delhi-ev-7year-high-2026]]\n\n## 南韓 Toptec 進軍印度整車廠：電池模組設備首次海外直供（2026-06）\n\n電池設備廠商 Toptec 成功與印度大型整車集團（身份未公開）簽署供應合約：\n\n| 項目 | 數值 |\n|------|------|\n| 合約金額 | **約 130 億韓元（~$880 萬）**，占 Toptec 2025 年營收 7.6% |\n| 接單時間 | 2026 年 4 月（PO 已到位）|\n| 建廠地點 | 印度**浦那（Pune）** |\n| 完工時程 | **2027 年 2 月底** |\n| 量產時程 | **2027 年 3 月** |\n| 設備類型 | 袋型電池模組 + 電池組組裝設備 |\n\n- 此為 Toptec 自 2019 年進軍電池事業以來**首次向海外整車廠直供**\n- Toptec 客戶群：SK On → 現代汽車 → 現代摩比斯 → 印度整車廠（逐步多元化）\n- 背景：印度整車市場年銷 440 萬輛（全球第三），EV 快速成長吸引設備廠前進\n- Toptec 2026 Q1：營收 -28% 但營業利益轉正（電池事業結構性改善）\n- 參見：[[sources/toptec-india-battery-equipment-2026]]\n\n## Tata 引入奇瑞平台開發 Avinya 豪華 EV（2026-06）\n\nTata Motors 採用奇瑞汽車 EV 平台技術開發旗下豪華品牌 **Avinya**：\n- 首款車預計 **2027 年**上市；背景：JLR Panthera 平台延遲，Tata 急需替代方案\n- 印度首例在中印關係緊張背景下引進中國 EV 平台的案例（技術授權，非直接投資）\n- 奇瑞同期藉 Nissan Sunderland 代工進英國，形成「平台出口」戰略版圖\n- 參見：[[sources/tata-chery-avinya-platform-2026]] | [[concepts/中國EV出海策略]]"

      "body": "# Robotaxi（自動計程車）\n\n無人駕駛計程車服務，2026 年技術瓶頸已解除，核心挑戰轉為法規合規與商業獲利能力。\n\n## 現況\n- 賓士、Volkswagen、Waymo 等已在歐美上路\n- 發展瓶頸：技術突破 → 監管批准 + 複雜場景下的營運韌性\n\n## 成本現況與目標\n| 指標 | 現況 | 目標 |\n|------|------|------|\n| 營運成本 | >$8/公里 | ~$0.8/公里（降 10 倍）|\n\n## 市場預測（BCG）\n- 2030 年歐洲需求：~12 萬輛\n- 損益平衡條件：10 座以上城市 + 至少 1.5 萬輛/業者\n\n## 消費者接受度\n| 地區 | 接受度 |\n|------|--------|\n| 中國 | ~60% |\n| 歐洲 | ~35% |\n\n## 法規環境\n- **美國**：事故頻傳（Cruise 2024）後監管趨嚴\n- **中國**：地方試點 → 逐步中央統一規範\n- **歐洲**：軟體能力落後，供應商更換頻繁；Gartner 認為競爭關鍵是軟體堆疊\n\n## 非技術挑戰\n- 精準停靠、協助乘客、行李搬運等細節\n- 高空轉率損害損益模型\n- 停電、基礎建設成熟度風險\n\n## 中國業者的海外商轉策略（2026）\n\n受限於國內法規，中國自駕業者加速向東南亞與中東擴展：\n\n| 業者 | 地點 | 動態 |\n|------|------|------|\n| 文遠知行（WeRide）| 新加坡 | 2026-04-01 × Grab 啟動自駕接駁車實驗 |\n| 百度 | UAE | 2026-01 宣布與 UAE 企業合作自動駕駛營運 |\n| 小馬智行 | 歐洲（透過 Verne）| 提供第 7 代 AV 系統，以極狐 Alpha T5 為基礎車輛 |\n| 小馬智行 | 杜拜 | 計劃中，待批准 |\n\n- 中國國內障礙：L4 商轉僅限北京/廣州等少數區域，事故責任歸屬法律不明確\n- 新加坡優勢：完善法律 + 適中城市規模 + 開放監管\n\n## 歐洲競局：代理人對決（2026）\n\n| 陣營 | 代表 | 技術來源 |\n|------|------|---------|\n| 中國代理人 | Verne + Uber + 小馬智行 | 極狐 Alpha T5 + 小馬智行第 7 代 AV |\n| 歐洲本土車廠 | VW、賓士 | 自有車款，元戎啟行等輔助 |\n| 美系 | Waymo | 自研，預計 2026-09 進入倫敦 |\n\n- Waymo 進入倫敦（2026 年 9 月）是歐洲競局重要變數\n- Verne 雖快速布局，但硬體與演算法均依賴中國合作夥伴\n\n## 台灣智駕：特殊場景策略（2026-04）\n\n主流 Robotaxi 路線（開放道路）以外，台灣智駕 CEO 沈大維提出「特殊場景優先」的差異化路徑：\n- 工廠（18hr 重複搬運）、港口、偏鄉、煉鋼廠 → 高勞動成本 + 缺工 + 危險環境\n- 模組化系統：4 人座小巴 → 180 噸重型搬運車，同一套演算法\n- 已落地：日本鋼鐵廠（分潤模式）、沖繩港口（計程車整合）、高雄亞灣區\n- 技術特點：AI 訓練 AI（生成式 AI 合成惡劣天候數據，解決長尾效應）\n- 參見：[[sources/taiwan-av-special-scenes]] | [[entities/台灣智駕]]\n\n## 日本 2030 自駕車目標（2026-04）\n\n日本成長戰略會議：2030 年代自駕車全球市佔目標 **25%**（與現在日本汽車市佔相當）：\n- 「預算不設限」戰略：美中領先 → 追趕不能省預算\n- 配套：垂直 AI 目標 15% 全球市佔（5 兆日圓）\n- 參見：[[sources/japan-2030-autonomous-ai-strategy]]\n\n## 巴黎 RATP × Karsan：L4 自駕巴士法規里程碑（2026-04）\n\n| 指標 | 數值 |\n|------|------|\n| 路線 | 393 路（Sucy–Bonneuil RER ↔ Thiais，8.5 公里）|\n| 試驗期 | 六個月 |\n| 累計里程 | **約 3,000 公里**（混合交通）|\n| 自動駕駛成功率 | **98%**（無需司機介入）|\n| 法規批准 | 法國 DGEC 核准 → **首款可在全法國公共運輸自動運行的電動中巴** |\n\n- 車輛：Karsan e-ATAK，技術供應商 Adastec（LiDAR + 雷達 + 紅外線）\n- 仍需安全員隨行；下一步（挪威斯塔萬格）挑戰「無安全員」全自動\n- **意義**：L4 自駕巴士在歐洲最複雜都市環境之一取得法規認可，是「可規模化技術」的有力論據\n- 參見：[[sources/ratp-karsan-autonomous-bus-paris]]\n\n## Waymo 美國擴張：Miami & Orlando（2026-04）\n- Waymo 向全體用戶開放邁阿密與奧蘭多服務\n- 意義：旅遊城市（非科技城市）開放 → 驗證更廣泛消費場景\n- Waymo 覆蓋版圖：Phoenix → San Francisco → Austin → Miami/Orlando（→ 倫敦 2026-09）\n- 參見：[[sources/waymo-miami-orlando-expansion]]\n\n## Waymo 收購蘋果亞利桑那測試場（2026-06）\n\nWaymo 以 **$2.2 億美元**收購 Apple 位於亞利桑那州的 **5,500 英畝**自駕車測試場：\n\n| 設施 | 規模 |\n|------|------|\n| 城市道路模擬區 | 115 英畝 |\n| 車輛動態測試區 | 35 英畝 |\n| 橢圓測試車道 | 4 英里 |\n| 高速公路測試段 | 有 |\n\n**背景**：Apple 2021 年以 $1.25 億買入 → 2024 年放棄 Project Titan → Waymo 以 1.76 倍溢價接手\n\n**Waymo 現況（2026-06）**：\n- 車隊規模：**近 4,000 輛**，服務 **10+ 美國城市**（SF、LA、Phoenix、Austin、Atlanta 等）\n- 覆蓋面積：**>1,400 平方英里**\n- 乘車量：~50 萬次/週\n- **2026 年目標：100 萬次付費乘車/週**\n- 海外擴張：首批海外城市為**東京**與**倫敦**\n- 近期融資：$160 億（估值 $1,260 億）\n\n→ 5,500 英畝專用測試場難以複製，是 Waymo 鞏固技術領先優勢的基礎設施\n- 參見：[[sources/waymo-arizona-expansion-2026]]\n\n## 中國 Robotaxi 成本突破（2026-04，北京車展）\n\n| 企業 | 突破 | 數值 |\n|------|------|------|\n| **小馬智行** | Gen 7 總成本（車體+電池+AD）| **< RMB 23 萬（~$33,700）**，低於 Tesla Model 3 |\n| **小馬智行** | 2026 末車隊目標 | **3,000 輛** |\n| **文遠知行** | × 聯想合作 | 未來 5 年全球 **20 萬輛** |\n| **文遠知行** | 2026 末目標 | **2,600 輛** |\n| **文遠知行** | 第三代算力平台 | 降低 AD 系統成本 **50%** |\n\n成本優勢來源：中國電動車供應鏈完整性（電池/電機/電子全面本土化）\n參見：[[sources/china-robotaxi-cost-advantage]] | [[sources/beijing-auto-show-2026]]\n\n## 自駕系統耗電分析（2026）\n\n| 系統 | 自駕功耗 |\n|------|---------|\n| 早期 Cruise Bolt | 1.5~3kW |\n| Waymo 現役 | ~1kW |\n| Rivian / Lucid 目標 | ~1.1kW |\n| 業界 2026~2030 目標 | **500W** |\n\nMIT：若 1B 輛 AV 每日 1 小時以 840W 運行 → 等同 2023 年全球資料中心耗電量\n參見：[[sources/autonomous-driving-power-consumption]]\n\n## Uber 自駕大單（2026-04）\n\n| 合作 | 投資 | 規模 | 時程 |\n|------|------|------|------|\n| Uber × Lucid | $5 億 | 35,000 輛 Gravity SUV | 2026 舊金山起 |\n| Uber × Rivian | 最高 $12.5 億 | 10,000 輛 R2 | 2028 起 25 城市 |\n\n參見：[[sources/uber-ev-infrastructure-investment]]\n\n## Rocsys M1：Robotaxi 場站自動充電（2026-04-30）\n\n- 一套系統服務最多 **10 個車位**同時自動插拔充電\n- 插拔成功率 **99.9%+**，相容所有 EV 車型與插頭\n- 2027 年計畫大規模部署；已簽重大 Robotaxi 客戶合約\n- 意義：Robotaxi 商業規模化後場站人力成本瓶頸的直接解法\n- 參見：[[sources/rocsys-m1-robotic-charging]]\n\n## 2026 自駕實體 AI 趨勢：2029 年市場爆發（Tech Forum 2026）\n\nDIGITIMES 分析師余君濤系統分析：\n\n| 預測 | 數值 |\n|------|------|\n| 2030 年自駕乘用車滲透率 | **92.5%**（~9,230 萬輛）|\n| 2029 年 | 市場爆發點（技術成熟 + Robotaxi 規模化 + 中國自駕平權）|\n| 2026 全球自駕晶片市場 | **$97 億** → 2030 年 **$192 億** |\n\n**最新商業化數據（2026-05）**：\n- Waymo：累計自動行駛 **>2 億英里**；每週 **>50 萬次**付費乘車\n- Tesla Cybercab：2026-02 德州工廠量產，服務奧斯汀/達拉斯/休士頓\n\n**技術架構趨勢**：第三代 E2E + 世界模型（World Model）——空間 + 時間認知，大幅提升泛化性\n- 參見：[[sources/av-physical-ai-trends-2026]]\n\n## Tesla FSD 歐洲擴張：立陶宛成 EU 首個核准國（2026-05）\n\n- 立陶宛認可荷蘭 RDW 核發的臨時 EU 型式核准 → EU 第一個 FSD 落地國\n- **技術分類**：SAE Level 2（駕駛仍須全程監看，≠ 完全自駕）\n- Tesla 戰略：歐洲逐國推進（北歐國家有保留意見）+ 同步中國上線\n- 若無 EU 整體核准，跨境駕駛將面臨「法規拼布」問題\n- 參見：[[sources/tesla-fsd-eu-expansion-2026]]\n\n## Tesla Robotaxi 德州現實：僅 42 輛（2026-06-02）\n\n德州 DMV 登記數據揭示 Tesla Robotaxi 規模遠低於承諾：\n- 德州登記：**42 輛**，Musk 曾承諾 1,000+ 輛（差距 ~24 倍）\n- 同期 Waymo 在 SF/Phoenix/Austin 運營約 700 輛\n- 凸顯 Tesla 純視覺（Camera-only）路線在商業規模化的挑戰\n- 參見：[[sources/tesla-robotaxi-texas-reality-2026]]\n\n## 豐田入股 Tier IV：e-Palette 電動巴士 L4 自駕（FY2027）（2026-06）\n\n- 豐田透過 Toyota Investment Partners 以 **~¥10 億（$620 萬）**取得日本自駕新創 **Tier IV ~1% 股份**\n- 目標：FY2027 在 **e-Palette 電動接駁巴士**實現 **L4 自動駕駛**\n- 豐田的「多區域自駕」策略：美國（Waymo）× 中國（小馬智行）× 日本（Tier IV）\n- Tier IV：開源 Autoware 框架維護者，日本本土 L4 生態系核心\n- 參見：[[sources/toyota-tier-iv-l4-investment-2026]]\n\n## Uber × WeRide：歐洲首個 Robotaxi（馬德里，2026-06）\n\n- 馬德里成為**歐洲第一個商業 Robotaxi 服務城市**（Uber+WeRide）\n- 倫敦服務「數月內」上線（2026-06-09 更新）\n- WeRide（文遠知行）：廣州→新加坡→阿聯酋→西班牙→英國，歐洲擴張加速\n- 參見：[[sources/uber-robotaxi-europe-expansion-2026]]\n\n## Tesla Cybercab EPA 正式規格確認（2026-06）\n\nEPA 申報文件揭露完整規格：\n\n| 規格 | 數值 |\n|------|------|\n| 重量 | **3,113 磅（~1,412 kg）** — 美國市場最輕 EV |\n| 驅動 | **前輪驅動（FWD）** — Tesla 史上首款前驅車 |\n| 馬達 | 169 馬力（163 kW）單前置永磁馬達 |\n| 電池 | **~48 kWh** |\n| EPA 預估續航 | **~293 英里（~472 km）** |\n\n- 原始設計**無方向盤、無踏板**（真正 Robotaxi 設計）\n- 生產已啟動；目標售價 <$30,000；上市「2026 年前」尚待落地\n- 超輕量化（媲美 Honda Civic）換來極低成本，Robotaxi 運營最優化設計\n- 參見：[[sources/tesla-cybercab-specs-2026]]\n\n## Related\n- [[concepts/ADAS智駕系統]]\n- [[concepts/自動駕駛安全監管]]\n- [[concepts/東南亞EV市場]]\n- [[entities/文遠知行]]\n- [[entities/小馬智行]]\n- [[sources/robotaxi-market-2026]]\n- [[sources/china-autonomous-driving-overseas]]\n- [[sources/europe-robotaxi-verne-ponyai]]\n- [[sources/waymo-miami-orlando-expansion]]\n- [[sources/taiwan-av-special-scenes]]\n- [[sources/japan-2030-autonomous-ai-strategy]]\n- [[sources/ratp-karsan-autonomous-bus-paris]]\n- [[sources/china-robotaxi-cost-advantage]]\n- [[sources/autonomous-driving-power-consumption]]\n- [[sources/uber-ev-infrastructure-investment]]\n- [[sources/rocsys-m1-robotic-charging]]\n- [[entities/台灣智駕]]"

      "body": "# 東南亞 EV 市場\n\n東南亞是中國電動車廠的重要海外戰場，泰國為最大製造基地，中國品牌已掌握超過三分之二的 EV 銷售份額；同時也是自動駕駛商業化的試驗場（新加坡）。\n\n## 泰國：東南亞 EV 風向球（2026）\n\n### 市場規模\n- 2026 年曼谷車展 EV 訂單：132,951 輛（+71% YoY）\n- 2026 年全年泰國純電市場預測：**16~18 萬輛**（+30% YoY）\n- 泰國為**東南亞最大汽車製造國**\n\n### 中國品牌主導\n| 品牌 | 2026 曼谷車展訂單 |\n|------|-----------------|\n| 比亞迪 | 17,354 輛（第一，超越豐田）|\n| 豐田 | 15,750 輛（第二）|\n| 奇瑞、上汽、長安、長城、廣汽 | 合計超越 Honda、Mazda、Mitsubishi 等日系 |\n\n- **中國品牌占比**：超過 2/3\n\n### 成長驅動因素\n- 油價上漲（美伊衝突）→ 消費者重新評估持車成本\n- 泰國政府：稅收優惠 + 購車補貼 + 吸引車廠設廠政策\n- 中國電動車高性價比\n\n## 新加坡：自動駕駛試驗場\n\n- 文遠知行（WeRide）× Grab：2026-04-01 啟動自駕接駁車實驗\n- 百度、小馬智行也在中東（UAE、杜拜）布局\n- 吸引力：完善法律制度 + 適中城市規模 + 開放監管環境\n\n## 日本市場：電動巴士\n\n- 中國製電動巴士占日本市場 **70%+**（比亞迪為主）\n- 鴻海 × 三菱FUSO 嘗試以「日本品牌+非中國製」突破\n\n## 馬來西亞：比亞迪設廠停工（2026-04 深度）\n\n### 最新進展\n- 2025-08：比亞迪宣布在丹戎馬林 KLK 科技園區設 CKD 廠，預計 2026 啟用\n- **2026-03：建設全面停工**，與 MITI 條件談不攏\n\n### MITI 爭議條件\n| 條件 | 內容 |\n|------|------|\n| 出口比例 | 80% 必須出口 |\n| 本地銷售上限 | 每年 ≤ 1 萬輛 |\n| 本地最低售價 | ≥ RM 100,000（≈$25,000）|\n\n- 2026 Q1：馬來西亞 EV 佔比已達 ~7%，最受歡迎：寶騰 > 比亞迪 > Tesla > 奇瑞 > 極氪\n- **泰國對比**：比亞迪羅勇廠 2024-07 啟用，年產 15 萬輛，無此類限制\n\n### 結構性兩難\n- 開放：中國 EV 衝擊本土品牌（寶騰）\n- 保護：外資卻步，被排除在全球 EV 供應鏈\n\n- 參見：[[sources/byd-malaysia-factory-update-2026]]\n\n## GWM Ora 5 泰國量產：中國品牌在地化深化（2026-05）\n\n長城汽車（GWM）Ora 品牌在泰國 Rayong 廠開始量產 Ora 5，首款緊湊型 SUV：\n\n| 規格 | 數值 |\n|------|------|\n| 電池 | 58.3 kWh LFP |\n| DC 快充 | 120 kW |\n| NEDC 續航 | 520 km |\n| 泰國起售價（EV）| 649,000 泰銖（~€17,000）|\n| 工廠年產能 | 80,000 輛（ICE/HEV/EV 混線）|\n\n- 泰國 5,000 輛預訂，5–6 月交付\n- **40% 出口**至東南亞其他市場\n- 歐洲版計畫：2026 年夏進入（ICE + HEV + EV 三版本）\n- 歐洲工廠考慮中：西班牙、匈牙利\n- 參見：[[sources/gwm-ora5-thailand-2026]]\n\n## 三菱汽車 HEV 策略：東南亞 + 台灣 + 紐澳（2026-05）\n\n三菱汽車在 BEV 需求疲弱的市場背景下，將 HEV 提升為核心戰略車種：\n\n| 市場 | 計畫 |\n|------|------|\n| 泰國 | 已上市 HEV（2024）|\n| **菲律賓**（拉古納省）| 投資 HEV 產線，EVIS 計畫，**2028 年量產** |\n| 日本 | 規劃 2028 年新增 HEV（官方未正式確認）|\n| 台灣、東南亞、紐澳 | 核心市場聚焦，以 HEV 對抗 BEV |\n\n- FY2025 財務：中東 6% 銷量受霍莫茲海峽風險影響 → 測試阿曼/好望角替代航線\n- 日本市場現實：HEV 153 萬輛 vs BEV/PHEV 各不足 5 萬輛（相差 30 倍）\n- 參見：[[sources/mitsubishi-motors-middle-east-routes-2026]] | [[sources/mitsubishi-hev-japan-2028]]\n\n## Leapmotor C10 馬來西亞在地組裝：Stellantis 東協首款本地生產（2026-06）\n\n零跑汽車（Leapmotor）C10 透過 Stellantis 通路在馬來西亞進行本地組裝（CKD）：\n- 成為 **Stellantis 在東南亞首款本地生產車型**\n- 規避馬來西亞 2026-07-01 CBU EV 新規（需 CIF ≥ RM20 萬 + 最低 180kW）\n- 延伸零跑×Stellantis 合作模式：從歐洲（德國 €49/月、西班牙薩拉戈薩廠）→ 東南亞\n- 對比亞迪的啟示：CKD 策略比停工協商更靈活\n- 參見：[[sources/ev-news-digest-jun1-10-2026]] | [[concepts/中國EV出海策略]]\n\n## 中國廠商在東南亞的戰略邏輯\n1. **泰國**：設廠量產（比亞迪、GWM 等）→ 本地生產規避關稅 + 出口東南亞\n2. **馬來西亞**：保護主義拉鋸，比亞迪廠停工\n3. **新加坡**：作為 AV 商業化的合規試驗場\n4. **日本**：電動巴士作為先行佈局\n\n## 馬來西亞 CBU EV 進口新規（2026-07-01）\n\n| 條件 | 標準 |\n|------|------|\n| 最低 CIF 價格 | **RM 20 萬（~USD 50,000）** |\n| 最低輸出功率 | **180 kW** |\n| 違規稅率 | 進口 5% + 消費稅 10% + SST 10% → 最終售價超 RM 30 萬 |\n\n- 2022~2025 年特別關稅豁免（≥RM10 萬進口 EV 免稅）已於 2025 年底到期\n- **比亞迪**：7 款中僅 Seal + Sealion 7 達 180kW，但售價均低於 RM20 萬 → 雙重夾擊\n- **Tesla** Model 3/Y 起售均不超過 RM20 萬 → 同樣受衝擊\n- 加上比亞迪 CKD 工廠已停工（2026-03），在馬市場面臨最大不確定性\n- 參見：[[sources/malaysia-cbv-ev-regulation-2026]]\n\n## 泰國電動皮卡：高油價催化新細分市場（2026-05）\n\n2026 年 2 月底後，泰國爆發中東戰事，柴油價格急漲：\n\n| 時間 | 泰銖/公升 |\n|------|---------|\n| 2026-02-28 | 29.94 |\n| 2026-05-05 | **40.80**（**+36.3%**）|\n\n→ 皮卡市場消費者主動轉向純電：「燃料成本低 + 維護成本低」雙重吸引力\n\n**泰國電動皮卡現有玩家**：吉利（Riddara）、江淮、上汽、NEX、五十鈴、豐田\n\n### 吉利 Riddara：泰國作為海外首站\n| 項目 | 細節 |\n|------|------|\n| 品牌 | **Riddara**（吉利皮卡品牌）|\n| 主力車型 | RD6 電動皮卡 |\n| 策略 | **泰國刻意選為海外首市場** |\n| 計畫 | **泰國在地組裝**（加速推進中）|\n\n- 泰國工業聯合會（FTI）確認：商業車隊與個人消費者對電動皮卡需求同步上升\n- 限制因素：泰國銀行近期收緊汽車貸款審核（壞帳疑慮），壓制所有車款銷量\n\n- 參見：[[sources/geely-thailand-pickup-2026]]\n\n## LGES × Honda × 河內：從 50 站試點到 1,000 站全市換電網絡（2026-05）\n\n越南電動機車市場高速成長，Honda 攜手 LGES 搶占換電基礎設施：\n\n| 指標 | 數值 |\n|------|------|\n| 越南 2 輪車規模 | **~8,000 萬輛** |\n| 電動機車佔比 | **~4%**（約 320 萬輛）|\n| Honda 越南市占 | **86%** |\n| 河內在冊車輛 | **~800 萬輛** |\n\n**完整部署計畫**：\n- **Q3 2026**：Hoan Kiem 區（首批限制 ICE 路段）試點 **50 座**換電站 + **500 輛**示範機車\n- **Q3 2027 起**：擴張至 **1,000 座**換電站，覆蓋**河內全境**\n\n- LGES 使用 **2170 圓柱電池**，負責電池安全管理 + 換電站運營 + 生命周期系統\n- Honda 供應電池組 + 換電機 + 電動機車本體\n- 河內政策：2026-07 起 Ring Road 1 內限制 ICE 機車 → 2030 年擴大範圍\n- 參見：[[sources/lges-honda-vietnam-bss-2026]] | [[sources/hanoi-1000-bss-2026]]\n\n## Volvo EX30 泰國起火：電動車品質信任危機（2026-05）\n\n- 泰國 3 個月內 **2 起** EX30 起火事故；其中一起充電至 80% 後停在停車場起火\n- 泰國召回 **1,166 輛**，電池更換進度落後，已有 **45 名車主提告**\n- 泰國消費者保護機構考慮列為「對社會具危險性」，可能提起民事訴訟\n- EX30 已從 Volvo 泰國官網下架；全球相關召回 ~4 萬輛\n- 臨時措施：充電上限控制在 **70%** 以下\n- 與 Volvo EX60 首駕獲得「史上最佳 Volvo」同週發生，對比鮮明\n- 參見：[[sources/volvo-ex30-thailand-fire-2026]]\n\n## Related\n- [[entities/比亞迪]]\n- [[entities/鴻海]]\n- [[entities/文遠知行]]\n- [[entities/豐田]]\n## 日產 N7「Primera EV」菲律賓首發：中國合資車型外銷東南亞（2026-06）\n\n日產藉 Dongfeng 合資體系將 N7 以「Primera EV」品牌帶入東南亞：\n- 菲律賓為 **N7 全球首個海外市場**，2026 年 Q4 上市\n- 規格：160kW/58kWh LFP（540km CLTC）或 200kW/73kWh LFP（635km CLTC）\n- 商標已在阿曼、巴林、馬來西亞申請（多市場準備）\n- 意義：日系廠商開始以「中國研發 + 中國製造 → 東南亞出口」策略應對中國 EV 競爭\n\n- [[entities/吉利汽車]]\n- [[concepts/中國EV出海策略]]\n- [[concepts/Robotaxi自動計程車]]\n- [[sources/thailand-ev-market-2026]]\n- [[sources/china-autonomous-driving-overseas]]\n- [[sources/byd-malaysia-factory-negotiation]]\n- [[sources/byd-malaysia-factory-update-2026]]\n- [[sources/malaysia-cbv-ev-regulation-2026]]\n- [[sources/geely-thailand-pickup-2026]]\n- [[sources/mitsubishi-motors-middle-east-routes-2026]]\n- [[sources/mitsubishi-hev-japan-2028]]\n- [[sources/hanoi-1000-bss-2026]]"
