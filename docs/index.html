      "body": "# 電動卡車市場\n\n電動重型貨車（電動重卡/HGV）市場 2026 年進入加速期，歐洲多國 TCO 接近柴油平價，但充電基礎建設不足與政策碎片化仍是主要挑戰。\n\n## 歐洲市場現況（2026）\n\n### TCO 競爭力分析（Milence 白皮書）\n| 國家 | 狀況 |\n|------|------|\n| 荷蘭 | 2026 年起多數場景電動重卡已具成本優勢 |\n| 德國 | 零排放重卡免路費延至 2031 年，預期成本效益顯著 |\n| 瑞典 | 電費低但缺路費優惠，長途成本平價延遲 |\n\n> **「歐洲面臨的不是技術缺口，而是政策缺口。」** — Milence\n\n- 能源危機推升柴油成本 9~11 歐分/公里 → 有利電動重卡競爭\n- 現代電動重卡能耗：約 **1.1 kWh/公里**（持續優化）\n- 歐洲主要貨運走廊適合卡車的公共充電點：**約 1,800 個**（嚴重不足）\n\n### 充電基礎建設痛點\n> 「2024 年 7 月開始使用電動卡車時，只能依賴公共充電，每度電高達 81 歐分。在這個電費水準下，電動卡車根本沒有商業案例。」— PamSun GmbH（Katrin Herda）\n\n- 公用充電費用遠高於場站自建充電\n- 解方：共享場站基礎建設（dragonize 合作社模式）\n\n## 主要參與者與案例\n\n| 角色 | 代表 | 動態 |\n|------|------|------|\n| 充電運營商 | Milence | 33 個樞紐、221 個充電點，覆蓋 8 國 |\n| 共享充電平台 | dragonize（TST Logistik）| 沃爾姆斯站 8 個充電點，20+ 業者共用 |\n| 政府補貼 | 法國 EDF | 2.4 億歐元：補貼 2,000 輛重卡（€1.5 萬/輛）+ 180 座充電站 |\n\n## 政策投資動態（2026）\n\n### 法國 EDF（€240M 計畫）\n- **電動重卡補貼**：€3,000 萬，2,000 輛，中小企業各最多 2 輛\n- **充電站建設**：€5,000 萬，73 個地點 × 180 座，3 年，公開使用\n\n## 創新商業模式\n\n### dragonize 合作社\n- 物流業者共享彼此場站充電設備\n- 數位平台 DepotOS：充電規劃、預約、路線管理\n- 沃爾姆斯站：7.5 MW 太陽能 + 未來 6~7 MWh 固定儲能\n\n## Tesla Semi 量產啟動（2026-04-30，美國）\n\n| 規格 | 數值 |\n|------|------|\n| 生產地 | Gigafactory Nevada 旁獨立廠房 |\n| 年產能 | **最高 50,000 輛**（逐步爬坡）|\n| 標準版 | 325 英里（~523km），**$260,000** |\n| 長程版 | 500 英里（~800km），**$290,000** |\n| 充電 | 支援 **兆瓦充電 1.2 MW** |\n\n- 加州清潔卡車補貼計畫（2025-01~2026-02）：**965/1,067 份申請指定 Tesla Semi**，戴姆勒+Paccar+Volvo 合計 < 100 份\n- 同步推出 **Tesla Basecharger**（125kW，場站隔夜充電，2027 年初出貨）\n- 參見：[[sources/tesla-semi-production-2026]] | [[sources/tesla-basecharger-depot]]\n\n## 英國：Moto £5 億 eHGV 超級樞紐（2026-04）\n\n英國最大高速公路服務站業者 Moto（60+ 站點）：\n- 乘用 EV 充電位 **4 倍擴容**\n- **15 個 eHGV 超級樞紐**，每處最多 **100 個充電位**，沿主要貨運走廊布局\n- 總投資：£5 億（過去 5 年已投 £3 億）\n- 參見：[[sources/moto-uk-charging-investment]]\n\n## 德國電動卡車實際使用調查：93% 滿意（2026-05）\n\n德國 Öko-Institut 調查（57 家運輸公司，300+ 輛電動卡車）：\n\n| 指標 | 數值 |\n|------|------|\n| 使用者滿意率 | **93%** |\n| 預計 2030 年電動卡車將成標準 | **93%** 受訪企業 |\n| 平均日行駛里程 | **268 英里（432 km）** |\n\n**主要挑戰**：\n- **高車價**（購置成本）\n- **電網連接**：平均需求 1,115 kW（等同一個城市社區的用電量）\n- **公共充電不足**：< 5% 使用公共充電，多數依賴場站自建\n\n→ 電動卡車在真實場景具高滿意度，但電網基礎建設是瓶頸\n- 參見：[[sources/ev-truck-satisfaction-germany-2026]]\n\n## Ford Energy DC Block：美國重型 ESS 切入（2026-05）\n\nFord 成立 **Ford Energy** 子公司，推出 **DC Block** 大型儲能系統：\n\n| 規格 | 數值 |\n|------|------|\n| 能量密度 | **5.45 MWh / 標準貨櫃**（LFP 棱柱形 512 Ah）|\n| 電壓架構 | **1,040–1,500 V DC**（業界罕見高壓）|\n| 配置 | 2 小時 / 4 小時版 |\n| 設計壽命 | **20 年** |\n| 防護等級 | IP55 |\n| 生產工廠 | 肯塔基州 Glendale（前 F-150 Lightning / E-Transit 電池廠改建）|\n| 計畫年產能 | **20 GWh** |\n| 首批交付 | **2027 年** |\n\n**與 Tesla Megapack 對比**：\n- Tesla：~80 GWh 計畫產能，~47 GWh 已投運\n- Ford：20 GWh 計畫，從零起步，2027 年交付\n\n→ Ford 以廢棄 EV 電池廠轉型 ESS 工廠，為美國電網儲能注入本土競爭者\n- 參見：[[sources/ford-energy-dc-block-2026]] | [[concepts/儲能市場]]\n\n## 歐洲旗艦車型比較（2026-04/05）\n\n| 車型 | 製造商 | 最大續航 | 充電（MCS）| 備註 |\n|------|--------|---------|-----------|------|\n| **FH Aero Electric** | Volvo | **700 km**（樂觀）| 700 kW / 50 分鐘 | 2026 夏量產，NCA（三星SDI）|\n| E-Tech T 780 | Renault | 600 km | MCS / 40 分鐘（更快）| Volvo 姊妹車 |\n| eActros 600 | Mercedes | **500 km**（保守）| — | 保守標注，實際可能更長 |\n| eTGM | **MAN** | 480 km | **375 kW** | 16 噸配送，2027 年量產 |\n\n### Volvo FH Aero Electric（2026-06 完整規格揭露）\n\n| 規格 | FH Aero Extended（旗艦）|\n|------|------------------------|\n| 軸配置 | **6×2**（標籤軸）|\n| 電池（總/可用）| **780 / 725 kWh**（使用率 **93%**，業界最高）|\n| 續航 | **700 km** |\n| 充電 | **700 kW MCS**（旗艦標配）|\n| 車頭自重 | 13.3 噸 |\n| 量產 | **2026-09**（比利時根特 + 瑞典 Tuve）|\n| 訂單開放 | 2026-06-15 |\n| 電池保固 | 6 年 / 720,000 km，保留 80% SOH |\n\n**可用率業界比較**：\n- Volvo FH Aero：780 kWh 總 → 725 kWh 可用（**93%**）\n- Renault E-Tech T 780：780 kWh → 624 kWh（80%）\n- MAN：560 kWh 可用\n\n> 技術關鍵：NCA 電芯（三星SDI）+ L 型電池包設計（框架側面 + 底部） + 改進版電池監控軟體\n- 新 e-axle：雙電機 + 6 速（取代 I-Shift）\n- 電動 PTO：無需柴油發電機（冷鏈適用）\n- 參見：[[sources/volvo-fh-aero-electric-2026]] | [[sources/volvo-fh-aero-electric-specs-2026]]\n\n### MAN eTGM（2026-05 米蘭首發，2027 年波蘭 Kraków 量產）\n- 定位：12–50 噸電動產品線最後缺口（中型 16 噸配送）\n- NMC 電池 2–4 包（各 80 kWh），最大 320 kWh\n- 16.01 噸設計：符合 EU 電動重卡路費優惠門檻（>16 噸）\n- 參見：[[sources/man-etgm-electric-truck-2026]]\n\n## Daimler eActros Lowliner（2027量產，500公里）\n\n戴姆勒卡車（Mercedes-Benz Trucks）宣布新型 eActros Lowliner：\n\n| 規格 | 數值 |\n|------|------|\n| 量產時間 | **2027 年** |\n| 最大續航 | **500 公里**（滿載）|\n| 設計特點 | **低車架（Lowliner）**：利於超市/物流中心裝卸 |\n| 充電 | 支援直流快充 |\n\n- 500 公里里程打破「電動重卡只適合短途配送」的認知\n- 競爭者：Volvo FH Aero（700 公里）、Renault E-Tech T（600 公里）\n- 參見：[[sources/europe-etruck-jun2026]]\n\n## Scania 法國 Angers 電動卡車廠（€7,000 萬，2026-06）\n\nScania（隸屬 VW Traton 集團）在法國 Angers 投資電動卡車產能升級：\n- 投資金額：**€7,000 萬**（7,000 萬歐元）\n- 回應 EU 2035 年重型車 CO₂ 法規的產能電氣化布局\n- Traton 旗下三品牌（Scania、MAN、Navistar）均同步加速電動化\n- 參見：[[sources/europe-etruck-jun2026]]\n\n## Milence 丹麥首站開幕：電動重卡北歐→中歐走廊打通（2026-06）\n\nMilence（Daimler Truck × Traton × Volvo 合資）在丹麥 Padborg 開設首個電動重卡充電樞紐：\n- 地點：**Padborg**（丹麥—德國邊境），直接連接北歐—地中海 TEN-T 走廊\n- 初期：**4 個 CCS 充電點，最高 400 kW**；後續計畫擴建及增加 MCS\n- MCS 已在比利時根特港、荷蘭 Zwolle、瑞典 Landvetter 等站上線\n- Milence 網絡升級至 **37 個充電樞紐，覆蓋 9 個歐洲國家**\n- 2027 年目標：歐洲（含英國）**1,700 個高功率充電點**\n- 計費：丹麥即付費率 **2.799 DKK/kWh**（含稅前）\n\n## DAF Electric Route Simulator：電動車隊路線評估工具（2026-06）\n\nDAF Trucks 推出互動式路線模擬器，協助車隊業者評估電動卡車可行性：\n- 覆蓋 DAF 全系電動卡車：12 噸 XB Electric（城市）→ XD/XF/XG/XG+ Electric（長途）\n- 功能：輸入路線 + 車輛配置（電池包數 3~5、315~525 kWh），即時顯示續航與可行性\n- XG/XG+ 長途版：Paccar 電機 350 kW，LFP 電池，最高 325 kW 快充，500 km 續航\n- 工具整合 DAF 經銷商諮詢平台（PACCAR Power Solutions 充電基礎建設服務）\n- 意義：降低車隊業者「試水溫」門檻，加速電動重卡採購決策\n\n## 中國重型 NEV 貨車 2030 國家路線圖（2026-06）\n\n中國 11 個政府部門聯合發布電動重卡加速計畫：\n\n| 目標 | 數值（2030 年）|\n|------|-------------|\n| 12 噸以上 NEV 重卡新登記比例 | **40%** |\n| 總保有量 | **160 萬輛**（~車隊 20%）|\n| 高速公路 NEV 貨運比例 | **18%** |\n| 新建充電/換電站 | **3,000 座** |\n| 零碳貨運走廊 | **30,000 km** |\n\n- 京津冀及汾渭平原：固定短途線路電動化 **80%**\n- 推廣「車電分離」電池租賃模式\n- **對比**：中國 2025 年重型 NEV 貨車銷量 231,100 輛（YoY +182%，29% 市占）；歐洲僅 6,372 輛（2% 市占）→ 差距懸殊\n- 參見：[[sources/china-heavy-truck-nev-plan-2030]]\n\n## Related\n- [[concepts/充電基礎建設]]\n- [[concepts/電動商用車]]\n- [[concepts/歐洲EV政策]]\n- [[concepts/美國EV市場與政策]]\n- [[concepts/儲能市場]]\n- [[entities/Tesla]]\n- [[entities/福特]]\n- [[sources/milence-electric-truck-tco]]\n- [[sources/edf-electric-hgv-investment]]\n- [[sources/dragonize-truck-charging]]\n- [[sources/milence-paris-berlin-corridor]]\n- [[sources/tesla-semi-production-2026]]\n- [[sources/tesla-basecharger-depot]]\n- [[sources/moto-uk-charging-investment]]\n- [[sources/ev-truck-satisfaction-germany-2026]]\n- [[sources/ford-energy-dc-block-2026]]\n- [[sources/volvo-fh-aero-electric-2026]]\n- [[sources/volvo-fh-aero-electric-specs-2026]]\n- [[sources/man-etgm-electric-truck-2026]]"

      "body": "# 充電基礎建設\n\nEV 普及的關鍵基礎設施，2026 年在乘用車超快充（500+ kW）與商用車共享場站兩個方向均出現重要突破。\n\n## 台灣：充電生態系競爭結構（2026-05）\n\n### 「五層蛋糕」產業結構（DIGITIMES Research）\n\n| 層次 | 內容 | 競爭焦點 |\n|------|------|---------|\n| 1 土地 | 場地取得、用途許可 | 優質地段稀缺 |\n| 2 電網 | 台電接電、用電容量 | 台電申請複雜 |\n| 3 充電設備 | 充電樁硬體 | 設備利用率 |\n| 4 維運工程 | 安裝、維修 | 施工瓶頸 |\n| 5 會員體系 | 跨平台互通、忠誠度 | 同業結盟 |\n\n### 台灣市場數據（2025）\n\n| 指標 | 數值 | 成長率 |\n|------|------|--------|\n| 電動小客車登記數 | **14.3 萬輛** | **+32.1%** YoY |\n| 已啟用充電槍 | **1.4 萬支+** | **+50.5%** YoY |\n\n### 工程三大障礙（實務挑戰）\n1. **行政潛規則**：選舉前後地方政府不允許道路開挖\n2. **夏季停電禁令**：用電高峰期（夏季）台電不允許停電施工（需約 3 小時）\n3. **土方之亂**：台南/高雄土方去化困難 → 台電無法施工 → Q1 工程大量延至 Q2\n\n- 參見：[[sources/taiwan-ev-charging-ecosystem-2026]]\n\n### 華城電能 EVALUE 640kW 極速充電樁（2026-04-17）\n| 項目 | 數值 |\n|------|------|\n| 最高功率 | **640kW**（全台最高）|\n| 架構 | 一主機對多線櫃，最高 5 槍同時 |\n| 電壓支援 | 800V 架構電動車 |\n| 充電速度 | 15～20 分鐘充飽 |\n| 2026 新站計畫 | 8 座快充站 |\n| 市場地位 | 全台 720 站，2,500 槍；政府標案市佔 62.5% |\n\n- 參見：[[sources/taiwan-evalue-640kw-charger]]\n\n### U-POWER 大同承德站（2026-04-10 啟用）\n| 項目 | 數值 |\n|------|------|\n| 充電位數 | 12 席（CCS1 × 6 + CCS2 × 6）|\n| 總功率 | 960 kW（可擴至 1,440 kW）|\n| 充電槍 | 液冷充電槍，最高 500A |\n| 每日服務量 | 700 輛（可升至 1,200 輛）|\n| 10 分鐘補充續航 | ~350 公里（以 Mercedes CLA 250+ 為例）|\n\n- 台北市 EV 約 2.5 萬輛（六都之冠）\n- U-POWER 董事長：台北至少需要 20 座以上大型超充站\n- U-POWER 累計投入資本：近 10 億台幣\n\n## 歐洲：電動卡車充電\n\n### 公共充電現況\n- 歐洲主要貨運走廊適合卡車的公共充電點：**約 1,800 個**（Milence 數據，2026）\n- Milence 自營：**37 個充電樞紐，覆蓋 9 國**（2026-06 含丹麥 Padborg 新站）\n\n### dragonize 共享場站（德國）\n- 合作社模式：物流業者共享場站充電設備\n- 沃爾姆斯旗艦站：8 充電點（400/240/160 kW）+ 7.5 MW 太陽能\n- 未來整合 6~7 MWh 固定儲能系統\n\n## 比亞迪 Flash Charging 歐洲擴張（2026-06）\n\n比亞迪第二代 Flash Charger 正式向歐洲延伸：\n\n| 項目 | 數值 |\n|------|------|\n| 目標定價 | **< 50 便士/kWh**（~58 歐分）—— BYD UK 主管 Bono Ge 透露 |\n| 中國以外全球計畫 | **6,000 座**（未來 12 個月）|\n| 歐洲計畫 | **3,000 座** |\n| 中國已建 | 6,100 座（300+ 城市，截至 2026-05 底）|\n| 最高功率 | **1,500 kW**（配合第二代刀片電池）|\n| 德國首見 | 已有 Flash Charger 現身德國（內部活動用，首次對外曝光）|\n| 設計 | T 型站體，雙充電槍，上懸液冷纜線 |\n\n- 騰勢 Z9GT 支援 1,500 kW 閃充（10→97% 僅 9 分鐘，目前限中國規格接口）\n- 中國另與中石化合作，借助其加油站網絡加速建站\n- 參見：[[sources/byd-flash-charging-europe-2026]] | [[concepts/中國EV出海策略]]\n\n## 加拿大 EV 充電投資（2026-04-11）\n- 聯邦政府撥款 **$1,060 萬加幣**，14 個專案，新增 1,600+ 個充電點\n- 大多倫多機場：262 個（L2 + L3）；Cogir 魁北克：981 個 L2\n- 2016 年至今加拿大累計充電基礎建設投資：**$12 億加幣**\n- 配套：$110 萬推動全國試駕教育計畫\n\n## V2G 雙向充電：2026 年商業化元年\n\n### VW × Elli：歐洲首個大規模 V2G 方案（Q4 2026）\n| 項目 | 細節 |\n|------|------|\n| 推出時間 | **Q4 2026**（德國，歐洲首批）|\n| 預售登記 | 2026 年 6 月開放（預售 Elli 雙向直流充電樁）|\n| 車主年省 | **€700~900**（電費收入 + 自用）|\n| 所需設備 | DC 雙向充電壁掛，VW / Audi 800V 車款 |\n| 技術基礎 | 支援 V1G（智慧充電）→ 升級 V2G（放電回饋電網）|\n\n### SPIRIT-E：全球首次重型卡車 V2G 公開示範（2026-04-24）\n| 項目 | 細節 |\n|------|------|\n| 示範時間 | **2026-04-24**（Regensburg，公開展示）|\n| 合作夥伴 | MAN（電動卡車）、TenneT（電網）、TU Munich（研究）|\n| 技術 | 雙向 DC 充電，重型商用車容量最大 |\n| 意義 | 首次**公開**重型卡車 V2G 示範（商業化前奏）|\n\n### V2G 技術意義\n- 電動車電池作為分散式儲能 → 平滑電網峰谷、提高再生能源占比\n- 重型卡車擁有大電池（300+ kWh），V2G 潛力遠超乘用車\n- 監管障礙：電費計費、電網穩定性、車輛電池壽命保證\n\n## V2L 技術普及\n- VW ID.4/ID.5 英國版新導入 V2L（最高 3.6 kW）\n- Cupra Raval 全系列支援 V2L\n\n## 技術趨勢\n\n| 趨勢 | 說明 |\n|------|------|\n| 液冷充電槍 | 支援 500A 大電流，降低充電槍溫升 |\n| 800V 高壓平台 | 車端配合，實現 5C 以上快充 |\n| 太陽能+儲能整合 | 場站自發電降低電費成本 |\n| 多標準相容 | CCS1 + CCS2 並列部署應對不同車款 |\n\n## 歐洲電動卡車走廊：電比柴更便宜（2026-04）\n\nMilence 「Power to Go Further」Paris→Berlin 1,000km 示範：\n\n| 指標 | 電力 | 柴油 |\n|------|------|------|\n| 每公里運營成本 | **€0.995/km** | €1.003/km |\n| 結果 | **電力已更便宜** | — |\n\nMilence 網絡：**37 站 / 9 個歐洲市場**（2026-06 更新）；2027 年目標 1,700 充電點\n參見：[[sources/milence-paris-berlin-corridor]]\n\n## 美國零售場地充電（2026-04）\n\n### Walmart × ABB 400kW 部署\n- Phoenix 首發 → 2030 年前數千個（全美 Walmart/Sam's Club）\n- ABB A400：CCS + NACS 雙槍，最大 600A，SiC 97% 效率，32 吋螢幕\n- 參見：[[sources/walmart-abb-charging-rollout]]\n\n### Uber $1 億充電投資\n- 合作：EVgo（美）+ Ionity（歐）\n- 核心差異化：行程數據選址 + 為充電業者提供**使用率保證**\n- 參見：[[sources/uber-ev-infrastructure-investment]]\n\n## ABB M-Series 分散式充電（2026-04）\n\n- 容量：200kW ~ 1.2MW（模組化）\n- 支援：CCS1 / CCS2 / NACS / **MCS**（重卡兆瓦充電）\n- 36 種場地配置；SiC 半導體；2024 年起商業部署\n- 參見：[[sources/abb-m-series-charging]]\n\n## Hamburg Hochbahn：固定儲能 vs V2G 選擇\n\n漢堡交通公司（500/1,200 輛已電動化）明確表態：**偏好固定式電池儲能，而非 V2G**：\n> 「巴士的核心任務是運送乘客。固定儲能 24/7 可用，潛力遠大於 V2G。」\n參見：[[sources/hamburg-hochbahn-electrification]]\n\n## Tesla Basecharger：重卡場站充電（2026-05-04）\n\n| 項目 | 規格 |\n|------|------|\n| 功率 | **125 kW** |\n| 設計 | 全整合（無獨立 AC-DC 電源箱），適合場站隔夜充電 |\n| 串聯 | 最多 3 台共用一個斷路器 |\n| 接頭 | 目前僅 **MCS**（不相容 CCS）|\n| 售價 | **$20,000 起**（最少 2 台）|\n| 出貨 | **2027 年初** |\n\n- 與 Megacharger（1.2MW）互補：快充公路站 vs 慢充場站隔夜\n- 參見：[[sources/tesla-basecharger-depot]]\n\n## Rocsys M1：Robotaxi 場站機器人自動充電（2026-04-30）\n\n| 項目 | 規格 |\n|------|------|\n| 服務能力 | **一套系統最多 10 個車位**同時充電 |\n| 安裝方式 | 地板 / 牆壁 / 天花板（三選一）|\n| 插拔成功率 | **99.9%+** |\n| 相容性 | **所有 EV + 充電器 + 插頭類型** |\n| 融資 | $1,300 萬（累計 $5,600 萬）|\n| 量產 | **2027 年**計畫部署 |\n\n- 已簽署「重大 Robotaxi 客戶」合約（客戶未公開）\n- Robotaxi 場站無人化的關鍵基礎設施\n- 參見：[[sources/rocsys-m1-robotic-charging]]\n\n## 英國 Moto eHGV 超級樞紐（2026-04-30）\n\n- **15 個 eHGV 超級樞紐**，每處最多 **100 個充電位**，分布英國主要貨運走廊\n- 乘用 EV 充電位 **4 倍擴容**\n- 總投資 **£5 億**（£3 億已投入）\n- 參見：[[sources/moto-uk-charging-investment]]\n\n## 歐洲 V2G 商業化啟動（2026-05）\n\n**已上線或即將啟動的商業化 V2G**：BMW × E.ON（已上線）；Ford × Octopus Energy（夏 2026）；VW Elli（Q4 2026）；Renault / Mercedes × The Mobility House（2026 底）\n\n**德國主要障礙**：MiSpeL 監管框架未完成、電網費豁免立法未生效、800+ 電網運營商難協調、稅務不確定性\n→ 德國承諾 2025 年市場就緒，**目標未達成**；其他歐洲國家已先行\n\n**與 Hamburg Hochbahn 固定儲能策略的對比**：\n- Hochbahn 選擇固定電池（24/7 可用、V2G 基礎設施尚未成熟）\n- 私家車 V2G（BMW/Ford/VW）走輕資產合作路線（搭現有電網運營商）\n\n目標：建立歐盟統一動態電網信號標準，解鎖歐洲整體 V2G 市場\n- 參見：[[sources/europe-v2g-bidirectional-2026]]\n\n## 越南河內換電站：50 站試點 → 1,000 站全市覆蓋（2026-05）\n\nLGES × Honda × 河內市：電動機車換電基礎設施大規模部署\n- Q3 2026：50 座試點站（Hoan Kiem 區）+ 500 輛電動機車\n- Q3 2027 起：**1,000 座換電站**覆蓋河內全境\n- 政策背景：河內 2026-07 起限制 ICE 機車進入 Ring Road 1 以內\n- 參見：[[sources/hanoi-1000-bss-2026]] | [[sources/lges-honda-vietnam-bss-2026]]\n\n## Related\n## 小米機器手臂自動充電（2026-Q4 上市）\n\n小米發布機器人式 EV 自動充電臂，實現 Tesla 十年前預告但未落地的功能：\n\n| 項目 | 規格 |\n|------|------|\n| 寬度 | **< 152mm**（6 吋），適合緊湊車庫或公共停車場 |\n| 定位精度 | **亞毫米級**（AI 視覺辨識）|\n| 智慧功能 | 車輛入位自動充電 / 達到目標電量自動拔插 / 遠端啟動充電 |\n| 整合 | 與小米智慧家庭生態系直接通訊（含電動車充電口開關）|\n| 上市時程 | **2026 年 Q4** |\n\n- 同類競品：現代汽車、Star Charge 亦有類似方案\n- 小米已有 7~11 kW 家用充電樁產品線，機器臂可能整合成完整方案\n\n## Fastned 希斯路機場超快充中心：倫敦 25 站計畫首發（2026-06）\n\nFastned × Places for London 在希斯路機場 Hatton Cross 開幕首座超快充中心：\n\n| 項目 | 數值 |\n|------|------|\n| 充電槍 | **12 個 400kW 充電位** |\n| 位置 | 鄰近 M25、M4、A30 高速（高流量節點）|\n| 功能 | 私人車輛 + 計程車 + 商業車隊均適用 |\n| 後續計畫 | **旗艦站** Hanger Lane 36 個位；East Finchley 地鐵站 8 個位 |\n| 倫敦整體目標 | **25 個超快充中心**、**40,000 個充電點**（2030 年前）|\n\n- 倫敦副市長 Mete Coban 強調：優先服務「無法使用私人充電樁」的路邊停車族群\n\n## Related\n- [[concepts/電動卡車市場]]\n- [[concepts/台灣EV市場]]\n- [[entities/比亞迪]]\n- [[sources/taiwan-ev-charging-upower]]\n- [[sources/dragonize-truck-charging]]\n- [[sources/milence-electric-truck-tco]]\n- [[sources/milence-paris-berlin-corridor]]\n- [[sources/byd-denza-europe-debut]]\n- [[sources/canada-ev-charging-investment]]\n- [[sources/vw-id4-id5-battery-update]]\n- [[sources/taiwan-evalue-640kw-charger]]\n- [[sources/v2g-commercial-expansion-2026]]\n- [[sources/walmart-abb-charging-rollout]]\n- [[sources/abb-m-series-charging]]\n- [[sources/uber-ev-infrastructure-investment]]\n- [[sources/hamburg-hochbahn-electrification]]\n- [[sources/tesla-basecharger-depot]]\n- [[sources/rocsys-m1-robotic-charging]]\n- [[sources/moto-uk-charging-investment]]\n- [[sources/taiwan-ev-charging-ecosystem-2026]]"

      "body": "# 中國 EV 市場競爭格局\n\n中國電動車市場歷經多年價格戰後，形成約 30 家核心廠商主導的「長期內捲」生態，整併速度遠低於外界預期。\n\n## 市場結構\n- 具實質影響力廠商：約 30 家（Rhodium Group）\n- 具長期存活能力：約 20 家以上\n- 總體產能已超過市場需求\n\n## 內捲特徵\n1. 持續的低價競爭（AlixPartners 預測價格戰延續至 2027 年底）\n2. 地方政府補貼撐住弱勢廠商，使其「死而不僵」\n3. 新能源車下鄉政策傾斜特定品牌\n\n## 2026 Q1 全面數據（最新）\n\n| 指標 | 數值 |\n|------|------|\n| 乘用車總銷量 | **422.6 萬輛（-17% YoY）** |\n| NEV 市占率 | 45.1%（↓ 自 2025 年 47.7%）|\n| 中系品牌市占 | **62%** |\n| 德系合資市占 | 16% |\n| 日系合資市占 | 13.3% |\n| Q1 銷量冠軍 | Volkswagen（险勝）|\n| 比亞迪 Q1 | **-40%+**（3 月奪回冠軍，但 YoY -33%）|\n| 賓士 Q1 中國 | -27% |\n| 保時捷 Q1 中國 | -21% |\n\n- 補貼退坡 + 政府防傾銷監管 → 市場回歸商業邏輯\n- 比亞迪創辦人王傳福：「體質弱的車廠正被加速清洗」\n- 強者對決持續：能撼動車市者約 30 家，邊緣廠多已出局\n\n## 外資車廠的歐洲計畫（2026~2027）\n- VW：推出中國研發車型（針對中國口味）\n- BMW：Neue Klasse iX3 預計 2026 年推出（歐洲成功後進中國）\n\n## 平價車市場白熱化\n- 比亞迪海鷗：最暢銷出口平價 NEV\n- 奇瑞 QQ3：人民幣 58,900 元，57,000 份預訂，直接挑戰海鷗\n\n## 對外資的衝擊\n「以時間換空間」策略失效 — 中國競爭對手退出速度遠低於外資預期。\n\n## 比亞迪 Q1 2026：淨利崩跌 55%，內捲失控\n\n| 指標 | 數值 | YoY |\n|------|------|-----|\n| 營收 | RMB 1,502 億 | -11.82% |\n| 淨利 | RMB 40.85 億 | **-55.38%**（2020 以來最大跌幅）|\n| 銷量 | 70.05 萬輛 | -30% |\n| 出口量 | 31.97 萬輛 | +56%（占總 45.6%）|\n| 3 月平均折扣 | **10%** | 兩年新高 |\n\n- 全行業 Q1 近 70 款車型集體降價；行業利潤率 **2.9%**（2026 Q1 兩個月）\n- 中國汽車年產能 5,550 萬輛 vs 銷量 2,300 萬輛：**產能利用率僅 50%**\n- 三大 CEO 警示「決賽期」：蔚來李斌 / 比亞迪王傳福 / 廣汽曾慶洪\n- 參見：[[sources/byd-q1-2026-earnings]]\n\n## 迭代速度競爭（2026 年新維度）\n\n從「價格戰」演進至「產品迭代速度戰」：\n- **2025 年**：推出逾 300 款新車；**2026 年 3 月**單月 >80 款\n- 電動車開發周期壓縮至 **1 年甚至更短**\n- 代價：行業利潤率創十年新低（4.1% → 2.9%），消費者信任受損（極氪 001 三次大改款，月銷從萬輛跌至 ~2,000 輛）\n- 參見：[[sources/china-ev-market-involution-2026]]\n\n## 2026 年 4 月：四項同步創紀錄的歷史分水嶺\n\n| 指標 | 數值 | 意義 |\n|------|------|------|\n| NEV 新車銷售佔比 | **>60%**（首次突破）| 市場結構轉折點 |\n| NEV 出口占批發比重 | **>50%**（首次突破）| 出口 43 萬 / 批發 134 萬 |\n| 自主品牌零售占比 | **約 70%** | 外資持續失守 |\n| 整體零售 YoY | **-21.6%**（連 7 個月下滑）| 內需持續疲弱 |\n\n**利潤內捲結構（2026 年 4 月數據）**：\n\n| 指標 | 數值 |\n|------|------|\n| 中國車廠平均利潤率 | **3.2%**（低於下游經銷商 ~6%）|\n| 單車淨利（中國市場）| ~人民幣 5,000 元 |\n| 單車淨利（海外市場）| ~人民幣 **20,000 元（4 倍）** |\n\n→ 出口是逃離內捲的核心出路：國內持續虧損壓縮，海外利潤 4 倍\n\n**外資結構性困境**：\n- 德日合資在中國市占：**13.3%**，仍持續下滑\n- 策略轉型：「在中國、為中國、為全球」（In China, For China, For the World）\n  - 釋出研發主導權給中國合作夥伴\n  - 深化與中國供應鏈整合\n\n- 參見：[[sources/china-nev-april-involution-2026]] | [[sources/china-nev-april-2026]]\n\n## 比亞迪發布 4 奈米智駕晶片（2026-06-05）\n\n比亞迪發布自研 **4 奈米製程智駕晶片**，標誌中國車廠半導體自主化的里程碑：\n- 進入與高通 Snapdragon 8295（4nm）、英偉達 Orin（7nm）競爭層次\n- 自研晶片可降低供應鏈依賴（NVIDIA/高通），並針對天神之眼（DiPilot）深度優化\n- **地緣政治意義**：在美國晶片出口管制背景下，自研是必要保障\n- 參見：[[concepts/ADAS智駕系統]] | [[sources/ev-news-digest-jun1-10-2026]]\n\n## 小鵬更名「小鵬集團」，轉型「物理AI」（2026-06-06）\n\n小鵬汽車更名為**「小鵬集團」（XPeng Group）**，CEO 何小鵬宣布轉型定位：\n- 從「智慧電動車企」→ **「物理AI（Physical AI）公司」**\n- 涵蓋自動駕駛、人形機器人、飛行器等具身智能（Embodied AI）\n- 跟隨 Tesla（「AI+機器人公司」）、NVIDIA（Physical AI 論述）的敘事路線\n- **風險**：分散核心汽車業務資源；**機遇**：AI 機器人市場爆發時的品牌先機\n- 參見：[[sources/xpeng-physical-ai-pivot-2026]]\n\n## 中國 EV 市場「決賽階段」：銷量恐跌 15–20%（2026-06）\n\n蔚來董事長李斌等多位高層公開警示：\n\n| 指標 | 數值 |\n|------|------|\n| 2026 年 1~5 月乘用車零售 | 709.9 萬輛，YoY **-19.5%** |\n| 2026 年 5 月 | 151 萬輛，YoY **-22.1%** |\n| Q1 整體汽車業利潤率 | **3.2%**（歷史新低）|\n| 李斌預警全年降幅 | **-15%~-20%** |\n\n- 「價格戰邊際效應遞減」：降價帶來的需求刺激愈來愈弱\n- 記憶體晶片成本 5 倍暴漲（¥20→¥100/顆），侵蝕每台車 ¥1.5~2 萬利潤\n- 共識：「智能電動汽車調整期至少還有 5 年」\n- **出海成為唯一出路**：廣汽吳堅「不往外走不行，國內走量、國外獲利」\n- 參見：[[sources/china-ev-market-slowdown-jun2026]]\n\n## 小米 SU7 2026 款：征服中國的方程式\n\n小米工廠效率與 SU7 技術躍升：\n\n| 指標 | 數值 |\n|------|------|\n| 車身車間自動化率 | **91%**（僅 100/2,000 名員工在車身間）|\n| 生產節拍 | **每 76 秒一輛車** |\n| SU7 全系 | **800V+，LIDAR 標配** |\n| SU7 Max | 680hp，101.7kWh，897V，530kW 充電，0~60 3.1s，~$50K |\n\n- **Ford CEO Jim Farley** 試駕後「不想還車」\n- 小米歐洲研發中心已開幕，積極挖角 BMW/Lamborghini 工程師\n- 歐洲上市「不可避免」（InsideEVs 評估）\n- 參見：[[sources/xiaomi-su7-2026-update]] | [[entities/小米汽車]]\n\n## BYD 大漢（Great Han）：5.26 公尺旗艦，LFP 破千公里（2026-06）\n\nBYD 最新旗艦轎車：\n\n| 版本 | 功率 | 續航（CLTC）|\n|------|------|-----------|\n| 單馬達 BEV | 370 kW | **>1,000 km** |\n| 雙馬達 AWD | 570 kW | 880 km |\n| PHEV | 200kW + 1.5T 渦輪 | 370 km 純電 |\n\n- LFP 電池達 >1,000 km，打破「LFP 只能短程」的市場偏見\n- 大唐 SUV 先行（100 萬+ 訂單不到 2 週）\n- 搭載 Flash Charging（1,500 kW）及車頂 LiDAR\n- 預計 2026 年底中國上市\n- 參見：[[sources/byd-great-han-2026]] | [[entities/比亞迪]]\n\n## Related\n- [[entities/比亞迪]]\n- [[entities/奇瑞]]\n- [[entities/小米汽車]]\n- [[concepts/中國EV出海策略]]\n- [[concepts/平價電動車市場]]\n- [[sources/china-ev-market-consolidation]]\n- [[sources/china-ev-market-q1-2026]]\n- [[sources/mercedes-benz-china-q1-2026]]\n- [[sources/byd-q1-2026-earnings]]\n- [[sources/china-ev-market-involution-2026]]\n- [[sources/beijing-auto-show-2026]]\n- [[sources/china-nev-april-involution-2026]]\n- [[sources/china-nev-april-2026]]"

      "body": "# 儲能市場（ESS / BESS）\n\n電池儲能系統（Battery Energy Storage System）正成為動力電池廠商的重要替代出海口，受 AI 資料中心與電網擴建需求驅動。\n\n## 驅動因素\n1. AI 資料中心用電需求激增\n2. 再生能源（太陽能、風力）併網需求\n3. 電動車需求降溫 → 動力電池產能過剩轉向儲能\n\n## 相對 EV 的優勢\n- 能量密度要求較低\n- 安全風險較易控管\n- 有助廠商在量產初期提升良率與製程穩定度\n\n## 市場規模預測\n- 2030 年美國 BESS 市場：~200 億美元（Markets & Markets）\n\n## 主要案例\n\n| 廠商 | 動作 |\n|------|------|\n| LGES | 目標 2026 年 ESS 業務年增 3 倍；Tesla 儲能電池合約 |\n| Ford | 成立 Ford Energy，切入家用與大型電網儲能 |\n| 寧德時代 | ESIE 2026 展出儲能鈉電池（>1.5 萬次循環）|\n| 億緯鋰能 | 儲能電池為近期成長動能 |\n\n## 技術趨勢\n- 韓系廠商：藉儲能加速 LFP 技術布局\n- 鈉離子電池：被視為儲能場景的新選項（中科院/寧德時代）\n\n## 中東能源危機帶動（2026）\n- 荷莫茲海峽關閉 >6 週，歐洲 + 東南亞家戶與企業加速採用電池儲能\n- **寧波德業（Ningbo Deye）**：預計 Q1 2026 利潤成長 **70%**，中國以外市場訂單激增\n- 中國儲能業者成潔淨能源供應鏈受惠者（太陽能→電池→EV 全鏈掌握）\n- 北京警告：儲能業者需控制產能，避免過度擴張（重蹈動力電池過剩覆轍）\n\n## 美國 ESS 市場：美製電池「供不應求」（2026-04 獨家）\n\n美系業者透露，美國自製鋰電芯目前處於**供不應求**狀態：\n- **州政府 ESS 補貼仍在**：對比聯邦 EV 補助廢止，ESS 補助多數保留\n- **AI 資料中心帶動電力需求**：削峰填谷需求剛性成長\n- **中國電芯進口限制 + 中資美廠爭議**：推升「美製」電芯溢價\n- 韓系三廠（LGES / SK On / 三星SDI）在美國地緣保護傘下取得 **LFP 技術練兵機會**\n\n> 「美國鋰電池 2026 年戰場：從『誰能跑得遠』變為『誰能存得多』」\n\n- 參見：[[sources/us-ess-battery-supply-shortage]]\n\n## Ford Energy DC Block：美國本土大型 ESS（2026-05）\n\nFord 成立 **Ford Energy** 子公司進入大型電網儲能市場：\n\n| 規格 | 數值 |\n|------|------|\n| 產品 | **DC Block** 容器式 ESS |\n| 每單元容量 | **5.45 MWh**（LFP 棱柱形 512 Ah）|\n| 電壓 | **1,040–1,500 V DC** |\n| 設計壽命 | **20 年**，IP55 |\n| 工廠 | 肯塔基州 Glendale（前 F-150 Lightning 電池廠改建）|\n| 年產能 | **20 GWh** |\n| 首批交付 | **2027 年** |\n\n- 戰略意義：美國本土 ESS 製造商新入場，與 Tesla Megapack（~80 GWh 計畫）直接競爭\n- Ford 廢棄 EV 電池廠轉型儲能工廠，成本轉型的樣板\n- 美製電芯目前處於「供不應求」狀態，Ford Energy 切入時機有利\n- 參見：[[sources/ford-energy-dc-block-2026]] | [[concepts/電動卡車市場]]\n\n## Q1 2026 全球 ESS 爆發：195.5 GWh，年增 78%（2026-06）\n\nSNE Research 統計 Q1 2026 全球鋰電池 ESS 出貨量創新高：\n\n| 市場 | Q1 2026 | YoY |\n|------|---------|-----|\n| 全球合計 | **195.5 GWh** | **+78%** |\n| 電網級（74.6%）| 145.9 GWh | — |\n| 家用 ESS | 20.6 GWh | **+209%** |\n| 商用 ESS | 17.3 GWh | +74% |\n\n**地區**：其他地區 +138% > 歐洲 +107% > 北美 +83% > 中國 +52%（中國市佔 54.7%→46.7%，重心多元化）\n\n**製造商**：CATL 仍居冠（58.4 GWh，29.9%，+98%）；LGES **+253%**（5.3 GWh）；三星SDI +34%（3.0 GWh）\n\n**戰略意義**：EV 需求放緩背景下，南韓廠商以 ESS 為「避震器」；LGES 成長速度遠超市場均值，是目前最積極轉型者。\n\n- 參見：[[sources/global-ess-q1-2026]]\n\n## BYD 超越 Tesla 奪全球儲能第一（2025 年結算，2026-05 公布）\n\n| 廠商 | 2025 出貨量 | 市占率 |\n|------|-----------|--------|\n| **BYD**（FinDreams Energy）| **>60 GWh** | **13%** |\n| Tesla（Megapack）| 46.7 GWh（+49%）| 10% |\n\n- 全球 BESS 安裝量 **+51%（≈315 GWh）**；電芯出貨量幾近翻倍（>600 GWh）\n- 前 10 大 BESS 整合商 **8 家為中國企業**（BYD、CATL 領銜）\n- Tesla 失去 2023–2024 年連冠地位，BYD 積極向歐洲、美洲擴張\n- 意義：中國廠商在 ESS 的主導地位複製 EV 軌跡：垂直整合 + 成本規模優勢\n- 参見：[[sources/byd-ess-market-leader-2026]]\n\n## SK On ESS 轉型進展（2026 Q1）\n\n- SK On Q1 2026 營業損失 3,492 億韓元（vs 2025 Q1 -2,994 億，惡化）\n- SKI 整體 Capex 38% 集中電池事業，推測部分轉 ESS 產線\n- 韓國 MCEE「第二次 ESS 中央競價市場（1 兆韓元）」SK On 拿下 **>50% 訂單**\n- 参見：[[sources/ski-q1-2026-results]]\n\n## GM 電池多元化佈局：鈉離子 + 二次利用 + ESS 轉型（2026-06）\n\n**GM × Peak Energy：鈉離子電池攻 AI 儲能**\n- 鈉離子電池（SIB）為電網級 ESS 主攻方向（非 EV）\n- GM Ventures 入股 Peak Energy；2028 年後供客戶電芯\n- Peak Energy：全球首款被動冷卻電網級鈉離子 BESS（科羅拉多，無需主動冷卻）\n- GM 論述：鈉離子 ≠ LFP 競爭者，是針對電網儲能的最佳化選擇\n\n**GM × Redwood Materials：EV 電池二次利用**\n- 密西根 GM 廠：100 組退役 EV 電池包 → **1.5 MW / 7.2 MWh**，省電費 **>$300 萬**\n- Redwood 累積處理 GM 電池廢料 > **28,000 噸**；另有 **10,000 組**電池包待二次利用\n- Crusoe（AI 資料中心）：Redwood 為其建立北美最大微電網（Nevada Sparks）\n- GM 成為首家跨越**完整電池生命週期**的車廠：製造廢料→電池二次利用→原料回收\n\n→ GM 電池三軌並行：車用（LMR 2028）+ 電網儲能（鈉離子 2028+）+ 二次利用（當下）\n- 參見：[[sources/gm-battery-diversification-2026]] | [[concepts/電池技術路線]]\n\n## Tesla LFP Megafactory：德州 40~50 GWh ESS 計畫（2026-06）\n\n- Tesla 德州規劃電池廠專生產 Megapack 大型儲能系統\n- 規劃年產能：**40~50 GWh**\n- 若全速生產，LFP 前驅體需求估達 **40~50 萬噸/年**\n- 與台灣立凱電能的前驅體合作（2027 年起）是供應鏈核心\n- Tesla 定位：EV + 儲能 + 機器人 + 太空資料中心，需求規模最大\n- 參見：[[sources/tesla-lfp-taiwan-2026]]\n\n## Related\n- [[entities/比亞迪]]\n- [[entities/寧德時代]]\n- [[entities/LGES]]\n- [[entities/SK On]]\n- [[entities/三星SDI]]\n- [[entities/福特]]\n- [[concepts/電池技術路線]]\n- [[concepts/鈉離子電池]]\n- [[concepts/電動卡車市場]]\n- [[sources/china-ev-market-q1-2026]]\n- [[sourc       "body": "# ADAS 智駕系統（Advanced Driver Assistance System）\n\n先進駕駛輔助系統是 EV 差異化競爭的核心戰場，2026 年競爭重心從硬體部署轉向軟體能力與數據迭代效率。\n\n## 技術路線\n| 路線 | 代表 | 特徵 |\n|------|------|------|\n| 純視覺 | Tesla FSD、比亞迪 DiPilot 100 | 低成本、依賴算法 |\n| 視覺 + 毫米波雷達 | 多數車廠 | 中階標配 |\n| 視覺 + LiDAR | 比亞迪 DiPilot 300/600、蔚來等 | 高精度，高成本 |\n\n## 關鍵競爭維度\n1. **數據量與品質**：Tesla FSD 訓練數據 > 比亞迪 DiPilot（Piper Sandler）\n2. **演算法架構**：端到端（E2E）vs 模組化\n3. **OTA 迭代速度**\n4. **法規合規性**：各國命名要求不同（Tesla 在中國須改名「智能輔助駕駛」）\n\n## 比亞迪天神之眼（DiPilot）現況\n- 裝車量：~250 萬輛（Tesla FSD 的 2 倍）\n- 有效訓練數據：僅 Tesla 的一半\n- 品質爭議：幽靈轉向、非預期加速、導航失誤\n\n## Robotaxi 延伸應用\n- 技術成熟後的終極應用，目前成本 >$8/km，需降至 $0.8/km 才具商業競爭力\n- 見 [[concepts/Robotaxi自動計程車]]\n\n## 豐田 Corolla vs Tesla FSD 訂閱制爭議（2026-04）\n\n- 豐田 Corolla 標配車道置中 + 自適應巡航（**免費**）\n- Tesla 2026-01 起，同類功能併入 FSD 訂閱（**$99/月**）\n- 引發消費者對訂閱制的反彈：「買車即應買斷功能」\n- 歷史案例：BMW 座椅加熱訂閱引爆反彈後撤回\n- 對 Tesla 的影響：FSD 訂閱是軟體收入支柱，Corolla 效應侵蝕其基礎需求理由\n- 參見：[[sources/toyota-adas-vs-fsd-subscription]]\n\n## 現代汽車 Pleos OS：SDV 軟體差異化策略（2026-04）\n\n現代在 Ioniq 3 首搭「Pleos」作業系統，與 Tesla 全觸控路線形成鮮明對比：\n\n| 特點 | 細節 |\n|------|------|\n| 基礎平台 | Android Automotive OS（非手機投影 Android Auto）|\n| App 生態 | 現代自有 App Market（更自主，非 Google GAS）|\n| 架構 | 區域控制器（Zonal Controllers）→ 減少配線複雜度 |\n| OTA | 真正整車 OTA（舊系統因多廠商拼接而受限）|\n| **關鍵差異化** | **保留實體按鈕**（音量、溫控、座椅加熱冷卻 + 方向盤按鍵）|\n\n- 現代論述：「永遠為重要功能提供實體控制」→ 對比 Tesla 轉向燈桿等全觸控爭議\n- 同採 Android Automotive：Ford、Honda、BMW、Porsche\n- 未來：所有新款現代 EV 陸續搭載 Pleos\n- 參見：[[sources/hyundai-pleos-sdv-os]]\n\n## 車內感測 AI：DMS → 全艙多模態（Smart Eye，2026-04）\n\n瑞典 AI 公司 Smart Eye 展現車艙感知從「監控駕駛」擴展至「監控全艙」的趨勢：\n\n| 指標 | 數值 |\n|------|------|\n| OEM 合作客戶 | **24 家** |\n| 最新訂單 | 日本主流車廠 2 款車型（DMS → 全艙感知）|\n| 量產時程 | **2027 年中** |\n| 法規驅動 | 歐盟 GSR **2026 年 7 月**強制 ADDW；Euro NCAP 2026 五星需偵測疲勞/分心 |\n\n### 技術演進：硬體讓位給 AI 演算法\n- **感知範圍**：DMS（駕駛監控）→ 全艙（乘客、兒童、遺忘物件）\n- **感測器精簡**：多鏡頭 → 單/少數鏡頭 + AI 演算法（降低成本與功耗）\n- **商業模式**：硬體銷售 → OTA 升級 + 持續性軟體收入\n- **個人化應用**：依乘客情緒自動調整空調、音響、音樂推薦\n\n> 「全球技術競爭已由硬體感測器數量轉向 AI 解析能力」\n> — 台系智慧座艙業者\n\n### 隱私課題\n- 全艙監控產生生物特徵數據（表情/眼神/行為），2027 年新車量產後將成核心議題\n- 參見：[[sources/in-cabin-ai-sensing-2026]]\n\n## L2/L2+：2035 年主導 ADAS 市場（Counterpoint，2026-05）\n\n| 指標 | 2025 | 2035 |\n|------|------|------|\n| ADAS 整體採用率 | **66%** | **94%** |\n| L2/L2+ 占比 | — | **≈65%** |\n\n- 高階自動駕駛（L3-L5）進展緩慢（法規 + 成本），L2+ 成為主力\n- L2+ 快速放量原因：可用性 + 成本效益 + 高頻使用 + 訂閱式 SaaS 收入模式\n- **對車廠意義**：L2+ 成為「持續性收入（recurring revenue）」的關鍵\n- 參見：[[sources/l2plus-adas-adoption-2026]]\n\n## Rivian：中國 LiDAR 技術 × 美國本土生產（2026-05）\n\n- Rivian R2 車款將搭載**小型 LiDAR**（非 Waymo 大型旋轉式）\n- 合格低成本 LiDAR 幾乎全來自中國（禾賽科技、速騰聚創）\n- 解決方案：與中國廠商合資，**在美國本土生產**→ 規避國安疑慮\n- 其他美國車廠也表達對此模式的興趣\n- 參見：[[sources/rivian-lidar-china-partner-2026]]\n\n## 禾賽 EXT：全球首款顏色辨識 LiDAR（2026-04）\n\n中國 LiDAR 大廠禾賽科技（Hesai）發布 EXT 感測器，標誌 LiDAR 競爭從成本轉向價值創新：\n\n| 項目 | 細節 |\n|------|------|\n| 核心晶片 | Picasso（自研）|\n| 技術突破 | 空間測距 + **顏色偵測**整合（全球首款）|\n| 關鍵應用 | 精準辨識紅綠燈顏色 → 提升自駕安全性 |\n| 量產時程 | **2027 年**旗艦車型 |\n| 中國市占 | **>40%**（理想汽車、小米、比亞迪、NVIDIA 供應）|\n\n- 禾賽 CEO：「若只追低價，將犧牲創造更高價值的創新機會」\n- LiDAR 必要性仍有爭議：Tesla/小鵬偏好純視覺；禾賽兼做人形機器人（Kosmo 手持設備）\n- 參見：[[sources/hesai-color-lidar-2026]]\n\n## 韓國首次大規模自駕實證：現代 × 起亞 Atria AI（2026-05）\n\n- 地點：南韓光州廣域市（501 平方公里）\n- 規模：**約 200 輛**量產車改裝，2026 下半啟動，2027 年擴全市\n- 核心技術：**Atria AI**（現代/起亞自研），**E2E 架構**（感知/判斷/控制整合至單一 AI 模型）\n- 傳感配置：8 自駕攝影機 + 1 雷達（每輛）\n- 服務平台：**Shucle**（AI 調度 + 叫車管控）\n- 公私合作：現代/起亞 + 韓國 MOLIT + 光州市 + Autonomous A2Z\n- 意義：韓國整車廠以自有 E2E 技術正式切入大規模城市自駕場景，不依賴 Waymo/Mobileye\n- 參見：[[sources/hyundai-kia-atria-ai-gwangju-2026]]\n\n## 比亞迪 4 奈米智駕晶片（2026-06-05）\n\n比亞迪發布自研 **4 奈米製程智駕晶片**：\n- 達到高通 Snapdragon 8295（4nm）同等製程等級\n- 專為天神之眼（DiPilot）系統深度優化，降低對英偉達 DRIVE Orin 的依賴\n- 在美國晶片出口管制壓力下，自研是中國車廠保障供應鏈的必要策略\n- 中國車廠自研晶片趨勢：蔚來（NX9031「神璣」）、小鵬（XPILOT 系列）、比亞迪（本次）\n- 參見：[[sources/ev-news-digest-jun1-10-2026]] | [[concepts/中國EV市場競爭格局]]\n\n## Related\n- [[entities/Tesla]]\n- [[entities/比亞迪]]\n- [[entities/豐田]]\n- [[entities/蔚來]]\n- [[entities/Rivian]]\n- [[concepts/自動駕駛安全監管]]\n- [[concepts/Robotaxi自動計程車]]\n- [[sources/byd-dipilot-adas-2026]]\n- [[sources/toyota-adas-vs-fsd-subscription]]\n- [[sources/nio-self-chip-denvidia]]\n- [[sources/hyundai-pleos-sdv-os]]\n- [[sources/in-cabin-ai-sensing-2026]]\n- [[sources/l2plus-adas-adoption-2026]]\n- [[sources/rivian-lidar-china-partner-2026]]\n- [[sources/hyundai-kia-atria-ai-gwangju-2026]]\n- [[sources/hesai-color-lidar-2026]]"

      "body": "# 車用半導體供應鏈\n\n電動車與智慧駕駛的普及帶動車用半導體需求快速成長，中國廠商積極引入國際技術、布局自主供應鏈。\n\n## 關鍵元件\n- MCU（微控制器）、功率元件（IGBT/SiC）、MEMS 感測器\n- ADAS 感測器：攝影機、毫米波雷達、LiDAR\n- 座艙晶片（如 Qualcomm Snapdragon 8155）\n\n## 中國廠商動態（2026）\n\n### 廣州增芯\n- 主攻 12 吋 MEMS + 特色製程（車用/工業）\n- 延攬 GlobalFoundries 前總裁洪啟財 + 意法半導體前主管 Monti\n- 目標：切入國際車用供應鏈\n\n### 上海積塔\n- 與英飛凌合作導入 SONOS eNVM 技術\n- 形成三線記憶體技術陣列（eFlash + RRAM + SONOS）\n- 透過與歐洲 IDM 合作獲取「技術驗證」背書\n\n## 地緣政治影響\n中美科技管制趨嚴 → 中國廠商轉向與歐洲大廠（英飛凌、意法半導體等）合作成熟製程，作為升級路徑。\n\n## 高通 × 博世：ADAS 整合新里程碑（2026）\n- 雙方將座艙平台合作延伸至 ADAS\n- 基礎：Snapdragon 座艙平台已為全球車廠交付 **1,000 萬台**車用電腦\n- 首批搭載 ADAS 整合方案車款：**2028 年**上路\n- 趨勢：集中式運算架構取代多個獨立控制單元 → 整合供應商話語權上升\n\n## 封測與先進封裝：長電科技（JCET）布局\n- 車用 SoC、MCU 製造能力正延伸至**人形機器人**領域\n- 核心技術：Chiplet、超高密度 RDL、玻璃基板、CPO 光電合封裝\n- 邏輯：機器人「感知→融合→決策→控制」架構與汽車高度相似，需車規等級可靠性\n\n## 被動元件景氣（2026 Q1）\n- AI 伺服器 + 車用電子拉動高階被動元件（MLCC、鉭電容）\n- 國巨 Q1 2026 單季營收歷史新高（+22.7% YoY）\n- MLCC 供應趨緊 → 日韓大廠交期延長，漲價循環啟動\n\n## 三菱電機 SiC 第五代佈局：瞄準 EV 與再生能源（2026-06）\n\n三菱電機（Mitsubishi Electric）於 2026 年 6 月接連推出三項 SiC 功率半導體新措施：\n\n| 舉措 | 內容 |\n|------|------|\n| 第 5 世代 SiC MOSFET | **6 月下旬提供樣品**；導通電阻（On-Resistance）較上代**降低 25%** |\n| 第 8 世代 IGBT 資料開放 | 2026-06-05 宣布免費公開，含台灣工研院合作研究成果，縮短客戶驗證週期 |\n| Semikron Danfoss 合作 | 2026-06-08 宣布，共同開發 Semitrans 20 規格新標準封裝方案 |\n\n- 目標市場：EV 逆變器 + 再生能源變電設備（高溫/高電壓環境需求）\n- 降低 25% 導通電阻 → 同等散熱條件下可承受更大電流，直接提升電動車效率\n- 搶佔次世代 SiC 中大電流應用的國際規格制定主導權\n- 參見：[[sources/mitsubishi-sic-ev-2026]]\n\n## NVIDIA × 現代汽車：AI 自駕 + 機器人全面深化（2026-06）\n\nNVIDIA 執行長黃仁勳訪問首爾現代汽車總部（2026-06-08），會談焦點：\n\n| 合作方向 | 內容 |\n|---------|------|\n| **自駕平台** | 現代汽車導入 NVIDIA **Drive Hyperion**，從 L2+ ADAS 延伸至 L4 Robotaxi |\n| **機器人** | Boston Dynamics（現代旗下）Atlas 人形機器人整合 NVIDIA AI 運算平台 |\n| **智慧製造** | NVIDIA Omniverse 數位孿生 + AI 工廠技術，導入現代產線模擬 |\n| **AI Valley** | 現代汽車新萬金 AI 資料中心 + 機器人製造園區 + 氫能設施計畫 |\n\n- 黃仁勳搭乘 Genesis G90 出席（通常乘 Mercedes-Maybach），被解讀為合作升溫訊號\n- 現代軟體/自駕策略主管朴敏雨（前 NVIDIA 員工）為雙方核心橋樑\n- NVIDIA 視南韓為 AI 生態系重要基地（另訪 SK、LG、Naver）\n- 意義：現代從傳統車廠向「汽車 + 機器人 + AI 工廠」三位一體轉型\n- 參見：[[sources/nvidia-hyundai-ai-2026]] | [[concepts/ADAS智駕系統]]\n\n## 整車廠晶片自研浪潮：蔚來案例（2026）\n\n- 蔚來自研晶片累計出貨 **55 萬顆**（含雷達主控 + 智駕 SoC）\n- 代表產品：神璣 NX9031（5nm），已對外銷售\n- 目標：料號從 4,000+ 種縮減至 400 種\n- 歷史 NVIDIA 採購高峰：年度 $3 億美元 → 自研後大幅降低\n- 趨勢：中國 EV 廠「去 NVIDIA 化」，垂直整合晶片成本\n- 參見：[[sources/nio-self-chip-denvidia]]\n\n## Related\n- [[entities/蔚來]]\n- [[concepts/自動駕駛安全監管]]\n- [[concepts/ADAS智駕系統]]\n- [[sources/guangzhou-zenxin-automotive-chip]]\n- [[sources/shanghai-jitai-infineon-sonos]]\n- [[sources/qualcomm-bosch-adas-expansion]]\n- [[sources/jcet-robot-semiconductor]]\n- [[sources/passive-components-ev-ai-2026]]\n- [[sources/nio-self-chip-denvidia]]"

      "body": "# 北美 EV 關稅與政策\n\n北美 EV 市場的關稅政策因美國、加拿大、中國三方貿易摩擦而複雜化，直接影響車廠供應鏈決策、定價策略及本地化投資意願。\n\n## 美國 EV 補貼廢止（2025-09-30）\n\n- Trump 政府廢止 **$7,500 EV 購車稅額減免**（IRA Section 30D）\n- 直接影響：\n  - VW ID.4 銷量 Q4 2025 僅 248 輛（-62% QoQ）→ Chattanooga 廠停產\n  - 日產放棄密西西比 Canton 廠 EV 計畫\n  - GM 延後次代電動皮卡至 2030+\n  - Ford F-150 Lightning 產線停產\n- 參見：[[concepts/美國EV市場與政策]]\n\n## 美國對中國 EV 關稅（100%）\n\n- 拜登政府 2024 年對中國製 EV 加徵 **100% 關稅**（Section 301）\n- 影響：Tesla 上海廠 Model 3 停止出口美國；中國品牌幾乎無法直接進入美國市場\n- Tesla 供應鏈應對：2024 年將加拿大供應改為 Fremont（加州）廠\n\n## 加拿大對中國 EV 關稅變化\n\n| 時期 | 關稅稅率 | 說明 |\n|------|---------|------|\n| 2024 以前 | 正常稅率 | 上海廠 Tesla 可進加拿大 |\n| 2024 年 | **100%** | 加拿大跟進美國，對中國 EV 加徵 |\n| **2026 年** | **6.1%（配額內）** | 加拿大對美國加徵 25% 反制稅後，重新安排對中國優惠關稅 |\n\n- 2026 年加拿大對美國製品加徵 **25% 反制稅**（回應 Trump 關稅），使 Fremont 廠產品成本大增\n- 同時設立**中國 EV 進口配額 49,000 輛/年**，配額內稅率 **6.1%**\n\n## Tesla 加拿大：上海廠回歸與定價優勢（2026-05）\n\n| 版本 | 加拿大售價 | 美元約值 | vs 美國 | 供應來源 |\n|------|----------|---------|--------|---------|\n| **Premium RWD（新）** | **$39,490 CAD** | ~$29,000 USD | **便宜 31%** | **上海廠**（6.1% 關稅）|\n| Performance AWD | $74,990 CAD（-17%）| ~$55,000 USD | 略貴 | Fremont 廠（25% 反制稅）|\n\n- **Premium RWD**：463km 續航，201km/h 最高速\n- Performance AWD 仍來自 Fremont，美加關稅差異導致價格反轉\n- 注意：上海廠 Model 3 **不符合**加拿大 $5,000 EVAP 政府補貼（需 FTA 資格）\n- 參見：[[sources/tesla-canada-model3-2026]]\n\n## 中美加三角關稅的市場意義\n\n- Tesla 展現供應鏈在貿易戰中的靈活切換能力（上海 → Fremont → 上海）\n- 加拿大 6.1% 對中國 EV 優惠關稅 = 對 Trump「美國優先」政策的實質反制\n- BYD 傳聞考慮加拿大設廠 + 20 家經銷商計畫（利用相同關稅窗口）\n- 歐、日系大廠在美國 EV 本地化製造計畫全面後退（日產、VW 均已宣布）\n\n## 首批中國製 EV 實際落地加拿大（2026-05）\n\n配額開放後，奇瑞和吉利是行動最快的中國品牌：\n\n### 奇瑞（Chery）\n- 首批 ~150 輛（Jaecoo J5、Omoda 9 PHEV、Exelantis ES）\n- 定位：認證 + 試駕用途，尚未對消費者零售\n- 後續：3 個月內再出貨 ~1,000 輛 + 10 家經銷商（6 月底開業）\n\n### 吉利 / Lotus\n- 18 輛 Lotus Eletre 高端純電 SUV 首批交付\n- 已通過加拿大 CMVSS 安全認證\n- 6 家經銷商（3 月開業），年底前再增 6 家\n- Eletre 售價因關稅調降**下滑約 50%**\n- 吉利宣稱：首家在新貿易框架下出口加拿大的中國車廠\n\n### 限制條件\n- **49,000 輛/年配額（2026）→ 70,000 輛/年（2030）**：逐年放寬，先到先得\n- **上海製車輛不符合 $5,000 EVAP 補貼**（需 FTA 資格）\n- 美國明確警告：不允許中國 EV 透過加拿大「轉道」進入美國\n\n### Tesla 上海工廠切換確認（2026-05-13）\n- Model 3 加拿大售價大幅降至 **CAD $39,500**，降幅結構符合上海廠成本切換\n- 業界普遍認定：Tesla **已確認加拿大 Model 3 改由上海廠供貨**\n- 意義：Tesla 是美國車廠，說明 6.1% 配額吸引力超越品牌國籍\n\n- 參見：[[sources/china-evs-canada-chery-geely-2026]]\n\n## Ford × 寧德時代密西根廠：授權不入股的中美共存模式（2026-05）\n\n| 項目 | 細節 |\n|------|------|\n| 工廠地點 | 密西根州馬歇爾市（BlueOval 電池園區）|\n| 投資規模 | **$30 億美元** |\n| 所有權 | **Ford 全資**（工廠 + 土地 + 設備）|\n| 技術來源 | 寧德時代 LFP 授權（**授權不入股**）|\n| 進度 | 接近完工，**數月內投產**（2026-05）|\n\n- 類比 TikTok 美國架構：中國技術 + 美國擁有權\n- 政治架構：商務部長 Lutnick 反對中國車廠直接競爭，但此模式獲默許\n- CATL CEO 語：「電池像磚頭一樣笨」（無情報風險）\n- 長期：中國專家培訓美國工程師，10 年內縮短技術差距\n- 此案成為中美 EV 供應鏈「共存新模式」的標竿\n\n- 參見：[[sources/ford-catl-michigan-factory-2026]]\n\n## 川習會後美國市場開放訊號（2026-05-14）\n\n川習會（北京，2 小時 15 分鐘）後，路透：中國電動車進入美國「不是會否，而是何時」。\n- 40% 美國消費者願考慮中國品牌\n- 中國車廠已透過供應鏈、股權滲透、邊境城市非正式管道進入美國市場\n- 潛在路徑：降稅 / 本土製造（比亞迪加州巴士廠）/ 技術授權\n- 政治阻力仍大：五大貿易協會反對，跨黨派議案要求立法禁入\n- 參見：[[sources/china-ev-us-market-2026]]\n\n## 日產借道加拿大配額：東風合資車款進軍美洲（2026-05）\n\n加拿大配額吸引力延伸至跨國車廠，不僅限中國品牌：\n\n- 日產研議出口**日產 × 東風合資工廠**生產的車款至加拿大\n- 首批車型：**N7**（純電轎車）+ **Frontier Pro**（皮卡）→ 先進拉丁美洲\n- 中期目標：**10 萬輛/年**，最終 30 萬輛/年（全球出口）\n- 日產美洲區主管確認：「加拿大已為部分中國製產品打開大門」\n- 意涵：加拿大配額已成**跨國車廠利用中國廠低成本的合法通道**，不只是中國本土品牌\n\n- 參見：[[sources/nissan-canada-dongfeng-ev-quota-2026]]\n\n## Related\n- [[concepts/美國EV市場與政策]]\n- [[concepts/中國EV出海策略]]\n- [[entities/Tesla]]\n- [[entities/比亞迪]]\n- [[sources/tesla-canada-model3-2026]]\n- [[sources/nissan-mississippi-ev-abandonment]]\n- [[sources/china-ev-us-market-2026]]\n- [[sources/nissan-canada-dongfeng-ev-quota-2026]]"

      "body": "# 台灣 EV 市場\n\n台灣電動車市場由 Tesla 主導（市占 >75%），但本地電動化整體進度嚴重落後政府設定目標，充電基礎設施不足與法規不友善是主要障礙。\n\n## 市場結構（2026）\n\n- **Tesla 霸主地位**：2026 年 3 月市占率 **77.5%**（全車種），稱霸台灣電動車市場\n- Model Y 為最暢銷車型，幾乎主導所有月份銷售排行\n- 參見：[[sources/tesla-taiwan-march-2026]]\n\n## 電動化政策目標 vs 現實落差（2026）\n\n| 指標 | 2025 目標 | **2025 實際** | 落差 |\n|------|---------|------------|------|\n| 電動車（乘用）市售比 | **10%** | **8.1%** | -1.9pp |\n| 電動機車市售比 | **20%** | **7%** | -13pp |\n| 市區公車全電動化 | — | 部分城市進行 | **2030 目標**（全台）|\n\n- 電動機車 7% 甚至低於 2022 年政策設定基準年的 **11.9%**（倒退）\n- 2035 年目標：電動車 60%、電動機車 70%（現況下幾乎不可能達成）\n- 2040 年目標：兩者均 100%\n\n### 主要障礙（業者反映）\n\n1. **充電基礎設施不足**：加油站密度遠高於充電點\n2. **社區充電法規不友善**：自裝充電樁受管委會限制，法規未鬆綁\n3. **補貼政策反覆**：電動機車補貼退場後轉向「油電平權」→ 銷售馬上跌回谷底\n4. **政府指導不足**：有目標，無路徑，「幾年來幾乎都在原地踏步」\n\n### 建議：優先投入電動公車\n\n- 中經院建議：政府資源優先投入**電動公車**（高使用率、高載客量、立即改善都市空氣品質）\n- 參見：[[sources/taiwan-ev-electrification-progress-2026]]\n\n## 充電基礎建設（2026）\n\n### 公共充電策略\n- 全台公共充電樁中：**快充（>60kW）+ 慢充組合拳**策略\n- 全球充電樁分布：中國 67.7%、歐洲 16.3%、美國 3.1%（台灣遠落後）\n\n### 重要案例\n- **U-POWER 大同承德站**：960 kW，12 席，10 分鐘補充 350 km\n- **華城電能 EVALUE**：640kW 極速充電樁（全台最高），2026 年新增 8 站\n- 參見：[[sources/taiwan-ev-charging-upower]] | [[sources/taiwan-evalue-640kw-charger]]\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/充電基礎建設]]\n- [[concepts/電動巴士市場]]\n- [[sources/tesla-taiwan-march-2026]]\n- [[sources/taiwan-ev-electrification-progress-2026]]\n- [[sources/taiwan-ev-charging-strategy]]\n- [[sources/taiwan-ev-charging-upower]]\n- [[sources/taiwan-evalue-640kw-charger]]"

      "body": "# 氫燃料電池商用車（FCV Trucks）\n\n氫燃料電池技術因其高續航與快速補能特性，被視為重型長途運輸電動化的主要路線之一。\n\n## BEV vs FCV 適用場景\n| 技術 | 適用 | 限制 |\n|------|------|------|\n| BEV | 中小型車輛、短途 | 充電時間長、能量密度限制 |\n| FCV | 20 噸以上重型/長途 | 氫能基礎建設不足、成本高 |\n\n## 全球 FCV 市場（2025）\n- 第一：中國；第二：韓國 → 合計約 90%\n- 日本（豐田 Mirai 發明國）：僅約 3%\n\n## 重要合作案例\n\n### 豐田 × 戴姆勒卡車 × Volvo（2026）\n- 投資 Cellcentric（2020 年戴姆勒+Volvo 共同創立）\n- 豐田加入次世代 FCV 核心零組件研發\n- 目標：歐洲重型貨車市場\n\n### 現代汽車 × 法國（2025–2026）\n- 與 OPmobility 合作高壓氫儲存技術\n- 與 Air Liquide 合作氫氣生產、儲存、運輸基礎建設\n\n## 日本氫能基礎建設危機（2026）\n\n### 現況 vs 目標\n| 指標 | 目標 | 實際 |\n|------|------|------|\n| 2025 年加氫站 | 320 座 | **約 150 座**（嚴重落後）|\n| 2030 年加氫站 | 1,000 座 | 待觀察 |\n\n- 現有加氫站主要集中在東京周邊，約 7 成下午 5 時歇業（不符物流需求）\n- 物流業反映：僅 20 座加氫站適合大貨車使用\n\n### 五十鈴 Giga Fuel Cell 延後案例\n- 五十鈴 × 本田：25 噸氫燃料大貨車\n- **原訂上市**：2027 年 → **延後至 2030 年**\n- 原因：加氫站不足 + 燃料電池模組體積/重量問題 + 本田 BEV 策略失利影響研發投入\n- 競爭者：日野汽車 Profia Z FCV 已於 2025 年 10 月量產（同規格，先行一步）\n\n## 五十鈴 × 豐田：小型 FCV 卡車 2027 年量產（2026-04 最新）\n\n日本首款量產氫燃料電池小型貨車將在 2027 年度啟動：\n- 基礎車型：五十鈴 ELF EV（BEV 小型貨車）\n- 燃料電池系統：豐田第三代 FC 系統（新開發）\n- 應用場景：超市/便利商店冷藏冷凍物流（高頻短途，需快速補能）\n- 合作平台：CJPT（五十鈴 + 豐田 + 日野，2021 年成立）\n- **策略調整**：大型 FCV 卡車已延後 → 先以小型卡車建立氫能物流生態系\n\n| 車型 | 狀態 |\n|------|------|\n| 五十鈴 × 豐田 FCV **小型**貨車 | **2027 年度量產**（日本首款）|\n| 五十鈴 × 本田 FCV **大型**卡車（Giga Fuel Cell）| **延後至 2030 年**（加氫站不足）|\n\n- 參見：[[sources/isuzu-toyota-fcv-light-truck]]\n\n## Related\n- [[entities/豐田]]\n- [[entities/本田]]\n- [[concepts/電動商用車]]\n- [[sources/toyota-daimler-volvo-hydrogen-truck]]\n- [[sources/isuzu-hydrogen-truck-delay]]\n- [[sources/isuzu-toyota-fcv-light-truck]]"

      "body": "# 電動商用車（Electric Commercial Vehicle, ECV）\n\n涵蓋電動巴士、電動貨車（含重型卡車）及電動機車等，技術路線以 BEV 和 FCV 為主。\n\n## 細分市場\n\n### 電動巴士\n- 全球年產 8 萬輛（2025），中國製 ~80%\n- 中國廠（比亞迪）主導，成本優勢顯著\n- 日本廠商（三菱FUSO × 鴻海）試圖以技術合作突圍\n\n### 重型電動貨車\n- BEV 受限於能量密度，FCV 成為長途重型車主要路線\n- 豐田 × 戴姆勒卡車 × Volvo 合作布局（Cellcentric）\n- 鈉離子電池技術突破有望降低重型卡車電動化成本\n\n### 電動機車\n- 本田主導 Gachaco，布局電池交換網絡\n- 面對台灣 Gogoro 的競爭壓力\n\n## Related\n- [[concepts/電動巴士市場]]\n- [[concepts/氫燃料電池商用車]]\n- [[concepts/電池交換技術]]\n- [[entities/比亞迪]]\n- [[entities/鴻海]]\n- [[entities/豐田]]"

      "body": "# 鈉離子電池（Sodium-Ion Battery, SIB）\n\n使用鈉離子作為電荷載體的二次電池，被視為鋰電池的重要補充，2026 年進入規模化應用元年。\n\n## 相較鋰電池的優勢\n- 鈉資源豐富、開採成本低\n- 耐低溫性能好\n- 快充與倍率性能佳\n\n## 2026 年重大突破\n中科院開發 **PNE（可聚合不燃電解質）**：\n- 全球首次在鈉離子電池中實現徹底阻斷熱失控\n- 溫度超過 150°C 自動固化，形成「智慧防火牆」\n- 兼具 -40°C 至 60°C 寬溫範圍與 >4.3V 耐壓\n- 材料均為成熟工業化產品\n\n## 產業化進程（2026）\n| 里程碑              | 時間      |\n| ---------------- | ------- |\n| 寧德時代量產輕型商用車鈉電池   | 1 月     |\n| 全球首款鈉電量產乘用車亮相    | 2 月     |\n| 博鈉新能源 2 GWh 產線投產 | 3 月     |\n| 寧德時代儲能鈉電池商業化     | 2026 年內 |\n\n## 成本展望\n中科海鈉預測：鈉電與鋰電成本交匯點在 **2027 年**。\n\n## 應用場景\n電動車動力電池、重型卡車、大規模儲能（BESS）\n\n## 寧德時代量產里程碑（2026-04-22 超級科技日）\n\n- **鈉新 II 電池**（第二代）：純電續航 **400~600 公里**，全球首個車規級大規模量產鈉離子電池\n- **量產時程**：2026 年 **Q4** 大規模量產\n- **已落地車型**：廣汽埃安 UT、長安歐尚 520、解放 24V 蓄電池、江淮物流\n- **即將落地**：吉利星願、奇瑞 QQ3、一汽悅意 03\n- **換電生態**：2026 年目標建置 3,000 座換電站\n- 市場替代潛力：寧德時代預估可取代 **30~40%** 現有電池市場（長期）\n\n### 供應鏈重構（Digitimes 分析）\n- 材料改變：**鋁箔**取代部分銅箔；**硬碳**取代石墨負極；不同電解液\n- 驅動力：AI 資料中心低密度大容量儲能需求 + 再生能源電網平衡\n- 競爭者：比亞迪、欣旺達、億緯鋰能同步推進鈉電量產\n\n- 參見：[[sources/catl-super-tech-day-2026]]\n\n## Related\n- [[entities/寧德時代]]\n- [[concepts/電池技術路線]]\n- [[concepts/儲能市場]]\n- [[sources/china-sodium-battery-2026]]\n- [[sources/catl-super-tech-day-2026]]"

      "body": "# 平價電動車市場\n\n售價在人民幣 10 萬元（約 $14,000 USD）以下的純電車市場，中國主導全球供給，競爭白熱化。\n\n## 主要車型對比\n\n| 車型 | 品牌 | 售價（人民幣）| 電池 | 續航（CLTC）|\n|------|------|------------|------|------------|\n| 海鷗 | 比亞迪 | ~7–10 萬 | LFP | ~400 km |\n| QQ3 | 奇瑞 | 5.89–7.89 萬 | LFP | 310–420 km |\n\n## 市場意義\n- 比亞迪海鷗是 2026 年 2 月中國出口量最高的 NEV\n- 平價車型是中國電動車出海的主力產品\n- 奇瑞 QQ3 加入使競爭進入白熱化\n\n## 技術趨勢\n- LFP 電池主導（安全、成本、壽命優勢）\n- 高算力座艙晶片（Snapdragon 8155）下沉至入門車型\n- 快充能力（<20 分鐘 30%→80%）\n\n## Related\n- [[entities/比亞迪]]\n- [[entities/奇瑞]]\n- [[concepts/中國EV市場競爭格局]]\n- [[concepts/中國EV出海策略]]"

      "body": "# 自動召喚功能（Auto Summon）\n\n允許車主透過手機 App 遠端低速控制車輛移動的功能，主要應用於停車場取車情境。\n\n## Tesla 的演進\n\n| 版本 | 時間 | 感測器 | 狀態 |\n|------|------|--------|------|\n| Smart Summon | 2019 | 超音波感測器 | 已下架（可靠性問題） |\n| Actual Smart Summon (ASS) | 2024-09 | 純視覺攝影機 | 現行版本，已通過 NHTSA 審查 |\n\n## 運作機制\n\n- 車主須在 Tesla App 持續按壓虛擬按鍵\n- 放開按鍵車輛立即停止（Dead-man switch 設計）\n- 車輛自主偵測周遭障礙物並停止\n\n## 安全數據（來自 NHTSA 調查）\n\n- 事故率：約 1%（每 100 次 Summon 有 1 次輕微碰撞）\n- 碰撞對象：停放車輛、車庫門、閘門\n- 傷亡：零\n\n## Related\n- [[entities/Tesla]]\n- [[entities/NHTSA]]\n- [[concepts/自動駕駛安全監管]]\n- [[sources/tesla-ass-nhtsa-probe-closed]]"

      "body": "# 自動駕駛安全監管\n\n電動車自動駕駛功能在各市場上市前，須通過政府主管機關的安全審查。不同國家監管框架差異顯著。\n\n## 美國框架（NHTSA）\n\n- 採事後調查機制：功能可先上市，出現事故後啟動調查\n- 調查指標：事故頻率、嚴重性、傷亡情況\n- 結案標準：嚴重性與頻率偏低可不採行動\n\n**案例**：Tesla ASS 功能（2025–2026）\n- 100 起碰撞報告 / 260 萬輛車 → 結案\n\n## 關鍵觀察\n\n- 純視覺方案（無雷達）已通過 NHTSA 審查，代表美國監管對該技術路線持開放態度\n- 低速、停車場情境的自動化功能門檻相對較低\n\n## Related\n- [[entities/NHTSA]]\n- [[entities/Tesla]]\n- [[concepts/自動召喚功能]]"

      "body": "# 比亞迪（BYD）\n\n中國最大新能源車廠，全球電動巴士最大生產商，以刀片電池技術與垂直整合供應鏈為核心競爭力。\n\n## 市場地位\n\n- **中國乘用車**：長期銷量龍頭，2026 Q1 因補貼政策因素短暫滑落第四\n- **全球電動巴士**：2025 年出口 4,234 輛；日本市場佔比超過 70%\n- **平價電動車**：海鷗為 2026 年 2 月中國出口量最高 NEV\n\n## 產品系列\n- **乘用車**：海鷗（平價小車）、海豹、漢、唐等\n- **電動巴士**：全球最大生產商，以低價攻占海外市場\n- **電池**：刀片電池（LFP），2026 年推進第二代\n\n## 在日本市場\n- 電動巴士售價比五十鈴等日本廠商便宜約 40%\n- 日本電動巴士市場佔比 > 70%\n\n## ADAS：天神之眼（DiPilot）\n- 2025-02 發布，導入 ~250 萬輛（裝車量 ~Tesla FSD 2 倍）\n- 分三級：DiPilot 600（3 LiDAR，旗艦）/ DiPilot 300（LiDAR+Orin-X）/ DiPilot 100（純視覺）\n- 問題：有效訓練數據量僅 Tesla 的一半（Piper Sandler）；品質爭議影響 2026 Q1 銷量排名\n\n## 高端品牌：騰勢（Denza）歐洲首秀（2026-04-08）\n- **騰勢 Z9GT**：三電機 850 kW，0-100 km/h 2.7 秒，122.5 kWh，WLTP 600 km\n- **閃充**：1,500 kW，10→97% 僅 9 分鐘（⚠️ 目前限中國規格接口）\n- **德國售價**：全電 €115,000，PHEV 版 €101,000\n- **充電布局**：未來 12 個月全球建設 6,000 座閃充站（其中 3,000 座在歐洲）\n- **首批市場**：法、德、義、西、英\n\n## 泰國市場（2026 曼谷車展）\n- 訂單量 17,354 輛，超越豐田奪冠\n- 中國品牌整體占車展 EV 訂單超過 2/3\n\n## 馬來西亞設廠談判（2026-04）\n- 擬在霹靂州丹戎馬林設 CKD 組裝廠，但與馬國政府條件未達成共識\n- 爭議：馬方要求本地生產車輛多數須出口、在地銷售須達最低售價\n- 馬來西亞 2025 年最暢銷 EV 品牌（市場 EV 占比 5.2%，全年 4.5 萬輛）\n\n## 中國 3 月出口（2026）\n- 中國 BEV+PHEV 出口 34.9 萬輛（+140% YoY），比亞迪佔約 **1/3**\n- 中國本土銷量卻下滑超過 **40%**（補貼政策收縮效應）\n\n## Q1 2026 財報：內捲衝擊（2026-04）\n\n| 指標      | 數值          | YoY                      |\n| ------- | ----------- | ------------------------ |\n| 營收      | RMB 1,502 億 | -11.82%                  |\n| 淨利      | RMB 40.85 億 | **-55.38%**（2020 以來最大跌幅） |\n| 銷量      | 70.05 萬輛    | -30%                     |\n| 出口量     | 31.97 萬輛    | **+56%**（占總銷量 45.6%）     |\n| 3 月平均折扣 | **10%**     | 兩年新高                     |\n\n- 中國汽車年產能 5,550 萬輛 vs 銷量 2,300 萬輛：**產能利用率僅 50%**\n- 全行業 Q1 近 70 款車型集體降價；行業利潤率 **2.9%**\n- 王傳福：「體質弱的車廠正被加速清洗，決賽期已到來」\n- 出口已成比亞迪最重要增長引擎（佔總量近半）\n- 參見：[[sources/byd-q1-2026-earnings]] | [[concepts/地理市場/中國EV市場競爭格局]]\n\n## 騰勢 Z Roadster（2026-04，北京車展）\n\n| 規格 | 數值 |\n|------|------|\n| 最大功率 | **1,000 HP** |\n| 0-60 mph | **< 2 秒** |\n| 充電規格 | Flash 1,500 kW |\n| 設計師 | Wolfgang Egger（前 Audi/Lamborghini 設計師）|\n| 版本 | Coupe / Convertible / Track |\n| 首亮相 | Goodwood Festival of Speed |\n| 市場 | **歐洲優先** |\n\n- 與騰勢 Z9GT（已歐洲上市）共同構成比亞迪超高端歐洲攻勢\n- 參見：[[sources/byd-denza-z-roadster]]\n\n## 4 月海外銷量 +71%，中國本土持續疲軟（2026-05）\n\n| 指標 | 4 月數值 |\n|------|---------|\n| 整體交車 | **32.11 萬輛（-16% YoY，連 8 個月下滑）** |\n| 海外銷量 | **13.45 萬輛（+71% YoY）** |\n| 前 4 月累計海外 | **45.43 萬輛** |\n| 折扣幅度 | 10%（近兩年新高，3 月數據）|\n| 2026 年海外目標 | **130 萬輛**（+25% vs 2025）|\n\n- 新旗艦 SUV **大唐**：預售 24 小時訂單破 3 萬輛，≈1,000km 續航，起售 RMB 25 萬\n- 壓力：補貼退場 + 吉利（吉利 4 月出口 +245%）、小米、奇瑞等激烈競爭\n- 參見：[[sources/byd-april-exports-q1-2026]]\n\n## 馬來西亞 CBU EV 新規衝擊（2026-05）\n\n- 馬來西亞 MITI 自 2026-07-01 起規定：CBU EV 需 CIF ≥ RM20 萬 + 最低 180kW\n- 比亞迪 7 款車型中，**僅 Seal + Sealion 7** 達 180kW 功率標準\n- 兩款車目前售價均低於 RM20 萬（CIF 不達標）→ 實質阻擋中低價位車款進口\n- 加上 CKD 工廠停工（2026-03），比亞迪馬來西亞受到雙重夾擊\n- 參見：[[sources/malaysia-cbv-ev-regulation-2026]] | [[concepts/地理市場/東南亞EV市場]]\n\n## Related\n- [[entities/奇瑞]]\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/車輛類型/平價電動車市場]]\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/東南亞EV市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/foxconn-mitsubishi-fuso-electric-bus]]\n- [[sources/chery-qq3-vs-byd-seagull]]\n- [[sources/byd-denza-europe-debut]]\n- [[sources/thailand-ev-market-2026]]\n- [[sources/byd-malaysia-factory-negotiation]]\n- [[sources/china-ev-export-record-march-2026]]\n- [[sources/byd-q1-2026-earnings]]\n- [[sources/byd-denza-z-roadster]]"

      "body": "# 本田汽車（Honda）\n\n日本第二大汽車製造商，2026 年大幅修正 EV 策略，取消多個北美電動車計畫，轉向電動機車電池交換布局。\n\n## EV 策略大修正（2026）\n\n### 取消的計畫\n| 計畫 | 原定時間 |\n|------|---------|\n| Acura RSX SUV | 2026 北美 |\n| Honda 0 Series SUV | 2026 北美 |\n| Afeela 1（與 Sony 合資）| 2026 北美 |\n| Honda Saloon | 2027 |\n\n### 財務影響\n- FY2025 合併淨利：預估首度虧損 ~6,900 億日圓（~$43.2 億美元）\n- 累計損失至 2026 年度：最高恐達 2.5 兆日圓\n- 研發效率：營業利益/研發費 = 1.3 倍（vs 豐田 3.4 倍）\n\n## 電動機車布局（Gachaco）\n- 2026-04-01：追加投資 Gachaco，持股升至 47%（子公司）\n- 聯合鈴木、山葉推動電池交換生態系\n- 現有網絡：東京、大阪，擴展至地方城市\n\n## Super One 小型 EV（2026-05）\n- 推出時間：**2026 年 5 月底**（4 月 16 日開放預購）\n- 基礎：N-ONE e:；規格：274 km 續航，1,090 kg（非輕型 EV 中最輕）\n- 定位：Non-K-Car，計畫進軍英國 + 亞洲\n- 競爭目標：比亞迪「海獺（Rakko）」（2026 年夏日本輕型 EV，K-Car 規格）\n- 本田完整輕小型 EV 產品線：N-VAN e:（商用）+ N-ONE e:（K-Car）+ Super One\n\n## 歐洲 e:Ny1 撤退（2026-04）\n\n- Honda e:Ny1 從英國、德國、義大利、西班牙、瑞士市場全面下架\n- 2025 年德國銷量：僅 **105 輛**\n- 上市時原定 €47,590，後降至 €38,990，仍無法拯救銷量\n- 失敗原因：\n  - 搭載過時 EMR3 電機（非最新架構）\n  - 充電速度僅 7kW AC / 最高 78kW DC（10→80% 約 45 分鐘，落後競品）\n  - 性價比不具競爭力\n- 意義：本田歐洲 EV 布局嚴重受阻，策略大修正背景下的又一挫敗\n- 參見：[[sources/honda-eny1-withdrawal-europe]]\n\n## 退出韓國汽車市場（2026-04）\n\n- **2026 年底**終止韓國四輪汽車業務（進入韓國市場 **22 年**）\n- 2025 年韓國銷量：**1,951 輛**（市占率 < 1%）\n- 撤退原因：韓系品牌（現代/起亞）主導本土市場，進口品牌難以立足\n- **機車業務繼續**：機車韓國市占第一（年銷 ~42 萬輛）\n- 本田四輪汽車全球性收縮（歐洲已撤，韓國撤，重心轉向北美/日本/東南亞）\n- 參見：[[sources/honda-exits-korea-2026]]\n\n## 氫能貨車合作（五十鈴，受影響）\n- 本田 BEV 策略失利 → 短期難大舉投資氫燃料技術\n- 影響五十鈴 Giga Fuel Cell 燃料電池大貨車研發進度（已延後至 2030 年）\n\n## 與日產的整合談判\n進展緩慢，北美車輛開發有合作溝通。\n\n## 加拿大 EV 工廠無限期凍結（2026-05）\n\n| 項目 | 細節 |\n|------|------|\n| 工廠地點 | 安大略省（Ontario）|\n| 原計畫投產 | 最快 2028 年（2025 年已延後 2 年）|\n| 年產能 | **24 萬輛 EV** |\n| 總投資 | **CAD 150 億（~USD 108 億）** |\n| 現況 | **無限期凍結**，不排除完全撤回 |\n\n- 與 **GM 合作的 Prologue** 電動車亦將於 **2026 年下半停產**（庫存售完即止）\n- 停產後，本田美國產品線將暫時**出現無電動車空窗**\n- 轉向：Ohio 工廠（已投資 USD 10 億）改為 HEV + 燃油車 + EV 共線，聚焦 **HEV + 燃油車**\n- 原定 2026 年起北美銷售 3 種 EV 的計畫**全部告停**\n- 參見：[[sources/honda-canada-ev-freeze-2026]] | [[concepts/地理市場/北美EV關稅與政策]]\n\n## FY2026：70 年來首次年度虧損（2026-05）\n\nHonda 公布截至 2026 年 3 月的 FY2026 財報：\n\n| 項目 | 數值 |\n|------|------|\n| 年度業績 | **首次年度淨虧損**（自上市以來，近 70 年）|\n| EV 策略總損失 | **~$90 億美元** |\n| 取消的 0 Series 平台 | SUV + Sedan + Acura RSX 三款全取消，一輛未交付 |\n| 新混動投資（3 年）| **4.4 兆日圓（~$280 億）** |\n| EV 未來預算 | 僅 **$50 億**（~混動投資的 18%）|\n| 首款新混動平台車型 | 2028 年上市（美國 SUV AWD 優先）|\n| 2030 年目標 | 15 款混動車型 |\n\n→ CEO：**純電未來「不切實際」**（\"not realistic\"）\n→ 預計 2026 年底恢復獲利（摩托車業務 + 削減成本）\n- 參見：[[sources/honda-9b-loss-hybrid-pivot-2026]]\n\n## Related\n- [[entities/豐田]]\n- [[concepts/電池交換技術]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[sources/honda-gachaco-battery-swap]]\n- [[sources/honda-strategy-correction-2026]]\n- [[sources/honda-super-one-byd-rakko]]\n- [[sources/isuzu-hydrogen-truck-delay]]\n- [[sources/honda-eny1-withdrawal-europe]]\n- [[sources/honda-exits-korea-2026]]"

      "updated": "2026-04-23",

      "body": "# Tesla\n\n美國電動車製造商，全球電動乘用車市場的主要玩家，以純視覺自動駕駛方案（FSD）為核心技術路線。\n\n## 基本資訊\n\n- **類型**：電動乘用車製造商\n- **總部**：德州奧斯汀，美國\n- **主要產品**：Model S, 3, X, Y, Cybertruck\n\n## 技術路線\n\n- **自動駕駛**：純視覺攝影機方案（無雷達、無超音波感測器）\n- **軟體定義車輛**：功能透過 OTA 更新持續迭代\n\n## 監管紀錄\n\n| 時間 | 事件 |\n|------|------|\n| 2025 初 | NHTSA 對 ASS 功能展開調查（涉及 260 萬輛） |\n| 2026-04 | NHTSA 結束調查，正式結案 |\n\n## 市場表現\n\n### 台灣（2026 年 3 月）\n- 交付量：5,421 輛\n- 市占率：77.5%（進口車 + 電動車雙榜冠軍）\n- Model Y：4,540 輛，全車種銷售冠軍；全球累積 400 萬輛\n- Model 3：豪華進口轎車榜首；全球累積 300 萬輛；發表 10 週年\n\n### 美國（Q1 2026）\n- 銷量：約 122,196 輛（估），年減約 5%\n\n### 歐洲（2025）\n- 銷量：23.5 萬輛，年減近 30%\n- 人才流失：多名德國主管跳槽小米\n\n## 4680 電池（2026 現況）\n| 規格 | 數值 |\n|------|------|\n| 尺寸 | 直徑 46mm × 高度 80mm |\n| 設計 | 無極耳（tabless），縮短電流路徑 |\n| 製程 | 乾式電極，2026 年實現負極+正極同時穩定量產 |\n| 應用 | Cybertruck、部分 Model Y |\n| 供應商 | Tesla 自建 + Panasonic |\n\n- 2020 年發布，初期良率是瓶頸；2026 年達穩定量產\n- 競爭者：寧德時代等廠商跟進開發類似大尺寸圓柱電池\n\n## Musk 垂直整合戰略\n- 核心邏輯：掌控技術密碼，BMS 與三電系統核心控制權自持\n- 跨業布局：Tesla EV / SpaceX 衛星 / Optimus 人形機器人 / Terafab 半導體\n- 美國製造：接觸中國 HJT/BC/鈣鈦礦技術供應商，目標建立 100 GW 美國太陽能製造體系\n\n## 南韓市場（2026 Q1）\n- 銷量：**20,964 輛**，年增逾 4 倍，市占率 25.53%\n- **首次**奪得南韓進口車市場季度冠軍（打破 BMW/賓士長期輪流稱霸）\n- 主因：2026 年 1 月 Model 3 降價至約 4,199 萬韓元（含補貼降至 3,000 萬韓元區間）\n- 三月月銷 11,130 輛，單月爆發；分析師認為主要蠶食韓國國產車市場\n\n## 中國市場（2026 Q1）\n- Tesla 上海廠出口 +9% YoY，但中國本土銷量 **-24%**\n\n## Q1 2026 財報（2026-04-22）\n\n| 指標 | Q1 2026 |\n|------|---------|\n| 總收入 | **$22.39B**（+16% YoY）|\n| 汽車毛利率（不含積分）| **19.2%**（全年最高）|\n| 調整後 EPS | **$0.41**（超預期 $0.37）|\n| 交車量 | **358,023 輛**（+6% YoY）|\n| 全年 Capex 指引 | **>$250 億**（原 $200 億，大增 $50 億）|\n\n### Q1 重大策略宣告\n- **Model S/X 停產**：Fremont 工廠轉型為 Optimus 人形機器人量產基地（Q2 開始準備，目標年產 100 萬台）\n- **HW3 不支援無人監督 FSD**：擁有 HW3 的 Model 3/Y 舊款無法升級到未來無監督 FSD，Tesla 將提供折扣換購方案\n- **更平價 Model 3/Y**：確認規劃推出更低價車型\n- **印度 Model Y L**：₹61.99 萬，6 座，681km，2026-06 交車\n\n- 參見：[[sources/tesla-q1-2026-earnings]] | [[sources/tesla-india-model-y-l]]\n\n## 競爭壓力\n- 小米 2027 年目標進軍歐洲，大量從 Tesla 德國團隊挖角\n- Rivian R2 能效超越 Tesla Model Y Performance\n\n## Related\n- [[entities/NHTSA]]\n- [[entities/小米汽車]]\n- [[entities/Rivian]]\n- [[concepts/電池與技術/自動召喚功能]]\n- [[concepts/電池與技術/自動駕駛安全監管]]\n- [[concepts/地理市場/台灣EV市場]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[sources/tesla-ass-nhtsa-probe-closed]]\n- [[sources/tesla-taiwan-march-2026]]\n- [[sources/xiaomi-ev-europe-2027]]\n- [[sources/tesla-4680-musk-strategy]]\n- [[sources/tesla-korea-q1-2026]]\n- [[sources/tesla-q1-2026-earnings]]\n- [[sources/tesla-india-model-y-l]]\n- [[concepts/電池與技術/電池技術路線]]"

      "body": "# 樂金能源解決方案（LG Energy Solution，LGES）\n\n韓國最大電池製造商，全球第二大動力電池廠，2026 年因 IRA 補貼縮水與 EV 需求下滑首度連續兩季虧損，積極轉型 ESS 業務。\n\n## 財務現況（2026）\n- Q1 2026：史上首次連續兩季營業虧損\n- 主因：IRA AMPC 補貼 -59% YoY（1,898 億韓元 vs 4,577 億韓元）\n- GM Ultium Cells 暫停、袋型電池需求下滑\n\n## 4680 電池 × Tesla 潛在大單（2026-04）\n\n### 最新動態\n- LGES 傳近期將與 Tesla 簽署 4680 圓柱型電池大規模供應合約\n- Tesla Cybercab（Robotaxi）目標年產 200 萬輛，自製 4680 僅供 Cybertruck → Model Y 所需 4680 外購\n\n### LGES 競爭優勢（vs Panasonic）\n| 項目 | LGES | Panasonic |\n|------|------|----------|\n| 美國 4680 廠 | **Arizona Queen Creek，36 GWh，2026 底完工** | 鳳凰城 AZ，最快 2028 年 |\n| 時間優勢 | 先行約 1 年 | — |\n| 現有 4680 客戶 | Rivian、Mercedes-Benz | Tesla Cybertruck（現行供應）|\n\n- 符合 Trump「美國製造」政策 → 在地化優勢明顯\n\n## 主要客戶\n- **Tesla**：潛在 4680 大規模供應（談判中）+ 儲能電池合約\n- **Rivian**：已簽 4680 供應合約\n- **Mercedes-Benz**：已簽 4680 供應合約\n- **豐田**：密西根廠轉向供應豐田 NEV 電池\n- **GM**：Ultium Cells 合資（暫停）\n\n## 轉型策略\n- 目標：非 EV 業務比重從 20% 提升至 40%\n- **2026 年 ESS 業務目標：年增 3 倍以上**\n\n## IRA 合規\n- 採購正極材料的供應商（載世能源）已拆分法人降低中資比重，確保 LGES 北美業務合規\n\n## LGES × BMW：100 GWh 46 系列圓柱大單（2026-04-30）\n\n| 項目 | 數值 |\n|------|------|\n| 訂單量 | **100 GWh**（46 系列）|\n| 可能客戶 | **BMW**（4695 格式 = Neue Klasse 標準規格）|\n| 合約金額 | **~€58 億**，10 年期 |\n| 生產基地 | 亞利桑那廠（2026 年底完工）→ 供應 BMW Spartanburg 廠 |\n\n- LGES 首次供應 BMW BEV 電芯（過去僅供 BMW HEV）\n- 積壓訂單總量超過 **440 GWh**\n- 參見：[[sources/lges-bmw-46series-order]]\n\n## 全球市占（2026 年 1–2 月）\n- 韓系三廠（LGES + SKOn + 三星SDI）合計：15%（-2.2pp YoY）\n\n## Related\n- [[entities/寧德時代]]\n- [[entities/三星SDI]]\n- [[entities/Tesla]]\n- [[entities/Rivian]]\n- [[entities/豐田]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[sources/lges-loss-ess-2026]]\n- [[sources/lges-tesla-4680-supplier]]\n- [[sources/us-ev-battery-demand-mismatch]]"

      "updated": "2026-04-13",

      "body": "# 斯特蘭蒂斯（Stellantis）\n\n歐美跨國汽車集團，品牌含 Jeep、Fiat、Peugeot、Citroën 等，2023 年入股中國零跑汽車 20%，EV 策略面臨多重壓力。\n\n## 零跑合作\n- 2023 年：取得零跑 20% 股權\n- 2024 年：成立合資企業，聚焦 EV 全球生產與銷售\n- 2026 年：擬在加拿大 Brampton 廠組裝零跑中國製零組件 → 遭工會/省府/聯邦反對\n\n## 電池合資調整\n- 退出部分與 LGES 的電池合資案（受 Trump 政策影響）\n- 旗下 ACC（電動電池公司）仍依賴中系技術\n\n## Opel/Peugeot 長續航版交付延遲（2026）\n- **Opel Grandland**、**Peugeot e-3008**、**e-5008** 長續航版（97 kWh）：交付推遲至 2027 Q1~Q2\n- 原因：電池供應商產能爬坡不順 + B2B 車隊訂單（占訂單 ~90%）被優先排程\n- 企業客戶：預計 2026 年 9 月完成；個人客戶：等至 2027 Q1\n\n## Opel × 零跑 O3U（2026-04 進階談判中）\n- **計畫**：以零跑 B10 平台開發 Opel 品牌電動 SUV（代號 O3U）\n- **工廠**：薩拉戈薩廠（西班牙），與 B10 共線生產\n- **時程**：B10 於薩拉戈薩 2026 H2 啟動；O3U 預計 2028 年量產\n- **規模**：年產目標 5 萬輛；可能延伸至 Alfa Romeo\n- **邏輯**：Stellantis EV 業務 2022 年大幅減損後，利用零跑技術降低開發成本\n\n## Related\n- [[entities/零跑汽車]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/北美EV關稅與政策]]\n- [[concepts/歐洲EV政策]]\n- [[sources/stellantis-leapmotor-canada-rejected]]\n- [[sources/stellantis-opel-leapmotor-suv]]"

      "body": "# SK On\n\n韓國第二大電池廠（SK Innovation 旗下），以 NCM 電池為核心，為 Volkswagen 集團、Ford 等歐美主要車廠供貨，2026 年歐洲工廠（匈牙利）因歐洲 EV 市場逆勢成長而達到近「滿載」水準。\n\n## 基本資訊\n- **類型**：韓國鋰電池廠（SK Innovation 旗下子公司）\n- **電池類型**：NCM（鎳鈷錳三元電池）\n- **主要客戶**：Volkswagen（ID.4、ID.7）、Ford\n\n## 匈牙利工廠（歐洲核心生產基地）\n| 項目 | 數值 |\n|------|------|\n| 位置 | 科馬羅姆（Komárom），匈牙利 |\n| 狀態 | 電芯 + 模組產線全面啟動 |\n| 產能利用率（2026）| **85%**（接近「滿載」）|\n| 全球平均對比（2025）| 48.7%（匈牙利廠幾近翻倍）|\n\n## 市場地位\n- 歐洲工廠受惠 VW 電動車銷量強勁（VW 2025 年歐洲電動車市占冠軍）\n- 與 LGES（LG 能源解決方案）同為韓系電池廠代表，但定位略有不同\n- LGES 首度連續兩季虧損（2026），而 SK On 歐洲廠則接近滿載\n\n## SK On × 日產 99GWh 合約傳動搖（2026-05）\n\n- **合約規模**：~99 GWh（供約 100 萬輛中型 EV），合約金額 ~15 兆韓元（~USD 102 億）\n- **原定**：2028 年起供應日產 Canton 廠（密西西比州）\n- **現況**：日產 Canton EV 計畫 2026 年 5 月完全取消 → 雙方正重新檢討合約\n- 此為 SK On **首度與日本整車廠簽訂電池供應合約**，具高度象徵意義\n- 合約終止風險 = 北美 EV 需求降溫的電池廠連帶衝擊縮影\n- 參見：[[sources/sk-on-nissan-battery-doubt-2026]] | [[sources/nissan-mississippi-ev-abandonment]]\n\n## Q1 2026 財報：虧損擴大，轉型 ESS 進行中\n\n- SKI 集團 Q1 2026 整體：~24.21 兆韓元營收，2.16 兆韓元利益（石油業務支撐）\n- **SK On 電池**：Q1 2026 營業損失 **3,492 億韓元**（2025 Q1：2,994 億 → 惡化）\n- Capex：SKI 8,000 億韓元中 38% 集中電池事業（部分轉 ESS 產線）\n- 韓國 ESS 競價市場（MCEE 第二次，1 兆韓元規模）SK On 拿下 **>50% 訂單**\n- 參見：[[sources/ski-q1-2026-results]]\n\n## 搶先量產 EREV 電池：Genesis GV70（2027）\n\n- 2026H2 韓國瑞山廠量產 **EREV 用 NCM 袋型電池**（韓國三雄中首家）\n- 客戶：Hyundai，搭載 Genesis GV70（2027 年初上市）\n- EREV 單車電池 40kWh（>HEV 20 倍），市場潛力高\n- 參見：[[sources/sk-on-erev-battery-hyundai-2027]]\n\n## Related\n- [[entities/LGES]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]\n- [[sources/sk-on-hungary-utilization]]\n- [[sources/sk-on-nissan-battery-doubt-2026]]\n- [[sources/ski-q1-2026-results]]\n- [[sources/sk-on-erev-battery-hyundai-2027]]"

      "summary": "日本最大汽車製造商，以油電混合車（HEV）著稱，近期加速純電（BEV）與氫燃料電池（FCV）雙線布局。",
      "updated": "2026-04-30",
      "source_count": 4,
      "body": "# 豐田汽車（Toyota）\n\n日本最大汽車製造商，以油電混合車（HEV）著稱，近期加速純電（BEV）與氫燃料電池（FCV）雙線布局。\n\n## 電動車策略\n\n### BEV：bZ 系列逆勢成長\n- Q1 2026 美國 EV 銷量翻倍至 14,498 輛（bZ 系列 +79%）\n- 成功因素：起售 $34,900、續航提升 25%、全面支援 NACS\n- 2026 年起將美國純電車型擴至 6 款\n- 與 Subaru 共同開發 4 款純電車（2026 年起陸續上市）\n\n### FCV：氫能重型貨車布局\n- 2026-03-31 與戴姆勒卡車、Volvo 簽署 MOU，投資 Cellcentric\n- 策略：以重型商用車作為 FCV 突破口\n- 2015 年率先量產 Mirai，但全球 FCV 市場已被中韓主導（合計 ~90%）\n\n## 電池供應\n- LGES 密西根廠轉向供應豐田 NEV 電池\n\n## 生存危機警告：佐藤恒治供應商大會（2026-04）\n\n> **「今のままでは、生き残れない。」**（如果維持現狀，我們無法生存。）\n> — 佐藤恒治，豐田社長，2026-04 供應商大會\n\n| 指標 | 數值 |\n|------|------|\n| 供應商大會規模 | **484 家**供應商出席 |\n| FY2025 銷量 | **1,109 萬輛** |\n| FY2025 利潤 | **4.8 兆日圓** |\n| FY2026 利潤目標（下修）| **3.8 兆日圓**（-21%）|\n\n- 啟動「**智慧標準化活動**」：放寬「品質極致化」（過度規格），降低成本\n- 繼任佈局：**近健大**接任新一代領導（財務+成本改革背景出身）\n- 主要挑戰：中國競爭對手成本優勢擴大、電動化轉型投資壓力、全球關稅衝擊\n- 參見：[[sources/toyota-survival-2026]]\n\n## 印度三廠擴建：全球第四大生產基地（2026-05-01）\n\n- 馬哈拉施特拉邦新建 **3 座整車廠**（+現有南印度 3 廠 = 共 6 廠）\n- 投資：**~3,000 億日圓（~$19.1 億美元）**\n- 目標：2030 年代年產能 **100 萬輛**（現在 3 倍）→ 全球第四大基地\n- 首座新廠 ~2029 年啟用；SUV + PHEV 為主力車型\n- 合作：鈴木（Maruti）提供 EV 與小型車\n- 參見：[[sources/toyota-india-3-plants]]\n\n## Related\n- [[entities/通用汽車]]\n- [[entities/福特]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/地理市場/印度EV市場]]\n- [[concepts/電池與技術/氫燃料電池商用車]]\n- [[concepts/NACS充電標準]]\n- [[sources/gm-ford-q1-2026-sales]]\n- [[sources/toyota-daimler-volvo-hydrogen-truck]]\n- [[sources/toyota-survival-2026]]\n- [[sources/toyota-india-3-plants]]"

      "summary": "台灣最大電子製造商，近年積極切入電動車與電動商用車市場，以 MIH 電動車平台為核心。",
      "updated": "2026-04-15",
      "source_count": 4,
      "body": "# 鴻海（Foxconn）\n\n台灣最大電子製造商，近年積極切入電動車與電動商用車市場，以 MIH 電動車平台為核心。\n\n## 電動車布局\n\n### 電動巴士：與三菱FUSO合作\n- 2026 下半年：與三菱FUSO各出資 50%，成立巴士專責公司\n- 2027 年：開發新款電動大巴，台灣廠進口車體→日本組裝→銷售\n- 2030 年目標：全日本製造，外銷東南亞、澳洲\n- 策略優勢：EV 開發技術、縮短開發時程\n\n## CDMS 全球製造模式（2026 最新）\n\n鴻海採行 **CDMS（委託設計與製造服務）**模式，將電子代工邏輯延伸至汽車產業：\n\n- 全球布局：**24 個國家**，超過 **240 個**營運據點\n- 彈性依客戶稅負、成本、物流條件決定生產地點\n\n### 電池自製化（核心佈局）\n- **高雄電池中心**：LFP 技術為主，規劃產能 **1.27 GWh**，**2026 年**量產\n- 電池佔整車成本 >30%，自製可強化供應鏈掌控與成本控制\n- 同步展示半固態與固態電池樣品（量產時程未定）\n\n### 量產車型（2026）\n- **Model B/C（新款）/D/U（中巴）**：以量產導向展出\n- Model C：已針對美國市場法規調整設計\n\n### 三菱 FUSO 合作最新進度\n- **2025 年**：簽署 MOU\n- **2026 年 1 月**：正式合約簽訂完成\n- 合資公司在日本開發與銷售電動商用車（Model T + Model U）\n\n## 鴻華先進（Foxtron）乘用車品牌擴張（2026-05）\n\n鴻華先進以 Foxtron 品牌快速擴張產品線：\n\n| 車型 | 狀態 |\n|------|------|\n| **N7**（MPV）| 量產中，三義廠 |\n| **Bria**（首款電動乘用車）| 2025-12 發表，量產中 |\n| **Cavira**（中型 SUV）| **2026-05-20 啟動預接單，06-17 正式上市** |\n\n**全球市場佈局**：\n- 紐澳：**2026 Q3末~Q4初**（透過三菱汽車合作進入）\n- 歐盟：與波蘭 Electro Mobility Poland 合作研議中\n- 美國：台灣整車進口關稅升至 27.5%，暫緩；轉向強化 **CDMS 平台**吸引力\n- **CDMS 平台優勢**：OEM 客戶採用共用平台，EV 開發成本可降至原本 **20~30%**\n\n**製造基地**：全產品線由**裕隆三義廠**生產；裕隆 2026-04-10 完成納智捷股權移轉\n\n- 參見：[[sources/foxtron-cavira-yulon-2026]]\n\n## 角色定位\n鴻海試圖以「技術提供者 + CDMS 製造夥伴」角色，讓傳統車廠外包製造與供應鏈管理，打造垂直整合一條龍服務。\n\n## Related\n- [[entities/三菱FUSO]]\n- [[entities/比亞迪]]\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/車輛類型/電動商用車]]\n- [[sources/foxconn-mitsubishi-fuso-electric-bus]]\n- [[sources/foxconn-cdms-ev-vertical-integration]]\n- [[sources/foxtron-cavira-yulon-2026]]\n- [[sources/archion-hino-fuso-foxconn-ebus-2026]]"

      "summary": "美國電動車新創，以電動皮卡（R1T）和電動 SUV 起家，R2 系列為其進入大眾市場的關鍵產品。",
      "updated": "2026-05-06",
      "source_count": 3,
      "body": "# Rivian\n\n美國電動車新創，以電動皮卡（R1T）和電動 SUV 起家，R2 系列為其進入大眾市場的關鍵產品。\n\n## 產品線\n\n### R2 系列（中型電動 SUV，2026–2027 上市）\n| 車型 | 售價 | 上市時間 | 續航 |\n|------|------|---------|------|\n| R2 Performance | $59,485 | 2026 春 | 335 英里 |\n| R2 Premium | $55,485 | 2026 底 | ~335 英里 |\n| R2 Standard | $49,985 | 2027 初 | 345 英里 |\n| R2 Standard（小電池）| $46,495 | 2027 底 | >275 英里 |\n\n## 技術優勢\n- R2 Performance 能效（26.52 kWh/100mi）優於 Tesla Model Y Performance（32 kWh/100mi）\n- 標配改良型熱泵系統（比 R1 更小巧高效）\n- DC 快充峰值 210 kW\n\n## 製造\n- 工廠：伊利諾伊州諾默爾（Normal, IL）\n- **R2 系列生產已啟動**（2026 年 Q1，客戶交車中）\n\n## 服務網絡里程碑（2026-05-04）\n\n| 指標 | Q1 2026 | YoY |\n|------|---------|-----|\n| 實體服務中心 | **100 個** | +35% |\n| 移動服務車 | **680 台** | — |\n| Rivian Spaces（展示點）| 39 個 | +44% |\n| 充電樁（冒險網路）| 973 個 | +38% |\n\n- 仍有多州無實體服務中心（北達科他、南達科他、懷俄明等）\n- R2 大量交車後，服務網絡是否足夠是核心挑戰\n- 參見：[[sources/rivian-service-network-2026]]\n\n## 考慮中美合資在美生產 LiDAR（2026-05）\n\n- CEO RJ Scaringe：R2 車款將搭載**小型 LiDAR**（非 Waymo 大型旋轉式）\n- 低百元美元 LiDAR 選項幾乎全來自中國（禾賽科技、速騰聚創）\n- 方案：與中國廠商合資，利用中國技術 + **在美本土生產**（規避國安疑慮）\n- 其他美國車廠亦對此模式表達興趣，可能形成聯合採購\n\n## 自研晶片 RAP 系列（2026）\n\n| 代號 | 製程 | 時程 |\n|------|------|------|\n| **RAP-1** | 台積電 **5nm** | **2026 年**上市 |\n| RAP-2 | 比 5nm 更先進 | 後續 |\n| RAP-3 | 比 5nm 更先進 | 後續 |\n\n- 已投入**數億美元**，以與 Tesla 自研晶片競爭\n- 參見：[[sources/rivian-lidar-china-partner-2026]]\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[sources/rivian-r2-range-specs]]\n- [[sources/rivian-service-network-2026]]\n- [[sources/rivian-lidar-china-partner-2026]]"

      "updated": "2026-05-15",
      "source_count": 3,
      "body": "# 三星 SDI（Samsung SDI）\n\n韓國三大電池廠之一（三星集團旗下），以高鎳 NMC 電池為核心競爭力，歐洲市場已供應 BMW、Volkswagen，並於 2026-04-20 **正式簽署**與賓士的電池供應合約，完成德國三大豪華車廠全覆蓋。\n\n## 基本資訊\n- **類型**：韓國鋰電池廠（三星集團旗下）\n- **核心產品**：高鎳 NMC（三元鋰）電池\n- **定位**：歐洲豪華車廠主要電池供應商（BMW、VW、賓士三廠全覆蓋）\n\n## 主要客戶\n| 客戶 | 關係 |\n|------|------|\n| BMW | 既有供應商 |\n| Volkswagen | 既有供應商 |\n| 賓士（Mercedes-Benz）| **已簽約**（2026-04-20 正式確認）|\n\n## 賓士電池訂單（已正式簽署，2026-04-20）\n- 合約簽署：**2026 年 4 月 20 日**（原「談判中」→ 正式確認）\n- 電池類型：**高鎳 NMC**（非早期報導的方形 Prismatic）\n- 目標平台：**MMA 平台**（賓士緊湊型 EV，含 A-Class、CLA 等級）\n- 交付開始：**2028 年**\n- 規模：數十 GWh\n- 合約金額：超過 **10 兆韓元（約 €58 億）**\n- 附加：雙方共同開發下一代電池協議（聯合 R&D）\n- 生產模式：歐洲境內設立賓士專用產線（候選地：奧地利、斯洛伐克、捷克）\n\n> ⚠️ 早期來源（[[sources/samsung-sdi-mercedes-battery-deal]]，2026-04-15）誤報電池類型為「方形 Prismatic」；官方確認為高鎳 NMC。\n\n## 與競爭對手的差異\n- LGES：圓柱 + 軟包為主，首度連續兩季虧損（2026）\n- SK On：NCM 電池，匈牙利廠近滿載（2026）\n- 三星 SDI：高鎳 NMC 利基，歐洲豪車廠偏好，合約已全面落地\n\n## 全固態電池（ASB）量產進度（2026-04）\n\n- **目標量產時間**：**2027 下半年**（韓國三大電池廠中最早）\n- **組織調整**：ASB 事業化推進團隊「先行開發組」約 50% 人力轉至「量產開發組」\n  - 先行開發組：材料設計 / 量產開發組：組裝 + 結構 + 商品化\n- **財務背景**：2025 年營業虧損約 1.7 兆韓元（~USD 11.5 億）\n- **應用多元化**：EV 方型 → 擴展至人形機器人、航空系統、穿戴裝置\n- LGES / SK On 固態電池目標量產：2029 年（三星SDI 早約 2 年）\n- 參見：[[sources/samsung-sdi-solid-state-production-2026]]\n\n## Related\n- [[entities/LGES]]\n- [[entities/SK On]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/samsung-sdi-mercedes-battery-deal]]\n- [[sources/samsung-sdi-mercedes-confirmed-deal]]\n- [[sources/samsung-sdi-solid-state-production-2026]]"

      "body": "# 福特汽車（Ford）\n\n美國第二大汽車製造商，2026 年 Q1 EV 銷量重挫 70%，轉型策略轉向儲能市場（Ford Energy）。\n\n## EV 現況\n- Q1 2026 美國 EV 銷量：6,869 輛（年減 70%）\n- 解散與 SK On（肯塔基州）的電池合資企業\n\n## Model e 財報（Q1 2026）\n- EBIT **-$777M**（改善自 -$849M），每輛虧損 ~$23,000\n- 售出 ~34,000 輛（+10% YoY），但營收持平 → 均價下滑\n- 全年指引：FY2026 -$4.0~$4.5B（改善自 -$4.8B）\n- 下一步：Ford Universal EV Platform（UEV）準備下一代平價 EV\n- 參見：[[sources/ford-model-e-q1-2026]]\n\n## 電池轉型策略\n- 密西根 LFP 廠（採寧德時代技術）2026 年啟動，兼供 BESS\n- 肯塔基廠（原 SK On 合資）轉型儲能系統用途\n- 成立 **Ford Energy** 事業部：切入家用與大型電網儲能\n\n## Related\n- [[entities/通用汽車]]\n- [[entities/寧德時代]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[概念/儲能市場]]\n- [[sources/gm-ford-q1-2026-sales]]\n- [[sources/us-ev-battery-demand-mismatch]]"

      "updated": "2026-05-06",
      "source_count": 2,
      "body": "# 吉利汽車（Geely）\n\n吉利汽車是中國第三大整車廠，旗下涵蓋吉利、領克、極氪（Zeekr）、Volvo 等品牌。2025 年全球銷量超越本田與日產，全球排名第 8，目標 2030 年進入全球前五。\n\n## 基本資訊\n\n| 項目 | 細節 |\n|------|------|\n| 創辦人 | 李書福 |\n| 全球排名 | 第 8（2025 年）|\n| 策略特色 | 多動力路線並進（BEV + PHEV + HEV + ICE）|\n| 旗下品牌 | 吉利、領克、極氪、沃爾沃汽車、Smart、Polestar 等 |\n\n## i-HEV 平台（2026）\n\n- 全新智慧油電混合動力系統，AI 深度優化能量管理\n- 架構革新：智駕 + 座艙 + 底盤整合為單一中央大腦\n- **海南島實測：Emgrand 2.22 L/100km**（超越豐田 Prius 2.53 L/100km）\n- 已量產：Boyue L、Xingyue L\n\n## 競爭定位\n\n| 對手 | 吉利優勢 | 吉利劣勢 |\n|------|---------|---------|\n| 豐田 HEV | 燃油效率更佳（2.22 vs 2.53 L/100km）| 品牌信任度與全球服務網不如豐田 |\n| BYD | 全動力路線，不依賴外部充電 | BYD 在中國市場規模更大 |\n| Tesla | i-HEV 零充電焦慮 | 智慧化軟體差距 |\n\n## 策略邏輯\n- 不同於 BYD（捨棄燃油）或 Tesla（純電），吉利各動力路線均不放棄\n- 精準捕捉「不想全電，但要省油」的主流消費者\n\n## 極氪（Zeekr）X 2026 款：400V 平台 230kW 快充（2026-05）\n\n- 搭載自研 **Golden Battery LFP（61kWh）**，400V 架構實現 **230kW DC 快充**（18 分鐘 10→80%）\n- 全車型功率提升 +50kW；Privilege AWD 達 365kW，0-100km/h 3.7 秒\n- 2025 年底德國上市，上市後數月即推出改款，展現快速迭代節奏\n- 參見：[[sources/zeekr-x-2026-europe]] | [[concepts/電池與技術/電池技術路線]] | [[concepts/地理市場/中國EV出海策略]]\n\n## Related\n- [[entities/豐田]]\n- [[entities/比亞迪]]\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[concepts/車輛類型/平價電動車市場]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[sources/geely-ihev-toyota-rivalry]]\n- [[sources/zeekr-x-2026-europe]]"

      "updated": "2026-05-11",

      "body": "# 零跑汽車（Leapmotor）\n\n中國電動車新創，Stellantis 持有 20% 股權，透過合資企業嘗試進入北美市場，但加拿大計畫遭拒。\n\n## 與 Stellantis 的合作\n- 2023 年：Stellantis 取得零跑 20% 股權\n- 2024 年：成立合資企業，聚焦 EV 全球生產與銷售\n- 2026 年：Stellantis 擬在加拿大 Brampton 廠組裝零跑零組件 → 遭拒\n\n## 市場策略\n借助 Stellantis 的通路與製造網絡進入歐美市場，但面臨本地化壓力。\n\n## 德國 T03：€49/月方案爆量，前 4 月銷量 +358%（2026-05）\n\n| 指標 | 數值 |\n|------|------|\n| 德國月租起價 | **€49**（包含 EV 補貼，Fiat 500 同款 €99）|\n| 2026 前 4 月德國交付 | **4,523 輛（+358% YoY）** |\n| 4 月單月成長 | **+4 倍** |\n\n- 借助 **Stellantis 德國完整銷售 + 經銷網路**迅速放量\n- 已超越 Smart 和 Honda 的德國銷量規模\n- 中國品牌 2026 年在德國預期獲補貼 **€30 億**\n- 主要競品：Fiat 500（€99）、Renault 5、VW ID.Polo\n- 參見：[[sources/leapmotor-t03-germany-2026]] | [[concepts/地理市場/歐洲EV市場]]\n\n## Related\n- [[entities/Stellantis]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/北美EV關稅與政策]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/stellantis-leapmotor-canada-rejected]]\n- [[sources/leapmotor-t03-germany-2026]]"

      "updated": "2026-04-08",

      "body": "# NHTSA（美國國家公路交通安全管理局）\n\nNational Highway Traffic Safety Administration，美國聯邦交通部下轄機構，負責制定與執行機動車安全標準，並調查車輛安全缺陷。\n\n## 職能\n\n- 車輛安全標準制定\n- 缺陷調查與召回命令\n- 自動駕駛功能監管\n\n## 與電動車產業的關係\n\nNHTSA 是電動車自動駕駛功能在美國市場上市的關鍵監管關卡。其調查結果直接影響車廠功能部署策略。\n\n## 相關調查紀錄\n\n| 時間 | 對象 | 功能 | 結果 |\n|------|------|------|------|\n| 2025 初 | Tesla | Actual Smart Summon（ASS） | 2026-04 結案，不採取行動 |\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/電池與技術/自動駕駛安全監管]]\n- [[sources/tesla-ass-nhtsa-probe-closed]]"

      "updated": "2026-04-17",

      "body": "# VinFast\n\nVinFast 是越南最大企業集團 Vingroup 旗下的電動車品牌，被稱為「越南 Tesla」，已是越南市場最受歡迎的 EV 品牌，現積極向印度、東南亞市場擴張。\n\n## 基本資訊\n\n| 項目 | 細節 |\n|------|------|\n| 母集團 | Vingroup（越南最大企業集團）|\n| 定位 | 「越南 Tesla」，多品類 EV 製造商 |\n| 產品線 | 乘用 EV（VF6/VF7/VF9 等）+ 電動機車 + 電動巴士 |\n\n## 印度市場佈局（2026）\n\n### 馬哈拉施特拉邦 MOU（2026-04）\n- 總投資計畫：$65 億美元（含能源、城市、基礎建設）\n- **電動車相關：$15 億美元**\n- 合作：與 GSM India 共建 **6 萬輛電動車隊** + 充電設施\n\n### 既有印度據點\n- 泰米爾納德邦（Tamil Nadu）設有工廠\n- 2025 年底：VF6、VF7 進入印度市場\n\n## 東南亞擴張脈絡\n- 印度、東南亞是 VinFast 主要海外目標市場（規避歐美關稅）\n- Vingroup 旗下 VinEnergo 亦在印度布局再生能源\n\n## Related\n- [[concepts/地理市場/印度EV市場]]\n- [[concepts/地理市場/東南亞EV市場]]\n- [[sources/vinfast-india-investment]]"

      "updated": "2026-04-21",
      "source_count": 1,
      "body": "# 台灣智駕\n\n台灣自動駕駛技術新創，CEO 沈大維。策略差異化於主流 Robotaxi 路線，聚焦工廠、港口、偏鄉等**特殊封閉/半封閉場景**，以模組化系統覆蓋 4 人座小巴至 180 噸重型搬運車，已在日本、沖繩、高雄落地。\n\n## 核心策略\n\n- **特殊場景優先**：不與 Waymo / Tesla 在開放道路 Robotaxi 正面競爭\n- **模組化系統**：同一套演算法適用 4 噸～180 噸各類車型\n- **B2B 商業模式**：對特殊車輛製造商提供一站式服務；日本鋼鐵廠採**分潤模式**\n\n## 技術特點\n\n- 感知 + 定位 + 控制演算法統一架構\n- **AI 訓練 AI**：生成式 AI 合成惡劣天候數據（大雨、大霧、低光），解決長尾效應\n- 即時車隊管理系統（位置 + 電量 + 事後回溯）\n\n## 落地案例\n\n| 地點 | 場景 | 特點 |\n|------|------|------|\n| 日本鋼鐵廠 | 18 小時重複搬運 | 高薪司機替換，分潤商業模式 |\n| 沖繩郵輪港口 | 2km 接駁 | 整合計程車派遣系統 |\n| 高雄亞灣區 | 人車共道 | 展示 L4 互動能力 |\n\n## Related\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/車輛類型/電動商用車]]\n- [[sources/taiwan-av-special-scenes]]"

      "body": "# 小米汽車（Xiaomi EV）\n\n中國科技巨頭小米旗下電動車業務，2024 年推出首款車型 SU7，2026 年轉虧為盈，目標 2027 年進軍歐洲。\n\n## 發展歷程\n- 2024 年：推出 SU7，迅速獲得市場反響\n- 2025 年：在慕尼黑設立研發中心，延攬 BMW 主管\n- 2026 年：業務轉虧為盈；從 Tesla 挖角多名主管\n- 2027 年：目標進軍歐洲市場\n\n## 歐洲布局（2026 進行中）\n- 挖角 Tesla 德國交車、物流、零售主管\n- 招募重心從研發轉向營運與交付\n- 德國慕尼黑研發中心已建立「精英團隊」\n\n## Tesla 人才吸引力\n小米大量從 Tesla 挖角，顯示 Tesla 歐洲市場困境（2025 年歐洲銷量年減近 30%）。\n\n## Related\n- [[entities/Tesla]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/xiaomi-ev-europe-2027]]"

      "updated": "2026-04-13",
      "source_count": 1,
      "body": "# 小馬智行（Pony.ai）\n\n中國 L4 自動駕駛技術公司，已在美國上市（Nasdaq），以 Robotaxi 商業化為核心業務，透過歐洲合作夥伴 Verne 進入歐洲市場，並在中東（杜拜）推進無人計程車計畫。\n\n## 基本資訊\n- **類型**：中國 L4 自動駕駛技術公司\n- **上市**：Nasdaq（美股）\n- **核心業務**：L4 Robotaxi 自動駕駛系統研發與商業化\n\n## 歐洲布局（透過 Verne）\n- **合作模式**：Verne（歐洲新創）+ Uber 共同組成服務平台，採用小馬智行第 7 代 AV 系統 + 北汽極狐 Alpha T5 車體\n- **定位**：小馬智行扮演核心技術供應商，Verne 扮演歐洲在地營運商\n- **優勢**：中國已有大規模實際運行數據與場域經驗，在歐洲合規市場降低技術風險\n\n## 中東布局\n- **杜拜**：計劃推進無人計程車業務（因地緣衝突暫停，待最終批准）\n\n## 競爭格局\n- 競爭對手：Waymo（美，2026 年 9 月預計進入倫敦）、VW/賓士（歐洲自主技術車廠）\n- 差異：小馬智行走「技術授權給在地合作夥伴」路線，而非直接自主運營\n\n## Related\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[sources/europe-robotaxi-verne-ponyai]]\n- [[sources/china-autonomous-driving-overseas]]"

      "title": "小鵬汽車（Xpeng / XPEV）",
      "summary": "中國電動車廠，以 800V 高壓快充平台、ADAS 智駕技術為核心競爭力，2026 年已進入全球 60 個國家/地區，積極推進海外市場布局。",
      "updated": "2026-04-10",
      "source_count": 1,
      "body": "# 小鵬汽車（Xpeng / XPEV）\n\n中國電動車廠，以 800V 高壓快充平台、ADAS 智駕技術為核心競爭力，2026 年已進入全球 60 個國家/地區，積極推進海外市場布局。\n\n## 基本資訊\n- **類型**：中國電動乘用車新創\n- **股票代碼**：NYSE: XPEV\n- **核心技術**：800V/5C 超快充平台、自研 ADAS（XNGP）\n\n## 主要車型\n- **G6**：緊湊型電動 SUV，800V 平台，墨西哥售價約 €40,327\n- **G9**：中大型電動 SUV，800V 平台，墨西哥售價約 €54,106\n\n## 技術特色\n| 項目 | 規格 |\n|------|------|\n| 充電平台 | 800V 高壓架構 |\n| 充電速率 | 最高 5C |\n| ADAS | XNGP 自研智駕系統 |\n\n## 海外市場布局（2026）\n- **全球版圖**：已進入 60 個國家/地區\n- **墨西哥**（2026-04）：G6、G9 正式上市，合作 3 個經銷商集團（墨西哥城、瓜達拉哈拉、蒙特雷），備件中心 1~5 天交付\n- **戰略意義**：墨西哥為繞開美國高關稅、進入北美周邊市場的橋頭堡\n\n## Related\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[sources/xpeng-mexico-launch]]"

      "file": "文遠知行",
      "title": "文遠知行（WeRide）",
      "summary": "中國領先自動駕駛技術公司，以 L4 無人駕駛商業化為核心業務，因國內法規限制加速向東南亞（新加坡）與中東擴展商轉版圖。",
      "updated": "2026-04-10",
      "source_count": 1,
      "body": "# 文遠知行（WeRide）\n\n中國領先自動駕駛技術公司，以 L4 無人駕駛商業化為核心業務，因國內法規限制加速向東南亞（新加坡）與中東擴展商轉版圖。\n\n## 基本資訊\n- **類型**：中國自動駕駛技術公司（L4 AV）\n- **上市**：Nasdaq（美股）\n- **創辦人/CEO**：韓旭\n\n## 在新加坡的商業化進展\n| 時間 | 事件 |\n|------|------|\n| 2025-08 | 獲得 Grab 戰略投資，確立東南亞擴展方向 |\n| 2026-04-01 | 與 Grab 聯盟啟動自駕接駁車實驗（往返車站↔住宅區，配備隨車安全員）|\n\n## 選擇新加坡的理由\nCEO 韓旭：「新加坡已成為全球自動駕駛商業化最理想的環境」\n- 法律制度完善，事故責任認定清晰\n- 城市規模適中，基礎建設齊全\n- 政府開放自動駕駛試驗的監管氛圍\n\n## 中國業務現況\n- 僅北京、廣州等少數城市特定區域獲 L4 實驗性商轉許可\n- 現行法律無法明確界定自動駕駛事故責任歸屬\n- 2026 年推動修法（全國人大）\n\n## Related\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[sources/china-autonomous-driving-overseas]]"

      "file": "蔚來",
      "title": "蔚來（NIO）",
      "summary": "蔚來是中國高端電動車新創，以換電服務和豪華體驗定位，近年積極推動晶片自研與垂直整合，目標降低對 NVIDIA 的依賴。",
      "updated": "2026-04-17",
      "source_count": 1,
      "body": "# 蔚來（NIO）\n\n蔚來是中國高端電動車新創，以換電服務和豪華體驗定位，近年積極推動晶片自研與垂直整合，目標降低對 NVIDIA 的依賴。\n\n## 基本資訊\n\n| 項目 | 細節 |\n|------|------|\n| 創辦人 | 李斌 |\n| 定位 | 中國高端 EV 品牌（競爭 BMW、Mercedes）|\n| 差異化 | 換電服務（Battery as a Service）|\n| 換電記錄 | 超過 100 萬顆電池包，累計換電 >1 億次 |\n\n## 技術垂直整合（2026 年現況）\n\n### 晶片自研（去 NVIDIA 化）\n- 自研晶片累計出貨：**55 萬顆**（含雷達主控 + 智駕 SoC）\n- 代表產品：**神璣 NX9031**（5nm 製程）\n- 目標：料號從 4,000+ 種縮減至約 400 種\n- 已對外銷售自研晶片\n\n### 過去 NVIDIA 依賴\n- NT 2.0 平台：每車 4 顆 DRIVE Orin，算力 1,016 TOPS\n- 採購高峰：年度 NVIDIA 晶片費 ~$3 億美元\n\n### 換電電池標準化\n- 正推動電芯規格收斂至 4~5 種，規模效益放大\n- 管理超過 100 萬顆電池包\n\n## 經營壓力\n- 整車成本：電池 + 半導體合佔 **>50%**\n- 「新車死亡效應」：技術迭代速度 > 產能爬坡速度，形成成本錯配\n- 一款車型可能浪費「數億元」（李斌語）\n\n## Related\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/基礎設施與供應鏈/車用半導體供應鏈]]\n- [[concepts/車輛類型/平價電動車市場]]\n- [[sources/nio-self-chip-denvidia]]"
    }

    "abb-m-series-charging": {
      "title": "ABB M-Series：200kW~1.2MW 分散式充電系統（2026-04）",
      "url": "https://www.electrive.com/2026/04/24/abb-introduces-decentralised-charging-system-m-series",
      "updated": "2026-04-24",
      "body": "**來源**：[https://www.electrive.com/2026/04/24/abb-introduces-decentralised-charging-system-m-series](https://www.electrive.com/2026/04/24/abb-introduces-decentralised-charging-system-m-series)\n\n# ABB M-Series：200kW~1.2MW 分散式充電系統（2026-04）\n\n**原文**：electrive.com／Cora Werwitzke｜**發布**：2026-04-24\n\n## 摘要\nABB E-mobility 推出 M-Series 分散式充電系統，以中央電源機箱搭配衛星充電器（Solo/Duo/Dock/Ultra）的模組架構，提供 200kW 至 1.2MW 的可擴展容量，支援 CCS1/CCS2/NACS/MCS 四種規格。\n\n## 產品架構\n\n```\nPower Cabinet（中央機箱）\n    ├── Solo Dispenser（單槍）\n    ├── Duo Dispenser（雙槍）\n    ├── Dock Dispenser（停車型）\n    └── Ultra Dispenser（重卡 MCS）\n```\n\n## 關鍵規格\n\n| 項目 | 數值 |\n|------|------|\n| 容量範圍 | **200kW ~ 1.2MW** |\n| 支援充電規格 | CCS1 / CCS2 / NACS / **MCS**（兆瓦充電，重卡）|\n| 場地配置種類 | **36 種** |\n| 電力電子技術 | SiC（碳化矽）半導體，IP54，氣冷 |\n| 效率 | ~97%（SiC 優勢）|\n| 商業部署時間 | 2024 年起 |\n\n## 設計理念\n\n- **分散式架構**：動態分配電力至充電點，依實際需求即時調整\n- **可彈性擴充**：從小型生態系起步，按需追加分配器和電源單元\n- **「交付能量經濟學」**：ABB 強調業者轉向以「全生命週期交付能量成本」為考量，而非峰值功率\n\n## 應用場景\n\n- 公共快充站\n- 車隊停車場\n- 零售場所（參見：Walmart 部署）\n- 目的地充電\n\n## Related\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/walmart-abb-charging-rollout]]\n- [[sources/ionity-chargepoint-charging-apr2026]]"
    },
    "acea-eu-ev-q1-2026": {
      "title": "ACEA：EU Q1 2026 BEV 登記 +32.5%，3 月暴增 +48.9%",
      "url": "https://www.electrive.com/2026/04/23/acea-bev-registrations-surge-by-49",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.electrive.com/2026/04/23/acea-bev-registrations-surge-by-49](https://www.electrive.com/2026/04/23/acea-bev-registrations-surge-by-49)\n\n# ACEA：EU Q1 2026 BEV 登記 +32.5%，3 月暴增 +48.9%\n\n**原文**：electrive.com / ACEA｜**發布**：2026-04-23\n\n## 摘要\n歐盟汽車製造商協會（ACEA）公布 Q1 2026 BEV 數據，EU 市場 BEV 市占率達 19.4%，幾乎每 5 輛新車就有 1 輛是純電。3 月單月爆發 +48.9% 增幅是主要動力。\n\n## 關鍵數據\n\n| 時期 | BEV 登記量 | YoY 成長 | 市占率 |\n|------|-----------|---------|--------|\n| 2026 年 3 月 | **234,532 輛** | **+48.9%** | — |\n| 2026 Q1（Jan-Mar）| **546,937 輛** | **+32.5%** | **19.4%** |\n\n- 1 月 / 2 月增幅相對溫和；3 月爆發帶動 Q1 整體大幅成長\n\n## 意義\n\n- 德國 EV 新補貼（2026 年 BEV 最高 €6,000，溯及 2026-01-01）影響下，買家延後購車等待補貼，推動 Q1 後段需求集中爆發\n- 19.4% 的市占率接近 20% 心理關卡，是 EU 2035 年 100% 零排放目標的里程碑前哨\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/germany-ev-incentive-2026]]\n- [[sources/uk-germany-ev-market-dynamics-2026]]"
    },
    "archion-hino-fuso-foxconn-ebus-2026": {
      "title": "Archion 成軍：日野 + 三菱 Fuso 整併，攜手鴻海（Foxconn）電動巴士（2026-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755688",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755688](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755688)\n\n# Archion 成軍：日野 + 三菱 Fuso 整併，攜手鴻海（Foxconn）電動巴士（2026-05）\n\n**原文**：Digitimes | 江仁傑｜**發布**：2026-05-19\n\n## 核心事件\n\n日野汽車（Hino）與三菱 Fuso 卡客車（Mitsubishi Fuso）整併後的新公司 **Archion** 正式成軍，公布 2032 年度為終年的中期經營計畫。日本商用車市場自此實質集約為 **Archion 與五十鈴（Isuzu）兩大集團**。\n\n## 財務目標\n\n| 指標 | 2026 年度（預估）| 2032 年度（目標）|\n|------|-----------------|-----------------|\n| 全球銷量 | **23 萬輛**（+6% YoY）| **28 萬輛**（+3 成）|\n| 全球營收 | **¥2.425 兆**（+8% vs 整併前合計）| — |\n| 營業利益 | **¥1,100 億**（+52% YoY）| — |\n| 營益率 | ~3%（現狀）| **>10%**（目標）|\n\n## 品牌與生產策略\n\n- **繼續保留日野 + 三菱 Fuso 雙品牌**\n- 全球總產量 **85%** 以上在共通平台生產\n- 東南亞為海外核心市場：6.4 萬 → **8.5 萬輛**（目標）\n- 提供柴油 → EV → FCV 完整產品線\n\n## Foxconn 電動巴士合資\n\n| 項目 | 細節 |\n|------|------|\n| 合資宣布時間 | **2026 年 1 月** |\n| 預計成立時間 | **2026 年下半** |\n| 生產地點 | 日本富山市（三菱 Fuso 巴士製造工廠）|\n| 市場 | 日本研發製造，主要銷往**海外** |\n| 現況 | 準備工作按計畫進行（CEO Karl Deppen 確認）|\n\n## 意義\n\nArchion 是 Hino（豐田旗下）+ Daimler Truck 旗下 Mitsubishi Fuso 的歷史性整合。與鴻海（Foxconn）合作電動巴士，代表日本傳統商用車廠透過台灣科技製造商加速電動化布局。\n\n## Related\n- [[concepts/電動巴士市場]]\n- [[entities/鴻海]]\n- [[concepts/東南亞EV市場]]"
    },
    "ather-energy-el-platform-2026": {
      "title": "Ather Energy EL 平台：打入印度 ₹1 萬大眾 E2W 市場（2026-05）",
      "url": "https://tradebrains.in/ather-energy-can-its-%E2%82%B91-lakh-two-wheeler-el-platform-unlock-50-of-indias-ev-market",
      "updated": "2026-05-08",
      "body": "**來源**：[https://tradebrains.in/ather-energy-can-its-%E2%82%B91-lakh-two-wheeler-el-platform-unlock-50-of-indias-ev-market](https://tradebrains.in/ather-energy-can-its-%E2%82%B91-lakh-two-wheeler-el-platform-unlock-50-of-indias-ev-market)\n\n# Ather Energy EL 平台：打入印度 ₹1 萬大眾 E2W 市場（2026-05）\n\n**原文**：Trade Brains | Leon Mendonca｜**發布**：2026-05-08\n\n## 核心策略\n\nAther Energy 推出 **EL 新平台**，目標切入 **₹1 萬–₹1.25 萬**（~USD 1,200–1,500）大眾級電動兩輪車市場。這個細分市場佔印度 E2W 總量的 **45–50%**，是 Ather 目前完全缺席的區間。\n\n## FY26 業績突破\n\n| 指標 | 數值 |\n|------|------|\n| 年銷量成長 | **+66% YoY** |\n| Q4 FY26 單季銷量 | **83,000 輛** |\n| 市占率 | **8% → 18.6%**（Q4 YoY +1,100 bps）|\n| Q4 FY26 營收 | ₹1,175 億 crore（+74% YoY）|\n| 調整後毛利率（含補貼）| **19% → 24%** |\n| EBITDA 損失率改善（Q4）| **-2%**（前一年 -23%）|\n| Pro Pack 軟體附購率 | **93%**（史上最高）|\n\nRizta 家庭型踏板車佔全年銷量 **75%**，推動 Ather 從城市科技品牌跨入大眾市場。\n\n## EL 平台特點\n\nEL 是**平台**（非單一車型），可衍生多個價格點的產品：\n\n| 設計決策 | 成本優化目標 |\n|---------|-----------|\n| 捨棄鋁合金車架 | 降低材料成本 |\n| 減少銅用量 | 降低銅材成本 |\n| 簡化傳動系統 | 降低機械複雜度 |\n| Ather Charge Drive Controller（內建充電）| 簡化充電器 |\n| AEBS 技術（仿 ABS 制動）| ABS 效果，較低成本 |\n\n- 設計背景：碳酸鋰等原料已較前一年上漲 **2–2.5 倍**，整體商品通膨 **40–50%**，成本控制更為關鍵\n\n## 產能擴張（Factory 3.0）\n\n| 工廠 | 地點 | 規劃產能 |\n|------|------|---------|\n| 第三廠（Factory 3.0）| 馬哈拉施特拉邦 Chhatrapati Sambhaji Nagar | **10 萬輛/年** |\n| Phase 1 | — | **5 萬輛/年**（+42,000 輛/月）|\n| 當前產能 | — | 35,000 輛/月（已達 90–95% 使用率）|\n| Phase 1 目標時間 | 2026 節慶季試產，FY27 底完全達產 |\n\n## 配銷網絡\n\n- FY26 零售店：**351 → 700 家**（翻倍）\n- 快速充電站：**6,000+ 個**\n- 地理突破：中部印度（馬哈邦、古吉拉特等）市占大幅提升\n\n## 意義\n\nAther 是印度 E2W 市場少數走「自製技術 + 軟體訂閱 + 高端路線」的本土品牌。EL 平台代表其首次嘗試大規模複製 Ola 等競爭對手的大眾市場策略，同時維持毛利率改善趨勢。\n\n## Related\n- [[concepts/印度EV市場]]\n- [[sources/india-ev-april-2026]]\n- [[sources/india-tata-jsw-battery-rd-2026]]"
    },
    "audi-a2-etron-testing-2026": {
      "title": "Audi A2 e-tron 測試進行中，秋季正式亮相",
      "url": "https://www.electrive.com/2026/05/20/audi-tests-a2-e-tron-ahead-of-autumn-premiere",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.electrive.com/2026/05/20/audi-tests-a2-e-tron-ahead-of-autumn-premiere](https://www.electrive.com/2026/05/20/audi-tests-a2-e-tron-ahead-of-autumn-premiere)\n\n# Audi A2 e-tron 測試進行中，秋季正式亮相\n\n**原文**：electrive.com，2026-05-20\n**作者**：Daniel Bönnighausen\n\n## 摘要\n\n奧迪確認 A2 e-tron 為品牌全新入門級純電車型，偽裝測試車已公開亮相。正式世界首演預計於 **2026 年秋季**，量產地點為奧迪因戈爾施塔特（Ingolstadt）本廠。\n\n## 關鍵資訊\n\n| 項目 | 內容 |\n|------|------|\n| 定位 | 豪華緊湊型純電入門車 |\n| 世界首演 | **2026 年秋季** |\n| 生產廠 | **因戈爾施塔特**（奧迪本廠）|\n| 平台 | **MEB**（最可能，未官方確認）|\n\n## 測試階段\n\n1. **冬季測試（拉普蘭，芬蘭）**：雪地、冰面、冰凍湖面\n   - 評估：駕駛動態、熱管理、低溫電池性能、制動系統整合\n2. **風洞測試（奧迪技術開發中心）**：\n   - 最高 300 km/h 風速；235 km/h 輥道測試\n   - 精密氣動聲學測量；車頂線形為重點\n3. **公路測試（阿爾特米爾地區）**：\n   - 坡道、多種路面、急彎\n   - 評估底盤與駕駛輔助系統\n\n## 平台推測\n\n- **SSP 平台**：尚未就緒，排除\n- **PPE 平台**（Q6 e-tron 用）：為大型車型設計，不適用\n- **MEB**：最可能，Cupra Born 改款 / VW ID.3 Neo 為參考基準\n\n## 市場意義\n\nA2 e-tron 填補奧迪純電入門空缺，讓豪華電動移動更親民。隨 VW 集團 MEB 平台攤提成本，是 VW 集團電動轉型平民化的重要一步。\n\n## Related\n- [[concepts/歐洲EV市場]]\n- [[entities/VW集團]]"
    },

      "url": "https://insideevs.com/news/794164/audi-q4-e-tron-facelift",
      "updated": "2026-04-27",
      "body": "**來源**：[https://insideevs.com/news/794164/audi-q4-e-tron-facelift](https://insideevs.com/news/794164/audi-q4-e-tron-facelift)\n\n# Audi Q4 e-tron 小改款（2026）：368 英里、185kW、首次 V2L\n\n**原文**：InsideEVs｜**發布**：2026-04-27\n\n## 摘要\nAudi Q4 e-tron 小改款帶來更高效馬達（+10% 效率）、更快充電（185kW，提升 5.7%）、首次導入 V2L，以及三螢幕佈局與 ChatGPT 整合。Sportback 版最長可達 368 英里 WLTP。\n\n## 規格改進\n\n| 項目 | 舊款 | 新款 |\n|------|------|------|\n| 最大 WLTP 續航（Sportback）| ~349 英里 | **368 英里**（+19 英里）|\n| DC 快充峰值（82kWh 版）| 175kW | **185kW** |\n| 10-80% 充電時間 | ~30 分鐘 | **~27 分鐘** |\n| 10 分鐘可補充 | — | **~115 英里** |\n| V2L 雙向充電 | ❌ | **✅（Audi 首款 EV）**|\n\n## 科技升級\n\n- **三螢幕**：11.9 吋主機 + 12.8 吋中控 + 選配 12 吋副駕螢幕\n- **ChatGPT** 整合（語音助理）\n- 新設計 OLED 後燈\n- 標配追加多項主動安全配備\n- 後馬達效率提升 10%（是續航增加的主要原因）\n\n## 市場地位\n\n- 仍為 Audi **最低價 EV 進入點**\n- 仍為 Audi **最暢銷電動車款**\n- 小改款大幅縮小與 Tesla Model Y 的科技差距\n\n## Related\n- [[entities/Volkswagen]]（VW 集團）\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]"

    "aurora-stagecoach-uk-buses": {
      "title": "英國 Aurora × Stagecoach：1,330 輛電動巴士部署，覆蓋全英 17 個停車場",
      "url": "https://www.sustainable-bus.com/infrastructure/aurora-stagecoach-electrification-depots",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.sustainable-bus.com/infrastructure/aurora-stagecoach-electrification-depots](https://www.sustainable-bus.com/infrastructure/aurora-stagecoach-electrification-depots)\n\n# 英國 Aurora × Stagecoach：1,330 輛電動巴士部署，覆蓋全英 17 個停車場\n\n**原文**：Sustainable Bus ｜ **發布**：2026-04-15\n\n## 摘要\nAurora Utilities 完成最新一批 Stagecoach 停車場電力接入，整體合作已支援 **1,330 輛電動巴士**（佔 Stagecoach 英國總車隊 16%）。涵蓋英格蘭和蘇格蘭 17 個停車場，其中 5 個倫敦停車場對齊 TfL 2030 年再生能源目標。\n\n## 規模與覆蓋\n\n| 指標 | 數值 |\n|------|------|\n| 電動巴士支援量 | **1,330 輛** |\n| 佔 Stagecoach 英國車隊 | **~16%** |\n| 新增停車場（最新批次）| 17 個（英格蘭 + 蘇格蘭）|\n| 年度碳減排 | **數萬噸** |\n\n**新啟用停車場**：Aldershot、Arbroath、Ardrossan、Ash Grove（倫敦）、Barking（倫敦）、Barnstaple、Bow（倫敦）、Bromley（倫敦）、Cheltenham、Dover、Dundee、Exeter、Gloucester、Kilmarnock、Leyton（倫敦）、St Andrews、Torquay\n\n## Aurora Utilities 背景\n- 角色：獨立配電網路運營商（IDNO），取得電力接入許可後負責建設和運營\n- Ofgem 牌照：2024 年取得\n- 投資方：**I Squared（$2 億美元）**（同一投資方也在 2024 年收購 Arriva Group）\n- 合作模式：Stagecoach 負責電動巴士採購，Aurora 負責電力基礎設施\n\n## Stagecoach 配套措施\n- 選定站點部署**電池儲能 + 現場太陽能**，提升能源韌性\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/地理市場/歐洲EV市場]]"
