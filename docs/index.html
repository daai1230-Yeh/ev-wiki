    "ebusco-sale-2026": {
      "title": "Ebusco 探索出售電動巴士業務：持續經營疑慮（2026-05-05）",
      "url": "https://www.electrive.com/2026/05/05/ebusco-explores-partial-sale-of-electric-bus-division",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.electrive.com/2026/05/05/ebusco-explores-partial-sale-of-electric-bus-division](https://www.electrive.com/2026/05/05/ebusco-explores-partial-sale-of-electric-bus-division)\n\n# Ebusco 探索出售電動巴士業務：持續經營疑慮（2026-05-05）\n\n**原文**：Electrive（Cora Werwitzke）｜**發布**：2026-05-05\n\n## 摘要\n荷蘭電動巴士製造商 Ebusco 財務持續惡化，正探索出售核心電動巴士業務的多數股份，同時完成從 OEM→OED（開發商）的戰略轉型。年報明確警告「持續經營能力」存在重大不確定性。\n\n## 2025 年財務數據\n\n| 指標 | 2025 | 2024 | 變化 |\n|------|------|------|------|\n| 營收 | **€76.6M** | ~€11M | 大幅提升 |\n| EBITDA 虧損 | **€56.4M** | €132.6M | 縮小 |\n| 巴士交付量 | **123 輛** | 157 輛 | 下降 |\n| 訂單積壓 | **245 輛** | 581 輛 | 大幅縮減 |\n| 員工人數 | **282 人** | 522 人 | -46% |\n\n## 戰略轉型：OEM → OED\n\n- **製造外包**：亞洲合約製造商負責整車組裝，Deurne（荷蘭）+ Cléon（法國）廠僅剩交車前檢測與支援\n- 重組 Deurne + Venray 兩廠為一，大幅降低固定成本\n- 儲能業務（Gotion High-Tech 合作）：ESS + 移動儲能容器（MEC）2025 年首獲合約\n\n## 財務危機\n\n- 2026 年 4 月：獲得股東 + 亞洲合作夥伴共 €2,740 萬橋接貸款\n- **關鍵未決**：某國際銀行額外貸款確認，預計 2026 年 6 月底前定案，**仍不確定**\n- 年報明示：「此情況顯示存在重大不確定性，可能令持續經營能力產生重大疑慮」\n\n## 意義\n\n- **新創電動巴士業者脆弱性的典型案例**（cf. VBSG 標案違約事件）\n- 財務困難疊加快速成長 → 現金流斷裂風險\n- 若出售成功，電動巴士業務將繼續；若失敗，可能解散\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[sources/daimler-buses-vbsg-switzerland]]"
    },
    "edf-electric-hgv-investment": {
      "title": "法國 EDF：2.4 億歐元投資電動重卡與充電基礎建設",
      "url": "https://www.electrive.com/2026/04/09/edf-allocates-e240m-for-electric-hgvs-and-charging",
      "updated": "2026-04-10",
      "body": "**來源**：[https://www.electrive.com/2026/04/09/edf-allocates-e240m-for-electric-hgvs-and-charging](https://www.electrive.com/2026/04/09/edf-allocates-e240m-for-electric-hgvs-and-charging)\n\n# 法國 EDF：2.4 億歐元投資電動重卡與充電基礎建設\n\n**原文**：electrive｜**發布**：2026-04-09\n\n## 摘要\n法國 EDF 宣布 2.4 億歐元計畫，含 3,000 萬歐元電動重卡購置補貼（2,000 輛）及 5,000 萬歐元重卡充電站建設（180 座）。\n\n## 電動重卡補貼方案\n- **總金額**：3,000 萬歐元\n- **每輛補貼**：平均 1.5 萬歐元\n- **目標數量**：2,000 輛電動重卡\n- **資格**：中小企業，每家最多 2 輛，需已有或承諾安裝充電設施\n- **限制**：不適用於 ICE 重卡改裝\n\n## 充電基礎建設方案\n- **總金額**：5,000 萬歐元\n- **規模**：3 年內在 73 個地點建設 **180 座**重卡充電站\n- **用途**：長途運輸中途充電，公開使用\n\n## 2.4 億歐元完整計畫\n| 用途 | 金額 |\n|------|------|\n| 電動重卡補貼 | €30M |\n| 重卡充電站 | €50M |\n| 低收入家庭熱泵補貼 | €80M（8 萬戶，每戶 €1,000）|\n| 其他 | €80M |\n\n## Related\n- [[concepts/車輛類型/電動卡車市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[concepts/歐洲EV政策]]"

    "eib-hamburg-ebus-grid-2026": {
      "title": "EIB 為漢堡電網與電動巴士提供逾 10 億歐元貸款",
      "url": "https://www.electrive.com/2026/05/20/eib-loans-billion-euro-sum-for-hamburgs-distribution-grid-and-e-buses",
      "updated": "2026-05-21",
      "body": "**來源**：[https://www.electrive.com/2026/05/20/eib-loans-billion-euro-sum-for-hamburgs-distribution-grid-and-e-buses](https://www.electrive.com/2026/05/20/eib-loans-billion-euro-sum-for-hamburgs-distribution-grid-and-e-buses)\n\n# EIB 為漢堡電網與電動巴士提供逾 10 億歐元貸款\n\n**原文**：electrive.com，2026-05-20\n**作者**：Cora Werwitzke\n\n## 摘要\n\n歐洲投資銀行（EIB）向漢堡兩家市政公司提供共逾 **€11.25 億**的貸款：Hamburger Energienetze（HNE）最高 **€10 億**用於電網現代化，Verkehrsbetriebe Hamburg-Holstein（VHH）約 **€1.25 億**用於電動巴士採購。協議於 2026-05-19 正式簽署。\n\n## 電動巴士採購（VHH）\n\n| 指標 | 數值 |\n|------|------|\n| 採購數量 | **188 輛**純電巴士 |\n| 車型拆分 | 標準巴士 120 輛 + 鉸接巴士 52 輛 + 小巴 16 輛 |\n| 目前電動佔比 | 約 1/3（總隊 ~800 輛）|\n| EIB 資助 | €1.25 億（佔總 €3.37 億的 ~37%）|\n| 採購政策 | 2020 年起**僅採購零排放車輛** |\n| 附加項目 | Schenefeld 車廠改擴建 |\n\n## 電網現代化（HNE）\n\n| 指標 | 數值 |\n|------|------|\n| EIB 貸款 | 最高 **€10 億** |\n| HNE 總投資 | ~**€29 億**（至 2029 年）|\n| 新增/更新電纜 | ~1,500 km（低壓/中壓/高壓）|\n| 新增開關間隔 | 120 個 |\n| 主要工作 | 新建/更新變電站、數位化控制、整合再生能源 |\n| 漢堡峰值用電預測 | 2040 年**至少翻倍** |\n\n## 戰略意義\n\n- HNE 與 VHH 同屬漢堡市政控股公司 HGV 旗下\n- 電網 + 交通「雙軌」同步電化，為歐洲城市轉型示範\n- EIB 副總裁 Nicola Beer：「漢堡示範了歐洲城市如何全面轉型基礎設施」\n- 第一批資金已於 2025 年 10 月撥付\n\n## Related\n- [[concepts/電動巴士市場]]\n- [[concepts/充電基礎建設]]\n- [[concepts/歐洲EV市場]]"
    },
    "electric-bus-europe-apr2026": {
      "title": "歐洲電動城際巴士：奧地利 Blaguss × 宇通 T12E + Bus2Bus 城際 ZE 論壇",
      "url": "https://www.sustainable-bus.com/news/blaguss-electric-coach-yutong-solar-panels",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.sustainable-bus.com/news/blaguss-electric-coach-yutong-solar-panels](https://www.sustainable-bus.com/news/blaguss-electric-coach-yutong-solar-panels)\n\n# 歐洲電動城際巴士：奧地利 Blaguss × 宇通 T12E + Bus2Bus 城際 ZE 論壇\n\n**原文**：Sustainable Bus ｜ **發布**：2026-04-20\n\n## 一、Blaguss × 宇通 T12E：奧地利電動長途巴士 + 全隊太陽能\n\n奧地利運輸業者 Blaguss 導入 **12 輛宇通 T12E 電動教練車**，並啟動全車隊太陽能板安裝計畫。\n\n### 宇通 T12E 規格\n| 項目 | 數值 |\n|------|------|\n| 電池容量 | **466 kWh** |\n| 續航 | **500 公里** |\n| 特點 | 車頂太陽能板（支援車內能源系統）|\n\n### Blaguss 電動化歷程\n| 時間 | 里程碑 |\n|------|------|\n| 2024 年底 | 地區公共交通（下奧地利 + 布根蘭）電動化 |\n| 2025 年春 | 維也納觀光 hop-on/hop-off 電動化 |\n| **2026 年** | **長途城際教練電動化**（最新）|\n\n### 太陽能節能成果\n- 6 個月試驗：每輛巴士年省柴油 **1,616~2,052 公升**\n- 現擴展至 50 輛（電動 + 柴油）全隊安裝\n\n---\n\n## 二、Bus2Bus 城際零排放論壇（柏林，2026-04-20）\n\n**「從城市到城際：零排放巴士轉型的下一步」** 論壇重點：\n\n### 歐洲城際電動巴士現況\n| 指標 | 數值 |\n|------|------|\n| 歐盟 2025 年零排放巴士 + 教練佔比 | **~25%**（城市巴士已超 50%，城際幾乎全是柴油 ~79%）|\n| 歐盟城市巴士目標 | 2035 年 **100% 零排放** |\n| 歐盟城際巴士目標 | 2040 年 **減排 90%** |\n| 2025~2030 城際電動巴士預計入市 | **~20,000 輛**（+ 48,000 城市巴士）|\n| 配套充電點需求 | 長途運營約需 **30,000 個** |\n\n### 城際市場挑戰\n- 業者多為中小型公司（高度分散）\n- 服務模式多元：長途 + 兩用車型（城際 + 城市）\n- 對車輛自主性、充電策略、車隊利用率要求更高\n- 參與廠商立場：Iveco Bus（技術中立）、BYD Europe（整合方案）、Otokar（運營限制）\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[entities/比亞迪]]\n- [[sources/electric-bus-market-2025-global]]\n- [[sources/blaguss-yutong-electric-coach]]"
    },
    "electric-bus-market-2025-global": {
      "title": "2025 全球電動巴士市場：按國家／地區分類（Sustainable Bus 彙整）",
      "url": "https://www.sustainable-bus.com",
      "updated": "2026-04-13",
      "body": "**來源**：[https://www.sustainable-bus.com](https://www.sustainable-bus.com)\n\n# 2025 全球電動巴士市場：按國家／地區分類（Sustainable Bus 彙整）\n\n**原文**：Sustainable Bus（整理自多篇報導）｜**整理日期**：2026-04-13\n\n## 歐洲整體（Europe）\n\n| 指標 | 數值 |\n|------|------|\n| 2025 年歐洲（含英、挪、瑞）電動巴士登記量 | **11,607 輛**（+48%，2024 年：7,855 輛）|\n| 成長最快製造商 | MAN（+224%，1,409 輛）、BYD（+206%，1,305 輛）、Mercedes-Benz（+52%，1,395 輛）|\n| EU 新城市巴士零排放占比 | ~50%（2025 年）|\n| 全球（城市巴士）電動佔比 | ~60%（EU），整體含客運 ~25% |\n\n## 主要國家數據（2025）\n\n### 德國\n- 零排放新增：**1,397 輛**\n- 累計電動車隊：**4,752 輛**（占 35,000 輛城市巴士的 14%）\n- 新登記城市巴士中零排放占比：**~50%**（來源：PwC E-Bus Radar 2026）\n\n### 義大利\n- 全年巴士市場：4,112 輛\n- 零排放：**1,230 輛**（占整體 **30%**，城市巴士中 **65%**）\n\n### 丹麥（哥本哈根）\n- 哥本哈根市營巴士達 **100% 電動化**（Movia 新增 62 輛）\n- Movia 整體車隊電動占比：**72%**（794 輛在線）\n\n### 印度\n- 2025 年上半年電動巴士：**2,100 輛（+33%）**\n- 市場集中：PMI Electro、Switch Mobility、Olectra 等五家占 **>90%**\n- KKR 投資 Allfleet + PMI Electro：最多 **$3.1 億美元**\n\n### 土耳其（Karsan）\n- 2025 年營收：€3.3 億（+11%），電動車占比 **67%**\n- 累計電動車隊：2,100 輛，27 國布局\n- 2026 目標：電動車銷售佔比 80%，計畫啟動無安全駕駛員服務\n\n### 哥倫比亞（波哥大）\n→ 已收錄於 [[sources/bogota-711-electric-buses]]\n\n## 趨勢：從城市到城際\n- 2025 年歐洲零排放城際電動巴士市場開始起步\n- 製造商商業模式轉型：從賣車走向全生命週期服務\n- 法國撥款 **€4.5 億**補助全國巴士電動化（2025 年）\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[entities/比亞迪]]\n- [[concepts/地理市場/東南亞EV市場]]"

    "enercity-hyundai-v2g-europe-2026": {
      "title": "歐洲 V2G 里程碑：Enercity 能源交易成功 + Hyundai × Vattenfall 試驗",
      "url": "https://www.electrive.com/2026/05/29/germany-enercity-successfully-sells-electricity-from-ev-batteries-on-the-power-market/)，2026-05-29",
      "updated": "2026-05-26",
      "body": "# 歐洲 V2G 里程碑：Enercity 能源交易成功 + Hyundai × Vattenfall 試驗\n\n**來源 A**：[electrive.com — Enercity](https://www.electrive.com/2026/05/29/germany-enercity-successfully-sells-electricity-from-ev-batteries-on-the-power-market/)，2026-05-29  \n**來源 B**：[electrive.com — Hyundai × Vattenfall](https://www.electrive.com/2026/05/29/v2g-project-hyundai-group-and-vattenfall-test-evs-as-mobile-energy-storage/)，2026-05-29\n\n---\n\n## A｜Enercity × VW：B2B 車隊 V2G 首次電力交易成功\n\n### 背景\nEnercity（漢諾威能源供應商）× Volkswagen Commercial Vehicles 聯合試驗：以 **12 輛 VW ID. Buzz**（公司自用車隊）接入電力市場。\n\n### 關鍵數據\n\n| 指標 | 數值 |\n|------|------|\n| 試驗期間 | 2026-05-08~10（53 小時）|\n| 聚合容量 | **0.132 MW**（12 輛 × 11 kW）|\n| 市場交易量 | **0.1 MW**（歐洲能源交易所最低門檻）|\n| 交易次數 | 145 次（持續日內市場）|\n| 收益 | **低三位數歐元**（首次獲利）|\n| 商業意義 | **B2B 車隊首次作為虛擬電廠在電力市場交易並獲利** |\n\n### 技術方式\n- 低電價時儲能 → 高電價時回饋電網（算法自動響應連續日內市場價格）\n- 邏輯等同靜置電池儲能系統，但使用車隊電池\n\n### 待解決監管問題\n- 移動儲能的電網費、附加費、稅賦雙重課稅問題**尚未釐清**\n- Enercity 預計 2028 年底前有臨時解決方案（AgNes 框架整合）\n- 正式商業服務待監管確定後推出\n\n---\n\n## B｜Hyundai × Vattenfall：荷蘭家用 V2G 試驗\n\n### 計畫概覽\n\n| 項目 | 內容 |\n|------|------|\n| 地點 | 荷蘭（Netherlands）|\n| 啟動時間 | 2026 年下半年 |\n| 規模 | 最多 **80 個家庭**，為期 6 個月 |\n| 車型 | **Kia EV9** 或 **Hyundai Ioniq 9** |\n| 誘因 | Vattenfall 補助雙向充電樁安裝費用 + 最高 **€500** 家用電費補貼 |\n\n### 運作機制\n- 下午 4–9 點（電力需求高峰）自動回饋電網\n- 用戶可設定出發時間 + 最低電量下限\n- Vattenfall 遠端控制充放電節奏\n\n### 背景\n- 荷蘭 V2G 生態最活躍（Utrecht Energized：50→500 輛計畫）\n- Vattenfall 同步在瑞典主持 VW + Ambibox 200 輛 V2G 試驗\n\n---\n\n## Related\n- [[concepts/充電基礎建設]]\n- [[sources/europe-v2g-bidirectional-2026]]\n- [[sources/v2g-commercial-expansion-2026]]"

    "eu-battery-booster-2026": {
      "title": "EU Battery Booster Facility 正式啟動",
      "url": "",
      "updated": "2026-06-12",
      "body": "**來源**：electrive / 歐盟執委會（2026-06-10）\n\n# EU Battery Booster Facility 正式啟動\n\n**事件日期**：2026-06-10｜**規模**：€15 億免息貸款\n\n## 核心內容\n\n歐盟執委會正式啟動 **Battery Booster Facility**，為歐洲電芯生產提供 **€15 億免息貸款**。資金來源：EU 排放交易系統（ETS）碳排放收入。\n\n## 計畫規格\n\n| 指標 | 內容 |\n|------|------|\n| 總規模 | **€15 億**（原宣布 €18 億，差額 €3 億用於原材料計畫）|\n| 貸款性質 | **免息貸款**（Interest-free loans）|\n| 資金來源 | EU ETS 碳排放收入（「碳排轉化為創新燃料」）|\n| 申請期 | **Q3 2026**（Call for Proposals）|\n| 最高單筆 | **€5 億**（即理論上最多 3 家受益）|\n\n## 資格條件（嚴格限制）\n\n| 條件 | 要求 |\n|------|------|\n| 生產階段 | 必須已在 **爬坡期（ramp-up phase）**，即建設完成後、穩定量產前 |\n| 最低年產能 | **≥ 10 GWh**（約 20 萬輛 EV 電池量）|\n| 對象 | **僅限第一座**工業規模電芯廠（已有廠的額外廠不適用）|\n\n## 潛在受益方\n\n符合條件的主要企業（來源：electrive 分析）：\n- **ACC**（Stellantis × Mercedes-Benz × TotalEnergies 合資）\n- **Verkor**（雷諾支持）\n- **PowerCo**（VW 集團電池子公司）\n\n> 刻意排除 Northvolt 場景重演——Northvolt 正是因爬坡期良率不佳無法獲利而破產，此計畫針對性支援這個最危險的商業化關卡。\n\n## 歐洲電池政策背景\n\n| 時間 | 政策進展 |\n|------|----------|\n| 2025-03 | Von der Leyen 提出 Battery Booster 概念（汽車業行動計劃）|\n| 2025-12 | EU Automotive Package 確認 €18 億計畫 |\n| **2026-06-10** | **Battery Booster Facility 正式啟動** |\n\n## 意義與挑戰\n\n**意義**：\n- EU 將碳稅收入直接投資本土電池工業化，形成「排放→補貼清潔產業」閉環\n- 針對最脆弱的爬坡期，比建廠補貼更精準\n- 為 PowerCo、ACC、Verkor 提供喘息空間（應對中國成本競爭）\n\n**挑戰**：\n- €5 億/企業上限 vs 歐洲電芯廠單廠投資動輒 €30~60 億：杯水車薪\n- 嚴苛資格條件使能受益廠商極少\n- 歐洲電池成本仍比中國高 30%（[[sources/eu-battery-tariff-2027-delay-2026]]）\n\n## Related\n- [[concepts/電池技術路線]]\n- [[concepts/歐洲EV市場]]\n- [[concepts/歐洲EV政策]]\n- [[sources/eu-battery-tariff-2027-delay-2026]]\n- [[sources/vw-samsung-sdi-europe-battery-2026]]"

    "eu-battery-tariff-2027-delay-2026": {
      "title": "EU 電動車關稅延期請求 + 電池成本差距 30%（2026-06-09）",
      "url": "https://www.electrive.com/2026/06/09/acea-smmt-seek-delay-to-uk-eu-ev-tariffs/",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.electrive.com/2026/06/09/acea-smmt-seek-delay-to-uk-eu-ev-tariffs/](https://www.electrive.com/2026/06/09/acea-smmt-seek-delay-to-uk-eu-ev-tariffs/)\n\n# EU 電動車關稅延期請求 + 電池成本差距 30%（2026-06-09）\n\n**原文**：electrive.com + Google Alerts｜**發布**：2026-06-09\n\n## 摘要\n歐洲汽車工業協會（ACEA）和英國汽車製造商協會（SMMT）聯合呼籲推遲英-歐 EV 關稅規定的實施。同期研究顯示歐洲電池生產成本比中國**高出約 30%**；同時 7 個歐盟成員國反對弱化 CO₂ 法規。\n\n## 多線事件匯總\n\n### 1. ACEA + SMMT 請求延遲英-歐關稅\n- 背景：脫歐過渡協議下，若 EV 電池含歐盟/英國原產地零件比例未達標，英-歐貿易將徵收關稅\n- 2026 年起原產地規則（Rules of Origin）收緊：電池需 45% 歐/英本地化\n- ACEA+SMMT 認為當前供應鏈尚未準備好，請求延至 2028 年\n- **影響**：Jaguar、BMW Mini、Stellantis 英國廠 EV 成本直接受影響\n\n### 2. 歐洲電池成本比中國高 30%\n- T&E（交通與環境）或類似機構研究數據\n- 歐洲電池 MWh 成本：~€100-110/kWh（估算）vs 中國 ~€70-80/kWh\n- 差距成因：能源成本高、規模不足、原材料採購效率差\n- 諾斯沃特（Northvolt）破產後，歐洲電池產業鏈競爭力疑慮加深\n\n### 3. 七個歐盟成員國反對弱化 CO₂ 規則\n- 法國、西班牙等 7 國聯合聲明：支持維持 2035 年燃油車禁售時間表\n- 反對汽車工業遊說的「緊急豁免」或「e-fuel 出口」等規避條款\n- 背景：部分東歐和南歐國家此前表態可能接受放寬\n\n## 政策圖譜\n\n```\n支持強力 CO₂ 規則：法、西班牙 + 5 國 ←→ 反對：匈牙利、波蘭、部分東歐\n電池關稅延期：ACEA+SMMT 請求 ←→ 歐委會態度：未表態\n```\n\n## Related\n- [[concepts/歐洲EV市場]]\n- [[concepts/電池供應鏈]]\n- [[sources/europe-ev-market-may2026]]\n- [[sources/citroen-15k-electric-2cv-2026]]"
    },

      "title": "歐洲 EV 市場動態彙整（2026 年 5~6 月）",
      "url": "https://www.electrive.com/2026/05/29/bmw-opens-configurator-for-rear-wheel-drive-ix3",
      "updated": "2026-05-26",
      "body": "**來源**：[https://www.electrive.com/2026/05/29/bmw-opens-configurator-for-rear-wheel-drive-ix3](https://www.electrive.com/2026/05/29/bmw-opens-configurator-for-rear-wheel-drive-ix3)\n\n# 歐洲 EV 市場動態彙整（2026 年 5~6 月）\n\n**來源**：electrive.com 多篇，2026-05-29~06-01\n\n---\n\n## BMW iX3 40 RWD 正式開放訂購\n\nBMW Neue Klasse 系列推出更平價後驅入門款：\n\n| 指標 | iX3 40（RWD）| iX3 50 xDrive（AWD）|\n|------|-------------|-------------------|\n| 起售價 | **€63,400** | ~€70,900 |\n| 電池容量 | **82.6 kWh** | 108.7 kWh |\n| WLTP 續航 | **637 km** | 805 km |\n| DC 快充 | **300 kW**（800V）| 400 kW |\n| 10→80% | **21 分鐘** | ~15 分鐘 |\n| V2G | **標準配備** | 標準配備 |\n| V2H | 標準配備 | 標準配備 |\n| V2L | 需選配 22kW AC 充電器 | — |\n\n- 生產地：匈牙利 Debrecen 廠（已雙班生產）\n- 全系首搭 BMW AI 智能助理（德語版）\n\n---\n\n## AUDI E7X：奧迪中國子品牌第二彈\n\nAudi 中國專屬品牌「**AUDI**」（無四環 logo）第二款車：\n\n| 指標 | 數值 |\n|------|------|\n| 車型 | 5m 全尺寸跨界 SUV |\n| 發布 | 深圳車展（2026-05-29）|\n| 平台 | **900V** |\n| 動力 | 300kW（RWD）/ **500kW**（AWD）|\n| 電池 | **CATL** 100/109 kWh |\n| 充電 | 4C，10→80% **13 分鐘**；429km / 10 分鐘 |\n| 起售價 | **€34,200 ~ €45,600** |\n| 引擎供應商 | Huayu Automotive（SAIC 子公司）|\n| WLTP 對應 | 751 km（中國工況）|\n\n- 第三款車（純電轎車）計畫 2027 年推出\n- 已向歐盟申請 E7X 商標保護（不代表必然進入歐洲）\n\n---\n\n## Toyota Lexus LF-ZC 取消：日本豪華 EV 戰略受挫\n\n| 項目 | 詳情 |\n|------|------|\n| 車型 | Lexus LF-ZC（純電旗艦轎車）|\n| 首次亮相 | 2023 年概念車 |\n| 原計畫量產 | 2026 年底（愛知縣）→ 延至 2027 年中 → **全面取消** |\n| 技術 | 計畫使用 **Gigacasting** + 「自動駕駛組裝線」|\n\n- Toyota 仍繼續研發 Gigacasting + 固態電池技術\n- 未來可能聚焦 SUV 車型而非轎車\n- 與 [[sources/mazda-ev-delay-2029]] 類似，日系廠豪華 EV 計畫陸續延遲/取消\n\n---\n\n## 德國 EV 市場數據（2026 年 1–4 月）\n\n- 新登記純電車：**223,980 輛**\n- BEV 市占率：**23.6%**（+41.3% YoY）\n- 來源：德國聯邦機動車輛局（KBA）\n\n---\n\n## 其他重要動態\n\n- **荷蘭**：2027-01-01 起對新租賃燃油/混動公司車加收費用（malus），加速向 BEV 轉型\n- **法國**：支持英國納入「Made in EU」工業加速法規（工業加速法 IAA），改變以往嚴格原產地規則立場\n- **Manchester**：TfGM 追加 **125 輛 Wrightbus 電動巴士**（目標 2030 年全面零排放 Bee Network）\n\n---\n\n## Related\n- [[concepts/歐洲EV市場]]\n- [[concepts/電動巴士市場]]\n- [[sources/bmw-ix3-neue-klasse-2026]]\n- [[sources/audi-q4-etron-facelift-2026]]"

      "title": "歐盟 IAA 法案在地化門檻：日本百家車企聯名抗議（2026-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754930",
      "updated": "2026-05-13",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754930](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=754930)\n\n# 歐盟 IAA 法案在地化門檻：日本百家車企聯名抗議（2026-05）\n\n**原文**：Digitimes | 江仁傑｜**發布**：2026-05-13\n\n## 核心事件\n\n歐盟執委會 2026 年春發表《**產業加速法案**》（Industrial Accelerator Act，IAA），日本政府與業者正式提出強烈抗議，要求修正。\n\n## IAA 法案主要內容\n\n- 針對 **EV、PHEV、FCV、綠能產業**\n- 成員國發放補貼或公共採購時，必須有一定比例零組件**於歐盟內生產**\n- 企業車隊（Corporate Fleet）補助：電池材料等關鍵零組件**需在歐盟境內生產**\n\n## 日方反應\n\n| 行動者 | 動作 |\n|--------|------|\n| 日本經濟產業大臣赤澤亮正 | 2026-05-07 在布魯塞爾正式要求修正 |\n| 豐田等 **百餘家**在歐日系廠商 | 2026-05-08 聯名要求修正 |\n\n- 日方擔憂：日本製 EV 可能因此**被排除在歐盟補貼對象之外**\n- 2025 年日系車廠在歐洲主要 31 國銷量：**167 萬輛**（多數從亞洲出口）\n\n## 中方反應\n\n- 中國商務部對歐盟建議**限制使用中國等高風險逆變器**表達「堅決反對」\n- 認為此舉為歧視性做法，警告將採取必要措施維護企業利益\n\n## 日歐共識\n\n- 確認將強化供應鏈合作：重要礦物、電池、鋼鐵、機器人、國防及航太等領域\n- 事務層級持續對話，高峰會前繼續協商\n\n## 意義\n\nIAA 法案與歐盟反補貼稅一起，構成歐洲「以法規築牆保護本土電動化產業鏈」的系統性策略，但同時衝擊日系、中系、美系等海外車廠的競爭地位。\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[entities/豐田]]\n- [[sources/acea-eu-ev-q1-2026]]"
    },

      "title": "歐洲鋰電池產能藍圖腰斬：2030 年目標從 2,000 GWh 降至 1,200 GWh",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751384&grid_seq1=&grid_seq2=",
      "updated": "2026-04-08",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751384&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751384&grid_seq1=&grid_seq2=)\n\n# 歐洲鋰電池產能藍圖腰斬：2030 年目標從 2,000 GWh 降至 1,200 GWh\n\n**原文**：DIGITIMES／黃女瑛｜**發布**：2026-04-08\n\n## 摘要\n歐洲鋰電池自製計畫大幅縮水，2030 年產能目標近乎腰斬，製造成本較中國高 50%，技術仍依賴中系支撐。\n\n## 產能目標修正\n- 2023 年規劃：2030 年產能 ~2,000 GWh（可支應 1,000 萬輛 EV）\n- 現況修正：~1,200 GWh（約 1,190 GWh）\n\n## 雙重壓力\n1. **成本劣勢**：歐洲製造成本較中國高約 50%（人力、原物料）\n2. **技術不足**：尚未建立具代表性的 Gigafactory；多數計畫仍仰賴中系技術\n\n## 依賴中系技術案例\n- Volkswagen 旗下 PowerCo\n- Stellantis 旗下 ACC\n\n## 政策回應\n- 歐盟「電池助推器」：15 億歐元免息貸款（專家認為規模不足）\n- 《工業加速器法案》（IAA）：轉向「納入並規範」中國技術路線\n\n## Related\n- [[entities/Stellantis]]\n- [[concepts/歐洲EV政策]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/地理市場/中國EV出海策略]]"

      "body": "**來源**：electrive / 廠商公告（2026-06-04~06-05）\n\n# 歐洲電動卡車重大進展：Daimler eActros Lowliner + Scania 法國廠\n\n**事件日期**：2026-06-04~05｜**地區**：歐洲\n\n## 一、Daimler Truck eActros Lowliner（2026-06-04）\n\n### 產品規格\n\n| 指標 | 數值 |\n|------|------|\n| 量產時間 | **2027 年** |\n| 最大續航 | **500 公里**（滿載） |\n| 類型 | 重型純電卡車（BEV）|\n| 特點 | **低車架（Lowliner）**設計，利於裝卸作業 |\n| 充電 | 支援直流快充 |\n\n### 市場意義\n\n- eActros Lowliner 是 Mercedes-Benz Trucks（Daimler Truck 旗下）向**500公里以上長途重卡**延伸的關鍵機型\n- 打破「電動重卡只適合短途配送」的認知盲區\n- **競爭者**：Volvo FH Electric（340 公里）、Renault Trucks E-Tech T（500 公里目標）、特斯拉 Semi（840 公里，尚未量產歐洲版）\n\n### 低地板設計的商業優勢\n\n低車架（Lowliner）設計主要服務**超市、物流中心、食品配送**等需頻繁裝卸的場景，降低跳板高度差、加快裝卸速度。\n\n## 二、Scania 法國 Angers 電動卡車廠（2026-06-05）\n\n### 投資概況\n\n| 指標 | 數值 |\n|------|------|\n| 投資金額 | **€7,000 萬（7,000 萬歐元）**|\n| 地點 | 法國 **Angers**（曼恩省）|\n| 用途 | 電動卡車生產升級 |\n| 母公司 | Scania（隸屬 Traton 集團，VW 旗下）|\n\n### 背景\n\n- Angers 廠是 Scania 在法國的主要生產基地\n- 本次投資是 Scania 響應歐盟 2035 年重型車輛 CO₂ 法規的產能電氣化佈局\n- Traton 集團（VW 商用車部門）旗下 Scania、MAN、Navistar 均在加速電動化投資\n\n## 歐洲重型電動卡車市場格局（2026 年中）\n\n| 車廠 | 主要機型 | 量產狀態 |\n|------|----------|----------|\n| Daimler Truck | eActros 600 / Lowliner（2027）| 量產中/預計2027 |\n| Volvo Trucks | FH Electric | 量產中 |\n| Scania | Super BEV | 量產中，持續擴產 |\n| MAN | eTruck | 量產中 |\n| Renault Trucks | E-Tech T | 量產中 |\n| Tesla | Semi（歐洲版）| 尚未確認歐洲量產時程 |\n\n## Related\n- [[concepts/電動卡車市場]]\n- [[concepts/歐洲EV市場]]\n- [[sources/ev-news-digest-jun1-10-2026]]"

    "europe-ev-market-may2026": {
      "title": "歐洲主要市場 EV 銷售數據：2026 年 5 月（2026-06-04/05）",
      "url": "https://www.electrive.com/2026/06/04/germany-may-2026-bev-sales-surge/",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.electrive.com/2026/06/04/germany-may-2026-bev-sales-surge/](https://www.electrive.com/2026/06/04/germany-may-2026-bev-sales-surge/)\n\n# 歐洲主要市場 EV 銷售數據：2026 年 5 月（2026-06-04/05）\n\n**原文**：electrive.com｜**發布**：2026-06-04〜05\n\n## 摘要\n2026 年 5 月歐洲主要汽車市場 BEV 銷售數據出爐，德國、英國、挪威全面飆升，德國 5 月市佔率達 **25%**，為近年高點。BYD 出現近 8 個月首次同比正增長。\n\n## 各市場數據總覽\n\n| 市場 | 5 月 BEV 銷量 | YoY 成長 | 市佔率 |\n|------|-------------|---------|--------|\n| **德國** | **59,969 輛** | **+39.3%** | **25.0%** |\n| **英國** | 未揭露絕對值 | **+34.2%** | **27.3%** |\n| **挪威** | 未揭露絕對值 | 持續領先 | **97.8%** |\n| 英國 電動廂型車 | 2,345 輛 | +35.5% | 9.8%（vs 7.6%） |\n\n## 重點解讀\n\n### 德國：25% 市佔創近高\n- 2025 年初德國取消 EV 補貼後，市場一度萎縮；2026 年 H1 呈現 V 形反彈\n- 大眾 ID.Polo + Cupra Raval 量產（Martorell 廠）帶動 A-segment 銷量\n- 廠商主動降價應對市場壓力\n\n### 英國：27.3% 穩步提升\n- 2026 年 ZEV Mandate 配額壓力推動廠商促銷\n- SMMT 數據：BEV 市佔率持續創新高\n\n### BYD 歐洲：8 個月來首次正增長\n- 前 7 個月因關稅（+17.8%）+競爭加劇持續下滑\n- 5 月轉正可能反映：匈牙利廠本地產能開始出貨，成本優勢回升\n\n## Related\n- [[concepts/歐洲EV市場]]\n- [[concepts/中國EV出海策略]]\n- [[sources/eu-battery-tariff-2027-delay-2026]]"

      "title": "歐洲 EV 降價潮：VWCV 最高降 €10,000、Ford 英國降 £5,000",
      "url": "https://www.electrive.com/2026/04/21/germany-vwcv-cuts-prices-for-electric-models-by-up-to-e10000",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.electrive.com/2026/04/21/germany-vwcv-cuts-prices-for-electric-models-by-up-to-e10000](https://www.electrive.com/2026/04/21/germany-vwcv-cuts-prices-for-electric-models-by-up-to-e10000)\n\n# 歐洲 EV 降價潮：VWCV 最高降 €10,000、Ford 英國降 £5,000\n\n**原文**：electrive.com ｜ **發布**：2026-04-21\n\n## 摘要\n2026 年 4 月下旬歐洲兩大 EV 降價動作：VW Commercial Vehicles（VWCV）在德國推出最高 €10,000 限時折扣（至 2026-05-29）；Ford 在英國降低 Explorer 和 Capri 最高 £5,000，並提升標配。\n\n## VWCV 德國電動商用車折扣\n\n| 車型 | 折扣金額 |\n|------|---------|\n| VW ID. Buzz | **€6,000 off**（私人客戶）|\n| VW e-Caravelle | **€6,700 off**（私人客戶）|\n| 商業客戶最高 | **€10,000 off** |\n\n- 活動期限：至 **2026 年 5 月 29 日**\n- 適用條件：2026 年 12 月 31 日前完成首次登記\n- 背景：軟性需求 + 清理庫存，搭配德國 EV 補貼計畫\n\n## Ford 英國 Explorer & Capri EV 降價\n\n| 車型 | 降幅 | 新入門價 |\n|------|------|---------|\n| Explorer（後驅 58kWh Style）| **£4,035~4,800** | **£35,185** |\n| Explorer AWD Premium | — | **<£50,000** |\n| Capri | **£4,080~5,070** | — |\n\n- 附加升級：更新 Sync 娛樂系統、強化自適應巡航、倒車輔助、駕駛監控、2.3kW 三孔電源插座\n- Standard Range 版本：續航增加 **43 英里**\n- 負面消息：Ford 同步縮減英國授權經銷商數量，影響服務可及性\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[entities/福特]]\n- [[sources/uk-germany-ev-market-dynamics-2026]]"

    "europe-robotaxi-verne-ponyai": {
      "title": "歐洲 Robotaxi 代理人對決：Verne（小馬智行）vs 本土車廠 vs Waymo",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751831",
      "updated": "2026-04-13",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751831](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=751831)\n\n# 歐洲 Robotaxi 代理人對決：Verne（小馬智行）vs 本土車廠 vs Waymo\n\n**原文**：DIGITIMES／黃女瑛｜**發布**：2026-04-13\n\n## 摘要\n歐洲 Robotaxi 市場形成「代理人對決」格局：新創 Verne 透過中國技術（小馬智行自駕 + 極狐 Alpha T5 車體）快速切入，與 VW、賓士等掌握自主技術的傳統車廠對抗，Waymo 預計 2026 年 9 月進入英國，三方競局升溫。\n\n## 三方競局\n\n| 陣營 | 代表 | 技術來源 | 模式 |\n|------|------|---------|------|\n| 中國代理人 | Verne + Uber + 小馬智行 | 極狐 Alpha T5（北汽旗下）+ 小馬智行第7代 AV 系統 | 借殼中國技術，Verne 扮演歐洲營運商 |\n| 歐洲本土 | VW、賓士 | 自有車款 + 元戎啟行等技術夥伴（輔助角色）| 品牌+整車+系統主導 |\n| 美系 | Waymo | 自研（全球最成熟運營經驗）| 2026 年 9 月啟動倫敦服務 |\n\n## Verne 的戰略邏輯\n- 歐洲缺乏大規模自駕實證場域 → 引入已在中國驗證的技術降低風險\n- 搶在 Waymo 進入前累積數據與市場布局\n- 掌握**營運端數據**資產，與歐洲監管機構磨合，為自主技術鋪路\n\n## 風險\n- 硬體（極狐車體）+ 核心演算法（小馬智行）均非自有，對關鍵合作夥伴依賴度高\n- 若無法加速自主技術開發，未來利潤空間受制於人\n\n## 相關業者\n- **Verne**：歐洲 Robotaxi 新創，宣稱歐洲首個商業化 Robotaxi 專案\n- **小馬智行（Pony.ai）**：中國 L4 自駕企業，提供第 7 代自動駕駛系統\n- **北汽極狐（Arcfox）**：Alpha T5 為 Verne 基礎車輛\n\n## Related\n- [[entities/小馬智行]]\n- [[concepts/車輛類型/Robotaxi自動計程車]]\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[concepts/地理市場/中國EV出海策略]]"

    "europe-v2g-bidirectional-2026": {
      "title": "歐洲雙向充電商業化進展：德國卡關，其他國家已先行",
      "url": "https://www.electrive.com/2026/05/21/europe-must-close-ranks-on-bidirectional-charging-as-germany-gets-caught-in-red-tape",
      "updated": "2026-05-22",
      "body": "**來源**：[https://www.electrive.com/2026/05/21/europe-must-close-ranks-on-bidirectional-charging-as-germany-gets-caught-in-red-tape](https://www.electrive.com/2026/05/21/europe-must-close-ranks-on-bidirectional-charging-as-germany-gets-caught-in-red-tape)\n\n# 歐洲雙向充電商業化進展：德國卡關，其他國家已先行\n\n**原文**：electrive.com，2026-05-21\n**作者**：Cora Werwitzke\n**背景**：德國第三屆「歐洲雙向充電峰會」\n\n## 摘要\n\n德國主辦歐洲雙向充電峰會（第三屆），但德國本身在 V2G/V2H 商業化上卻落後於其他歐洲國家。峰會呼籲建立歐盟統一的雙向充電市場架構，而商業化啟動集中於 BMW、Ford、VW、Renault、Mercedes 等品牌。\n\n## 已具備雙向充電能力的車型（德國）\n\n- Renault 5、Ford Capri、Ford Explorer、多款 Volkswagen 車型、Mercedes GLC、**BMW iX3**\n\n## 各品牌商業化進度（2026）\n\n| 品牌 | 商業化合作 | 時程 |\n|------|----------|------|\n| **BMW** | E.ON（德國）| **已啟動**（首個商業化 V2G）|\n| **Ford** | Octopus Energy | 2026 年夏 |\n| **VW** | Elli（VW 子公司）| Q4 2026 |\n| **Renault** | The Mobility House | 2026 年底 |\n| **Mercedes** | The Mobility House | 2026 年底 |\n\n## 德國的障礙（「卡關原因」）\n\n| 障礙 | 說明 |\n|------|------|\n| MiSpeL 實施 | 聯邦網路局的儲能 + 充電點市場整合程序，尚未到位 |\n| 電網費豁免 | 中間儲能的電網費豁免已通過立法，但尚未生效 |\n| 稅務不確定性 | 向電網回饋電力的稅務處理仍不清晰 |\n| 低壓電網協調 | 800+ 家電網運營商，低壓電網控制機制未協調 |\n| 智慧電表普及率 | 德國智慧電表普及率低，阻礙需求響應整合 |\n\n德國在前兩屆峰會（2023、2024）承諾 2025 年市場就緒，但**目標未達成**。\n\n## 峰會成果\n\n- 提議：建立歐盟統一的**動態電網狀態信號**，跨所有電網層級自動分配充電 / 回饋電流\n- 報告將提交歐洲委員會推進監管架構\n- 核心信息：「**其他歐洲國家已走在德國前面**；建立統一歐洲雙向充電市場的球，現在在布魯塞爾的手中。」\n\n## 市場意義\n\n- V2G 是充電基礎設施的下一個大趨勢：每輛 EV 均可成為「電網緩衝」資產\n- 德國的官僚瓶頸是歐洲整體推進的阻力，但 EU 標準化若成功，將一舉解鎖整個市場\n- Hamburg Hochbahn 選擇固定儲能而非 V2G 的決策，反映當前 V2G 基礎設施還不夠成熟的現實\n\n## Related\n- [[concepts/充電基礎建設]]\n- [[concepts/歐洲EV市場]]"
    },
    "ev-battery-longevity-2026": {
      "title": "現代電動車電池壽命：5 年後仍保留 95% 續航（2026 報告）",
      "url": "https://insideevs.com/news/793891/evs-barely-lose-range-after-five-years",
      "updated": "2026-04-23",
      "body": "**來源**：[https://insideevs.com/news/793891/evs-barely-lose-range-after-five-years](https://insideevs.com/news/793891/evs-barely-lose-range-after-five-years)\n\n# 現代電動車電池壽命：5 年後仍保留 95% 續航（2026 報告）\n\n**原文**：InsideEVs / Recurrent 分析報告｜**發布**：2026-04-23\n\n## 摘要\nEV 分析公司 Recurrent 彙整超過 **10 億英里**真實行駛數據，結論：現代電動車電池退化比消費者預期輕微，3 年保留 97%、5 年保留 95% 的預期行駛里程。\n\n## 關鍵數據\n\n| 使用年限 | 平均里程保留率 |\n|---------|--------------|\n| **3 年** | **97%** |\n| **5 年** | **95%** |\n\n具體案例：一輛新車 300 英里續航 → 3 年後仍有 291 英里 → 5 年後 285 英里。\n\n## 2023 年款 EV 現狀\n- 約 **68%** 的 MY2023 EV 至今仍超越其 EPA 標稱續航（依 Expected Range 方法論）\n\n## 2031 預測\n- 一輛 MY2026 的 325 英里 EV → 2031 年仍可達 **301 英里**\n\n## 無顯著損失品牌\nCadillac / Ford / Hyundai / Mercedes-Benz / **Rivian**（5 年內無顯著里程損失）\n\n## 技術原因\n\n1. **緩衝容量**：OEM 在電池組內預留未使用容量，隨電池老化透過 OTA 解鎖以抵銷衰減\n2. **Cell-to-Pack 設計**：減輕重量，同體積電量更高\n3. **熱管理系統**進步（防止高溫加速衰化）\n4. **空氣動力學**改進（降低能耗）\n\n## 意義\n\n- **消費者信心**：5 年後 95% 的里程保留率等同燃油車的「可靠性」定位\n- **二手車市場**：二手 EV 殘值支撐力提升，汽車金融評估邏輯改變\n- 與中國市場 BYD 保修 + 車輛快速貶值（極氪 001 案例）形成對比\n\n## Related\n- [[concepts/電池與技術/電池技術路線]]\n- [[entities/Rivian]]\n- [[sources/hyundai-iccu-warranty-2026]]"
    },

      "body": "**來源**：內部彙整（Claude 整理自 electrive、ETAuto、Google Alerts、InsideEVs、Sustainable Bus、Digitimes 等每日摘要）\n\n# 電動車新聞彙整：2026/6/1 - 6/10\n\n**彙整週期**：2026-06-01 ~ 2026-06-10｜**格式**：主題分類摘要\n\n## 索引（分類連結）\n\n本彙整涵蓋六大主題，個別重要故事已建立獨立來源頁：\n\n### 已建立獨立來源頁的故事\n| 故事 | 來源頁 |\n|------|--------|\n| SAIC/MG 西班牙加利西亞廠（€2億，12萬輛/年）| [[sources/mg-saic-spain-factory-2026]] |\n| Tesla Robotaxi 德州僅 42 輛 | [[sources/tesla-robotaxi-texas-reality-2026]] |\n| Tata×奇瑞 Avinya 平台合作 | [[sources/tata-chery-avinya-platform-2026]] |\n| 日產確認奇瑞 Sunderland 代工 | [[sources/nissan-chery-sunderland-deal-2026]] |\n| Citroën <€15K 電動 2CV | [[sources/citroen-15k-electric-2cv-2026]] |\n| 歐洲 5 月銷售數據（德 25%、英 27.3%）| [[sources/europe-ev-market-may2026]] |\n| ACEA+SMMT 關稅延期請求 | [[sources/eu-battery-tariff-2027-delay-2026]] |\n| 比亞迪列入 DoD 軍工名單 | [[sources/byd-dod-military-list-2026]] |\n| Waymo×B2U 電池二次利用 + 科羅拉多立法 | [[sources/waymo-battery-secondlife-colorado-recycling-2026]] |\n| Uber×WeRide 馬德里 Robotaxi | [[sources/uber-robotaxi-europe-expansion-2026]] |\n| 全球電動巴士 6 月動態（Zenobē、西約克郡等）| [[sources/ebus-global-jun2026]] |\n| VW 引進三星SDI 歐製方形電池 | [[sources/vw-samsung-sdi-europe-battery-2026]] |\n| Q1 2026 全球 ESS 出貨 195.5 GWh（+78%）| [[sources/global-ess-q1-2026]] |\n| 豐田入股 Tier IV，e-Palette L4（FY2027）| [[sources/toyota-tier-iv-l4-investment-2026]] |\n| 澳洲：中國EV首次超越日系車 | [[sources/australia-china-ev-milestone-2026]] |\n| 小鵬更名集團，轉型「物理AI」| [[sources/xpeng-physical-ai-pivot-2026]] |\n| BYD 匈牙利廠勞工爭議（CLW 報告）| [[sources/byd-hungary-labour-report-2026]] |\n| Daimler eActros Lowliner + Scania 法國廠 | [[sources/europe-etruck-jun2026]] |\n\n### 直接更新 Concept（未另建來源頁的細項）\n- Leapmotor C10 馬來西亞組裝（Stellantis 東協首款）→ [[concepts/東南亞EV市場]]、[[concepts/中國EV出海策略]]\n- 比亞迪 4 奈米智駕晶片 → [[concepts/ADAS智駕系統]]\n- 尼泊爾 EV 市占 73%（全球第二）→ [[concepts/地理市場/其他新興EV市場]]（待建）\n- GM 199 美元 CarPlay/Android Auto 適配器 → 次要產品動態，不另建頁\n\n## Related\n- [[concepts/中國EV出海策略]]\n- [[concepts/歐洲EV市場]]\n- [[concepts/電動巴士市場]]\n- [[concepts/Robotaxi自動計程車]]\n- [[concepts/儲能市場]]"

    "ev-oil-displacement-2026": {
      "title": "全球 EV 每日取代 230 萬桶石油（BloombergNEF，2026）",
      "url": "https://www.inside.com.tw/article/41201-global-evs-save-23-million-barrels-of-oil-daily-70-percent-of-irans-hormuz-exports",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.inside.com.tw/article/41201-global-evs-save-23-million-barrels-of-oil-daily-70-percent-of-irans-hormuz-exports](https://www.inside.com.tw/article/41201-global-evs-save-23-million-barrels-of-oil-daily-70-percent-of-irans-hormuz-exports)\n\n# 全球 EV 每日取代 230 萬桶石油（BloombergNEF，2026）\n\n**原文**：INSIDE（台灣）｜**發布**：2026-05-04\n**數據來源**：BloombergNEF、Ember\n\n## 摘要\n根據 BloombergNEF 研究，2025 年全球電動車（含 PHEV）每天取代 **230 萬桶**石油消耗，相當於伊朗荷姆茲海峽日出口量的 **70%**。最令人意外的是：電動二/三輪車的貢獻遠超乘用電動車。\n\n## 各類電動交通工具貢獻\n\n| 類別 | 每日取代石油量 |\n|------|--------------|\n| 電動二輪 + 三輪車 | **110 萬桶**（**最大單一來源**）|\n| 乘用電動車（含 PHEV）| 74.1 萬桶 |\n| 電動巴士等 | 約 45.9 萬桶 |\n| **合計** | **230 萬桶** |\n\n> Ember 保守估算：170 萬桶；BloombergNEF：230 萬桶\n\n## 關鍵洞察\n\n**亞洲電動二/三輪是最大黑馬**：\n- 印度、越南、印尼等開發中市場，電動機車/電動三輪車普及速度遠超乘用 EV\n- 購置成本更低、充電更方便，滲透更深\n\n## 未來展望（BloombergNEF）\n\n| 時間點 | 每日取代石油量 |\n|--------|------------|\n| 2025 年 | 230 萬桶 |\n| **2030 年** | **525 萬桶**（超過 2025 年的 2 倍以上）|\n\n- 乘用電動車未來幾年將超越二/三輪車，成為最大單一取代來源\n\n## 戰略意義\n- EV 的能源安全影響遠超市場普遍認知\n- 對產油國（伊朗、沙烏地）的實質衝擊已在累積\n- 與油價高企形成正向循環：油價高 → EV 需求增 → 油需求降\n\n## Related\n- [[concepts/地理市場/印度EV市場]]\n- [[concepts/地理市場/東南亞EV市場]]"
    },

    "ev-truck-satisfaction-germany-2026": {
      "title": "德國電動重卡業者滿意度調查：93% 不願回頭（2026-05）",
      "url": "https://insideevs.com/news/795603/ev-truck-satisfaction-2026",
      "updated": "2026-05-13",
      "body": "**來源**：[https://insideevs.com/news/795603/ev-truck-satisfaction-2026](https://insideevs.com/news/795603/ev-truck-satisfaction-2026)\n\n# 德國電動重卡業者滿意度調查：93% 不願回頭（2026-05）\n\n**原文**：InsideEVs | Iulian Dnistran｜**發布**：2026-05-12\n**調查機構**：德國 Öko-Institut（生態研究所）\n\n## 核心數據\n\n| 指標 | 數值 |\n|------|------|\n| 受訪企業數 | **57 家**運輸公司（至少運營一年）|\n| 受訪車輛數 | 合計 **>300 輛**電動重卡 |\n| 滿意度 | **93% 滿意或非常滿意** |\n| 調查期間 | 2025–2026 冬季 |\n| 主要車型 | Mercedes-Benz eActros、eEconic、eArocs |\n\n## 業者主要正評\n\n- 可靠性（reliability）\n- 駕駛舒適度\n- 較低的運行成本\n\n## 持續挑戰\n\n- **購置成本**（sticker prices）仍偏高\n- **電網容量**是部署最大瓶頸\n  - 調查場站平均電網容量：**1,115 kW**\n  - 已安裝充電功率平均：**629 kW**（40 家樣本）\n- 公共重卡充電站：使用比例 **< 5%**（場地空間不足是主因）\n- 低電費 + 免公路費（road toll exemption）是繼續擴大電動重卡規模的關鍵前提\n\n## 可靠性評估\n\n| 評語 | 比例 |\n|------|------|\n| 故障率與柴油車相同 | 32% |\n| 故障率顯著低於柴油車 | 16% |\n| 故障率高於柴油車 | 18% |\n| 故障率顯著高於柴油車 | 7% |\n\n## 使用強度\n\n- 日均行駛：**268 英里（432 km）**\n- 約 **40% 車隊**至少 40% 車輛日行 >310 英里（500 km）\n\n## 前景展望\n\n- **93% 早期採用者**預期電動重卡將在 **2030 年前**成為公司標準車型\n\n## Related\n- [[concepts/車輛類型/電動卡車市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[sources/milence-electric-truck-tco]]\n- [[sources/tesla-semi-production-2026]]"
    },
    "eve-energy-profile": {
      "title": "億緯鋰能（EVE Energy）公司概覽",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751601&grid_seq1=&grid_seq2=",
      "updated": "2026-04-09",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751601&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751601&grid_seq1=&grid_seq2=)\n\n# 億緯鋰能（EVE Energy）公司概覽\n\n**原文**：DIGITIMES／張庭瑜｜**發布**：2026-04-09\n\n## 基本資料\n- **成立**：2001 年\n- **總部**：中國廣東惠州\n- **定位**：中國動力電池第二梯隊\n\n## 產品線演進\n1. 一次性鋰電池（智慧電表、IoT、工業）→ 起家業務\n2. 消費型鋰離子電池（消費電子）\n3. 動力電池（EV、商用車）\n4. 儲能電池（ESS）→ 近年成長動能\n\n## 電池類型\n- 圓柱型（電動工具利基市場有優勢）\n- 方形\n- 軟包\n\n## 化學體系\n- LFP（磷酸鐵鋰）\n- NCM（三元材料）\n\n## 市場地位\n規模遜於寧德時代與比亞迪，但在圓柱電池、小型鋰電池、儲能等利基市場具影響力。\n\n## Related\n- [[entities/寧德時代]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[concepts/基礎設施與供應鏈/儲能市場]]"

    "feoc-taiwan-auto-supply-chain-2026": {
      "title": "FEOC 驅動台系車鏈去中化紅利 + 台灣綠能20年產業史",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=757061)，2026-06-01",
      "updated": "2026-05-26",
      "body": "# FEOC 驅動台系車鏈去中化紅利 + 台灣綠能20年產業史\n\n**來源 A**：[DIGITIMES — FEOC 台系車鏈](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=757061)，2026-06-01  \n**來源 B**：[DIGITIMES — 台灣綠能20年](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=755621)，2026-06-01\n\n---\n\n## A｜FEOC 台系車電供應鏈去中化機遇\n\n### 核心論點\n美國 FEOC（受關注外國實體）規範日趨嚴格，傳統中國 Tier 2 → 國際 Tier 1 → 海外車廠的供應鏈模式**被迫改變**，台灣廠商是最大受惠方之一。\n\n### 關稅調整\n- 汽車零組件 232 關稅：25% + MFN 1.71% = **26.71%** → 調降至 **15%**\n- 非半導體 232 優惠措施，對台灣汽車供應鏈「如虎添翼」\n- **注意**：2026-02~05 月間因聯邦法院判決恢復原稅率，差額退稅機制待確認\n\n### 受惠台廠\n\n| 類別 | 代表廠商 |\n|------|---------|\n| 汽車零件 | **和大、為升電裝** |\n| 汽車電子 | **鴻海等電子六哥、台達電、友達、群創** |\n| 半導體 | **台積電、聯電、世界先進、聯發科、瑞昱** |\n\n### 特殊機遇：IVI + 聯網模組\n- 中國紅色供應鏈的車聯網（V2X）+ 車載資訊娛樂（IVI）遭美國**全面封殺**（資安疑慮）\n- 台灣 ICT 優勢 → 填補空缺\n\n### 時間軸\n- 汽車認證周期長 → **2026~2027 年**轉單效應開始發酵（過去一年多認證未反映在營收）\n- 護城河：一旦通過認證，競爭者難以取代\n\n---\n\n## B｜台灣綠能 20 年：從製造血戰到系統韌性\n\n### 歷史軌跡\n\n**2000 年代（狂飆期）**：太陽能 + 鋰電池，茂迪、台積電、台達電、鴻海、英業達、友達相繼進場\n\n**2010 年後（潰退期）**：中國倍數級產能碾壓，台灣大廠被迫調整戰略（製造主權易手）\n\n**2026 現在（韌性重建）**：\n- 中國掌握太陽能約 **9 成市占**，鋰電池約 **7 成產能**\n- 台灣轉向**能源服務平台**（綠電交易：雲豹能源、泓德能源、續興）\n- 製造端堅守：台泥、台塑、鴻海基於戰略安全 + 在地化政策根留台灣\n- AI 資料中心供電需求 → 儲能系統 + 能源調度成新機遇\n\n---\n\n## Related\n- [[concepts/台灣EV市場]]\n- [[concepts/車用半導體供應鏈]]\n- [[entities/鴻海]]\n- [[sources/foxconn-cdms-ev-vertical-integration]]"
    },
    "ford-catl-michigan-factory-2026": {
      "title": "福特 × 寧德時代密西根廠近完工：授權不入股的中美共存模式（2026-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755038",
      "updated": "2026-05-13",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755038](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755038)\n\n# 福特 × 寧德時代密西根廠近完工：授權不入股的中美共存模式（2026-05）\n\n**原文**：Digitimes | 李佶璋｜**發布**：2026-05-13\n\n## 核心事件\n\nFord 耗資 **30 億美元**打造的 **BlueOval 電池園區**（密西根州馬歇爾市）接近完工，預計**數月內投產**，技術核心源自寧德時代 LFP 授權。\n\n## 合作結構\n\n| 項目 | 細節 |\n|------|------|\n| 所有權 | **Ford 全資擁有**（工廠、土地、設備）|\n| 技術來源 | 向寧德時代獲取 **LFP 電池技術授權**（授權不入股）|\n| 類比 | 類似 TikTok 試圖在美留存的技術授權架構 |\n| 投資規模 | **$30 億美元** |\n| 工廠地點 | 密西根州馬歇爾市（人口約 6,800 人的小鎮）|\n\n## 政治敏感性\n\n- 美國商務部長 Howard Lutnick 曾反對全面開放中國車廠競爭\n- Ford CEO Jim Farley 也表達類似立場\n- 但 Trump 曾對中國車廠到美設廠表示開放態度（創造本土就業）\n- 「授權不入股」是規避國安限制的折衷方案\n\n## 戰略意義\n\n1. **美國製造回流的樣板**：半世紀以來首度由美國大廠全資擁有的綠地電池工廠\n2. **技術轉移的長期計畫**：中國專家培訓美國工程師，10 年內縮短技術差距\n3. **中美供應鏈共存新模式**：沒有任何通往 EV 未來的路能完全避開中國供應鏈\n4. 寧德時代 CEO 曾毓群語：「電池像磚頭一樣笨」（無情報監控風險，化解國安顧慮）\n\n## Related\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/電池與技術/電池技術路線]]\n- [[entities/寧德時代]]\n- [[entities/福特]]\n- [[sources/ira-supply-chain-compliance]]"
    },

      "url": "https://insideevs.com/news/795565/ford-energy-battery-energy-storage",
      "updated": "2026-05-13",
      "body": "**來源**：[https://insideevs.com/news/795565/ford-energy-battery-energy-storage](https://insideevs.com/news/795565/ford-energy-battery-energy-storage)\n\n# Ford Energy DC Block：進軍 ESS 市場，挑戰 Tesla Megapack（2026-05）\n\n**原文**：InsideEVs | Iulian Dnistran｜**發布**：2026-05-12\n\n## 核心事件\n\nFord 正式成立全資子公司 **Ford Energy**，首款產品 **DC Block** 是一款集裝箱式電池儲能系統，直接挑戰 Tesla Megapack。\n\n## DC Block 規格\n\n| 規格 | 數值 |\n|------|------|\n| 電池化學 | **稜柱型 LFP**（512 Ah）|\n| 封裝形式 | 20 英尺標準集裝箱（含所有電力電子設備）|\n| 單箱容量 | **5.45 MWh** |\n| 電壓範圍 | 1,040–1,500 V DC |\n| 充放電配置 | **2 小時版** + **4 小時版** |\n| 熱管理 | 液冷 |\n| 電池管理 | 三層 BMS（電壓、電流、溫度、SOC、SOH）|\n| 防火系統 | 煙霧 + 熱感 + 氫氣偵測 + 通風抑制 |\n| 防護等級 | IP55 |\n| 操作溫度 | -35°C 至 55°C |\n| 設計壽命 | **20 年** |\n\n## 生產計畫\n\n| 項目 | 細節 |\n|------|------|\n| 工廠地點 | 肯塔基州 Glendale（原 F-150 Lightning + E-Transit 電池廠）|\n| 製造範圍 | 電極捲 → 組裝整箱（全垂直整合）|\n| 規劃年產能 | **20 GWh** |\n| 首批客戶交付 | **2027 年初** |\n\n## 背景\n\n- 原 Glendale 廠是 Ford × SK On 合資廠（F-150 Lightning + E-Transit 電池）\n- 合資解散後 Ford 留下 Glendale 廠，SK On 取走田納西廠\n- F-150 Lightning 已於 2025 年停產，E-Transit 銷量不振，EV 業務萎縮後轉型 ESS\n\n## 與 Tesla Megapack 的對比\n\n| 指標 | Ford Energy DC Block | Tesla Megapack |\n|------|---------------------|----------------|\n| 年產能 | 20 GWh（計畫）| ~80 GWh |\n| 累計部署 | 尚未量產 | >47 GWh（65+ 國）|\n| Q4 2025 毛利 | — | **$11 億美元** |\n\n→ Tesla 在 ESS 領域領先非常大，Ford 是重要追隨者但差距顯著\n\n## Related\n- [[concepts/基礎設施與供應鏈/儲能市場]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[entities/福特]]\n- [[sources/us-ess-battery-supply-shortage]]"

      "url": "https://www.electrive.com/2026/04/16/ford-restructures-ev-division-doug-field-departs",

    "ford-model-e-q1-2026": {
      "title": "Ford Model e Q1 2026 財報：虧損縮小至 $777M",
      "url": "https://www.electrive.com/2026/04/30/fords-ev-losses-narrow-to-777m-in-q1-2026-amid-model-e-profitability-efforts",
      "updated": "2026-05-05",
      "body": "**來源**：[https://www.electrive.com/2026/04/30/fords-ev-losses-narrow-to-777m-in-q1-2026-amid-model-e-profitability-efforts](https://www.electrive.com/2026/04/30/fords-ev-losses-narrow-to-777m-in-q1-2026-amid-model-e-profitability-efforts)\n\n# Ford Model e Q1 2026 財報：虧損縮小至 $777M\n\n**原文**：Electrive（Florian Treiss）｜**發布**：2026-04-30\n\n## 摘要\nFord 旗下電動乘用車部門 Model e 在 Q1 2026 虧損略微收窄，但仍深陷虧損。整年指引維持虧損 $4-4.5 億美元，改善幅度有限。\n\n## Q1 2026 財報數據\n\n| 指標 | Q1 2026 | Q1 2025 | 變化 |\n|------|---------|---------|------|\n| Model e EBIT | **-$777M** | -$849M | +$72M（縮減）|\n| EBIT 毛利率 | **-63.1%** | -68.4% | +5.3pp |\n| 每輛虧損 | **~$23,000** | — | — |\n| 電動車銷量 | **~34,000 輛** | ~31,000 輛 | +10% |\n| 部門營收 | **$12 億** | $12 億 | 持平 |\n\n> 賣出更多 EV，卻沒有提升營收 → 均價下降（歐洲低價車型比重增加）\n\n## 背景\n- **Model e 範疇**：Puma Gen-E、Explorer（科隆廠）、Mustang Mach-E（不含 E-Transit）\n- **Trump 廢止 $7,500 稅額減免**（2025-09-30）重創美國 EV 需求\n- **F-150 Lightning 停產**（2025 年秋）\n- **$195 億資產減損**（2025-12 宣布）\n\n## 全年展望\n\n- FY2026 Model e EBIT 指引：**-$4.0~$4.5B**（改善自 2025 年的 -$4.8B）\n- 下一步：Ford Universal EV Platform（UEV），研發更平價、可規模化的 EV\n- Ford Energy 電池儲能事業持續擴大\n\n## Ford 整體 Q1 2026\n- 總營收 $433 億；淨利 $25 億；調整後 EBIT $35 億\n- Ford Blue（ICE）：584,000 輛；Ford Pro（商用）：316,000 輛\n\n## Related\n- [[entities/福特]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[sources/ford-ev-restructure-doug-field]]"

    "foxconn-cdms-ev-vertical-integration": {
      "title": "鴻海 CDMS 模式：電動車從電池到整車的垂直整合一條龍",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752159",
      "updated": "2026-04-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752159](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752159)\n\n# 鴻海 CDMS 模式：電動車從電池到整車的垂直整合一條龍\n\n**原文**：DIGITIMES／杜念魯｜**發布**：2026-04-15\n\n## 摘要\n鴻海在車用電子展以全場最大攤位展示垂直整合實力，核心亮點為高雄 LFP 電池中心（1.27 GWh，2026 年量產）、CDMS 全球 240 個據點彈性生產模式，以及與三菱 FUSO 正式合約（2026-01 簽訂）。\n\n## 電池自製化（核心主軸）\n\n| 項目 | 內容 |\n|------|------|\n| 工廠 | 高雄電池中心 |\n| 技術 | LFP（磷酸鋰鐵）為主力 |\n| 規劃產能 | **1.27 GWh** |\n| 量產時間 | **2026 年**正式量產 |\n| 優勢 | 電池佔整車成本 >30%，自製可壓低成本並強化供應鏈掌控 |\n| 固態電池 | 展示半固態與固態樣品，量產時程未公布 |\n\n## CDMS 全球製造模式\n\n- **CDMS**（委託設計與製造服務）：委託設計 + 委託製造，類似電子代工邏輯延伸至汽車\n- 全球布局：**24 個國家**，超過 **240 個**營運據點\n- 彈性依客戶需求、稅負結構、成本與物流條件決定生產地點\n- 台灣高雄乘用車產線：不限內銷，可視情況支援部分海外市場\n\n## 量產車型陣容（2026）\n- **Model B**：乘用\n- **Model C（新款）**：已針對美國市場法規調整設計\n- **Model D**：多功能休旅\n- **Model U（中巴）**：商用，三菱 FUSO 合作基礎車型\n\n## 鴻海 × 三菱 FUSO 最新進度\n- **2025 年**：簽署 MOU\n- **2026 年 1 月**：正式合約簽訂完成\n- 合作形式：合資公司，在日本開發與銷售電動商用車\n- 初期車型：Model T + 中巴 Model U；後續可拓展至其他海外市場\n\n## 二輪/三輪\n- 目前聚焦電機馬達 + 電池關鍵零組件供應\n- 與台灣業者已有電機馬達代工合作\n- 電池部分：最快 **2027 年**有成果\n\n## Related\n- [[entities/鴻海]]\n- [[entities/三菱FUSO]]\n- [[concepts/車輛類型/電動商用車]]\n- [[concepts/車輛類型/電動巴士市場]]\n- [[sources/foxconn-mitsubishi-fuso-electric-bus]]"
    },
    "foxconn-mitsubishi-fuso-electric-bus": {
      "title": "鴻海 × 三菱FUSO：2030 年日製電動巴士外銷東南亞、澳洲",
      "url": "https://udn.com/news/story/6811/9424175",
      "updated": "2026-04-08",
      "body": "**來源**：[https://udn.com/news/story/6811/9424175](https://udn.com/news/story/6811/9424175)\n\n# 鴻海 × 三菱FUSO：2030 年日製電動巴士外銷東南亞、澳洲\n\n**原文**：聯合新聞網｜**發布**：2026-04-06\n\n## 摘要\n鴻海與三菱 FUSO 計劃各出資 50%，成立巴士專責公司，2027 年開發新款電動大巴，初期從台灣進口車體在日本組裝，目標 2030 年實現全日本製並外銷。\n\n## 合作時程\n| 時間 | 計劃 |\n|------|------|\n| 2026 下半年 | 成立巴士專責公司（各 50%）|\n| 2027 年 | 開發新款電動巴士；初期由鴻海台灣廠進口車體，日本組裝銷售 |\n| 2028-2029 年 | 目標全車日本製造 |\n| 2030 年起 | 外銷東南亞、澳洲 |\n\n## 分工\n- **鴻海**：電動車開發技術、縮短開發時程\n- **三菱FUSO**：製造經驗、東南亞/澳洲既有通路（現有小型巴士業務）\n\n## 市場背景：中國主導全球電動巴士\n- 2025 年全球電動巴士產量：約 8 萬輛，其中中國製 6 萬輛（近 80%）\n- 最大生產商比亞迪：2025 年出口 4,234 輛\n- 在日本市場：比亞迪電動巴士售價比五十鈴等日本廠商便宜約 40%\n- 中國製電動巴士在日本市場占比超過 70%\n\n## 戰略意義\n鴻海試圖以日本品牌背書突破中國主導的電動巴士市場，為非中國製造路線的電動商用車提供替代選項。\n\n## Related\n- [[entities/鴻海]]\n- [[entities/三菱FUSO]]\n- [[entities/比亞迪]]\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/車輛類型/電動商用車]]"

    "foxtron-cavira-yulon-2026": {
      "title": "鴻華先進 Cavira 預接單啟動 + 裕隆三義廠全力量產支援",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755913",
      "updated": "2026-05-22",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755913](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755913)\n\n# 鴻華先進 Cavira 預接單啟動 + 裕隆三義廠全力量產支援\n\n**原文**：Digitimes，2026-05-21（兩篇合併）\n**作者**：杜念魯、舒能翊／台北\n\n## 摘要\n\n鴻華先進（Foxtron）宣布啟動中型 SUV **Cavira** 預接單，6 月 17 日正式上市；裕隆汽車同步確認三義廠為 Foxtron 全產品線（N7、Bria、Cavira）的製造基地，並揭露全球佈局路線（紐澳、歐洲、CDMS 平台）。\n\n## Cavira 預接單\n\n| 項目 | 內容 |\n|------|------|\n| 預接單啟動 | 2026-05-20 宣布 |\n| 正式上市 | **2026-06-17** |\n| 定位 | 中型 SUV 純電（與主流進口電動 SUV 直接競爭）|\n| 升級幅度 | 22 項業界唯一或領先規格，滿配維持原售價 |\n\n## 鴻華先進全球佈局\n\n| 市場 | 時程 | 合作方式 |\n|------|------|---------|\n| **紐澳市場** | **2026 Q3末~Q4初（約9~10月）** | 透過與**三菱汽車**的合作進入 |\n| **歐盟市場** | 研議中 | 與波蘭國營事業 **Electro Mobility Poland** 合作 |\n| **美國市場** | 暫緩 | 台灣整車進口關稅 2.5% → **27.5%**，衝擊大；轉向強化 CDMS 平台 |\n\n## CDMS 平台策略\n\n**CDMS（Contract Design and Manufacturing Service）**：\n\n- 對外：B2B 代工設計（幫國際車廠造車）\n- 對內：B2C 自有品牌（Foxtron 品牌）\n- **核心競爭力**：採用共用平台，OEM 客戶可將 EV 開發成本降至原本的 **20~30% 甚至更低**\n- 董事長李秉彥：「美國關稅影響較大，但我們會優先強化 CDMS 平台對國際車廠的吸引力」\n\n## 裕隆 Q1 2026 法說會重點\n\n| 指標 | 數值 |\n|------|------|\n| Q1 合併營收 | **NT$169.75 億** |\n| Q1 營業利益 | ~NT$15.3 億（QoQ + YoY 均成長）|\n| 台灣車市 Q1 | 約 9.6 萬輛（-3% YoY，衰退集中 ICE）|\n| BEV + HEV 趨勢 | 逆勢成長 |\n\n**重大結構調整**：\n- 納智捷股權移轉已於 **2026-04-10** 完成，Q2 起不再納入合併報表\n- 未來每年減少 ~NT$40 億營收認列\n- 透過鴻華先進垂直整合納智捷 → 優化整體獲利結構\n\n## 製造安排\n\n- **N7、Bria、Cavira** 三款車型均由**裕隆三義廠**生產\n- 裕隆作為鴻華先進大股東，全力支援量產與出口產能\n\n## Related\n- [[entities/鴻海]]\n- [[concepts/台灣EV產業]]\n- [[sources/foxconn-cdms-ev-vertical-integration]]"
    },

      "title": "馬克宏訪韓：催化三星半導體、現代汽車氫能合作",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751373&grid_seq1=&grid_seq2=",
      "updated": "2026-04-08",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751373&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751373&grid_seq1=&grid_seq2=)\n\n# 馬克宏訪韓：催化三星半導體、現代汽車氫能合作\n\n**原文**：DIGITIMES／范維君｜**發布**：2026-04-08\n\n## 摘要\n法國總統馬克宏訪問南韓，與三星會長李在鎔、現代汽車會長鄭義宣會晤，聚焦半導體、氫能、AI 三大產業合作，雙方簽署含關鍵礦物與半導體的合作意向書。\n\n## 合作方向\n\n### 三星 × 法國（半導體/AI）\n- 法國推動半導體自主化，尋求三星設立生產或研發據點\n- 可能形式：研發合作、供應鏈參與、策略投資\n- Mistral AI 訪問三星華城，探討 HBM 等記憶體合作（Mistral 資料中心 2026 Q2 啟用）\n\n### 現代汽車 × 法國（氫能）\n- 與法國 OPmobility 合作氫儲運、高壓氫儲存技術\n- 與 Air Liquide 同為「氫委員會」成員，2025 年承諾擴大合作\n\n## Related\n- [[entities/豐田]]\n- [[concepts/電池與技術/氫燃料電池商用車]]\n- [[concepts/基礎設施與供應鏈/車用半導體供應鏈]]"

    "ganfeng-solid-state-500wh-2026": {
      "title": "贛鋒鋰業啟動 500 Wh/kg 全固態電池試量產",
      "url": "https://www.electrive.com/2026/05/21/ganfeng-starts-pilot-production-of-500-wh-kg-solid-state-batteries",
      "updated": "2026-05-22",
      "body": "**來源**：[https://www.electrive.com/2026/05/21/ganfeng-starts-pilot-production-of-500-wh-kg-solid-state-batteries](https://www.electrive.com/2026/05/21/ganfeng-starts-pilot-production-of-500-wh-kg-solid-state-batteries)\n\n# 贛鋒鋰業啟動 500 Wh/kg 全固態電池試量產\n\n**原文**：electrive.com，2026-05-21\n**作者**：Carla Westerheide\n\n## 摘要\n\n中國鋰業巨頭**贛鋒鋰業（Ganfeng Lithium）**宣布 **500 Wh/kg 鋰金屬固態電池**正式進入小批量（試量產）生產，並公佈旗下固態電池多條技術路線的最新進展。\n\n## 關鍵里程碑\n\n| 電池 | 能量密度 | 狀態 |\n|------|---------|------|\n| 鋰金屬固態（10 Ah）| **500 Wh/kg** | **小批量試量產**（業界首個達此密度的 10 Ah 固態產品）|\n| 固態電池 | **400 Wh/kg** | 超過 **1,100 次循環**，完成工程驗證 |\n| 半固態電池 | **650 Wh/kg** | 3 個月前（約 2026-02）已宣布量產 |\n| 矽碳負極系列 | 320–480 Wh/kg | 320 版本已超過 1,000 次循環；480 版本研發中 |\n\n## 兩條技術路線\n\n1. **矽碳負極**：320–480 Wh/kg，商業化進度較成熟\n2. **鋰金屬負極**：更高能量密度（500 Wh/kg+），被視為商業化速度更快的高密度路線\n\n## 目標市場\n\n豪華電動車、無人機、**eVTOL 飛行器**、機器人、消費電子\n\n## 客戶合作進展\n\n| 客戶 | 合作狀態 |\n|------|---------|\n| **現代汽車（Hyundai）** | 供應贛鋒固態電池 |\n| **長安汽車** | 計畫 **2026 年**試裝 400 Wh/kg 固態電池 |\n| **東風汽車** | 已開始在極寒氣候測試搭載 350 Wh/kg 固態電池的車輛 |\n\n## 技術意義\n\n- 500 Wh/kg 約為現行 NMC 電池能量密度的 **1.5~1.7 倍**\n- 固態電池商業化路徑：贛鋒已走到工程驗證 → 試量產，距車廠規模化裝車仍有差距\n- 與豐田、日產、三星 SDI 的固態電池時程相互印證：2026~2028 為關鍵商業化窗口\n\n## Related\n- [[concepts/電池技術路線]]\n- [[concepts/固態電池]]\n- [[entities/寧德時代]]"

    "geely-ihev-toyota-rivalry": {
      "title": "吉利 i-HEV 挑戰豐田 HEV 主權，AI 能量管理達 2.22 L/100km",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752406",
      "updated": "2026-04-17",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752406](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752406)\n\n# 吉利 i-HEV 挑戰豐田 HEV 主權，AI 能量管理達 2.22 L/100km\n\n**原文**：DIGITIMES／黃女瑛 ｜ **發布**：2026-04-17\n\n## 摘要\n吉利汽車推出全新 i-HEV（智慧油電混合）平台，以 AI 深度優化能量管理，海南島實測 Emgrand 達 2.22 L/100km，直接超越豐田 Prius 的 2.53 L/100km，顯示中國混動技術已到達與日系競爭的臨界點。\n\n## 關鍵數據\n\n| 指標 | 吉利 i-HEV | 豐田 Prius |\n|------|-----------|-----------|\n| 油耗 | **2.22 L/100km**（海南島實測）| 2.53 L/100km（2024 年）|\n| 優勢來源 | AI 中央能量管理 | 傳統 THS 混合系統 |\n| 量產狀態 | 已量產（Boyue L、Xingyue L）| 已量產 |\n\n## i-HEV 技術特點\n\n- **架構革新**：捨棄零散控制，首度將智駕 + 座艙 + 底盤整合為「單一中央大腦」\n- **AI 能量管理**：深度學習優化油電切換，突破傳統規則式系統\n- **BEV 駕感，無充電依賴**：對不想買 BEV 的消費者具吸引力\n\n## 吉利的動力多路並進策略\n\n- 不同於 BYD（捨棄燃油）或 Tesla（純電）的聚焦策略\n- 吉利：BEV + PHEV + HEV + 燃油車全線覆蓋\n- 2025 年全球銷量超越本田、日產，全球第 8\n\n## 對豐田的威脅程度\n\n- HEV 是豐田最堅固的護城河（THS 專利布局 30 年）\n- 吉利 i-HEV 2.22 L/100km 若得到大規模驗證，將使「日系省油」神話動搖\n- 但吉利尚無豐田的全球服務網與品牌信任度\n\n## Related\n- [[entities/吉利汽車]]\n- [[entities/豐田]]\n- [[concepts/地理市場/中國EV市場競爭格局]]\n- [[concepts/車輛類型/平價電動車市場]]\n- [[sources/gm-ford-q1-2026-sales]]"

      "title": "泰國電動皮卡市場：高油價催化 + 吉利 Riddara 組裝計畫（2026-05）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755021",
      "updated": "2026-05-13",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755021](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755021)\n\n# 泰國電動皮卡市場：高油價催化 + 吉利 Riddara 組裝計畫（2026-05）\n\n**原文**：Digitimes | 高盈穎｜**發布**：2026-05-13\n\n## 泰國油價漲幅\n\n| 時間 | 柴油價格（泰銖/公升）|\n|------|---------------------|\n| 2026-02-28（中東戰事爆發前）| 29.94 泰銖 |\n| 2026-05-05 | **40.80 泰銖**（+36.3%）|\n\n→ 高油價讓消費者主動轉向電動皮卡\n\n## 市場動態\n\n- 泰國工業聯合會（FTI）：商業車隊與一般消費者對純電皮卡需求同步上升\n- 純電皮卡 vs 燃油皮卡：**燃料成本低 + 維護成本低**\n- 電動皮卡在售市場玩家：吉利（Riddara）、江淮、上汽、NEX、五十鈴、豐田\n\n## 吉利 Riddara 計畫\n\n| 項目 | 細節 |\n|------|------|\n| 品牌 | **Riddara**（吉利旗下皮卡品牌）|\n| 海外首市場 | **泰國**（刻意選擇作為海外起點）|\n| 主力車型 | RD6 電動皮卡 |\n| 計畫 | **泰國在地組裝**（加速中） |\n\n## 限制因素\n\n- 泰國銀行因擔憂壞帳，近期收緊汽車貸款審核\n- 影響所有車款銷量，電動皮卡亦不例外\n\n## Related\n- [[concepts/地理市場/東南亞EV市場]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[entities/吉利汽車]]\n- [[sources/gwm-ora5-thailand-2026]]\n- [[sources/thailand-ev-market-2026]]"

    "germany-ev-incentive-2026": {
      "title": "德國新 EV 補貼通過立法關卡：BEV 最高 €6,000，PHEV 最高 €4,500",
      "url": "https://www.electrive.com/2026/04/17/germany-new-electric-car-incentive-clears-key-hurdle",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.electrive.com/2026/04/17/germany-new-electric-car-incentive-clears-key-hurdle](https://www.electrive.com/2026/04/17/germany-new-electric-car-incentive-clears-key-hurdle)\n\n# 德國新 EV 補貼通過立法關卡：BEV 最高 €6,000，PHEV 最高 €4,500\n\n**原文**：electrive.com／Sebastian Schaal ｜ **發布**：2026-04-17\n\n## 摘要\n德國聯邦議院通過《氣候中性移動促進法》，為新 EV 購車補貼建立法律框架。補貼依收入與家庭狀況分級，BEV 最高 €6,000，PHEV 最高 €4,500，適用於 2026 年起首次登記的車輛（可溯及），申請平台預計 2026 年 5 月上線。\n\n## 補貼結構\n\n### BEV 補貼（基本額）\n| 年度應稅所得 | 基本補貼 |\n|------------|---------|\n| ≤ €80,000 | €3,000 |\n| ≤ €60,000 | €4,000 |\n| ≤ €45,000 | €5,000 |\n\n**家庭加碼**：家中有 1 名未成年子女 +€500；2 名以上 +€1,000\n→ **最高可達 €6,000**（€5,000 基礎 + €1,000 子女加碼）\n\n### PHEV / 增程式補貼\n- 基本額：€1,500，最高：**€4,500**\n- 環保黨批評：PHEV 本質上仍燃油，納入補貼方向錯誤\n\n## 時程\n\n| 事件 | 時間 |\n|------|------|\n| 《氣候中性移動促進法》通過 | 2026-04 |\n| 申請平台上線 | 預計 2026 年 5 月 |\n| 補貼適用起始 | **2026-01-01**（可溯及）|\n\n## 市場現況（截至 2026-03）\n- 2026 年 3 月：德國電動車登記超過 70,000 輛，史上第三強月份\n- 每四輛新車中近一輛為電動車（25%）\n- VW 銷售長 Martin Sander：補貼申請平台尚未上線，目前成交量受抑\n\n## 政策背景\n- 德國原有 Umweltbonus 補貼（最高 €6,000）於 2023 年底突然取消，打擊市場\n- 新補貼設計：聚焦中低收入家庭，而非全面補貼 → 更具社會公平性\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/歐洲EV政策]]\n- [[sources/europe-battery-capacity-cuts]]\n- [[sources/sk-on-hungary-utilization]]"

    "global-ess-q1-2026": {
      "title": "全球 ESS Q1 2026 出貨量：195.5 GWh，年增 78%（2026-06-10）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=758081",
      "updated": "2026-06-10",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=758081](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=758081)\n\n# 全球 ESS Q1 2026 出貨量：195.5 GWh，年增 78%（2026-06-10）\n\n**原文**：DIGITIMES｜**作者**：蔡云瑄｜**發布**：2026-06-10\n\n## 摘要\nSNE Research 最新統計：2026 年第 1 季全球鋰離子電池儲能系統（ESS）出貨量達 **195.5 GWh**，年增 **78%**，顯示 ESS 已成為電動車需求放緩背景下，南韓電池廠商的核心新成長引擎。\n\n## 關鍵數據\n\n### 全球市場總覽\n\n| 指標 | 數值 |\n|------|------|\n| Q1 2026 全球 ESS 出貨 | **195.5 GWh（+78% YoY）** |\n| Q1 2025 比較基期 | 109.9 GWh |\n| 電網級比重 | 145.9 GWh（74.6%）|\n| 商用 ESS | 17.3 GWh（+74%）|\n| **家用 ESS** | **20.6 GWh（+209%，6.1%→10.6%）** |\n\n### 地區成長率\n\n| 地區 | YoY 成長 |\n|------|---------|\n| 其他地區 | +138% |\n| 歐洲 | +107% |\n| 北美 | +83% |\n| 中國 | +52% |\n\n- 中國市佔率：54.7%（2025 Q1）→ **46.7%**（2026 Q1）↓ — 非中國地區成長更快\n\n### 製造商排名（Q1 2026 ESS 出貨）\n\n| 排名 | 廠商 | Q1 2026 (GWh) | YoY | 市佔率 |\n|------|------|--------------|-----|--------|\n| 1 | **寧德時代（CATL）** | **58.4** | **+98%** | **29.9%**（↑3pp）|\n| 2 | 億緯鋰能 | 20.5 | — | 10.5% |\n| 3 | 海辰儲能 | 18.6 | ≈0% | 9.5%（↓7.3pp）|\n| 4 | 比亞迪 | 17.7 | — | — |\n| 5 | 中創新航 | 14.8 | — | — |\n| — | **LGES** | **5.3** | **+253%** | **2.7%**（↑1.3pp）|\n| — | **三星SDI** | **3.0** | **+34%** | **1.5%**（↓0.5pp）|\n\n- 家用 ESS：瑞浦蘭鈞以 32% 市佔領先\n\n## 分析重點\n\n### 南韓廠商策略轉折\n- EV 需求放緩 → 南韓廠商將 ESS 定位為「避震器」\n- LGES ESS +253%：憑借美國、歐洲市場擴張，成長動能強\n- 三星SDI +34%：低於市場平均成長（78%），市佔微降\n- SNE Research：預測 2026H2 南韓廠商 ESS 出貨量和市佔率可望上升\n\n### 家用 ESS 爆發（+209%）\n- 中東能源危機 + 太陽能裝設普及，帶動家用儲能需求\n- 歐洲「自發自用」模式加速滲透\n\n## Related\n- [[concepts/儲能市場]]\n- [[concepts/電池技術路線]]\n- [[entities/寧德時代]]\n- [[entities/LGES]]\n- [[entities/三星SDI]]"
    },

      "title": "伊朗戰火推升油價，全球 EV 需求 4 月再成長（2026-05 分析）",

      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755401](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=755401)\n\n# 伊朗戰火推升油價，全球 EV 需求 4 月再成長（2026-05 分析）\n\n**原文**：DIGITIMES | 楊智家｜**發布**：2026-05-15\n**數據來源**：Benchmark Mineral Intelligence（BMI），5 月 13 日報告\n\n## 全球 EV 需求（2026 年 4 月）\n\n| 指標 | 數值 |\n|------|------|\n| 全球 EV 登記量 | **160 萬輛**（BEV+PHEV）|\n| YoY | **+6%** |\n| MoM（vs 3 月歷史高點）| -9%（季節性回落）|\n\n三大成長驅動：政府補貼、高汽油價格、中國品牌全球擴張。\n\n## 區域分化\n\n| 地區 | 2026 年 4 月表現 |\n|------|----------------|\n| **歐洲**（取代北美成最強引擎）| +27%，40 萬輛 |\n| 德國 YTD | +33% |\n| 法國 YTD | +36% |\n| 義大利 | 在政府補貼下近乎翻倍 |\n| **北美** | **-28%**（稅收抵免終止 + 碳排標準放寬）|\n| 墨西哥 | +50%（中國品牌湧入）|\n\n## 中國出口爆炸\n\n- 2026 年 4 月中國 EV 出口量：**>40 萬輛**\n- 2026 年前 4 個月累計：**≈140 萬輛**（vs 2025 同期翻倍 +100%）\n- 歐盟加徵關稅後，中國品牌歐洲市占仍從 19% 升至 **22%**\n\n## 在地化轉型\n\n中國車廠從「出口」轉「在地製造」：\n- 比亞迪 → 匈牙利廠擴產\n- 小鵬 → 奧地利在地組裝\n- 零跑 × Stellantis → 西班牙薩拉戈薩廠\n\n## Related\n- [[concepts/地理市場/中國EV出海策略]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/地理市場/北美EV關稅與政策]]\n- [[sources/china-nev-april-involution-2026]]\n- [[sources/oil-price-ev-acceleration]]"

      "body": "**來源**：InsideEVs / electrive / Digitimes（2026-06-09~11）\n\n# GM 電池多元化戰略：鈉離子 + 二次利用 + LMR（2026-06）\n\n2026 年 6 月，通用汽車（GM）集中發布三項電池相關戰略，勾勒出其「一個化學品無法滿足所有應用」的多元電池路線。\n\n## 一、GM × Peak Energy：鈉離子電池攻 AI 儲能\n\n| 指標 | 數值 |\n|------|------|\n| 合作方 | 美國新創 Peak Energy Technologies |\n| 投資方 | GM Ventures（已取得股權）|\n| 產品定位 | 電網級固定式儲能（非EV用）|\n| 開發進程 | 2026 年材料/組件研發 → 密西根廠原型 → 2028 年後供貨 |\n| Peak Energy 規模 | 2026 年營收 $1,000 萬，積壓訂單 $11 億；預計 2027 年增至 $1 億 |\n\n**鈉離子 vs LFP 優勢**：\n- 鈉的豐度為鋰的 1,000 倍，成本遠低\n- 無需主動冷卻（降低系統複雜度）\n- 更寬溫度範圍，更長循環壽命\n- Peak Energy：全球首款被動冷卻電網級鈉離子 BESS（科羅拉多州）\n\n> GM 副總裁 Kurt Kelty：「我們相信鈉離子將成為電網儲能的定義性化學品。」\n\n## 二、GM × Redwood Materials：EV 電池二次利用\n\n| 指標 | 數值 |\n|------|------|\n| 密西根部署 | 100 組 GM EV 電池包 → **1.5 MW / 7.2 MWh** |\n| 場所 | GM 密西根製造廠（降低廠區電費）|\n| 節省金額 | 系統生命週期省電費 **>$300 萬** |\n| Redwood 累積回收 | 來自 GM + Ultium Cells > **28,000 噸** 電池材料 |\n| 待二次利用 | **10,000 組** GM 電池包（用於 Crusoe AI 資料中心等）|\n\n- **Crusoe（AI 基礎設施）**：Redwood 為其建立世界最大退役 EV 電池 BESS + 北美最大微電網（內華達 Sparks）\n- GM 成為首家與 Redwood 跨越**完整電池生命週期**的車廠：製造廢料回收 → 退役二次利用 → 原料回收 → 新電池用\n\n## 三、GM LMR 電池：考慮取代 LFP\n\n| 化學品 | 能量密度 | 成本 | 主要優勢 |\n|--------|----------|------|----------|\n| LFP | 中 | 低 | 成熟、中國主導、耐久 |\n| **LMR（鋰錳富化）** | **LFP +33%** | **相當** | 低依賴稀有金屬 + 密度優勢 |\n| NMC | 高 | 高 | 旗艦車款用 |\n\n- GM 電池主管 Kurt Kelty：「LFP 有可能不進入我們的產品組合」\n- GM 已開發 LMR 超過 **10 年**；視為未來高產量 EV 的「主力電池（workhorse）」\n- GM + LGES 計畫 2028 年在**美國量產 LMR 方形電芯**（S&P Global）\n- **例外**：2027 款 Chevy Bolt 仍採 LFP（現有庫存），Bolt 停產前不換\n- Ford 也在平行開發 LMR，理由相同\n\n**背景**：GM 本計劃 2025 年生產 100 萬輛 EV，實際 2025 年美國僅賣 17 萬輛。電池產能過剩→急轉方向，Ultium Cells 田納西廠已投入 $7,000 萬改做 LFP 儲能電池（ESS 市場）。\n\n## 三項戰略合併解讀\n\n| 應用 | 化學品 | 時程 |\n|------|--------|------|\n| 電網儲能（長期）| 鈉離子 | 2028 年後 |\n| EV 退役電池再利用 | 各型（已生產）| 2026 當下 |\n| 未來大量 EV 電池 | LMR | 2028 年量產目標 |\n\nGM 論述：「不同應用需要不同電池，沒有單一化學品是最佳解。」\n\n## Related\n- [[concepts/儲能市場]]\n- [[concepts/電池技術路線]]\n- [[concepts/美國EV市場與政策]]\n- [[entities/通用汽車]]\n- [[sources/global-ess-q1-2026]]\n- [[sources/ford-energy-dc-block-2026]]"

    "gm-ev-delay-detroit-three": {
      "title": "底特律三雄電動化倒退：GM 延後次代電動卡車，Orion 廠重返 ICE",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753014&grid_seq1=&grid_seq2=",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753014&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=753014&grid_seq1=&grid_seq2=)\n\n# 底特律三雄電動化倒退：GM 延後次代電動卡車，Orion 廠重返 ICE\n\n**原文**：Digitimes（黃女瑛）/ electrive.com ｜ **發布**：2026-04-22~23\n\n## 摘要\n通用汽車（GM）正式宣布無限期延後次代全尺寸電動皮卡/SUV 計畫，原定 2028 年推出的新世代延至 **2030 年以後**。Orion Assembly 工廠從電動車生產線改回燃油卡車。底特律三雄整體向 ICE 與 EREV 重新傾斜。\n\n## GM 具體動作\n\n| 項目 | 內容 |\n|------|------|\n| 延後車型 | GMC Hummer EV Pickup/SUV、Cadillac Escalade IQ、Chevrolet Silverado EV、GMC Sierra EV |\n| 原定時間 | 2028 年 |\n| 新時程 | **2030 年以後**（無限期延後）|\n| Factory Zero | 2026 年 3 月中停產 4 週（1,300 名員工強制休假）；近期召回復職但前景不明 |\n| Orion Assembly | 原電動車計畫 → **改回燃油卡車生產**，預計新增 2,000 個工作機會 |\n| 損失規模 | 認列電動車業務減損 **>70 億美元** |\n\n## EREV 作為折衷路線\n\n- GM 正與供應鏈討論導入**增程型電動（EREV）**技術\n- EREV：電力驅動為主 + 小型燃油引擎補能，解決續航焦慮\n- GM 現階段僅**觀望**，確保 BEV 平台具彈性（可重新整合燃油引擎）\n\n**競爭對手 EREV 時程：**\n\n| 品牌 | EREV 時程 |\n|------|---------|\n| Ram（Stellantis）| 2027 年 |\n| Ford | 2029 年 |\n| GM | 尚未確認 |\n\n## 底特律三雄整體策略調整\n\n- **主因**：Trump 政府放寬排放法規 + 削減 EV 補貼 → 燃油車獲得更長生存空間\n- **共同策略**：優先鞏固燃油車業務，維持獲利與現金流\n- **Ford**：EV 部門（Model e）持續虧損，已重組、Doug Field 離職\n- **Stellantis**：尋求中國 OEM 合作分攤電動化成本\n\n## 市場意義\n- 底特律三雄「全電優先」策略正式轉向\n- EREV 成 BEV 過渡期折衷方案，Ram 2027 年率先落地\n- GM 大量資產減損顯示美國 EV 市場投資回報遠不如預期\n- 中國與歐洲車廠持續推進 BEV，形成策略分歧\n\n## Related\n- [[entities/通用汽車]]\n- [[entities/福特]]\n- [[entities/Stellantis]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[sources/ford-ev-restructure-doug-field]]\n- [[sources/gm-ford-q1-2026-sales]]"

    "gm-ford-q1-2026-sales": {
      "title": "GM、Ford Q1 2026 美國 EV 銷量重挫；豐田 bZ 翻倍逆勢成長",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751413&grid_seq1=&grid_seq2=",
      "updated": "2026-04-08",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751413&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751413&grid_seq1=&grid_seq2=)\n\n# GM、Ford Q1 2026 美國 EV 銷量重挫；豐田 bZ 翻倍逆勢成長\n\n**原文**：DIGITIMES／江仁傑｜**發布**：2026-04-08\n\n## 摘要\n2026 年 Q1 美國 EV 市場低迷，GM 年減 19%、Ford 年減 70%；豐田 bZ 系列翻倍，以高性價比與 NACS 規格突圍。\n\n## Q1 2026 美國 EV 銷量\n\n| 品牌 | Q1 2026 | 年增減 |\n|------|---------|--------|\n| Tesla（估）| 122,196 輛 | -5% |\n| GM | 25,900 輛 | -19% |\n| 豐田 bZ 系列 | ~10,000 輛 | +79% |\n| 豐田總電動 | 14,498 輛 | 翻倍 |\n| Ford | 6,869 輛 | -70% |\n\n## 豐田成功因素\n- 起售價維持 $34,900，但續航提升最高 25%\n- 全面支援 NACS（北美充電標準）\n- 提供給經銷商的 EV 促銷獎勵金高於油電車\n\n## 豐田擴張計畫\n- 2026 年起將美國純電車型擴充至 6 款\n- Subaru：2026 年起在美推出 4 款共同開發純電車型\n\n## 背景因素\n- Trump 政策：EV 補貼縮減\n- 伊朗戰爭推升油價，間接提高 EV 吸引力\n\n## Related\n- [[entities/豐田]]\n- [[entities/通用汽車]]\n- [[entities/福特]]\n- [[entities/Tesla]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/NACS充電標準]]"

      "title": "廣州增芯延攬洪啟財、Marco Monti，強化車用晶片布局",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751352&grid_seq1=&grid_seq2=",
      "updated": "2026-04-08",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751352&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751352&grid_seq1=&grid_seq2=)\n\n# 廣州增芯延攬洪啟財、Marco Monti，強化車用晶片布局\n\n**原文**：DIGITIMES／林佑真｜**發布**：2026-04-08\n\n## 摘要\n中國本土車用半導體晶圓廠廣州增芯宣布新管理層，引進 GlobalFoundries 前亞洲區總裁洪啟財與意法半導體前車用主管 Marco Monti，象徵其從本土走向國際化。\n\n## 新管理層分工\n| 人物 | 背景 | 職位 | 側重 |\n|------|------|------|------|\n| 洪啟財（KC Ang）| GlobalFoundries 亞洲區總裁、中國區董事長；40 年+ 半導體資歷 | 總經理 | 內部營運/製造體系 |\n| Marco Maria Monti | 意法半導體汽車電子業務（2024 離職）| 聯席總經理 | 外部市場/產品策略 |\n\n## 增芯技術方向\n- **主攻**：12 吋 MEMS 智慧感測器、特色製程（車用/工業）\n- **目標**：ADAS、智慧駕駛、車身感測需求\n\n## 戰略意涵\n國際資深人才加入 → 補強中美科技管制下的人才空缺，提升切入國際車用供應鏈的能力。\n\n## Related\n- [[concepts/基礎設施與供應鏈/車用半導體供應鏈]]\n- [[concepts/中國車用半導體]]"

    "gwm-ora03-uk-exit": {
      "title": "GWM／ORA 03 退出英國市場（2026-04）",
      "url": "https://www.electrive.com/2026/04/25/gwm-discontinues-ora-03-electric-hatchback-in-the-uk",
      "updated": "2026-04-25",
      "body": "**來源**：[https://www.electrive.com/2026/04/25/gwm-discontinues-ora-03-electric-hatchback-in-the-uk](https://www.electrive.com/2026/04/25/gwm-discontinues-ora-03-electric-hatchback-in-the-uk)\n\n# GWM／ORA 03 退出英國市場（2026-04）\n\n**原文**：electrive.com／Carla Westerheide｜**發布**：2026-04-25\n\n## 摘要\n長城汽車（GWM）宣布停止在英國銷售 ORA 03（原名 ORA Funky Cat），原因是銷量持續低迷。公司將以 Haval 品牌 SUV 在 2026 年中重新布局歐洲市場。\n\n## 銷售數據\n\n| 時期 | 英國登記量 |\n|------|-----------|\n| 2025 全年 | **542 輛** |\n| 2026 Q1 | **26 輛** |\n\n## 背景\n\n- 原名 Funky Cat，2022 年進入英國（定價 £25,000~33,000）\n- 競品：VW ID.3、MG4 Electric、Renault Zoe\n- 多次更新與改款均無法扭轉銷售頹勢\n\n## 後續計畫\n\n- 現有庫存車仍可購得，售後服務繼續提供\n- GWM 歐洲策略重組：**2026 年中推出以 Haval 品牌 SUV 為主**的新陣容\n- 另外評估 Wey 與 Tank 品牌進入英國的可能性\n\n## 意義\n\n- 中國品牌進歐洲的挑戰：以錯誤車型（掀背車而非 SUV）切入，加上充電速度與性價比不足\n- 對比奇瑞 Jaecoo 7（2026 年 3 月英國月銷冠軍）的成功，說明 **SUV 才是中國品牌進歐的正確切入點**\n- Honda e:Ny1（歐洲 5 國退出）與 GWM/ORA（英國退出）均是 2026 年市場結構性淘汰的案例\n\n## Related\n- [[concepts/地理市場/歐洲EV市場]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[sources/honda-eny1-withdrawal-europe]]\n- [[sources/uk-germany-ev-market-dynamics-2026]]"

    "gwm-ora5-thailand-2026": {
      "title": "GWM Ora 5 泰國量產啟動（2026-05）",
      "url": "https://www.electrive.com/2026/05/11/gwm-starts-production-of-the-ora-5-in-thailand",
      "updated": "2026-05-12",
      "body": "**來源**：[https://www.electrive.com/2026/05/11/gwm-starts-production-of-the-ora-5-in-thailand](https://www.electrive.com/2026/05/11/gwm-starts-production-of-the-ora-5-in-thailand)\n\n# GWM Ora 5 泰國量產啟動（2026-05）\n\n**原文**：electrive | Sagar Parikh｜**發布**：2026-05-11\n\n## 核心事件\n\n長城汽車（GWM）旗下品牌 Ora 在泰國 Rayong 廠開始量產 Ora 5，這是 Ora 品牌首款緊湊型 SUV 的海外量產。\n\n## 產品規格\n\n| 規格 | 數值 |\n|------|------|\n| 車型 | Ora 5（前身 Ora 03 / Good Cat / Funky Cat 的 SUV 版升級）|\n| 車身尺寸 | 4,471 × 1,833 × 1,641 mm，軸距 2,720 mm |\n| 動力 | 150 kW / 260 Nm 永磁同步電機 |\n| 電池 | 58.3 kWh LFP |\n| 充電 | AC 6.6 kW / DC 120 kW |\n| NEDC 續航 | 520 km（WLTP 約 435 km）|\n| 泰國起售價（EV） | 649,000 泰銖（~€17,000），政府補貼前 |\n| 泰國起售價（HEV） | 709,000 泰銖（~€18,600）|\n\n- 泰國市場只提供 EV 和 HEV，**不提供純燃油版**\n\n## 泰國工廠\n\n| 項目 | 細節 |\n|------|------|\n| 地點 | Pluak Daeng, Rayong（2021 年 6 月啟用）|\n| 年產能 | 80,000 輛（ICE + HEV + EV 混線生產）|\n| 本地化率 | 約 50% |\n| 市場分配 | 60% 泰國內銷 + 40% 出口 |\n\n## 市場表現與前景\n\n- 泰國已有 5,000 輛預訂，5–6 月交付\n- 歐洲市場：計畫 2026 年夏季以 ICE + HEV + EV 三版本進入\n- 歐洲工廠選址：西班牙和匈牙利均在考慮中（GWM 國際總裁 Parker Shi）\n\n## Related\n- [[concepts/地理市場/東南亞EV市場]]\n- [[concepts/地理市場/中國EV出海策略]]\n- [[entities/長城汽車]]\n- [[sources/thailand-ev-market-2026]]"

      "url": "https://www.electrive.com/2026/04/23/500-city-buses-have-already-been-electrified-hendryk-munster-hamburger-hochbahn",
      "updated": "2026-05-12",
      "body": "**來源**：[https://www.electrive.com/2026/04/23/500-city-buses-have-already-been-electrified-hendryk-munster-hamburger-hochbahn](https://www.electrive.com/2026/04/23/500-city-buses-have-already-been-electrified-hendryk-munster-hamburger-hochbahn)\n\n# Hamburg Hochbahn：500 輛電動巴士電動化里程碑（2026）\n\n**原文**：electrive.com／Carla Westerheide｜**發布**：2026-04-23\n\n## 摘要\n漢堡交通公司 Hamburger Hochbahn 已完成約 **500 輛**城市巴士的電動化（占全車隊 1,200 輛的 ~42%），成為歐洲大規模電動巴士部署的標竿案例。其電池儲能整合、能源市場參與等模式具有重要參考價值。\n\n## 關鍵數據\n\n| 指標 | 數值 |\n|------|------|\n| 電動巴士在線 | **~500 輛** / 1,200 輛總車隊（~42%）|\n| 電動化停車位（2026 年底目標）| **>750 個** |\n| 推進電動化年資 | **~10 年**（Hendryk Münster 負責）|\n\n## 電池儲能策略（關鍵創新）\n\n- 固定式電池儲能系統（來自 KoLa 研究計畫，已進入日常運營）\n- 功能：\n  1. 穩定場站充電負荷\n  2. **參與能源市場**（削峰填谷獲利）\n  3. 優化能源採購策略\n\nMünster：「目前技術水準下，電池儲能是必須考慮的元素，我們可以以有利的方式運作，對電網有明確正面效果。」\n\n## 為何偏好固定儲能而非 V2G\n\n> 「我們的核心任務是運送乘客從 A 到 B。這些車輛針對路線運行優化，主要不是用於雙向充電。固定式電池儲能可 24/7 使用，具備顯著更大的潛力。」\n> — Hendryk Münster, Hamburger Hochbahn\n\n**意義**：這是大型巴士業者對「固定儲能 vs. V2G」的明確態度表態，與乘用車 V2G 風潮形成對比。\n\n## 對其他業者的建議\n\n「與你的電力供應商充分溝通，一起找解決方案，大膽行動。」\n\n## 未來願景\n\n- 場站將更深度整合進城市整體能源網絡\n- 能源管理效率、充電技術、能源傳輸效率都將大幅優化\n\n## 最新進展：再採購 240 輛，目標 2031 年（2026-05）\n\n| 項目 | 數值 |\n|------|------|\n| 目前在線電動巴士 | **432 輛**（全車隊 ~39%）|\n| Mercedes eCitaro 訂單 | 350 輛，2030 年底前交付 |\n| **新增採購** | **240 輛**，2031 年到位 |\n| HVO 轉換計畫 | 2026 年 1 月起，內燃機巴士逐步改用 HVO 燃料（過渡措施）|\n\nCEO Robert Henrich：「我們的方向明確：持續推進車隊電動化。同時，我們有責任確保公共交通在特殊情況下仍穩定、靈活、可靠。」\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[concepts/基礎設施與供應鏈/充電基礎建設]]\n- [[syntheses/電動巴士產業全景]]"

    "hanoi-1000-bss-2026": {
      "title": "河內將建 1,000 座換電站：LGES × Honda × 河內市全面擴張計畫",
      "url": "https://www.electrive.com/2026/05/21/hanoi-to-get-1000-battery-swapping-stations",
      "updated": "2026-05-22",
      "body": "**來源**：[https://www.electrive.com/2026/05/21/hanoi-to-get-1000-battery-swapping-stations](https://www.electrive.com/2026/05/21/hanoi-to-get-1000-battery-swapping-stations)\n\n# 河內將建 1,000 座換電站：LGES × Honda × 河內市全面擴張計畫\n\n**原文**：electrive.com，2026-05-21\n**作者**：Carla Westerheide\n\n## 摘要\n\n繼 2026 年 5 月初的 50 站試點 MOU 後，更完整的計畫揭露：LGES、Honda、河內市三方將於 Q3 2026 啟動 50 座試點站，之後擴張至 **2027 年 Q3 達到 1,000 座換電站**，覆蓋河內全境。\n\n## 完整時程與規模\n\n| 階段 | 時間 | 規模 |\n|------|------|------|\n| 試點啟動 | **Q3 2026** | ~50 座換電站 + ~500 輛電動機車 |\n| 試點地點 | 河內市中心 Hoan Kiem 區（首批限制 ICE 機車路段）| |\n| 全面擴張 | **Q3 2027 起** | **1,000 座換電站**，覆蓋河內全境 |\n\n## 各方角色\n\n| 合作方 | 職責 |\n|--------|------|\n| **LG Energy Solution** | 2170 圓柱電池供應；電池安全管理；換電站運營；電池生命周期管理 |\n| **Honda** | 提供電動機車、電池組、換電機器設備 |\n| **河內市政府** | 許可協調、政策實施；支援低排放區規劃 |\n\n## 越南市場背景\n\n| 指標 | 數值 |\n|------|------|\n| 越南機車保有量 | **~8,000 萬輛** |\n| 電動機車占比 | **~4%**（~320 萬輛）|\n| Honda 越南市占率 | **86%** |\n| 河內在冊車輛 | **~800 萬輛** |\n\n**關鍵政策**：河內 2026-07-01 起在 Ring Road 1 內分時段、分區域限制 ICE 機車進入 → 2030 年前擴大範圍\n\n## 與 [[sources/lges-honda-vietnam-bss-2026]] 關係\n\n本文件為同一計畫的擴充版本，揭露 1,000 站的全市覆蓋目標（前一篇僅覆蓋 50 站試點 MOU 細節）。\n\n## Related\n- [[concepts/東南亞EV市場]]\n- [[concepts/充電基礎建設]]\n- [[entities/LGES]]\n- [[sources/lges-honda-vietnam-bss-2026]]"

      "title": "禾賽科技 EXT：全球首款顏色辨識 LiDAR（2026-04-20）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752689",
      "updated": "2026-05-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752689](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752689)\n\n# 禾賽科技 EXT：全球首款顏色辨識 LiDAR（2026-04-20）\n\n**原文**：Digitimes（李佶璋）/ Reuters｜**發布**：2026-04-20\n\n## 摘要\n中國 LiDAR 大廠禾賽科技（Hesai）發布 EXT 感測器，搭載自研「畢卡索（Picasso）」晶片，整合空間測距與顏色偵測，為全球首款能辨識顏色的 LiDAR，預計 2027 年搭載旗艦車型。\n\n## 技術規格\n\n| 項目 | 細節 |\n|------|------|\n| 型號 | **EXT** |\n| 核心晶片 | **Picasso**（禾賽自研）|\n| 技術突破 | 整合空間測距 + **顏色偵測**（全球首款）|\n| 主要應用 | 紅綠燈顏色辨識 → 提升自駕精確度與安全性 |\n| 量產時程 | **2027 年**（搭載旗艦車型）|\n\n## 禾賽市場地位（2025）\n\n| 指標 | 數值 |\n|------|------|\n| 中國市場份額 | **>40%** |\n| 主要客戶 | 理想汽車、小米、比亞迪 |\n| 國際客戶 | **NVIDIA**（ADAS 核心供應商）|\n\n## 策略意義\n\n- **從成本競爭轉向價值創新**：禾賽 CEO 李一帆：「若只追求低價，將犧牲創造更高價值的創新機會」\n- LiDAR vs 純視覺爭議：Tesla / 小鵬偏好純視覺 AI；禾賽認為 LiDAR 仍有成長空間\n- **延伸應用**：Kosmo 手持設備 → 人形機器人 + 具身智慧（Embodied AI）\n\n## Related\n- [[concepts/電池與技術/ADAS智駕系統]]\n- [[entities/比亞迪]]"

      "title": "本田 70 年來首次年虧損：$90 億損失，全面押注油電混動（2026-05）",
      "url": "https://insideevs.com/news/795846/honda-loss-hybrids",
      "updated": "2026-05-16",
      "body": "**來源**：[https://insideevs.com/news/795846/honda-loss-hybrids](https://insideevs.com/news/795846/honda-loss-hybrids)\n\n# 本田 70 年來首次年虧損：$90 億損失，全面押注油電混動（2026-05）\n\n**原文**：InsideEVs | Iulian Dnistran｜**發布**：2026-05-14\n\n## 核心事件\n\n本田（Honda）公布 FY2026（截至 2026 年 3 月）財報，錄得近 **70 年來首次年度虧損**，原因是豪賭 EV 策略失敗後承認 **$90 億（美元）資產減損**。\n\n## 財務影響\n\n| 項目 | 數值 |\n|------|------|\n| 年度虧損（FY2026）| 首次年度淨虧損（自上市以來）|\n| EV 策略損失 | **~$90 億美元** |\n| 主要減損項目 | Honda 0 Series 平台（三款車型全取消）+ 加拿大 EV 工廠 |\n\n## 取消的 EV 計畫\n\n| 項目 | 說明 |\n|------|------|\n| Honda 0 Series 平台 | 客製化 EV 平台，衍生三款車：0 Series SUV、Saloon、Acura RSX |\n| 結果 | **三款全取消**，一輛未交付 |\n| 加拿大 EV 工廠 | $110 億加元計畫**無限期暫停** |\n\n同時放棄的長期目標：\n- **2030 年 EV 佔銷量 20%** 目標取消\n- **2040 年純電 / 燃料電池全面轉型** 目標取消\n\n## 混動轉型策略\n\n| 項目 | 細節 |\n|------|------|\n| 混動投資（未來 3 年）| **4.4 兆日圓（~$280 億美元）**（用於燃油車 + 混動）|\n| EV 未來發展預算 | 僅 **$50 億美元** |\n| 新混動平台首款車 | **2028 年**上市 |\n| 效率目標 | 「全球最高效動力系統」（比 2023 系統提升 10%+）|\n| 首款車型 | 四門 Honda 轎車 + Acura 跨界車（均為 SUV AWD 優先，美國市場）|\n| 2030 年目標 | 推出 **15 款**混動車型 |\n\n## 未來展望\n\n- CEO 認為純電未來「不切實際」（\"not realistic\"）\n- 預計 2026 年底恢復獲利（摩托車業務 + 削減成本支撐）\n- CEO Toshihiro Mibe：加拿大 EV 工廠即使 EV 需求反彈，地緣政治（美加關稅）也令廠址存疑\n\n## Related\n- [[entities/本田]]\n- [[concepts/美國EV市場與政策]]\n- [[concepts/北美EV關稅與政策]]\n- [[sources/honda-canada-ev-freeze-2026]]"
    },
    "honda-canada-ev-freeze-2026": {
      "title": "本田凍結加拿大 EV 工廠計畫，GM 合作 Prologue 亦停產（2026-05-06）",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754334",
      "updated": "2026-05-12",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754334](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=754334)\n\n# 本田凍結加拿大 EV 工廠計畫，GM 合作 Prologue 亦停產（2026-05-06）\n\n**原文**：Digitimes（江仁傑）/ Nikkei｜**發布**：2026-05-06\n\n## 摘要\n本田宣布無限期凍結加拿大安大略省電動車 + 電池工廠建設計畫（原總投資 CAD 150 億，年產 24 萬輛）。與 GM 合作的 Prologue 電動車也將於 2026 年下半停產。本田在美國暫時將陷入「無電動車」空窗期。\n\n## 加拿大工廠計畫凍結\n\n| 項目 | 細節 |\n|------|------|\n| 工廠地點 | 安大略省（Ontario）|\n| 原計畫投產時間 | 最快 2028 年（2025 年已延後 2 年）|\n| 年產能 | **24 萬輛電動車** |\n| 總投資額 | **CAD 150 億**（~USD 108 億）|\n| 現況 | **無限期凍結**（已取得土地，加拿大政府補助已議定）|\n\n- 本田判斷短期市況難以好轉，已開始與加拿大政府協調\n- 不排除「完全撤回」計畫的可能性\n\n## GM × 本田 Prologue 停產\n\n- **Prologue**（2024 年上市，GM 平台 + 本田品牌）\n- 預計 **2026 年下半停產**，庫存售完即止\n- 經銷商銷售獎金負擔日益沉重\n- 停產後，**本田美國產品線將暫時出現無電動車空窗**\n\n## 本田策略調整\n\n- 美國 Ohio 工廠（已投資 USD 10 億）：燃油車 + HEV + EV 可共線生產\n- 轉向：**HEV + 燃油車為主**，EV 計畫全面後退\n- 原定 2026 年起北美銷售 3 種電動車的計畫已告停\n\n## 更新：完全撤退風險 + 全北美 EV 計畫崩潰（2026-05-11）\n\nelectrive 後續報導（Nikkei Asia）揭示本田北美 EV 戰略已全面潰退：\n\n| 項目 | 狀態 |\n|------|------|\n| 加拿大 EV+電池廠 | **無限期暫停**，與加拿大政府協商中 |\n| Sony Honda Mobility / Afeela | **合資解散**，完成度接近 100% 的首款車取消上市 |\n| Honda「0 Series」北美款 | **喊停** |\n| Acura ZDX（GM 合作）| 已停產，清倉中 |\n| Honda Prologue（GM 合作）| 2026 年下半停產 |\n\n→ 本田目前**在美國無任何 BEV 車型**（空窗期）\n\n**關鍵判斷**：「本田領導層不再相信美國 EV 市場短期復甦」\n\n即使未來 EV 需求反彈，美加關係緊張也令加拿大廠址存疑。\n\n**本田全球策略轉向**：削減電動化與軟體投資，為北美重新制定策略，聚焦 HEV。\n\n## Related\n- [[entities/本田]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[concepts/地理市場/北美EV關稅與政策]]"
    },
    "honda-eny1-withdrawal-europe": {
      "title": "Honda e:Ny1 撤出多個歐洲市場：EV 策略退縮再添一例",
      "url": "https://www.electrive.com/2026/04/17/honda-withdraws-eny1-from-multiple-markets",
      "updated": "2026-04-21",
      "body": "**來源**：[https://www.electrive.com/2026/04/17/honda-withdraws-eny1-from-multiple-markets](https://www.electrive.com/2026/04/17/honda-withdraws-eny1-from-multiple-markets)\n\n# Honda e:Ny1 撤出多個歐洲市場：EV 策略退縮再添一例\n\n**原文**：electrive.com／Sebastian Schaal ｜ **發布**：2026-04-17\n\n## 摘要\nHonda e:Ny1（2023 年上市的歐洲市場緊湊型電動 SUV）已從英國、德國、義大利、西班牙、瑞士的官網下架，事實上宣告停售。2025 年德國銷量僅 105 輛，顯示市場反應極差。\n\n## 銷售數據\n\n| 年份 | 德國銷量 |\n|------|---------|\n| 2023（限量供應）| 266 輛 |\n| 2024 | 795 輛 |\n| 2025 | **105 輛**（幾乎消亡）|\n\n## 失敗原因分析\n\n| 問題 | 細節 |\n|------|------|\n| 定價過高 | 德國上市 €47,590，後降至 €38,990，仍未吸引消費者 |\n| 技術規格保守 | 電機用 Vitesco EMR3（而非已發布的更新 EMR4）|\n| 充電慢 | 10–80% 需 45 分鐘 |\n| 續航一般 | WLTP 412 km（2023 年標準已不具競爭力）|\n| 競爭激烈 | 同級：VW ID.3、Cupra Born、Stellantis BEV、MG 等強敵 |\n\n## 尚可購買的市場\n法國、奧地利仍可設定配車\n\n## 與 Honda 整體 EV 策略的關係\n- 本田 FY2025 預估虧損 690 億日圓，取消多個北美 EV 計畫（參見 [[sources/honda-strategy-correction-2026]]）\n- e:Ny1 歐洲撤退 + Super One（日本小型 EV）是本田「EV 策略重整」的縮影\n- 本田在歐洲幾乎沒有有競爭力的純電產品\n\n## Related\n- [[entities/本田]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/honda-strategy-correction-2026]]\n- [[sources/honda-super-one-byd-rakko]]"
    },
    "honda-exits-korea-2026": {
      "title": "Honda 宣布 2026 年底退出韓國四輪汽車市場",
      "url": "https://www.cna.com.tw/news/afe/202604230255.aspx",
      "updated": "2026-04-23",
      "body": "**來源**：[https://www.cna.com.tw/news/afe/202604230255.aspx](https://www.cna.com.tw/news/afe/202604230255.aspx)\n\n# Honda 宣布 2026 年底退出韓國四輪汽車市場\n\n**原文**：中央社｜**發布**：2026-04-23\n\n## 摘要\n本田（Honda）宣布於 2026 年底終止在韓國的四輪汽車銷售，結束長達 22 年的韓國汽車業務。2025 年年銷量僅 1,951 輛、市占率不足 1%。退出後仍維持機車業務（日本品牌在韓機車市占第一）。\n\n## 核心數據\n\n| 指標 | 數值 |\n|------|------|\n| 韓國業務年資 | **22 年** |\n| 現有車款 | Accord + CR-V（兩款）|\n| 2025 全年銷量 | **1,951 輛** |\n| 2025 市占率 | **< 1%** |\n| 機車累計銷量 | **42.06 萬輛（市占率第一）** |\n\n## 退出理由\n\n- 市場環境變化 + 匯率波動\n- 將資源集中於競爭力更強的**機車業務**\n\n## 韓國 EV 市場背景\n\n- 韓國 EV 累計登記量突破 **100 萬輛**\n- 市場前三名：Hyundai + Kia + Tesla（合計市占 **78.4%**）\n- 中國電動車品牌加速進入韓國市場，形成新一輪洗牌壓力\n- Honda 無電動乘用車競爭產品 → 與退出歐洲 5 國（e:Ny1）邏輯相同\n\n## 對比：Honda 的多市場退縮模式\n\n| 市場 | 退縮內容 | 時間 |\n|------|---------|------|\n| 歐洲（5 國）| e:Ny1 退出英/德/義/西/瑞 | 2026-04 |\n| 韓國 | 四輪汽車全面退出 | 2026 底 |\n| 北美 | 取消多個 EV 計畫 | 2026 |\n| 全球 | FY2025 預估虧損 690 億日圓 | — |\n\n## Related\n- [[entities/本田]]\n- [[concepts/地理市場/歐洲EV市場]]\n- [[sources/honda-eny1-withdrawal-europe]]\n- [[sources/honda-strategy-correction-2026]]"

    "honda-gachaco-battery-swap": {
      "title": "本田增資 Gachaco，持股升至 47%，強化電動機車電池交換布局",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751131&grid_seq1=&grid_seq2=",
      "updated": "2026-04-08",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751131&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751131&grid_seq1=&grid_seq2=)\n\n# 本田增資 Gachaco，持股升至 47%，強化電動機車電池交換布局\n\n**原文**：DIGITIMES／范仁志｜**發布**：2026-04-08\n\n## 摘要\n本田（Honda）於 2026 年 4 月 1 日宣布再度投資 Gachaco，連同鈴木、山葉共追加 4.4 億日圓，本田持股升至 47%，將 Gachaco 納入集團子公司。\n\n## Gachaco 背景\n- **成立**：2022 年，由 ENEOS（51%）、本田（34%）、鈴木、山葉、川崎共同創立\n- **業務**：電動機車電池交換站建設與服務\n- **現況**：主要集中東京、大阪，後續拓展地方城市\n\n## 增資規模\n- 本田：3.4 億日圓（約 214 萬美元）→ 持股升至 47%\n- 本田+鈴木+山葉：合計追加 4.4 億日圓\n\n## 戰略背景\n- 本田 2026 年 3 月宣布取消美國 BEV 生產計畫、終止與 Sony 的 EV 合作\n- 電動機車受空間限制難以增加電池容量，電池交換網絡是推廣關鍵\n- 競爭對手：台灣 Gogoro（電池交換先驅）\n\n## Related\n- [[entities/本田]]\n- [[concepts/電池交換技術]]\n- [[concepts/電動機車市場]]"

    "honda-india-ev-hybrid-2026": {
      "title": "Honda 印度大反攻：6 款新車 + 本地製造 EV（2026-05）",
      "url": "https://auto.economictimes.indiatimes.com",
      "updated": "2026-05-25",
      "body": "**來源**：[https://auto.economictimes.indiatimes.com](https://auto.economictimes.indiatimes.com)\n\n# Honda 印度大反攻：6 款新車 + 本地製造 EV（2026-05）\n\n**原文**：ETAuto / Economic Times Auto，2026-05-22\n\n## 摘要\n\nHonda Cars India 宣布 FY2026-27 將推出 **6+ 款新車**，以 ZR-V 混合動力旗艦 SUV 為核心，同時確認本地製造 EV 計畫（Honda 0 Alpha 平台為基礎），目標雙位數成長止住市占流失。\n\n## 2026 年主力車型\n\n| 車型 | 說明 |\n|------|------|\n| City 改款 | 主力轎車更新 |\n| **ZR-V** | 旗艦 SUV，**混合動力獨賣**（強混 2.0L NA），完全建置進口，2026-07 起交車 |\n| Elevate 改款 | 緊湊 SUV 更新 |\n| Prelude | 轎跑返印（2026 年） |\n| **Honda 0 Alpha EV** | 預計 2027 年；**本地製造**（Tapukara 廠，拉賈斯坦邦）|\n\n**ZR-V 關鍵決定**：以強混 2.0L NA 取代 1.5L 渦輪汽油，成為**純混合動力**車型，呼應印度市場對油耗的重視。\n\n## 本地 EV 計畫（Honda 0 Alpha 平台）\n\n| 項目 | 內容 |\n|------|------|\n| 製造廠 | Tapukara 廠（拉賈斯坦邦）|\n| 投資規模 | **₹1,200 億**（~$1.4 億美元）|\n| 上市時間 | 預計 **2027 年** |\n| 平台 | Honda 0 Alpha（全新全球 EV 平台）|\n\n## 2028 年擴張計畫\n\n- 進入**4m 以下緊湊型**和**中型**兩個細分市場\n- 強化本地化，降低進口零件依賴\n\n## 市場背景\n\nHonda Cars India 近年市占持續萎縮，此次為重大戰略轉型：從依賴進口到本地製造 EV，從純汽油到混合動力主打，試圖在 Maruti Suzuki / Tata / Hyundai 的強勢市場中重新站穩。\n\n## Related\n- [[concepts/印度EV市場]]\n- [[entities/豐田]]（對比：Toyota 也押注混動）"

    "honda-nexeon-silicon-anode-2026": {
      "title": "Honda 投資 Nexeon：矽陽極電池材料布局",
      "url": "https://www.electrive.com/2026/05/30/honda-invests-in-battery-materials-manufacturer-nexeon/",
      "updated": "2026-05-26",
      "body": "# Honda 投資 Nexeon：矽陽極電池材料布局\n\n**來源**：[electrive.com](https://www.electrive.com/2026/05/30/honda-invests-in-battery-materials-manufacturer-nexeon/)，2026-05-30\n\n---\n\n## 核心事件\n\nHonda 透過 **Honda Xcelerator Ventures** 全球開放創新計畫，投資英國矽陽極材料製造商 **Nexeon**（金額未披露）。\n\n---\n\n## Nexeon 公司概況\n\n| 項目 | 詳情 |\n|------|------|\n| 創立背景 | 帝國理工學院（Imperial College London）衍生公司，逾 20 年歷史 |\n| 2022 融資 | 超過 **$2 億美元** |\n| 核心技術 | 矽碳（Silicon-Carbon）複合陽極材料 |\n| 優勢 | 取代傳統石墨，大幅提升能量密度 + 充電速度 |\n| 韓國量產廠 | **群山（Gunsan）廠**，2025-12 宣布量產就緒 |\n| 首批客戶 | **Panasonic**（用於 De Soto, Kansas City 廠，2025 年開幕）|\n\n---\n\n## 矽陽極的戰略意義\n\n1. **減少對中國石墨的依賴**：傳統石墨陽極主要來自中國\n2. **更高能量密度**：矽儲存電子能力遠優於石墨\n3. **挑戰**：矽膨脹問題（充放電時體積變化） + 成本 + 壽命縮短\n4. **案例佐證**：Mercedes-AMG GT 4-Door 採用矽陽極 + NCMA 正極，實現 600kW / 298 Wh/kg\n\n---\n\n## 背景：Honda 電池策略\n\nHonda 同時：\n- 與 LG Energy Solution 合資加拿大電池廠（CAD 150 億，現凍結）\n- 增資 Gachaco（電動機車電池交換，持股 47%）\n- 押注 $280 億混動投資\n\n→ Nexeon 投資為**核心材料技術佈局**，確保下一代電池能量密度競爭力\n\n---\n\n## Related\n- [[concepts/電池技術路線]]\n- [[entities/本田]]\n- [[sources/honda-9b-loss-hybrid-pivot-2026]]\n- [[sources/ganfeng-solid-state-500wh-2026]]"
    },
    "honda-strategy-correction-2026": {
      "title": "本田 EV 策略大撤退：FY2025 預計虧損 690 億日圓",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751572&grid_seq1=&grid_seq2=",
      "updated": "2026-04-09",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751572&grid_seq1=&grid_seq2=](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?CnlID=&id=751572&grid_seq1=&grid_seq2=)\n\n# 本田 EV 策略大撤退：FY2025 預計虧損 690 億日圓\n\n**原文**：DIGITIMES／江仁傑｜**發布**：2026-04-09\n\n## 摘要\n本田大幅調整 EV 策略，取消多個北美 EV 開發計畫，FY2025 合併淨利預估首度出現約 6,900 億日圓虧損，2026 年度累計損失恐達 2.5 兆日圓。\n\n## 取消的 EV 計畫\n| 計畫 | 原定時間 |\n|------|---------|\n| Acura RSX SUV | 2026 北美上市 |\n| Honda 0 Series SUV | 2026 北美上市 |\n| Afeela 1（與 Sony 合資）| 2026 北美上市 |\n| Honda Saloon | 2027 |\n\n## 財務影響\n- FY2025 合併淨利：預估虧損 **6,900 億日圓（約 $43.2 億美元）**\n- 累計損失至 2026 年度：最高恐達 **2.5 兆日圓**\n- 現金：~4 兆日圓 → 策略調整後可能縮減至 ~2 兆日圓\n- 每車激勵金（2026-02）：豐田的 **1.6 倍**\n\n## 結構性問題\n- 研發效率：近 5 年營業利益/研發費用 = **1.3 倍**（豐田 3.4 倍）\n- 大量研發人力調往 EV → 燃油車與 SDV 開發速度下降\n- CR-V（主力 SUV）2027 年前無改款計畫 → 北美產品真空期\n\n## 應對措施\n- 將四輪車開發部門拆分至子公司「本田技術研究所」（Honda R&D）\n- 與日產汽車整合談判持續但進展緩慢\n\n## Related\n- [[entities/本田]]\n- [[concepts/地理市場/美國EV市場與政策]]\n- [[sources/honda-gachaco-battery-swap]]"
    },

      "title": "本田 Super One 小型 EV 對抗比亞迪海獺：日本輕型車市場新戰場",
      "url": "https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752162",
      "updated": "2026-04-15",
      "body": "**來源**：[https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752162](https://www.digitimes.com.tw/tech/dt/n/shwnws.asp?id=752162)\n\n# 本田 Super One 小型 EV 對抗比亞迪海獺：日本輕型車市場新戰場\n\n**原文**：DIGITIMES／江仁傑｜**發布**：2026-04-15\n\n## 摘要\n本田將於 2026 年 5 月底推出小型 EV「Super One」，以非輕型車（Non-K-Car）規格應對日本市場，並計劃進軍英國與亞洲；同年夏天，比亞迪也將推出專為日本設計的輕型 EV「海獺（Rakko）」，日本小型 EV 市場競爭升溫。\n\n## 本田 Super One 規格\n\n| 項目 | 數值 |\n|------|------|\n| 推出時間 | 2026 年 5 月底 |\n| 預購開始 | 2026 年 4 月 16 日 |\n| 基礎車型 | N-ONE e:（輕型電動車）|\n| 續航里程 | **274 km** |\n| 車重 | **1,090 kg**（非輕型 EV 中最輕量）|\n| 定位 | 非輕型汽車（Non-K-Car）規格 |\n| 特色 | Boost Mode（強化輸出）；可模擬燃油引擎聲與振動 |\n| 海外計劃 | 英國 + 亞洲市場 |\n\n## 本田 EV 產品線（2026）\n\n| 車型 | 定位 | 類比舊車型 |\n|------|------|---------|\n| N-VAN e: | 輕型商用電動車 | Life Step Van |\n| N-ONE e: | 輕型乘用 EV（K-Car）| N-360（國民車）|\n| **Super One** | 小型 EV（非 K-Car）| City Turbo II（鬥牛犬）|\n\n## 已取消的 EV 計畫\n- Acura RSX（2026 年北美純電 SUV）\n- 0 系列 SUV\n- Sony 合資 Afeela 1\n- 2027 年 Saloon\n\n## 競爭威脅：比亞迪海獺（Rakko）\n- 計劃：**2026 年夏**在日本推出\n- 規格：K-Car 規格，專為日本市場設計\n- 戰略：比亞迪首款符合日本輕型車規格的 EV，直接挑戰本土市場\n\n## 本田策略展望\n- 正式 EV 策略調整預計 **2026 年 5 月**公布\n- 目前 Super One 仍屬原有策略延伸，非新策略一部分\n\n## Related\n- [[entities/本田]]\n- [[entities/比亞迪]]\n- [[concepts/車輛類型/平價電動車市場]]\n- [[concepts/地理市場/東南亞EV市場]]\n- [[sources/honda-strategy-correction-2026]]"

    "hwa-der-taiwan-bus-listing": {
      "title": "華德動能轉上市：台灣電動巴士龍頭 Q1 每股賺 1.13 元（2026-04）",
      "url": "https://www.peoplenews.tw/articles/investment-financialmgmt/28947",
      "updated": "2026-04-27",
      "body": "**來源**：[https://www.peoplenews.tw/articles/investment-financialmgmt/28947](https://www.peoplenews.tw/articles/investment-financialmgmt/28947)\n\n# 華德動能轉上市：台灣電動巴士龍頭 Q1 每股賺 1.13 元（2026-04）\n\n**原文**：民報／劉曉霞｜**發布**：2026-04-27\n\n## 摘要\n台灣電動巴士龍頭廠華德動能於 2026 年 2 月獲准轉上市，Q1 財報優於預期：營收 8.77 億元、淨利 1.36 億元、EPS 1.13 元，年增近 2 倍。業務涵蓋整車製造、三電系統、車隊管理、充電基礎設施，同步深耕日本市場。\n\n## Q1 2026 財務數據\n\n| 指標 | 數值 | YoY |\n|------|------|-----|\n| 營收 | **NT$ 8.77 億** | **+~100%** |\n| 淨利 | **NT$ 1.36 億** | **+~100%** |\n| EPS | **NT$ 1.13** | — |\n\n主要驅動：電動巴士交車量大幅提升 + 充電樁業務貢獻\n\n## 公司背景\n\n- 母公司：**車王電**（國內電子零件龍頭）轉投資\n- 定位：台灣**電動巴士市占第一**\n- 業務範疇：整車製造 / 三電系統整合（電池+電機+電控）/ 車隊管理軟體 / 充電樁\n\n## 日本市場策略\n\n| 指標 | 數值 |\n|------|------|\n| 現有日本市占率 | **15%** |\n| 2030 年目標 | **32%** |\n| 合作夥伴 | **住友商事** |\n| 2026 年進展 | 神戶、岡山車輛正式上路 |\n\n## 與鴻海×三菱FUSO 的競合\n\n- 鴻海×FUSO 計畫 2030 年開始外銷日本製電動巴士（東南亞、澳洲）\n- 華德動能已在日本取得 15% 市占，是台日電動巴士外銷的先行者\n- 雙方代表台灣電動巴士的兩條不同路線：自有品牌（華德）vs. OEM 合資（鴻海×FUSO）\n\n## Related\n- [[concepts/車輛類型/電動巴士市場]]\n- [[entities/鴻海]]\n- [[syntheses/電動巴士產業全景]]\n- [[sources/foxconn-mitsubishi-fuso-electric-bus]]"
